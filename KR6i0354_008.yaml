body:
  text: 西明寺沙門圓測撰地波羅蜜多品第七或可止觀略故先說依地起度廣故後釋來意已說今當釋爾時觀自在菩薩白佛言世尊如佛所說菩薩十地所謂極喜地離垢地發光地焰慧地極難勝地現前地遠行地不動地善慧地法雲地復說佛地為第十一如是諸地幾種清淨義分所攝釋曰第三依文正釋於此品內大分為二初問答正說分後爾時觀自在下依教奉持分前中有二初長行廣釋後以頌略說或可此品即分為三初長行廣釋次以頌略說後依教奉行雖有兩說且依前釋就前長行復分為四一廣明諸地二觀自在菩薩復白佛言世尊是諸菩薩凡有幾種所應學事下廣明十度三觀自在菩薩復白佛言世尊此諸地中煩惱隨眠下別釋依地起度所對治障四觀自在菩薩復白佛言世尊如世尊說若聲聞乘下明佛如來說一乘意所以如是說四段者依地起度依度除障故得一乘果故說四段就釋地中復分為六一約四種清淨及十一分分別諸地二釋地名義三約二十二愚分別諸地四八種殊勝分別諸地五約勝生分別諸地六就三願分別諸地就初段中先請後說此即第一菩薩請問文有三節初明問答者次如佛下舉所問教後如是下正發問辭言觀自在菩薩者發問菩薩名也謂此菩薩內具智悲外觀三業不作功用任運自在觀自在或約智及境立名故華嚴云觀音菩薩住大悲門法華云觀音妙智力能救世間苦相續經云觀世音深密經云觀世自在菩薩光世音菩薩阿難目佉陀羅尼經云遍見普安菩薩毗摩詰經𨶳音菩薩決定總持經云名光世音如來謗佛經云觀世自在如來觀音三昧經云觀音菩薩先已成佛名正法明如來觀音授記經云觀音菩薩補彌陀佛處號普光功德山王佛也次言如佛所說等者舉所問教謂十地等經具說十地及如來地如是諸地等者正發問辭問有二意一問如是十地四清淨中幾種所攝二問十一分中幾分所攝爾時世尊告觀自在菩薩曰善男子當知諸地四種清淨十一分攝釋曰自下第二如來正說於中有二初標宗略答後問答廣釋此即初也云何名為四種清淨能攝諸地釋曰自下第二問答廣釋於中有二初釋四種清淨能攝諸地云何名為下明十一分能攝諸地前中先問後答此即問也謂增上意樂清淨攝於初地增上戒清淨攝第二地增上心清淨攝第三地增上慧清淨於後後地轉勝妙故當知能攝從第四地乃至佛地釋曰自下第二正答於中有二先釋後結此即釋也謂諸清淨自有四種如經所說若依瑜伽第七十九名為四住即當此經四種清淨言增上意樂清淨攝於初地者梵音阿世耶此云意樂此意樂體諸教不同若依梁論無分別智為體故第九云樂信即是無分別智又十一云無分別智即是清淨意行若依瑜伽第四十七勝解為性故意樂品云淨信為先擇法為先於諸佛法所有勝解印解決定是名菩薩增上意樂若依無性攝論第七信欲為體故彼論云意樂信及欲為體世親第七亦同無性故彼論云意樂自體謂欲勝解欲名希求信名勝解大業論亦同又梁論第九云於正教中心決無疑故名為信如所信法求欲修行故名為樂然此意樂種數別者如瑜伽論第四十八有十意樂故彼論云若諸菩薩先極喜住由十種心意樂已得意樂清淨何等為十一者於一切師長尊重福田不行虗誑意樂二者於同法菩薩忍辱柔和易可共住意樂三者勝伏一切煩惱及隨煩惱衆魔事業心自在轉意業四者於一切行深見過失意樂五者於大涅槃深見勝利意樂六者於諸妙善菩提法常勤修習意樂七者即於彼修為順故樂處遠離意樂八者於諸世間有染尊位利養恭敬無所顧戀意樂九者遠離下乘趣證大乘意樂十者欲作一切有情一切義利意樂如是十種無倒意樂依止而轉是故說為意樂清淨若廣分別有十五意樂如瑜伽論第四十七若依無性所依論本增上意樂有八種相一資糧故謂解行地善修福智二種資糧二堪忍故謂得上品諦察法忍是增上忍或第一法三所緣故謂緣大乘深廣聖教四作意故謂覺一切法唯有分別是謂作意五對治故謂無分別智六自體故謂此意樂以信及欲為自體故七瑞相故謂地前地上處於中見諸佛者即是瑞相八勝利故謂了知菩提近以無難得故廣分別有三行頌長行釋具說如彼若依世親所依本謂有下除對治故言增上戒攝二地者謂第二地遠離一切微細犯垢住此地中性戒具足極小惡業當不現行由斯戒淨攝第二地若廣分別如瑜伽論第四十八言增上心清淨攝第三地者謂如瑜伽四十八云於此地中能得世俗四種靜慮四無色定及四無量五種神通具足安住既多住已復還棄捨諸靜慮等還來欲界為諸有情能作義利具說如彼乃至彼云由內心淨能發光明是故說言增上心住由此義故增上心淨攝第三地廣如瑜伽第四十八言增上慧清淨從第四地乃至佛地者謂增上慧攝後八地從第四地後後地中種種慧門轉勝妙故第四地覺品相應增上慧住第五地諸諦相應增上慧住第六緣起相應增上慧住第七有加行無相住第八無加行無相住第九四無礙解住第十最上成滿菩薩住第十一如來住廣如瑜伽第四十八問如何得知第四地上並是慧也答如前所列第七十九四種住中第四住名增上慧住故知已上約慧辨地善男子當知如是四種清淨普攝諸地釋曰第二攝結謂四清淨是實功德地是假名是則以實攝假云何名為第十一種分能攝諸地釋曰自下第二明十一分攝十一地於中有二先問後答此即第一依教發問雖十一分與十一地分位無別而義有異故瑜伽云由能攝持菩薩義故說名為地能為受用居處義故說名為住莊嚴論云樂住名住廣說如彼解云分者義謂十一住分段各別義說為分依十住婆沙譬喻品云初地分者所有諸法合成初地名初地分此即十三住中許初三住為十一住十一住者如瑜伽論四十七云謂種性住勝解行住極歡喜住增上戒住增上心住覺品相應增上慧住諸諦相應增上慧住緣起相應增上慧住有加行有功用無相住無加行無功用無相住無礙解住最上成滿菩薩住如來住廣釋如彼於此經中除初二住依十一住以分名說故今此中以分攝地謂諸菩薩先於勝解行地依十法行極善修習勝解忍故釋曰自下第二如來正說於中有二初依問正答後善男子下釋已總結就正答中釋十一分即為十一此釋初分攝極喜地於中有二初明地前未入初地後超過下超彼地前得入初地此即初也然釋於二地約十一分自有兩釋一依梁攝論第十於一一地約斷三障得勝功德釋十一地而差別者初之一地斷三種障得十功德次有九地各斷三障得八功德後之一地斷三種障得七功德以為因緣明地圓滿如後對釋一云於地地中隨其所應所修諸行以為因緣如極喜地修十法行及勝解忍以為因緣所言分者謂十一地分段各別名之為分就釋初地文別有二初明地前修後行因後明自分圓滿此即初也謂諸菩薩者舉觀行人謂具性習二種種姓補特伽羅先於勝解地者行所依位謂前所說資糧加行見修究竟五位之內依前二位起深信解名勝解行地故攝大乘第七卷云謂得諸地深信解者於地教法決定印可真實如是依十法行等者依位起行謂依勝行地起十正行十正行者如瑜伽論七十四云復次於大乘中有十法行能令菩薩成熟有情何等為十謂於大乘相應菩薩藏攝契經等法書持供養惠施於他若他正說恭敬聽聞或自玩讀或復領受受已廣音而為諷誦或復為他廣說開示獨處空間思量觀察隨入修相問如是十種法行幾是能生廣大福德道答一切問幾是加行道答一謂第九問幾淨障道答一謂第十此十正行廣說如前第四卷記極善修習勝解忍故者梁攝大乘第十卷云菩薩先在願行地中於十種法行隨願忍得成由願忍成過願行地入正定位願者十大願忍者無分別智真諦記云於初地得無生願忍十大願成就准此梁論勝行即是初地無分別智今解經意謂四善根通名為忍或可增上忍及世第一名勝解忍深密經云信行地修行十種信心相續經云解行地菩薩有十法行善修習菩薩解脫忍超過彼地證入菩薩正性離生彼諸菩薩由是因緣此分圓滿釋曰自下第二明自分滿謂極喜地由前方便地十法行等因緣力故超過彼方便地證入初地正性離生由是因緣此分圓滿解云正性即是無漏聖道翻邪性故名為正性斷煩惱損害有情猶如宿食名之為生無漏聖道能離見惑故言正性離生若廣分別如瑜伽品記中已說深密經云過彼信地入於定聚相續經云超升離生文雖有異義不乖違依大般若正性離生有其兩釋一云有所得為生無所得智為正性離生故大般若四百六十八云善現白佛言世尊證入菩薩正性離生菩薩以何為生以何為離生佛告善現諸菩薩一切有所得為生以一切無所得為離生具說如彼一云隨順法愛說名為生如宿食生能為過患解空之智能滅彼生是故說名正性離生故大般若四百八十四云菩薩無方便善巧修行六度墮二乘地不入菩薩正性離生時舍利子問善現言何法名生善現答言生謂菩薩隨順法愛即此法愛說名為生如宿食生能為過患除遣此故名為離生具說如彼又大般若三十六四百八大品第四亦同後釋廣釋彼經如智度論第三十一若依梁論釋此經者斷三種障得十分功德因緣力故初地圓滿故第十云諸地各能滅三障各得勝功德初地能滅三障者一法我分別無明二惡道業無明此二無明感方便生死名粗重報為滅三障故修正勤因修正勤滅三障已得十分圓滿一入菩薩正定位二生在佛家三種姓無可譏嫌四已轉一切世間行決定不作殺生邪行故五已至出世行所得諸地必無漏故六已得菩薩法如由得自他平等故七已善立菩薩處由證真實菩薩法故八已至三世平等由覺了一切法無我真如故九已決定在如來姓中當來必成佛故十已離壞卵事由佛道破無明㲉於外般涅槃故菩薩於初地由見法界遍滿義得此十分由此分故初地圓滿解云十一地各滅三障者即是經中二十二無明十一粗重如後廣釋而未能於微細毀犯誤現行中正知而行由是因緣於此分中猶未圓滿釋曰自下第二辨第二分攝離垢地於中有二初明前分後行未滿後為今下明其自分對修圓滿此即初也初分時猶有微細誤犯愚故未能除滅誤犯之失由此因緣猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明其自分勤修圓滿謂如瑜伽住品說云即由如是十種意樂成上品故極圓滿故是諸菩薩入證第二增上戒住如是住中性戒具足極小邪惡業道所攝諸惡犯戒尚不現行況中上品廣說如彼由是因緣此分圓滿梁攝論云菩薩於初地未有勝能未能了達菩薩戒中微細犯戒過行故所以未能者由三障故一微細犯過無明二種種相業行無明此二無明感方便生死故名粗重報為滅三障故修正勤因修正勤滅三障已入第二地得八種清淨功德一信樂清淨二心清淨三慈悲清淨四波羅蜜清淨五見佛事佛清淨六成熟衆生清淨七生清淨八威德清淨於上上地離如如來地此八功德轉上轉勝由此分故二地圓滿解云八種清淨後當廣釋而未能得世間圓滿等持等至及圓滿聞持陀羅尼由是因緣於此分中猶未圓滿釋曰自下第三辨第三分攝發光地於中有二初明二地後行未滿後明自地修令圓滿此即初也謂彼菩薩雖已圓滿增上戒分而未能得第三地中勝定所攝等持等至及彼圓滿聞持陀羅尼言等持者梵音三摩地此云等持離沉浮故名之為等持心令住一境故名等持梵音三摩鉢底此云等至等義如前至謂至極謂彼寂靜至極處故名為等至如是二種皆有漏故可破壞故名為世間然此定名依瑜伽釋有其三名謂三摩呬多三摩地三摩鉢底故彼論云所言三摩呬多地者謂勝定地離沉掉等平等能引或引平等或是平等所引發故名等引地有義此名唯攝一切有心諸定皆能平等引功德故不通無心以前頌中言三摩地俱故三摩地者是別境中心數法故二無心定不能等引諸功德故非等引地若爾何故等引地說此等引地略有四種謂靜慮解脫等持等至言靜慮者謂四靜慮言解脫者謂八解脫言等持者謂空等持無願等持無相等持言等至者謂五現見等至五等至者一觀內身種種不淨二觀白骨識於中行三觀白骨識於中行住今世後世四觀白骨識於中行不住今世但住後世五觀白骨識於中行不住今世後世廣如婆沙第四十卷瑜伽十二也八勝處等至十遍處等至四無色等至無想等至滅盡等至此無有失二無心定是等引果故與其名實非等引有義此名通有心位及無心位所有定體若有心定平等能引諸功德故亦引等根大等故及離沉掉戒無悔等平等方便所引發故名為等引若無心定雖不能引殊勝功德而引平等根大等故是平等定所引發故亦名等引若爾何故前頌中言三摩地俱此無有失頌中變略且言彼俱其實等引非俱亦是後說等引通無心故如實義者等引地名有通有局有心無心兩位俱攝故名為通後說無想滅盡定亦是等引地體故唯在有漏無漏勝定非欲界等一切散心故名為局以後說言唯靜慮等名等引地非於欲界一境性由此等引無悔歡喜安樂所引欲界不爾准此上界若在散心亦非等引同欲界故由此相對得作四句或等持俱非等引地謂欲界等散心位中三摩地俱心心所等或等引地非等持俱謂定位中三摩地體及無想定滅盡定位所有諸法或等持俱亦等引地謂諸靜慮及諸無色有心定位心心所等除三摩地或有俱非謂除上位所有諸法又三摩地三摩鉢底三摩呬多名有寬狹三摩地名目心數中等持一法通攝一切有心位中心一境性通定散位然諸經論就勝但說空無願等名三摩地三摩鉢底通目一切有心無心諸定位中所有定體諸經論中就勝唯說五現見等相應諸定名為等至等引地名通目一切有心無心定位功德故此地中通攝一切定位功德由是總故偏目地名然今此中略辨二名以彼二名能攝定散有無心故言陀羅尼者此云總持念慧為體然此陀羅尼略有四種如瑜伽論第四十五故彼論云云何菩薩妙陀羅尼當知如是妙陀羅尼略有四種一者法陀羅尼二者義陀羅尼三者呪陀羅尼四者能得菩薩忍陀羅尼云何菩薩法陀羅尼謂諸菩薩獲得如是念慧力持由是力持聞未曾聞言未溫習未善通利名句文身之所攝録次第錯綜次第結集無量經典經無量時能持不忘是名菩薩法陀羅尼云何菩薩義陀羅尼謂如前說此差別者則於彼法無量義趣心未溫習未善通利經無量時能持不忘是名菩薩義陀羅尼云何菩薩呪陀羅尼謂諸菩薩獲得如是等持自在由此自在加被能除有情灾患諸呪章句令彼章句悉皆神驗無所唐捐能除非一種種灾患是名菩薩呪陀羅尼云何菩薩能得菩薩忍陀羅尼謂諸菩薩成就自然堅固因行具足妙慧獨處空間寂無言說曾無有物見路而行知量而食不雜穢食一類而食常極靜慮於夜分中少眠多寤於佛所說得菩薩忍諸呪章句能諦思惟廣說如彼具如別章此中意說等持等至是修慧因陀羅尼者是聞思慧因然彼菩薩未得等持及等至等發三慧因由是因緣於此增上心分於未圓滿也為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明其自分勤修圓滿謂第三地證得等持等至及陀羅尼因緣力故此分圓滿梁論釋云菩薩於二地未有勝能未得四定四空三摩跋提及聞持陀羅尼具足念力所以未得者由三障故一欲愛無明二具足聞持陀羅尼無明此二無明所感方便生死名粗重報為滅三障故修正勤因修正勤滅三障已入第三地得八種轉勝清淨及四定等乃至通達法界勝義由此分故三地圓滿而未能令隨所獲得菩提分法多修習住心未能捨諸等至愛及與法愛由是因緣於此分中猶未圓滿釋曰自下第四辨第四分攝𦦨慧地於中有二初明三地後行未滿後明自地勤修圓滿此即初也謂彼菩薩由二緣故未得第四覺分圓滿一者隨所獲得諸道品中未能多住二者定愛法愛猶未能捨由此二緣於此分中猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明其自地修令圓滿謂第四地證得道品而後能捨定法二愛因緣力故此分圓滿梁朝論云菩薩於三地未有勝能未能隨自所得助道品法中如意久住未能捨離定愛法愛心清淨住所以未能者由三障故一三摩跋提愛無明二法愛無明此二無明所感方便生死為粗重報為滅此障故修正勤因修正勤滅三障已入第四地得八種轉勝清淨及於助道法中如意久住等乃至通達法界無攝義由此分故四地圓滿而未能於諸諦道理如實觀察又未能於生死涅槃棄捨一向背趣作意又未能修方便所攝菩提分法由是因緣於此分中猶未圓滿釋曰自下第五辨第五分攝極難勝地於中有二初明四地後行未滿後明自地修令圓滿此即初也謂第四地已得道品而三緣故未得第五地一者雖得三十七品而未能得諸諦道理如實觀察所言諸諦如十地經四種聖諦及二諦等具說如彼二未得棄捨一向背生死一向取涅槃二種作意如成唯識未得生死涅槃無差別道故三未能修方便所攝菩提分法問第四地已得道品如何未修菩提分法解云菩提分法有其二種一三十七品如前已說二者方便所攝三種道品如十地經第五地云一者無厭足助道善集功德行助道故二不烋息精進助道常求智慧行助道故三無疲惓助道集大慈悲行助道故故前後說互不相違由此三緣於此分中猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明自地法修令圓滿謂五地菩薩由上所說三緣力故此分圓滿梁攝論云菩薩於四地未有勝能修四諦觀於生死涅槃未能捨離一向背取心未能得修四種方便所攝菩提道品所以未能者由三障故一生死涅槃一向背取思惟無明二方便所攝修習道品無明此二無明所感因緣生死名粗重報為滅此三障故修正勤因修正勤滅三障已入第五地得八種轉勝清淨及得捨離背取心等乃至通達法界相續不異義由此分故五地圓滿而未能於生死流轉如實觀察又由於彼多生厭故未能多住無相作意由是因緣於此分中於未圓滿釋曰自下第六辨第六分攝現前地於中有二初明五地後行未滿後明自地修令圓滿此即初也謂第五地雖得諦觀有二因緣未得第六地一未能於生死流轉如實觀察緣生道理二由於彼苦集染中多生厭故未能多住無相作意由是二緣於第六分猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明自地法修令圓滿謂六地菩薩證得緣生觀故此分圓滿梁攝論云菩薩於五地未有勝能於諸行法生起相續如理證故由多修行厭惡有為法相故未能長時如意住無相思惟故所以未能者由三障故一證諸行法生起相續無明二相想數起無明此二無明感因緣生死名粗重報為滅此三障故修正勤由修正勤滅三障已入第六地得八種轉勝清淨及不證諸行生起相續等乃至通達法界無染淨義由此分故六地圓滿而未能令無相作意無缺無間多修習住由是因緣於此分中猶未圓滿釋曰自下第七明第七分攝遠行地於中有二初明六地後行未滿後明自地修令圓滿此即初也謂第六地得緣起觀而未能得第七地中純無相觀於無相觀時無缺減故言無缺非有相間故名無間故成唯識第九卷云前五地中有相觀多無相觀少第六地中無相觀多有相觀少第七地中純無相觀由是因緣於此分中猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由此因緣此分圓滿釋曰第二明自地法修令圓滿謂七地菩薩而能證得無缺無間無相作意由是因緣此分圓滿梁攝論云菩薩於六地未有勝能未能離有為法微細諸相行起未能長時如意住無間無流無相思惟中所以未能者由三障故一微細相行起無明二一向無相思惟方便無明此二無明所感因緣生死名粗重報為滅三障故修正勤由修正勤滅三障已入第七地得八種勝清淨及離有為法微細行起諸法乃至通達法界種種法無差別義由此分故七地圓滿而未能於無相住中捨離功用又未能得於相自在由是因緣於此分中猶未圓滿釋曰自下第八明第八分攝不動地於中有二初明前分後行未滿後明自分勤修圓滿此即初也謂七地菩薩而未能於無相住中捨離功用又未能得於相自在由是因緣於第八分猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明自地法勤修圓滿謂八地菩薩而能於彼無相住中捨離功用又復能得於相自在由是因緣此分圓滿梁攝論云菩薩於七地未有勝能未能離功用心得住無相修中未能於自利利他相中心得自在所以未能者由三障故一於無相觀作功用無明二於相行自在無明此二無明所感有有生死名粗重報為滅三障故修正勤因修正勤滅三障已入第八地得八種轉勝清淨及離功用心得住無相修中等乃至通達法界無增減義由此分故八地圓滿而未能於異名衆相訓詞差別一切品類宣說法中得大自在由是因緣於此分中猶未圓滿釋曰自下第九明第九分攝善慧地於中有二初明前分後行未滿後明自分勤修圓滿此即初也異名者法無礙境衆相者義無礙境訓詞差別者詞無礙境一切品類宣說法中得大自在者樂說無礙境故瑜伽論四十三云一依法異門智所謂菩薩法無礙慧二依法相智所謂菩薩義無礙慧三依法釋詞智所謂菩薩釋詞無礙慧四依法品類句差別智所謂菩薩辨才無礙慧謂八地菩薩未得九地四無礙解故名未能由是因緣於第九分於未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明自地分勤修圓滿謂第九地得四無礙故名證得由是因緣此分圓滿梁攝論云菩薩於八地未有勝能未得於正說中具足相別異名言品類等自在未得善巧說陀羅尼所以未能者由三障故一無量正說說法無量名句味難答巧言自在陀羅尼無明二依四無礙辨決疑生解無明此二無明所感有有生死名粗重報為滅此三障故修正勤因修正勤滅三障已入第九地得八種轉勝清淨及於正說法中得具足相自在等乃至通達法界智自在依止義由此分故九地圓滿解云若依梁論二種無明障四無礙謂初無明障三無礙第二無明障四無礙者此引瑜伽及此經文真諦自安梵本攝論都無此文又所引文第三無明唯障辨才故知依四無礙辨才者譯家謬也而未能得圓滿法身現前證受由是因緣於此分中猶未圓滿釋曰自下第十明第十分攝法雲地於中有二初明前分後行未滿後明自分勤修圓滿此即初也謂第九地因未滿故未能現證圓滿法身真諦釋云謂第九地因未圓滿未能證得圓滿三身由是因緣於此分中猶未圓滿為令此分得圓滿故精勤修習便能證得彼諸菩薩由是因緣此分圓滿釋曰第二明其自分勤修圓滿謂第十地因圓滿故而能證得圓滿法身由是因緣此分圓滿梁攝論云菩薩於九地未有勝能未能得正說圓滿法身未得無著無礙圓滿六通慧所以未能者由三障故一六神通慧無明二入微細祕密佛法無明此二無明所感有有生死名粗重報為滅此三障故修正勤因修正勤滅三障已入第十地得八種轉勝清淨及能得正說圓滿法身等乃至通達法界業自在依止義由此分故十地圓滿真諦釋云十地圓滿所得三身名圓滿法身正說法身從法身出六通慧慧即是化身由得業自在化身成就也而未能得遍於一切所知境界無著無礙妙智妙見由是因緣於此分中猶未圓滿釋曰自下別明第十一分攝於佛地於中有二初明前分後行未滿後明自分勤修圓滿此即初也謂第十地未得遍知一切境界法空無著妙智妙見人空無礙妙智妙見由是因緣於此分中猶未圓滿為令此分得圓滿故精勤修習便能證得由是因緣此分圓滿此分滿故於一切分皆得圓滿釋曰第二明自地分勤修圓滿謂此佛地證得遍知一切智見由是因緣佛地圓滿佛地圓滿故十一種分皆得圓滿梁攝論云菩薩十地未有勝能未得清淨圓滿法身未能於一切應知境得無著無礙見及智所以未能者由三障故一於一切應智境微細著無明二於一切應知境微細礙無明此二無明所感無有生死名粗重報為滅此三障故修正勤因修正勤滅三障已入第十一如來地得七種最勝清淨離生清淨及得清淨圓滿法身無著無礙見智等由此分故佛地圓滿一云就十一分攝十一地有三例初一分中文有二節初明前位修行未成後超過彼地下明自地已滿次彼諸菩薩下九分例有三段初結前位滿次而未能下明後位未滿後為令下明修令圓滿後彼諸菩薩下明第十一分文別有四一結前位滿次而未下明後位未滿次為令下修令圓滿後此分滿下重結已滿雖有兩說前說為正善男子當知如是十一種分普攝諸地釋曰第二總結應知觀自在菩薩復白佛言世尊何緣最初名極喜地乃至何緣說名佛地釋曰自下第二釋地名義先問後答此即總問諸地名義佛告觀自在菩薩曰善男子成就大義得未曾得出世間心生大歡喜是故最初名極喜地釋曰自下第二如來正說釋十一地即為十一此釋極喜地釋有二義一得自他利二得無漏心故十地論第一卷云成就無上自利利他初證聖處故名歡喜解云聖處即無漏智釋此地名諸教極多不可具述以要言之或以一義釋極喜名如仁王經善覺菩薩四天王雙照二諦平等理攝大乘云由此最初得能成辦自他義利勝功德故無性世親攝大乘釋亦同攝論顯揚第三由正證得無上現觀住增上喜故名歡喜十住婆沙第一卷云始得善法味心多歡喜故或以二義以釋極喜如即此經十地論等或以三義如金光明第一卷云得出世心未得始得大事大用如意所願故名歡喜大事者自利大用者利他成唯識論第九卷云初獲聖性具證二空能益自他生大喜故若廣分別多信敬等九種念佛等十種離世間境等十種歡喜如十地論遠離一切微細犯戒是故第二名離垢地釋曰第二辨離垢地相續深密亦同此經仁王經云名為離遠故彼偈云離遠開士忉利王現形六道千國土金光明云一切微細之誤破戒過失皆清淨故名離垢地十地經云遠離慳嫉破戒垢心名離垢地十地論云離能起誤心犯戒煩惱垢等清淨戒具足故名離垢地攝大乘云由極遠離犯戒垢故世親釋云性戒成就非如初地思擇護戒性戒成故諸犯戒垢已遠離故無性意同世親顯揚論云超二乘地證淨尸羅對治一切犯戒垢十住論云行十善道離諸垢故成唯識云具淨尸羅遠離能起微細毀犯煩惱垢故名離垢地由彼所得三摩地及聞持陀羅尼能為無量智光依止是故第三名發光地釋曰第三明發光地謂第三地由得定故發修慧光由得聞持陀羅尼故發聞思慧光是故第三名發光地或可假地能與發光為所依止名發光地相續經云明地深密經云光明地而不說云發光地者譯家別故仁王經云名為明慧故彼偈云明慧空照炎天王應形萬國導群生金光明云無量智慧光明三昧不可傾動無能摧伏聞持陀羅尼為作本故說名明地十地經云無貪瞋等三種善根轉增明淨故名明地華嚴十住及善戒經大同十地攝大乘云由無退轉等持等至所依止故大法光明所依止故名發光地世親釋云由此地中與三摩地三摩鉢底嘗不相離無退轉故於大乘法能作光明名發光地若廣分別如無性釋顯揚論云證得極淨三摩地蘊大智光明之所依止名發光地成唯識云成就勝定大法總持能發無邊妙慧光故名發光地大智度論第四十九名有光地由彼所得菩提分法燒諸煩惱智如火𦦨是故第四名𦦨慧地釋曰第四辨𦦨慧地謂諸菩提分法智𦦨燒煩惱薪故名𦦨慧相續深密意同此經依仁王經亦名𦦨慧故彼偈云𦦨慧妙光火精進兜率天王遊信國金光明云能燒煩惱以智慧火增長光明修行道品依處故名為炎地十地經云日夜常放智光明炎故如摩尼光非餘光滅故名𦦨地十住華嚴大同十地十地論云不忘煩惱薪智火能燒故名為𦦨地言不忘者俱生煩惱任運相續欲起即智故言不忘也莊嚴論云以菩提分慧為𦦨自性以惑智二障為薪自性此地菩薩能起智慧𦦨燒二障薪名𦦨慧地攝大乘云由諸菩提分法焚滅一切障故名𦦨慧地世親釋云由此地中安住最勝菩提分法由住此故能燒一切根本煩惱及隨煩惱皆為灰燼名焰慧地無性意同成唯識云安住最勝菩提分法燒煩惱薪慧𦦨增故名焰慧地智度論云增曜地解云莊嚴論等燒二障薪名𦦨地世親釋云能燒一切根本煩惱及隨煩惱皆為灰燼者永斷所智伏斷煩惱名為灰燼不爾便違攝大乘說留惑至惑盡等由即於彼菩提分法方便修習最極艱難方得自在是故第五名極難勝地釋曰第五明難勝地謂難修中得自在故名為難勝相續同此深密經云菩提分法方便修行難勝得勝名難勝地仁王經名勝慧地故彼偈云勝慧三諦自遠明化樂天王百億國金光明云是修行方便勝智自在難得故見思煩惱不能伏故名難勝地十地經彼地善根以方便智思量力故轉勝明淨下地善根二乘善根世間善根所不能及名難勝地十住華嚴及善戒經意同十地論云得世間智方便善巧能度難度故名難勝地瑜伽論云今此地中顯示菩薩於諸聖諦決定妙智極難可勝名難勝地莊嚴論云於五地中有二種離一勤化衆生無惱難二生不從化心無惱難此地菩薩能退二難於難得勝名難勝地攝大乘云由真諦智與世間智更互相違合此難合令相應故名難勝地無性世親意同攝論顯揚論云證得極淨緣諦所知諸法微妙慧薀成極難不住流轉寂靜聖道名極難勝十住論云第五地中功德力盛一切諸魔不能壞故名難勝地成唯識論意同攝論現前觀察諸行流轉又於無相多修作意方現在前是故第六名現前地釋曰第六辨現前地謂此地中現前觀察諸行流轉又相無相多修作意令無相觀方得現前具此二義名現前地相續深密意同此經依仁王經名為法現故彼偈云法現開士自在王照千億土教一切金光明經意同此經十地經云得無障礙智門現前名般若光明現前華嚴十住善戒經意同十地經莊嚴論云不住生死涅槃觀慧現前名現前地攝大乘云由緣起智為所依止能令般若波羅蜜多恆現在前世親釋云謂此地中住緣起智由此智力無分別住最緣般若波羅蜜多而得現在悟一切法無染無淨於第七地當成有行於第八地中當成無行無性釋論意同世親十住論云障魔事已諸菩薩道法皆現在前成唯識論同攝大乘智度論亦名現前地能遠證入無缺無間無相作意與清淨地共相鄰接是故第七名遠行地釋曰第七解遠行地謂此地中無缺無間證入無相不同六地暫時現前又復鄰近第八淨地具斯二義名遠行地相續深密意同此經依仁王經名遠達地故彼偈云遠達無生初禪王常萬億土教衆生金光明云無漏無間無相思惟解脫三昧遠修行故是地清淨無障無礙名遠行地十地經云得甚深遠離無身口意業轉求勝行復能利益衆生故法忍轉淨名遠行地華嚴十住及善戒經意同十地十地論云善修無相行功用究竟能過世間二乘出世間道故名遠行地莊嚴論云菩薩於七地中近一乘道名為遠行問誰是遠去答功用方便究竟此遠能去由此遠去故名遠行地攝大乘云至功用行最後邊故世親釋云謂此地中於功用行得至究竟雖一切相不能動漂而於無相猶名有行無性意同十住論云去三界遠近法王位故名深遠地成唯識云至無相住功用後邊出過世間二乘道去名遠行地由於無相得無功用於諸相中不為現行煩惱所動是故第八名不動地釋曰第八明不動地謂此地中功用煩惱皆不能動名不動地梁攝大乘釋此經文有其三義故彼論云相惑功能不能動故謂此地中有二種境一真境名無相菩薩住此境一切相及功用所不能動二俗境名一切相菩薩住此境一切煩惱不能動故名不動地相續深密意同此經依仁王經名為等觀故彼偈云等觀菩薩二禪王入百億土化一切金光明云無相正思惟修得自在諸煩惱行不能令動名不動地若廣分別如十地經及華嚴等十地論云報行純熟無相無間名為不勤莊嚴論云於八地中有相想及無相有功用想二想俱不能動由無此動故名不動地攝大乘云由一切相有功用行不能動地世親釋云由此地中所有諸相及一切行相皆不能動無分別智任運流行無性釋云謂一切相及一切行皆悉不能動彼心故第七地中雖一切相所不能動不現行故然不自在任運而轉有加行故第八地中任運而轉不作加行無功用故是名七八二地差別梁攝論大乘二復次釋初同此經後同新經十住論云若天魔梵沙門婆羅門無能動其願故名不動地成唯識云無分別智任運相續相用煩惱不能動故於一切種說法自在獲得無罪廣大智慧是故第九名善慧地釋曰第九明善慧地罪者過也礙也患也謂此地中於一切處種種說法而得自在獲得無礙廣大智慧此慧妙善故名善慧相續深密意同此經依仁王經名為慧光故彼偈云慧光開士三禪王能於千億一時現金光明云說法自在無患纍故增長智慧自在無礙十地經云如實知衆生三聚相隨順如是智名善慧地華嚴等經意同十地十地論云無礙力說法成就利他行故莊嚴論云於九地中四無礙慧最為殊勝於一剎那三千世界所有人天異類異音異義問此菩薩能以一音普答衆問遍斷衆疑由此說言名善慧地攝大乘云由得最勝無礙智故世親釋云由此地中無礙解智說名為慧此慧妙善故名善慧無性釋云謂得最勝四無礙解無礙智於諸智中最為殊勝智即是慧故名善慧四無礙者法義詞辨由法無礙自在了知一切句由義無礙自在通達一切義理由辭無礙自在分別一切言詞由辨無礙遍於十方隨其所宜自在辨說於此地中最初證得先未曾得無礙解智故名善慧十住論云其慧轉明調柔增上名善慧地成唯識云成就微妙四無礙解能遍十方善說法故智度論云善相地智粗重之身廣如虗空法身圓滿譬如大雲皆能遍覆是故第十名法雲地釋曰第十解法雲地謂我法執所熏種子無堪任故名為粗重遍障二空無我理故是故經云廣如虗空其第十地下種法界法身圓滿喻如大雲證法界時由圓滿法身及修生法身覆隱如空廣大粗重故名法雲地相續經云如虗空等過惡以如大雲法身周遍覆故深密經云衆生煩惱過患之身如虗雲等如來成法身猶如大雲覆衆生界說法示現依仁王經名為灌頂故彼偈云灌頂菩薩四禪王於億恆土化群生金光明云法身如虗空智慧如大雲能令遍覆一切故真諦說云如虗空者譬三如如也虗空有三義一容受譬自性法身不礙生死二無邊譬顯了法身雖復顯了而未究竟如空有清淨處有塵霧處如道內法身通惑解中道也三清淨無塵霧譬聖果法身智慧如大雲者譬如如智有三一道前性得二道內修德三道後至得又言遍者性得如如智遍如如理滿者修得如如智滿如如理覆者至得如如智覆如如理境智相覆也雲即是雨雨有三義一能障塵道前自性智清淨無染義二能洗垢道內滅惑除惡義三能萌牙道後能出如牙已生又空如法身雲如應身十地經云如大龍王智大法雨餘地處所不能容受唯除大海如是佛子一切如來祕密雲雨凡夫二乘九地菩薩皆不能受唯法雲地菩薩能受故名法雲地復次此地菩薩起大慈雲震大法雷無畏電光智慧疾風善根密雲種種色身為雜色雲說正法雨破諸魔怨於一念間遍䨱世界澍大法雨滅除衆生煩惱塵炎八相成道度諸衆生故名法雲地具說如彼莊嚴論云於第十地中由三昧門及陀羅尼門攝一切聞熏習因遍滿阿梨耶識中譬如浮雲遍滿虗空能以此聞熏習雲於一一剎那於一一相於一一好一一毛孔雨無量無邊法雨充足一切可化衆生由能如雲雨法故名法雲地攝大乘云由得總緣一切法智含藏一切陀羅尼門三摩地門譬如大雲能䨱如空廣大障故又於法身能圓滿故世親釋云由此地中所有總緣一切法智譬如大雲陀羅尼門三摩地門猶如淨水此智所藏如雲含水又如大雲能䨱虗空如是總緣一切法智普能覆滅諸廣大障又於法身能圓滿者如大雲起周遍虗空如是此智於諸菩薩所依法身悉能周遍此中圓滿意說周遍無性釋云由得總緣一切法智總緣一切契經等法不離真如此一切法共相境智譬如大雲陀羅尼門三摩地門猶如淨水智能藏彼如雲含水有能生彼勝功能故又如大雲覆隱虗空如是總緣一切法智覆隱如空廣大無邊惑智二障言覆隱者攝義斷義又如大雲澍清冷水充滿虗空如是總緣一切法智出生無量殊勝功能充滿所證所依法身梁攝大乘文雖有異意無異也成唯識云大法智雲含衆德水蔽如空粗重充滿法身故名法雲地解云此有三義一大法智雲含衆德水譬如大雲由得總緣一切法智猶如大雲陀羅尼門三摩地門猶如淨水智能藏彼如雲含水二蔽如雲粗重譬如大雲由如大雲覆隱虗空如是總緣一切法智覆隱如虗空廣大無邊戒智二障言覆隱者隔義斷義三充滿法身故譬如大雲由如大雲澍清冷水充滿虗空如是總緣一切法智出生無量殊勝功德充滿所證所依法身永斷最極微細煩惱及所知障無差無礙於一切種所知境界現等正覺故第十一說名佛地釋曰第十一別解佛地謂一剎那金剛三摩地為無間道雙斷微細二障種子斷煩惱障故名為無差斷所知障故說名無礙第二剎那為解說道於一切種所知境界現等正覺即是四智相應心品名為等覺言佛地者佛具五義地有三義故佛地論第一卷云言佛地者具一切智一切種智離煩惱障及所知障於一切法於一切衆相能自開覺一切有情如睡夢悟如蓮華開故名為佛地謂所依所行所攝即當所說清淨法界大圓境智平等性智妙觀察智成所作智受用和合一味事等是佛所依所行所攝故名佛地解云言五義者一具真俗智二離二種障三達真俗境四具自他覺五離無明故慧得解脫如睡夢悟斷貪欲故心得解脫如蓮華開具此五義故名為佛今此經中具有四義一離二障如經永斷最極微細煩惱及所智障二具二智謂生空法空智如經無差無礙三達真俗境如經於一切種所知境界四具自他覺如經現等正覺地三義者一所依二所行三所攝如上已說又佛地經云有五種法攝大覺地謂清淨法界及彼四智廣說如彼故今經云故第十一名為佛地相續經云微細煩惱爾炎障斷得無閡無障爾炎一切種覺故第十一名為佛地深密經云離一切無明微細習氣離一切境界智障習氣無障無礙於一切法中而得自在故十一名為佛也若廣分別如十地論第一卷及梁攝論第十及瑜伽七十九等觀自在菩薩復白佛言於此諸地有幾愚癡有幾粗重為所對治釋曰自下第三二十二愚分別諸地於中有二先問後答此即總問於十一地有幾愚癡及諸粗重為所對治然此諸愚十一粗重諸教不同謂相續深密瑜伽決擇第七十八皆與此經同本異譯金光明經最淨地品列諸愚名而不解釋梁攝大乘天親論第十卷中二十二愚感十一粗重報初八愚癡能感四中方便生死次六能感因緣生死次六能感有有生死後二能感無有生死即彼所感變易果報為粗重報今詳梁論有三種失一梵本攝大乘釋無分別二所列解深密經不辨四種生死三以所知障不感分段變易二種生死如成唯識第九卷中廣釋經意故今依彼釋此經文其間同異依文正釋佛告觀自在菩薩曰善男子此諸地中有二十二種愚癡十一粗重為所對治釋曰第二如來正說於中有三初總標次別釋後善男子下顯說愚意此即總標十一地有二十二愚及十一粗重為所治障謂於初地有二愚癡一者執著補特迦羅及法愚癡二惡趣雜染愚癡及彼粗重為所對治釋曰自下第二次第別釋於十一地各有二愚及一粗重為十一段此即初地二愚粗重能此二愚依成唯識自有兩釋一云愚及愚品總說為愚謂初地二愚一執著我法即是此中異生性障二惡趣雜染愚即是惡趣諸業果等應知愚品總說為愚後准此釋一云此中唯說愚癡故彼復云或彼唯說利鈍障品俱起二愚解云五利俱愚名為執著我法愚五鈍俱者名為惡趣雜染愚問若爾利鈍二惑俱愚何愚所攝解云隨強而說或可同時義說二愚問護法宗異生性障用何為體解云護法自有兩釋一據實通論於二障中分別起者二乘見道現在前時唯斷一種名得聖性菩薩見道現在前時具斷二種名得聖性二真見道現在前時彼二障種必不成就猶明與暗定不俱生如稱兩頭低昂時等諸相違法理必應然是故二性無俱成失無間道時已無惑種何用復起解脫道為斷惑證滅期心別故為捨彼品粗重性故無間道時雖無惑種而未捨彼堪任性為捨此故起解脫道及證此品擇滅無為一云據實通攝二障經論意趣唯所知障障十地故唯諸菩薩之所斷故言粗重者諸教不同相續經云十一所治過深密經云十一對金光明云依二粗重心如是諸教言雖有異義不相違依種子說惑無堪任俱不違故梁攝大乘粗重報者真諦自安非正梵本成唯識論自有兩釋故彼復云及粗重言顯彼二種或二所起無堪任性如入二定說斷苦根所斷苦根雖非現種而名粗重此亦應然後粗重言例此應釋於第二地有二愚癡一者微細誤犯愚癡二者種種業趣愚癡及彼粗重為所對治釋曰第二辨離垢地障依成唯識自有兩說一云微細誤犯愚即是俱生一分二種種業趣愚即彼所起誤犯三業一云或唯起業不了業愚解云前義愚及愚品俱說為愚後復次意如其次第一能發業愚二不了業愚此上二愚即十障中耶行障也釋粗重言如上已說於第三地有二愚癡一者欲貪愚癡二者圓滿聞持陀羅尼愚癡及彼粗重為所對治釋曰第三發光地障成唯識云一欲貪愚即是此中能障勝定及修慧者彼昔多與欲貪俱故名欲貪愚解云據實是所知障而言貪欲者與貪欲同體故今得勝定及修所成復既永斷欲貪隨伏此無始來依彼轉故二圓滿陀羅尼愚即是此中能障總持聞思慧者合說二愚為暗鈍障於第四地有二愚癡一者等至愛愚癡二者法愛愚癡及彼粗重為所對治釋曰第四焰慧地障成唯識云一等至愛愚即是此中定愛俱者二法愛愚即是此中法愛俱者所知障攝二愚斷故煩惱二愛亦不現行唯識復云此即十障中第四微細煩惱現行障謂所知障中俱生一分第六識俱身見等攝最下品故不作意緣故遠隨現行故說名微細解云三義釋微細義慮知彼障四地菩提分法入四地時便能永斷彼昔多與第六識中任運而生執我見等同體起故說煩惱名今四地中既得無漏菩提分法彼便永滅此我見等亦永不行初二三地行施戒修相同世間四地修得菩提分法方名出世故能永害二身見等寧知此與第六識俱第七識俱執我見等與無漏道性相違故八地已去方不行七地已來猶得現起與餘煩惱為依持故此粗彼細伏有前後故此但與第六相應身見等言亦攝無始所知障攝定愛法愛彼定法愛三地尚增入四地時方能永斷菩提分法特違彼故於第五地有二愚癡一者一向作意棄背生死愚癡二者一向作意趣向涅槃愚癡及彼粗重為所對治釋曰第五難勝地障成唯識云如其次第能厭生死樂涅槃者也即十障中第五於下乘涅槃障謂所知障中俱生一分令厭生死樂趣涅槃同下二乘厭苦欣滅彼障五地無差別道入五地時便能永斷解云五地依四諦觀以為方便入彼四諦染淨因果無差別道是故能斷皆趣二愚於第六地有二愚癡一者現前觀察諸行流轉愚癡二者相多現行愚癡及彼粗重為所對治釋曰第六現前地障成唯識云一現觀察行流轉愚即是此中執有染者諸行流轉染分攝故二相多現行愚即是此中執有淨者取淨相故相觀多行未能多時住無相觀解云初愚執苦集流轉門後愚執滅道淨相門即十障中第六粗相現行障謂所知障中俱生一分執有染淨粗相現行彼障六地無染淨道入六地時便能永滅於第七地有二愚癡一者微細相現行愚癡二者一向無相作意方便愚癡及彼粗重為所對治釋曰第七遠行地障成唯識云一細相現行愚即是此中執有生者猶有流轉細生相故解云執有緣生生滅流轉據實通滅且舉初言二純作意求無相愚即是此中執有滅者尚取還滅細滅相故解云執有緣生還滅相也純於無相作意勤求未能空中起有勝行即十障中第七細相現行障謂所知障中俱生一分執有生滅細相現行彼障七地妙無相道入七地時便能永斷於第八地有二愚癡一者於無相作功用愚癡二者於相自在愚癡及彼粗重為所對治釋曰第八不動地障成唯識云一於無相作功用愚二於相自在愚令於相中不自在故此亦攝土相一分故八地已上純無漏道任運起故三界煩惱永不現行第七識中細所知障猶可現起生空智果不違彼故解云生空智果者謂生空智所引後得智及滅定即十障中第八於無相中作加行障謂所知障中俱生一分令無相觀不任運起前之五地有相觀多無相觀少於第六地有相觀少無相觀多第七中純無相觀雖恆相續而有加行由無相中有加行故未能任運現相及土如是加行障八地中無功用道故若得入第八地時便能永斷彼永斷故得二自在於第九地有二愚癡一者無量說法無量法句文字後後慧辨陀羅尼自在愚癡二者辨才自在愚癡及彼粗重為所對治釋曰第九善慧地障成唯識云一於無量所說法無量名句字後後慧辨陀羅尼自在愚於無量所說法陀羅尼自在者謂義無礙解即於所詮總持自在於一義中現一切義故於無量名句字陀羅尼自在者謂法無礙解即於能詮總持自在於一名句字中現一切名句字故於後後慧辨陀羅尼自在者謂詞無礙解即於言音展轉訓釋總持自在於一音聲中現一切音聲故二辨才自在愚辨才自在者謂辨無礙解善達機宜巧為說故愚能障此四種自在皆是此中第九障攝即十障中第九利他中不欲行障謂所知障中俱生一分令於利樂有情事中不欲勤行樂修己利彼障九地四無礙解入九地時便能永斷於第十地有二愚癡一者大神通愚癡二者悟入微細祕密愚癡及彼粗重為所對治釋曰第十法雲地障成唯識云一大神通愚即是此中障所起事業者二悟入微細祕密愚即是此中障大法智雲及所含藏者即十障中第十於諸法中未得自在障謂所知障中俱生一分令於諸法不得自在彼障十地大法智雲及所含藏所起事業入十地時便能永斷於如來地有二愚癡一者於一切所知境界極微細著愚癡二者極微細礙及彼粗重為所對治釋曰第十一如來地障成唯識云一於一切所知境界極微細著愚即是此中微所知障二極細礙愚即是此中一切任運煩惱障種故集論說得菩提時頓斷煩惱及所知障成阿羅漢及成如來證大涅槃大菩提故即十障中於第十障別開一障故成唯識復作此言此地於法雖得自在而有餘障未名最極謂有俱生微所知障及有任運煩惱障種金剛喻定現在前時彼皆頓斷入如來地廣引諸教具如別章善男子由此二十二種愚癡及十一種粗重故安立諸地釋曰自下第三說愚等意於中有二初明說愚等意後讚菩提離諸繫縛此即初也謂欲安立十一地故說諸愚癡十一粗重而阿耨多羅三藐三菩提離彼繫縛釋曰第二讚無上覺離諸繫縛於中有二初佛自說後菩薩讚此即佛說謂妙覺位遠離諸愚及彼粗重觀自在菩薩復白佛言世尊阿耨多羅三藐三菩提甚奇希有乃至成就大利大果釋曰自下第二菩薩讚嘆於中有二初總後別此即初總讚有其二義一成就大利即是利他功德二成就大果即是自利功德或可得菩提故名大利證涅槃故名為大果或可斷所知障名為大利斷煩惱障名為大果令諸菩薩能破如是大愚癡羅網能越如是大粗重稠林現前證得阿耨多羅三藐三菩提釋曰第二別讚有其三義一破諸愚癡二越諸粗重三現證菩提能令菩薩具此三利愚能羅覆網𢛡有情故喻羅網粗重衆多譬似稠林又解就釋二十二愚中文別有四一問二答三善男子下結四觀自在下菩薩讚嘆菩提功德觀自在菩薩復白佛言世尊如是諸地幾種殊勝之所安立釋曰自下第四八種殊勝安立諸地於中有二先請後說此即第一菩薩請問如是十一地各有幾種之所安立佛告觀自在菩薩曰善男子略有八種釋曰自下第二如來正說於中有三初標數略答次依數列名後善男子下約地分別勝劣多少此即第一標數總答於十一地有八種勝一者增上意樂清淨二者心清淨三者悲清淨四者到彼岸清淨五者見佛供養承事清淨六者成就有情清淨七者生清淨八者威德清淨釋曰第二依數列名相續深密攝大乘第十瑜伽七十五名字大同言增上意樂者如前清淨意樂中說相續悕望深密直心梁論信樂瑜伽意樂者譯家異故心清淨者通說八定為心清淨故諸聖教通說諸定名為心學顯揚第三說四靜慮為心淨者如瑜伽論二十八說最初能入聖諦現觀正性離生故偏說為增上心學悲清淨者四無量中悲無量也問悲與大悲有何差別答薩婆多宗依俱舍論八因差別故第二十七云此與悲異由八種因一由自性無礙無瞋自性異故二由行相三苦一苦行相異故三由所緣三界一界所緣異故四由依地第四靜慮通餘異故五由依身唯佛通餘身有異故六由證得離有頂欲證得異故七由救濟事成希望救濟異故八由哀愍平等不平等哀愍異故正理七十五亦同俱舍雜心第七五義辨異婆沙第八十三十五復次以釋差別廣說如彼經部師宗如成實論七義以辨故彼第二十云問曰悲與大悲有何差別答曰悲名但心憐愍能成辦事故大悲所以者何菩薩見衆生苦為盡此苦勤修精進又於無量劫修習所成故名大悲又以智眼見衆生苦決定發心要當除滅故名大悲又多所利益故名大悲亦無障礙故名大悲所以者何悲心或念他惡故生障礙大悲於種種深惡通無礙又悲心或有厚薄不等一切平等故名大悲又自捨己利但求他利故名大悲悲不如是是名差別今依大乘如莊嚴論六義辨悲大悲差別故第九卷云復有六種差別偈曰非等亦非常非深亦非順非道非不得翻六非如是釋曰翻非大悲六種差別即是大悲六種差別一者平等二者常恆三者深極四者隨順五者淨道六者不得平等者於樂受等衆生所有諸受皆知是苦故常恆者乃至無餘涅槃亦無盡故深極者入地諸菩薩得自他平等故隨順者於一切衆生苦如理拔濟故淨道者所對治煩惱得斷除故不得者得無生忍時諸法不可得故大智度論第二十七亦以六義辨二差別不同莊嚴廣如彼說瑜伽四十四顯揚第四俱以四緣辨如來悲得成大悲而不說彼二種差別莊嚴亦以四因緣得成大悲與瑜伽等文意不同廣如彼說然此大悲依薩婆多俱舍論等唯如來有若依大乘智度論第二十七亦同俱舍依菩提資糧論第二大智度論第二十莊嚴第九菩薩亦有大悲依智度二十七云復次諸佛心中慈悲名為大餘人心中名為小問曰若爾者何以言菩薩行大慈大悲答曰菩薩大慈者於佛為小於二乘為大此是假名為大佛大慈大悲真實最大到彼岸清淨者六度十度等如下當說見佛供養承事清淨者即當十地論中所說三種無餘一見佛無餘二供養無餘三恭敬無餘故十地論第三卷云菩薩大願無餘有三一見一切佛無餘二一切供養無餘三一切恭敬無餘見佛無餘者見應身報身法身佛供養有三一利養供養謂衣服臥具等二恭敬供養謂香華幡蓋等三者行供養謂修行信戒行等恭敬亦有三種一者給侍恭敬二者迎送恭敬三者修行恭敬或可見佛供養承事清淨者即十種供養也故瑜伽論四十四云菩薩供養如來略有十種一設利羅供養善戒經云供養己身地持云身二制多供養善戒經云塔地持云支提三現前供養善戒至云現見地持同瑜伽四不現前供養善戒云不見地持同瑜伽五自作供養善戒地持皆同瑜伽六教他供養善戒地持亦同瑜伽七財敬供養善戒云利益地持云財物八廣大供養善戒云最勝地持云勝九無染供養善戒云清淨地持云不汙十正行供養善戒云受持地持云至處道若諸菩薩親現供養如來色身是名設利羅供養若諸菩薩於為如來所造一切若窣堵波若龕若一若故制多新制多所設諸供養是名制多供養若諸菩薩於如來身或制多所親面對前現囑現見而設供養是名現前供養若諸菩薩於如來所若制多所現前施設供養具時發起增上意樂俱心淨信俱心作是思惟若一如來法性即是三世一切如來法性若一如來制多法性即是十方一切如來制多法性是故我今供現如來即是供養其餘三世一切如來供現制多即是供養其餘十方一切制多當知是名菩薩俱供現不現前一切如來及以制多若諸菩薩於不現前一切如來及以制多作如來想普為三世一切如來一切十方如來制多施設供養當知是名菩薩唯供不現前佛及制多此中菩薩唯供現前佛及制多應知獲得廣大福果若唯供養不現前佛及以制多應知獲得大大福果若俱供養現不現前佛及制多應知獲得最大福果為無有上若諸菩薩於如來所若制多所欲設供養唯自手作不使奴婢等作不依懈墮諸放逸處而設供養是名菩薩自作供養若諸菩薩於如來所若制多所欲設供養非唯自作亦勸父母妻子奴婢乃至外道等衆令於如來若制多所隨力隨能作諸供養當知是名菩薩自他咸共供養若諸菩薩現有少分可供養物興悲愍心故思施與貧苦少福無力有情令於如來若制多所持用供養願彼當來恆受安樂彼得此物供養如來及以制多菩薩於斯自無所供當知是名菩薩唯教他設供養此中菩薩若唯自供佛及制多應知獲得廣大福果若唯教他應知獲得大大福果若能自他俱共供養應知獲得最大福果為無有上若諸菩薩於如來所若制多所敬問禮拜奉迎合掌歌頌稱讚五輪皈命趨繞右旋而為供養或復奉施無盡財而為供養是名菩薩財敬供養若諸菩薩於如來所若制多所長時施設即上所陳財敬供養若現在前不現在前若自造作教他造作即以如是所種善根回向無上正等菩提是名菩薩廣大供養若諸菩薩於如來所若制多自手供養無染污心而為供養不於信佛國王大臣諸貴勝前為財敬故詐設種種虗事供養是名菩薩無染供養又諸菩薩若無財物可設供養然於所有或瞻部洲四大洲乃至十方無邊無際諸世界中上中上品供養如來一切供具菩薩於彼以淨信俱勝解俱心周遍思惟一切隨喜如是菩薩少用功力而興無邊廣大供養攝受菩薩廣大資糧以上是財供養以下明法供養若諸菩薩少時少時須臾須臾乃至下如搆牛乳頃普於一切蠢動有情修習慈悲喜捨俱心於一切行修無常想無常苦想苦無我想於其涅槃修勝利想於佛法僧修習隨念少時少時須臾須臾於一切法發生少分下劣忍智信解離言法性真如起無分別無相心住何況於此若過若增如是守護菩薩所受尸羅律儀於奢摩他毗鉢舍那菩提分法精勤修學亦於一切波羅蜜多及諸攝事正勤修學是名菩薩於如來所正行供養如是供養為最第一過前所說百倍千倍乃至塢波尼殺曇倍由此十相應知是名供養如來若法若僧隨其所應當知亦爾具說如彼若廣分別如善戒經第六地持第七莊嚴第九智度第三十婆沙二十九及第三十成就有情清淨者即四攝事故顯揚第三云成就行者謂四攝事總攝說為成就有情行若已入聖教所化有情界以財法二種攝受義故此中財攝者謂助攝受方便令成就故法攝者謂正攝受轉及隨轉方便令成就故如是四攝事依五種攝行說為攝事五攝行者一令附已攝二令受善攝三令起善正勤攝四令善成就攝五令善解脫攝瑜伽三十七云當知成就略有六種一者成就自性謂善法種子及數習現行以為自性二者所成就補特伽羅略有四種謂三乘種性及無種姓人也三者成就差別略有六種一者謂根二善根三智慧四下品五中品六上品四成就方便有二十七種一界增長乃至俱成就等五能成就者有六種一解行地謂地前二淨意樂地謂初地也三正行地從二地至七地四決定地謂八地五決定行地謂九地也六究竟地謂十地及佛地也六已成就人相謂三乘人各有三品九品差別相廣說如彼生清淨者謂諸菩薩為利有情受種種生名生清淨故瑜伽論三十八云諸菩薩生略有五種攝一切生利益安樂一切有情何等為五一者除灾生地持云息苦生善戒經云離苦有二者隨類生地持亦同善戒經云隨心行有三者大勢生地持云勝生善戒云勝有四者增上生地持亦同善戒云自在有五者最後生地持亦同善戒云後有除灾生者謂諸菩薩以大願力或自在力於飢饉時作大魚等以肉給施飢餓衆生於疾疫時作大醫王息一切有情疾疫於鬪諍時作大地主息除鬪諍名除灾生維摩經中意亦同此隨類生者謂諸菩薩以大願力或自在力隨生六趣種種類中隨彼惡行化令行善名隨類生大勢生者謂諸菩薩稟性生時所感壽量形色族姓自在富等諸異熟果一切世間最為殊勝名大勢生增上生者謂諸菩薩始從初地作轉輪王王瞻部洲得大自在乃至十地作大自在過色究竟一切生處最為殊勝彼菩薩即由此業增上所感名增上生最後生者謂諸菩薩於此生中菩提資糧已極圓滿或生剎利婆羅門家現等正覺廣作一切佛所作事名最後生三世菩薩曾當現生一切皆此五生所攝除此無有若過若增唯除凡地菩薩受生何以故此中意取有智菩薩諸所受生為五生故如是諸生大菩提果之所依處令諸菩薩疾證無上正等菩提名生清淨具說如彼善戒經第九地持第十大同瑜伽又解菩薩受生具四因緣名生清淨四種因緣如下文說問地上菩薩已離三惡如何得有除灾生等答依變化故作如說故大般若第三百九十四云云何菩薩摩訶薩成就如是一切白淨聖無漏法而生惡趣受傍生身佛言善現於意云何如來化作傍生身時是實傍生受彼苦不善現答言不也世尊不也善逝如來化作傍生身時非實傍生不受彼苦佛告善現諸菩薩摩訶薩亦復如是雖成就一切白淨無漏法而為成就諸有情故方便受傍生身由受彼身如應成就諸有情類又云菩薩現受種種傍生等身雖受彼身而實非彼亦不為彼過所染汙乃至廣說解云既云菩薩亦復如是又云而實非彼故知變化而非實身問既是化身同彼如來何故佛果除生清淨答雖於三惡與佛無異於人天中菩薩亦有實受生故於佛果位除生清淨謂五生中初二同佛後三即與如來有異威德者即威力也此如瑜伽第三十七威力品說彼云云何諸佛菩薩威力略有三種一者聖威力謂佛菩薩得定自在依定自在隨其所欲一切事成心調柔故善修心故是名聖威力二者法威力謂諸勝法有廣大果有大勝利是名法威力此中法者即是六種波羅蜜多所謂布施乃至波若如是諸法有大威力名法威力三者俱生威力謂佛菩薩先集廣大福德資糧證得俱生甚希奇法是名俱生威力又佛菩薩如是威力品類差別復有五種一者神通威力二者法威力三者俱生威力四者共諸聲聞獨覺威力五者不共聲聞獨覺威力神通威力者具如彼說法威力者謂布施威力乃至波若威力俱生威力者謂性能憶念諸本生事為欲利益諸有情故不由思擇於極長時種種猛利無間大苦悉能堪忍等共不共威力者略由三相應知不共一者微細故二者品類故三者界故諸佛菩薩於無量數諸有情類及無量數威力方便如所應作諸利益事皆如實知無不能作是名微細一切品類神通威力法威力俱生威力悉皆成就是名品類以一切世界一切有情界為威力境是名為界聲聞但以二千世界及有情界為神通境獨覺但以三千世界為神通境何以故由彼唯為調伏一身而修正行非諸有情是故最極唯以一界為神通境除上所說所餘諸佛菩薩威力當知粗相與二乘等共如是諸佛菩薩威力聲聞獨覺尚不能及何況所餘一切天人異生外道善戒經神通品地持論威力品大同瑜伽具上威力故名威德清淨也善男子於初地中所有增上意樂清淨乃至威德清淨後後諸地乃至佛地所有增上意樂清淨乃至威德清淨彼諸清淨展轉增勝唯於佛地除生清淨釋曰自下第三約地分別勝劣多少於中有二初依八殊勝辨其勝劣後又初地下通約餘德辨其勝劣此即初也謂從初地乃至第十於一一地皆具八種展轉增勝若至佛地唯有七種除生清淨解云佛地除生清淨者約除灾等五種生說瑜伽等說五種受生唯說十地不通地前及佛地故又解謂十地中攝報果十王報體通分段變易皆用地前有漏諸波羅蜜為總別報因用地上有漏波羅蜜為別報因無漏波羅蜜為增上緣並從淨因生體是勝妙果故名生清淨故下文言極淨善根所集起故佛俱無故名除生清淨又初地中所有功德於上諸地平等皆有當知自地功德殊勝釋曰自下第二通約餘德辨其勝劣於中有二初明勝劣後明有上無上差別此即第一明勝劣謂初地中所有功德地地皆有且如十種波羅蜜多地地皆有而初地中施度殊勝餘九非勝第二地中戒度殊勝餘九非勝餘諸地中准此應知一切菩薩十地功德皆是有上佛地功德當知無上釋曰第二有上無上分別諸地十地功德更有勝上故名有上佛地功德無有勝故名無上也依善戒經第三卷說無上菩提具七無上故名無上一者身無上三十二相莊嚴身故二者受持無上自利利他與他樂故三者具足無上謂壽命具足見具足戒具足行具足故四者智慧無上謂四無礙五者不可思議無上所謂具足六波羅蜜故六者解脫無上如來能壞二種障故七者行無上所謂聖行天行梵行如來以是無上身故名大丈夫受持無上故名為大悲具足無上故名到彼岸智慧無上故名一切智不可思議無上故名阿羅呵解脫無上故名大涅槃行無上故名三藐三佛陀具此七故佛陀功德名無上也觀自在菩薩白佛言世尊何因緣故說菩薩生於諸有情最為殊勝釋曰第五約殊勝生分別諸地於中有二先問後答此即菩薩乘前發問謂前所說生殊勝者依何義故名為殊勝佛告觀自在菩薩曰善男子四因緣故釋曰自下第二如來正說於中有二初標數略答後別釋四因緣此即初也一者極淨善根所集起故二者故意思擇力所取故三者悲愍濟度諸衆生故四者自能無染除他染故釋曰第二別釋四緣一者求大菩提極淨善根所集起故此即瑜伽所說勢力受生也二故意思擇者即是願力受生故莊嚴十三卷云願力受生者入大地菩薩此上二種即是近緣三悲愍故者此入生死四自能無染除他染故謂地上菩薩能除煩惱所知障故能除他染若自有染不能除他故維摩云自疾不能救那能救諸疾人又云若自有縛能解彼縛無有是處若自無縛能解彼縛斯有是處十地論同有此釋問此說殊勝依何生說答如上所說除灾生等五種生說於理無失依莊嚴論菩薩受生總有四種故十三卷云次說菩薩四種受生偈曰業力及願力定力亦通力依此四種力菩薩而受生釋曰四種受生者一業力生二願力生三定力生四通力生業力生者謂信行地菩薩業力自在隨所欲處而受生故願力生者謂入大地菩薩願力自在為成熟他受畜生等生故定力生者謂得定菩薩定力自在捨於上界下受生故通力生者謂菩薩得神通力自在能於兜率天等示現諸相而受生故今依此經除初業力依餘生說觀自在菩薩復白佛言世尊何因緣故說菩薩行廣大願妙勝願相續經云何故發妙願勝願名力願深密經云一切妙願勝願殊勝力願也釋曰自下第六約三大願分別十地於中有二先問後說此即總問發三願緣然此三願諸說不同一云緣諸衆生名為大願所緣廣故上求菩提名為妙願願妙覺故即說此一名為勝願過二乘願及地前故一云三願約四緣說初之二緣顯廣大願第三一緣顯其妙願第四一緣顯其勝願一云三願同體隨義說三所緣廣故名為廣願勝二乘故名妙名勝佛告觀自在菩薩曰善男子四因緣故釋曰自下第二如來正說於中有三初標數略答次別釋四緣後總結四緣此即略答四因緣故能發三願而不別釋三願別相謂諸菩薩能善了知涅槃樂住堪能速證釋曰自下第二別釋四緣此即第一堪證涅槃此即是其由無分別智不住於生死而復棄捨速證樂住釋曰此即第二而捨速證樂即是常起大悲故不入於涅槃無緣無待發大願心釋曰辨第三緣不緣報恩不待報恩而起大悲故深密經云不為報恩而發大心相續經云無所用無所為也為欲利益諸有情故處多種種長時大苦釋曰顯第四緣即五生中除灾生或可隨類生也是故我說彼諸菩薩行廣大願妙願勝願釋曰第三總結可知觀自在菩薩復白佛言世尊是諸菩薩凡有幾種所應學事釋曰自下第二廣釋諸度於中有十八問即為十八段一所學種數多少門二分別三學相攝門三分別福智資糧門四五相修學六度門五諸度數無增減門六分別諸度次第門七六度品類差別門八波羅蜜多得名門九諸度清淨種數門十分別五相五業門十一最廣大等五相門十二六度因果無盡門十三愛度不得度果門十四諸度威德種數門十五諸度因果義利門十六衆生自業過失門十七般若取法無性門十八三種波羅蜜多門此即第一所學種數多少門先問後答此即問也佛告觀自在菩薩曰善男子菩薩學處略有六種釋曰第二如來正說於中有二初標數略答後依數列名此即第一標數略答謂所學事總有六種所謂布施持戒忍辱精進靜慮到彼岸釋曰第二依數列名深密經云檀波羅蜜尸羅羼提毗梨耶禪般若波羅蜜者彼岸梵音此標唐言此釋六度總別名義六到彼岸是其總名施戒等者即是別目然到彼岸諸教不同依瑜伽論第四十九以三種義釋到彼岸一時二自性清淨三得妙果故彼論云如是十法最極長時乃至能圓證自性最極清淨殊勝能得最極菩提妙果是故說名波羅蜜多善戒第九地持論第十大同瑜伽依梁攝論以三無等釋到彼岸故第九云一時無等謂三大劫二加行無等謂四修等三果無等即是三身所顯菩提彼岸皆具此三義故通稱波羅蜜具說如彼新攝大乘釋皆無此言依新攝論即說六度最勝義故名到彼岸故攝大乘第七卷云論曰此諸波羅蜜多訓釋名言云何可見於諸世尊聲聞獨覺施等善根最為殊勝能到彼岸是故通稱波羅蜜多世親釋云超諸世間聲聞獨覺施等彼岸是故通名波羅蜜多無性第七大同世親依智度論第十二卷有五復次釋到彼岸一云於施等退回向小乘如舍利弗等名為此岸直進不退成辦佛道名到彼岸二云慳等六弊名為此岸施等六度名到彼岸三云有無二見名為此岸破有無見智名到彼岸四云為結使縛所行施等名為此岸非結使縛所行施等名到彼岸五云生死大海名為此岸涅槃大城名到彼岸具說如彼依雜集論第十一卷以三最勝顯波羅蜜彼云一自體最勝并積習二方便最勝三果最勝積習者謂長時也具此三義名到彼岸又彼復云最勝所作故最勝所至故名波羅蜜多一切佛菩薩所為所到故復次到所知彼岸故名波羅蜜多安住佛性故復次濟度自他最極灾橫故名波羅蜜多能令自他越度生死大苦海故釋別名者如莊嚴論第七卷云能除貧窮故名施能令清凉故名戒由具戒者於境界中熱惱息故能破瞋恚故名忍忍破瞋恚能令盡故能建善故名進建立善法由此力故能持心故名定攝持內意故能解真法故名慧曉了第一義故依攝大乘第七卷云又能破裂慳吝貧窮及能引得廣大財位福德資糧故名為施又能息滅惡戒惡趣及能取得善趣等持故名為戒又能滅盡忿怒讐及能善住自他安隱故名為忍又能遠離所有懈怠惡不善法及能出生無量善法令其增長故名精進又能消除所有散動及能引得內心安住故名靜慮又能除遣一切見趣諸耶惡慧及能真實品引知法故名為慧世親釋云以於因時破慳惠施果時能裂一切貧窮及於果時引大財位廣福資糧故名為施又於因時息諸惡戒果時能滅惡趣及於未來能取善趣於現在能得等持故名為戒如是一切波羅蜜多訓釋言詞如應當說及能善住自他安穩者謂於自身不為忿怒過失所惱不生他苦故得安穩無性釋云謂於因時能破慳吝亦能引廣福德資糧及於果時能裂貧窮得大財位故名為施餘釋別名其文易了解云世親論意資糧屬果無性論資糧屬因餘者皆同梁論第九意同新論掌珍第二及勝鬘經釋名少異恐繁不述觀自在菩薩復白佛言世尊如是六種所應學事幾是增上戒學所攝幾是增上心學所攝幾是增上慧學所攝釋曰自下第二分別三學相攝門於中有二先問後答此即請問佛告觀自在菩薩曰善男子當知初三但是增上戒學所攝靜慮一種但是增上心學所攝慧是增上慧學所攝我說精進遍於一切釋曰第二如來正說謂隨用說戒攝前三以戒資糧是戒自性戒眷屬故定即心學般若是慧諸教皆同如名可知精近遍三策三學故相續深蜜亦同此經問善戒經云戒攝戒度心攝定度慧攝慧度如何此經與彼有異解云相攝有其多義故今先辨三學後明相攝同異言三學者如世親攝論第一卷云增上戒者謂十地中依戒而學故名增上戒即諸菩薩所有律儀於諸不善無復作心增上心者謂在內心或即依心而學故名增上心即諸三摩地增上慧者謂趣證慧故名增上慧或依慧而學故名增上慧即是無分別智言增上者是最勝義故瑜伽論第八云唯於佛獨有此三不共外道如是名為最勝義故名為增上具說如彼廣釋三學如無性攝論梁論第一顯揚第七瑜伽二十八法集經第六雜阿含第四十廣辨三學差別如成唯識第九攝大乘第七第八後明相攝諸教不同依善戒經戒唯攝戒定唯攝心慧唯攝慧不配餘度故第九云六度有三戒一隨戒戒二隨心戒三隨智戒尸度名為隨戒戒禪度名為隨心戒智度名為隨智戒此即自性相攝若依此經相續深密前三攝戒是資糧是戒自性戒眷屬故靜慮攝心般若攝慧精進遍三䇿三學故此即隨用相攝依莊嚴論意同此經故第七云偈曰為攝三學故說度有六種初三二初一後二二一三解云初三者謂初三度二者謂初三度即是二一聚二眷屬尸羅為聚檀及羼提為眷屬初一者謂初三及二即三學中是初一戒學後二者即是後二禪度般若度重二者謂後二度如其次第即是心慧二學一者謂精進一度三者謂此一度遍三學也若依瑜伽第四十九前四攝戒第五攝心第六攝慧故彼論云由前四度資糧自性眷屬守護當知圓滿增上戒學由靜慮度當知圓滿增上心學由般若度當知圓滿增上慧學具說如彼地持論第十亦同瑜伽此即隨顯相攝依攝論等六度一一更互相攝以此准知三學一一皆攝六度故攝論云如是六屬相決擇云何可見世尊於此一切六度戒有處所以施聲說如是乃至戒有處所以慧聲說謂於一切波羅蜜多修加行中皆有一切波羅蜜多互相助成如是意趣廣說如彼此即助伴相攝然此諸教攝義不同故成唯識約四種義以辨相攝一自性攝二助伴攝三隨用攝四隨顯攝故第九云若自性攝戒唯攝戒定攝靜慮慧攝後五約十度門以辨相攝若辨助伴皆具相攝若隨用攝戒攝前三資糧自體眷屬性故定攝靜慮慧攝後五約十度行說精進三攝遍䇿三故若隨顯攝戒攝前四前三如前及守護故定攝靜慮慧攝後五解云唯此諸聖教中若據一義故不相違觀自在菩薩復白佛言世尊如是六種所應學事幾是福德資糧所攝幾是智慧資糧所攝釋曰自下第三分別福智資糧門先問後答此即請問佛告觀自在菩薩曰善男子若增上戒學所攝者是名福德資糧所攝若增上慧學所攝者是名智慧資糧所攝我說精進靜慮二種遍於一切釋曰此即如來正說謂六度中初三是福後一是智餘二即通二種資糧釋此經意如瑜伽論第三十六彼云云何為福謂施戒忍三云何為智謂第六般若精進靜慮通於二分若依精進修施戒忍及四無量名為福分若依精進習聞思修所成三慧及蘊等善巧名為智分若依靜慮修習慈等四種無量名為福分若依靜慮修蘊界等種種善巧名為智分地持論第一善戒經第二世親攝論第六梁論第八大同瑜伽然此福智二種資糧略釋名義後辨相攝言名義者能生福果與福為因名福資糧能生智果與智為因名智資糧言資糧者若依梁論成就義故名為資糧故第八云此福及智有二種功用一能助道二能成道體由此二故道得成就故說此二為通資糧若依無性攝論運集義故名為資糧故第六云言資糧者經無量劫所運集故若依菩提資糧論有其五義一者滿義二者持義三長養義四者因義五具足義故第一云言資糧者是其滿義由此能滿菩提法故又以持為義由此能持菩提法故又以長養為義由此長養菩提法故又以因為義由此能生菩提法故又以衆分具足為義由此具足菩提法故名為資糧具說如彼言相攝者諸教不同略有八例一者前三是福後三是智如無性攝論第六卷云福資糧者謂施戒忍三種加行智資糧者精進靜慮及聞慧等智度論第十五云欲成佛道凡有二門一者福德二者智慧行施戒忍是福德門知一切法實相般若是智慧門般若要因禪定禪定必須大精進力二者初二及第四是福後二及第三是智如優婆塞戒經第二卷二莊嚴品云施戒精進名福莊嚴忍定智慧名智莊嚴三者前二是福後一是智三通二種如莊嚴論第十卷云問二聚攝六度云何偈曰初二為福聚第六即是智餘三二聚因五亦成智聚釋曰施戒為福體波若為智體忍進定三通為二聚因由俱作故五亦成智聚由智回向故具說如彼四者前三是福後一是智餘通二種如即此經相續深密地持論第一善戒經第二無性世親攝論第六梁攝論第八瑜伽三十六五者前五是福後一是智如伽耶經云助道者五波羅蜜斷道者般若波羅蜜又智度論云五波羅蜜殖諸功德般若波羅蜜能除著心六者前五是福後一通福智如涅槃經第二十七獅子吼品云福莊嚴者謂從波羅蜜乃至般若非般若波羅蜜慧莊嚴者謂從一地乃至十地解云地者即是慧也故無性攝論第七卷云法無我智分位名地七者前是福六皆是智如前所引大莊嚴論云五亦成智聚者後由般若能回向故一切諸波羅蜜皆成智聚解云前五度非但是福亦通智聚由智回向故八者施戒及定為福般若為智略不配釋忍進二度如大菩薩藏經般若品云云何名為二種資糧善巧謂福及智云何為福謂施戒修云何為智謂修行般若攝取於智具說如彼或可六度皆通福智一一度中互相助成各具六故解云諸經及論隨機不同種種異說各不相違觀自在菩薩復白佛言世尊於此六種所學事中菩薩云何應當修學釋曰自下第四五相修學六度門先問後答此即請問五相修法佛告觀自在菩薩曰善男子由五種相應當修學釋曰自下第二如來正答於中有二初標章舉數後次第別釋此即初也深密經云有五種觀法一者最初於菩薩藏波羅蜜多相應微妙正法教中猛利信解釋曰自下第二次第別釋五相即為五段此釋第一猛利信解相如攝大乘即七卷云謂於諸度相應聖教雖極甚深而能信解解云諸度相應教甚深者如雜集論第十一云十二分聖教中方廣分名菩薩波羅蜜多藏如經中說大乘者即是菩薩波羅蜜多藏又第十二云復次何緣說方廣分為廣大甚深耶由一切種智性廣大甚深故謂此所得一切種智性果最廣大甚深故因受果名是故別說方廣分為廣大甚深二者次於十種法行以聞思修所成妙慧精進修行釋曰第二行十法行十種法行如前所引瑜伽決擇七十四說顯揚第二今釋經文兩說不同一云十種法行即是三慧故以三慧精進修行十種法行故相續經作如是說於彼行十法行聞思修慧又深密云有十法行如實修行聞等慧故一云三慧正顯其觀十種法行即是助伴故辨中邊論第三卷云頌曰菩薩以三慧恆思惟大乘如所施設法名作意正行乃至彼云作意正行有何助伴頌曰此助伴應知即十種法行何等為十頌曰謂書寫供養施他聽披讀受持正開演諷誦及思修論曰於此大乘有十法行一書寫二供養三施他四若他誦讀專心諦聽五自披讀六受持七正為他開演文義八諷誦九思惟十修習解云後說為勝所以者何彼論復云作意正行由十法行之所攝受三者隨護菩提之心釋曰第三護菩提心謂發菩提心令不退轉名護菩提心廣釋發菩提心如發菩提心經第一廣讚菩提心如華嚴經五十九四者親近真善知識釋曰此釋第四近善知識如瑜伽論第四十四彼云成就八支能為善友衆相圓滿一者住戒於諸菩薩律儀戒中妙善安住無缺無穿二者多聞覺慧成就三者具證得修所成隨一勝善逮奢摩他毗鉢舍那四者哀愍內具慈悲能捨自己現法樂住精勤無怠饒益於他五者無畏為他宣說正法教時非由恐怖忘失念辨六者堪忍於他輕譏調弄鄙言違拒等事非愛言路種種惡行皆悉能忍七者無倦其力充強能多思擇處在四衆說正法時言無謇澀心不疲厭八者善詞語具圓滿不壞法性言詞辨了廣讚善知識如法句經及華嚴經五十八又瑜伽云由四種相方得圓滿親近善友一於善友有病無病隨時供待恆常發起愛敬淨信二於善友隨時敬問禮拜奉迎合掌殷勤修和敬業而為供養三於善友如法衣服飲食臥具病緣醫藥資身什物隨時供養四於善友若正依止於如法義若合若離隨自在轉無有傾動如實顯發作奉教心隨時往詣恭敬承事請問聽受具說如彼五者無間勤修善法釋曰此辨第五無間勤修如攝大乘說恆常無間修習六度方得圓滿此即長無間殷重無餘四種修中無間修也依成唯識更加發心以為五修辨此經意說五根者欲修六度要具五相一於度教發勝信解若不依正教成耶行故二已信聖教起十供養發三種慧是行體故三隨護善根令不退故四近善知識藉勝緣故五無間修令速滿故若依攝大乘論說修有五一現起加行修二勝解修三作意修四方便善巧修五成所作事修又雜集論第十二卷修略有五謂依止住持修依止作意修依止意樂修依止方便修依止自在修廣說如彼恐繁不述觀自在菩薩白佛言世尊何因緣故施設如是所應學事但有六數釋曰自下第五諸度數無增減門有十種度分之為二初明六度數無增減後明四度數無增減前中有二先請後說此即請問唯六所由佛告觀自在菩薩曰善男子二因緣故釋曰自下世尊正說於中有四一者標數二者別敘三者屬當四者別釋此即第一標數略答由二緣故數無增減相續經云二事深密二義者因緣事義名異意同一者饒益有情故二者對治諸煩惱故釋曰第二別敘二緣如經可知當知前三饒益有情後三對治一切煩惱釋曰第三舉前三後三屬當二緣謂六度中施戒忍三饒益有情精進等三對治煩惱前三益饒諸有情者謂諸菩薩由布施故攝受資具饒益有情由持戒故不行損害逼迫惱亂饒益有情由忍辱故於彼損害逼迫惱亂堪能忍受饒益有情釋曰自下第四次第別釋前三饒益後三對治此釋前三饒益後三對治此釋前三饒益有情深密等云前三種度如次三益資世攝受益不加攝受益無報怨心益成唯識云又前三種饒益有情施彼資財不損惱彼堪忍彼惱而饒益故廣如雜集等後三對治諸煩惱者謂諸菩薩由精進故雖未永伏一切煩惱亦未永害一切隨眠而能勇猛修諸善品彼諸煩惱不能傾動善品加行由靜慮故永伏煩惱由般若故永害隨眠釋曰此明後三對治煩惱謂彼精進非如靜慮永伏一切現行煩惱非如般若永害一切種子隨眠而由精進能修諸善由此諸惑不傾動善品加行即是精進能與定慧方便故說名加行由靜慮故永伏現惑由般若故永害種子故說後三對治煩惱成唯識云精進等三對治煩惱雖未伏滅而能精勒修對治彼諸善加行永伏永滅諸煩惱故廣如雜集等然此六度唯六所由乃至有五種有處一義以釋六數如優婆塞戒經第一卷云為除外道六方耶說故說六度佛言東方如施初始出故南方如戒以似右故西方如忍忍惡於後故北方如精進名號勝故下方如禪觀察惡道故上方如慧無上無生故又智度論四十六云何故如來正說六度不多不少答佛為法王隨衆生機或時略說一二三等或時廣說如賢劫經八萬四千諸波羅蜜復次六道衆生皆受身心苦惱菩薩生大悲心為滅六道衆生苦故生六波羅蜜不多不少又瑜伽論四十九云為攝三學故唯說六初四攝戒次一攝心後一攝慧由此建立波羅蜜多唯有六種無增無減或以二義釋無增減如即此經相續深密梁論第十或以三義釋無增減如攝大乘第七卷云何因緣故波羅蜜多唯有六數成立對治所治障故證諸佛法所依處故隨順成就諸有情故廣說如彼世親無性攝大乘釋亦同本論又雜集論第十一云數有二種一計算數二決定數計算數者謂六波羅蜜決定數者謂波羅蜜唯有六不增不減何以故諸菩薩道略有二種一增上生道即前三度二決定勝道即後三度具說如彼此是初緣復次羅蜜多是無住涅槃方便故其數唯六緣所以者何前三度故不住涅槃後三度故不住生死具說如彼第二緣復次攝益有情故對治煩惱故說唯六數即同此經二意說六第三緣或以四義釋無增減如成唯識第九卷說然依彼論有其三義一總明十度數無增無減有其二義一除十障故二證十如故二別明六度數無增減有其四義一依三因為除六種相違障故漸次修行諸佛法故漸次成就諸有情故具如攝論二約二道謂增上生道決定勝道同雜集論初復次釋三利生除障即同此經四不住道明無增減謂前三故不住涅槃以後三故不住生死具說如彼解云攝大乘論唯說前三謂漸除障漸行佛法漸熟有情雜集唯說後三種意二種道等成唯識論通攝二論所說六種故成四緣或可唯識開為六緣開攝論中三因別故此經二緣如雜集論及成唯識尋即可知三別明四度數無增減至文當釋依莊嚴論第七卷中有六行偈各各皆說立六所由一者為攝自利三事故二者為攝二利六事故三者為攝他利六事故四者為攝大乘四因故五者為攝大乘道故六者為攝大乘三學故尋文可知故不繁釋觀自在菩薩復白佛言世尊何因緣故施設所餘波羅蜜多但有四數釋曰自下第二辨後四度數無增減所言四者即十度中後四種度所謂方便願力及智於中先請後說此即請問唯四所由佛告觀自在菩薩善男子與前六種波羅蜜多為助伴故釋曰自下第二如來正說於中有二初總答說四無增減意後別釋四度無增減義此即總答唯四所由能與六種為助伴故唯有四種而無增減故成唯識云後唯四者為助前六令滿足不增減故方便善巧助施等三願助精進力助靜慮智助般若令滿足故謂諸菩薩於前三種波羅蜜多所攝有情以諸攝事方便善巧而攝受之安置善品釋曰自下第二次第別釋四度即分為四此即第一釋方便度助前三度先釋後結後之三度准此應知此即正釋方便助三謂諸菩薩於前三度所攝有情以諸攝事方便善巧而攝受之安置善品然諸攝事通說種種方便攝受相續深密皆云攝事不言四故或可諸攝即四攝事故梁攝論云於前三度所攝衆生由四攝事安立善處是故我說方便善巧波羅蜜多與前三種而為助伴釋曰第二結文可知若諸菩薩於現法中煩惱多故於修無間無有堪能羸劣意樂故下界勝解故於內心住無有堪能於菩薩藏不能聞緣善修習故所有靜慮不能引發出世間慧釋曰自下第二願助精進於中有二先釋後結此即釋也於中有二初明起願所由後明願助精進此即第一起願所由文有三節即為三緣一者菩薩於現法中煩惱多故於無間修諸善品法無有堪能深密經云於現身中二者羸劣意樂故欲界散位勝解故由此二緣於內位定無有堪能梁攝論云或為願生下界或由心羸劣於恆修習及心內位無有功能三者於大乘教不能聽聞不能緣慮不能善修習故所有靜慮不能引發出世間慧由上三緣故起願度彼便攝受少分狹劣福德資糧為未來世煩惱輕微心生正願釋曰自下第二正明願助精進於中有二初明起願後釋助願精進此明起願謂彼菩薩攝受少分布施等福便作是願由斯福力於未來世煩惱微薄梁攝論云薄少善根如是名願波羅蜜多由此願故煩惱微薄能修精進釋曰正明願助精進如文可知是故我說願波羅蜜多與精進波羅蜜多而為助伴釋曰第二總結應知若諸菩薩親近善士聽聞正法如理作意為因緣故轉劣意樂成勝意樂亦能獲得上界勝解釋曰第三力助靜慮先釋後結此即釋也於中有二初釋力度後釋力助靜慮此釋力度謂諸菩薩由三因緣得勝意樂及得勝解三因緣者一親近善友二聽聞正法三如理作意由此三緣轉劣意樂得勝意樂亦能獲得上界勝解即用二法名之為力然三緣中如理作意相續經內正思惟梁論亦爾深密經云如理思惟者名異義同或可此中唐本為正內正思惟攝在力中問此所說意樂勝解有何異耶解云相續經云轉劣悕望得力悕望殊勝上界能內一心准彼經意轉劣悕望者於下界劣欲樂得力悕望者得欲界勝欲樂上界能內一心者即是靜慮也深密經云轉彼薄心增長善力於彼真如法界之中得增上力是菩薩力波羅蜜得內心定是故我說力波羅蜜與般若波羅蜜為伴解云謬結譯家錯也今此經云轉劣意樂得勝意樂者捨劣欲樂得勝欲樂言亦得者非唯欲界亦得上界如是意樂以為力度梁論說云能除羸弱心地於微妙境得強勝心地者亦是譯家謬也問此力度是後得智如何欲及勝解為自性耶解云自性以慧為體今依助伴出體故說欲等如是名力波羅蜜多由此力故於內心住有所堪能釋曰第二力助靜慮謂如上說名為力度由此力故於內心住靜慮度中有勝堪能是故我說力波羅蜜多與靜慮波羅蜜多而為助伴釋曰第二結文可知若諸菩薩於菩薩藏已能聞緣善修習故能發靜慮釋曰第四智助般若先釋後結釋中有二初釋智度後明智助般若此即初也謂於菩薩藏教能聞是聞慧緣即思慧善修習者即是修慧由此能發靜慮或可聞思能發靜慮靜慮即是修慧所攝若廣分別如梁論說彼云菩薩緣菩薩藏文句所生聞思慧修慧及緣五明智此智能生如理簡擇真俗境智此智或在無分別智前或在無分別智後是菩薩智波羅蜜由此智能生定及引出世般若故智波羅蜜是般若波羅蜜助伴如是名智波羅蜜多由此智故堪能引發出世間慧釋曰第二正明智助般若如經可知是故我說智波羅蜜多與慧波羅蜜多而為助伴釋曰第二結文可知相續深密大同此經廣如梁攝論第十卷說廣釋四度如善戒經第九地持第十瑜伽四十九觀自在菩薩復白佛言世尊何因緣故宣說六種波羅蜜多如是次第釋曰自下第六分別諸度次第門先問後答此即請問六度前後次第所由略而不辨後四次第或次前文已辨其義故不說之佛告觀自在菩薩曰善男子能為後後引發依故釋曰自下如來正說於中有三初標章略說次依宗釋第三總結此即如來標章略答我依引發故說六度如是次第謂能為後後依止義故謂諸菩薩若於身財無所顧吝便能受持清淨禁戒為護禁戒便能忍辱修忍辱已能發精進發精進已能辦靜慮具靜慮已便能獲得出世間慧釋曰此即第二正釋六度前後次第此當莊嚴引發次第故莊嚴論第七卷云前後者謂依前後得起何以故由不顧資財故受持戒行持戒行已能起忍辱起忍辱已能起精進起精進已能起禪定起禪定已能解真法又攝大乘第七卷云論曰何因緣故如是六種波羅蜜多此次第說謂前波羅蜜多隨順生後波羅蜜多故無性釋云隨順生後波羅蜜多故者謂於財位不著已能守尸羅具尸羅已便能忍受能忍受已堪耐乖違故發精進發精進己心便得定心得定已能如實知故此六種如是次第世親釋云如是六度依生前後說此次第是故我說波羅蜜多如是次第釋曰第三總結應知然六次第諸教不同或以一義以釋次第即此經相續深密新攝大乘及二釋論皆以引發以明前後或以二義如梁攝論一引發次第同此經等二持淨次第論云前前波羅蜜由後後波羅蜜所清淨故或以三義如善戒經第九卷地持論第十瑜伽四十九一對治故二生起故三得果故具如瑜伽又以三義如雜集第十一一者引發二者持淨三者粗細引發持淨如前應知言粗細者於諸行中施行最粗故先建立於忍等行戒為最粗故次建立乃至於慧靜慮為粗一切行中慧為最細故最後立又莊嚴論亦以三義一者前後即同引發二者下上前者為下後者為上三者粗細即同雜集故彼偈云前後及下上粗細次第起如是說六度不亂有三因或以四義如成唯識第九卷一引發二持淨三粗細四易難或可易難釋上粗細故成唯識第九卷云十次第者謂由前前引後後及由後後持淨前前又前前粗後後細易難修習次第如是觀自在菩薩復白佛言世尊如是六種波羅蜜多各有幾種品類差別釋曰自下第七六度品類差別門先問後答此問六度品類差別佛告觀自在菩薩曰善男子各有三種釋曰自下第二世尊正說於中有二初總標六三合有十八後次第別開六種各三此即初也然此品類諸教不同解深密經相續深密攝大乘論瑜伽七十八約前六度各開三類而不解瑜伽菩薩地無性世親攝大乘釋梁朝釋論及雜集論開六各三而亦解釋依成唯識具約十度前六各三後四各二而不解釋四各二者方便有二一回向方便善巧二拔濟方便善巧願有二種一求菩提願二利樂他願力有二種一思擇力二修習力智有二種一受用法樂智成熟有情智故今依經且釋前六其間同異對文辨釋施三種者一者法施二者財施三者無畏施釋曰自下第二次第別釋釋六種三即分為六此即第一布施三品瑜伽三十九以九種相釋施三類彼云財施者謂以上妙如法財物而行惠施調伏慳垢而行惠施調伏畜積而行惠施廣說如彼無畏施者謂濟拔師子虎狼鬼魅等畏濟拔王賊等畏濟拔水火等畏法施者無倒說法稱理說法勤修學處如是一切總說九相此三種名諸處無異世親釋曰法財無畏如次益他善根身心以是因緣故說三種無性釋論有二復次初順瑜伽後同世親故不重述雜集十二十八任持顯六三品財無畏法如次身心善根任持同世親說益身心等依梁釋論有二復次彼云法施利益他心財施利益他身無畏施通益身心復次由財施有向惡者引令皈善由無畏施攝彼令成眷屬由法施生彼善根及成熟解脫由具此義故說施有三品戒三種者一者轉捨不善戒二者轉生善戒三者轉生饒益有情戒釋曰第二明戒三品名雖稍異意同攝論成唯識等戒中三品謂律儀戒攝善法戒饒益有情戒故瑜伽論四十云在家出家二分淨戒略有三種一律儀戒謂諸菩薩所受七衆別解脫戒二攝善法戒謂諸菩薩受別解脫後所有一切為大菩提由身語意積集諸善總說名為攝善法戒三饒益有情戒謂諸菩薩於諸有情能引義利廣說如彼世親釋云初是依特為欲建立其餘二戒由此修集一切佛法證入菩提復能建立益有情戒無性釋云律儀戒者謂於不善能遠離法防護受持由能防護諸惡不善身語等業故名律儀此即是戒此能建立後二尸羅解云彼論等言等取意思中戒釋後二戒意同世親梁朝釋論大同世親又彼復云此三品戒即四無畏因何以故初戒是斷德第二戒是智德第三戒是恩德四無畏不出此三德故言即四無畏因也雜集釋云律儀攝善饒益有情如其次第善菩提悲三種任持忍三種者一者耐怨害忍二者安受苦忍三者諦察法忍釋曰第三明忍三品依菩薩地忍品說云忍有三種一耐怨害忍謂諸菩薩從他怨害所生諸苦現在前時應如是學如此是我自業過耳由我先業今受此苦廣說如彼二安受苦忍菩薩思擇我今為求能引安穩最勝善品尚應思擇忍受百千拘胝大苦況少小苦而不忍受如是如理正思惟故為求菩提悉能忍受一切事苦三法思勝解忍謂諸菩薩於一切法能正思擇善安勝解廣說如彼世親釋云耐怨害忍能忍受他所作怨害安受苦忍能正忍受所遭衆苦察諦法忍堪能審諦觀察諸法具說如彼無性釋云耐怨害忍是諸有情成熟轉因安受苦忍是成佛因寒熱飢渴種種苦事皆能忍受無退轉故諦察法忍是前二忍所依止處堪忍甚深廣大法故梁朝攝論大同世親雜集三忍名同此經如其次第不捨有情捨下劣心無生法忍三種任持精進三者一者被甲精進二者轉生善法加行精進三者饒益有情加行精進釋曰第四辨精進三相續經云弘誓精進善方便精進利衆生精進深密經云發起精進修行善法精進利衆生精進瑜伽菩薩地精進品云精進有三一擐甲精進謂諸菩薩加行其心勇悍先擐誓甲若我為脫一有情苦以千大劫等一日夜處那落迦經爾所時證無上覺假使過此百千俱胝倍數時劫證無上覺我之勇悍亦無退屈是名菩薩擐甲精進廣說如彼二攝善法精進謂諸菩薩所有精進能為諸度加行成辦廣說如彼三饒益有情精進如戒品中饒益尸羅中說攝大乘論釋經五句總攝為三所謂被甲精進加行精進無怯弱無退轉無喜足精進世親釋云三精進中其體差別即經中說有勢有勤有勇堅猛不捨善軛彼經五句即是此中三精進體之所解釋由被甲故最初有勢由加行故能有精勤由無怯弱無退轉無喜足故如其次第有勇堅猛不捨善軛乃至廣說無性第七梁論第九意同世親恐繁不述雜集論云被甲方便饒益如次善根方便善根圓證善根無盡三種任持靜慮三者一者無分別寂靜極寂靜無罪故對治煩惱衆苦樂住靜慮二者引發功德靜慮三者引發饒益有情靜慮釋曰第五明靜慮三然初品中有其四句其相難知故今依諸經論釋此四句一無分別寂靜者離一切虗妄分別及以粗重故名無分別寂靜故相續經云離妄想寂靜又瑜伽云遠離一切分別能生身心輕安二極寂靜者瑜伽論云遠諸愛味泯一切相也三無罪故者無性論云離慢見愛得清淨故瑜伽論云遠離憍舉又瑜伽云無罪者遠離六隨煩惱也四對治煩惱衆苦樂住者由此定能治煩惱苦神通自在得現法樂梁朝論云此定離諸染污故現世得安樂住世親論云由此能安現法樂住後之二品如文可知依瑜伽論靜慮品云復有三種一現法樂住靜慮謂諸菩薩所有靜慮遠離一切分別能生身心輕安最極寂靜離諸愛味泯一切相當知是名菩薩現法住靜慮二者能引菩薩等持功德靜慮謂諸菩薩所有靜慮能引能住種種殊勝不可思議不可度量十力種姓所攝等持一切聲聞及獨覺等不知其名何況能入乃至廣說三者饒益有情靜慮謂諸菩薩依止靜慮於諸有情能引義利彼彼事業與作助伴能為除苦能如理說於諸有情善隨心轉為物現通方便引攝具說如彼世親論云安住靜慮者由此能安現法樂引發靜慮者由此能引六種神通成所作事靜慮者謂依此故成立所作利有情事無性論云安住靜慮為得現法樂住離慢見愛得清淨故引發靜慮為能引發六神通等殊勝功德成所作事靜慮為欲饒益諸有情類以能止息飢儉廢諸怖畏等苦惱事故雜集論云現法樂住引發神通饒益有情如次應知三種任一無厭惓二諸所思議成滿三御衆業梁朝攝論大同世親論恐繁不述依莊嚴論有覺等三慧三種者一者緣俗諦慧二者緣勝義諦慧三者緣饒益有情慧釋曰第六明慧三品瑜伽慧品有二種三初三慧者一能於所知真實隨覺慧二於五明及三聚中決定慧三於一切有情義利慧解云初一緣真次一緣俗自利後一緣俗利他五明者即內明等明論也三聚者即是能引義利法聚能引非義利法聚能引非義利非非義利法聚後三慧者一能知甚深法無我智二能知有情調伏方便智三了知一切所知境界無障礙智解云初一法空智次一人空智後一雙證二空智成唯識論生空法空俱空為三攝大乘論加行正智後得為三無性釋云無分別加行慧謂真觀前勝方便智無分別慧謂真觀智無分別後得慧謂現觀邊諸世俗智能起種種說法等事雜集論云緣世俗勝義緣有情慧如其次第證入大地引發佛法建立佛事三種任持六度各各三品差別廣如梁攝論第九顯揚第三恐繁不述如何諸教有此異者義品非一各據一義故不相違略辨六度體性別者如成唯識第九卷云十度性者施以無貪及彼所造三業為性戒以受學菩薩戒時三業為性忍以無瞋精進審慧及所起三業為性精進以勤及所起三業為性靜慮但以等持為性後五皆以擇法為性說是根本後得智故具說如彼廣如別章
