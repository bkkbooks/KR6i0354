body:
  text: 西明寺沙門圓測撰勝義諦相品第二釋此品文略有二義一釋品名二正釋文言勝義諦相品者諦中之勝號諦有二種一者世俗二者勝義言世俗者世是隱覆義俗是粗顯義謂瓶衣等世粗顯物隱覆勝義故名世俗名勝義者勝謂勝智義即境義謂真如理是勝智之境義故名勝義即六釋中依主釋也或復義者即是義利謂涅槃果即勝義利名為勝義即六釋中持業釋也或復聖道用勝為義故名勝義是有財釋今於此中且依初義諦有二義如瑜伽論五十五說一如所說相不捨離義二由觀此故到究竟故名為諦相謂體相或是相狀離言等五皆是真如自體相故或一真如有離言等五相狀故於此品內明勝義諦五相之義故言勝義諦相品第二爾時如理請問菩薩摩訶薩即於佛前問解甚深義密意菩薩摩訶薩言釋曰第二正釋經文上來已釋教起因緣分訖自下第二聖教正說分於此分中有其七品攝為三段初有四品明所觀境勝義諦相品心意識相品一切法相品無自性相品次有二品辨能觀行分別瑜伽品地波羅蜜多品後有一品顯所得果如來成所住事品所以如是說三分者夫觀行者要藉勝境依境起行由行得果是故世尊阿毗達磨大乘經中說十種勝初二是境所知依所知相次六是行入所知入因果戒學定學修差別慧學後二是果彼果斷彼果智由是無著攝大乘論約三無等說十殊勝慈氏菩薩說十七地亦辨三種初九是境五識相應地意地有尋有伺地無伺地無尋唯伺地無尋無伺地三摩呬多地非三摩呬多地有心地無心地次六是行聞所成地思所成地修所成地聲聞地獨學地菩薩地後二是果有餘依地無餘依地此經說三無等以為三分就所觀境復分為二初有二品明真俗境勝義諦相品明其真諦心意識相品明世俗諦後二品明有無性境謂初品明三性境後品明三無性境就二諦中本末次第先真俗故今此中說勝義諦依瑜伽論判此品中辨五種相故七十五云復次勝義諦有五相一離名言相二無二相三超過尋思所行相四超過諸法一異性相五遍一切一味相今依此經攝為四段一明離言及無二相二爾時法涌下明超過尋思所行相三爾時善清淨慧下辨非一異相四爾時世尊下釋遍一切一味相五中離言應通四段四相皆有離言相故而與無二一處合說准可知故餘三段中略而不說就前二相文別有二初長行廣釋後以頌略說前中有六一請問二略答三徵問四廣釋五重徵六喻說依真諦判四段同前就初為五一略說不可言無二二廣說三喻顯四總結五偈頌此即第一菩薩請問於中有二初發問由序後依教發問此即初也文有四節一爾時者發問時也深密經云佛婆伽婆大衆圍繞說深法時者譯家謬也二如理請問菩薩者辨能問者順理發問故名如理請問菩薩解節經云如理正問深密經云善問菩薩三即於佛前者發問處也此如世親攝大乘云善入菩薩薄伽梵前者顯有所敬及無異言又無性云顯佛開許堪廣流通親對世尊無異言故四同解甚深義密意菩薩言者標所問人也今此菩薩能以四辨解釋甚深義理密意故立其名此如瑜伽三十七說解節經云能解甚深義節菩薩真諦釋云解即解釋節是堅結義解釋甚深堅結義節是故名為解釋甚深義節菩薩亦名寶冠頂寶冠頂本是佛名今此菩薩彼佛弟子從師立號廣說如彼深密經云深密解脫菩薩最勝子言一切法無二一切法無二者何等一切法云何為無二釋曰此即第二依教發問文有兩節初最勝子言一切法無二者舉所問教後一切法無二等者依教發問然最勝子深密解節皆佛子真諦記云佛子有五義一種子義謂信樂大乘能為得佛種子二母義謂般若度能生佛法故名為母三胎處義菩薩禪定是住處故名胎處四乳母義謂能長養菩薩令得成道故說慈悲為乳母五似父義謂從初地乃至佛地轉依似佛故言似父即呼解節菩薩為佛子也廣說如前十住論云菩薩是佛真實之子是故菩薩名為佛子今依唐本名最勝子自有二說一云最勝是菩薩名三乘子中最殊勝故能紹佛種名之為子是持業釋一云最勝是世尊號故無性論云最勝者顯佛勝二乘故又瑜伽云佛是最勝於諸外道煩惱等魔能得勝故宗族姓等映衆人故若依此釋最勝之子名最勝子故顯揚云菩薩亦名最勝之子是故餘處名為佛子言謂言教即一切法無二言也此亦兩釋一云菩薩言教一云佛言如百法論如世尊言一切法無我又下頌云佛說離言無二義一切法無二者舉經兩章一一切法二者無二一切法無二者何等一切法云何為無二者此即第二依教發問文有兩節初將欲發問雙牒兩章後依章別徵即成二問一問何等一切法二問云何為無二依瑜伽釋泛論發問有其五種一不解故問二疑惑故問三為欲利益安樂故問四誡驗故問五輕觸故問今此菩薩依第三問為欲利益諸衆生故或可通三亦有不解疑惑義故不依後二無上法王不可輕觸及誡驗故解節經云一切法無二一切法無二此義云何真諦記云引經為問重言一切法無二為五義故一處處經說故二有為無為無二故三內六根外六塵無二故四凡聖無二故五因果無二故今此所說文義云何是菩薩以所作非所作答也解甚深義密意菩薩謂如理請問菩薩曰釋曰自下第二依問略答於中有二初示問答者後依問正答此即初也善男子一切法者略有二種所謂有為無為釋曰第二依問正答於中有二初善男子者讚能問者後一切法下依問正答此即初也依智度論三十五云男子言簡非男子等不堪教授善謂善相謂具慈悲三業無失樂於善人不顯己德隨順衆人不說他過不求世間名譽等樂但樂道德自業清淨心貴實相輕賤世事有如是等無量善法此相多在男子身中是故讚言善男子也問如何但說有為無為二種法耶答如大婆沙說有二意彼云為欲遮遣補特伽羅故及為顯示智殊勝故說此有為無為二種法也為欲遮遣補特伽羅者謂顯唯有有為無為法畢竟無實補特伽羅故及為顯示智殊勝者謂有聰慧智殊勝者由此二法通達一切法此二遍攝一切法故一切法等者依問正答於中有二初答一切後釋無二此答一切文有兩節初一切法略有二種者標章舉數後有為無為者依數列名泛論一切有其三種一者略說唯有二種所謂有為無為二者非廣非略有其五種一者心法二者心所有法三者色法四者心不相應行法五者無為法大智度論及密嚴經但列五種而不別釋三者廣說具明百法今簡中廣故言略說言有為無為者諸教不同順正理云衆緣聚集共所生故名有為與此相違准知無為婆沙論云若法依屬因緣和合作用是名有為若法不依屬因緣和合作用是名無為掌珍論云衆緣合成有所造作故名有為非有為故說名無為翻對有為是無為義無著菩薩波若論云無為者是無分別義准知有為是有分別又集論云有生住異滅是名有為無生住異滅是名無為瑜伽第一百云言為者謂有生滅繫屬因緣與此相違應知無為智度論云有所得者名有為無所得者是名無為功德施論亦同此說又智度論九十三云取相是有為不取相是無為若廣分別具如別章然今所說有為無為三釋不同一云此中所說遍計所執有為無為故下經云決定實有有為無為堅固執著隨起言說一云唯約依他所起相分有為無為故下經云決定無實有為無為然有分別所起行一云有為即依他起無為即圓成實性雖有三說後說為正所以者何此中意說依他有為圓成無為二法之上無所執性有為無為故言無二也後當分別是中有為非有為非無為無為亦非無為非有為釋曰第二釋無二相此即五中不可言相及無二相所以者何不可說言有為無為故亦非有為無為二種相故然釋此文諸說不同解節經云所作者非所作非非所作非所作者非非所作亦非所作真諦釋云自下兩句遣有為法兩句遣無為法也所作者即有為法有為法為因緣聚集所作故名所作非所作者即無為法無為法本有是常不為因緣聚集所作名非所作先約三義故遣有為一由亂識分別故有所作所作實無但有分別亦由有所取故有能取所取既無故能取亦無故非所作二由根本是無有為諸法根本由不正思惟不正思惟生諸惑諸惑生諸業業生果報不正思惟從執境界實無謬執為有由境無故不正思惟亦無不正思惟既無諸惑亦無諸惑故諸業亦無諸業無故果報亦無由其根本不實故一切有為皆非實也三由無生此所作法不離分別依他二性此二性既本無相無生有何作義是故非所作也非非所作者此第二句遣非所作所作既是有為非所作即是無為遂以三義遣此無為無為亦由亂識分別故有此所作而亂識既無非所作亦不有亦由亂識分別故有所作名體非是實有故不得成既無所作之法非所作即不得有本以有對無既其無有理自無無二由根本是無即以所作為根本若實有所作可說非所作名如先有病復稱病差病本是無何差之有三由法本無相無生離有離無本非所作亦非非所作也非所作者下次兩句遣無為法初一句約三義顯無為故云非非所作次一句約三義遣有為故云亦非所作三義並不異前進退終不離有為無為故無異前辨也此即是顯不可言及無二義所以略作此答者一為利根人薄聞使悟者不勞廣說二為破高心人令一聞未悟再請方解上來已述真諦師宗以申經意此地諸師大同真諦今唐本經云是中有為非有為非無為無為亦非無為非有為釋此經文諸說不同一云是中有為即是遍計所執由彼所執無實法故故不可說及無二相有為既非有為無為無為亦爾以所執故不可說為有為無為也故下經云堅固執著決定實有有為無為故知有為無為皆所執也一云此處有為無為皆是依他有為無為故下經云唯有分別所起行相為遣所執有為無為故作此說是中有為非有為非無為無為亦非無為非有為也一云是中有為者依他起性諸有為法言非有為非無為者即非遍計所執有為無為此中意說依他起上遣所執性有為無為所顯真如為勝義諦如說依他起上無所執性為圓成實不取依他以為圓成言無為者即是圓成實性離言真如言亦非無為非有為者即非遍計所執無為有為此中意說圓成實上遣所執性無為有為所顯真如為勝義諦雖有三說且依第三然無二相有其多種不可具說且論有為無為無二相中諸說不同若集論約無取蘊以說無二非業煩惱所生故不可言有為隨欲現前不現前故不可言無為依攝大乘法身五相中一轉依為相二自法所成為相三無二為相四常住為相五不可思議為相第三無二論有三義一有無無二二有為無為無二三一性異性無二謂有為無為無二為相者由業煩惱非所為故自在示現有為相故今此所說非遍計所執生滅等有為非遍計所執無生滅等無為故言非有為非無為也即此離言無二體性即是真如是故無上依經說如來界五種功德一不可說相二無二相三過覺觀相四過一異相五一切處一味相乃至彼云一切法藏無變異故名為如如無顛倒故名為實際過一切相故名為寂滅聖人行處無分別之境界故名第一義阿難是如來界非有非無不染不淨自性清淨此經下云佛說離言無二義甚深非愚之所行故知離言真如為體問若爾大品所說如何會釋故三十二云須菩提白佛言何等是有法何等是無法佛言二是有法不二是無法大智度論九十五云二法名各各別相不二法名一空相以是一空相破各各異相又大品經三十九云諸法平等所謂無相須菩提白佛言是法平等為是有為是無為法佛言非有為法非無為法何以故離有為法無為法不可得離無為法有為法不可得須菩提是有為性無為性是二法不合不散勘無色無形一相所謂無相佛以世諦故說非以第一義故具說如彼解云此勝義諦用如為體而言無者以遣所執故說無言據實非無故下經云一切諸法皆無自性者通據三性密意說無非實全無此一切法無二觀門即是唯識性觀或三中圓成實觀三無性中勝義無自性觀真諦師云即是分別無相觀或依他無性觀此中應說不二法門八不中道義如別章如理請問菩薩復問解甚深義密意菩薩言釋曰第三菩薩徵問於中有二初標問答者後乘前徵問此即初也最勝子如何有為非有為非無為無為亦非無為非有為釋曰第二乘前徵問前文既言有為無為依何義故而復說言有為非有為非無為無為亦非無為非有為此有何義解甚深義密意菩薩謂如理請問菩薩曰釋曰自下第四廣釋於中有二初明說之由序後依問正答此即初也善男子言有為者乃是本師假施設句釋曰自下第二依問正答於中有二初釋有為無二相後善男子言無為者亦是本師下釋無為無二相前中有二初遮三相後然非無事下釋外伏難示正道理遮三相中文別有三初遮有為次善男子下遮無為後設離下遮非有為非無為相此即第一遮有為相然釋此文西方諸師三說不同一云此文唯依外道名為本師謂劫初時外道本師假名安立有為諸法若是外道假名安立即是遍計所集言辭所說若是遍計所集言辭所說即是究竟遍計所執非實有故非是有為所集即是所執異名故廣百卷第十卷云般若經中佛自分明判有無義遍計所執所集所增所取常恆無變易法如是一切皆名為無因緣所生皆說為有一云此文皆是佛說謂一切法皆離名言而佛本師大慈悲力假說有為此即如來後得智中遍計所集言辭所說還是究竟遍計後得智所說故非實有為故作此言有為非有為也真諦三藏大同此釋一云此文有其三節初明有為是佛假說次若是本師等者辨異生等執假為實後若是遍計等者重辨非實結非有為雖有三說第三為勝即說如來號為本師故深密云言有為者唯是如來名字說法解節經云此是本師正教言說又對法云薄伽梵說一切諸法略有二種所謂有為無為故知本師是如來也理實無有當名實法但如幻等非有似有是故本師於離名言假說有為也若是本師假施設句即是遍計所集言辭所說釋曰此即第二執假為實若是如來假施設句即諸有情遍計所集言辭所說尋名所執即非實故非是有為若是遍計所集言辭所說即是究竟種種遍計言辭所說不成實故非是有為釋曰第三辨非實有結非有為此顯有情種種遍計執實有心言辭所說不成實故非是有為三中第一遮有為說善男子言無為者亦墮言辭釋曰第二遮無為法謂無為法亦墮本師假說言辭乃至不成實故非是無為也三師別釋准上應知設離有為無為少有所說其相亦爾釋曰第三遮非有為非無為相此遮犢子部計彼立五法藏義所謂三世無為及不可說法藏彼所立我不可說為有為三世及無為非世故名非有為非無為非有為如是名為少有所說今破彼計故言設離有為無為少有所說常住真我其相亦爾墮名字故亦非實有或可此文遮彼轉計未必有執又智度論第二卷云一切諸法略有三種一者有為法二者無為法三者不可說法然非無事而有所說釋曰自下第二釋通伏難示正道理謂外疑難若有為法即非有為及無為者如來說言有為無為應無有事事者體事解節經云大師說教可無義不深密經云不空說事於中有三初標宗總答次菩薩反結後菩薩正說此即第一標宗總答謂佛所說有為無為者雖無真實有為之法然非無事而有所說何等為事釋曰第二菩薩反結謂諸聖者以聖智聖見離名言故現正等覺即於如是離言法性為欲令他現等覺故假立名想謂之有為釋曰第三菩薩正說非無有事而有所說所言聖者俱舍論云聖謂己有無漏聖道遠諸惡法故名為聖正理論云聖謂離縛或遠衆惡或善所趣故名為聖成實論云能其泥洹故名為勝瑜伽論云是善是無漏故名為聖言智見者智是決斷義見是推求義謂無漏聖慧決斷推求故名聖慧見也智見二種合說意者如智度論二十六云問曰解脫智見但言知即得何以復言見答曰智見合說事得牢固譬如二繩合為一繩則得堅牢廣說如彼若依世親波若論意現量聖智名為知見若唯說知謂以比智知若但言見謂是肉眼等見知簡眼見見簡比知故知見合說也今說智見意同世親問此云智見彼說知見如何以知證智解云五分法身名字新舊不同依智度論大品經等名解脫知見依顯揚等名解脫智見又解節經名聖知聖見今此經云聖智聖見故知智見即知見也然今釋此非無有事而有所說諸說不同一真諦記云若說並非實有大師所說皆無義耶答由不可言體實有不可言體即真實義也但有四義故不可言一在真觀無分別智能念真理爾時無有分別故不可言二出真觀心雖有言說不在真境故不可言三若言說決定不離人法及能取所取有為無為真理過此故不可言四者真理但是證至二量境界非是比信二量境界故不可言此意說云非無實事實事即是離言法性真如以為實事為欲令他無分別智覺真如境是故假說有為以顯實事也一云外疑非有為無為便無有事如何說言有為無為又復疑云一切諸法皆離名言何須假說故作此通然非無事而有所說離言緣生法依此自覺故非無事為令他覺故須假說一云外疑既無有為無為便無有法有何利事而說有為故作此答非無有事事略有三一自覺事二覺他事三者為令他覺起言說事一一事中皆有多義不可具說善男子言無為者亦是本師假施設句釋曰自下第二釋無為無二相於中有二初歷三相後然非無事下釋伏難示正道理前中有三初遮無為相次善男子下遮有為相後設離下釋非無為非有為相此即第一遮無為相於中有三初明無為是假說次依佛假說執為實有後辨非實結非無為此即初也於中有二釋准上應知若是本師假施設句即是遍計所集言辭所說釋曰此即第二依佛假說執為實有若是遍計所集言辭所說即是究竟種種遍計言辭所說不成實故非是無為釋曰第三辨非實有結非無為善男子言有為者亦墮言辭釋曰第二遮有為相准上應知設離無為有為少有所說其相亦爾釋曰第三遮非無為有為相然非無事而有所說釋曰第二釋通伏難示正道理於中有三初標宗總答次反詰後正說此即初也何等為事釋曰第二反詰謂諸聖者以聖智聖見離名言故現正等覺即於如是離言法性為欲令他現等覺故假立名想謂之無為釋曰此即第三菩薩正釋文有兩節初明諸聖離名言故取正等覺後即於下為令他故假立名想若具分別准上可知爾時如理請問菩薩摩訶薩復問解甚深義密意菩薩摩訶薩言釋曰自下第五重徵假說於中有二初徵問由序後正徵問此即第一辨問答者以為由序最勝子如何此事彼諸聖者以聖智聖見離名言故現正等覺即於如是離言法性為欲令他現等覺故假立名想或謂有為或謂無為釋曰此即第二正設徵問雖已廣說而未能了其喻何等解節經文脫此徵問譯家謬也或可意存略故解甚深義密意菩薩謂如理請問菩薩曰釋曰自下第六舉喻重說於中有二初明說之由序後依徵廣說此即初也善男子如善幻師或彼弟子住四衢道積集草葉瓦礫等現作種種幻化事業釋曰自下第二依徵廣說於中有三初舉喻重說次如是若有下舉法同喻後如是善男子下結通外難前中有三初幻師幻事喻次若諸衆生下愚者執實喻後若有衆生下悟者覺妄喻此即第一幻師幻事喻也於中有二初總明幻事後所謂下別明幻事前中有四一明幻師二顯幻處三辨幻所依四總明幻事然此喻文意趣難了故今先述真諦師說後依諸教釋此經文真諦記云說喻意者此譬衆生由妄顛倒種種分別久在生死受諸苦報不知幻本及不可言無二真如執為實有聖人明了識此非真凡夫不幻幻本由有無知未得聖慧故聖人了知幻本及無二不可言體由斷無知得聖道故幻師譬聰明凡夫即是外道幻弟子譬愚癡凡夫即是闡提又幻師喻煩惱弟子喻業由惑起業故又幻師譬因弟子譬果於四衢道者譬三界及無漏界四種生死或譬根塵我識四種境界若依真諦金光明記幻師即是阿賴耶識無始已來能造虗妄幻弟子者喻七識也微細妄法賴耶所造中即陀那粗者六識所造又見惑為師愛惑為弟子又心煩惱為師皮肉惑弟子四衢道者喻四謗之理今依諸教釋此經者所言幻師有其四釋一十住婆沙以業為師二瑜伽六十惑業為師三梁攝大乘唐攝大乘及大品經菩薩為師四瑜伽八十四八識為師言四衢道者有其三釋一增一阿含及雜阿含十五卷云四諦為四衢二雜阿含第二十等說四念處為四衢道三瑜伽八十四以四識住為四衢道也言積集草葉木瓦礫等者辨幻所依謂喻諸種子積集在本識中也或可三種薰習在賴耶中草葉細軟譬於善種木石等粗強喻諸惡種也言現作種種幻化事業者總明幻事由草葉等諸幻事起由善惡種生諸果也所謂象身車身馬身步身末尼真珠琉璃螺貝璧玉珊瑚種種財殼庫藏等身釋曰第二別明幻事謂上總標現作種種幻化事業而不別釋故今別釋真諦釋云四兵譬因緣珠等喻果由四兵故能為珠等或可四兵喻有情類末尼等者喻非情類總釋意云賴耶幻師七識弟子住四識住積集種種名言等種而生三界五趣四生情非情等種種諸果地前迷者執有真實有為無為種種諸法地上悟者覺知如幻無實諸法而諸教中說業為幻師四聖諦等為四衢者凡論幻師有其三種一能造幻故名為幻師即惑業等二者如幻故名為幻師即是菩薩三造幻主故名為幻師即八識也今依第三或可亦取惑業或可通說三種義亦無失也其四衢道亦有三義一除惑四道即是四諦二初學所觀道即四念處三幻主所住道即四識住今依第三或可通取義亦無失若諸衆生愚癡頑鈍惡慧種類無所知曉釋曰自下第三愚者執實喻於中有五一明能執人二顯所執境三正辨起執四依執起說五勸彼重觀此即第一明能執人謂諸愚夫五蘊假者真諦記云愚癡凡夫者嬰兒凡夫即是闡提惡慧種類者聰明凡夫即是外道能起見者今解愚癡者出無明體頑鈍者顯癡用也此即起執本也惡慧出執體性即是諸見無所知曉者惡慧用也此明由癡執為實有有為無為也於草葉木瓦礫等上諸幻化事釋曰第二辨所執境謂草葉等喻善惡業諸幻化事喻業所感或識所變種種諸事見已聞已作如是念此所見者實有象身實有馬身車身步身末尼真珠琉璃螺貝壁玉珊瑚種種財穀庫藏身釋曰第三正明起執謂由無明起分別見執實有象等真諦記云見已者謂自見即是幻師喻聰明凡夫聞已謂從他聞即是弟子喻愚癡凡夫如其所見如其所聞堅固執著隨起言說唯此諦實餘皆愚妄釋曰第四因執起說謂不知幻故執為實有餘人云不是實者皆是愚人及以妄語彼於後時應更觀察釋曰第五勸彼更觀由彼頑鈍不知是幻執為實有於後幻滅更審觀察乃知非實若有衆生非愚非鈍善慧種類有所知曉釋曰自下第三悟者覺妄喻有其五段翻上應知一能悟人二所悟境三正明覺悟四因悟起說五勸不重觀此即第一明能悟人文有三節一若有衆生者辨能悟人謂地前菩薩或可地上菩薩五蘊假者二非愚非鈍者起悟近緣謂無癡善根三善慧種類有所知曉者正明悟體以慧為性此喻地前加行位中分證能取所取空性或可地上了知勝義無二之理名知曉也於草葉木瓦礫等上諸幻化事釋曰第二明所悟境如文可知見已聞已作如是念此所見者無實象身無實馬身車身步身末尼真珠琉璃螺貝璧玉珊瑚種種財穀庫藏等身釋曰第三正明覺悟於中有二初明實境非有後然有下明假境非無此即第一實境非有如文可知然有幻狀迷惑眼事於中發起大象身想或大象身差別之想乃至發起種種財穀庫藏等想或彼種類差別之想釋曰第二明假境非無文有二節初言然有幻狀迷惑眼事者正明似境非無後於中下示迷惑之相此即初也然此幻狀諸宗不同薩婆多宗順正理云如變化色由定力故雖是化色而是實色是眼識境如是由幻術力似幻相起能發眼識彼宗自說一切諸心皆緣有境依經部宗幻象馬等皆無有體緣幻之心緣無境起故知彼宗緣無亦生心也今依大乘自有兩說一依龍猛宗意同經部緣無亦得生心故智度論云五識皆不可誑故知彼宗眼等五識唯緣實境第六意識容許緣無依彌勤宗無實象等而有似象相分現前用此影像色為所緣境又此幻象喻自有二義一依大般若等幻等十喻喻於空義二依阿毗達磨經及攝大乘八喻顯依他似有非實此經亦爾用似義喻依他起言於中發起大象身想等者示迷惑相於中有二初大象身想者迷象自性總辨象體名為自相於中大小或青白等名差別相是故迷者起二種想言乃至等者類釋馬等總別二想准上應知不如所見不如所聞堅固執著隨起言說唯此諦實餘皆愚妄為欲表知如是義故亦於此中隨起言說釋曰第四因悟起說有其二義一由智力悟境非實不起實言二為欲下由智力故悟境是假隨起言說彼於後時不須觀察釋曰第五勸不觀謂由智力如實知故如是若有衆生是凡夫類是異生類未得諸聖出世間慧釋曰自下第二舉法同喻於中有二初明迷者執實後若有下辨悟者覺妄前中有五一明能執人二明於境不了三正明起執四因執起說五勸彼重觀此即第一合能執人言如是者舉法如喻故言如是此能執人有其三名一名衆生二名愚夫三名異生言衆生者略有二義一者衆多法生故名衆生故智度論第三十云言衆生者於五衆十二入十八界六界十二緣等衆多法生故名衆生大乘同性經證契經梁攝論第十四大意亦同二者受多生故名曰衆生故般若燈論云謂有情者數數受生故名衆生又真諦波若疏云以前生後生生不絶故名衆生若爾亦有前後滅義應名衆滅答非一例生成衆生滅非成故廣說如彼言愚夫者愚謂愚癡夫謂士夫有愚之夫故名愚夫若依廣百論愚夫即是異生故彼論云諸異生者說名愚夫又第一云隨所有見皆無諦實智不清白故名愚夫言異生者依大婆沙四十五云問何名異生答一切聖者皆名同生此異於彼故名異生問若爾聖者異異生故應名異生答一切聖者同會真理同見同欲故名同生異生不爾可厭賤故立異生名不應為難大德說曰異於正法及毗奈耶而受生故名為異生廣說如彼此意說云諸異生類未得三乘無漏聖道或可未得初地已上諸聖道故起實有執於一切法離言法性不能了知釋曰第二於境不了言於一切法離言法性者即是一切有為無為諸法自相離名言故或可有為無為無二真如名為離言於此法性不能了知彼於一切有為無為見已聞已作如是念此所得者決定實有有為無為釋曰第三正明起執謂諸愚夫以不了知法性理故於有為等執為實有如執象等如其所見如其所聞堅固執著隨起言說唯此諦實餘皆癡妄釋曰第四隨執起說准上應知彼於後時應更觀察釋曰第五勸彼重觀以未能覺非實義故若有衆生非愚夫類已見聖諦已得諸聖出世間慧釋曰自下第二辨其悟者覺境非實於中有五一明悟人二明覺境三明覺相四明起說五勸不重觀此即第一明能悟人言若有衆生非愚夫類者簡異地前愚夫異生已見聖諦已得諸聖出世間慧者正出覺體已見勝義真如聖諦或可已見四諦真如已得諸聖出世間慧者即是正體後得無漏聖智依成唯識二復次釋出世間智唯是正體初約一義後明二義故第九云斷世間故名出世間二取隨眠是世間本唯能斷獨得出名或出世間依二義立謂體無漏及證真如此智具斯二種義故獨名出世間餘智不然即十地中無分別智於一切法離言法性如實了知釋曰第二如實覺境已得出世無漏智故彼於一切有為無為見已聞已作如是念此所得者決定無實有為無為釋曰第三正明覺悟於中有二初覺實境非有後然有下悟假境非無此即初也若依真諦師如前所說三種義故一切有為及無為法皆非實有若依大唐三藏約此執性以顯非實然有分別所起行相猶如幻事迷惑覺慧於中發起為無為想或為無為差別之想釋曰第二明假境非無文有兩節初明假境非無後於中下明其假境自性差別言行相者行謂見分能緣行解相即相分有為無為此明依他相分所攝有為無為假有非無猶如幻事後於中發起等者明其假境自性差別二種相也言為無為想者出自性想緣自性故或謂為無為差別之想者辨差別想緣差別故不如所見不如所聞堅固執著隨起言說唯此諦實餘皆癡妄為欲表知如是義故亦於此中隨起言說釋曰第四依境起說准上應知彼於後時不須觀察釋曰第五勸不重觀已了知故如是善男子彼諸聖者於此事中以聖智聖見離名言故現正等覺即於如是離言法性為欲令他現等覺故假立名想謂之有為謂之無為釋曰此即第三結通外難難及通意尋上可知爾時解甚深義密意菩薩摩訶薩欲重宣此義而說頌曰釋曰就無二相文別有二初長行廣釋後以頌略說廣釋已訖自下第二以頌略說於中有二初總標頌意後以頌正說此即初也密意菩薩為欲重宣無二義故說此頌也言重宣者真諦釋云有其四句一文重義不重如說瞿名目九義等二義重文不重如說帝釋有千名等三文義俱不重如說人天等四文義俱重如以結頌重頌前義今依第四故說重言舊人相傳但說三句略下不說此第三一句又釋十二部經頌有二種一者應頌二者諷頌故雜集論第十一云應頌者即諸經中或以頌重頌又不了義經應更頌釋故名應頌諷頌者謂諸經中以句宣說或以二句或三或四或五或六今依應頌故說重言所言頌者深密解節皆說偈言舊來諸師自有兩釋一云偈者梵音伽陀此云重頌而翻譯者為存略故或音訛故但言偈也一云偈者此即漢語竭也盡也四句成頌攝義同盡故言偈也不爾梵音正是伽陀即應言伽不應名偈雖有兩釋前說為正西方諸國語音不同中印度國名為伽陀餘處名伽他乃至于闐國名為偈他譯家略故但言偈也然說偈意依真諦略有六意一為忘失二為晚來三為易受易持四為二智利鈍不同五為衆生意樂不等六顯能說之人善巧方便故真諦疏云為有聽衆散亂異緣忘失前義欲令更得故說偈頌又為晚來不及聞者欲令得聞故有偈頌又為易受易持故說經及偈若但說偈不說經者則理細難受若但說經不說偈者則義散難持為易受易持故具說經偈又為利益二種智人具說經偈一分別智人此人根鈍若為略說不廣分別不能得義為利此人故廣說經二者開智人神根利故略說義相自能分別得具足解如舍利弗正聞一義十重分別若其廣說不利此人為利鈍二人具說經偈也又衆生有二種一者樂說由慈悲力多故二者樂行由心寂靜故為利此兩人故說經偈又顯能說之人最為善巧廣而能略略能廣故所說正法最為當忠隨廣略說皆能利鈍不相違故具說經偈也依成實論第二卷中說偈有六意依十住婆沙有一意恐繁不述佛說離言無二義甚深非愚之所行愚夫於此癡所惑樂著二依言戲論彼或不定或邪定流轉極長生死苦復違如正智論當生牛羊等類中釋曰第二以頌略說有其二頌分之為二初有半頌歎理甚深謂佛所說離言無二兩種真如極甚深故非愚境界後一頌半顯執過失於中有三初有兩句能生戲論失次有兩句流轉生死失後有二句當生惡趣失言愚夫於此癡所惑樂著二依言戲論者此即第一能生戲論失二依即是有為無為八種戲論所依處故言戲論者八種妄想此中意說愚夫於此無二離言境中癡所惑故樂著有為無為二種法上八種戲論八種戲論如瑜伽論三十六說彼云又諸愚夫由於如是所顯真如不了知故從是因緣八分別轉能生三事能起一切有情世間及器世間八分別者一者自性於一切法分別自性如色聲等二者差別謂即於彼分別可見不可見等三者總執謂即於彼色聲等上計有情我舍軍林等四我分別五者我所分別於諸有漏有取法上即計為我或計我所六愛分別七者非愛八俱相違如其次第於妙非妙及俱離事所生分別大唐三藏云八種分別皆以無覆無記異熟生慧為其自性或可尋伺以為自性生三事者初三分別能生戲論所依緣事六根六境次二分別能生我見及以我慢後三分別如次能生貪瞋癡當知此中所依緣事為所依故生我見慢見慢為依生貪瞋癡由此三事能現有情及器世間流轉品法此中意引顯揚三無性論言彼或不定或邪定流轉極長生死苦者此二句顯流轉生死失謂彼愚夫愚癡力故便於三種有情聚中或在不定聚或在邪定聚流轉極長分段生死三聚之處然此三聚諸說不同薩婆多宗自有兩說一依集異門論有三聚衆生一邪性定聚謂成就五無間業二正性定聚謂成就學無學法三不定聚謂唯成就餘有漏法及無為法是名三聚之性界者邪性定聚一界少分謂欲界正性定聚三界少分不定聚亦爾趣者邪性定聚一趣少分謂人正性定聚二趣少分謂人天不定聚三趣全謂地獄傍生餓鬼二趣少分謂人天二依施設足論邪性定聚謂五無間業若彼因若彼果彼等流彼異熟及成就彼法補特伽羅正性定聚謂學無學法若彼因彼果彼等流及成就彼補特伽羅不定聚謂諸餘法若彼因彼果彼等流彼異熟及成就彼補特伽羅是名三聚之性界者如前趣者邪性定聚二趣小分謂地獄人正性定聚亦二趣少分謂人天不定聚二趣全謂傍生餓鬼三趣少分謂地獄人天依經部宗如婆沙論百八十六云譬喻者說無間地獄乃至有頂皆有三聚彼說般涅槃法名正性定聚不般涅槃法名邪性定聚不決定聚者名不定聚若廣分別如大婆沙百八十六等今依大乘略有十門且依十地論判十地經五門三聚經曰是菩薩如實知衆生三聚一正定相邪定相離此二不定相二正見正定相邪見邪定相離此二不定相三五逆邪定相五根正定相離此二不定相四八邪邪定相正位正定相更不作故離此二不定相五妬吝惡行不轉邪定相修行無上聖道正定相離此二不定相皆如實知佛子菩薩隨順如是智名為安住菩薩善慧地十地論第十一云論曰衆生三聚行稠林差別五種一有涅槃法無涅槃法三乘中一向定差別如經是菩薩如實知衆生三聚正定相邪定相離此二不定相故二善行惡行因差別如經正見正定相邪見邪定相離此二不定相故三惡道善道因差別如經五逆邪定相五根正定相離此二不定相故四外道聲聞因差別如經八邪邪定相正位正定相更不作故離此二不定相故五菩薩差別示現如經妬吝惡行不轉邪定相修行無上聖道正定相離此二不定相皆是如實知故捨可化衆生名妬不喜他財名吝通能生他苦行不轉菩薩波羅蜜相違邪定菩薩是名法師方便成就智復有五門一業惑趣寂如瑜伽論第一百云邪性定法聚者謂無間業及斷善根正性定法聚者謂學無學所有諸法不定法聚者餘非學非無學法智度論第四十五意同瑜伽二斷不斷倒門如智度論八十四云為破顛倒分別有三能破顛倒名為正定必不能破名為邪定有緣能破無緣不破名為不定具說如彼三堪不堪任門如大菩薩藏經第五卷云何正定謂由因力先世方便開智利根之所生故若諸如來為說不說堪任法器若為說法速得解脫云何不定性由外緣力如法教授可得解脫不得如法教授教誡不得解脫為如是等得義利故諸佛世尊出興於世云何邪定聚謂有情性煩惱所弊不修淨業識性薄弱愚癡深厚住邪見網非正法器若使如來為說不說終不堪任證於解脫具如彼經四著有無等門如無上依經彼第一云世間中有三品衆生一者著有二者著無三者不著有無著有者復有二種一者背涅槃道無涅槃性不求涅槃願樂生死二者於法中不生偈仰誹謗大乘乃至廣說著斷無者亦有二種一者行無方便二者行有方便行無方便復有二人一者在佛法外九十六種異學外道二者在佛法中能生信心堅著我見不愛正理我說此人同彼外道復有增上慢人在正法中觀空生於有無二見是真空者直向無上菩提一道正解脫門如來顯了開示正說於中生空見我說不可治阿難若有人執我如須彌山大我不驚怪亦不毀呰增上慢執著空見如一髮髮作十六分我不許可行有方便亦有二人一聲聞乘二緣覺乘不著有無者最上利根修行大乘是人不著生死如闡提不行無方便如外道不行有方便如二乘具說如佛告阿難若人貪著三有誹謗大乘名一闡提墮邪定聚若人著無行無方便墮不定聚復有著無行有方便不著有無行平等道名正定聚五可不可治門如央掘魔羅經第三卷爾時大目揵連以偈問曰云何世間病分別說三種或有醫治差或不能醫治或復有病人雖得醫不差是故諸病人分別有三種爾時央堀魔羅以偈答曰是義則不爾不應說三種可治不可治唯二無有三若作三分別亦是聲聞乘若諸聲聞乘佛說蚊蝄乘以彼無智故分別有三種所言邪定者謂彼一闡提正定謂如來菩薩及二乘釋義差別義如別章言復違如是正智論當生牛羊等類中者此後有二句明能生惡趣失謂彼愚夫非但違於無二真義復違如是正智及論正智即是證無二智論謂言論即說無二聖教言論由此復違正智論等當生牛等諸惡趣中也爾時法涌菩摩訶薩白佛言世尊釋曰自下第二釋超過尋思所行相於中有二初長行廣釋後以頌略說就長行中復分為六一菩薩問二爾時下世尊略答三何以故者菩薩徵問四我說下如來廣說五法涌當知下喻說六如是法涌下舉法同喻或可結答或可有六一問二答三徵四釋五喻六合依真諦記一菩薩問二如來正說三譬說四合結五偈頌就初請中文別有三初標有所請次陳所請事後正陳所念此即初也言爾時者發問時也法涌菩薩等者辨問答也解節深密皆云曇無竭依智度論名為法盛故九十七云問曇無竭菩薩因緣云何答伽陀秦言盛達磨秦言法謂此菩薩在衆香城隨意說法令諸衆生廣種善根故名法盛真諦記云曇無竭菩薩若存天笠正語應云檀蘭無竭多此云法上然此菩薩住居八地依法身上起故名法上具說如彼一云曇者梵音此云法也言無竭者此即漢語胡漢並陳故云曇無竭大唐三藏翻為法涌菩薩法辨用而無竭猶如涌泉法喻雙舉故名法涌從此東方過七十二殑伽沙等世界有世界名具大名稱是中如來號廣大名稱我於先日從彼佛土發來至此釋曰自下第二陳所請事此意說言外道聚集論勝義諦竟不能決故知勝義超尋思境於中有四一陳往來處二見其聚集三諍論不決四顯不決相此即第一陳往來處文有兩節初言從此等者顯其往處後云我於等者辨其來處此明法涌從此世界往彼名稱世界助化衆生問從此乃至發來至此者說何處所名為此邪答有三說一云此者娑呵世界故解節云從此娑呵世界向東最遠真諦記云娑訶世界者娑訶是梵王名此云能忍此人見他勝事常生隨喜不起嫉妬能忍許他有勝德事故名為忍非關忍辱說名忍也由此娑訶領千世界即是千界主從主立名號曰娑訶也一云從此者從此十八圓滿淨土也是故二本經中皆無娑訶之言也問若爾淨土即無日月如何說言我從先日從彼處發解云約餘世界日月而說一云如佛地論如實義者從此住處自有二種一者淨土二者穢土由此義故通說兩處名為此也所以如是諸本異者譯家別故或可梵本有此差別言殑伽者舊云恆河也此是神名勘西域傳問如何諸經但言恆河不說餘河答如智度論第七卷說彼云問曰閻浮提中種種大河亦有過恆河者何以常言恆河沙等答曰恆河沙多餘河不爾復次是恆河是佛生處遊行處弟子眼見故以為喻復次閻浮提雪山中有阿耨達池出四大河東面象頭出恆河入東海南面牛頭出辛頭河入南海西面馬頭出婆叉河入西海北面師子頭出私陀河入北海是四河中恆河最大四遠諸人經書皆以恆河為福德吉河若入中洗者諸罪垢惡皆悉除盡以人敬事此河皆共識知故以恆河沙為喻復次餘河名字喜轉是恆河世世不轉以是故以恆河沙為喻不取餘河問曰恆河中沙為有幾許答曰一切算數所不能知唯有諸佛及法身菩薩能知其數佛及法身菩薩一切閻浮提中微塵生滅多少皆能數知何況恆河沙如佛在祗桓外林中樹下坐有一婆羅門來到佛所問佛此林有幾許葉佛即便答有若干數婆羅門心疑誰證知者婆羅門去至一樹邊取小樹葉還來問佛定有幾葉佛即答云少若干葉如其所取語之婆羅門知已心大敬信求出家後得阿羅漢道以是故知佛能知恆河沙數又金剛仙論云恆河沙者從清涼池出入於東海長八萬四千由旬廣四十里或有廣十里處以從沙山中過故有流沙色白水亦同白色狀如乳出河即清此沙極深若象馬車乘入者皆沒又天竺國皆見此河引此為喻所以能到遠世界者真諦記云神通有三一者舉身如鳥飛空由定功能單身遠至恆須神通攝持若忘不攝身即退落故名舉身三中下品二如意神通隨聖意欲轉遠令近轉近令遠或內或外若內轉者世界不促但身能遠至若外轉者身不遠至但促遠世界令其在近轉步則著此即中品三心速疾通此通最勝八地已上獨所能得令身輕捷至已成滿止於一心即便至彼故令菩薩以心速通往彼世界若依俱舍第二十七及順正理意勢神通唯佛所有故順正理七十六云行有三種一者運身謂乘空行猶如飛鳥俱舍亦同二者勝解謂極遠方作近思惟便能速至上同俱舍已下乘也若於極遠色究竟天作近思惟即便能至本無去知來何謂速行此實亦行但由近解行極速故得勝解名或世尊言靜慮境界不思議故唯佛能了三者意勢謂極遠方舉心緣時身即能至此勢如意得意勢名上同俱舍已下乘也如心取境頓至色究竟故已上正理於此三中意勢唯佛運身勝解亦通餘乘謂我世尊神通迅速隨方遠近舉心即至由此世尊作如是說諸佛境界不可思議上同俱舍如日舒光蘊流亦爾能頓至遠故說為行若謂不然此沒彼出中間既斷行義應無或佛威神不思議故舉心即至不可測量故意勢行唯世尊有勝解兼餘聖運身并異生今依大乘大智度論法用少異故第五云如意有三一者能到二轉變自在三聖如意能到有四一者身能飛行如鳥無礙當正理初行也二者移遠令近不往而到三者此沒彼出此二即當正理第二四者一念能至當正理第二轉變自在者大能作小小能作大一能作多多能作一種種諸物皆能轉變外道轉變極久不過七日佛及弟子轉變自在無有久近聖如意者外六塵中不愛不淨物能觀令淨愛淨物能觀令不淨是自在法唯佛獨有又大智度論第三云問如經說彈指頃有六十念若一念中能至一方恆河沙等世界尚不可信何況十方恆河沙等世界時少而所到處多答曰經說五事不可思議所謂衆生多少業果報坐禪人力諸龍力諸佛力於五不可思議中佛力最不可思議菩薩入深禪定生不可思議神故一念中悉到十方諸佛世界如說四種神通中唯佛菩薩有如意疾遍神通我於彼佛土曾見一處有七萬七千外道并其師首同一會坐釋曰第二見其聚集為欲思量故一會坐為思諸法勝諦義相彼共思議稱量觀察遍尋求時於一切法勝義諦相竟不能得釋曰第三諍論不決真諦記云夫論立義有其三義一者現量二依比量三聖言量為思諸法勝義諦相於彼思議即是外道所說現量言稱量者即是比量言觀察者是聖言量如四韋陀論等依此三量遍尋求時於勝義諦竟不能得又解立義有其三義一者立義即是立宗二者證義即是辨因三者立喻是同法喻言思議者即是立宗稱量即是立因觀察是喻依此三種遍尋求時不得勝義若廣分別如真諦記云依真諦記十四五紙恐繁不述唯除種種意解別異意解變異意解互相違背共興諍論口出矛䂎更相䂎刾既惱壞已各各離散釋曰第四顯示決相文有三節初明意業相違次共興下口業違諍後既惱壞下顯身業乖違言唯除種種等者是名意業相違謂諸外道種種推求意不能得真勝義諦唯除謬執三種意解謂一種種意解二別異意解三變異意解依解節經但言起種種執不并三種依深密經生異異見異異執立異朋黨也然三意解諸說不同一云種種意解者即用種種諸法以為勝義無別真如故名種種意解利異意解者離諸法外別有勝義與一切法決定別異故言別異意解言變異者理實勝義無有變異而言變異非謂常住故言變異一云初句是總後二是別釋義如上一云三種義無差別衆計非一故言種種意趣各別故言別異展轉異計無決定相故言變異意業乖諍如上已說次明語業口出矛䂎後明身業更相損壞故解節經云由口刀杖互相傷毀便各分散又瑜伽論九十七云是諸外道薩迦邪見以為根本種種見趣意各別故彼此展轉互相違戾遍於一切四聖諦中尚無有能施設其教況當覺悟我於爾時竊作是念如來出世甚奇希有由出世故乃於如是超過一切尋思所行勝義諦相亦有通達作證可得說是語已釋曰第三陳己所念謂彼菩薩見諸外道尋思不決便知勝義超尋思境便竊作念讚佛希有由佛出世善方便說亦有令他作證可得爾時世尊告法涌菩薩摩訶薩曰善男子如是如是如汝所說我於超過一切尋思勝義諦相現正等覺現等覺已為他宣說顯現開解施設照了釋曰第二依問略答文有三節初爾時等者說之由序次善男子等者贊請順理文義但順或可俱順自他二利是故重言如是如是依大品經帝釋贊言供養般若功德無量佛言如是如是龍樹釋云恐疑帝釋非一切智所說或錯故佛印可所說重言如是如是此經亦爾下文所說皆應准此後我於超過者作問略答於勝義諦現成等覺亦為他說何以故釋曰第二菩薩徵詰以何義故超尋思境我說勝義是諸聖者內自所證尋思所行是諸異生展轉所證釋曰自下第四依問廣釋以五相釋超尋思境即分為五一內自所證二無相所行三不可言說四絶諸表示五息諸諍論例有兩段先釋後結就內自所證文別有二初釋後結此即釋也謂諸聖者無分別智緣真如境內證自體然此內證諸說不同一云一切根本後得內證真如而不變影以無漏智緣真如故一云根本及後得智皆能變影而非親證不爾唯識理不成故一云正智親證自體不變而緣自證分無別相分後所得智變影而緣以分別故若不爾者圓鏡智等緣真如境正體後得應無差別雖有三說大唐三藏及護法宗後說為正若廣分別如成唯識第九卷釋及佛地論第三卷說尋思所行即是異生依他言說非內所證故言展轉問解節深密皆作是言過覺觀境此本即云過尋思境如何會釋答有兩釋一云舊諸經論皆云覺觀大唐三藏翻為尋伺尋謂尋求伺即伺察如瑜伽論等一一皆用思慧為體而此經言名尋思者通說尋伺皆名尋思皆有推求思量義故然此尋伺諸說不同薩婆多宗離心以外別有心所實有體性始從欲界至初靜慮一切心中皆有尋伺中間靜慮無尋有伺第二靜慮以上諸地皆名無尋無伺通於六識有漏無漏若廣分別如俱舍等依經部宗離心已外無別自性亦非一心尋伺俱起故成實論覺觀品云有說覺觀在一心者此事不然解云經部大同大乘然差別者成實論宗以心為體依大乘宗思慧為體又經部宗三地別者如大毗婆沙欲界乃至有頂地具有尋伺而說三地有差別者欲界初定一切善染無覆無記靜慮中間乃至有頂染汙心等名有尋有伺地靜慮中間善及無覆無記心等名無尋唯伺地第二靜慮乃至有頂善及無覆無記等名無尋無伺地今依大乘如成唯識第七卷說尋求令心匆遽於意言境粗轉為性伺謂伺察令心匆遽於意言境細轉為性此二俱以安不安住身心分位所依為業並用思慧一分為體非一剎那二法相應一類粗細前後異故若廣分別如瑜伽顯揚成唯識等三地別者大唐三藏云瑜伽論意自性離欲建立三地謂欲界乃至初靜慮中諸有為法未能遠離自性欲故名有尋伺中間靜慮諸有為法已離下地自性欲故名無尋唯伺地第二靜慮已上乃至非想諸有為法已離尋伺自性欲故名無尋無伺地若廣分別如瑜伽釋論第一卷說今此所說超尋思者依此尋伺而說一云此中尋思即用三界有漏心心所法以為尋思即五法中分別所攝然尋思言自有兩種一者四尋思用慧為體推求名等未決定故二者此中所說尋思即用三界有漏心等故今但言尋思不名尋伺是故法涌由此道理當知勝義超過一切尋思境相釋曰第二結文可知我說勝義無相所行尋思但行有相境界釋曰第二無相所行先釋後結此即釋也解節經云我說真實非相行處真諦記云相行處者謂十八界相即六塵行即六識處即六根此根塵識但覺觀境真如非覺觀境是故非十八界攝今唐本云無相所行然此無相諸說不同一云能觀無分別智名為無相遠離能取所取相故若依此說無相觀智之所行故名無相所行是依主釋一云無相即是真如涅槃此是無相三昧所行俱舍佛地第一皆作是說無十相故名為無相謂五境男女及生老無常若依此釋無相即是智所行故名無相所行是六釋中持業釋也一云平等真如法性離諸相故名為無相如無量義經說無量義者從一法生其一法者即無相也如是無相無相不相不相無相名為實相諸處所說真如無相依此而說又廣百論云又真空理離有無等一切法相故名無相又瑜伽七十三云問如是五事當知幾種取所行義答略有三種一有言有相取所行義二無言有相取所行義三無言無相取所行義此中最初是言說隨覺者取所行境第二是言說隨眠者取所行境第三是於言說離隨眠者取所行境又初二是世俗諦取最後是勝義諦取又廣百論釋云初於名言能有覺悟次於名言雖有隨眠而無覺悟後於名言隨眠覺悟一切永無初二緣世俗後一緣勝義復有永離言說後所得心通緣二諦問大般若等云蘊界處等乃至菩提皆無所得即是無相此說何義解云經意所說不同依清辨宗通約三性說無所得護法等宗唯違所執無自性品當廣分別尋思但行有相境者尋思即用分別為體是故不證無相真如是故法涌由是道理當知勝義超過一切尋思境相釋曰第二結文可知法涌我說勝義不可言說尋思但行言說境界釋曰第三不可言說相謂真如勝義遠離有為無為等故然不可說依諸聖教乃有多種一非四藏故名不可說如犢子部立五法藏謂三世無為及不可說法藏不可說法藏即真我也不可說為三世無為及不可說成唯識論比量破云汝說真我不可說為是我非我不可說為有為無故猶如空化二離損益等名不可說如薩婆多宗如大婆沙第十五說若可說者說火應燒舌說食應除飢廣說如彼三依大乘略有四義一離損益等名不可說如智度論說火應燒舌同薩婆多二現量境故名不可說如理門論一切諸法皆有二相一者自相現量所得不可言說二共相比量所得即可言說由斯道理諸聖言量比量所攝諸法自相不可說也問說諸法言為是表詮為遮詮耶大唐三藏總相判云諸部皆云說諸法言多是表詮但比量中異法喻言唯是遮詮大乘亦爾故入理論同法喻云謂若所作見彼無常譬如瓶等異法喻云謂若是常見非所作如虗空等此中常言表非無常非所作言表無所作故知異喻皆是遮詮又掌珍論第一卷云為遮異品立異法喻異品無故遮義已成又第二云又遮詮言遮止為勝遮所遮已功能即盡無能更表所詮差別今依大乘一切言說皆是遮詮故理門論云喻有二種同法異法前是遮詮後唯止濫具說如彼解云此簡二喻差別前是同喻後是異喻諸法自相不可言說若詮共相要遮餘法如說青言遮非青等又廣百論第九卷云我諸所說皆是遮言標宗遮謂遮他生滅等執無生非滅唯為遮生無滅非生但為遮滅正釋非斷常等類此應知類釋雖涅槃時生滅斷滅此方便說是假非真如說天中有常樂等是隨俗說非稱實言釋通伏難應以前說諸句文詞隨其所應破諸妄執我等皆妄誰復為真謂畢竟空心言路絶分別戲論皆不能行唯諸聖賢內智所證示正道理三名義相對互為客故不可言說如攝大乘第五云復次云何得知如依他起自性遍計所執自性顯現而非稱體由名前覺無稱體相違故由名有衆多多體相違故名不決定雜體相違故若廣分別如世親及無性釋三無性論及瑜伽菩薩地具說如彼四一切法無所得故不可言說故金剛般若等云如來所說法皆不可取不可說何以故一切聖人皆以無為法而有差別又無垢稱經不二法門有諸菩薩隨所了知各別說已同時發問妙吉祥言云何菩薩名為悟入不二法時妙吉祥告諸菩薩汝等所言雖皆是無如我意者汝等所說猶名為二若諸菩薩於一切法無言無說無表無示離諸戲論絶諸分別是為悟入不二法門時妙吉祥復問無垢稱言我等隨意各別說已仁者當說無垢稱默然無說具說如彼肇師釋云此品有三分初諸菩薩以言說明不二次文殊遣言明不二後維摩詰杜默明不二言說明不二者示藉教以生解依言以通理遣言明不二者示雖由言以通理著言則乖宗杜默明不二者示心寂則會真有心則墮二復次諸菩薩依法明不二文殊依理明不二維摩無依明不二依法者除教依觀依理者捨觀依空無依者捨空而滅觀此是入道深淺不同如上所說四種義中有說此經依第四義一切諸法不可得故有說如攝大乘名義互為客等故名不可說是故瑜伽七十三云問如是五事為攝一切法為不如是耶答曰如是問彼一切法以何為性答諸法性不言說問云何應觀彼諸法相答如幻事相非令無有乃至唯有名相可得無有自性問可言中不可言可說諸法不可說不可言中不可言如何諸法不可說答正立宗時不可言言亦已遮遣為令覺知如是義故方便施設譬喻等言問一切法不可言說如何世尊為他宣說答如瑜伽三十六說若不起言說則不能為他說一切法離言自他性亦不聞若無有聞即不能知此一切法離言自性為欲令他聞知諸法離言自性是故於此離言自性而起言說問一切言說皆依尋伺不答諸說不同親光師說八地已上不依尋伺而起言說以諸尋伺唯有漏故護法說云十地菩薩必假尋伺而起言說復說尋伺亦通無漏後得智問無分別智現在前時能說法不解云說亦無妨於一剎那二智並行於中無分別智非尋伺俱後所得智與尋伺俱起言說故依智度論第十七云菩薩常入禪定攝心不動不生覺觀亦能說法廣說如彼是故法涌由此道理當知勝義超過一切尋思境相釋曰第二結文應知法涌我說勝義絶諸表示尋思但行表示境界釋曰第四絶諸表示先釋後結此即釋也解節經云復次法上我說真實絶於四事謂見聞覺知一切覺觀緣四事起解云四事即所見等深密經中但云離諸言語而不說四事也此明勝義離名等故非見聞等四種境界之所表示所以者何見聞覺知皆是有漏戲論所攝勝義諦理非見聞等所取之境是故不可所見等事表示勝義問言說表示有何差別答非言所說非見聞等所表示境故有差別見聞覺知具如別章然此所說見聞覺知諸說不同薩婆多宗依六根說眼根名見耳根為聞三根名覺意根名知故雜心論第一卷云若眼隨生見耳界隨生聞三界隨生覺意界隨生識解云六根名隨生者謂眼等根皆有隨根生識同分所攝約同分根為見等體故約隨生以說見等俱舍亦爾故十六云何等名為所見相頌曰由眼耳意識並餘三所證如次第名為所見聞知覺廣說如彼大婆沙一百二十一云此中眼識所受名見耳識所受名聞三識所受名覺意識所受名知說四境故見聞覺知是根非識然舉識者顯眼等根必由識助方能了境以同分根能有作用非彼同分故問如何眼耳意三根各立為一雜心釋云彼三界以方便得離欲得修得神通性四支五支定果是故彼隨生各別建立餘三隨生無彼相分故共建立一廣如婆沙問如何鼻等三根合說為覺答雜心頌云境界唯無記覺心於中轉隨生三種識是則名為覺俱舍復云香味觸三無記性故如死無覺故能證者偏立覺名問第六意根設不生識得成同分亦得成知不爾羅漢最後念意應不成知而雜心云意界隨生識者欲顯有識之根且說隨生若細分別如順正理此二依經部宗有其三釋依成實論約三量等以辨見等故第十四八語品云問見聞知覺有何差別答曰有三種信見名現在信聞名信賢聖語知名比知覺名分別三種信慧此三種慧或皆是實或皆顛倒具如彼說六識之心得現境界名之為現故論說言見名現信不現境界藉教而知說之為聞故論說言聞名信於賢聖之語於彼不見不聞境界依前見聞譬度知者說之為知故論說言知名比知前三心後重分別心名之為覺云何分別先因見已後重思惟起於見想或忘前見起不見想此則是其見後覺也聞知後覺類亦可知然此覺心非直從於見及知三心後起其亦從於不見不聞不知後生先不見後忘不見生於見想此則是其不見後覺不聞不知生覺例然若依俱舍十六有二師說一云有餘師說若是五根現所證境名為所見若他傳聞說為所聞若運自心以種種理比度所許名為所覺若意現證名為所知於五境中一一容起見聞覺知四種言說於第六境除見有三具說如彼此師意說若是五根現量所證五境以分明故名為所見若依教量從他傳說六境名為所聞若依比量運自己心以種種理比度所許六境名為所覺若意識依現量證六境名為所知謂意識親從五識後起現量證五若在定意識現量證法或在定意現量六能通證六境先軌範師作如是說眼所現見名為所見從他傳聞名為所聞自運己心諸所思搆名為所覺自內所受及自所證名為所知解云此師意說眼現量所見名為所見所以唯眼名為見者色境顯現最分明故故眼唯見若依教量從他傳聞六境名為所聞若依比量自運己心諸所思搆名為所覺又依現量耳鼻舌身自內所受四境及意根現量自內所證六境但名所知若依此釋見唯在眼聞覺唯意知通耳鼻舌身意於六境中色境容起四種聲等五境容起聞覺知三今依大乘諸教不同依智度論第四十云眼識所知名為所見耳識所知名為所聞鼻舌身三識所知名為所覺意識所緣名為所知具說如彼依雜集論第一卷云見聞覺知義者眼所受是見義耳所受是聞義自然思搆應如是如是是覺義自內所受是知義又瑜伽第二卷云云何四種言說謂依見聞覺知所有言說依見言說者謂依眼故現見外色由是因緣為他宣說依聞言說者謂從他聞由此因緣為他宣說依覺言說者謂不見不聞但自然思搆稱量觀察由此因緣為他宣說依知言說者謂各別於內所受所證所觸所得由此因緣為他宣說所言見者自有三釋一云眼根名見故云眼所受是見義意同薩婆多一云眼識名見故瑜伽第二卷云謂依眼故現見外色而言眼所受是見義者識依眼故一云眼相及識名見故雜集云眼所受是見義又瑜伽云謂依眼故現見外色故知眼根及識以為見體問若爾如何雜集第二云問為眼見色為識等耶答非眼見色亦非識等以一切法無作用故由有和合假立為見又由六相眼於見色中最勝非識等是故說眼能見諸色六相如論問瑜伽五十六云約勝義道理非是眼等亦非彼識何以故諸法自性衆緣生故剎那滅故無作用故約世俗道理眼等最勝故可於彼假立見者具如彼說如何說言眼根及識二俱為見答為遮根識各別為見故言見等非根非識非遮根識和合名見是故根識俱名為見又解見聞覺知中見與見色見不同故不相違也若依智度論四法和合謂耳根耳識意識及聲和合名聞具說如彼所言聞者聞他所說聞思慧等以為自性此即意識相應心聚以為自性問若爾如何瑜伽說聞為聖言量答聖言量自有二種一聖者言教為聖言量此即聖言即量名聖言量是持業釋二聞慧等名聖言量此即聖言之量故言聖言量是依主釋瑜伽依此故說聞慧等為聖言量若自運己心自然思搆比量意識以為覺性若耳等四識及現量意識皆名為知故瑜伽云依知言說者謂各別於內所受所證所觸所得解云耳識名所受鼻舌二識名所證身識名所觸現量意識名所得或可耳等四識並取其根而雜集論但言自內所受是知義者攝所證等皆名內所受皆內現量受境同故問第七八識為見等不答據實為論第七末那非量攝故不立見等第八賴耶唯現量故攝在知中而大母經等且依六識故不說之若依瑜伽約三量義以辨見等故彼九十三云又即依止四種言說應知一切所依三量若見若知二種言說是依現量若覺言說是依比量若聞言說依至教量問眼等根是現量不若是現量如何理門論說此中現量謂無分別智若有正智於色等義離名種等若非現量何故雜集說云眼所受是見義瑜伽即云見是現量答此有兩解一云根非現量現量依故瑜伽等云色根現量一云有二種一是色根如瑜伽第十五云色根現量者謂五色根所行境界二即心等如理門論故說眼等亦名現量問八地已上聞諸聖教第六意識即是定心如何不說是現量耶解云有其二義一者現量得自相故或聖言量量聖言故問若爾如何陳那菩薩但立二量謂現量比量其聖言量比量所攝解云二菩薩宗其義不同故不可會釋文云陳那菩薩云聖言量是比量者約聖教說故不相違若依顯揚第十八言說差別約界分別謂欲界中具有四種言說色界無覺無推度故無色界中一切無有解云於欲界中具有見等及四言說於色界中據實應有微細推度而言無者約粗相說無色界中無別三種尋即可知論其知體據實亦有以微細故略而不說彼無言說義顯可知是故法涌由是道理當知勝義超過一切尋思境相釋曰第二結文可知法涌我說勝義絶諸諍論尋思但行諍論境界釋曰自下第五絶諸諍論相先釋後結此即釋也言諍論者謂我我所見於五蘊中執有真我而是真如離我我所非我見等諍論煩惱所行之處故名絶諸諍論真諦解云鬪諍二種一者在家於五塵境由思推煩惱故起鬪諍二出家人由相違所起諸見故生鬪諍依俱舍論第一卷云有漏名取蘊亦說名有諍長行釋云煩惱名取蘊從取生故名取蘊如草糠火或蘊屬取故名取蘊如帝王臣或蘊生取故名取蘊如華果樹此有漏法亦名有諍煩惱名諍觸動善品故損害自他故諍隨增故名為有諍猶如有漏依大毗婆沙第一百七十九云諍有三種一煩惱諍二蘊諍三鬪諍煩惱諍者謂百八煩惱蘊諍者謂死鬬淨者謂諸有情互相㥄辱言語相違雜心第一意亦同此依集論等以貪瞋癡為諍體性故第二卷云云何有諍幾是有諍為何義故觀有諍耶謂依如是貪瞋癡故執持刀杖發起一切鬪訟違諍故彼自性故彼相屬故彼所縛故彼所隨故彼隨順故彼種類故是有諍義乃至有漏有爾所量有諍亦爾雜集第三亦同集論然彼所說自性等者如有漏中說准即可知漏自性者諸漏自性漏性合故名為有漏漏相屬者謂漏共有心心法及眼等漏相應故漏所依故如其次第名有漏漏所縛者謂有漏善法由漏勢力招後有故漏所隨者謂餘地法亦為餘地諸漏粗重所隨逐故漏隨順者謂順決擇分雖為煩惱粗重所隨然得建立為無漏性以背一切有順彼對治故漏種類者謂阿羅漢有漏諸蘊前生煩惱所起故五取蘊十五界十處全及三界二處少分是有漏謂除最後三界二處少分聖道眷屬及諸無為非有漏或依瑜伽論一切煩惱皆名有諍故第八云煩惱差別者多種差別應知謂結縛隨眠乃至有諍等是故法涌由此道理當知勝義超過一切尋思境相釋曰第二結文可知法涌當知譬如有人盡其壽量習辛苦味於蜜石蜜上妙美味不能尋思不能比度不能信解釋曰自下第五舉喻重釋有其五喻喻上五法真諦三藏配五種樂以為五喻釋上五法言五樂者一出家樂二遠離樂三寂靜樂四正覺樂五涅槃樂五樂次第者唯涅槃樂是最真實所餘四樂是方便方便有四初出家樂是涅槃緣起由信根成次遠離樂是涅槃資糧由精進根成三寂靜樂是涅槃道依止即涅槃緣由定根成四正覺樂是涅槃正道由慧根成念根通此四處皆諸憶念故由是四方便次第得涅槃常樂我淨今解此經依瑜伽等無惱害樂所攝四樂開為五樂以釋此經言四樂者一出家樂二遠離樂三寂靜樂四菩提樂解云第四菩提樂中開為二種一菩提樂二涅槃樂故瑜伽論三十八云二智二斷皆名菩提善戒經地持論亦同瑜伽又涅槃二十五云諸佛如來有二種樂一寂滅樂二覺知樂今先辨五種樂義後方便釋文五種樂義具如別章就釋文中依五種樂喻上五相即分為五一出家上味勝樂喻二遠離五欲妙樂喻三賢聖默然靜樂喻四滅諸表示寂靜喻五離諸諍論覺樂喻此即第一出家上味勝樂喻言譬如有人等者如人一生常食苦味於石蜜味不能尋思比度信解在家亦爾久在生死恆習在世間憂苦粗味於出家樂妙梵行味不能尋思比度信解故瑜伽云正信捨家趣於非家解脫煩籠居家迫迮種種大苦名出離樂又涅槃云居家迫迮喻如牢獄一切煩惱由之而生出家寬曠猶如虗空一切善法由之增長若在家不得盡壽淨修梵行我今應剃除𩯭髮出家修學無上菩提又智度論第三卷云孔雖有色嚴身不如鴻鴈能遠飛白衣雖有富貴力不如出家功德勝然此出家自有二種一形出家如上所說二心出家如維摩云雖為白衣奉持沙門清淨律行雖處居家不著三界示有妻子常修梵行又彼復云但發阿耨多羅三藐三菩提心是即出家是即具足依成實論有其四句謂有僧威儀無僧德無僧威儀有僧德有僧威儀有僧德無僧威儀無僧德尋思即可知此喻意云尋思比度信解世間三智但得有漏粗境之味未得出世三無漏根自內所證真如妙樂真諦三藏亦同此意解節經云覺觀比度憶念深密經云不能覺不能量不能信思也或於長夜由欲貪勝解諸欲熾火所燒然故於內除滅一切色聲香味觸相妙遠離樂不能尋思不能比度不能信解釋曰第二遠離五欲妙樂喻此即四種樂中遠離樂也故瑜伽云斷除諸欲惡不善法證初禪慮離生喜樂名遠離樂如何此中初後具說譬如等言中三略者此即如來文辭善巧也或可為存略故餘二本經皆具說者譯家別故或可梵本有此不同言長夜者謂生死長夜言欲貪者欲貪即是十煩惱中貪欲為性言勝解者即別境中勝解為體此中舉欲意取勝解言諸欲熾火所燒然故者此有兩釋一云諸欲即是色等五境五境非一能生貪欲故說五境名為諸欲熾火即是五境上貪能損害故名為熾火故智度論云若人貪著五境諸結使火盡皆熾然燒害人身如火燒人又十四云有捕魚師名𪫟波伽求欲不遂憂恨懊惱淫火內發自燒而死廣說如彼若依此釋諸欲之熾火故言諸欲熾火即六釋中依主釋也一云諸欲即五境中貪即說五貪名為熾火故智度論云五欲燒人如逆風執炬即六釋中持業釋也言於內除滅等者內謂內定簡外散亂名之為內於內除滅一切聲香味觸相妙遠離樂者此明初靜慮定相應樂受遠離欲界五境上貪遍身怡適故言妙遠離樂據實初定具離五蓋貪蓋是初舉初顯後也廣釋五欲五蓋過患如智度論第十七卷若依薩婆多宗入根本定唯喜非樂今依大乘一剎那喜令心適悅名之為喜令身怡適名之為樂如顯揚說故說初定亦名為樂此喻意說由引貪欲勝解勢力於五欲境上起貪火故於離五境初靜慮樂不能了知如是有尋思者不能了知離色等相無相真如或於長夜由言說勝解樂著世間綺言說故於內寂靜聖默然樂不能尋思不能比度不能信解釋曰第三賢聖默然寂靜樂喻此即四種樂中寂靜樂也故瑜伽云第二靜慮已上諸定尋伺止息名寂靜樂諸教中說三種法能成三行一者身行謂出入息成身之行故名身行入第四定能滅身行二者語行所謂尋伺發語之行名為語行第二靜慮即能除滅大小乘教皆作此說第二靜慮已上諸地無尋伺故將欲發語皆依下地尋思而說三者心行謂受想等助心之行名為心行若無心所心不行故入滅定時能滅心行今於此中約言行說二定已上無尋伺故不能發言不發言故名為寂靜聖默然樂此中意說有尋伺者樂著世間綺言說故不能了知二定已上聖默然樂如是有尋思者由尋思力行言說境而不能說離言法性寂靜真如或於長夜由見聞覺知表示勝解樂著世間諸表示故於永除斷一切表示薩迦邪滅究竟涅槃不能尋思不能比度不能信解釋曰第四絶諸表示寂樂喻此即四種樂中菩提樂也故瑜伽云一切煩惱畢竟離繫於所知事如實等覺名菩提樂又彼復云無惱害樂所攝最後三菩提樂由當來世此勝義苦永寂滅故於現法中附在所依諸煩惱品一切粗重永寂滅故說名為樂解云依瑜伽論明菩提樂自有二種一唯智非滅如前所引文二唯滅非智如後所引文也今依此經取滅非智不同真諦舉滅取智言表示者如上所說見聞覺知四種表示薩迦邪者此是梵音依薩婆多薩名為有迦邪名身彼五蘊身有實體故依經部宗薩名虗僞迦邪名身彼宗五蘊是虗僞故今依大乘無性攝論同經部說故第十云迦邪名身虗僞名薩其身虗僞名薩迦邪世親釋云即說三界名薩迦邪五蘊釋論云薩謂敗壞義迦邪謂和合積聚義若廣分別如雜心第四俱舍十九順正理四十七婆沙第八及四十九成實十六增一阿含十五瑜伽第八顯揚十五梁論十五涅槃經二十五言涅槃者若具梵音應言波利䁥縛喃此云圓寂今順舊說故言涅槃於此涅槃有其二義一永斷一切見等表示二薩迦邪滅究竟涅槃此即是其無餘涅槃究竟永滅五蘊身故名為究竟涅槃問此涅槃依何乘說解云依彌勒宗三乘皆有無餘涅槃後當分別解節經云絶四事處滅離身見是般涅槃者譯家謬也深密經云內身寂滅離見聞覺知樂解云深密意同此經配五樂中何樂此中意說於生死長夜由表示勝解樂著世間諸表示故不能了知永寂之樂如是有尋思者但行表示境界不能尋思勝義諦相絶表示境法涌當知譬如有人於其長夜由有種種我所攝受諍論勝解樂著世間諸諍論故於北拘盧洲無我所無攝受離諍論不能尋思不能比度不能信解釋曰第五離諸諍論覺樂喻此即四種樂中菩提樂也故瑜伽云一切煩惱畢竟離繫於所知事如實等覺名菩提樂此即取智非滅不同真諦取滅非智謂有諍論諸勝解者樂著世間自所攝受父母妻子兄弟朋友及庫藏等攝受事故不能了知北洲有情無妻子等攝受諍論如是為尋思者但行煩惱諍等為諍論境不能尋思勝義諦相無煩惱等離諍論境解節經云譬如有人由恆畜財樂行征伐北單越無我所無積畜不相鬪諍樂不能比度深密經云如人長夜取我我相不能知北單越無我我所樂今依唐本云拘盧此云勝處或云勝生如是法涌諸尋思者於超一切尋思所行勝義諦相不能尋思不能比度不能信解釋曰第六舉法同喻謂諸尋思行相粗故不能了知勝義諦理釋其合喻如上應知爾時世尊欲重宣此義而說頌曰釋曰就釋超過尋思相中文別有二初長行廣釋後以頌略說上來已釋長行自下舉頌略說於中有二初略標頌意彼舉頌正釋此即初也內證無相之所行不可言說絶表示息諸諍論勝義諦超過一切尋思相釋曰此即第二舉頌略說有一頌文分之為二初有二句四字別頌五相後三字一句通頌五相言內證者頌第一相無相之所行者頌第二相不可言說者頌第三相絶表示者頌第四相息諸諍論者頌第五相後勝義等三字一句通頌五相如文可知爾時善清淨慧菩薩摩訶薩白佛言世尊甚奇乃至世尊善說釋曰自下第三釋超過諸法一異性相於中有二初長行廣說後以頌略說就長行中復分為五一菩薩問二爾時下如來正答三喻四合五結此即問也於中有三初贊凡善說次顯衆諍論後世尊我見下申己疑情讚善說中復分為二初讚佛善說後略申善說此即初也爾時者發問時言善清淨慧菩薩者從慧立名正智後得是善無漏離諸染汙故名善清淨慧深密亦同解節經云淨慧菩薩真諦解云此菩薩位居九地善答問常轉法輪在淨慧位復有淨慧復能生他淨慧故名淨慧具說如彼謂佛世尊自有二德所謂自利利他初贊自利故言世尊甚奇復贊利他故言世尊善說若依瑜伽甚奇善說通自利利他故四十六云有五甚希奇法一者於諸有情非有因緣而生親愛二者唯為饒益諸有情故常處生死三者於多煩惱難伏有情善能解了調伏方便四者於極難解真實義理能順悟入五者具不可思議大威神力解云彼說菩薩德准釋佛德於理無違尋即可知言善說者如瑜伽論第七十云由二因緣佛世尊法名為善說一言詞文句皆清美故二易可通達故難解法由佛說故易可通達也又八十三云言善說者道理相應故任持勝德故又瑜伽九十四云由四種相佛所說教名為善說具釋如彼謂世尊言勝義諦相微細甚深超過諸法一異性相難可通達釋曰第二略申善說謂佛世尊無上依經等作如是說勝義諦相乃至難可通達真諦解云或約三人非凡所知故名微細非二乘所知故名甚深非地前菩薩所能證見故名難可通達或約三義真如與行不一故微細不異故甚深過一異故難可通達又非聞慧境故名微細非思慧境故說甚深非凡夫二乘初學菩薩修慧境故說難可通達解云真諦三釋第三為勝故大般若五百六十七云真如法界是出世般若及後得無分別智境非三慧境所以者何實相般若甚深微妙聞慧粗淺不能得見是勝義故思不能量出世法故修不能行世尊我即於此曾見一處有衆菩薩等正修行勝解行地同一會坐皆共思議勝義諦相與諸行相一異性相釋曰自下第二顯衆諍論於中有二初總明共集諍論後別敘三計此即初也言我即於此者於此娑訶世界或可於此贍部洲中餘二本中皆闕此言曾見一處即王舍城等而非淨土勝解行地諸菩薩衆所集處故勝解行地即是地前初僧祗位是故大唐攝大乘云論曰謂勝解行補特伽羅經初大劫修行圓滿又梁攝論第十一云願樂行人自有四種謂十信十解十行十回向菩薩聖道有四方便故有四人如須陀洹道前有四方便此四種人名願樂地第一僧祗修行圓滿然此地名略有四種一願樂地如梁攝論及解節經二信行地如深密經三勝解行地如唐攝論瑜伽地持及善戒經四意樂地如瑜伽論意樂品等如何地名有此異者謂此地名略有二種一者總名梵音阿世邪此云意樂欲信勝解三法為性故瑜伽等名為意樂二者別名有三種一名願樂即是樂欲之異名也五別境中欲為自性故唯識云樂欲謂欲二名信行善十一中信為自體故智度論云佛法大海信為能入智慧能度三名勝解行亦別境中勝解為性是故無性攝大乘云勝解行者未證真如但依勝解勤修諸行又復彼云一得勝解謂得諸地深信解者於他教法決定印可真實如是於此地中未證真如有此諍論也於此會中一類菩薩作如是言勝義諦相與諸行相都無有異釋曰自下第二別敘三計即分為三此即初計離諸法外無別勝義勝智所緣故名勝義俗智所緣名為世俗一類菩薩復作是言非勝義諦相與諸行相都無有異然勝義諦相異諸行相釋曰此即第二師計離諸法外有別勝義條然別體有餘菩薩疑惑猶豫復作是言是諸菩薩誰言諦實誰言虗妄誰如理行誰不如理或唱是言勝義諦相與諸行相都無有異或唱是言勝義諦相異諸行相釋曰第三師計於上二說猶豫不決非別有計今於此中合有四計所謂一異及與俱非所以者何亦一亦異是相違諦非一非異是戲論故而此經意為存略故准可知故且破一異然此所說一異二執十散動中一異執也對治如是一異分別諸教不同若依世親攝大乘釋第四卷云為對治一性散動故即彼經言色空非色何以故若依他起與圓成實是一性者此依他起應如圓成實是清淨境此約依他色對圓成空破彼一執為對治異性散動故即彼經言色不離空何以故此二若異法與法性亦應有異若有異性不應道理如無常法與無常性此亦約依他色對圓成空破彼異執若取遍計所執自性色即是空空即是色何以故遍計所執色無所有即是空性此性即是彼無所有非如依他起與圓成實不可說一此約所執色對所執空破彼異執梁論第五同世親論若依無性攝論第四色空非色同世親論以依他色對圓成空破彼一執色不離空等約所執色對所執空破彼異執雜集十四色空非色約所執色對圓成空破彼一執色不離空等約所執色對所執空破彼異執莊嚴第五但配經文而不解釋今此經意約依他起對圓成實破一異執同世親初釋故成唯識第八卷云此圓成實與彼依他起非異非不異異應真如非彼實性不異此性應是無常彼此俱應淨非淨境則本後智用應無別云何二性非異非一如彼無常無我等性無常等性與行等法異應彼法非無常等不異此應非彼共相由斯喻顯此圓成實與彼依他非一非異廣辨一異如後當說世尊我見彼已竊作是念是諸善男子愚癡頑鈍不明不善不如理行於勝義諦微細甚深超過諸行一異性相不能解了說是語已釋曰第三申己疑情言愚癡者出無明體言頑鈍者辨無明用謂善清淨慧菩薩作如是念此諸善男子由無明故頑鈍由頑鈍故有其三用一不明者未得未知根故二不善者未得未知根故三不知理者未得具知根故由此未證非一異相勝真如理爾時世尊告善清淨慧菩薩摩訶薩曰善男子如是如是如汝所說此諸善男子愚癡頑鈍不明不善不如理行於勝義諦微細甚深超過諸行一異性相不能解了釋曰自下第二如來正答於中有五一如來印可二菩薩徵詰三如來略答四菩薩重徵五如來廣釋此即第一如來印可重意如是准上應知何以故釋曰第二菩薩徵詰徵詰之意以何義故不能解了善清淨慧非於諸行如是行時名能通達勝義諦相或於勝義諦為得作證釋曰第三如來略答此答意者非於諸行如是執著與勝義諦或一或異而能通達或得作證有多過故失相如後當說然此通達作證了別者知勝義名為通達能得涅槃及菩提果名為作證又無間道名為通達其解脫道名為通達亦名作證證無間為故又後得智名為通達其正體智名為作證故大般若五百六十七云世尊云何能證能得如是法界佛言出世般若及後得所得無分別智能證能得世尊證得義有何異佛言出世般若能如實見故名為證後智通達故名為得然此作證且依薩婆多宗以其聖道對無為法有兩重四句一多念四句二一剎那四句多念四句者一身證慧不證謂緣三諦解脫道時證無為故名為身證不緣滅故名慧不證二慧證身不證謂緣滅諦無間道時緣無為故名為慧證未得滅故名身不證三身慧俱證謂緣滅諦解脫道時慧緣無為及得滅故四身慧俱不證謂緣三諦無間道時慧不緣滅未得滅故一剎那四句者且如以滅法智得一來果時一剎那中有其四句一身證慧不證謂上二界見所斷惑所得無為以得果時頓得彼故二慧證身不證謂欲界九品中後三修所斷惑所得無為慧雖能緣而未得故三身慧俱證謂欲界修所斷中斷前六品及欲界見四諦所斷諸惑所得無為四身慧俱不證謂上二界修所斷惑所證無為何以故釋曰此即第四菩薩重徵甚深所由善清淨慧若勝義諦相與諸行相都無異者釋曰自下第五依徵廣釋有三復次即分為三初約三五過破一異執次善清淨慧若勝義諦相與諸行相都無異者下約淨共相破一異執後善清淨慧若勝義諦相與諸行相都無異者下約行無別及無我等破一異執就初復次分為二初反釋破執後善清淨慧下順釋破執或可初就宗隨情破後約義隨理破就返破中復分為二初約三失以破一執後約五失破其異執破一執中先牒後破此即將破牒彼一執也應於今時一切異生皆已見諦釋曰此即第二正以三過破彼一執三過失者一異生已見諦理失二已得涅槃失三已得菩提失此即第一異生已見諦理失謂汝若許諸行即理異生見色應則見理色則理故又諸異生皆應已得無上方便安穩涅槃釋曰此顯第二異生應證涅槃失無上方便即是道諦無漏聖道言涅槃者略有四種一者本來自性清淨二者有餘三者無餘四者無住處後當分別今於此中約有餘依及無住處本來清淨元來有故其無餘依身已滅故或可此中亦依無餘滅有漏依得無餘故舉方便道顯涅槃果故言無上方便安穩涅槃也或應已證阿耨多羅三藐三菩提釋曰此顯第三異生應證菩提失菩提言者此是梵音此地翻譯新舊不同一云阿之言無耨多羅云上三名正藐之言真後三名正菩提曰道總言無上正真正道一云阿之言無耨多羅云上三名正藐之言遍後三云知菩提名覺如理智緣真名正如量智緣俗言遍無分別智斷二無知名知菩提出眠夢之表稱之曰覺此四智是菩提體超二乘果故名無上總云無上正遍知覺大唐三藏釋云阿之言無耨多羅云上前三名正藐之云等後三言正菩提名覺無法可過故名無上理事遍知故云正等離妄照真故曰正覺即是無上正等正覺此意釋云若無異者諸異生類皆已了知色等行相亦應了知勝義諦相與餘行相無別異故由斯應證無上菩提既不證得故知非一也若勝義諦相與諸行相一向異者釋曰自下第二約五種失破其異執於中有二先牒後破此即將破先牒異執也謂勝義諦與諸行相條然異者應有五失已見諦者於諸行相應不除遣釋曰自下第二別顯五失言五失者一已見諦者行相不遣失二相縛不脫失三粗重縛不脫失四不證涅槃失五不證菩提失此釋第一行相不遣失言行相者行謂見分能緣行解相是相分此即行之相故名為行相此依主釋或可行相者行謂生滅遷流不住相即體相此破意云若勝義諦與諸行相一向異者已見諦者於諸行相不應除遣以勝義諦與行異故然能除遣故應非異問見勝義時如何能遣依他起相解云真如觀時衆相不現故說除遣非如所執無自性故名之為遣准何得知如成唯識第九卷說四善根觀行頌云現前立少物謂是唯識性以有所得故非實住唯識長行釋云以彼空有二相未除帶相觀心有所得故具說如彼又瑜伽云極善定心第四靜慮順決擇分未遣諸相未脫二縛故知此云除遣相者空有相分通名為相若不除遣諸行相者應於相縛不得解脫釋曰第二不斷相縛失謂不了知如幻事故諸心心所於所緣相不得自在故說相分名為相縛此見諦者於諸相縛不解脫故於粗重縛亦應不脫釋曰第三不斷粗重失謂於相縛不自在故諸粗重縛亦應不斷然此二縛諸說不同大唐三藏云西方諸師自有兩說一云一切有漏相分以為相縛謂由有漏相分力故見分心等不能了知諸有漏法皆如幻等非有似有由無明故便執實有色心等法若依此釋即相是縛故名相縛即六釋中持業釋也即相分上能縛諸惑名粗重縛行相粗故此亦持業准上應知總說意者所緣相分名為相縛能緣見分貪等諸惑名粗重縛是故瑜伽五十一云亦能通達阿賴耶識外為相縛所縛內為粗重縛所縛具說如彼一云相縛即末那識以為自性此意說云由末那識相應四惑勢分力故六識中惑於諸相分不能了知如幻事等故說末那名為相縛若依此釋相謂相分縛即末那相之縛故名為相縛即六釋中依主釋也言粗重縛自有二種一六識中惑名為粗重義如上說二者煩惱所知二障勢力令諸有漏五蘊等法無所堪任即說此為粗重縛也今於此中說前非後也有云粗重縛者諸煩惱見分種子相縛即是煩惱相分種子又現起相見亦是二縛若依三無性論有兩節文故彼上卷云分別性名為相惑依他起性名粗重惑故上卷云次辨相惑粗重惑若分別性起能為二惑繫縛衆生一者相惑二粗重惑相惑即分別性粗重惑即依他性故此二惑所以得立者於依他起性中執為分別性故得立釋曰呼分別性為相惑者相謂相貌說相貌惑能為惑緣故說為惑但依他性是正惑而說輕重者分別性但是惑緣說惑故名為輕依他起性正是惑體故說粗重同顯揚論故彼第十六云是依他起自性以相及粗重為體云何說為依他起由此二種更互為緣而得生故謂相為緣起於粗重粗重為緣又能生相依梁攝論第四卷云結有二種一相結二粗重結相結難解粗重結難滅心分別諸塵名相結由此分別起欲瞋等惑說名粗重結若得無分別智即解相結相結不起粗重結即隨滅真諦解云相結即是分別執相謂一切六識心識所緣外境是有未達此並是自心分別所作故若見相並是分別所作欲瞋等則無從即生大唐世觀論都無此文也勘大業本依解節經云衆相繫縛粗重繫縛又復下云相結粗重惑真諦記云五識境名相繫縛意識境名粗重繫縛又衆相繫縛即分別性粗重繫縛謂依他性又解一切苦諦名衆相繫縛由解脫得離故一切集諦名粗重繫縛由道所滅故廣說如彼深密經云相縛煩惱縛若廣分別義如別章由於二縛不解脫故已見諦者應不能得無上方便安穩涅槃釋曰第四不證涅槃失准上應知或不應證阿耨多羅三藐三菩提釋曰第五不證菩提失准上應知善清淨慧由於今時非諸異生皆已見諦釋曰自下第二順釋道理破一異執於中有二初舉無三失破彼一執後善清淨慧下約無五失破彼異執此之二義翻上可知就舉無三失中文別有二先釋後結此即釋也於中釋無三失即分為三此即第一釋非已見諦如文可知非諸異生已能獲得無上方便安穩涅槃釋曰第二明證涅槃如文可知亦非已證阿耨多羅三藐三菩提釋曰第三非證菩提破其一執可知是故勝義諦相與諸行相都無有異不應道理釋曰自下第二結破一執於中有二初以理總結後牒計重結此即初也謂上所說反順釋故彼執一計不應道理若於此中作如是言勝義諦相與諸行相都無異者由此道理當知一切非如理行不如正理釋曰此即第二牒計重結謂由上說反順釋故彼計一執及所執義不應正行及正理也善清淨慧由於今時非見諦者於諸行相不能除遣然能除遣釋曰自下第二五種順釋道理破彼異過於中有二先釋後結此即釋也釋五無失即分為五此即第一顯除遣相破彼異執謂諸聖者如實了知如幻事等無實性故非見諦者於諸相縛不能解脫然能解脫釋曰此顯第二能除相縛如實了知無異相故非見諦者於粗重縛不能解脫然能解脫釋曰第三除粗重縛斷相縛故以於二鄣能解脫故亦能獲得無上方便安穩涅槃釋曰此顯第四能證涅槃斷二縛故或有能證阿耨多羅三藐三菩提釋曰此顯第五能證菩提斷鄣盡故是故勝義諦相與諸行相一向異相不應道理釋曰此下第二結異過失於中有二初以理總結後牒計重結此即初也若於此中作如是言勝義諦相與諸行相一向異者由是道理當知一切非如理行不如正理釋曰此即第二牒計重結謂由前說五過失故勝義諸行不可言異善清淨慧若勝義諦相與諸行相都無異者如諸行相墮雜染相此勝義諦相亦應如是墮雜染相釋曰自下三復次中第二復次約淨共相破彼一異於中有二初釋後結釋中有二初反解順釋前中有二初約墮雜染相破彼一執後約共相破其異執此即初也謂勝義諦應墮雜染與諸行相都無異故猶如雜染善清淨慧若勝義諦相與諸行相一向異者應非一切行相名勝義諦相釋曰第二約共相義破其異執謂一切法皆有二相一者自相如說色是質礙為相識為了別以不遍故名為自相二者共相謂一切法無我性等真如勝義遍諸法故名為共相今破異執若勝義諦異諸行相應非諸行共相與彼諸行一向異故善清淨慧由於今時勝義諦相非墮雜染相諸行共相名勝義諦相釋曰此即第二依順道理破一異計如經應知是故勝義諦相與諸行相都無異相不應道理勝義諦相與諸行相一向異相不應道理釋曰自下第二結一異過於中有二初以理雙結後牒計重結此即雙結若於此中作如是言勝義諦相與諸行相都無有異或勝義諦相與諸行相一向異者由此道理當知一切非如理行不如正理釋曰第二牒計重結一異執過善清淨慧若勝義諦相與諸行相都無異者如勝義諦相於諸行相無有差別一切行相亦應如是無有差別釋曰自下第三復次約行無別及無我等破其一異於中有二先破後結前中有二初反解顯失後善清淨慧下順釋顯過前有二初約二相破無異過後約二相破一向異前中有二初約諸行差別破無異過後約更求勝義破無異執此即初也謂若勝義與蘊處等無別異者蘊等應無蘊處等異修觀行者於諸行中如其所見如其所聞如其所覺如其所知復於後時更求勝義釋曰第二更求勝義破無異執謂若勝義與諸行相都無異者所見等境如其所見其義已了不應後時更求勝義既求勝義故知非一見聞覺知義如前說若勝義諦相與諸行相一向異者應非諸行唯無我性唯無自性之所顯現是勝義相釋曰自下第二約唯無我等破一向異於中有二初約唯無我等破一向異後約非別相成立破一向異此即初也謂世尊說一切諸法皆唯無我或說諸法皆無自性故知勝義與一切行非一向異一向異者應非諸行唯無我性唯無自性之所顯現又應俱時別相成立謂雜染相及清淨相釋曰此即第二非別相立破一向異然釋此文自有諸說有說又應俱時別相成立等者除遣名等五事影像證無相真如是故證無相時諸相不顯現若諸相顯現時無相不顯現是故不應俱時成立若如汝說一向異者即應俱時別相成立各別體故如色聲等有說又應俱時別相成立染淨二法所以者何勝義與行調然異故是則見淨時應不除染見染時應不障淨有說勝義與行一向異者即應俱時別相成立一切諸法本染本淨然經但說其性本淨故知諸行與勝義諦非一向異也或可不應說言俗即是真真即是俗調然異故真諦有釋恐繁不述善清淨慧由於今時一切行相皆有差別非無差別釋曰自下第三順釋道理破彼一異於中有二初約二相破彼不異後約二相破一向異前中二相即分為二此即第一約差別體破彼無異修觀行者於諸行中如其所見如其所聞如其所覺如其所知復於後時更求勝義釋曰第二更求勝義破彼不異如文可知又即諸行唯無我性唯無自性之所顯現名勝義相釋曰自下第二約二種相破一向異此即第一唯無我性所顯義故破一向異也又非俱時染淨二相別相成立釋曰此即第二約非別相立以破一向異如契經云一切諸法皆唯本清淨故是故勝義諦相與諸行相都無有異或一向異不應道理釋曰自下第二結破二失於中有二初以理總結後牒計重結此即第一總破一異若於此中作如是言勝義諦相與諸行相都無有異或一向異者由此道理當知一切非如理行不如正理釋曰此即第二牒計重結結破一異如文可知佛性論第二三無性論第二瑜伽七十二真如與相若一若異皆有三過佛性論第四約法約人破真與俗若一若異恐繁不述善清淨慧如螺貝上鮮白色性不易施設與彼螺貝一相異相釋曰自下第三舉喻重釋有十種喻即分為十雖有十義如其次第約六境說初二約色次一約聲次一約香次二約味次二約觸後二約法此即第一螺貝白色一異喻梵音傷佉此云螺貝謂彼螺貝喻諸行相四塵異故鮮白色性喻勝義諦色性通故由如螺貝與鮮白色不可言一四塵色性總別異故或可通別異故不可言異無別體故真諦記云第三喻說為顯利鈍兩種方便若但說義不立譬者唯利能入鈍不能入若具足說義喻二種利鈍俱入故借淺事以顯深理此中具舉六塵為譬若解一種餘類可知傷佉即是白色螺也白色與螺若言一者則但色是螺餘三塵四大皆應非螺又如白色唯眼境界螺亦應爾又如白色通餘諸物螺亦應爾螺既不通白色亦爾不應通物無此義故不可言一若言異者義亦不可見其白色不應通螺體別異故又此白色應無所依不關螺故又應此螺不具八物與色異故赤色與金乃至於觸例皆如是具說如彼深密經云譬如珂白不可言一異解節經云譬如傷佉白色不可言一異如螺貝上鮮白色性金上黃色亦復如是釋曰此即第二金與黃色一異喻例前可知如箜篌聲上美妙曲性不易施設與箜篌聲一相異相釋曰此顯第三箜篌聲曲一異喻謂聲與曲不可言一總別異故聲是總曲是別或可聲曲異故不可言異無別體故若依深密箜篌與聲辨非一異若依彼經箜篌是總具五塵故聲是其別是一分故解節亦同故彼經云如毗拏音聲不可言一異真諦記云毗拏者是音樂器此間毗巴大略相似如黑沉上有妙香性不易施設與彼黑沉一相異相釋曰第四沈與妙香一異喻沉與妙香不可言一總別異故不得言異無別體故深密經云沉水香味不可言一異解節經云如沉香香氣不可言一異也如胡椒上辛猛利性不易施設與彼胡椒一相一異釋曰第五胡椒辛味一異喻椒與辛味不可言一總別異故不得言異無別體故深密經云畢鉢辛味不可言一異解節經云摩梨遮與辛辣味不可言一異如胡椒上辛猛利性訶利淡性亦復如是釋曰第六訶梨淡味一異喻准上應知深密經云訶梨勒苦味不可言一異解節經云呵梨勒澀如蠧羅綿上有柔耎性不易施設與蠹羅綿一相異相釋曰第七綿與柔耎一異喻蠹羅綿者相傳說是蒲柳華也綿與耎觸不可言一總別異故不得言異無別體故深密經云兜羅柔軟解節經云綿纊柔軟如熟蘇上所有醍醐不易施設與彼熟蘇一相異相釋曰第八熟蘇醍醐一異喻雖舉醍醐意取滑觸蘇與醍醐不可言一總別異故不可言異無別體故真諦記云蘇與醍醐但舉其觸不談其味深密解節亦同此經又如一切行上無常性一切有漏法上苦性一切法上補特伽羅無我性不易施設與彼行等一相異相釋曰第九理事一異喻言一切行無常性者行謂一切有漏無漏四相所遷故名無常故涅槃云諸行無常是生滅法一切有漏法上苦性者諸有漏法粗重所隨說名為苦如對法說一切法上補特伽羅無我性者一切法言總攝有為無為諸法補特伽羅者此云數取趣以諸有情隨善惡業數取諸趣名數取趣舊云人者譯家謬也然無我義有其二種一者生空二者法空今於此中說前非後故云補特伽羅無我性也問理有四種何為說三而不明空答今於此中顯三法印謂有漏者皆悉是苦諸有為者皆是無常遍一切法悉皆無我空無所印故此不論此中意云無常等性與行等法不可言一事理別故不可言異無別體故是故世親三十頌云依他起自性分別緣所生圓成實於彼常遠離前性故此與依他非異非不異如無常等性非不見此彼護法釋云此圓成實與依他起非異非不異異應真如非彼異性非異此性應是無常彼此俱應淨非淨境即本後智用應無別云何二性非異非一如彼無常無我等性無常等性與行等法異應彼法非無常等不異彼應非彼共相由斯喻顯此圓成實與彼依他非一非異法與法性理必應然勝義世俗相待有故又如貪上不寂靜相及雜染相不易施說此與彼貪一相異相如於貪上於瞋癡上當知亦爾釋曰此即第十煩惱性相一異喻謂貪瞋癡性皆有二相一者自相謂貪瞋等性各別故二者共相謂雜染等皆共有故共相有二一不寂靜相以囂動故二雜染相相應所緣二縛雜故謂彼貪等性相別故不可言一相離貪等無別體故不可言異問貪瞋等一一皆有不寂滅相及離染相諸宗共許法處所攝然此所說一切行與無常等共相道理應通十二如何此經唯法處攝解云薩婆多宗說一切行及無常等一一皆通十二處攝然彼法處唯別非總謂受想行三種無為及無表色如是七種餘十一處所不攝故依經部宗法處有二一別二通若別法處大同薩婆多而差別者彼宗無作非色非心通法處者彼宗十二皆名法處第六意識所緣境故今依大乘大同經部通別二種皆名法處故成唯識第五卷云色等五識唯了色等名色等識法識通能了一切法故名法識或能了別法獨得法識名解云准此大乘法處具有二種今於此中據實為論一切行等通十二處此經且依意識所緣及通法處二種義故一切行等皆名法處如是善清淨慧勝義諦相不可施設與諸行相一相異相釋曰此即第四舉法同喻如文可知善清淨慧我於如是微細極微細甚深極甚深難通達極難通達超過諸法一異性相勝義諦相現正等覺現正等覺已為他宣說顯示開解施設照了釋曰此即第五結通外疑謂佛所說甚深勝義如何了知故佛說言我於如是超過諸法一異性相成等正覺為他宣說然此勝義超過十信已前外異生境非彼所說非彼所思故言微細極微細又過地前內異生位非言所及非思所思故言甚深極甚深或過等覺已下諸菩薩位非言所說非心所及故言難通達極難通達又解過三僧祗所說所思故說六句如是等義如理應思也爾時世尊欲重宣此義而說頌曰釋曰自下第二舉頌略說於中有二初發起頌文後舉頌略說此即初也行界勝義相離一異性相若分別一異彼非如理行衆生為相縛及為粗重縛要勤修止觀爾乃得解脫釋曰自下第二舉頌略說於中有三初之二句歎理甚深次有四句顯執有失後之二句明修得果言行界者行謂遷流有為諸行界是性義自有二說一云有為自性名之為界一云諸行皆以真如為自性故名為行界即以行界為勝義也次有四句顯執有失謂執一異等皆非如理非如理故二縛所縛二縛之理如上已說後有二句明修得果謂迷執者要修止觀方得解脫梵音名奢摩他此翻名止體即定止息散亂名之為止梵音毗鉢舍那此云觀也體即是慧審察諸法名之為觀後瑜伽處當廣分別解脫即是有為無為二種解脫有為解脫者即是心慧二種解脫無為解脫即是無為四種涅槃此意說言若欲斷除二種縛者要經三大阿僧祗劫勤修止觀方可解脫二種縛也瑜伽五十九意同此經故彼論云復次云何能斷煩惱云何當言已斷煩惱謂修奢摩他故修毗鉢舍那故能斷煩惱若諸相縛已得解脫諸粗重縛亦得解脫當言已斷一切煩惱如世尊言相縛縛衆生亦由粗重善縛雙修止觀方乃俱解脫
