body:
  text: 西明寺沙門圓測撰地波羅蜜多品第七之餘觀自在菩薩復白佛言世尊何因緣故波羅蜜多説名波羅蜜多釋曰自下第八波羅蜜多得名門先問後答此即第一菩薩請問何因緣故名波羅蜜多釋總別名已如上説今問因緣何義故得波羅蜜名佛告觀自在菩薩曰善男子五因緣故釋曰第二世尊正説於中有四一標章舉數二依數列名三次第別釋四逐難重釋此即第一標章舉數由五相故名到彼岸相續但言五種深密云五義一者無染著故二者無顧戀故三者無罪過故四者無分別故五者正回向故釋曰第二依數列名相續經曰無閡無顧無過無忌想回向深密經云不著不希望無過不分別回向顯揚第三但列其名而不解釋故彼論云施度與五功德相應名到彼岸一無著故捨二不觀故捨三無失故捨四無分別故捨五回向故捨如施如是戒乃至慧應知亦爾無染著者謂不染著波羅蜜多諸相違事釋曰自下第三次第別釋列五緣即分為五此即第一無染著相謂違六度六相違障名相違於彼相違無染著故廣釋六障如下經説依瑜伽論第七十五與此經同故彼論云謂諸菩薩所有布施略與五種功德相應得入布施彼岸數也何等為五一者無著二者無戀三者無罪四者無分別五者回向如施戒等當知亦爾無著者謂於一切種施等障法中無有罣礙相續經云無閡者謂於波羅蜜相違事不染著深密經云無著所謂不著諸波羅蜜相違事梁攝論第九卷云一無著清淨謂不起與波羅蜜相違法無顧戀相者謂於一切波羅蜜多諸果異熟及報恩中心無繫縛釋曰第二無顧戀相謂不望悕六度諸果及報恩而行施等名無顧戀六度諸果如下經釋瑜伽論云無顧戀者謂於有染及彼果中心無繫著解云謂於有染心無繫著者經即所説及報恩中心無繫縛也相續經云無顧者謂於波羅蜜果報及現世利心不繫縛深密經云不悕望者於諸波羅蜜受用果報報恩中無求心梁攝論云二不觀清淨謂於自身及波羅蜜果報報恩中心常不觀金剛波若論云自身及報恩果報斯不著也又解此當瑜伽二種施也故瑜伽論施品説云云何不望報恩施謂諸菩薩悲心愍心而行惠施終不於他希望反報但觀求樂愛火所燒無有勢力性苦衆生深心悲愍而行惠施云何不希異熟施謂諸菩薩修行惠施終不希望當來所得財寶圓滿自身圓滿施果異熟觀一切行性是虗偽觀大菩薩最勝功德而行惠施廣釋此相如世親菩薩及功德施波若論第一無罪過者謂於如是波羅蜜多無間雜染法非離方便行釋曰第三無罪過相罪過有二一聞離雜染法如下所説無悲加行等四種過失二非方便行如下所説但攝財物饒益有情等具如下經離此二種而行施等亦無罪過瑜伽論云無罪者謂遠離一切施等隨煩惱釋云隨煩惱者亦如瑜伽七十五説彼云於施波羅蜜多由內及外有十隨煩惱對治彼故得施波羅蜜多依於外門有五隨煩惱一遍染總性二棄捨法三不持可樂性四意望不圓滿性五不成就性依於內門有五隨煩惱一不出離性二雜染總性三不劣薄性四現前惱性五盡滅法性深密相續亦同此經梁攝論云三無失謂離與波羅相雜染汙法及雜非之方便也無分別者謂於如是波羅蜜多不如言詞執著自相釋曰第四無分別相謂離如言執六度相名無分別瑜伽論云無分別者謂於施等不觀遍計所執自相又解無分別者謂三輪清淨也廣釋六三輪清淨如梁攝論第九相續經云無異想者於諸波羅蜜不如言説計著自相深密經云不分別者諸波羅蜜中不如所聞執著自相梁攝論云四無分別清淨謂離如言執波羅蜜相也正回向者謂以如是所作所集波羅蜜多回求無上大菩提果釋曰第五正回向相謂初起作名為所作增長之時名為所集瑜伽論云回向者施求諸行願得阿耨多羅三藐三菩提廣釋回向如發菩提心經及華嚴經回向品也相續經云回向者謂此諸波羅蜜已作已增長為求無上大菩提果深密經云回向者諸波羅蜜所作所集回向取大菩提果梁攝論云五回向清淨謂於六度已生長及未生長中常求得菩提廣釋五相如真諦梁攝論疏第八然此所説到彼岸相諸教不同或以四相釋到彼岸如莊嚴論第七卷云六度二皆有四相一者治障治慳等故二者合智悉與無分別智共行故三者願滿施於求者隨欲給之乃至智於疑者隨欲決疑四者成生先施攝後以三乘乃至先以慧攝後三乘隨其所度而成就之又雜集論第十一卷亦説四相彼云云何波羅蜜相一發起故二習氣故三自體故四等流故尋即可知或説五相如即此經相續深密瑜伽七十五及七十八顯揚第三梁攝論第九一一皆同如經應知又雜集論亦説五相彼云云何波羅蜜相謂種姓故願故意樂故事故自體故尋即可知或説六相如攝大乘第七卷云此六種相云何可見由六種最勝故解云此六同成唯識後六種相故不述之或説七相如成唯識第九卷云此十相者要七最勝之所攝受方可建立波羅蜜多一安住最勝謂要安住菩薩種性二依止最勝謂要依止大菩提心三意樂最勝謂要悲愍一切有情四事業最勝要具行一切事業五巧便最勝謂要無相智所攝受六回向最勝謂要回向無上菩提七清淨最勝謂要不為二障間雜若非此七所攝受者所行施等非到彼岸或説八相如顯揚第三或説十二相如雜集十一中邊第三世尊何等名為波羅蜜多諸相違事釋曰自下第四逐難重釋或可説問答廣釋於中有四一問答分別波羅蜜相違事二世尊如是下問答分別諸果異熟三世尊何等下問答分別度間雜法四世尊何等名為非方便行下釋上非方便行略而不釋無分別故及正回向易可知故此即第一釋相違事先問後答此即請問違六度事善男子當知此事略有六種釋曰自下第二如來正説於中有二初標章舉數後次第別釋此即總標有六相違事也一者於喜樂欲財富自在諸欲樂中深見功德及與勝利釋曰自下第二次第別釋六相違事即為六段然此違事自有三種一別所治障如無性釋第七卷云所治雜染所理慳吝犯戒恐恚懈怠散動惡慧二者合説通別障謂樂著財等是其別鄣於三中深見功德及與勝利即是通障今此中釋通別障此釋第一違施度障言喜樂等者此有三釋一云於喜樂欲者皆是樂欲異名財富最自在諸欲者所樂之境後樂中者三境上樂一云喜樂者是樂欲義體即是欲欲謂五欲即是五境言財富者多畜財寶言自在者於上二事受用自在諸欲樂者即説喜欲境喜樂財富喜樂自在三種喜樂名為欲樂於此三種喜樂事中深見功德及與勝利總説意云喜樂三種欲樂愛樂樂也中深見功德及與勝利為施度障一云喜樂即喜樂受餘如前相續經云樂欲財自在深密經樂於五欲資生自在梁攝論第九云六度有六障第一障者喜樂欲塵於富財物自身愛樂中見勝功德施能除此二者於隨所樂縱身語意而現行中深見功德及與勝利釋曰第二違戒度事隨其所樂謂殺生等三種業中見有功德及與勝利如言殺羊得生天等梁攝論云第二障者疑心起身口業戒能除此三者於他輕蔑不堪忍中深見功德及與勝利釋曰第三違忍度事如經可知梁攝論云第三障者不能安受輕慢毀辱寒熱等苦忍能除此四者於不勤修著欲樂中深見功德及與勝利釋曰第四違精進事即用懈怠及放逸等以為功德梁攝論云第四障者執不修行為樂未得計得於不見功德精進能除五者於處憒𡗚世雜亂行深見功德及與勝利釋曰第五違定度事謂於五種散亂或六散亂見勝功德等相續經習近世間雜亂衆事深密亦同梁攝論云第五障樂相雜住於世間希有事及散亂因緣見有功德定能除此六者於見聞覺知言説戲論深見功德及與勝利釋曰第六違慧度事如經可知深密經即同此經相續經云五者習近世間雜亂衆事見聞覺識六者世間戲論作福利見者譯家謬故見聞等事攝屬第五攝大乘云一切見趣諸耶惡慧梁攝論云第六障者於見聞覺知計為如實於世間戲論心修學於不了義經如文判義智慧能除此障廣如真諦攝論疏第八卷説也世尊如是一切波羅蜜多何果異熟釋曰第二問答分別六度諸果先問後答此即請問如是六度各各得何果報故深密云何者是諸波羅蜜果報善男子當知此亦略有六種釋曰自下如來正説於中有二初標章舉數後次第別釋此即初也能修之因既有六別所感果報亦有六種一者得大財富二者往生善趣三者無怨無壞多諸喜樂四者為衆生主五者身無怨害六者有大宗葉釋曰第二次第別釋如其次第由施力故得大財富由持戒故往生善趣由忍辱故無怨無壞多諸歡喜由勤精進故得大尊貴為衆生主由靜慮故伏除煩惱故能感得身無怨害由波若故廣解五明得大宗葉葉者施族相續經云一大財二善趣三無怨者與此經同四不壞五多喜樂衆生增上主六者不害自身有大堪能深密經云得福財故趣善道故無怨歒故不壞多喜樂故常為衆生主故不害自身故大威德故解云相續失次第深密七果合不分別譯家別故依雜集論第十一卷具説六度各得五果今此經文具説一果故彼論云功德者謂依五果無量無邊稱讚勝利皆名功德謂能永斷自所對治是諸波羅蜜多離繫果於現法中由此施等攝受自他是士夫用果於當來世後後增勝展轉生起是等流果大菩薩是增上果感大財富往生善趣無怨無壞多諸喜樂有情中尊身無損害廣大宗族隨其次第是施等波羅蜜多異熟果又成唯識第九卷云有漏有四種除離繫果無漏有四除異熟果而有處説具五果者或互相資或二合説此即會釋雜集説也世尊何等名為波羅蜜多間雜染法釋曰自下第三問答分別度間雜法於中有二先請後説此即問前無罪過中間雜染法善男子當知略由四種加行釋曰自下第二如來正説於中有三初標數略答次次第別釋後逐難重釋此即第一標數略答一者無悲加行故二有不如理加行故三者不常加行故四者不殷重加行故釋曰第二次第別釋謂障四修故説四種言四修者如俱舍論二十七説彼云有四種修一無餘修福德智慧二種資糧修無遺故二長時修經三大劫阿僧祇耶修無倦故三無間修精勤勇猛剎那剎那修無廢故四尊重修恭敬所學無所顧惜修無慢故依順正理第七十五亦同俱舍依成唯識有五種修故第六云或初發心長時無間殷重無餘修差別故而不解釋今於此中除初發心故説四種一無悲加行者障長時修謂菩薩於三大劫能修行者由大悲力由無悲力由無悲故非長時修二不如理加行者障無餘修修一時不能通修諸廣行故三不常加行者障無間修常者恆也由懈怠故不能無間恆修諸行四不殷重者障殷重修謂諸菩薩行六度法於二行皆生尊重而行施等如是四種於行度時間雜而起名間雜染也不如理加行者謂修行餘波羅蜜多時於餘波羅蜜多遠離失壞釋曰第三逐難重釋謂上所説不如理言雖通諸過皆違正理而今經意修觀行者曲行一度者離餘度行名不如理故深密云修行諸度離餘度行名不如理而相續云四者不頓方便不思惟方便者於此諸度餘度雜亂修習者譯家謬也或可助成行以為正行故名雜亂世尊何等名為非方便行釋曰自中第四問答分別非方便行於中有六一問二答三徵四釋五喻六合此即第一問上所説非方便行善男子若諸菩薩以波羅蜜多饒益衆生時但攝財物饒益衆生便為喜足而不令其出不善處安置善處如是名為非方便行釋曰第二依問正答謂諸菩薩於四攝中但以財攝便以為足不能令其出不善處如是名為非方便行何以故釋曰第三徵請非方便行所由施物令喜還成饒益以何義故名非方便善男子非於衆生唯作此事名實饒益釋曰第四如來正説謂諸菩薩非於衆生唯作財攝世間喜悅名為饒益要須法施令諸衆生出不善處乃名饒益譬如糞穢若多若少終無有能令成香潔釋曰第五喻説如世糞穢多之以少竟身不能成香潔之物糞喻行苦香譬涅槃如是衆生由行苦故其性是苦無有方便但以財物暫相饒益可合成樂唯有安處妙善法中方便可得名第一饒益釋曰第六合喻謂諸衆生由行苦故其性皆苦無有以財飲食饒益可令成樂唯有安處菩薩涅槃妙善法中如是乃名第一饒益觀自在菩薩復白佛言世尊如是一切波羅蜜多有幾清淨釋曰自下第九諸度清淨種數門於中有二先問後答此即總問六度有幾清淨佛告觀自在菩薩曰善男子我終不説波羅蜜多除上五相有餘清淨釋曰自下第二如來正説於中有二初明清淨不離前相五後明依五説總別七此即初也謂我不説如上所説無染著故及其第五正回向相除此已外有別淨相然我即依如是諸事總別當説波羅蜜多清淨之相釋曰自下第二依前五相説總別七於中有二初總答依前五相説總別七後次第別釋總別七相此即初也如是諸事者説法度名為諸事如是諸度名有總別七種總説一切波羅蜜多清淨相者當知七種釋曰自下第二次第別釋於中有二初釋總七相後釋別七相前中有二初標章舉數後問答釋別此即總標有七種相何等為七釋曰第二問答別釋此即總問一者菩薩於此諸法不求他知釋曰自下別釋七相此釋初相菩薩密行六度不令他知不求名聞利養故二者於此諸法見已不生執著釋曰第二不生執著相離三輪故六度一一各離三輪如梁攝論第九廣釋三者即於如是諸法不生疑惑謂為能得大菩提不釋曰第三不生疑惑相信解堅窂故四者終不自讚毀他有所輕蔑釋曰第四不起自讚毀他犯重過故五者終不憍傲放逸釋曰第五不放逸相離懈怠故六者終不少有所得便生喜足釋曰第六不生喜足廣修諸行無厭足故七者終不由此諸法於他發起嫉妬慳吝釋曰第七不生嫉妬菩薩不以自行法故見他行吝者發起嫉妬慳吝財法別説一切波羅蜜多清淨相者亦有七種釋曰自下第二釋別七相於中有二初標章舉數後問答別釋此即第一標章舉數何等為七釋曰自下問答別釋此即總問謂諸菩薩如我所説七種布施清淨之相隨順修行釋曰自下別釋六度七相即為六段此即第一釋施七相於中有三初總標菩薩起七淨相次別釋七相後總結七相此即總標修施七相一者由施物清淨行清淨施二者由戒清淨行清淨施三者由見清淨行清淨施四者由心清淨行清淨施五者由語清淨行清淨施六者由智清淨行清淨施七者由垢清淨行清淨施釋曰第二次第別釋施中七相非不淨物等而行惠施名施物清淨息除諸惡等而行惠施名為戒淨不計度我能行施為我所等而行惠施名為見淨以憐愛心等而行惠施名為心淨舒顏含笑先言問執等而行惠施名為語淨於施名體皆如實知等而行惠施名為智淨遠離懈怠貪瞋癡等垢而行惠施名為垢淨菩薩行施要由如是七清淨相乃成淨施具如瑜伽論説是名七種施清淨相釋曰此即第三總結應知然此七相一一各以十相分別如瑜伽論第七十四彼云復次如諸菩薩所行惠施當知此施由七種相乃得清淨謂施物清淨戒清淨見清淨心清淨語清淨智清淨垢清淨如是清淨當知一切皆有十相云何施物清淨十相一廣大施謂衆多差別故二平等施謂無增無減故三應時施謂當彼所樂故四上妙施謂色等具足故五清淨施謂非不淨物所雜穢故六如法施謂無罪相應故七隨樂施謂隨求者所愛樂故八利益施謂隨彼所宜故九或頓或漸施謂隨求有故十無間施謂無斷絶故戒見心語智垢六種各以十相分別具説如彼又諸菩薩能善了知制立律儀一切學處能善了知出離所犯釋曰自下第二辨戒七相先釋後結釋七相即分為二初明二相能善了知後有五相正顯受持此即初也一能善了知律儀戒中一切學處故相續經云善制一切律儀戒二能善了知出離所犯即是出罪懺悔法也故相續經云善於出過深密經云離諸過法具常尸羅堅固尸羅常作尸羅常轉尸羅受學一切所有學處釋曰此後五相正顯受持言五相者一具常尸羅二堅固尸羅三常作尸羅四常轉尸羅五受學一切所有學處此後五相如瑜伽論第六十二次第解釋故彼論云云何常守尸羅謂不棄捨諸學處故瑜伽四十二云恆常戒者離盡壽命不棄所學處云何堅守尸羅謂不毀犯諸學處故瑜伽四十二云堅固戒者一切利養恭敬他論本隨煩惱不能伏故不能奪故云何常作尸羅謂於學處無穿穴故云何常轉尸羅謂穿穴已復還淨故云何受學尸羅之處謂具隨學諸處故廣釋此相如顯揚第七瑜伽二十二顯揚十三別釋五相亦同瑜伽解云具常堅固二種尸羅不捨不犯為二常作常轉二種尸羅專精不犯犯已即悔為二學處尸羅謂具修行一切學處有釋七中初二是律儀戒次二攝善法戒後二利有情戒第七一種通攝前三也是名七種戒清淨相釋曰此即第二總結應知若諸菩薩自於所有業果異熟深生仰信一切所有不饒益事現在前時不生憤發釋曰自下第三釋忍七相於中有二先釋後結釋中七相此即七中第一相也謂諸菩薩深信因果知由自業所有違境不生憤發於中信業即是忍因不饒益事即是忍境不生憤發即是忍體由此三緣顯第一相又瑜伽論四十二云謂諸菩薩從他怨害所生衆苦現在前時應如是學如此是我自業過耳由我先世自造種種不淨業故今受如是種種苦果若不忍者復為當來大苦因處廣説如彼亦不反罵不瞋不打不恐不弄不以種種不饒事益反相加害釋曰顯第二相謂諸菩薩深達二空無能所罵又欲令忍速得成就故能行忍不加反報若反報者失大利也又瑜伽論第三十云此中都無能罵所罵能瞋所瞋能弄所弄能打所打唯有音聲唯有名字又我身隨所生起名有色粗重四大所造隨所住處便有如是解觸所逼惱略有三觸謂音聲觸及手足魂刀杖等觸是身及觸皆悉無常能為如是不饒益者亦是無常又復一切有情之類皆有生老病死等法本性是苦故我不應於本性苦諸有情上更加其苦而不與樂又亦不應不與怨家作善知識不攝一切有情之類以為自體又世尊言我不觀見如是種類有情可得無始世來經歷生死長時流轉亦互相為或父母兄弟姊妹若軌範師若親教師若餘尊重者由是因緣一切怨品無不皆是我之親品又恐親品無有決定真實可得何以故親品餘時轉成怨品怨品餘時轉成親品是故一切無有決定故我今者應於一切有情之類行忍辱心不懷怨結釋曰明第三相知忍勝利必無怨結瑜伽論四十二云他損惱時亦無怨嫌意樂相續恆現在前欲作饒益先無異若諫誨時不令恚惱釋曰辨第四相菩薩怨家而來諫誨即便受謝不令生惱瑜伽論云終不令他生疲厭已然後受謝恐其疲厭才謝便受深密經云若彼取悔時即應受不令他惱亦復不待他來誨諫釋曰顯第五相菩薩怨家損菩薩已菩薩速自往彼怨所而求懺謝不待他來而諫誨也瑜伽論云於有怨者自往悔謝相續經云若他觸犯不望懺謝也不由恐怖有染愛心而行忍辱釋曰辨第六相謂諸菩薩不以怖他而行忍辱如王所等亦不以染心而有所求而行忍辱如求飲食等但為利他故行忍也相續經云無畏無求而行忍也深密經云不為有畏不為飲食而行忍也不以作思而便施捨釋曰辨第七相菩薩常欲饒益衆生不以一度饒益衆生以為思足而便施捨更不以餘事而相饒益瑜伽論云非一益已捨而不益相續經云常行饒益心不廢捨也是名七種忍清淨相釋曰此即第二結忍七相若諸菩薩通達精進平等之性釋曰自下第四精進七相於中有二先釋後結釋中七相此第一平等精進菩薩精進緩急不得故名平等故瑜伽論四十二云若諸菩薩發勤精進不緩不急平等雙運普於一切應作事中亦能平等殷重修作是名菩薩平等精進又五分律第十九意同瑜伽故彼律云時二十億白佛世尊願聽出家受具足戒佛即許之出家不分於尸陀林精進經行足傷血流二十億便作是念佛弟子中精進無勝我者而今未得盡諸苦原我家幸多財寶亦可返俗快作功德佛知其念往到其所問二十億云汝實作此念不答言實爾佛復語言我今問汝隨汝意答汝在家時善彈琴不答又問琴絃急時聲調好不答言不好又問琴絃緩時聲調好不答言不好又問云何得好答言不急不緩然後乃好佛言於我法中亦復如是太緩太急何緣得道精進處中不久盡苦二十億耳聞佛説已即於經行處漏盡無餘具説如彼增一阿含經第十二雜阿含第九四分律等大同五分不由勇猛勤精進故自舉淩他釋曰此明第二離慢精進菩薩精進利他為先如何於他反起憍慢瑜伽論云由勤精進離高舉故是故名為離慢精進具大勢力具大精進有所堪能堅固勇猛於諸善法終不捨軛釋曰此明後五精進之相五精進者一具大勢力二具大精進三有所堪能四堅固勇猛五於諸善法終不捨軛然此五句諸教不同顯揚第一瑜伽四十二但舉經五句而不解釋集論第一以義立五名而不釋成唯識第六雜集第一瑜伽五十七以義立五名配經五句下別解釋瑜伽八十九以義立五名而亦解釋不配經句無性世親論攝論第七以義立名而亦配釋故今具依成唯識第六無性第七瑜伽八十九以釋此經故唯識云被甲加行無下無退無足即經所説有勢有勤有勇猛不捨善軛如次應知無性釋云被甲精進謂最初時自勵我當作如是事即是釋經初有勢句加行精進謂加行時如所意樂勤修加行即是釋經次有勤句於自疲苦心不退屈名無怯弱於他逼惱心不移動名無退轉乃至菩提於其中間進修善品嘗無懈疲名無喜足瑜伽論云又勤精進應知五種一被甲精進二加行精進三不下精進四無動精進五無喜足精進此中最初當知發起猛利意樂次隨所欲發起堅固勇悍方便次為證所得諸受法不自輕蔑亦無怯懼次能堪忍寒熱等苦後於下劣不生喜足次勤求後後轉勝轉妙諸功德住如是名為七種精進清淨之相釋曰此即第四總結七相若諸菩薩有善通達相三摩地靜慮有圓滿三摩地靜慮有俱分三摩地靜慮釋曰第五釋定七相於中先釋後結此即正釋初三靜慮謂善通達俗諦相定名通達相緣彼圓滿真如境定從境得名名為圓滿通緣真俗二境之定名為俱分有運轉三摩地靜慮有無所依三摩地靜慮有善修治三摩地靜慮釋曰此明第四第五及第六相如其次第加行正知後得三智相應定也其加行智唯是有漏作意運轉所依之定名為運轉其根本智無異境相可為依止所依之定名無所依以後得智能善修治種種諸行所依之定名善修治有於菩薩藏聞緣修習無量三摩地靜慮釋曰此明第七相也即却談方便時慧菩薩藏者謂大乘教於此教中能聞定者義説聞慧於定位中亦得聞教緣者即是定中義説思慧修習無量三摩地者即是修慧於定位中能修無量種種定故又解與慧相應定慧增上故能通達法相名通達相內證圓滿定雖慧相應而定增上名為圓滿定定慧均等相應定名為俱分能起神通定名有運轉與無分別智相應定名無所依與後得智相應定名善修有於菩薩藏下明加行定謂於大乘菩薩藏教以聞慧為緣修習無量諸靜慮故有相傳云初一是定分偏勝靜慮但觀相分名通達相第三是慧分偏勝靜慮但觀見分令自體圓滿名圓滿定慧均等靜慮名為俱分如理智相應見道靜慮名無所依如理智相應修道靜慮名善修於菩薩藏下是加行靜慮聞慧謂聞慧緣謂思慧修習謂修慧依此三慧廣修無量三摩地靜慮故言三摩地及靜慮者三摩地是定體靜慮是定用也是名七種靜慮清淨之相釋曰第二總結如文若諸菩薩遠離增益損減二邊行於中道是名為慧釋曰第六釋慧七相先釋後結釋中七相此即初相言遠離增益損減二邊行中道者如無性攝論第一卷云於無無因強立為有故名增益於有無因強撥為無故名損減如是增益乃與損減俱説為邊此墜隨義此二轉時失壞中道於遍計所執唯有增益而無損減都無有故以要於有方起損減於依他起無有增益以有體故要於非有方有增益亦無損減唯妄有故於圓成實無有增益是實有故唯有損減具説如彼又成唯識第七卷云我法非有空識非無離有離無故契中道慈尊於此説二頌言虗妄分別有於此二都無此中唯有空於彼亦有此故説一切法非空非不空有無及有故是則契中道廣釋中道如中道章由此慧故如實了知解脫門義謂空無願無相解脫門釋曰明第二相説三解脫門智此三解脫門如顯揚論第二卷説彼云解脫門者謂三解脫門一空解脫門二無相解脫門三無願解脫門空有二種一所知二智所知者諸謂於衆生遍計性所執法中及法遍計性所執法中此二遍計性俱離無性及彼所餘無我有性於諸法中遍計性無即是無我性有於諸法中無我性有即是遍計性無即於此中有及非有及非有無二之性無分別境智者謂緣彼境如實了知無相亦有二種一所知二智所知者謂即所知空境由此境相一切諸相之所不行智者謂如前説無願亦有二種一所知二智所知者謂由無智故顛倒所起諸行相貌智者謂緣彼境厭惡了知空行者謂於諸行我不可得及諸相中世俗分別法不可得無相行者諸謂即於諸行中衆生是無我可得及諸相中世俗分別法無我性可得及於滅中滅靜妙離行無願行者謂無常苦不淨如病如癕如箭因集生緣行緣智空道作道如行出行此亦是空行緣智無相道作道如行出行此亦是無相行緣智無願道作道如行出行此亦是無相行若無差別總名空無相無願者此通聞思修所生之慧世及出世應知若名空無相無願三摩地者唯是修所生慧通世出世應知若名空無相願解脫門者此唯出世應知若廣分別具如別章如實了知有自性義謂遍計所執若依他起若圓成實三種自性釋曰明第三相謂由遠離二邊慧故如實了知三自性義三性之義如何三性中説如實了知無自性義謂相生勝義三種無自性性釋曰明第四相三無性義如前已説如實了知世俗諦義謂於五明處釋曰明第五相謂了五明處智名世俗諦依廣百論第十卷云世俗諦者謂從緣生世出世間色心等法親證離説展轉可言親證為先後方起此世俗諦亦有亦生假合所成猶諸幻事從分別起如篾所為有相可言名世俗諦顯揚第二云世俗諦者謂名句文身及依彼義一切言説及依言説所解了義又曾得世間心及心法及彼所行境義瑜伽六十四云謂諸所有言道可宣一切皆是世俗諦攝言五明者一內明處謂即顯示正因果等二因明處謂即顯示摧伏他等三聲明處謂即顯示諸工明等四醫方明處謂即顯示病體病因等五工業明處謂即顯示營造業等廣如瑜伽第三十八及第十五等菩薩求此五明意者如瑜伽論三十八説彼云菩薩何故求聞正法謂諸菩薩求內明時為正修行法隨法行為廣開示利悟於他求因明時欲了知外道因論是惡言説為欲降伏他諸異論求聲明時為令欲信樂典語衆生於菩薩身深生敬信為欲悟入詁訓音聲文句差別求醫明時為息衆生種種疾病求工業時為小功力多集珍財饒益衆生菩薩求此一切五明為令無上正等菩提大智資糧速得圓滿非不於此一切明處次第修學能得無障一切智具説如彼地持論第三善戒經第四莊嚴論第五意同瑜伽如實了知勝義諦義謂於七真如釋曰明第六相於中有二初舉境顯智後三因成立此即初也勝謂勝智義即境義七種真如即是勝智之境義故名勝義諦謂是依主釋故大般若五百六十九云天王當知凡有言説名世俗諦離言寂靜聖智境界名勝義諦廣百論云勝義諦者謂聖所知分別名言皆所不及自內所證不由他緣無相絶言名勝義諦又無分別離諸戲論純一理趣多所住故無量總法為所緣故及毗鉢舍那故釋曰第二三因成立緣真之智又無分別等者顯正體智無有種種分別戲論唯於真如一理趣中多分安住廣釋此智如雜集十四攝論第八無量總法為所緣者謂此正智以總法真如為所緣也又解無量總法為所緣者顯後得智謂此總法有其三種一少總法十二部經各別緣故二大總法十二部經總合緣故三無量總法無量如來十二部經總合緣故此智即緣第三法也及毗鉢舍那者謂顯此智是修慧故能善成辦法隨法行釋曰第七隨法行智然此法行諸教不同若依婆沙一百八十一云法謂涅槃隨法謂八支聖道若於此中隨義而行所謂為求涅槃故修習八支聖道名法隨法行能安住此名法隨法行者廣説如彼若依無性攝論第二云法隨法行者所證名法道名隨法隨順彼故又出世道名法世間道名隨法行者行彼自心相續樹增彼故令彼現行得自在故此則説其修所成智解云行彼自心相續者以此修慧行彼定心相續之處也言樹增彼故者釋其行意樹殖建立也亦種也於彼定心樹立增長彼修慧故説名為行言令彼現前得自在故者重釋增意由彼修慧於心現行得自在用能證真理斷惑得果種種作用言此即説其修所成智者屬當所明也又世親論第二卷云法隨法者如教行故是名七種慧清淨相釋曰第二總結如文觀自在菩薩復白佛言世尊如是五相各有何業釋曰第十分別五相五業門先問後答此即問上無染著等五相業用謂彼五相各有幾業佛告觀自在菩薩曰善男子當知彼相有五種業釋曰第三如來正説於中有二先總後別此即總答各有一業故深密云佛告觀世自在此五種各有一業應知謂諸菩薩無染著故於現法中於所修習波羅蜜多恆常殷重勤修加行無有放逸釋曰第二別釋五相各有一業此即第一無染著相所有別業即是勤修加行無放逸業無染著相如上廣説由無染著故於現身中無間殷重勤修六度無有放逸無顧戀故攝受當來不放逸因釋曰第二無顧戀相所有業也由於六度諸異熟果及報恩中無繫縛故能攝未來不放逸因即彼未來不放逸故能修六度漸漸增長無罪過故能正修習極善圓滿極善清淨極善鮮白波羅蜜多釋曰第三明無罪相所有業也謂無罪相即有四句業一能正修習二極善圓滿三極善清淨四極善鮮白由離前説四間雜法謂無悲加行不如理加行不常加行不殷重加行故説此四句一云能正修習者是想句下之三句前別顯三德因一極善圓滿者顯斷德因極善清淨者顯智德因極善鮮白者顯恩德因無分別故方便善巧波羅蜜多速得圓滿釋曰第四無分別相所有別業謂不如言詞執諸相故即能善巧方便令諸波羅蜜速得滿之非十度中方便正回向故一切生處波羅蜜多及彼可愛諸果異熟皆得無盡乃至無上正等菩提釋曰第五正回向業如經可知觀自在菩薩復白佛言世尊如是所説波羅蜜多何者最廣大何者無染汙何者最明盛何者不可動何者最清淨釋曰自下第十一最廣大等五相門先問後答此即菩薩曾聞餘經有此五相故作此問或可如來加被力故作此問也佛告觀自在菩薩曰善男子無染著性無顧戀性正回向性最為廣大釋曰自下如來正説於中有二初約五相分為三種後依位地釋後三相此即五中無染著性無顧戀性正回向性三種名最廣大行相廣大攝於諸位中不相違故無罪過性無分別性無有染汙釋曰五中無罪過性及無分別智名無染汙謂所行度自性無染無分別智能除染故此無染性亦通諸位思擇所作最為明盛釋曰第二約位辨後三相此釋明盛明謂彼六度以勝思擇所作事故名為明盛此即位在前之七地深密經云何者熾然已入無退轉法地者名不可動釋曰第四不可動相第八第九二種地也不動之義如上已説深密經云初地已上名不動者譯家別故若十地攝佛地攝者名最清淨釋曰第五最清淨相謂第十地因中最勝若如來地果中最勝究竟清淨故是故雜集第十一云圓滿最勝謂第十地及如來地所有施等波羅蜜多如其次第菩薩圓滿故佛圓滿故然此三名有差別者如瑜伽論第三十七彼云性淳故極猛盛故能有上品廣大果故大勝利故名為熾深密經云熾然不轉還故不退墮故常勝進故名為無動菩薩地中最無上故當知説名極善清淨觀自在菩薩復白佛言世尊何因緣故菩薩所得波羅蜜多諸可愛果及諸異熟常無有盡波羅蜜多亦無有盡釋曰自下第十二六度因果無盡門於中先問後答此即問也此問果因常無有盡六度因彼度所得離繫等四可愛諸果及異熟果如是五種總名為果廣釋五果如前所引雜集十二佛告觀自在菩薩曰善男子展轉相依生起修習無間斷故釋曰第二如來正説謂依六度能得諸果由依果故能修六度如是展轉相依生起無間斷故便無盡義雜集論云於當來世後後增勝展轉生起是故波羅蜜多等流果相續經云何故常得無盡波羅蜜多果報及無盡波羅蜜多佛告觀世音展轉相依捨修習故解云譯家謬也深密經云佛言所謂迭相因生如業果應知解云譯家別故觀自在菩薩復白佛言世尊何因緣故是諸菩薩深信愛樂波羅蜜多非於如是波羅蜜多所得可愛諸果異熟釋曰自下第十三愛度不愛度果門先問後答此即請問如何菩薩愛度而不愛度行得果耶然此問意三本不同相續經云何故菩薩深愛波羅蜜多果報深密經問與此經同若準答文相續經謬也佛告觀自在菩薩曰善男子五因緣故釋曰自下世尊正説於中有二初標章舉數後次第別釋此即初也一者波羅蜜多是最增上喜樂因故二者波羅蜜多是其究竟饒益一切自他因故三者波羅蜜多是當來世彼可愛果異熟因故四者波羅蜜多非諸雜染所依事故五者波羅蜜多非是畢竟變壞法故釋曰第二次第別釋五種因相如其次第於他受用智及與佛果受用法樂喜樂因故非彼異熟有此勝用究竟自利利他因故勝能減當來異熟因故非業煩惱所依因故非如異熟受已盡故二本大同故不述之觀自在菩薩復白佛言世尊一切波羅蜜多各有幾種最勝威德釋曰自下第十四諸度威德種數門先問後答此即總問相續經云名為德力深密經云勝妙之力譯家異故義無乖違也佛告觀自在善男子當知一切波羅蜜多各有四種最勝威德釋曰自下如來正説於中有二初標章舉數後次第別釋此即初也一者於此波羅蜜多正修行時能捨慳吝犯戒心憤懈怠散亂見趣所治釋曰自下第二次別釋四種威德此即初也謂彼六度如其次第能除六弊雜集論云謂能永斷自所斷障是諸波羅蜜多離繫果二者於此正修行時能為無上正等菩提真實資糧釋曰第二威德能與菩提真實資糧能與法身作了因故能與二身作生因故雜集論云大菩提諸波羅蜜多增上果三者於此正修行時於現法中能自攝受饒益有情釋曰此明第三威德於現身中益有情故雜集論云於現法中由此施等攝受自他是士夫用果四者於此正修行時於未來世能得廣大無盡可愛諸果異熟釋曰明第四威德六度所得諸果異熟雜集論云感大財富往生善趣無怨無壞多諸喜樂有情中尊身無損害廣大宗族隨其次第是施等波羅蜜多異熟果觀自在菩薩復白佛言世尊如是一切波羅蜜多何因何果有何義利釋曰自下第十五諸度因果義利門於中有二先問後答此即第一問其三義一因二果三者義利佛告觀自在菩薩曰善男子如是一切波羅蜜多大悲為因微妙可愛諸果異熟饒益一切有情為果圓滿無上廣大菩提為大義利釋曰第二如來正説謂諸菩薩由大悲力行於六度由行度故感勝異熟饒益有情由此因緣能得無上正等菩提觀自在菩薩復白佛言世尊若諸菩薩具足一切無盡財寶成就大悲何緣世間現有衆生貧苦可得釋曰自下第十六衆生自業過失門於中有二先問後答此即請問謂諸菩薩財寶大悲二緣具足如何世間現有衆生貧窮苦惱佛告觀自在菩薩曰善男子是諸衆生自業過失釋曰自下第二如來正説於中有三初法次喻後答此即法説於中有二初順釋後反解此即初也菩薩雖具財寶大悲而彼衆生自惡業故不能受用菩薩財寶非菩薩咎若不爾者菩薩常懷饒益他心又常具足無盡財寶若諸衆生無自惡業能為障礙何有世間貧苦可得釋曰第二反解衆生若不由自業者世間無有貧窮可得菩薩以能饒益他故既有貧窮故知自業故智度論第三十云問佛在世時衆生當有飢餓等苦佛不能救何況菩薩而能救耶答菩薩心無齊限福德果報亦無量但衆生無量阿僧祗劫罪厚障故而不能得如舍利弗子羅𩒚周比丘持戒清進乞食六日而不能得乃至七日命存不久有同道者乞食持與鳥即持去時舍利弗語大目連汝大神力守護此食令彼得之即時目連持食往與始欲向口變成為泥又舍利弗乞食持與而口自合以是故菩薩欲滿一切衆生願彼以罪故而不能得菩薩無咎又如龍王等心降雨在人為水在鬼為火又如雷電礔礰聾者不聞雷聲無咎又無垢稱云日月雖明盲者不見是盲過非日月咎衆生罪故不見世尊佛土嚴淨非如來咎佛地論第五三種衆生由自惡業不減如來圓鏡智影此中應引又世親無性攝論第十佛於一切雖得自在於具障人無性人二種決定中諸佛無自在此中應知譬如餓鬼為大熱渴逼迫其身見大海水悉皆涸竭非大海過是諸餓鬼自業過耳釋曰此即第二舉喻重説由如餓鬼自惡業力見海涸竭非海咎也若依無著攝大乘論有五因緣衆生不感菩薩布施無性第八世親第九次第釋彼五種因緣此經即常初一因也攝論曰若諸菩薩成就如是增上尸羅增上質多增上般若功德圓滿於諸財位得大自在何故現見諸有情遺乏財位此即總問以下別答見彼有情於諸財位有重業障故此第一因無性釋云謂諸菩薩見彼有情於其財位有重業障故不施與勿令惠施空無有果設復施彼亦不能受何用施為如有頌言如母乳嬰兒經一月無倦嬰兒唯若閇乳母欲何為世親釋云謂諸有情有障菩薩神力惡業由彼惡業障礙菩薩無障礙智由見此故雖有堪能雖彼遺乏而便棄捨此中應引餓鬼江喻如江有水無障飲者然諸餓鬼由自業過不能得飲此亦如是江喻菩薩財位喻水鬼喻有情如彼餘鬼不令飲用江中淨水如是有情不令受用菩薩財位論云見彼有情若施財位障生善法故此第二因無性釋云謂諸菩薩見彼有情雖於財位無重業障而彼若得財位圓滿多放逸不作善法作是思惟寧彼現法少時貧賤勿彼來生多時貧賤故不施彼所有財位世親釋云復有情雖無業障菩薩彼於相續中當生善法若施財位受富樂故障彼生善法作是思惟寧彼貧賤順生善法勿彼富貴障善法生由此道理不施財位論云見彼有情若乏財位厭離現前故此第三因無性釋云謂諸菩薩見彼有情若乏財位厭生死心便現在前求欲出離若得富貴即生憍逸故不施彼所有財位作是思惟寧彼貧財厭離生死心常現前勿彼富貴受樂放逸不厭生死起善法世親亦同論云見彼有情若施財位即為積集不善法因故此第四因無性釋云謂諸菩薩見彼有情為當施滿足財位即便放逸積集種種惡不善業故不施彼所有財位如有頌言寧便貧乏於財位遠離惡趣諸惡行勿彼富貴亂諸根令感當來衆苦器世親論云見彼有情若施財位即便作餘無量有情損惱因故此第五因無性釋云謂諸菩薩見彼有情若得富貴即便損惱無量有情故不施彼所有財位作是念言寧彼一身受貧賤苦勿令損惱餘多有情世親亦同論云是故現見有諸有情遺乏財位此中有頌見業障現前積集損惱故現有諸有情不感菩薩施無著總結世親釋云為顯此義復説伽他謂見有情業障故障生善故厭現前故積集惡故損惱他故不感菩薩施彼財位是故現有遺乏有情梁論十二所説五因大意亦同故不繁述如是菩薩所施財寶猶如大海無有過失是諸衆生自業過耳猶如餓鬼自惡業力令無有果釋曰第三舉法同喻如文可知智度論第三十云鬼有二種弊鬼餓鬼弊鬼如天受樂但與餓鬼同住即為其主餓鬼腹如山谷咽如針身唯有三事黑皮筋骨色數百歲不聞飲食之名何況得見復有餓鬼火從口出飛蛾投火以為飲食有食糞涕唾膿血洗器遺餘或得祭祀或食産生不淨如是等種種餓鬼依瑜伽論第四卷云又餓鬼趣略有三種一者由外障礙飲食二者由內障礙飲食三者飲食無有障礙云何由外障礙飲食謂彼有有情由習上品慳故生鬼趣中常與飢渴相應皮肉血脈皆悉枯稿猶如灰炭頭髮蓬亂其面黯黑唇口乾焦常以其舌舐略口面飢渴慞惶處處馳走所到泉池為餘有情手執刀杖及以羅索行列守護令不得趣或強趣之便見其泉變成膿血自不欲飲如是等鬼是名由外障礙飲食云何由內障礙飲食謂彼有情口或如針口或如炬或復頸癭其腹寬大由此因緣得飲食無他障礙自然不能若噉若飲如是等鬼是名由內障礙飲食云何飲食無有障礙謂有餓鬼名猛焰鬘隨所飲噉皆被燒然由此因緣飢渴大苦未嘗暫息復有餓鬼名食糞穢或有一分食糞飲溺或有一分唯能飲噉極可𭼩惡生熟臭穢縱得香善而不能食或有一分自割身肉而噉食之縱得餘食竟不能噉如是等鬼是名飲食無有障礙觀自在菩薩復白佛言世尊菩薩以何等波羅蜜多取一切法無自性性釋曰自下第十七般若取法無性門於中有五一問二答三難四通五結此即第一菩薩請問於六度中何度能取諸法無性佛告觀自在菩薩曰善男子以般若波羅蜜多能取諸法無自性性釋曰第二如來正答六十般若是慧性故能取諸法無自性性然此所説無自性性即是真如無自性性或是三種無自性性世尊般若波羅蜜多能取諸法無自性性何故不取有自性性釋曰第三菩薩設難此難意云若取無性即是執著應取所執如何不取有自性性又解謂若般若能取諸法無自性性亦應能取有自性性於一真如具有性無性義故或可云三種無自性性亦有無性有性二義如何不取有性義耶善男子我終不説以無自性性取無自性性釋曰自下第四如來釋通於中有三反解順釋通外伏難此即反解通外難自有兩釋一云我終不説以有執著無自性性取無自性性故我説取有自性性一云我終不説以無自性性取無性性以無自性性離名言故是故亦不得言取有自性性然無自性性離諸文字自所證釋曰第二順釋無自性性是內所證故初卷云勝義諦謂離諸名言尋思但行名言境界又勝義諦是諸聖者自內所證尋思所行是諸異生展轉所證又瑜伽論三十六云又諸菩薩由能深入法無我智於一切法離言自性如實知已達無少法及少品類可起分別唯取其事唯取真如不作是念此唯是事是唯真如俱行於義不可捨於言説文字而能宣説釋曰第三釋外伏難謂外伏難若離言説何故前説般若能取無自性性故作此通不可捨言而能宣説如是問答亦如瑜伽論三十六説問若離言者何因緣故於一切法離言自性而起言説答若不起言説則不能為他説一切法離言自性他亦不能聞如是義若無有聞則不能知此一切法離言自性是故於此離言自性而起言説又六十六云諸法自性皆絶戲論過語言道然由言説為依止故方乃可取可觀可覺是故當知一切諸法甚深難見是故我説般若波羅蜜多能取諸法無自性性釋曰第五結文可知觀自在菩薩復白佛言世尊如佛所説波羅蜜多近般若波羅蜜多大波羅蜜多云何波羅蜜多云何近波羅蜜多云何大波羅蜜多釋曰自下第十八三種波羅蜜多門於中有二先問後答此即問也問中有二先問後答此即問也問中有二先牒後問有一本經牒中有三問中但二脫初一問若依瑜伽相續深密皆有三問故知脫也佛告觀自在菩薩曰善男子若諸菩薩於無量時修行施等成就善法而諸煩惱猶故現行未能制伏然為彼伏謂於勝解行地耎中勝解轉時是名波羅蜜多釋曰自下第二如來正答中有三即為三段此即第一釋初也三僧祇中所修施等三名差別謂初僧祇成就施等六弊等增故現行未能伏彼然為六弊之制伏言謂於勝解行地者出其位地言耎中勝解轉時者出修行時地前所修未成上品是耎品中品勝解轉勝言是名波羅蜜多者結其名也復於無量時修行施等漸復增上成就善法而諸煩惱猶故現行然能制伏非彼所伏謂從初地已上是名近波羅蜜多釋曰答第三二問於中三節初釋次出位地後結名謂從初地已上第二僧祇所修施等漸增上故貪等煩惱雖設現行然能伏彼非彼所伏漸近菩提為近也復於無量時修行施等轉復增上成就善法一切煩惱皆不現行謂從八地已上是名大波羅蜜多釋曰答第三問於中三節準前應知謂八地已上第三僧祇所修施等轉增故當入觀故一切煩惱皆不現行八地已上無功用修一一行中起無量行故得大名依成唯識第九卷中意同此經故彼論云此十因位有三種名一名波羅蜜多謂初無數劫爾時施等勢力尚微被煩惱伏未能伏彼由斯煩惱不覺現行二名近波羅蜜多謂第二無數劫爾時施等勢力漸增非煩惱伏而能伏彼由斯煩惱故意方行三名大波羅蜜多謂第三無數劫爾時施等勢力轉增能畢竟伏一切煩惱由斯煩惱永不現行猶所知微細現種及煩惱種故未究竟依瑜伽論第四十五名下中上故彼論云福德智慧二種莊嚴菩薩於初無數大劫所修習者應知名下若於第二無數大劫所修習者應知名中若於第三無數大劫所修習者應知名上善戒經第七地持第七亦同瑜伽相續解脫大同此經依深密經與此少異波羅蜜近波羅蜜配入地前大波羅蜜配入初地已上望第十地又地前菩薩亦伏煩惱非煩惱伏者譯家謬也觀自在菩薩復白佛言世尊此諸地中煩惱隨眠可有幾種相續經云幾許煩惱使深密經云幾許使煩惱釋曰自下第三分別地中隨眠等障於中有四一分別隨眠種數多少二分別粗重斷所顯示三分別粗重斷之時分四分別菩薩煩惱德失此即第一分別隨眠種數多少於中先問後答此即問也梵音阿奴耶此云隨眠謂隨逐眠即伏眠隨逐行者眠伏不起故名隨眠薩婆多宗貪等煩惱於境隨增故名隨眠大衆部等現行名纏不相應行名為隨眠如宗輪論如是等説皆不應理隨眠名義不相應故是經部及大乘宗即説種子名為隨眠佛告觀自在菩薩曰善男子略有三種釋曰自下第二如來正答於中有二初標數略答後次第別釋此即初也謂煩惱種種雖有無量略攝為三一者害伴隨眠謂於前五地何以故善男子諸不俱生煩惱現行是俱生煩惱現行助伴彼於爾時永無復有是故説名害伴隨眠釋曰自下第二次第別釋三種隨眠此釋三種隨眠此釋第一害伴隨眠文有五節一標名二配位三徵詰四正釋五結名言害伴者標名也言在於五地者配位也何以故者徵詰言善男子等正釋名義依大乘宗一切煩惱略有二種一者俱生二分別起分別即是見所斷惑言俱生者修所斷惑故成唯識第一卷云然諸我執略有二種一者俱生二者分別俱生我執無始時來虗妄熏習內因力故恆與身俱生不待耶教及耶分別任運而轉故名俱生具説如彼分別我執亦由現在外緣力故非與身俱要待耶教及耶分別然後方起名分別具説如彼今言諸不俱生現行煩惱者見道所斷分別煩惱言俱生者六識相應修所斷惑見道位前展轉相伴而得現行今見道後已害見惑不俱生伴故名害伴據實害伴是現行惑而説隨眠名害伴者是害伴之隨眠故名害伴即六釋中依主釋也言是故等者結文可知二者羸劣隨眠謂於第六第七地中微細現行若修所伏不現行故釋曰第二羸劣隨眠文有三節謂標名配位釋名言羸劣隨眠者即是標名亦依主釋準上應知言六七地中微細現行者配位對前粗故名為微細言若修所伏不現行故者釋羸劣義若者不定之聲謂有菩薩七地已來不伏煩惱故令現行自有菩薩伏令不起有此不定故説若言此中意説設彼現行亦名羸劣何以故若修所伏不現行故釋羸劣名準上應知三者微細隨眠謂於第八地已上從此已去一切煩惱不復現行唯有所知障為依止故釋曰第三微細隨眠文有三節謂標名配位釋名言微細隨眠者謂標名也言謂於第八地已上者配位言從此已去等者釋微細名義有其二因一者八地已上一切煩惱皆不現行於一切時常入觀故設不入觀即彼等流滅盡定等而現行故由斯道理一切煩惱無時現行二者唯有所知障為依止故謂以八地已上無煩惱故唯有末那識俱所知障與有漏法為所依止又解雖無能依現行煩惱而有所依現行所知障故由此二因雖有種子其相難知故言微細然此後因深密經云唯有一切境微細障相續經云及爾炎障依少故成唯識論所引經云唯有所依知障在也此即微細即隨眠故於六釋中持業釋也問此三隨眠何障所攝答有三釋一云此三唯所知障一云初二煩惱第三隨眠唯所知障一云此三唯煩惱障雖有三釋後説為正順文相故問三隨眠為同體不自有三説一云三種體各不同粗行隨也細異故一云後後攝前前故寬狹有異一云此三約位辨劣八地已上轉名微細於三説中第三為勝觀自在菩薩復白佛言世尊此諸隨眠幾種粗重斷所顯示釋曰自下第二分別粗重斷所顯示於中有二先問後答然此一段意趣難解故先分別隨眠粗重差別之相後方釋文言隨眠者種子異名二障種子隨逐行者眠伏不起故名隨眠煩惱隨眠見所斷者入初地斷餘修所故由不斷要至金剛一時頓斷若所知障見所斷種入初地時見道位斷修所斷者地別斷皆用無間解脫道斷於解脫道證得擇滅言粗重者由二障種勢分力故令有漏身無所堪能名為粗重亦名習氣與有漏法非一非異斷與未斷位差別故不可言一離五蘊外無別體故可不言異由斯義故更不可別起無間解脫二種斷道亦不別得擇滅無為但由智力漸除種子所引粗重如是粗重及彼隨眠有寬狹者如瑜伽論第二卷云所有種子若煩惱品所攝種身不名粗重亦非隨眠何以故此法生時所依自體唯有堪能非不堪能解云此説所有種子若煩惱品所攝名粗重者即煩惱種子名為粗重非此所説無堪任性以彼種子有體性故然此粗重略以四門分別一釋名字二出體性三種數多少四斷之位地釋名字者先通後別三粗重者三是標數謂皮等三於諸善法無所堪能故名粗重即六釋中帶數釋也言別名皮實心如佛性論第三三無性第一梁攝論十一瑜伽七十五或名皮膚實如瑜伽論第四十八或皮膚骨如善戒經第八地持第九深密相續及此經第一如是三種從喻得名是持業釋或可依主尋即可知言出體性者真諦三藏依三無性論即説貪等修所斷惑為皮見所斷惑為肉及心煩惱以為心體由斯舊來諸師多作此釋大唐三藏依護法宗作如是説二障種子名曰隨眠由彼所引無堪任性名為粗重故成唯識第九卷云又十無明不染汙者唯依十地修所斷説雖此住中亦伏煩惱斷彼粗重而非正意不斷隨眠故此不説又唯識第十卷云雖於修道十地位中皆不斷滅煩惱障種而彼粗重亦漸滅由斯故説二障粗重一一皆有三住斷義雖諸住中皆斷粗重而三位顯是故偏説由斯道理此中粗重即非種子瑜伽七十三云皮肉心者見所斷惑粗重名皮修所斷惑粗重名肉見修所斷所知障品粗重名心此約二障見修所斷別總建立如四十八等皮膚實三唯所知障以為體性梁朝攝論地前十地一一地中依入住出名皮肉心以粗細義分為三種三無性論八種分別生三煩惱貪等惑事名皮我慢事類名肉諸戲論事名心佛性論説想見心倒如次名為皮肉心惑論者意別不可會釋言種數多少者有處唯依所知障中開三粗重如善戒經曰地持論及瑜伽論故彼瑜伽四十八云又由如是所説十二諸菩薩住經三無數大劫時量能斷一切煩惱障品所有粗重及斷一切所知障品所有粗重於三住中當知能斷煩惱障品所有粗重謂於極喜住中一切惡趣諸煩惱品所有粗重皆悉永斷一切上中諸煩惱品皆不現行於無加行無功用無相住中一切能障一向清淨無生法忍諸煩惱品所有粗重皆悉永斷一切煩惱皆不現前於最上成滿菩薩住中當知一切煩惱習氣隨眠障等皆悉永斷入如來住當知一切所知障品所有粗重亦有三種一者在皮粗重二者在膚粗重三者在實粗重當知此中在皮粗重極喜住皆悉已斷在膚粗重無加行無功用無相住皆悉已斷在實粗重如來住中皆悉已斷得一切障極清淨智於三住中煩惱所知二障永斷所餘諸住如其次第修斷資糧或有處説煩惱所知合説三種如瑜伽七十三煩惱障中見修分二名為皮肉若所知障五心粗重故彼論云問於此成滿建立幾乘齊何時證答隨三種根差別證故建立三乘用阿耨多羅三藐三菩提果以為根本又彼二乘隨緣差別隨所成就無決定故證得時亦不決定其最後乘要經三種無數大劫方可證得依斷三種粗重一惡趣不樂品在皮粗重由斷彼故不住惡趣修方便時不為不樂之所間離二煩惱障品在肉粗重由斷彼故一切種極微細煩惱亦不現行然未永害一切隨眠三所知障品在心粗重由斷彼故永害一切所有隨眠遍於一切所知境界無障礙智自在而轉言斷位地者略有四門一住三住斷故説皮等如四十八等二顯三隨眠説斷皮等如即此經三隨入住出由斷皮等如梁攝論地前十地依入住出三十三僧祇二地中斷皮等三四就實分別於十二住皆斷粗重隨相顯故説住三斷如成唯識第十卷説所以如是諸教異者説皮等三意顯所斷有粗細義故依四門顯粗重義於理無違尋即可知上來已辨隨眠粗重差別之相次當釋文此中問意三粗重中由斷幾種顯彼隨眠相續經云幾種過斷名斷彼使解云經意斷使中粗重假説名斷使據實不斷菩薩故留至金剛故深密經云斷幾種名斷諸使者意相續同佛告觀自在菩薩曰善男子但由二種釋曰自下第二如來正説於中有二初標數略答後別釋二種此即標數略答謂斷皮膚二粗重故具顯隨眠離粗重義義如別釋謂由在皮粗重斷故顯彼初二復由在膚粗重斷故顯彼第三釋曰自下別釋但由二種相於中有二初釋但由二種後釋斷骨不別顯示此即別釋但由二種謂前所説三種隨眠但斷所知障中二種粗重之所顯示所謂一者從極喜地乃至七斷皮粗重由斷此一粗重義故能顯害伴羸劣隨眠離粗重義或由第二粗重斷故便能顯示第九第十地中微細隨眠離粗重義問若爾三十八説三住斷三粗重如何會釋解此經與彼名雖相似義即不同不須會釋或可此經與四十八義無差別謂皮粗重初地已斷八地斷膚佛地斷骨害伴等三義相未顯由於初地斷皮粗重害伴羸劣二義方顯故言由斷皮故顯彼初二於第八地斷膚粗重微細義顯故言由斷膚故顯彼第三如是答中即既有兩釋準此問中亦有二意準答應知若在於骨粗重斷者我説永離一切隨眠位在佛地釋曰第二明斷骨粗重不別顯示此意説言所知障中在骨粗重極微細故至解脫道方能斷盡此位中不別顯示三種隨眠離粗重義總相顯示位在佛果永離三種隨眠種子相續經云幾種過斷名斷彼使佛告觀音有三種初皮過斷第二膚過斷第三骨過斷離一切使者我説唯佛地經三劫斷深密經云斷幾種過名斷諸使佛言斷三過能斷諸使觀音自在初斷皮障離第一過次斷膚障離第二過次斷骨障離第三過我説一切使盡是名為佛經三劫解云二經與此經異者譯家別故但説煩惱障中三種粗重而言在骨説佛果者解脫道中斷粗重故又解此中三種粗重但説煩惱障中三種粗重而言在骨説佛果者解脫道中斷粗重故或可此中三種粗重前之二種屬煩惱障第三粗重屬所知障如瑜伽論第七十三問豈不二障各有隨眠及彼粗重如何此經説隨眠處唯取煩惱而粗重處但説所知有何意耶答諸聖教宣説諸法有其多門一就實盡理門如瑜伽四十八謂各別説煩惱障中三種粗重及所知障三種粗重廣如前引二影略互顯門謂今此經隨眠門中但説煩惱而非所知影顯所知亦有三種粗重義中但説所知影顯煩惱亦有三種而二障中各三粗重如四十八尋則可知觀自在菩薩復白佛言世尊經幾不可數劫能斷如是粗重釋曰自下第三分別粗重斷之時節於中有二先問後答此即問也佛告觀自在菩薩曰善男子經於三大不可數劫或無量劫所謂年月半月晝夜一時半時須臾瞬息剎那量劫不可數故釋曰自下總答粗重斷之時節謂經三劫或無量劫而三本經皆不別釋今釋此文自有兩説一初斷皮第二斷膚第三斷骨故梁攝論第十一云約除皮肉心三煩惱故立三阿僧祇劫又瑜伽論七十三云其最後乘要經三種無數大劫方可證得依斷三種粗重別故一云前二僧祇斷皮粗重第三斷膚入如來地斷骨粗重雖有兩説後説順經更思言無量者依年月等不可數故名無量劫然於此中有其九數一年二月三半月四晝夜五一時六半時七須臾八瞬息九剎那相續經云有三無量或剎那羅婆摩睺妬路半時一時日夜半月一月離兜二月為一節一節名離兜深密經云三大阿僧祇劫無量時無量半月無量夜無量晝日無量念無量剎那無量無睺多無量羅婆劫也問理應先説剎那量等後説大劫如何先劫後剎那耶答此如婆沙一百三十六説彼云由剎那等積成晝夜晝夜積成半月半月等積成大劫何故前説粗後説細耶答彼作論者意欲爾故有作是説阿毗達磨應以相求不以先後以但不違法相隨説無失有餘師説此論中先説粗後説細令諸學者漸次入故此經亦爾故無有失令釋此經從後向前言剎那者即是剎那及怛剎那梵音剎那此云極少時故智度論云時中最少六十念中一念也又雜心論第二卷云言少時者謂一剎那時之至少極於一念故説剎那為時分齊剎那量者有説如壯夫疾回歷觀衆星隨其歷一星一剎那廣説如彼又大婆沙一百三十六云問彼剎那量云何可知有作是説施設論説如中年女滑續毳時樹梀細毛不長不短齊此説為怛剎那量彼不欲説毳縷短長但説毳毛從指間出隨所出量是怛剎那問前問剎那何緣乃引施設論説怛剎那量各此中舉粗以顯於細難知不可顯故謂百二十剎那成一怛剎那乃至廣説有説此粗非剎那量如我義者如壯夫彈指頃經六十四剎那有説不然如我義者如二壯夫制手斷衆多迦思細縷隨爾所縷斷經爾所剎那有説不然如我義者如二壯夫執持衆多迦尸細縷有一壯夫以至那國百練剛刀捷疾而斷隨爾所縷斷經爾所剎那有説猶粗非剎那量實剎那量世尊不説云何知然如契經説有一苾芻來諸佛所頂禮雙足却住一面白世尊言壽行云何速疾生滅佛言我能宣説汝不能知苾芻言頗有譬喻能顯示不佛言有今為汝説譬如四善射弓夫各執弓箭相背攢立欲射四方有一捷夫來語之曰汝等今可一時放箭我能遍接但令不墮於意云何此捷疾不苾芻白佛甚疾世尊佛言彼捷疾不及地行藥叉地行捷疾不及空行藥叉空行捷疾不及四大王衆天彼天捷疾不及日月輪二輪捷疾不及聖行天子此是導引日月輪車者此等諸天展轉捷疾壽行生滅捷疾於彼剎那流轉無有暫停由此故知世尊不説實剎那量問何故世尊不為他説實剎那量答無有有情堪能知故問豈舍利子亦不知耶答彼雖能知而於彼無用是故不説佛不空説佛不空説法故梵音臘縛此云瞬息舊云羅婆瞬謂目瞬息是氣息婆沙論云百二十剎那成一怛剎那六十怛剎那成臘縛此云有七千二百剎那毗曇亦同梵音牟呼栗多此云須臾舊云摩侯羅多婆沙論云三十臘縛成一牟呼栗多此有二百一十六千剎那毗曇論云有二十一萬六千剎那言半時者依智度論晝夜各三時合有六時半時者即是一中之半時也言一時者即六時中之一時也又解依俱舍論一年之中分為三時謂寒熱雨各有四月今此半時即雨月也言一時者即四月也雖有兩釋前説為勝所以然者今此經意從短至長若依俱舍時長晝夜是故前説以為正也依法華論時長於日故彼論云晝夜日時年不可數故俱舍説時當法華論言晝夜者婆沙論云三十牟呼栗多成一晝夜此有少二十不滿六千五百千剎那此五薀身一晝一夜經於爾所生滅無常毗曇論云有六六百四十八萬剎那也言半月者即十五日也言一月者即三十日也所言年者十二月也故俱舍論第十云剎那百二十為一怛剎那六十怛剎那為一臘縛三十臘縛為一牟呼栗多三十牟呼栗多為一晝夜三十晝夜為一月總十二月為一年於一年中分為三時謂寒熱雨各有四月廣説如彼剎那等所以名為劫者如婆沙論一百三十五説彼云何故名劫劫是何義答分別時分故名為劫謂分別剎那臘縛牟呼栗多時分以成晝夜分別晝夜時分以成半月月時年分別半月等時分以成於劫是分別時分中極故得總名聲論者意分別位故説名為劫一所以者何劫是分別有為行中究竟位故梵音阿僧企耶此云無數梵音劫波或云劫波羅此翻為時謂無數時也然此僧祇諸教不同若依俱舍六十轉中阿僧祇劫是其一數故彼論云應知有四劫謂壞成中大壞從獄中生至外器都盡成劫從風起至地獄初生中劫從無量減至壽唯十次增減十八後增至八萬如是成已住名中二十劫成壞壞已空時皆等住劫八十中劫大劫大劫無數乃至彼云如是所説成住壞空各二十中積成八十總此八十成大劫量劫性是何謂唯五蘊經説三劫阿僧企耶精進修行方得成佛於前所説四種劫中積何劫成三劫無數纍前大劫為十百千乃至積成三劫無數既稱無數何復言非無數言顯不可數解脫經説六十數中阿僧企耶是其一數乃至廣説解云阿僧祇數是第五十二諸傳誦者忘失後八故大婆沙一百七十七云阿僧企耶是六十數中第五十二或可僧是第六十諸傳誦者忘失前八若依華嚴阿僧祇品百二十轉中第一百三名阿僧祗若依智度論第四卷説十二轉中第十一數名阿僧祇又智度論第五卷中引不可思議經一百二十二數中阿僧祇數是第一百七若廣分別具如別章問菩薩成大菩提要經三劫為不定耶答瑜伽七十三地持第九善戒經第八無性攝論第一要經三大劫無量義經華嚴經等而不決定不滿三劫即成佛故依大般若過三大劫乃得成佛故大般若五百六十八云三無數劫修行成佛其義不爾經無量劫故觀自在菩薩復白佛言世尊是諸菩薩於諸地中所生煩惱當知何相何失何德釋曰自下第四分別菩薩煩惱德失於中有二先問後答問意淮答應知佛告觀自在菩薩曰善男子無染汙相釋曰自下第二世尊正答上三問即分為三此釋初問於中有四此即第一標名略答何以故釋曰第二反詰是諸菩薩於初地中定於一切諸法法界已善通達由此因緣菩薩要知方起煩惱非為不知釋曰第三正釋謂能了知煩惱過失方起惑故名無染相據實是染而從智生名為無染又無上依經云阿難一切諸佛在因地中依如來界修行善根為利衆生來入三界是諸菩薩生老等苦非真實有何以故已如實見如來界故雖有煩惱不能染汙具説如彼是故説名無染汙相釋曰第四結文可知於自身中不能生苦故無過失釋曰此答第二問也雖有煩惱已初伏故不能生苦故不成過無性論云不能招苦故無有罪又集論第七卷云此諸菩薩雖未永斷一切煩惱然此煩惱猶如呪藥所求諸毒不起一切煩惱過失一切地中如阿羅漢煩惱成唯識第三雜集十四瑜伽七十九亦同集論又攝大乘第十卷云論云煩惱伏不滅如毒呪所害留惑至惑盡證佛一切智無性釋云煩惱伏不滅者謂菩薩位中伏諸煩惱而未永斷如毒呪所害者譬如衆毒為神驗呪之所損害體雖未滅而不為患煩惱亦爾由念智力伏現行纏隨眠猶在何故煩惱隨眠猶在恐同聲聞乘速般涅槃故由道現理煩惱為因至煩惱盡得一切知有頌言念智力所滅煩惱證菩提如毒呪所害過失成功德世親大同菩薩生起如是煩惱於有情界能斷苦因是故彼有無量功德釋曰自下第三答第三問於中有二初如來答後菩薩歎此即初也謂菩薩故起煩惱斷衆生苦即説菩薩煩惱名斷苦因又解由菩薩故斷衆生煩惱即説衆生煩惱名為苦因感生死苦由煩惱故然初地已上乃至七地所起煩惱自有二意一者無性攝論云惑已伏為䜗彼力故心暫起二者故起煩惱受分段身利益衆生由斯故有無量功德故瑜伽云然諸菩薩由自煩惱能作一切衆生利益生無量福又攝大乘云菩薩善巧方便行煞生等十種業作而無有罪生無量福速證菩提無性釋云不能招苦故無有罪能助道故生無量福觀自在菩薩復白佛言甚奇世尊無上菩提乃有如是大功德利釋曰第二菩薩讚歎於中有二初嘆佛德後嘆菩薩德此嘆佛德謂菩薩所求未來菩提乃有如是大功德利或可現在或可三或諸佛菩薩功德利故能令菩薩所作皆勝令諸菩薩生起煩惱尚勝一切有情聲聞獨覺善根何況其餘無量功德釋曰第二嘆菩薩德菩薩生起煩惱善根尚勝一切異生二乘所有善根何況其餘諸善功德凡夫發心即勝二乘何況地上菩薩為利衆生故起煩惱故智度論七十八云阿羅漢辟支佛雖漏盡不如初發心菩薩譬如轉輪聖王太子雖在胎中已勝餘子又如國王太子雖未即位勝諸大臣有位富貴者何以故一切衆生皆自求樂自為身故愛其所説一切二乘雖不貪世樂自為滅苦故求涅槃樂不能為衆生菩薩為度衆生故發心是故勝也譬如有一六通阿羅漢將一沙彌令負衣鉢隨路而行沙彌思惟我當以何乘入涅槃即發心佛為世尊最尊最妙我當以佛乘入涅槃師知其念即取衣鉢自擔椎沙彌在前行沙彌覆思惟佛道甚難久住生死受無量苦且以小乘早入涅槃師知復以衣鉢還與沙彌令擔語在後行如是至三沙彌白師師年老毛狀如小兒戲方始令我在前已復令我後何其大速師答汝初念發心作佛是心貴重則作我師道中如是人諸辟支佛當應供養何況阿羅漢以是故推汝在前汝心還悔欲取小乘而未便得汝云我懸遠是故令汝在後沙彌聞已驚悟我師能知我心我一意發已勝二乘何況成就即自堅固住大乘法又智度論五十六云供養三千大千世界滿中二乘如稻麻竹葦不如供養一初發意菩薩問曰二乘已證實際是一切衆生福田何以故不如初發意菩薩答曰以三事故不如一者用薩婆若心行二者常不離六波羅蜜等諸功德三者由是菩薩斷三惡道出生三乘二乘不爾是故勝也觀自在菩薩復白佛言世尊如世尊説若聲聞乘若復大乘唯是一乘此何密意釋曰自下第四分別説一乘意於中有二先請後説此即請問謂佛世尊諸阿含中説聲聞乘大乘經中説菩薩乘即説彼二説為一乘如法華等此何密意佛告觀自在菩薩曰善男子如我於彼聲聞乘中言宣説種種諸法自性所謂五蘊或內六處或外六處如是等類於大乘中即説彼法同一法界同一理趣故我不説乘差別性釋曰第二如來正説於中有三初正釋密意次明迷者謬執後結成密意此即正説佛告觀自在曰如我於彼聲聞乘中説宣蘊等由此理趣諸乘差別而我於此大乘教中説同一性真如同故或前第二卷説同一理趣同道故説為一乘非無諸乘有差別於中或有如言於義妄起分別一類增益一類損減釋曰自下第二謬執於中有二初明增減後興諍論此即初也謂如來説三乘教門如文執義聞説三乘定執義三乘一向各異説名增益不許不定佛成義故或聞一乘總皆成佛定唯一乘名為損減損減寂靜不成佛故又於諸乘差別道理謂互相違如是展轉遞興諍論釋曰第二共興諍論謂説一乘定知三者是方便説聞説三乘定執三乘違於一乘論其實義説有三乘不違一乘三乘雖異而同一如故三或一互不相違故前第二卷云復次勝義生諸聲聞種性有情亦由此道此行迹故證得無上安隱涅槃緣覺菩薩皆共此道更無第二我依此故密意説言唯有一乘非於一切有情界中無有種種有情性或鈍或鈍根性或中根性或利根性有情差別善男子若一向趣聲聞雖蒙諸佛施設種種導終不能令當坐道場證大菩提具説如彼故如一乘約理行説如是名為此中密意釋曰第三結文可知是三乘差別而約理同是故密意説為一乘據蘊等法不得言一也廣釋一乘如第四卷記中已説爾時世尊欲重宣此義而説頌曰釋曰自下第二舉頌略説於中有二初發起頌文後舉頌正説此即初也諸地攝想所對治殊勝生願及諸學由依佛説是大乘於此善修成大覺釋曰自下第二舉頌正説有其三頌頌上長行於中有二初之一頌頌上地度後之二頌頌上一乘此即初也諸地攝者頌上四淨及十一分能攝諸地諸地想心者頌釋十地名想者名也名從想起從因立名名之為相諸地所對治者頌二十二愚及十一粗重十地之行所對治故諸地殊勝者頌上八種殊勝清淨諸地殊勝生者頌上菩薩勝生諸地願者頌上三願諸地諸學者頌上諸度種種諸門問如何不頌諸隨眠等解云何所對治義已攝故故不別頌上來正頌已訖後有二句勸學大乘令取大覺或可二句生起二頌宣説諸法種種性復説皆同一理趣謂於下乘或上乘故我説乘無異性釋曰自下第二頌頌上一乘此頌佛告至乘差別謂於下聲聞及上如來同一理趣故我不説有其異性真如同故如言於義妄分別或有增益或有損減釋曰頌上於中乃至一類損減謂此二種互相違愚癡意解成乖諍釋曰此頌久於諸已下乃至此中密意廣釋一乘如前第四説中已説爾時觀自在菩薩摩訶薩復白佛言世尊於是解深密法門中此名何教我當云何奉持釋曰自下大段第二依教奉持分於中有二先問後答此即請問奉持之義佛告觀自在菩薩曰善男子此名諸地波羅蜜多了義之教於此諸地波羅蜜多了義之教汝當奉持釋曰自下第二如來正答於中有二初勸學奉持後明説教勝利此即第一勸學奉持説此諸地波羅蜜多了義教時於會中有七十五千菩薩皆得菩薩大乘光明三摩地釋曰此明説教勝益大乘光明三摩地者如成唯識第九卷云大乘光明定者謂此能發照了大乘理教行果智光明故又梁攝論第十一云論曰大乘光明三摩提釋曰大乘有三一性二隨三得性即三無性隨即福智所攝十地十度隨順性無得門所得四德之果此之緣此三種為境故名大乘依止此定得無分別智照真如乃佛不異故名光明又此定能破一闡提無明暗是暗對治故名光明如來成所作事品第八經本第五將釋此品三門分別一釋品名義二辨品來意三依文正釋釋品名者曰有二義一如來者顯能化主二成所作事品者辨所化事業言如來者梵音多陀阿伽度此云如來略有三義一唯一約理釋如來二但依行三通理行唯約謂真如理如波若經無所至去無所從來故名如來能斷經云言如來者即是真實真如都無所去無所從來故名如來密嚴經云無生無滅故名如來如是等故如即是來故名如來是持業釋唯依行者如十住論第一卷云如名六度以是六法來至佛地故名如來智度論云乘如實道來成正覺若依此釋如之來故名為如來是依主釋就理行者如涅槃經第一卷云乘六波羅蜜十一空來故名如來又十住論云如名實相來名智慧故名如來解云六度是行空及實相是所證理從因及境來成正覺故名如來亦依主釋若廣分別如十號章言成所作事品者辨作事業成謂成辦事即事業謂依境行成辦如來現身智等化身事業據實應言成三身品然諸如來利物為先是故從化以標其品或可三身皆能成辦化有情業相續經云如來所作隨順處了義經深密經云文殊師利法王子菩薩問品辨來意上來已釋無等境行故今正釋無等果義依理起行因行得果義次第故爾時曼殊室利菩薩摩訶薩白佛言世尊如佛所説如來法身如來法身有何等相釋曰第三正釋經文於一品內總分為二初問答正説分後爾時曼殊室利至云何奉持下明依教奉持分就正説中十二問答即分十二一問答分別法身之相二明如來化身生起相三明如來化身善巧四明如來言音差別五爾時曼殊室利下明諸如來心生起相六明化身有心無心七明如來所行境界差別之相八明如來於相性為緣差別十明如來法身三乘解説身差別相十一明如來菩薩威德住持有情相十二明淨穢二土差別相此即第一問答分別法身之相或可十二即分為三初明法身相次曼殊室利至云何應知如來生起明化身相爾時曼殊室利下明受用身相雖有兩解且依後釋然此三身之義具如別章就釋文中先問後答此即曼殊室利菩薩問也曼殊室利菩薩者此云妙吉祥真諦師云心恆寂靜於怨親中平等利益不為損惱名為吉祥佛埊論云一切世間親近供養咸稱贊故具吉祥義相續經云文殊師利菩薩深密經文殊師利王子菩薩觀察諸法三昧經云普首菩薩阿難目佉陀羅尼經云濡首菩薩無量門微密持經云敬首菩薩正法華云傅首菩薩梁本涅槃經云妙德菩薩大品經云滿柔尸利菩薩智度論滿濡尸利菩薩無垢稱云妙吉祥菩薩文殊般若云文殊師利童真菩薩智度論如首楞嚴經説文殊師利是過去龍種尊佛央掘魔經云文殊現見北方歡喜藏摩尼寶積佛今此菩薩實是菩薩或可如來示菩薩相影嚮佛法佛告曼殊室利菩薩曰善男子若於諸地波羅蜜多善修出離轉依成滿是名如來法身之相釋曰自下第二世尊正説於中有二初明法後釋解脫身前中有二初明法身相後顯不思議此即初也文有四節一佛告等者標説聽者二若於諸地波羅蜜多善修出離者顯法身因有其二種一者六度地是修因所依位地度即依地所修正因望於法身即是了因於餘二身即生因而今此中正明了因顯法身故善修出離者由修六度出離惑業故名出離故瑜伽云所修諸行出興涅槃相應故名出離謂所修道能與涅槃相應故名出離又出離者是進趣義故攝大乘第八卷云進趣究竟故名出離即是進趣大涅槃義三轉成滿者正明法身之相言轉依者如攝大乘第七卷説謂非真義皆不顯現所執性也所有真義皆悉顯現故名轉依圓成實性言成滿者簡異圓滿真如法身自有二種若在因位名為圓滿至於果轉名成滿成滿即是成就成辦之異名也故此經第三云於如來地永害二障依於所依成滿所緣建立最極清淨法身又雜集論第十二云法身者謂所知障永害轉依所攝此於第十地名圓滿於如來地名成就世親無性攝論第七瑜伽七十三皆同雜集總説意云謂善修十地十度出離之道證得轉依成滿法身無上依經梁攝大乘皆作是言修習十地十度出離道所得轉依為相此轉依義具如別章廣如集論第六雜集第十無性世親攝論第九梁論第四及十三十四莊嚴第三三無性論第二成唯識第十大業攝大乘等當知此相二因緣故不可思議釋曰第二顯不可思議於中有三初依因立宗二辨二因相三謬執有失此即初也無戲論故無所得故釋曰第二辨二因相一無戲論二無所為相續經云離虛偽無行深密經云離諸戲論一切有為行相言戲論者謂有無等四謗戲論乃至一切常無常等種種戲論言所為者一切障礙生滅等為業煩惱為然此法身無諸戲論生滅等為故名不思議是故無性攝大乘論第八卷云法身即是轉依為相離一切障常住真如無變易故非業煩惱所能為故無上依經第一卷云二因緣故不可思議一者不可言説過語言境故二一切出世於世間中無譬類故顯揚第八攝論第九二種因緣同無上依經若依攝論第九以三義釋真如法身不可思議彼云論曰五不可思議為相謂真如清淨自內證故無世間喻能喻故非諸尋思所行處故無性釋云思議者謂依道理審諦思惟分別智起分別智尋思所攝譬喻所顯諸佛非此所行處不可思議超過一切尋思地故準上應信解不思議而諸衆生計著戲論有所為故釋曰第三謬執有失謂諸有情無始時來由無知故計著法身執有無等種種戲論或生滅等有為之相由是因緣不證法身世尊聲聞獨覺所得轉依名法身不釋曰自下第二明解脫身於中有四一問二答三徵四釋此即問也謂彼二乘斷煩惱障所得無為名為法身不善男子不名法身釋曰即第二如來正答雖證涅槃不名法身非功德法所依止故世尊當名何身釋曰此即第三菩薩徵詰善男子名解脫身釋曰自下第四如來正釋於中有二初標解脫身相後辨差別相此即標也謂能解脫煩惱繫縛名解脫身由解脫身故説一切聲聞獨覺與諸如來平等平等釋曰自下第二辨二身別相於中有二初約解脫身辨三乘無別後約法身辨有差別此即初也謂彼二乘與諸如來所斷煩惱無差別故所得擇滅亦無差別故作此言與諸如來平等平等然釋此義諸説不同薩婆多宗自有兩説大毗婆沙三十一云評曰應作是説隨有漏法有爾所體擇滅亦爾隨所轉繫事體有爾所離繫亦爾有爾體故問諸有情類證擇滅時為欲別證為共證耶有餘師説各各別證問若爾契經所説如何會釋如説如來解脫與餘阿羅漢等解脫無二答三乘身中解脫雖異而善常同故説無異復次此言顯示一相續中有三乘道同證解脫謂望他身所證解脫雖各有異而一身中有三乘性同證解脫隨依何乘引起聖道皆能證得此涅槃曰彼不應作是説應作是説諸有情類普於一一有漏法中皆共證得一擇滅體解云評家共證諸滅故言解脫無異具説如彼依經部宗同斷煩惱所證滅故假説同言非有別體辨其同異其宗擇滅無體性故今依大乘於一真如説擇滅故不同薩婆多於真如上假建立故不同經部有説此中所説身通攝智斷及五分法身雖有兩釋前説為正由法身故説有差別釋曰自下第二釋有差別於中有二先標後釋此即標也斷二障故能與無量功德所依有差別如來法身有差別故無量功德最勝差別算數譬喻所不能及釋曰此即第二正釋差別謂由法身有差別故無量功德所依殊勝與二乘差別算數譬喻不能及即依如是二身別相攝大乘論第三卷云此中法身與解脫身差別者謂解脫身唯名遠離煩惱障縛如人離枷鎖等所有禁繫息除衆苦而無殊勝增上自在富樂相應其法身者解脫一切煩惱所知二種障縛并諸習氣力無畏等無量希奇妙功德衆之所莊嚴一切富樂身在所依證得第一最勝自在隨樂而行譬如王子先灌頂少有𠍴犯閇在囹圄才得解脫即與第一最勝自在富樂相應梁論第三大意亦同又成唯識第九卷云二乘滿位名解脫身在大牟尼名法身故問二種解脫若無別者入大乘論如何會釋彼云如來解脫於二乘斷習氣故大唐三藏會釋經論云據實如來二乘解脫體無差別同斷煩惱所證滅故斷諸習氣不證滅故而差別者二乘解脫習氣未盡如來解脫斷習氣之所顯示由斯經論各舉一義互不相違曼殊室利菩薩復白佛言世尊我當云何應知如來生起之相釋曰自下第二明化身相於中有三初明生起次明示現方便善巧相後明言音差別相前中有二先問後答此即請問化身之相佛告曼殊室利菩薩曰善男子一切如來化身作業如世界起一切種類如來功德衆所莊嚴住持為相釋曰自下第二如來正答於中有二初明後後化身生起之相後辨二身差別之相此即初也文有三節法喻合説謂一切如來化身如金光明經第一卷説彼云云何菩薩了別化身善男子如來昔願修行地中為一切衆生修種種法是諸修法至修行滿修行力故得至自在力自在力自在故隨衆生意隨衆生行隨衆生界多種了別不待時不過時處所相應時相應行相相應説法相應種種身是名化身此經亦爾由昔所修種種因願起諸如來種種作業譬如世界由種種業起種種事攝持衆生如來化身亦復如是由種種行無量種類功德莊嚴持攝衆生以為化相當知化身相有生起法身之相無有生起釋曰此即第二辨二種身差別之相謂二身中當知化身因所起故有生起相真如法體是常故無性起相曼殊室利菩薩復白佛言世尊云何應知示現化身方便善巧釋曰自下第二示現善巧相先問後答此即請問然此化身方便善巧如佛地第七説彼云成所作智起三業化稱順機宜故名善巧加行不斷故名方便佛告曼殊室利菩薩曰善男子遍於一切三千大千佛國土中或衆推許增上王家或衆推許大福田家釋曰自下第二如來正答於中有二先釋後結釋中有二初明化處後明化相處於中有二初明總所行處謂遍於一切三千大千佛國土中即是一切化身所行之處後明別所生處謂或衆推許增上王家即是剎帝利家或衆生推許大福田家則是婆羅家故瑜伽第十五云剎帝利衆於人趣中最增上故婆羅衆世間共許為福田故同時入胎誕生長大受欲出家示行苦行捨苦行已成等正覺次第示現釋曰第二正明化相然此化相多少差別諸教不同無上依經有十三相一示升兜率二示下彼天三現降胎四現出胎五現童子位六現受學七現遊戲後園八現出家九現苦行十現往詣道場十一現成佛十二現轉法輪十三現般涅槃依相續經為十一相一入胎二出胎三生長四受欲五出家六苦行七往詣道場八降魔九成佛十轉法輪十一入涅槃依深密經亦十一相與相續經大同少異謂加住胎及大捨相闕詣道場及降魔相今此經中唯為七相兼取諸經住天住胎轉法輪入涅槃合十一相以釋此經言住天者大嚴經兜率品云佛告比丘何等為名大嚴經典謂顯菩薩住兜率宮常為無量威德諸天之所供乃至廣説又涅槃經三十三云兜率陀天欲界中勝下天放逸上天暗鈍修施及戒得上下身修施戒定得兜率是故名勝又智度論第四卷云問云菩薩何以但生兜率不生上天耶答曰佛常居中道故兜率陀於六欲天及梵之中上三下三此天是中於彼天下必生中國中夜降神中夜出家行於中道得佛菩薩中道説法中夜涅槃好中法故中即上生廣説如彼又智度論三十八云何故菩薩但生兜率無色界中無形不得説法故不在中生色界中雖有色身可為説法而深著禪不在中生下三欲天深厚結使心粗散亂上二欲天結使既厚心儒不利兜率陀天結使薄心濡利故生彼中又婆沙論一百七十八云問何故菩薩唯生都史多天答唯都支多天壽量與菩薩成佛及膳部人見佛業熟時分相稱謂人間經五十七俱胝六十千歲能化所化善相應若就彼即是都史多天壽量是故菩薩唯生彼天若生上天壽量未盡善根已熟若生下天壽量已盡善根未熟故不生彼廣説如彼又復云問何故不即天中成佛而來人間耶答最後有菩薩必受胎生天趣一向唯化生故復次人天並是法器為欲俱攝故來人間若在天上人無由往又不可合天上成佛來人間化人當疑佛是約所作不受法故是以菩薩隨人間成佛廣説如彼梁論第十十地論第三亦有多釋恐繁不述言入胎者依普曜經第一卷現尊品云佛告比丘於時菩薩為天大衆敷演法已問諸天子我以何形降神母胎或有説言為童子形或言釋梵形乃至或言金翅鳥形彼有梵天名曰絶盛本從仙道中來報諸天言吾察梵志典籍所載欲説菩薩降神母胎象形第一六牙白象頭首微妙威神魏魏形像姝好梵典所戴其為狀異所以者何世有三獸一兔二馬三象兔之度水趣自度取馬差獨猛猶不能知水之深淺白象之度盡其深底聲聞緣覺其猶兔馬雖免生死不達法本菩薩大乘譬若白象解暢三界十二因緣起了之本無救護一切莫不蒙濟舊俱舍云六牙譬六度四腳喻四如意七支喻七覺分真諦釋曰菩薩中或為白象形凡有三義一者身大二為六牙三於四足中勝身大者人間白象身長由旬天中象身長九由旬今言大者是天中白象此表菩薩福德大也四足表四行一智二諦三藏四寂靜六牙表六無上一得二見三聞四覺五念六供養師子獸王所以不作師子相者師子獨無侶不為眷屬所隨菩薩出世必為四衆所隨逐也依涅槃經及因果經皆云菩薩化乘白象降神母胎言住胎者大嚴經處胎品云菩薩處胎十月所居宮殿梵天所奉縱廣正等三百由旬種種莊嚴六欲諸天不能覩見佛告阿難一切菩薩將入胎時於母右脅先有如是寶莊嚴然後菩薩從兜率天宮降神入胎於此殿中結跏趺坐普遍世界四大天王二十八夜叉大將天與其眷屬每於晨朝供養菩薩聽聞正法釋提桓三十三天每於中時供養菩薩聽聞正法大梵天與諸梵衆每於申時供養菩薩聽聞正法周遍十方無量菩薩於日入時供養菩薩為聽法故而至此爾時菩薩化作無量師子之座令諸菩薩各坐其上互相問答辨折上乘摩耶聖后亦不能見阿難菩薩處胎十月已能化導三十六那由他天人令住三乘言誕生者大嚴經誕生品云爾時摩耶聖后以菩薩威力故即知菩薩有欲誕生入藍毗園歷觀諸樹至彼叉寶樹下仰觀於樹即以右手攀樹東枝頻呻欠呿端嚴而立從母右脅安詳而生爾時菩薩不假扶持即便自能東行七步所下足處皆生蓮華南西北上下亦爾各行七步或作如是言我於世間最勝當為一切衆生之所瞻仰説是語時其聲普聞一切三千大千世界普曜經云帝釋梵天忽然來下雜名香水洗浴菩薩九龍在上而下香水洗浴聖尊涅槃經云生未至地帝釋奉取難陀龍王及跋難陀吐水而浴摩尼跋陀大鬼神王執持寶蓋隨後待立地神化華以承其足四方各行七步華嚴經云何故菩薩遊行七步現七寶故遊行七步滿地神願故遊行七步現七寶相故遊行七步言長大者如大嚴經示有品菩薩我始七歲然詣學堂博士見之自顧不任為菩薩師爾時太子以六十四而問師言欲以何而相教乎是時博士聞所未聞歎未曾有遂請太子而為解釋又觀農品云菩薩年漸長大便於一時於閻浮樹下結跏趺坐入於四禪諸樹光陰逐日而轉唯菩薩坐樹之影湛然不移又現藝品云爾時太子與五百釋子射御數相撲角藝種種皆勝廣説如彼言受欲者如大嚴經現藝品云時諸釋種各白王言大子年漸長大相師皆云若出家者必得成佛若在家者定為輪王應為求婚令生染著由是因緣不出家也爾時迦毗羅城有一大臣名曰執杖其人有女名耶輸陀羅相好端嚴姝妙第一父王爾時即為太子索以為妃爾時菩薩隨順世法現處中宮八萬四千婇女娛樂而住耶輸陀羅為第一妃廣説如彼涅槃經云菩薩處在深宮六萬婇女娛樂受樂言出家者如大嚴經第五卷云菩薩出城遊觀出城東門逢值老人出城南門逢值病人出城西門逢值死人菩薩思惟我亦如是愁憂不樂後於一時出城北門逢值沙門乘空而行廣説出家功德之利菩薩已請求出家父王不放又出家品云於其中夜諸天勸請令速出家菩薩即遣車匿被馬車匿聞已故發大語望使宮內皆悉聞知虗空諸天以神通力令彼一切悉昏睡都不覺知車匿即被乾陟持以進菩薩於此乘馬王已初舉步時十方大地六種震動升空而行四天大王捧承馬足爾時菩薩至彌尼國往古仙人苦行林中即便下馬慰喻車匿汝便可將乾陟俱還於是車匿舉聲大哭乾陟底頭前屈雙腳舐菩薩足淚下悲鳴菩薩思惟若不剃除髮鬚非出家法乃從車匿取摩尼劒即自剃髮時淨居天化作獵師身著袈裟菩薩前立菩薩即以所著寶衣易取袈裟爾時菩薩剃除髮鬚身著袈裟儀容顯奕作如是言我今始名真出家也廣説如彼言苦行者如普曜經苦行品六年苦行若天世人皆不能行唯有一生補處菩薩乃能行之又智度論三十八云諸外道等等信著苦行若佛不行六年苦行則人不信言是王串樂不能苦行有諸外道修苦行者三月半歲或一歲無能六年日食一麻外道謂為苦行之極是人無道真無道也於是信受皆入正道以是因緣六年苦行捨苦行已成等正覺者涅槃經云苦行六年知是苦行不能得道即便捨之至阿利跋提河中洗浴受牧牛女所奉乳糜受已轉至菩提樹下破魔波旬得成阿耨多羅三藐三菩提普曜經云有長者女發願生男當作美膳祠山樹神既生男已心大歡喜搆千頭牛展轉相飲取至淳乳用作乳糜跳出釜高一丈餘女甚怪之有梵志師語女人曰今此乳糜非凡夫所臨唯成佛食此乳糜乃消化耳女人即取奉進山神菩薩食已即便成佛婆沙論云非我於彼外道苦行不能修故而棄捨之但審觀察知是苦行畢竟不能斷諸煩惱得真義利故捨之更修真實處中妙行由斯已證無上菩提能拔衆生生死劇苦轉法輪者如前第二經記中説言示入涅槃者如大婆沙論一百九十一云如契經説世尊在拘尸城力士生處雙娑羅林間而般涅槃問世尊何故在拘尸城般涅槃耶答為欲化度拘尸城中諸力士故又為攝化外道蘇跋陀羅故有説佛曾於此數數捨身命故如彼經説佛告阿難如來於此六返捨輪王身命今第七反捨如來應正等覺身命乃至廣説又彼復云如説佛告阿難汝應往詣雙娑羅林為佛敷設北首臥牀如來於今日中夜當於無餘依涅槃界而般涅槃乃至廣説問世尊何故今敷北首臥牀而臥耶答欲顯彼國論師法應爾故謂彼國論師皆敷設北首牀而臥世尊亦爾以佛能伏諸論師故即是無上第一論師故今隨彼敷設而臥有説欲顯遠離世所妄執吉祥事故謂彼國死者乃令牀上北首而臥佛為破彼妄吉祥執是故未般涅槃即令敷設北首而臥有説為欲顯佛恭敬正法故謂預知般涅槃後無上法炬北方熾盛久久不滅故於牀上北首而臥乃至廣説彼復云如説爾時世尊趣所敷牀右脅在下纍足西面北首而臥住光明相具念正智乃至廣説問世尊何故右脅而臥答欲顯佛如師子而臥故如契經説臥有四種謂師子王臥天鬼臥耽欲者臥師子王右脅而臥天即仰面鬼則伏面耽欲者臥左脅著地佛是無上人中師子故右脅而臥問世尊何故臥般涅槃而不坐耶答欲顯如來離誑故若佛坐涅槃者即不信者當是言此是矯狂何有死人而能端坐有説為止當來於諸聖者生誹謗故若坐般涅槃者則於今時諸阿羅漢身力羸劣臥入涅槃世便謗言非阿羅漢若是者何不同坐般涅槃問世尊何故於中夜分而般涅槃答以此時最寂靜故謂彼土暑熱晝時不堪作務多初夜後夜分中作諸事業者唯中夜分一切寂然如來恆時愛樂寂靜讚美寂靜故於中夜而般涅槃有説一切時樂處中行故謂佛昔為菩薩時於最後天中生處中覩史多天處於最後人生中印度劫比羅城於中夜分踰城出家習處中行證無上覺為益有情説離有無處中妙法夜中分而般涅槃乃至廣説若依華嚴經第四十三云有十種義示現涅槃所謂明一切行悉無常故一切有為非安故明般涅槃安隱故遠離一切諸怖畏故以諸天人樂色身明色身無常是磨滅法令求常住淨住身故明無常力絶不可轉故明有為法不隨愛行不自在故明三界法悉如壞器無堅牢故明般涅槃最為真實不可壞故遠離生死非起滅故以此十事示涅槃十地論第三卷云何故示入涅槃為令懈怠衆生勤心修道故依大般若五百六十八云復有天人樂聞圓寂菩薩為彼示般涅槃上來略述如來化相若廣分別如佛本行經普曜經因果經華嚴經大嚴經等是名如來示現化身方便善巧釋曰第二經結文可知經文未竟宜有次疏惜哉此本罄于第九卷後學須尋而全備焉
