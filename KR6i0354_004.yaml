body:
  text: 西明寺沙門圓測撰解深密經一切法相品第四將釋此品有其二種一解品名二釋文義題云一切法相品者自有兩釋一云三性非一故言一切皆持自性軌生物解名之為法相謂體相或相狀相謂所執等是一切法體性相狀總説三性名一切法即持業釋若一一性名一切法是依主釋以一一性非一切故一云一切法者略有二釋所謂有為及無為等中即有五謂心心法等廣有百法謂八識等然此三性是一切法體性相狀故名一切法相若依此釋於三性中前之二性名一切法相即持業釋二性皆具一切法故後圓成實名一切法相是依主釋是一切法之體相故雖有兩釋後釋為勝下經文不違理故如下經説所執依他皆云一切圓成實性是一切法平等真如此品廣明一切法相三性道理故名一切法相品深密題云聖者功德林菩薩問品者梵本經文有此異故爾時德本菩薩摩訶薩白佛言世尊如世尊説於諸法相善巧菩薩釋曰第二正釋文就所觀境自有二種一真俗諦境二有無性境上來已釋真俗二境自下當辨有無性境初明有性即是三性後説無性即三無性於二品中依有立無有性是本所以先明無性是末故在後説由斯理故世親菩薩三十頌云即依此三性立彼三無性就此品中文別有二初菩薩請問後如來正答就請問中復分為二初舉所問教後依教發問此即初也文有兩節初約時分辨問答者深密經云功德林者以德成人如樹成林法喻雙舉名功德林今德本者從無量劫久殖德本解云此是從因立號種殖福智二種德本故言德本於諸法相善巧菩薩者舉所問教諸法相者辨所觀法善巧菩薩者能觀人也於諸法相善巧菩薩者齊何名為於諸法相善巧菩薩如來齊何施設彼為諸法相善巧菩薩説是語已釋曰此即第二依教發問文有兩節初牒所問教後齊何等者正發問辭問有二意一問菩薩善巧齊何分位二問施設善巧之名或可前明所詮之義後問能詮之教爾時世尊告德本菩薩曰釋曰自下第二世尊正説於中有二初讚問許説後諸法相下對問正説前中有三初標問答者次讚問有益後勸聽許説此即初也善哉德本汝今乃能請問如來如是深義汝今為欲利益安樂無量衆生哀愍世間乃諸天人阿素洛等為令獲得義利安樂故發斯問釋曰第二讚問有益文有二節初讚問深義後讚問有益準上應知汝應諦聽吾當為汝説諸法相釋曰第三敕聽許説謂諸法相略有三種釋曰自下第二對問正説於中有二初約所觀辨諸法相後復次德本下約能觀人明善巧菩薩前中有二先法後喻法中有三初標章舉數次問答列名後次第別釋此即初也然此略言自有兩釋一者廣略略謂一切法廣雖百法略唯三性今對百法故言略也二者要略略故攝大乘云謂所知相略有三種無性釋云略有三種者謂一切法要有所應知所應斷所應證差別故何等為三釋曰第二問答列名先徵後列此即徵也一者遍計所執相二者依他起相三者圓成實相釋曰此即列名然三相名有通有別言三相者是其通名三謂標數相即體性或相狀相即六釋中帶數釋也具如別章言別名者一者遍計所執攝大乘論第四卷云云何成遍計所執何因緣故名遍計所執無量行相意識遍計顛倒生相故名遍計所執自相實無唯有遍計所執可得是故説名遍計所執也解云此文雙答二問或可次第答前兩問世親釋云無量行相者所謂一切境界行相意識遍計者謂即意識説名遍計顛倒生相者謂是能生虗妄顛倒所緣境相自相實無者實無彼體唯有遍計所執可得者唯有亂識所執可得無性釋云無量行相者謂種種我法境界影像一云依他因緣我法一云所執我法意識遍計者謂即意識説名遍計顛倒生相者謂亂識所取能取義相生因一云遍計所執境義相生顛倒亂識之因一云所執無量行相與依他起相見生因故名遍計所執者謂即遍計所執義相名為遍計所執自性自相實無唯有遍計所執可得者謂於實無我及法中唯有遍計所執影像相貌可得故名遍計所執依成唯識第八卷云周遍度故名遍計即能計度虗妄分別分別謂彼所執蘊界處等若法若我自性差別總名遍計所執自性然能遍計自有兩説一云八識及諸心所有遍攝者皆能遍計虗妄分別為自性故皆似所取能取現故説阿賴耶以遍計所執自性妄執種為所緣故此是安慧論師義也有義第六第七心品執我法者是能遍計唯説意識能遍計故廣説如彼此即護法菩薩宗深密經云虗妄分別相因緣相第一義相真諦三藏所翻諸論分別性依他性真實性楞伽經云妄相自性緣起自性成自性者譯家別故今言遍計所執者舉遍計意取所執若遍計所執者是依主釋若以所執對性即持業釋所執即性故二者依他起攝大乘云若依他自性實唯有識似義顯現之所依止云何成依他起何因緣故名依他起從自薰習種子所生依他緣起故名依他起生剎那後無有功能自然住故名依他起世親釋云從自因緣生生已無能暫時安住名依他起無性釋云謂從遍計所執名言熏習種生依自種子他所生故名依他起此説彼體依他而生生剎那後無有功能自然住者此説彼體依而住由此二因名依他起所言住者依勝軍義生剎那後別立住時名依他住依護法宗即生剎那暫有用故義説為住有為諸法依因託緣而得生起名依他起故三十唯識云依他起自性分別緣所生護法釋云依他衆緣而得生起名依他起三者圓成實性攝大乘云由無變異性故又由清淨所緣性故一切善法最勝性故由最勝義名圓成實世親釋云由無變異性故者謂無虗誑性如不虗誑臣由最勝義名圓成實者謂由清淨所緣性故最勝性故名圓成實如圓成衣無性釋云圓滿成就真實為性略不説喻餘同世親成唯識云二空所顯圓滿成就諸法實性名圓成實顯此遍常體非虗謬簡自共相虗空我等解云二空所顯者略出體性具三義故名圓成實一者圓滿即顯遍滿義簡色是質礙等自相二者成就即顯常義簡諸共相苦無常等雖是共相即無常故三者諸法實性顯非虗誑簡於虗空外道我等雖説遍常是虗謬故又成唯識云無漏有為離倒究竟勝用周遍亦得此名然此經中説初非後説得名者皆持業釋遍計所執乃至圓成即是性故云何諸法遍計所執相釋曰自下第三次第別釋別釋三分為三就初相中先問後答此即問也一切法名假安立自性差別乃至為令隨起言説釋曰此即答也謂一切法無實自性但隨妄情名言假立我諸自性如説謂我或説色等我法自性或説假我或説實我或可見色不可見等我法差別如是假立自性差別已乃至為令世間有情隨起言説依成唯識第八復云謂所妄執蘊處界等若我若法自性差別此所妄執自性差別總名遍計所執自性廣説自性及差別義如世親無性攝大乘釋第四卷説及瑜伽論七十三等云何諸法依他起相釋曰此下第二辨依他起先問後答此即問也謂一切法緣生自性則此有故彼有此生故彼生謂無明緣行乃至招集純大苦蘊釋曰此即答也文有兩節初總相出體謂從緣生一切煩惱業生雜染從緣生故皆名依他泛論依他自有二種一者雜染二者清淨故成唯識第八云有漏無漏皆依他起依他衆緣而得起故頌言分別緣所生者應知亦説染分依他此經亦爾説染非淨言則此有故等者指事別釋然前二句有差別者薩婆多宗如俱舍論第九卷云何故世尊説前二句謂依此有故彼有此生故彼生為於緣起知決定故依無明有諸行得有非離無明可有諸行又為顯示諸支傳生謂依此支有彼支得有由彼支生餘支得生又為顯示三際傳生謂依前際有中際得有由中際有後際得生又為顯示親傳二緣謂有無明無明無間生行或展轉力諸行方生一云無明支後即起行支名無間生行起無明已次起無記心後起行支名展轉力諸行方生一云無明望行名無間生無明望識等名展轉生有餘師釋如是二句為破無因常因二論此有立破具如彼論軌範諸師釋此二句為顯因果不斷及生謂依無明不斷諸行不斷即由無明生故諸行得生如是展轉皆應廣説若廣分別如順正理第二十五依瑜伽論第十卷云問云何説言此有故彼有答由未斷緣餘得生義故問云何此生故彼生答由無常緣餘得生義故依雜集第四云相者謂無作緣生故無常緣生故勢用緣生故是緣生相由此相故薄伽梵説此有故彼有此生故彼生謂無明緣行乃至廣説此有彼有者顯無作緣生義唯由有緣故果法得有非緣有實作用能生果法此生故彼生者顯無常緣生義非無生法為因故少所生法而成得立無明緣行等者顯勢用緣生義雖復諸法無作無常然不隨一法為緣故一切果生所以者何以諸法功能差別如説無明力故諸行得生乃至生力故得有老死若廣分別如彌勒菩薩所問論第五卷説招集純大苦薀者依俱舍論如是純言顯唯有行無我我所大苦薀言顯苦積集無初無後集言為顯諸苦薀生依大毗婆沙第二十四云復次此十二支緣起法有根有莖有枝有葉有華有果猶如大樹此中根者謂無明行莖者謂識名色枝者謂六處葉者謂觸受華者謂愛取有果者謂生老死此十二支緣起法樹或有華有果或無華無果有華有果者謂異生及有學無華果者謂阿羅漢依瑜伽第十云問於緣起中何等是苦牙誰守養苦牙何等為苦樹答無明行緣所引識乃至受是苦牙受緣所引愛乃至有是守養苦牙生與老死當知是苦樹若依攝論約十一識明依他起故攝大乘云論曰此中何者依他起相謂阿賴耶識為種子虗妄分別所攝諸識此復云何謂身身者受者識彼所受識彼能受識世識數識處識言説識自他差別識善趣惡趣死生識此中若身身者受者識彼所受識彼能受識世識數識處識言説識此由名言熏習種子若自他差別識此由我見熏習種子若善趣惡趣死生識此由有支熏習種子乃至云如是名為依他起相世親攝論第四釋云身謂眼等五界身者謂染汙意無性云眼等五識所依意界名身者識也能受者謂意界無性云第六識所依意界名受者識彼所受識者謂色等六外界彼能受識者謂六識界世識者謂生死相續不斷住無性云世識者謂是三時影現數識者謂算計性無性云謂似一等算數影現處識者謂器世間無性云謂似聚落蘭等影現言説識者謂見聞覺知四種言説如是諸識皆用所知依中所説名言熏習差別為因自他差別識者謂依此差別此用前説我見熏習差別為因無性云謂身等識我我所執相續不斷執我我所他他所等有差別故善趣惡趣生死識者謂生死趣種種差別此由前説有支熏習差別種子無性云謂似天人及捺落迦傍生餓鬼死生影現也廣如無性世親釋論第四然此諸識有差別者若依無性眼等五識所依意界名身者識第六意識所依意界名受者識解云無性論意眼等五識所依意界即是賴耶名身者識第六意識所依意界即是末那名受者識若依世親與此相翻第七末那名身者識第八賴耶名受者識故彼論云身者謂染汙意受者謂意界又此諸識數有差別若依梁論及成唯識皆云十一若依攝大乘自有兩文前文十一後文十二謂開善趣惡趣死生識以為二故一善趣惡趣識二死生識故彼論云業果異熟無數量故所受死生無數量故無性釋云善趣惡趣及與死生解云説故及言故知十二世親不釋故為十一於理無違云何諸法圓成實相釋曰自下第三釋圓成實於中先問後答此即問也謂一切法平等真如釋曰此即答也於中有二初正出體後顯勝用此即初也謂前所説遍一切法一味真如以為體性若中邊圓成實性自有二種故第二云此圓成實總有二種無為有為有差別故無為總攝真如涅槃無變異故名圓成實有為總攝一切聖道於境無倒故亦名圓成實若依攝大乘圓成實性自有四種故彼論云云何應知圓成實性應知宣説四清淨法一者自性清淨謂真如空實際無相勝義法界二離垢清淨謂即此離一切障垢三者得此道清淨謂一切菩提分法波羅蜜多等四者生此境清淨謂諸大乘妙正法教由此法教清淨緣故非遍計所執自性最淨法界等流性故非依他自性如是四法總攝一切清淨法盡此中有二頌幻等説於生説無計所執若説四清淨是謂圓成實自性與離垢清淨道所緣一切清淨法皆四相所攝廣如無性世親釋論第五卷説此經上來別約三法釋三性義若依中邊第二成唯識第八約四諦義通釋三性若依雜集第五約薀界處三科法門通説三性若依大般若約一切法通釋三性故無性釋論第四卷云如大般若波羅蜜多經中亦説佛告慈氏若於彼彼行相事中遍計為色為受為想為行為識乃至為一切佛法依止名想施設言説遍計以為諸色自性乃至一切佛法自性是名遍計所執色乃至遍計所執一切佛法若復於彼行相事中唯有分別法性安立分別為緣起諸戲論假立名想施設言説謂之為色乃至謂為一切佛法是名分別色乃至分別一切佛法若諸如來出現於世若不出世法性安立法界安立由彼遍計所執色故此分別色於常常時於恆恆時是真如性無自性性法無我性實際之性是名法性色乃至由彼遍計所執一切佛法故此分別一切佛法於常常時於恆恆時乃至是名法性一切佛法廣説如經於此真如諸菩薩衆勇猛精進為因緣故如理作意無倒思惟為因緣故乃能通達於此通達漸漸修集乃至無上正等菩提方證圓滿釋曰此顯勝用謂於真如諸菩薩衆資糧位中勇猛精進於加行位無倒思惟由此因緣見道位中乃能通達住修道位漸漸修集至究竟位方證圓滿若依瑜伽第七十三有其三用一證得清淨用二解脫二縛二縛用三引發功德用故彼論云乃至能令證得清淨能令解脫一切相縛及粗重縛亦令引發一切功德解云如次即當見等三道然此三相體性寬狹諸説不同且依真諦三藏説云第八賴耶名依他起眼等七識為分別性依他無生分別無相為真實性又解眼等八識為依他起所變相分為分別性依他無生分別無相為真實性又解眼等八識見分相分名依他起妄所執境為分別性依他無生分別無相為真實性如上兩解理且不然眼等八識及諸相分等從緣生云何偏説第八賴耶名依他起眼等七識為分別性分別無相依他無生不異二性如何説彼名真實性如此等過不可具陳已外諸説恐繁不敘今述諸教所説三性總有二門一所執雜染不倒門謂妄所執實我實法都無所有但隨妄情而施設故説之為有如是皆名遍計所執一切雜染諸有漏法從緣生者名依他起依因託緣而得生故一切有為無漏道諦及諸無為名圓成實二種皆是不顛倒故二所執緣生不變門謂妄所執實我法等隨情有故名所執性有漏無漏一切有為皆依他起一切諸法平等真如不變異故名圓成實於上二門諸教不同自有聖教説前非後如楞伽經第四卷説大慧正智如如者不可壞故名成自性辨中邊論亦同此説自有聖教説後非前如瑜伽論七十四云問第二自性幾所攝答四所攝問第三自性幾所攝答一所攝自有聖教二種俱有如成唯識第八卷云分別緣所生應知且説染分依他淨分依他亦圓成故或諸染淨心心所法皆名分別能緣慮故是則一切染淨依他皆是此中依他起攝攝論第四云二者依他雜染清淨性不成故世親釋云由即如是依他起性若遍計時即成雜染無分別時即成清淨由二分故一性不成無性釋意亦同此説今此一部説後非前唯説真如圓成實故或可説前非後唯説染法為緣生故或可通有二義前二説故若廣分別如三性章善男子如眩翳人眼中所有眩翳過患遍計所執相當知亦爾釋曰自下第二舉喻重釋於中有二初明翳淨眼境三相喻後善男子下頗胝迦寶四事喻前中三喻即分為三初眩翳過患喻次眩翳衆相喻後淨眼本境喻例有二節初正明喻説後舉法同喻此即第一眩翳過患喻此喻意云由眼有翳便發眼識及眼識同時分別意識由此二識引生第二念中分別意識作毛輪等解然毛輪自有二種一者分別意識所計實毛輪等即説此為眼翳過患以此過患喻所執性二者即彼分別意識所依所託似毛輪相即説此為眩翳衆相喻依他起如後當説此用過患喻所執性故言遍計所執當知亦爾或可眩翳過患者即説眩翳名為過患此意説言由所執故生依他起似由眩翳現毛輪等故瑜伽論七十三云如眼若有翳等過患便有髮毛輪等翳相現前可得若無彼患便不可得但有自性無顛倒取問如何依他喻所執性答無淨色喻圓成故故無有失問翳眼眼識見毛輪不解云西方諸師自有兩釋一安慧宗眼等五眼亦緣毛輪第二月等故雜集云迦末羅病損壞眼根見青為黃護法菩薩説眼等識緣實境起是現量故瞿婆論師十二唯識梵本記中自有二説一云五識唯緣實境是故阿毗達磨經云無有眼等識不緣實境起意識有三種緣實不實境故知五識唯緣實境一云五識亦緣不實是故經云由亂眼根及眼識引亂意識生由不亂眼及眼識引不亂意識故知五識見第二月及空華等此中所説過患等文依前三説準即可知如眩翳人眩翳衆相或髮毛輪蜂蠅巨勝或復青黃赤白等相差別現前依他起相當知亦爾釋曰第二眩翳衆喻喻依他相當知亦爾謂眩翳人似毛輪相非實似實故喻依他起非有似有當知亦爾如淨眼人遠離眼中眩翳過患即此淨眼本性所行無亂境界圓成實相當知亦爾釋曰第三淨眼本境喻謂彼淨眼本所行境青黃等色自性清淨無毛輪等眩翳過患圓成實性當知亦爾自性清淨於依他起無所執性善男子譬如清淨頗胝迦寶若與青染色合則似帝青大青末尼寶像由耶執耶帝青大青末尼寶故惑亂有情釋曰此下第二頗胝迦寶四色喻於中有二初廣辨四喻後如是德本下舉法同喻前中四喻即分為四此即第一青色相應喻文有五節義含四種意喻三性文五節者一清淨頗胝迦者依他起二若與青染色合者喻言説習氣此明依他起與言説習氣合三即似帝青大青等者喻依他起由我法分別名言種子力故雖在內識而似外現四由耶執取帝青等者此喻由邪執故執為實有五惑亂有情者此喻邪師將己所執惑亂有情令生實解義含四者準下合文喻中有四一頗胝迦者喻依他起二與青染色合者喻名言熏習與依他合三由耶執耶等喻彼能執四即彼所執情有理無喻圓成實言意三者謂青染色合乃至惑亂有情喻所執性頗胝迦寶喻依他起無實帝青喻圓成實下三色喻皆具諸義準此應知譬如清淨頗胝迦寶者此出寶體此處無名故不翻之應師經音云此云水玉或云白珠深密經云清淨琉璃者譯家別故若依俱舍妙高山王四寶所成謂金銀吠琉璃頗胝迦此頗胝迦即當赤色又即彼云日輪下面頗胝迦寶火珠所成月輪下面頗胝迦寶水珠所成準此等文其頗胝迦亦具衆色今於此經且舉白色以對四色由此下文不説白色若與青染色者明色轉變謂頗胝迦與青色合即似帝青大青末尼寶像帝青等者謂天帝釋青及大青末尼寶者此云如意珠即説頗胝迦名為如意或可所似帝青等即是末尼由耶執等者顯諸世間執似為實為他宣説迷亂有情此意説云阿賴耶識由我法執習氣力故變似我法諸有情類執為實我惑亂有情據實頗胝迦上無實青等於賴耶上無所執性應知亦爾後當分別若與赤染色合則以虎魄末尼寶像由耶執耶虎魄末尼寶故惑亂有情釋曰第二赤色相應喻深密經云置赤色中即出赤波頭摩尼摩尼寶光明現前若與緑染色合則似末羅羯多末尼寶像由耶執取末羅羯多末尼寶故惑亂有情釋曰第三緑色相應喻末羅羯多此處無名故不翻之有説此云煞色寶由此寶故煞一切色盡壞故依深密經但言緑色若與黃染色合則似金像由耶執取真金像故惑亂有情釋曰第四黃色相應喻與深密經有差別者此云金像彼云金色摩尼之寶後三種喻準初可知如是德本如彼清淨頗胝迦上所有染色相應依他起相上遍計所執相言説習氣當知亦爾釋曰自下第二舉法同喻合上四義即分為四一合種子二合相執三合依他四合成實此之四義於前喻中文雖有五義合有四故以四義合上喻文此即初也然此四義自有兩説一云初一執緣次三如次喻其三性一云初二喻所執性白種現執成所執故此即初也謂於頗胝迦上所有染色相應義故頗胝迦上似青色像現如是由依他上妄執種子為因緣故於賴耶上似色聲等依他相現如彼清淨頗胝迦上所有帝青大青虎魄末羅羯多金等耶執依他起相上遍計所執相執當知亦爾釋曰此下第二合現行執謂由前説執種子故能生依他似色等相由現執故執彼為實由此義故此上二段意顯三中遍計所執如彼清淨頗胝迦寶依他起相當知亦爾釋曰第三合依他起謂頗胝迦即似青等如是依他由種子故似色聲等種種相現如彼清淨頗胝迦上所有帝青大青虎魄末羅羯多真金等相於常常時於恆恆時無有真實無自性性釋曰第四合圓成實於中有二初重舉前喻後釋法同喻此即初也於頗胝迦上無實青等名無有真實亦名無自性性或可無真實者遮青等實無自性性者雖無青等實而有頗胝迦性即依他起相上由遍計所執相於常常時於恆恆時無有真實無自性性圓成實相當知亦爾釋曰此即第二釋法同喻於依他上無有所執實我等性即此名為無自性性或可於依他上無有所執實而有無自性性於常常時及恆恆時者自有兩釋一云依前前無故説常常言於後後無故説恆恆言一云顯無有真實故説常常有無自性性故言恆恆時問此三性與七真如如何相攝解云如成唯識第八卷説彼云如是三性與七真如云何相攝七真如者一流轉真如謂有為法流轉實性有為有二種一四相所為故名有為二煩惱所為故名有為此即煩惱所為二實相真如謂二無我所顯實性三唯識真如謂染淨法唯識實性今此所取能觀染淨唯識觀智即是真如也四安立真如謂苦實性五邪行真如謂集實性六清淨真如謂滅實性七正行真如謂道實性此七實性圓成實攝根本後得二智境故隨相攝者流轉苦集三前二性攝妄執雜染故餘四皆是圓成實攝辨中邊論第二卷云差別真實略有七種謂流轉實相唯識安立邪行清淨正行云何應知此七真實依三根本真實立耶頌曰流轉與安立邪行依初二實相唯識清正行依後一顯揚論第三瑜伽七十七應準此攝於理無違次後又問三性五事相攝云何諸聖教説相攝不定一瑜伽七十四説依他性攝彼相名分別正智成圓實性攝彼真如遍計所執不攝五事彼説有漏心心所法變似所詮説名為相似能詮現施設為名能變心等立為分別無漏心等離戲論故但總名正智不説能所詮四從緣生皆依他攝二依辨中邊第二卷説依他起性攝相分別遍計所執唯攝彼名正智真如圓成實攝彼説有漏心及心所相分名相餘名分別遍計所執都無體故為顯非有假説為名二無倒故圓成實攝三依楞伽經第七卷説依他起唯攝分別遍計所執攝彼相名正智真如圓成實攝彼説有漏心及心所相見分等總名分別虗妄分別為自性故遍計所執能詮所詮隨情立為名相二事四依世親攝大乘論第四卷説名屬依他起性義屬遍計所執彼有漏心心所法相見分等由名勢力成所遍計故説為名遍計所執隨名橫計體實非有假立義名如前四教所説五事三性相攝文雖有異而義無違護法菩薩取初為勝不雜亂故復有問言諸聖教中説有五相此與三性相攝云何所詮能詮各具三性謂妄所計屬初性攝相名分別隨其所應所詮能詮屬依他起真如正智隨其所應所詮能詮屬圓成實後得變似能詮相故二相屬相唯初性攝妄執義名定相屬故彼執著相唯依他起虗妄分別為自性故不執著相唯圓成實無漏智等為自性故瑜伽八十一二性是所詮遍計所執性是能詮第七十四顯揚十六能詮所詮皆通三性委細分別具如唯識第八卷疏復次德本相名相應以為緣故遍計所執相而可了知釋曰自下第二依能觀門明善巧菩薩於中有二初長行廣釋後以頌略説前中有二初略辨三相勸物令知後依前三相正顯觀門又釋即分為二初正辨觀門後如是德本下重牒前觀以答前問前中有三初明菩薩了知三性次善男子下知三性故了知三相後善男子下知三相故斷染證淨雖有兩科且依後釋此即第一了知三性三性別故即分為三此即初也謂所詮相與能詮名互相繫屬以為緣故妄所執相遍計所執而可了知故瑜伽七十三云遍計所執自性緣何應知答緣於相名相屬應知若廣分別如三無性論彼第一云分別性者無有體相名等五法所不攝故外曰無體云何分別答但有無義故何以故如世間於義中立名凡夫執名分別義性謂名即義性此為顛倒但有名分別無實體故何以故此名及義互為客故云何知然由三義故此理可知一名前覺不生二多體相違失三雜體相違過具如彼論攝大乘論同三無性依他起上遍計所執相執以為以緣依他起相而可了知釋曰此釋依他謂執遍計所執相分別以為緣故依他起性而得生起故顯揚第十六云於依他起自性執著初自性故起於熏智則成雜染又云於所執相所起執故應可了知是依他起若能執者從緣生故故佛性論第二卷云問曰依他起性緣何因故得成耶答曰緣執分別性故得顯現問依他起通染及淨如何但言所執相執以為緣故依他起性而可了知會釋此難如瑜伽論第七十四説故彼云問若依他起自性亦正智所攝何故前説依他起自性緣遍計所執自性執應可了知答彼意唯説依他起自性雜染分非清淨分若清淨分當知緣彼無執應可了知依他起相上遍計所執相無執以為緣故圓成實相而可了知釋曰此釋圓成實謂於依他起上無所執相以顯真實故言無執故瑜伽七十三云緣遍計所執自性於依他起自性中畢竟不實應知或可無執即是聖道不執著故名為無執此意説云不執著道以為因故證得清淨圓成實性故瑜伽云世尊於餘經中説緣不執著遍計所執自性應知此性者依得清淨説不依相説解云餘經者即此經也依得清淨者依內證得真如聖道顯所證理或可由聖道力斷染證得清淨真如依能證道顯所證理不依相説者此文不依遣所執相顯圓成實若依前説言餘經者指所餘經有云無執者無能執依他及所執分別故言無執故佛性論云問曰真實性緣何因得成答曰由分別依他極無所有故得顯現解云譯家謬也遣依他起違自所宗瑜伽等故善男子若諸菩薩能於諸法依他起相上如實了知遍計所執相即能如實了知一切無相之法釋曰此下第二知三性故了知三相三相不同即分為三此即第一知所執故了知無相謂如前説相名相應以為緣故知實了知遍計所執名相假立無實自性由此即能如實了知一切所執無相之法若諸菩薩如實了知依他起相即能如實了知一切雜染相法釋曰此即第二了依他故知雜染相謂能了知從相執起皆是依他即能了知雜染是依他起前是總觀後是別觀前後二相準此應知又云初約自性辨依他觀後約差別辨依他觀又云前依盡所有性後是如所有性若諸菩薩如實了知圓成實相即能如實了知一切清淨相法釋曰此即第三了圓成實知清淨相謂遍計所執無執以為緣故即能了知諸清淨法皆圓成實善男子若諸菩薩能於依他起相上如實了知無相之法即能斷滅雜染相法釋曰此下第三知三相故斷染證淨於中有二初了知無相斷雜染法後斷雜染故證得清淨此即初也然無相法自有三釋一云即所執性隨情説有據理即無相常無故故名無相故中邊云遍計所執此相本無故名無相若依此釋謂能了知無相法故依他起性雜染相法即不得生故説能斷雜染相法若無所執雜染相法不得生故故瑜伽論七十四云問遍計所執自性能為幾業答五一能生依他起自性二即於彼性能起言説三能生補特伽羅執四能生法執五能攝受彼二種執習氣粗重一云依他起上無所執性所顯真如離諸相故名為無相故攝論云真如永離一切色等相故故名無相又廣百論云真如空理離有無等一切法相故名無相若依此釋謂能了知無相法故即能斷滅依他起性雜染相法一云所執圓成皆名無相前二義故若依此釋謂能了知遍計所執無相法故即能悟入圓成實性無相之法由能悟入圓成實故即能斷滅依他起性雜染相法故瑜伽七十四云問若觀行者如實悟入遍計所執自性時當言隨入何等自性答圓成自性問若觀行者隨入圓成自性時當言除遣何等自性答依他起自性若能斷滅雜染相法即能證得清淨相法釋曰此即第二斷雜染故證得涅槃謂由斷滅雜染法故即能證得清淨涅槃問此三相觀依何位説若在地前如何能斷雜染相法要無漏道方能斷故若在地上入初地時證二空理如何先起二性觀耶解云此三相觀分成兩位初二性觀依加行位作四尋思四如實智第三圓成在十地位是故無著攝大乘論立三性觀釋此經意彼第六卷論云如是菩薩悟入意言似義相故悟入遍計所執性悟入唯識故悟入依他起性云何悟入圓成實性若已滅除意言聞法熏習種類唯識之想爾時菩薩已遣義想一切似義無容得生故似唯識亦不得起由是因緣住一切義無分別名無分別名者能詮真諦平等法名以所詮真如是一切義無分別理今能詮名從所詮立名名無分別名此所詮真如從能詮立目故云無分別名於法界中便得現見相應而住爾時菩薩平等平等所緣能緣無分別智已得生起由此菩薩名已悟入圓成實性即準此文圓成實觀唯在地上故成唯識第九頌云若時於所緣智都無所得爾時住唯識離二取相故如是德本由諸菩薩如實了知遍計所執相依他起相圓成實相故如實了知諸無相法雜染相法清淨相法釋曰自下第二重牒觀門以答二問於中有二初重牒觀門後齊此已下正答二問前中有二初牒知三性故了知三相後牒知三相故即斷染證淨此即第一牒上知三性故了知三相準上可知如實了知無相法故斷滅一切雜染相法斷滅一切染相法故證得一切清淨相法釋曰自下第二牒上知三相故斷染證淨謂由了知遍計所執無相義故展轉漸證圓成實性由斯證得清淨涅槃又解了知遍計所執無相真如故能斷雜染證涅槃果也齊此名為於諸法相善巧菩薩如來齊此施設彼為於諸法相善巧菩薩釋曰此即第二依上觀門以答二問謂佛依上了知三性諸菩薩衆即説名為善巧菩薩如來依此善巧菩薩施設聖教名為善巧菩薩然此菩薩善巧分限諸説不同一云十信已上皆名善巧一云十回向中第十回向名加行道即依彼位起四尋思如實智故一云初已上證清淨如及俗相故爾時世尊欲重宣此義而説頌曰釋曰自下第二以頌略説於中有二初發起頌文後舉頌略説此即初也若不了知無相法雜染相法不能解不斷雜染相法故壞證微妙淨相法不觀諸行衆過失放逸過失害衆生懈怠住法動法中無有失壞可憐愍釋曰此即第二以頌略説上來長行順釋了知三性德此頌反顯不了無相失如何説此反順釋者理實長行及頌皆有反順為存略故各據一邊影略互顯依深密經頌及長行皆順釋者譯家別故有其二頌即分為二初有一頌正頌不了無相失後之一頌重釋不觀衆行失前中有二初之二句舉不了知顯不斷雜染失後有二句約不斷染顯不證圓成失壞謂失壞謂不斷染故失壞證得微妙真如淨相法也失壞者是不能證義就釋後頌文別有二初之二句明放逸失後有二句明懈怠失言不觀諸行衆過失等者謂由愚癡不能觀察諸行過失遂起放逸傷害衆生言懈怠住法動法中等者此明第二懈怠過失謂懈怠者過失之因功德之障言住法者即是涅槃常住不滅故名為住言動法者是生死法前生後滅流轉三有故名動法又解住法者是定動法者是散亂言無有失壞可憐愍者謂由懈怠故於住法無於動法有由是無有故成失壞由失壞故甚可憐愍廣釋失壞如瑜伽論第三十六及七十三深密經云如實知諸法即捨染法相捨染法相已證於清淨法不觀有為過懈怠放逸害諸法常不動離相名菩薩也解深密經無自性相品第五將釋此品有其二義一解品名二釋文義題云無自性相品者謂無自性略有三種一相無自性性二生無自性性三勝義無自性性無自性言顯三無性故言無自性也相即體相或謂相狀此三無性如其次第即用三性以為體相此品廣明三無自性體相相狀故言無自性相品深密經云成就第一義菩薩問品者人從立名譯家別故爾時勝義生菩薩摩訶薩白佛言世尊釋曰自下正釋文義就釋有情無性境中上來已釋三性境訖自下第二釋三無性於此品內有其五分一菩薩請問分二爾時世尊下如來正説分三爾時勝義生下領解受持分四爾時勝義生菩薩下校量歎勝分五爾時勝義生下依教奉行分就請問中文別有三初標問答者次我曾下申所問事後未審下依教發問此即第一標問答者言勝義生者勝義即是所證之境勝智之境名勝義生者能證之智緣勝義生名之為生故攝論云於此證會故名為生於此所緣勝智生故就能所證以立其號名勝義生我曾獨在靜處心生如是尋思釋曰自下第二申所問事於中有二初陳己疑思後舉所問教此即初也謂昔我曾獨在山林間房靜如是尋思世尊如何先説有性後説無性深密經云空間之處生覺觀心者如前分別譯家別故泛論尋思有其四種一者三界有漏分別心心所法二者尋伺故深密云空間之處生覺觀心三者唯尋故集論第六云尋思行者緣入出息念境俱舍論第二十二云尋多亂心名尋行者彼依息念能正入修或可通説尋伺名尋思行者四者慧數如四尋思處處説故今於此中第四為勝世尊以無量門曾説諸蘊所有自相生相滅相永斷遍知釋曰自下第二申所問教於中有二初舉有性教後世尊復説下顯無性教就前文中有十三門攝為五段一明蘊教二明諦教三明諸界四明念住五八聖道此即第一辨蘊教門於中有二初正明蘊教後類顯三教此即五相辨蘊聖教無量門者此有兩釋一云蘊中所有自共相等諸門非一故名無量一云可見不可見有色無色等諸門非一故名無量所有自相即是別相如説色是質礙如是識是了別生相滅相即是通相色等皆有生滅相故永斷遍知即苦集相永斷集諦苦煩惱故遍知苦諦生死果故或可所有自相者即是自相差別相如是二相遍於生滅永斷遍知如下領解中説如説諸蘊諸處緣起諸食亦爾釋曰此即第二類釋二門謂如蘊中所説五相十二處教緣起諸食應知亦爾謂處自相能見色名之為眼眼所見故名之為色乃至能知法故名之為意意所知故名之為法緣起自相智所對法別有心所覆弊為性名為無明如瑜伽論五十六説乃至漸衰頓滅名為老死諸食自相分段而吞各為段食乃至了別執持名為識食生滅二相永斷遍知準上應知問如何勝義諦品以六相分別蘊等具説四諦於此品中但説苦集而非滅道解云前品欲辨現觀有差別故具説四諦今此品中有性無性二教差別是故此中略而不説由得蘊故滅及依證以無量門曾説諸諦所有自相遍知永斷作證修習釋曰第二辨四諦教有其五句所有自相自有兩説準上應知謂逼迫名召集名集滅盡名滅能通名道遍知等四別顯四諦遍知苦諦永斷集諦作證滅諦修習道諦以無量門曾説諸界所有自相種種界性非一界性永斷遍知釋曰第三辨諸界門所有自相準上應知次之二句謂十八界展轉異相名種種界即十八界無量有情所依差別名非一界如瑜伽論五十六説若依八十三與上相反如初卷記永斷遍知準上應知以無量門曾説念住所有自相能治所治及以修習未生令生生已堅住不忘信修增長廣大釋曰第四辨念住教於中有二初釋念住後類五門前中五句所有自相自有二釋準蘊應知此四念住以慧為體住身等境應言慧住而言念住與念相應住身等境故名念住此六釋中鄰近釋也後四句者一能治四倒二未生令生三生已堅住四不忘倍修增長廣大如初卷説如説念住正斷神足根力覺支亦復如是釋曰此即第二類釋五門謂如念住有其五句四正斷門四種神足五根五力七等覺支皆有五句準上應知以無量門曾説八支聖道所有自相能治所治及以修習未生令生生已堅住不忘倍修增長廣大釋曰第五八聖道支有其五句準上應知此後七門即是三十七品觀義如別章世尊復説一切諸法皆無自性無生無滅本來寂靜自性涅槃釋曰第二顯無性教謂依下經三時法輪於第一時説四諦教於第二時説無相教第三時中説了義教説一切法皆無自性無生滅本來寂靜自性涅槃無自性性而今此中約第二時對第一時以為發問所依前説有相後説無相此無相言違前有相故以無相為問所依問若準此經初唯説有後但説無無量義經前後兩時皆説空有故彼經云善男子我起樹王詣波羅奈鹿野園中為阿若拘鄰等五人轉四諦法輪時亦説諸法本來寂靜中間於此及以處處為諸比丘并衆菩薩辨演宣説十二因緣六波羅蜜亦説諸法本來空寂具説如彼即此二經如何會釋解云如智度論諸佛説法有其二事一者祕密二者顯示無量義經依祕密門今依此經是顯示門各據一邊互不相違未審世尊依何密意作如是説一切諸法皆無自性無生無滅本來寂靜自性涅槃釋曰第三依教發問於中有三初陳己疑情次請願解釋後申所釋經此即初也謂佛先説蘊處界等十三法門皆無自性後復説言一切諸法皆無自性無生滅等前説有性後説無性二教相違未審世尊依何密意作如是説無自性等若依密經有其五節一一切法本來無證二一切法本來不生三一切法本來無滅四一切法本來寂靜五一切法本來自性涅槃我今請問如來斯義唯願如來哀愍解釋釋曰此即第二諸願解釋説一切法皆無自性無生無滅本來寂靜自性涅槃所有密意釋曰第三申所釋教爾時世尊告勝義生菩薩曰釋曰自下第二如來正説於中有二初讚問許説後勝義生當知下依問正説前中有二初讚問有益後敕聽許説前中有四一辨能説者二讚問應理三讚問深義四讚問有益此即初也善哉善哉勝義生汝所尋思甚為如理釋曰此即第二讚問應理善哉善哉善男子汝今乃能請問如來如是深義釋曰此即第三讚問深義此上二種文義俱善是故重言善哉善哉汝今為欲利益安樂無量衆生哀愍世間及諸天人阿素洛等為令獲得義利安樂故發斯問釋曰此即第四讚問有益準應知汝應諦聽吾當為汝解釋所説一切諸法皆無自性無生無滅本來寂靜自性涅槃所有密意釋曰此即第二敕聽許説勝義生當知我依三種無自性性密意説言一切諸法皆無自性釋曰此下第二依問正説於中有二初長行廣釋後舉頌重説前中有五一約三無性釋經諸句二復次勝義生下約三性觀辨立三無性意三復次勝義生下約位辨立三無性意四復次勝義生下約三無性觀辨一乘義五復次勝義生下約無性教辨取解不同此即第一約三無性釋經諸句於中有二初約三無性釋諸經中説一切法皆無自性後勝義生當知下約初後無性釋一切法無生滅等前中有三初標章略説次善男子下問答廣釋後善男子下釋已總結前中有二初依三無性顯經密意後依數列三無性名此即初也謂世尊言一切諸法無自性者我今具依三無自性説一切法皆無自性一切諸法即是三性即三性立三無性故諸經言一切諸法皆無自性是故成唯識三十頌云即依此三性立彼三無性故佛密意説一切法無性所謂相無自性性生無自性性勝義無自性性釋曰此即第二依數列名謂即三種相無自性等善男子云何諸法相無自性性釋曰此下第二問答廣釋於中有二初依法正説後舉喻重釋前法説中三種無性即分為三此即初也於中有五一問二答三徵四釋五結此即問也謂諸遍計所執相釋曰此即第二依問正答謂三性中遍計所執以為自性何以故釋曰第三徵也以何義故説所執相名相無性此由假名安立為相非由自相安立為相釋曰第四依徵別釋此由假名安立為相者此釋相言謂依名言所立相故非由自相安立為相者釋無性言總解意云遍計所執情有之相以理無故説為無性由此即説彼所執相以為自性故顯揚云謂所執性體相無故名無自性性又三無性云如所顯現是相實無故分別性無相為性瑜伽七十三云云何相無自性性謂一切法世俗言説自性是故説名相無自性性釋曰此即第五結文可知云何諸法生無自性性釋曰自下第二釋生無性文有五段準上可知此即問也謂諸依他起相釋曰此即第二依問正答謂三性中依他起性以為自性何以故釋曰第三徵也以何義故説依他起名生無性此由依他緣力故有非自然有釋曰此即第四依徵別釋此由依他緣力故有者此釋生言謂由依他緣力故有故説為生非自然有者釋無性也總解意云依他諸法依因緣故説之為生而非自然自在天等邪因所生説名無生故顯揚云依他起性緣力所生非自然生故無生又三無性云依他性者由緣力生不由自生是故依他無生為性依瑜伽七十三云云何生無自性性謂一切行衆緣所生緣力故有非自然有是故説名生無自性性釋曰第五結文可知云何諸法勝義無自性性釋曰此下第三釋勝義無性於中有二初約依他起解勝義無性後復有下約圓成實解勝義無性前中有五準上應知此即問也謂諸法由生無自性性故説名無自性性即緣生法亦名勝義無自性性釋曰第二依問正答文有兩節初將釋第三牒前第二釋義如前後即緣生法等者依第二性立第三無性謂依他起上無圓成實故緣生法非但説名生無自性性亦名勝義無自性性故顯揚云依他起性由異相故亦得建立為勝義無性何以故由無勝義性故何以故釋曰第三徵也何故緣生亦名勝義無自性性於諸法中若是清淨所緣境界我顯示彼以為勝義無自性性依他起相非是清淨所緣境界釋曰第四依徵別釋文有二節初釋所無清淨勝義後明依他無彼清淨勝義此釋真如淨智所緣名為清淨勝義故顯揚云當知勝義即是清淨之所緣性何以故由緣此境得心清淨故是故亦説名為勝義無自性性釋曰第五結文可知復有諸法圓成相亦名勝義無自性性釋曰此下第二約圓成實釋三無性於中有四一標二徵三釋四結此即標也謂三性中圓成實性以為自性何以故釋曰第二徵所由也何以復説圓成實性名為勝義亦名無性一切諸法法無我性名為勝義亦得名為無自性性是一切法勝義諦故無自性性之顯故釋曰第三依徵正釋文有二節初標後釋謂法無我性有其二義一名勝義二名無自性性是諸法中勝義諦故諸法無性所顯理故故顯揚云謂圓成實勝義無性由此自性體是勝義又是諸法無性性故又復彼云由此自性即是勝義亦是無性由無戲論我法性故依三無性論與此不同故彼云約真實性由真實無性故説無性者此真實性更無別性還即前兩性之無是真實性真實是無相無生故一切有為法不出此分別依他兩性此三性既真實無相無生由此理故一切諸法同一無性此一無性真實是無真實是有真實無此分別依他二有真實有此分別依他二無故不可説無不可説有乃至廣説解云通遣依他故不同此由此因緣名為勝義無自性性釋曰此即第四結文可知問若依此經勝義無性自有二種一依他起二圓成實如何三十唯識説後非前解云據實具有二義故此經文及顯揚論皆作是説依他起性無勝義故亦得説為勝義無性而諸論中不明前者成唯識第九卷中護法釋云而濫第二故此不説問此經意即依三性立三無性體即三性何故三無性論於一真如立三無性故三無性論第一卷云約此三性説三無性由三無性應知是一無性理約分別者由相無性説名無性依他起者由生無性説名無性真實性者由真實無性故説無性具如彼説解云此有兩釋一真諦三藏云於一真如遣三性故説為三種無自性性於中圓成實性安立諦攝三無性者皆非安立如三性論二大唐三藏云如顯揚等即依三性立三無性以此為正所以者何世親菩薩三十唯識作此頌言即依此三性立彼三無性故佛密意説一切法無性護法釋云於有及無總説無性故名密意又顯揚論無著所造與攝大乘等同顯一義又瑜伽論廣引此經及三無性通有及無故知三無性論譯家謬也所以者何三十唯識三無性論世親所造如何二論有此差別又彼世親依彌勒宗及無著等故知同一無性者真諦謬耳或可今勘真諦三無性論即無著所造顯揚論無自性品然彼真諦譯為別本須勘目録及顯揚未了善男子譬如空華相無自性性當知亦爾釋曰自下第二舉喻重釋釋三無性即分為三此即第一釋相無自性性譬如空華由眩翳故於虗空中似華相現據實空中本來無華遍計所執亦復如是即用所執為初無性故言相無自性性當知亦爾譬如幻像生無自性性當知亦爾一分勝義無自性性當知亦爾釋曰第二釋生無性及一分勝義無性如阿毗達摩經説幻等八喻顯依他起今此第二生無自性性及一分勝義無自性性皆用依他以為自性故如幻像當知亦爾問大般若等即用幻等喻其空義如何此經喻依他起解云幻等自有二義一非有似有二無實像等是故二經各據一義故不相違譬如虗空唯是衆色無性所顯遍一切處一分勝義無自性性當知亦爾法無我性之所顯故遍一切故釋曰此即第三釋一分勝義無自性譬如虗空有其二義一無色所顯二遍一切處真如勝義無自性性當知亦爾一法無我性之所顯故二遍一切法故故佛地經十虗空喻喻淨法界此亦如是問對法瑜伽喻色無處説為虗空依佛地論及成唯識五蘊無處説為虗空如何會釋解云瑜伽及對法等隨轉理門同薩婆多唯識等論真實理門各據一義故不相違善男子我依如是三種無自性性密意説言一切諸法皆無自性釋曰此即第三釋已總結勝義生當知我依相無自性性密意説言一切諸法無性無生無滅本來寂靜自性涅槃釋曰自下第二約初後無性釋一切法無生等句於中有二初約相無自性性釋無生等句後善男子下約勝義無自性性釋無生等句前中有四一標二徵三釋四結此即第一以理標宗謂諸經説一切諸法無生等言三無性中約相無性説無生等何以故釋曰此即第二外人反徵若諸自相都無所有則無有生若無有生則無有滅若無生無滅則本來寂靜若本來寂靜則自性涅槃於中都無少分所有更可令其般涅槃故釋曰此第三釋文有四節一釋無生二釋無滅三釋本來寂靜四釋自性涅槃如經可知故不繁釋是故我依相無自性性密意説言一切諸法無生無滅本來寂靜自性涅槃釋曰此即第四結文可知善男子我亦依法無我性所顯勝義無自性性密意説言一切諸法無生無滅本來寂靜自性涅槃釋曰自下第二約勝義無自性性釋無生等句於中有四一標二徵三釋四結此即初也謂圓成實實勝義諦中有其四義一者無生二者無滅三本來寂靜四自性涅槃故諸經中亦依圓成勝義無性説無生等何以故釋曰第二外人反徵謂外反徵雖説四義未辨其因依何因故名無生等法無我性所顯勝義無自性性於常常時於恆恆時諸法法性安住無為一切雜染不相應故釋曰自下第三依徵正釋文別有二初總標三因以答徵詰後舉三因釋無生等此即初也文有二節初出勝義無性體有其二種一者依他二圓成實今於此中取後非前後於常常時等者正明三因一於常常時於恆恆時諸法法性安住故無為二無為故無生無滅此即安住故及無為故二因成立無生無滅二義也一切雜染不相應故者以第三因成立經中本來寂靜及自性涅槃二義也以一故字含有三義故成三因也於常常時於恆恆時諸法法性安住故無為由無為故無生無滅釋曰自下第二重釋三因釋無生等於中有二初以二因釋無生等後一切雜染不相應因釋成本來寂靜及自性涅槃此即初也謂法無我勝義諦理於常常時於恆恆時諸法法性安住故得成無為也由無為故無生無滅二義得成也一切雜染不相應故本來寂靜自性涅槃釋曰此即第二一切雜染不相應因成立二義一者本來寂靜二者自性涅槃問經所説不生等言如何唯依初後無性答泛論無性自有二種一者大小二藏共説無性二唯菩薩藏所説無性言共説者如世親攝論第五卷説説一切法無自性意今當顯示自然無者由一切法無離衆緣自然有性是名一種無自性意自體無者由法滅已不復更生故無自性此後一種無自性意自性不堅住者由法才生一剎那後無力能住故無自性如是諸無自性理與聲聞共言不共者即彼論云如執取不有故許無自性者此無自性不共聲聞以如愚夫所取遍計所執自性不如是有由此意故依大乘理説一切法皆無自性集論雜集及性論意亦同此雖有二説今此經中依不共門説無性等然不共門説無性等依三無性諸經不同自有聖教依初無性説一切法皆無自性無生滅等如廣百論第十卷云佛自決判我依遍計所執自性於餘經中説一切法皆無自性無生無滅本來寂靜自涅槃又瑜伽論第七十四莊嚴第五無性世親攝論第五並同此説梁本攝論通依三種無自性性説無自性等與此不同自有聖教依三無性説一切法皆無自性依初無性説無性等瑜伽論第七十三故彼論云問世尊依何密意説一切法皆無自性答由依彼彼所化勢力故説三種無自性性又云問世尊依何密意説一切法無生無滅本來寂靜自性涅槃答依相無自性性説如是言自有聖教依三無性説一切法皆無自性依初後二説無生等如即此經及深密經自有聖教依三無性説一切法皆無自性無生滅等如雜集論第十二説彼云一切法者即三自性謂遍計所執自性依他起自性圓成實自性遍計所執自性定無自相自相無故名相無相相無相故名為無性依他起自性待衆緣故非自然生無自然生無自然生性故名生無性生無性故説為無性圓成實自性清淨所緣故於依他起中無遍計所執相所顯自體故勝義為自體又無性所顯故名勝義無性勝義無性故名為無性由此道理是故如來説一切法皆無自性非一切種性相俱無説為無性又彼説云一切諸法無生無滅本來寂靜自性涅槃此依何密意説如無自性無性亦爾如無生無滅亦爾無生無滅本來寂靜亦爾如本來寂靜自性涅槃亦爾又即彼云相祕密者謂於三自性説一切法皆無自性無生無滅等梁論第六亦同雜集所以如是諸教異者此所遣性唯所執性故廣百論等唯約遍計所執説一切法皆無自性無生滅等欲顯因緣生義不無是故此經通依三無性説一切法皆無自性但約初後二種無性説無生等句然依他起雖依他起而無自然無因生義故雜集等具約三性説一切法皆無自性無生滅等三無性義具如別章是故我依法無我性所顯勝義無自性性密意説言一切諸法無生無滅本來寂靜自性涅槃釋曰第四結文可知問如上所説諸密意言四祕密中依何密意解云依雜集説有四祕密故彼論云一令入祕密二相祕密三對治祕密四轉變祕密如是四種於大乘中略攝如來一切所説祕密道理令入祕密者謂於聲聞乘説色等諸法皆有自性為令無怖畏漸入聖教故相祕密者謂於三自性説一切法皆無自性無生無滅等對治祕密者謂為調伏諸過失者如來宣説種種祕密如為對治八種障故説最上乘何等為八一者輕佛二者輕法三懈怠四者少善生喜足故五者貪行六者慢行七者惡作八者不定性為對治輕佛障故説往昔毗婆尸佛即我身是為對治輕法障故説於無量恆沙佛所修行大乘乃得生解為對治懈怠障故説有衆生願生安樂國一切得往生稱念無垢月光佛名決定當得無上菩提為對治少善喜足障故於施等行或時稱讚或時毀呰為對治貪行障故稱讚佛土富樂莊嚴為對治慢行障故稱讚諸佛或有增勝為對治悔行障故或有衆生於佛菩薩起不饒益説彼有情雖行輕毀亦得生天為對治不定種性故令捨聲聞下劣意樂記大聲聞當得作佛又説一乘更無第二轉變祕密者謂經所説隱密名言如説覺不堅善住於顛倒極煩惱所惱得最上菩提此中密意於不散動起堅固勝覺所以者何堅有二義一者真實二者散動由此散動令心剛逸故亦名堅善住於顛倒者翻常樂我常四倒為無常等故名顛倒於此不退故名善住極煩惱所惱者謂於長時精勤苦行極為勞倦所逼惱故得最上菩提者若具如上所説三事定速當證無上菩提今此經中明密意者如世尊説以無量門曾説蘊等十三法門皆有自相即當四中令入祕密世尊復説一切諸法皆無自性無生滅等即是四中相祕密也無性世親攝論第五約三自性説相祕密雜集十二莊嚴第六依三無性説無生等名相祕密即彼雜集及莊嚴論順此經文復次勝義生非由有情界中諸有情類別觀遍計所執為自性故亦非由彼別觀依他起自性及圓成實自性為自性故我立三種無自性性釋曰自下第三約三性門立三無性意於中有二初反釋後然由下順解此即初也觀謂觀待或觀察義此中意云謂諸有情非由別觀三種自性如其次第遣三性故立三無性所以者何非唯相無自性性遣遍計所執餘二亦遣所執性故不遣依他及圓成實立後二種無自性性依他圓成不可遣故又解此中立三意者為除有情所執過患立三無性非彼有情於三性中一一別執有三自性為除彼故立三無性但諸有情不了依他及圓成實於二性上起增益執由此建立三種三無性於二説中後説為勝順文相故依深密經不違此經然由有情於依他起自性及圓成實自性上增益遍計所執自性故我立三種無自性性釋曰此下第二順解於中有二先標後釋此即標也此意説云於二性上遍計所執相非由自相安立為相故立相無自性性於依他起上無自然生增益故立生無自性性於圓成實上無此所執性故立勝義無自性性非謂別觀三種自性為自性故故説三種無自性性由遍計所執自性相故彼諸有情於依他起自性及圓成實自性中隨起言説釋曰此即釋也總説意云由所執相能起言説由言説故成三種因由三因故起諸執著由執著故生依他起三種雜染流轉六趣生死過失是故此中約所執相立三無性於中有二初由所執相能生執著後如如下由執著故生流轉法前中有二初由所執相能起言説後如如由言説故能生執著此即初也理實二性皆離名言而由遍計所執相故於二相中有言説起如如隨起言説如是如是由言説熏習心故由言説隨覺故由言説隨眠故釋曰此即第二由言説故能生執著於中有二初由言説故成三種因後由三因故能生執著此即初也言如如者顯所説法所説非一故曰如如隨彼如如起諸言説是故重言如是如是由諸言説成三種因一由言説熏習心故此明三熏習中名言熏習二由言説隨覺故此解名言隨覺分別如人天等解言説者三由言説隨眠故此不解名言隨眠分別如牛羊等不解言説但由隨眠而起分別此即顯由起言説故成三種因於依他起自性及圓成實自性中執著遍計所執自性相釋曰此明由三因故能執著於三因中前之一因顯執因緣後之二因顯增上緣由此三因於二性中執著遍計所執自性如如執著如是如是於依他起自性及圓成實自性上執著遍計所執自性釋曰此下第二由執著故生流轉法於中有二初牒前能執顯流轉因後正明能執生流轉果此即初也言如如者顯所執境所執非一故曰如如隨彼如如起諸執著是故重言如如是是由此執著於二性中執著遍計所執自性以此執著為流轉因由此因緣生當來世依他起自性釋曰此下第二顯流轉果於中有二初生依他起後生三雜染此即初也問依他雜染有何差別答總別有異或可寬狹不同依他是寬從緣生者皆依他故三雜染中不攝長養五根等故由此因緣或為煩惱雜染所染或為業染所染或為生雜染所染於生死中長時馳騁長時流轉無有休息釋曰此下第二生三雜染於中有二初由三雜染流轉生死後由三雜染流轉六趣此即初也謂由此執為因緣故生三雜染三雜染者謂或業生所緣相應二縛所縛故名雜深由此雜染分段變易二生死中馳騁流轉無有休息二種生死義如別章或在那落迦或在傍生或在餓鬼或在天上或在阿索洛或在人中受諸苦惱釋曰此即第二由三雜染流轉六趣言那落迦依順正理二十一云迦是樂名那者言無落是與義無樂相與名那落迦或復落迦是救濟義那名不可不可救濟名那落迦依大婆沙百七十二云捺落名人迦名為惡惡人生處名捺落迦依毗曇論第八卷云不可樂故名地獄言傍生者毗曇論云身橫行故名畜生順正理云彼趣多分身橫住故或彼趣中容有少分傍行者婆沙論云其形傍故行亦傍以行傍故形亦傍故名傍生有説遍諸處故名傍生謂此遍於五趣有故言餓鬼者毗曇論云從他悕求故名餓鬼順正理云多懷法劣其形瘦悴身心輕躁故名餓鬼婆沙論云飢渴增故名為餓鬼有説被驅役故名鬼恆為諸天處處驅役常馳走故所言天者毗曇論云光明故名天順正理云天謂尊高神用自在衆所祈告故名為天婆沙論云光明增故名天以彼自然身光恆照晝夜等故阿素洛者正理云素洛名天是自在義阿是非義顯彼非天自在減天名阿素洛婆沙論云素洛是天彼非天故名阿素洛復次素洛名端政彼非端政名阿素洛所言人者毗曇論云意寂靜故名人順正理云多思慮故名人婆沙論云能寂靜故名人以五趣中能寂靜意無如人者廣釋如彼正理婆沙具如別章復次勝義生若諸有情從本已來未種善根未清淨障未成熟相續未多修勝解未能積集福德智慧二種資糧釋曰自下第三約位辨立三無性意於中有二初約五位説生無自性性後彼雖如是下約加行等位説後二種無自性性夫論觀門有其五位如成唯識第九卷説何謂悟入唯識五位一資糧位謂修大乘順解脫分解云始從十信至十回向二加行位謂修大乘順決擇分解云在十回向第十終心三通達位謂諸菩薩所住見道四修習位謂諸菩薩所住修道五究竟位謂住無上正等菩提今依此經分為兩段初約五位辨生無自性性即當唯識初資糧位及十信前種解脫分善根位也後約加行等位辨立後二無性即當唯識中間三位除無學位非所為故此即初也於中有三初明説教所為次我為彼下對機正説後彼聞下辨教勝利此即初也然彼所為有其五位一種善根位謂十信前種解脫分善根位也種解脫分善根之法如優婆塞戒經中説二清淨位謂即十信謂能隨分淨罪業故故深密經第二卷云未清淨罪業者清淨罪業緣起經云內法異生不共無明已永斷故不造罪業也三成熟相續位謂即十解能令信等相續成就故深密云依彼成熟善根力故四多修勝解位謂即十行決定勝解多現前故五積集福智資糧位即十回向具足福智二資糧故此中意説未種善根令種善根乃至未具資糧令得具足故為此等故説生無性又解此文辨資糧位五事差別非立五位配四十心五事差別如前分別我為彼故依生無自性性宣説諸法釋曰此即第二對機正説謂諸有情從本已來未悟諸法緣生道理妄執無因自然而生是故世尊依生無自性性説一切法皆從因生不由自然彼聞是已能於一切緣生行中隨分解了無常無恆是不安隱變壞法已釋曰此即第三聞教勝利四種勝利即分為四一解了無常利二怖畏厭患利三止惡修善利四五事具足利此即初也謂世尊説從無明緣行乃至老死不從自在天等所生由斯有情隨分解了一切諸法無常無恆是無常故即不安穩非如涅槃離生滅故即是安住又諸有為前滅後生漸次衰壞變壞之法於一切行心生怖畏深起厭患釋曰此即第二怖畏厭患利如文可知心生怖畏深厭患已遮止諸惡於諸惡法能不造作於諸善法能勤修習釋曰此即第三止惡修善利如文可知修習善因故未種善根能種善根未清淨障能令清淨未熟相續令成熟由此因緣多修勝解亦多積集福德智慧二種資糧釋曰此即第四五事具足利釋五事相準上應知彼雖如是種諸善根乃至積集福德智慧二種資糧然於生無自性性中未能如實了知相無自性性及二種勝義無自性性釋曰此下第二約加行等位説後二種無自性性於中有三初明説教所為次如來為彼下對機正説後彼聞已下辨教勝利此即初也於中有二初明未了二種無性後辨不了無性之性謂諸有情聞説諸法從緣而生不從自在天等所生由斯解了無常等義積集福智二資糧等而未能了諸有為行皆如幻等非實有性便執諸法定有實性此多不了相無性性或復不了如上所説二種勝義無自性性於一切行未能正厭未正離欲未正解脫未遍解脫煩惱雜染未遍解脫諸業雜染未遍解脫諸生雜染釋曰此即第二明不了失謂未能了相無自性業故於一切行未能正厭等言正厭是加行道正離欲者是無間道正解脫等是解脫道及勝進道煩惱業生三種雜染如攝大乘及唯識等如來為彼更説法要謂相無自性性及勝義無自性性釋曰此下第二對機正説於中有二初正説教後明説教之意此即初也謂十回向終加行位等宜聞此教故為説之為欲令其於一切行能正厭故正離欲故正解脫故超過一切煩惱雜染故超過一切業雜染故超過一切生雜染故釋曰此第二明説教之意為欲令其加行等位速能成辦加行等道及令超過三種雜染是故更説二種無性彼聞如是所説法已於生無自性性中能正信解相無自性性及勝義無自性性簡擇思惟如實通達釋曰此下第三辨教勝利於中有二初明加行位中所得勝利後於依他起下辨地上二地所得勝利此即初也此中正明於加行位所得勝利然加行位諸説不同有説即屬第二僧祗極歡喜地近方便故如未至定即屬初禪有説正在第十回向第一僧祗未入地故雖有兩説護法菩薩存第二解如成唯識第九卷説近見道故立加行名於此位中聞後二種無性教故作四尋思四如實觀存能緣識遣所取空即是相自性性即彼無性所顯勝義名為勝義無自性性若廣分別如成唯識第九卷説故今説云於二無性簡擇思惟即四尋思如實通達即四如實智也又解簡擇思惟者四尋思位如實通達者初地已上通達位也於依他起自性能不執著遍計所執自性相釋曰此下第二辨地上二位所得勝利有六勝利即分為六一遣所執相二不起三因三滅依他起四斷當苦因五能引三道六離三雜染此即初也謂地上二位聞前所説二無性故能不執著遍計所執由言説不熏習智故由言説不隨覺智故由言説離隨眠智故釋曰此即第二不起三因謂不執故三因不成因不成故生三種智言三智者一言説不熏習智二言説不隨覺智三言説離隨眠智然此三智自有二説一從境得名謂後所得智緣三境生立三智名一云從因得名謂即二種無自性智從三種因之所生故立三種名能滅依他起相釋曰此即第三滅依他起謂不起三因成三種智由三智故能滅依他也於現法中智力所持能永斷滅當來世因釋曰此即第四斷當苦因由前三智滅依他故於現身中有方便智以方便智所攝持故彼根本智能永斷除當來世因由此因緣於一切行能正厭患能正離欲能正解脫釋曰此即第五引三道所謂加行無間解脫也能遍解脫煩惱業生三種雜染釋曰此即第六離三雜染如文可知復次勝義生諸聲聞乘種姓有情亦由此道此行迹故證得無上安隱涅槃諸獨覺乘種姓有情諸如來乘種姓有情亦由此道此行迹故證得無上安隱涅槃釋曰此下第四約三無性辨一乘義義於中有三初約聖道辨一乘義次善男子下明趣寂聲聞定不成佛後若回向下明回向聲聞定得成佛總釋意云第一段中約三種姓如來方便説為一乘就實正理具有三乘各證無餘究竟涅槃勝鬘經意亦同此説第二段意定性二乘唯證二乘無餘涅槃必無後時得成佛義故瑜伽云二乘所證無餘涅槃唯有真如清淨法界第三段意不定種姓回向聲聞必當成佛是故法華方便品説為二乘種姓理實決定得成佛果若依此説方便説三就實為一故法華云十方佛土中唯有一乘法無二亦無三除佛方便説法華勝鬘各據一義今此一部義俱有故解深密是最了義義如別章就初段中復分為三初明三乘各證自乘無餘涅槃次約聖道方便説一後明理實三乘差別此即第一謂三乘種姓各以無性妙清淨道證無餘依妙涅槃界然彼聖道能通義故名之為道即彼聖道諸聖遊履亦名行迹由此道迹離諸煩惱有漏苦身證得常住寂滅之樂是故説為安隱涅槃一切聲聞獨覺菩薩皆共此一妙清淨道皆同此究竟清淨更無第二乘依此故密意説言唯有一乘釋曰此即第二方便説一言聲聞者諸佛聖教聲為上首從師友所聞此教聲展轉修證永出世間小行小果故名聲聞言獨覺者常樂寂靜不欲雜居修加行滿無師友教自然獨悟永出世間中行中果故名獨覺或觀待緣而悟聖果亦名緣覺言菩薩者悕求大覺悲愍有情或求菩提志願堅猛長時修證永出世間大行大果故名菩薩具如瑜伽釋論廣解總説意云謂彼三乘皆其此一妙無性道即説此道名究竟淨唯有此道更無第二故約一道説為一乘故深密云唯有一清淨道更無第二而不別説究竟清淨故知究竟清淨即是妙清淨道也又云一言自有三種一道一故名一二果一故名一三理一故名一今依此文有其二種妙清淨道即是道一究竟清淨即是果一依此二一更無第二故深密意説唯有一乘而不同下第四卷中約理無別故説一乘然一乘者唯一佛乘故勝鬘經云聲聞緣覺皆入大乘大乘即佛乘也又法華經云十方佛土中唯有一乘法無二亦無三或可法身以明一乘故法華論云以如來法身與聲聞法身法身無異故與授記後當分別此即六中帶數釋也論體性者若受用身四智心品所攝蘊等以為體性若就法身真如為體總相出體於一乘門教理行果以為一乘然此一乘聖教甚多譯者非一意趣深遠是故新舊競興諍論一真諦等一類諸師依法華等諸經及論皆作此説一切衆生皆有佛性故涅槃經第七卷云二十五有有我不耶佛言善男子我者即是如來藏義一切衆生悉有佛性即是我義又第二十五云衆生佛性不一不異諸佛平等猶如虗空一切衆生同共有之此説理性又第二十七云師子吼者名決定説一切衆生悉有佛性又云譬如有人家有乳酪有人問言汝有蘇耶答言我有酪實非蘇以巧方便定當得故故言有蘇衆生亦爾悉皆有心凡有心者定當得成阿耨多羅三藐三菩提以是義故我定説一切衆生悉有佛性此説行性又三十三云一切衆生同有佛性皆同一乘同一解脫一因一果同一甘露一切當得常樂我淨是名一味通説理行又法華經云十方佛土中唯有一乘法無二亦無三除佛方便説又云唯此一事實餘二則非真又勝鬘經聲聞緣覺皆入大乘又須真天子所問經云文殊師利言一切皆得審當作佛卿莫疑也所以者何一切當得如來覺故廣説如彼又入楞伽第二明五乘性云闡提二種一者焚燒一切善根二者憐愍一切衆生作盡願二中從一定不成佛具説如彼四卷楞伽第一卷説言雖有異意同前本準此等經無姓有情亦得成佛又梁攝論第十五云五救濟乘為業乃至彼云未定根性聲聞能安立彼為修行大乘故釋曰乃至若得信等五根不名定根以未得聖故若得未知欲知等三根則名定根以得聖故若至頂位不名定性以不勉四惡道故若至忍位名為定性以免四惡道故若依小乘解未得定根性則轉小為大若得定根性則不可轉如此聲聞無有改小為大義云何説一乘今依大乘解未專修菩薩道悉名未定根性故一切聲聞皆有可轉小為大義安立如此大小乘人令修行大乘智度論八十四云有四種道人天道並三乘道為四菩薩法應引導衆生著大道中若爾任入大道者著三乘中若不任入涅槃者著人天福樂中作涅槃因緣又法華論云聲聞有四種一者決定二者增上慢三者退菩提四者應化聲聞二種聲聞如來與授記謂應化聲聞退已還發菩提心者決定增上二種聲聞根未熟故如來不與授記菩薩與授記者方便令發心故準此等文決定無有無性有情亦無定性聲聞獨覺必不成佛而深密經及瑜伽等定不成者約根未熟時分而説非謂決定不成佛也故寶性論第二卷云向説一闡提常不入涅槃無涅槃性者此義云何為欲示現謗大乘因故乃至依無量時故如是説以彼實有清淨性故不得説言彼常畢竟無清淨心問依瑜伽第八十云於無餘依涅槃界中遠離一切發趣事業一切功用皆悉止息若如上説決定聲聞亦得成佛彼瑜伽文如何會釋答依法華第三卷云我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想入於涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧大智論第九十三亦同此説又涅槃經二十三云聲聞獨覺八萬六萬四萬二萬一萬住處名為涅槃無上法主聖王住處乃得名為大般涅槃又楞伽第四頌云譬如海浮木當隨波浪轉諸聲聞亦爾相風所漂蕩離諸隨煩惱薰習煩惱縛味著三昧樂安住無漏界無有究竟趣亦復不退還得諸三昧身無量劫不覺譬如昏醉人酒消然後寤得佛無上體是我真法身第二第二亦同此意又法華論云實無而有增上慢人以有世間三摩跋提實無涅槃而生涅槃想對治此故説化城譬喻應知又云第四人者方便令入涅槃城故涅槃城者諸禪三昧城過彼城已令入大般涅槃城故準此等文瑜伽所説無餘涅槃即彼楞伽所説三昧樂定離分段故名為無餘非實無餘有變易故勝鬘經説無無餘故彼經云是故阿羅漢辟支佛有餘生法不盡故有生有餘梵行成故不純事不究竟故當有所作不度彼故當有所斷以不斷故去涅槃界遠乃至言得涅槃者是佛方便唯有如來得般涅槃準此應知八萬劫等入三昧樂假名無餘無實身智俱滅無餘涅槃然須陀洹等者從本為名實是無學是故二乘定得成佛由此諸經實説一乘假説二乘二者大唐三藏依諸經論立有五姓無姓有情無涅槃性定性二乘必不成佛故善戒經第一卷云若無菩薩性雖復發心勤修精進終不能得阿耨多羅三藐三菩提又地持論第一卷云非種姓人無種性故雖復發心勤修精進必不究竟阿耨菩提瑜伽第三十五亦同地持又此經云一向趣寂靜聲聞種姓補特伽羅雖蒙諸佛施設種種勇猛加行方便化導終不能令當坐道場證得阿耨多羅三藐三菩提又深密解脫經第二云成就第一義寂滅聲聞性人一切諸佛盡力教化不能令其坐於道場得無上菩提我説名為寂滅聲聞又大菩薩藏經第五卷云正定衆生是正法器如來説法若不説法皆得解脫邪定衆生非正法器若使如來為彼説法若不説法終不堪任證於解脫如來如實知彼有情非法器已而便棄捨央堀摩羅經第三卷云三聚衆生別即是聲聞乘大乘唯二聚可治不可治所言邪定者謂彼一闡提正定謂如來菩薩及二乘又善戒經第三卷云衆生調伏有其四種一者有聲聞性得聲聞道二緣覺性得緣覺道三有佛性即得佛道四者有人天性得人天樂是名為四勝鬘經云又如大地持四重擔何等為四一者大海二者諸山三者草木四者衆生如是攝受正法善男子善女人建立大地堪能荷負四種重任喻彼大地何等為四謂離善知識無聞非法衆生以人天善根而成就之求聲聞者授聲聞乘求緣覺者授緣覺乘求大乘者授以大乘又大般若五百九十三云若有情類於聲聞乘性決定者聞此法已速能證得自無漏地於獨覺乘性決定者聞此法已速依自乘而得出離於無上乘性決定者聞此法已速證無上正等菩提若有情類雖未證入正性離生而於三乘不定者聞此法已皆發無上正等覺心十輪經第九意同大般若依菩薩地持第二卷云人成就者略記四種有聲聞種性以聲聞乘而成就之有緣覺種性以緣覺乘而成就之有佛種性以無上大乘而成就之無種性者則以善趣而成就之瑜伽三十七亦同地持又瑜伽論第二卷云無涅槃法者便闕三乘菩提種子又瑜伽六十七云住無種性人是名畢竟無般涅槃法乃至廣説又五十二云若於通達真如所緣緣中有畢竟障種子建立不般涅槃種性補特伽羅若不爾者建立為般涅槃法種性補特伽羅又莊嚴論第一卷云無性有二一時邊無般涅槃二畢竟無般涅槃時邊無般涅槃法有四一者一向行惡行二者普斷諸善法三者無解脫分善根四者善因少不具足畢竟無涅槃法者以無因故無般涅槃性但求生死不求涅槃人又梁朝攝論第十四云彼障因不具一切衆生界住二種定中諸佛無自在天親釋曰衆生無涅槃性名因不具諸佛於此位中不能令般涅槃神通亦無自在諸貪著生死不信樂大乘又大唐攝論云有情界周遍具障而闕因二種決定轉造業受果二種決定諸佛無自在世親釋論第十卷云若諸有情界無涅槃法名為闕因此意説彼無涅槃因無種姓故諸佛於彼無有自在又大業論亦同此意又無性云謂具煩惱業異熟障故名具障無涅槃因無種姓故名為闕因諸佛於上所説有情皆無自在令得涅槃廣説如彼依佛地論有五種姓義如常説乃至彼云第五種姓無有出世功德因故畢竟無有滅度之期又十地論第十一云邪定聚名無般涅槃性準此等文無性有情無涅槃因定性二乘必不成佛若爾如何説為一乘前所引教如何會釋解云如涅槃云善男子我者即是如來藏義又一切衆生悉有佛性常住無有變易又寶性論第一卷云問云何得知一切衆生有如來藏答依一切諸佛平等法性身知一切衆生皆有如來藏如此等文皆是真如法身佛性此即五性皆有佛性又涅槃云譬如有人乃至定當得故者如此等教皆是行性定當得故約不定姓少分而説又法華經云十方佛土中唯有一乘法無二亦無三除佛方便説者釋此經文諸説不同羅什等云言無二者無聲聞緣覺無三者無聲聞緣覺及大乘中偏行六度獨善菩薩復有人云言無二者謂無第二即是緣覺言無三者謂無第三聲聞乘也一云此前兩解唯因乘仍見佛乘有極果性不故破焉今者正判無二無三約佛三身以顯此義所言無二唯有如來報佛一乘無彼聲聞緣覺二乘勝鬘經云聲聞緣覺乘皆入大乘者即是佛乘法華經云唯此一事實餘二則非真所言無三唯有如來法身一乘而無聲聞緣覺及佛三乘攝大乘云菩薩未入二地生如是想謂三乘人三行差別迷一乘理法華經云尚無二乘何況有三涅槃云如來聲聞緣覺同一佛性同一無漏前破二皈一是破小入大後破三皈一是泯事歸理雖有三釋第二為正故法華論末云第二方便品示現破二明一或有本云破三明一然諸本中多云破二明一又華嚴經第十二十八第六十等皆云無二乘之名又法華經第三卷云世間無有二乘而得滅度唯一佛乘得滅度耳又云唯有一佛乘息處故説二梁攝論云信等五根不名定根等者大業大唐二本攝論皆無此言故不可依智度論云若不任入涅槃者著人天福樂中作涅槃因緣者人天樂中自有二種一者畢竟無涅槃性但以人天而成就之二者暫時無涅槃性人天成就作涅槃因雖有二種彼論且依暫時無性一邊而説或可彼顯菩薩悲願欲令盡無餘涅槃非悉一切皆入涅槃法華論云決定增上二種聲聞根未熟故如不與授記菩薩與授記者方便令發心故者菩薩與授成佛之記為欲令彼於大乘中發信心故此即方便非實成佛法華經云是人雖生滅度之想入於涅槃而於餘國求佛智慧者依正法華第四卷云一切志在無為之想謂當滅度甫當往至他佛世界又第三云臨欲滅度佛在前住誨以要法發菩薩意不在生死不住滅度解三界空第四卷文意同此也此文既云臨欲滅度準此應知住無餘依臨入無餘發菩提心非是已入而能發心釋通智度準此應知又涅槃云八萬劫住處等者三藏釋云預流等位回心向大受變易生行菩薩行至十信位住於八萬六萬劫等名為住處真諦三藏九識章云問大本云緣覺十千劫到到何位是何宗答此是客宗意除三界或回心學大乘入十信信法如如準知真諦亦説十信為所到處問若爾如何説為涅槃答佛依回心向大聲聞以火燒身示現涅槃説為涅槃非實涅槃此如瑜伽論第八十云彼既如是增壽行已留有根身別作化身同法者前方便示現於無餘涅槃界而涅槃由此因緣皆作是念其名尊者於無餘依涅槃界已般涅槃彼以所留有根實身即於此界贍部洲中隨其所樂遠離而住一切諸天尚不能覩何況其餘衆生能見此意説云為除疑情同法者前示現入於無餘涅槃故名涅槃非彼實任無餘涅槃或可諸佛菩薩化入無餘為引攝一類及任持所餘顯彼二果非究竟如首楞嚴三昧經云舍利弗菩薩如是以辟支佛乘入於涅槃而不永滅乃至廣説楞伽第二第四所説三昧樂門者謂預流等回心向大令身久住依邊際定資有漏業受變易生經八萬劫或六萬等至十信位即説彼定名三昧樂而非已住無餘涅槃名為三昧由此理教言八萬劫乃至十千劫住處者即非已入無餘涅槃而沒廢趣故瑜伽第八十云問回向菩提聲聞為住無餘依涅槃界中能發趣阿耨多羅三藐三菩提耶為住有餘依涅槃界耶答唯住有餘依涅槃界中可有此事所以者何以無餘依涅槃界中遠離一切發趣事業一切功用皆悉止息又云問於無餘依涅槃界中所得轉依當言何相答無戲論相又善清淨法界為相又解深密經第四及深密解脫皆云於無餘依涅槃界中一切諸受無餘永滅廣説如經是故三乘非無差別辨假實者諸教不同有處實説一乘假説三乘如法華經云十方佛土中唯有一乘法無二亦無三除佛方便説又云唯此一事實餘二則非真又勝鬘云聲聞緣覺皆入大乘又涅槃經第二十五云一切衆生皆歸一道一道者謂大乘也諸佛菩薩為衆生故分之為三等有處實説三乘假説一乘如即此經第二卷云一切聲聞獨覺菩薩皆共此一妙清淨道等又第四卷云如世尊説若聲聞乘若復大乘唯是一乘此何密意等又出生菩薩心經爾時迦葉波羅門白佛言世尊解脫解脫有差別不佛言解脫於解脫無有差別道於道無有差別乘於乘而有差別譬如王路有象輿者有馬輿者有驢輿者等次第行於彼路同至一城如是等教誠證非一然説一乘意趣不同故諸聖教種種有異若依顯揚第二十卷以六因釋説一乘意故彼論云問何以故如來宣説一乘答由六因故一即彼諸法約無差別相故故約所證一味真如無差別故二約無分別行相故此約能證平等智説意同此經道一故説一乘此上一義攝論所無三衆生無我及法無我平等故此依二種無我故説一乘此即攝論法等無我等合為第三四解脫平等故謂差別求者有事虗妄分別煩惱對治所緣法性不相違故此當攝論解脫平等差別求者舉能證人三乘不同名差別求有事煩惱者即修所斷虗妄分別煩惱者即見所斷能斷二惑見修二道名為對治所證解脫名所緣法性此意説云能求三乘雖有差別而見修所證涅槃無差別故名不相違也五善能變化主故此即攝論依變化故説為一乘六行究竟故此同攝論究竟説一乘依莊嚴論以十種義以釋一乘其莊嚴論頌是慈氏釋即世親共成一部舊相傳云無著菩薩造者謬也然彼論中先以八義釋諸經中佛説一乘後以引攝任持二義釋諸如來説一乘意故彼論云如是處處經中以此八意佛説一乘而亦不無三乘問若爾復有何義以彼意而説一乘偈曰引接諸聲聞攝住諸菩薩於此二不定諸佛説一乘廣説如彼後無著菩薩造攝大乘論引莊嚴頌以明十義後世親無性各造釋論以釋十義故無著菩薩攝大乘論云論曰若此功德圓滿相應諸佛法身不與聲聞獨覺乘共以何意趣佛説一乘此中有二頌為引攝一類及任持所餘由不定種姓諸佛説一乘法無我解脫等故姓不同得二意樂化究竟説一乘世親説云釋曰此中二頌辨諸佛説一乘意趣為引攝一類者謂為引攝不定種姓聲聞等令趣大乘云何當令不定種姓諸聲聞等皆由大乘而般涅槃及任持所餘者謂為任持不定種姓諸菩薩衆令住大乘云何當令不定種姓諸菩薩衆不捨大乘勿聲聞乘而般涅槃為此義故佛説一乘由不定等句義已説法無我解脫乃至廣説已上二義大業及無性莊嚴論亦同梁論意別故彼論本頌云未定姓聲聞及諸餘菩薩於大乘引攝定姓説一乘釋曰有諸聲聞等於大乘根姓未定攝引令信受大乘攝令修行大乘乃至佛説一乘引攝令入住大乘有諸菩薩於大乘根姓未定云何安立彼於大乘令不捨於大乘乃至佛説一乘引攝令入住大乘有諸菩薩於大乘根性已定無退異意為此菩薩故説一乘解云本論及釋佛為三人説為一乘前二未定第三已定諸論皆無故不可依也此中復由別意趣力唯説一乘何別意趣謂法等故等梁論為顯論一乘意是故説偈前偈以了義説一乘後偈以祕密義説一乘法等故者法謂真如諸聲聞等同所歸趣所趣平等故説一乘無我等故者謂聲聞等補特伽羅我皆無有由無我故此是聲聞此是菩薩不應道理由此無我平等意趣故説一乘解脫等故者謂聲聞等於煩惱障同得解脫故説一乘如世尊言解脫解脫無有差別已上三義諸論皆同姓不同故者種姓差別故以不定姓諸聲聞等亦當成佛由此意趣故説一乘大業無性意同此論梁論云有二乘人於自乘位根性未同此人雖求二乘道未得二乘根性未定故可轉作大乘根性為化此人故説一乘若莊嚴論引入大乘故説一乘者意同梁論解云此意引攝不定即同第一引攝一類與諸論異故不可依也得二意樂故者得二種意樂故一攝取平等意樂由此攝取一切有情言彼即是我我即是彼如是取已此既成佛彼亦成佛由此意趣故説一乘諸本大同然梁論云聲聞等人於一切衆生得平等意無性莊嚴諸佛於一切衆生得自體平等意大業唐本不云諸佛及聲聞等也二法性平等意樂謂諸聲聞法華會上蒙佛授記得法性平等意樂未得法身由得如是平等意樂作如是思惟諸佛法性即我法性諸論皆同唯莊嚴論云聲聞得作佛意謂諸聲聞昔行大菩提聚時有定作佛性彼時佛加故勝攝故得自知作佛意由此人前後相續無別故説一乘解云譯家不同不可會也復有別義謂彼衆中有諸菩薩與彼名同蒙佛授記由此法如平等意樂故説一乘諸論皆同唯莊嚴論似無此段言化故者謂佛化作聲聞乘等如世尊言我憶往昔無量百返依聲聞乘而般涅槃由此意趣故説一乘以聲聞乘所化有情由見此故得般涅槃故現此化諸論皆同梁論云復次佛化舍利弗等聲聞為其受記欲令已定根性聲聞更練根性為菩薩未得定根性聲聞令直修佛道由佛道般涅槃餘本無也究竟故者唯此一乘最為究竟過此更無餘勝乘故聲聞乘等有餘勝乘所謂佛乘由此意趣諸佛世尊宣説一乘諸本皆同大業本云此即是一乘以究竟無有別趣故然有差別以聲聞乘等異於佛乘解云譯家不同非於一切有情界中無有種種有情性或鈍根性或中根性或利根性有情差別釋曰此即第三辨三乘差別文有二節初標非一後約根分三言非一者謂於一切有情數中非無五種種性差別言五姓者所謂三乘不定無性言無性者謂於身中無有三乘涅槃種性就有性中有其四種一聲聞種性謂於身中唯有聲聞涅槃種性二獨覺種性三菩薩種姓此二種姓唯同聲聞四不定種姓謂於身中具有三乘涅槃種姓而彼回心定趣佛果由佛菩薩大悲方便所攝受故然彼種姓自有二種一性種姓二習種姓釋此種姓西方諸師諸説不同一唯本非新如護月菩薩亦名月藏彼立唯有法爾種子而無新熏二唯新非本如難陀及勝軍等彼立唯有新熏種子而無法爾三亦本亦新如護法菩薩具立新熏法爾二種子為性種姓新所熏種為習種性若廣分別如成唯識第二卷如是五姓具如別章或可此云非一種姓者三乘不定四性非一故言種種約根分三者謂諸聖者隨根利鈍有上中下故立三乘由此道理密意説一非無三乘故説一乘深密解脫意亦同此善男子若有一向趣寂聲聞種性補特伽羅雖蒙諸佛施設種種勇猛加行方便化導終不能令當坐道場證得阿耨多羅三藐三菩提釋曰此下第二明趣寂聲聞定不成佛於中有四一標二徵三釋四結此即標也謂彼趣寂是定性故雖諸佛化定不成佛何以故釋曰此第二徵由彼本來唯有下劣種性故一向慈悲薄弱故一向怖畏衆苦故釋曰此第三釋於中有三初總標三因次牒前二因顯二過失後舉前二失釋不成佛此即初也謂彼定性二乘種性皆是本來劣種性故此即總因一向慈悲薄弱故者是獨覺障一向怖畏衆苦故者此是聲聞障故無上依經第一卷云有四種障一棄背大乘是闡提障執著我見是外道障厭畏疲極是聲聞障背利益他是緣覺障故知後二是二乘障理實二乘皆具二障無上依經具依相顯各説一障由彼一向慈悲薄弱是故一向棄背利益諸衆生事由彼一向怖畏衆苦是故一向棄背發起諸行所作釋曰此即第二顯二過失如經可知我終不説一切棄背利益衆生事者一向棄背發起諸行所作當坐道場能得阿耨多羅三藐三菩提釋曰第二顯不成佛由二過故終不説言得成正覺是故説彼名為一向趣寂聲聞釋曰第四總結可知若回向菩提聲聞種性補特伽羅我亦異門説為菩薩釋曰此下第三回向聲聞定得成佛於中有四一標二徵三釋四結此即標也謂回向聲聞即是瑜伽五種姓中不定性者或是漸鈍二菩薩中漸悟所攝彼定成佛故法華云汝等所行是菩薩道皆依此中不定者説又莊嚴論第六卷云為對治不定障故大乘經説諸佛授記聲聞當得作佛及説一乘更無第二雜集十二亦同何以故釋曰此第二徵彼既解脫煩惱障已若蒙諸佛等覺悟時於所知障其心亦可當得解脫釋曰第三廣釋謂佛化導斷所知障漸次證得無住涅槃由斯理故決定成佛由彼最初為自利益修行加行脫煩惱障是故如來施設彼為聲聞種性釋曰此即第四結其本名然説聲聞諸教不同有處説二所謂趣寂回向聲聞如即此經深密解脫有處説三謂退菩提寂滅聲聞及增上慢如入楞伽第七但列其名而不解釋或有三種所謂變化誓願法性如瑜伽論第七十三故彼論云復次云何立聲聞乘謂三因緣故一變化故二誓願故三法性故變化故者謂隨彼彼所化勢力如來化作變化聲聞誓願故者謂有補特伽羅於聲聞乘已發誓願即建立彼以為聲聞法性故者謂有補特伽羅本性已來慈悲薄弱於諸苦事深生怖畏由此二因於利他事不深愛樂非為是事樂處生死彼由安住此法性故立為聲聞又覺法性故謂於一切安立諦中多分修習怖畏行縛由此因緣證得圓滿如聲聞乘獨覺亦爾出無佛世而證正覺與此差別即上相違三因緣故應知菩薩有處説四一者決定二增上慢三退菩提四者應化如法華論列名不釋或説四種一者變化二增上慢三回向菩提四一向趣寂如瑜伽八十彼云云何名為四種聲聞一者變化聲聞法華論應化寶積論應聲聞二者增上慢聲聞寶積論云我慢聲聞三者回向菩提聲聞法華退菩提寶積作菩提四者一向趣寂聲聞法華決定聲聞寶積寂滅性變化聲聞者為欲化度由彼所化諸有情故或諸菩薩或諸如來化作聲聞七十三但云諸如來不言菩薩也增上慢聲聞者謂但由補特伽羅無我智及執著耶法無我智計為清淨回向菩提聲聞者謂從本來是極微劣慈悲種性由親近如來住故於廣大佛法中起大功德想熏修相續雖到究竟住無漏界而蒙諸佛覺悟引入方便開導由此因故便發趣廣大菩提由樂寂故於此加行極成遲鈍不如初始發心有佛種姓者一向趣寂聲聞者謂從本來是最極微劣慈悲種姓故一向棄背利益衆生事故於生死苦極怖畏故唯有安住涅槃意樂究竟不能趣大菩提或説四種謂應聲聞我慢聲聞作菩提願聲聞及定滅性聲聞如寶積論第三解云如次即當瑜伽四種聲聞名雖有異義同瑜伽故不繁述如何諸教多少異據實具四如瑜伽等而差別者瑜伽等四攝聲聞盡法華論説退菩薩者便不攝本不退者故今寶積瑜伽為勝或可法華退菩提者舉別顯總以回向中是一分故如説思數以攝行蘊楞伽三中除變化者非實聲聞故略不説然七十三變化即是諸論變化聲聞法性即是決定聲聞誓願即當回向聲聞於聲聞乘已誓願後未發大願名為誓願亦名回向若已發大菩提者即是菩薩誓願所攝不名聲聞增上慢者即誓願攝或可誓願法性二攝故此不説此經不説變化增上義同前説解
