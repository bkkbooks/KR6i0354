body:
  text: 西明寺沙門圓測撰勝義諦相品第二之餘爾時世尊告尊者善現曰善現釋曰自下第四釋遍一切一味相於中有二初長行廣釋後舉頌略説或可頌文如來説中乃可分別就長行中復分為三一如來告問次善現奉答後世尊正説此即第一世尊告問於中有二初約時標所問者後正明告問此即初也言爾時者佛説真如一味相時或可善現發問之時真諦記云言爾時者有十一種一佛在世時二轉法輪時三成就相續人聚集時四聞思修時五下種成就解脫時六成立自正義時七破邪執所立義時八破壞生死牢獄義時九由説正義為歡喜破除邪義所鄣衆生時十正修行人領受寶祠時佛為大衆説能分張正法授與大衆即是法寶祠大衆也十一於修行中正定智起抑下捨置之時由如是等義故言爾時也言善現者若具梵音名修浮吼底此云善現相傳説云其人初生宅室皆空父母驚怪以問相師相師報云現空唯善無所加也故名善現或云空生即由此義無著論中名為善吉笈多所翻直本般若名為善實真諦金剛波若記云東方世界青龍陀佛於此影嚮也廣如彼記又相傳云自有經文位登阿跋致地然未見誠文或相傳云婆羅門子祈天而生生始長大請又延佛為設大會送佛祇園返獲羅漢或云是淨音嚮王太子問如何此會唯告善現比丘不告餘三部衆及菩薩衆耶真諦師云不告餘部有其三義一初轉法輪時比丘先入道為佛弟子餘衆後入故二百臘比丘尼禮敬一臘比丘所以者何由比丘力成就戒故又終身不離依止比丘三根性勝丈夫根性堅利女性暗是故律明為女人説法過五六語波夜提五語者謂五陰六語者謂六入為女説法不得陰入外義根性暗不能多受故若廣分別不告餘部及以菩薩皆有五義恐繁不述又五分律第六卷云五語者色無常受想行識無常六語者眼無我耳鼻舌身心無我四分等律皆不釋也今解命須菩提如智度論第四十卷須菩提有二因緣大佛命説法不命餘弟子一者好行無諍定二好深行空法問若爾如何不告菩薩答如智度論第十一云須菩提常行空三昧復斷漏盡衆生生信命令説法法華論中以五義故佛命聲聞不告菩薩大智度論第四十一廣釋不告菩薩及餘弟子佛亦不為説所由應知準彼智度唯告善現今此經中應知亦爾汝於有情界中知幾有情懷增上慢為增上慢所執持故記別所解汝於有情界中知幾有情離增上慢故記別所解釋曰此即第三正明告問此中所言增上慢者如法華經未得謂得未證謂證名增上慢解節同此深密經云依我我慢者譯家謬也今於此中約慢有無以發兩問真諦記云前問有增上慢後問無增上慢前問凡夫後問聖人前問顯示不可治人後問可治人又前問空果行人後問不空果行人又前問顛倒修人後問不顛倒修人又前問邪定聚人後問正定聚人然釋此文依真諦記有慢無慢各有四義有慢四者一增上慢依止謂有取五陰二慢因謂慢隨眠三慢體即是上心四慢事用即是因上心慢能生諸業果報報等言知幾有情者顯慢依上懷增上慢者顯慢之因增上慢所執持故者顯慢體也記別所解者顯慢事用無慢四者一無慢依上謂無漏五陰相續二無慢因即是未知欲根三無慢體即是知根四無慢事用即知已根言知幾有情者無慢依上離增上慢者謂無慢因及無慢體解節經云無增上慢不由增上慢深密經云離我離慢此二經各具二文今此本中唯有一句含有二義是故但云離增上慢也記別所解者無慢事用爾時尊者善現白佛言世尊我知有情界中少分有情離增上慢記別所解釋曰自下第二善現奉答於中有二先釋後問後答前問此即初也謂唯初地已上菩薩如實了知遍一味相法空勝義由此不起法增上慢非諸二乘及異生等故言少分有情離增上慢記別所解問如何二乘知其分齊為菩薩説答佛加被故總相略知而非究竟一一了知故故大品經舌相品云須菩提為菩薩説法皆是佛力問此善現由加被力若能解者應斷法執若不解者如何能説解云由加力故能信知解亦能説空不爾應斷法執過故智度論云二乘未證法空理故問此善現即是二乘如何奉答在淨土耶答佛加被故得往淨土或佛所化而非實身或可穢土有此問答世尊我知有情界中有無量無數不可説有情懷增上慢為增上慢所執持故記別所解釋曰自下第二答第一問於中有三初略答次世尊下述己所見後世尊下申己所念此則初也謂我知有情界中無量有情壞增上慢記別所解記別之相如後當説然此所説懷增上慢諸説不同若依薩婆多宗有四種人起增上慢所謂異生及下三果如大婆沙四十三云起增上慢三説不同有説異生起五謂四善根及四果預流起四除第一一來起三除前二不還起二除前三阿羅漢無增上慢有説異生起九謂有漏善根四向四果預流果起七除前二一來向起六除前三一來果起五除前四不還向起四除前五不還果起三除前六阿羅漢向起二除前七阿羅漢無增上慢預流向無起增上慢義評曰聖者亦於勝有漏善起增上慢故六聖者如前所起各復增一廣説如彼依經部宗同薩婆多於理無違於彼部中有多計故今依大乘大同二宗慢通異生有學聖者故成唯識第六卷云云何為慢恃己於他高舉為性能障不慢生苦為業此慢差別有七九種謂於三品我德處生一切皆通見修所斷聖位我慢既得現行慢類由斯起亦無失解云言七慢者五蘊論云云何為慢謂慢過慢慢過慢我慢增上慢卑慢邪慢慢謂於劣計己勝或於等計己等心高舉為性過慢謂於等計己勝或於勝計己等慢過慢謂於勝計己勝我慢謂於五取蘊隨觀為我或我所心高舉為性增上慢謂於未得增上殊勝所證法中謂我已得卑慢謂於多分殊勝計己少分下劣邪慢謂實無德計己有德心高舉為性集論第四雜集第六瑜伽八十九皆同五蘊若依智度論五十六云增上人者是佛弟子得禪定未得聖道自謂已得言九慢者發智論第二十云有九慢類謂我勝我等我劣有勝我有等我有劣我無勝我無等我無劣我顯揚第一但列三種慢類故彼論云如經説三種慢類我勝慢類我等慢類我劣慢類解云義準説九於理無違此七九慢依成唯識於五處生故彼第六云此慢差別有七九種謂於三品我德處生解云且七慢中慢過慢慢過慢卑慢依三品起我慢一種依我處生邪慢增上依德處生故雜集論第六卷云於下中二品處生慢依中上品處生過慢依上品處生慢過慢依上品處生劣慢於五邪蘊執我我所由此起我慢於未得勝德計己得勝德起增上慢於實無德計己有德即是邪慢若辨九慢自有兩説若依發智論如俱舍第十九説如是九種從前七慢三中離出謂從前慢過慢卑慢如是三種若依見生行次有殊成三三類初三如次即過慢慢卑慢中三如次即卑慢慢過慢後三如次即慢過慢卑慢廣如婆沙若依品類足釋慢類者且我勝慢勝從三慢生謂慢過慢慢過慢三由觀劣等勝境別故故婆沙第百九十九云依品類足論我勝慢中攝三種慢若於劣謂己勝即是慢若於等謂己勝即是過慢若於勝謂己勝即慢過慢餘八慢類如理應説解云餘八慢類如理應説者我等慢類依中上品攝二種慢於等計等此即是慢於勝謂等即是過慢我劣慢類但依上品攝一種慢謂於多勝計己少劣即是卑慢有勝無劣同我劣説有等無勝同我等説有劣無等同我勝説如此九中三依三品三依中上三依上品如前可知而今此中説有慢者七九慢中但約增上於中三説不同真諦三藏但説異生以為有慢依有所得觀以為真觀起上慢故有説此中通説異生二乘有學為有慢者羅漢己斷煩惱障故故法華經第一卷説實得阿羅漢若不信此法無有是處有説亦通羅漢所以者何雖無煩惱慢有所知慢故問若爾如何會釋法華所説答彼約煩惱此據所知説有説無互不相違問七地已來諸菩薩等於增上慢亦得起不答有三釋一云初地己上不起上慢己得勝義一味相故一云七地已還起亦無失如經所説故意起故一云前七地中不唯得起煩惱鄣慢所知障慢亦得現行地地相望有勝劣故問佛知一切衆生邊際不如是問答如大婆沙一百八十六彼云毗奈耶説世尊於菩提樹下建立有情為三聚謂齊爾許名邪定聚齊爾許名正定聚齊爾許名不定聚問為依有情分齊建立為依法分齊耶若依有情者云何非是得有情海邊際耶若依法者聲聞亦能如是建立佛與聲聞有何不共有説依有情建立問若爾如何非是得有情海邊際耶答佛得有情海邊際亦無有過然總相得而非別相謂一切有情不出四生如是而得有説依法建立問若爾聲聞亦能建立佛與聲聞有何不共答聲聞因從佛聞佛無師自能建立是為不共有説若三千世界及千歲已來依有情建立若餘世界及餘時依法建立依智度論亦有問答故第二十八云問一切衆生可得悉知不若悉知即衆生有邊若不知何以故説欲知一切衆生心所趣向云何佛有一切智答曰衆生心心數法可得悉知何以故如經中説一切實語中佛最第一若不能悉知一切衆生心得其邊際者佛何以言悉知亦不名一切智人而佛語皆實必應定有一切智人後次衆生雖無邊一切種智亦無邊譬如函大蓋亦大若智慧有邊衆生無邊者應有是難今智慧及衆生俱無邊故汝難非也後次若言有邊無邊此二於佛法中是置答是十四事虗妄無實無益故不應以為難具如彼説又三十云問曰菩薩若能滿一切衆生願者則衆生有邊即無有受諸飢寒苦何以故一切衆生皆滿所願離苦得樂故答云滿一切者名字一切非實一切如法句偈説一切皆懼死莫不畏杖痛恕己可為譬勿煞勿行杖雖言一切畏杖痛如無色衆生無身故即無杖痛色界衆生雖可有身亦無杖痛欲界衆生亦有不受杖痛而言一切語應得杖者説言一切非實一切世尊我於一時住阿練若大樹林中釋曰自下第二申己所見於中有二初明自他住處後我見下敘他記別此明自所住處衆樹聚集故深密經云名為林如我憶念過去世時住於一處阿練若園阿練若者即是梵音此云空間靜處真諦釋云阿練若者自有三義一者離聲處謂國邑音聲所不至故二者離斫伐處謂採薪所不至故三者離鬪諍處謂一切煩惱總能動亂善法名為鬪諍若住此處能伏煩惱故名離鬪諍也從一拘盧舍外外去乃至百千由旬皆名阿練若處若薩婆多部解一拘盧舍五百弓依正量部解一拘盧舍凡一千弓也一弓八尺凡八百丈地若準此間應成四里少許毗曇論云四肘為一弓五百弓名一拘盧舍一拘盧舍半名阿練若處大毗婆沙一百三十六云四肘為一弓五百弓名阿練若處從此已去名邊遠處即五百弓成摩揭陀國一俱盧舍成北方半俱盧舍所以者何摩揭陀國其地平正去村雖近而不聞聲北方高下遠猶聲及是故北方俱盧舍大俱舍第十二廣辨其量彼云頌云極微微金水䨲羊牛隙塵蠛蝨麥指節後後增七倍二十四指肘四肘為弓量五百拘盧舍此八踰繕那論曰極微為初指節為後應知後後皆七倍增謂七極微為一微量積微至七為一金塵積七金塵為水塵量水塵積至七為一莬毛塵積七莬毛塵為一羊毛塵量積羊毛塵七為一牛毛塵積七牛毛塵為隟遊塵量隟塵七為蠛七蠛為一蝨七蝨為麥七麥為指節三節為一指二十四指橫布為肘豎積四肘為弓謂尋豎積五百弓為一俱盧舍一俱盧舍許是從村至阿練若中間道量説八俱盧舍為一踰繕那若廣分別如婆沙論一百三十六説無性攝論云遠離聚落拘盧舍名阿練若十住論云離衆憒丙名阿練若瑜伽復云謂住空間山林坰野受用邊際所有臥具遠離一切村邑聚落名阿練若頭陀經云阿練若法令身遠離憒閙住於空間遠離者離衆惱亂若放牧處最近三里能遠益善身遠離已亦當令心遠離五欲五蓋名阿練若智論亦同時有衆多苾芻亦於林依近我住釋曰此明衆所住處言苾芻者唐言乞士舊云比丘金剛仙云此是梵音此方義釋或云乞士或云破惡或云怖魔無正名相翻故存梵語依智度論有其五義一名乞士清淨活命故彼第三卷云離四口食故名清淨四口食者一下口食有出家人合藥種殖樹等不淨活命者是名下口食有出家人觀視星宿日月風雨雷電礔礰不淨活命者是名仰口食有出家人曲媚豪勢通使四方巧言多求不淨活命者名方口食有出家人學種種呪術笇吉凶小術不正如是等不淨活命者是名四維口食也二破煩惱名比丘比此云破丘名煩惱三出家人號四名清淨持戒五名怖魔比名怖丘名魔依瑜伽論有五苾芻故第二十九云苾芻有五種一乞白苾芻二自稱苾芻三名想苾芻四破壞煩惱苾芻五白四羯魔受具足戒苾芻真諦記云在因名怖魔乞士破惡至果轉怖魔為煞賊改乞士為應供説破惡為不生我見彼諸苾芻於日後分展轉聚集依有所得現觀各説種種相法記別所解釋曰自下第三記別所解於中有二初總敘諸計後別敘諸計此即第一總敘諸計如後所説依五蘊等作種種解以為勝義不説一味法空道理為勝義諦如是乃至八聖道中自性差別及對治等計為勝義成增上慢故今敘之現觀者依瑜伽論五十三云決定義是現觀義依俱舍論第二十二云於諸諦境現見分明名見現觀然此現觀諸教不同依俱舍論有三種現觀謂見緣事有差別故或説六種如瑜伽五十五等或説十種如集論第七雜集十三或説十八如顯揚十七然今所説有所得現觀者謂諸苾芻依初法輪所説十三法門如言執義不了無所得一味法句勝義起增上慢便諸證得空竟勝義問諸苾芻依何現觀記別所解答通説見修無學及前方故下經云由得念住乃至得八支聖道故於中一類由得蘊故得蘊相故得蘊起故得蘊滅故得蘊滅作證故記別所解釋曰自下第二別敘諸計於中有二初約六種善巧所觀境界記別取解後復有類得念住下約道品中七種觀門記別所解此即第一六種善巧所觀境界記別所解六善巧者謂蘊處緣生四食四諦并十八界理實處界攝法周盡而諸有情意樂差別故約蘊等開為六門若真現觀要證一味勝義諦理方名現觀而諸苾芻懷增上慢得蘊等相謂真現觀故今此中敘六種計雖有六門攝為五段一明五蘊二類處緣生三明四食四明四諦五明十八界此即第一釋蘊六句問此六句為一類計為六計耶解云解節相續皆作此説有諸比丘證見陰相説為證法有諸比丘證見陰生以為證法故知六句皆有別計今此本經一一門中俱説一類故知同彼分為六計或可一門合為一計於理無違然此六句釋有二義一句數多少二辨差別相言多少者依深密經唯有五句少第一句一者陰相二陰生相三陰滅相四陰滅法五陰滅現證法也依解節經具有六句意同此經一陰二陰相三陰生四陰變異五陰滅六證陰滅道今依此經三處不同第一卷中有其六句如經可知第二卷初唯有五句一諸蘊所有自相二者生相三者滅相四者永斷五者遍知第二卷末有七種相故彼云假名安立以為色蘊或自性相或差別相假名安立為色蘊生為色蘊滅及為色蘊永斷遍知或自性相或差別相問如何此經句數多少有此異耶解云據實前後總有九句謂初卷六句外更加永斷遍知及開相為二謂自性差別然此第一及第二末總別具説故置總句第二卷初總不離別不別説總又初卷中自性差別合為蘊相至於第二相中分為自性差別又初卷中唯説滅道不論苦集第二卷末永斷遍知不説滅道者影略互顯故不相違言差別相者真諦師云問此五蘊等八萬法門得一味義其相云何若依上坐部則有八萬四千法門今依正量部但有八萬答約六種法相顯一味義或有比丘由見陰者記自所得此則第一執有五陰不能了別大師所説但唯音聲無有別法名為五陰由不了知此一味故起如是執謂實有五陰由此執故起於顛倒由此倒故起增上慢或有比丘證見陰相者此即第二顯五陰相或假名相或實法相功德相過惡相因緣相三世相生住滅相苦等四諦相三界相無漏界相一向答相分別答相及問答相置答相四食相乃至有漏色心非色心等相陰有如是種種道理名為陰相由不了別道理一味故起此實實道理執因此執故起於顛倒由顛倒故起增上慢或有比丘證見陰生者此即第三顯生相由不了別因果一味故執五陰真實有生由此執故起於顛倒由顛倒故起增上慢或有比丘證陰變異者此即第四顯陰變異相由不了別無滅一味故起此實變異執由此執故起於顛倒由顛倒故起增上慢或有比丘證見陰滅者此即第五顯陰滅相不了別清淨一味故起此實清淨執由此執故起顛倒由顛倒故起增上慢或有比丘證陰滅道者此即第六顯陰滅道由不了別境智一味故起實滅道執由此執故起於顛倒由顛倒起增上慢就五陰法門既有此六義為六種一味如是十二入等一切法門中例皆如此又有別解第一句顯言説品類即是五陰但有言説無有別故第二句顯義及理品類義有假名實法三世相等種種不同如前所列道理一無我第三句顯應滅品類即是集諦煩惱業故第四句顯應知品類即是苦諦第五句顯所證得品類即是滅諦第六句顯應修品類即是道諦於入等中例有此六也今解不爾言得蘊者總顯所證五蘊法門即是總句言得蘊相者得蘊自性差別相此二句是總通下諸句故第二云假名安立以為色蘊或自性相或差別相乃至色蘊永斷遍知或自性相或差別相言自性相者自法自體名為自性如色受蘊等於自性上辨差別義名差別相如説常無常漏無漏等言得蘊起故得蘊盡故者此二句顯生滅無常見故下經云諸蘊生相滅相又諸經云諸行無常起盡法故又瑜伽八十五云云何諸行無常決定起盡相應故言得蘊滅故得蘊滅作證故者此二句如次顯示滅道二諦斷苦集諦得滅諦故由道斷蘊作證滅故十二處等皆準此釋廣辨五蘊義如別章如此一類由得蘊故復有一類由得處故復有一類得緣起故當知亦爾釋曰此即第二類處緣生皆有六句類蘊應知處及緣生義如別章復有一類由得食故得食相故得食起故得食盡故得食滅故得食滅作證故記別所解釋曰此即第三約四食門記別所解配釋六句準上應知辨四食相義如別章復有一類由得諦故得諦相故得諦遍知故得諦永斷故得諦作證故得諦修習故記別所解釋曰此即第四約四諦門記別所解於六句中初二是總如上應知後四如次苦應遍知集應永斷滅應作證道應修習若依瑜伽第五十五云問何緣故説遍知苦諦永斷集諦觸證滅諦修習道諦答由彼苦諦是四顛倒所依處故為除顛倒苦既遍知苦即遍知故遍知集由彼集諦苦諦攝故雖遍知苦仍為集之所隨逐故故須更説永斷集諦言觸證者是現見義由於滅諦現前見故不生怖畏受樂攝受是故次説觸證滅諦若勤修道乃能成辦所觀三義是故後説修習道諦問餘三諦亦應遍知如何唯説苦應遍知答此如婆沙七十九説彼云問契經但説苦諦應遍知如何阿毗達磨説一切法皆應遍知脅尊者言世尊唯説應遍知苦或謂唯苦是應遍知故對法中説一切法是所遍知世尊唯説集應永斷或謂唯集是應永斷故對法中説有漏法皆應永斷世尊唯説滅應作證或謂唯滅是應作證故對法中説有漏法皆應永斷世尊唯説滅應作證或謂唯滅是應作證故對法中依得作證説諸善法皆應作證世尊唯説道應修習或謂唯道是應修習故對法中總説一切善有為法皆應修習此則顯示經義不了阿毗達磨是了義説廣如彼論多復次説廣辨四諦義如別章復有一類內得界故得界相故得界種種性故得界非一性故得界滅故得界滅作證故記別所解釋曰第五約十八界記別所解於六句中初二後二準前應知中間二句釋有差別種類衆多名為種種數過一故名為非一故雜阿含經第十六云佛告比丘云何種種界謂十八界眼界色界眼識界乃至意界法界意識界是名種種界若瑜伽二十七約五蘊明種種非一二義差別彼云云何名蘊種種差別性謂色蘊異乃至識蘊異云何名蘊非一衆多性謂色蘊非一衆多品類大種所造差別故古來今等品類差別故若瑜伽五十六云云何種種界謂即十八界展轉異相性云何非一界謂即彼諸界無量有情種種差別所依住云何無量界謂總彼二名無量界又瑜伽八十三云若能了知十八界者名非一界智了知彼界種種品類名種種界智通達了知彼界趣地補特伽羅品類差別故十八界義如別章説復有一類由得念住故得念住相故得念住能治所治故得念住修故得念住未生令生故得念住生已堅住不忘倍修增上廣大故記別所解釋曰自下第二約道品三十七法記別所解此有兩釋一云前蘊等法約所證境記別所解後念住等依能證行記別所解一云彼諸苾芻非但緣於蘊等中六相以為勝義現觀境界亦緣念住正斷等法六種別相計為真實現觀境界故不能了真勝義中一味相也故解節云或有比丘證見念處及念處相等記自所得又深密云如是諸比丘取念處相説為證法具説如彼於中有三初約念住記別所解次如有一類下類釋正斷神足根力覺支記別所解後約八聖道記別所解此即第一約四念住記別所解言念住者謂四念住即身受心法依正理論七十一云何緣於慧立念住名慧由念力持令住故俱舍二十五云毗婆沙師作如是説慧由念力持令住故理實由慧令念住境如實見者能明記故依毗婆沙第九十六云由念勢力析除自體故名念住自體即是有漏五蘊要由念住折除彼故依智度論第十九云隨順智慧緣中止住是時名念處依瑜伽二十八云問念住何義答若於此念住若由此住念皆名念住於此念住者謂所緣念住由此住念者謂若慧若念攝持於定是自性念住所餘相應諸心心所是相雜念住辨體性者依薩婆多以慧為體若大乘以念慧為體故雜集論十云念住自體者謂慧及念由佛經中有於身等隨觀言故及有念住言故如其次第依瑜伽云若慧若念攝持於定是名自性念住又此復三種一聞所成二思所成三修所成聞思所成唯是有漏修所成者通有漏無漏就釋文中文有六句深密經有七句於第六句開為二句謂念處生已住及不失修行相解節經文依真諦記開為十句真諦記云問曰經意或有比丘證見念處等十句欲何所顯答曰為顯十義説此十句初句證見念處者即是境界念處第二念處相者即是自性念處第三念處對治者顯念處道所治四倒第四念處對治道者顯能治道即是雜念處治四倒故第五念處修習者即是修念處方便道第六未生念處證見念生者即是無礙道謂八忍第七已生念處證見念住者即解脫道謂八知第八不忘失即是修道乃至金剛心第九增長者即無學道謂金剛後心第十圓滿者即神通道三輪利物也謂神通記心正教如四念處有此十句四正勤乃至八聖道例亦如此具説如彼今解不爾一一法門例有六句初二句準蘊應知下有四句不同蘊等言得念住能治所治者顯四念住能治四倒謂身念住觀身不淨能治淨倒受念住觀受無樂能治樂倒心念住觀心無常能治常倒法念住觀法無我能治我倒廣如瑜伽二十八等言得念住修故等者此三句文約四種修釋四念住然此四修薩婆多宗念住現前名為行修亦名得修起得能得未來種類名準得修故俱舍論二十六云修有四種一得修二習修三對治修四除遣修如是四種依法立頌曰立得習二修依善有為法依諸有漏法立治修遣修論曰得習二修依有為善未來唯得現其二修治遣二修依有漏法故有漏善具足四修無漏有為餘有漏法如次各具前後二修若廣分別如順正理七十四婆沙一百五説今依大乘諸教不同若依集論第五雜集第九亦依四修修念住等彼約四正斷明四種修故彼論云更辨諸道修之差別略説有四種謂得修習修除去修對治修得修者謂未生善法修習令生習修者謂已生善法修令堅住不忘陪復增廣除去修者謂已生惡不善法修令永斷對治修者謂未生惡不善法修令不生如是四種修差別相隨其所應依四正斷説瑜伽六十六亦同集論若依此經唯初二修明修念住言得念住修故者總標二修言未生令生者別顯得修言生已堅住等者別顯習修問如何不説後二種修答此中俱説修諸善法不説餘惡不善法故或可具四前能治中攝二修故言得念住未生令生故者準顯揚第二云未生善法為令生故未生者謂所未得善法者謂聞思修所生三慧由無過義故名為善為令生故者謂令修得故言得念住生已堅住不忘倍修增廣故者此習修文諸教不同若準顯揚有其七種一已生善法二令住三不忘四令修滿五令倍修六令增長七令廣大故彼論云已生者謂已得故令住者謂聞慧令不忘者謂思慧令修滿者謂修慧此上三句顯唯守護已所得善令倍修令增長令廣大者如其次第不唯於彼生知足故若依瑜伽二十八具足列名而不解釋二十九文但有前四闕後三句如有一類得念住故復有一類得正斷故得神足故得諸根故得諸力故得覺支故當知亦爾釋曰此即第二類釋五門謂如念住有其六句正斷神足根力覺支皆有六句準上應知言五門者一者正斷謂四正斷即已生惡不善法為令斷故於諸未生惡不善法為令不生故於其未生一切善法為令生故於其已生一切善法為欲令住令不忘失等依俱舍論云何故説勤名為正斷於正修習斷修位中此勤力能斷懈怠故或名正勝於正持策身語意中此最勝故順正理毗婆沙亦同依智度論第十九云破邪法正道中行故名正勤又云四種精進心勇發動故名正勤辨體性者大小諸教皆以精進為體言神足者謂四神足即欲勤心觀三摩地依俱舍云何緣於定立神足名諸靈妙德所依止故有餘師説神即是定足謂欲等彼應覺分事有十三增欲心故毗婆沙師覺分十一加欲心故成十三事又違經説如契經言吾今為汝説神足等神謂受用種種神境分一為多乃至廣説足謂欲等四三摩地此中佛説定果名神欲等所生等持名足正理大同毗婆沙云能為神妙功德所依故名神足若廣分別如大婆沙百四十一説依智度論云攝心安隱於緣中故名如意足又云行四正勤時心等散故以定攝心故名如意足又云智定力等所願皆得故名如意足具説如彼依瑜伽云問何因緣説名神足答如有足者能往能還騰躍勇健能得能證世間所有殊勝之法世殊勝法説名為神彼能到此故名神足廣説乃至能得能證出世間法由出世法最勝自在是最勝神彼能證此故名神足廣説如彼辨體性者大小諸教皆用三摩地為體言諸根諸力者謂五根五力即信精進念定慧依俱舍論何緣信等先説為根後名為力由此五法依下上品分先後故又依可屈伏不可屈伏故依順正理云何緣信等立根力名以增上故難屈伏故何緣此五先説為根後名為力由此五法依下上品分先後故又依可屈伏不可屈伏故下品信等勢力劣故猶為所治同類屈伏上品翻此故得力名毗婆沙云勢用增上故名為根難可摧制故名為力依智度云耎智心得故名根利智心得故名力又云於知衆生根中得自在方便力故名為根五力增長能破煩惱度衆生得無生法忍是名為力復次天魔外道不能爼壞故名為力具説如彼依瑜伽論增上義故説名根難伏義故名力具如彼説顯揚雜集等意同瑜伽辨體性者大小諸教皆用信等五法為體言覺支者謂七覺支即念擇法精進喜安定捨覺支依婆沙云助如實覺故名覺支問覺支者是何義耶為能覺悟故名覺支為覺之支故名覺支有作是説是能覺悟故名覺支問若爾即應一是六非答六是覺支能隨順覺從勝而説亦名覺支復有説者是覺之支故名覺支問若爾即應六是一非答擇法是覺支亦是覺餘六是覺支而非是覺如正見是道亦正道支具説如彼順正理論意同婆沙依智度論云無學實覺此七事能到故名分又云修道用故名覺見道用故名道中邊論云此支助覺故名覺支由此覺支位在見道依瑜伽論云諸已證入正性離生補特伽羅如實覺慧用此為支故名覺支辨體性者大小諸教用慧精進念定喜受輕安行捨為體復有一類得八支正道相故得八支聖道能治所治故得八支聖道修故得八支聖道未生令生故得八支聖道生已堅住不忘倍修增廣故記別所解釋曰此即第三約八道支記別所解能治是八聖道所治是八邪餘同前釋言八支聖道者謂正見正思惟正語正業正命正精進正念正定毗婆沙云問言道支者是何義耶為能求趣故名道支為道之支故名道支有作是説此能求趣故名道支問若爾則應一是七非答七是道分能隨順道從勝而説亦名道支復有説者是道之支故名道支問若爾即應七是一非答正見是道亦道支餘是道支而非道如擇法是覺亦是覺支餘六是覺支而非覺智度論云得是諸安隱具足已欲入涅槃無為城故行是諸法是時名為道瑜伽論云問何因緣故名八支聖道答諸聖是覺已見迹者由八支攝行迹正道能無餘斷一切煩惱能於解脫究竟作證是故名為八支聖道辨體性者諸説不同若依俱舍六法為體正語業命同或故毗婆沙師七法為體身語二業不相雜故正理亦同毗婆沙論有三釋或説為六或説為七意同俱舍或説為八正命非正語業故依雜集論云道支自體者謂正見正思惟正語正業正命正精進正念正定如是八法名道支自體問七覺八道依何位説答依婆沙自有兩説一云見位八正道修位七覺支一云見道名覺支修道名八道許家正義前説為正依俱舍論亦有兩釋一説同婆沙一説七覺在見道八道通見修今依大乘智度論自有兩説同大婆沙雜集中邊七覺為見八道為修顯揚論説七覺在見八聖道中正見通於見修餘七唯修瑜伽七覺為見八聖道中正語業命唯立修道餘不別説廣辨道品義如別章世尊我見彼已便作是念此諸長老依有所得現觀各説種種相法記別所解釋曰自下第三述已所念於中有三初略述己念次重述己念後讚世尊德此即第一略述己念當知彼諸長老一切皆懷增上慢為增上慢所執持故於勝義諦遍一切一味相不能解了釋曰此即第二重述所念是故世尊甚奇乃至世尊善説釋曰自下第三讚世尊德於中有三初略讚善説次舉所讚教後顯非餘境此即初也謂世尊言勝義諦相微細最微細甚深最甚深難通達最難通達遍一切一味相釋曰此即第二舉所讚教微細等文已如上釋世尊此聖教中修行苾芻於勝義諦遍一切一味相尚難通達況諸外道釋曰此即第三顯非餘境謂諸二乘及諸外道不能通達遍一味相皆是此中起增上慢爾時世尊告尊者善現曰如是如是善現我於微細最微細甚深最甚深難通達最難通達遍一切一味相勝義諦現正等現覺等覺已為他宣説顯示開解施設照了釋曰此即第二即所讚德如汝所讚於微細等一味勝義自覺悟他又解初是總讚能自覺他後是別讚能自覺他讚自他覺重言如是何以故釋曰第二依徵廣釋先徵後釋此即徵也善現我已顯示於一切蘊中清淨所緣是勝義諦釋曰此即廣釋於中有三初法次喻後合法中有三初約清淨所緣顯一味相次善現修觀行下約三遍義以辨一味後善現如彼下即以離三過釋一味相就初段中先釋後結釋中復二初約清淨所緣顯勝義諦後此清淨下以清淨所緣顯一味相前中有二初約蘊上清淨所緣顯勝義諦後類處等清淨所緣是勝義諦此則初也一切蘊者五蘊非一故言一切或可漏無漏等非一故言一切此意説云於蘊等上有勝義諦亦名清淨所緣由緣此境得心清淨故是故顯揚十六卷云復次頌曰清淨之所緣常無有變異善性及樂性一切皆成就論曰由勝諦離一異性故當知即是清淨所緣何以故由緣此境得心清淨故具説如彼或可勝義即體離繫故名清淨問上經中未説此言如何説言我已顯示解云諸部般若及無量義中皆説真如也我已顯示於一切處緣起食諦界念住正斷神足根力覺支道支中清淨所緣是勝義諦釋曰此即第二釋類處等清淨所緣是勝義諦所以者何勝義諦理遍諸法故此清淨所緣於一切蘊中是一味相無別異相釋曰自下第二約清淨所緣顯一味相於中有二初約諸蘊釋一味相後類處等釋一味相此即第一約蘊上清淨所緣顯一味相於諸蘊上清淨所緣無別異相無別異義即一味故如於蘊中如是於一切處中乃至一切道支中是一味相無別異相釋曰此即第二類處等諸法一味是故善現由是道理當知勝義諦是遍一切味相釋曰此即第二結勝義諦是一味相謂由前所明蘊等法中清淨所緣勝義諦相無別道理故知勝義諦相即是遍一切善現修觀行苾芻通達一蘊真如勝義法無我性已更不尋求各別餘蘊諸處緣起食諦界念住正斷神足根力覺支道支真如勝義法無我性釋曰自下第二約三遍義以釋一味言三遍者謂真如勝義及法無我此三皆遍蘊等法中故説此三名為一味於中有二先釋後結釋中有二先反解後順釋此即初也謂勝義諦有衆多義依大般若有十二名謂真如法界法性不虗妄性不變異性平等性離生性法定法住實際虗空界不思議界如是乃至餘教所説不可具述今於此中且約三義以釋一味言真如者如成唯識第九卷云真謂真實顯非虗妄如謂如常表無變異謂此真實於一切位常如其性故曰真如即是湛然不虗妄義問豈不前説真勝義諦離諸名言如何於此説名真如解釋此難如成唯識第二卷説真如亦是假施設名遮撥為無故説為有遮執為有故説為空勿謂虗幻故説為實理非妄倒故名真如言勝義者勝謂勝智義即境義謂此真如二種勝智所緣境義故名勝義是故顯揚第十六云論曰此勝義諦當知即是圓成實性問何因緣故七種真如名勝義諦答由是二最勝智所行故謂出世智及後所得世間智由此勝義無戲論故非餘智境自餘別義如二諦章言法無我者如集論第三説何等無我相謂如我論者所立我相蘊界處非此相由蘊界處我相無故故名無我相雜集第八亦同此説問空與無我二種何別答諸教不同依俱舍論四説不同故第二十六云違我所見故空違我見故非我又云內離士夫故空不自在故非我又云於此無我故空自非我故非我又云為治我所見故修空行相為治我見故修非我行相大毗婆沙第七十九亦有兩説同俱舍初二釋順正理論第七十四云無主宰故空違我相故非我又云為治我所見故修空行相為治我見故修非我行相此同俱舍論第四釋依智度論第三十二云不見實是名空不見我是名無我依集論第三云何等空相謂若於是處此非有由此理正觀為空若於是處餘是有由此理如實如有是名善入空性於何處誰非有於蘊界處常恆凝住不變壞法我我所等非有由此理彼皆是空於何處誰餘有即此處無我性此無我性無我有性是謂空成實論第二十五云如法印經中説行者觀色無常空虗無常者謂色體性無常空虗者如瓶中無水名曰空瓶如是如是五蘊中無神我故名為空又聖行品云有二行空行無我行於五陰中不見衆生是名空行見五陰亦無是無我行也唯即隨此真如勝義無二智為依止故於遍一切一味相勝義諦審察趣證釋曰此即第二順釋一味釋此文諸説不同一云唯此皆是一蘊遮表異故説二言唯是遮遣遮餘蘊等此者表示此一蘊也此意説云唯此一蘊真如勝義及有無無二法無我境三種無分別智為依止故後所得智於彼一切一味相審察趣證故知真如是一味相一云無二智者人法二無我智餘如前説一云行者以三種無分別智為依止故即用此智於遍一切一味相中審察趣證餘如初説或可餘如前説上來總有三説一云唯此皆是一味真如亦有三釋準上應知一云唯謂一蘊此即真如亦有三釋準上應知如是上來總有九釋或可唯是真如此即一蘊亦有三釋準上應知雖有此釋文辭不便總釋意云前文遮求餘法勝義故名反解此文成立唯求一蘊故名順釋真諦三藏釋兩段經云前文釋通達三境後文釋審察趣證此三別者若依小乘三無漏根有差別故此即見修無學位差別故今依大乘地地皆有入住出分如其次第配屬應知是故善現由此道理當知勝義諦是遍一切一味相釋曰此即第二結文可知善現如彼諸蘊展轉異相如彼法處緣起食諦界念住正斷神足根力覺支道支展轉異相釋曰此下第三以離三過釋一味相即真如等離有因等三種過失故成一味於中有二先釋後結釋中有二初明蘊等展轉異相後辨真如無別異相此即初也文有二節初明諸蘊展轉異相後如彼下類處等展轉相異由此蘊等相別異故有三過失一者有因因所生故二者有為相所遷故三非勝義應更尋求非究竟故若一切法真如勝義法無我性亦異相者是即真如勝義法無我性亦應有因從因所生若從因生應是有為若是有為應非勝義若非勝義應更尋求餘勝義諦釋曰此下第二顯勝義諦無別異相於中有二初返顯勝義有三過失後善現下順釋勝義離三過失此即初也文有二節初牒異相後顯三失言三失者如前已説或可五失一應有因二從因生三應有為四非勝義五應求勝即準此文圓鏡智等從因生故是有為攝非勝義諦故親光等釋受用身即是無常生者必滅一向記故有説是常勘文如是等義第五卷中當廣分別善現由此真如勝義法無我性不名有因非因所生亦非有為是勝義諦得此勝義更不尋求餘勝義諦釋曰自下第二順釋勝義離三過失於中有二初正釋勝義離三過後唯有下以理重成此即初也謂若別異有三失故故知勝義唯是一味離三種失唯有常常時恆恆時如來出世若不出世諸法法性安立法界安住釋曰此即第二以理重成謂彼勝義一味真如唯常恆時如來出世若不出世一切諸法法性安立法界安住更無變異種種異相依解節經但説恆常乃至法性法界法住真諦解曰於道前位中先來本有故名為恆非佛出世方始有故道中後位此理無滅故稱為常佛出世後理無盡故法性者即自性住佛性約道前位能為菩提以作根本衆生由此得發心故法界者即引出佛性約道中位界名為諸行根本引出萬行故法住者即至得果佛性約道後位至涅槃法體常住故今依此本云常常時恆恆時者解云一味真如從本已來前時非一名常常時後時非一名恆恆時於如是時諸法法性安立法界安住然此法性安立法界安住自有二義準餘二本分為三種一諸法法性二安立法界三安立安住若準無性攝論第四分為二種一諸法法性安立二法界安住安住即是安立異名若依瑜伽分為三種謂法性法界法住安住即是法性故第十卷云是諸緣起無始時來理成就性是名法性如成就性以無顛倒文句安立是名法住由此法住以彼法性為因是故説彼名為法界解云瑜伽舉彼緣起顯彼理性或可彼論即説緣起有此三句非顯彼性然釋三句其理無別是故善現由此道理當知勝義諦是遍一切一味相釋曰是第二結文應知善現譬如種種非一品類異相色中虗空無相無別無變異遍一切一味相釋曰第二舉喻重説言種種非一品類者凡論色蘊有其三種一者四大及所造相二者有見有對無見有對無見無對三句差別之相三者變壞謂前二種皆有變壞名變壞相具此三種故言種種非一品類或云異相也然虗空中無能所造相故名無相無有有見有對色等種種差別故名無分別分別即是差別異名解節經云無差別故亦無變壞名無變異具此三義名一味相如是異性異相一切法中勝義諦遍一切一味相當知亦爾釋曰第三舉法同喻言異性相者即自相差別故深密云自相差別此意説云一切諸法皆有二相一者自性二者差別而勝義中無一切法自相差別故名一味故佛地經云譬如虗空雖遍諸色種種相中而不可説有種種相體唯一味如是如來清淨法界雖復遍至種種相類所知境界而不可説有種種相體唯一味佛地論第五依他起性同皈真如圓成實性故名一味又遍計所執所顯真如無差別故名為一味爾時世尊欲重宣此義而説頌曰釋曰自下第二舉頌略説於中有二初發起頌文後舉頌略説此即初也此遍一切一味相勝義諸佛説無異若有於中異分別彼定愚癡依上慢釋曰自下第二以頌略説於中有二初有半頌舉佛同説讚一味相後二句辨愚異執顯理甚深前中上句頌一味相遍諸蘊等下句明其勝義諸佛同説或可勝義諸佛説無異者無異即是一味義也下半頌中前句辨異計後句計所依然此頌中依解節經更有一頌及奉持長行應非正本所以爾者唐本深密皆無後頌又後奉持真諦自云後去流通非此品內乃是攝最後流通文安此未了前序亦然抄經前序安第一品也今判此釋亦不順經經末奉持曼殊室利以為後故深密頌云如來應説法見別是憍慢解節經有其二頌法通相一味一切一味相不離第一義是人增上慢逆生死流通微細深難見諸佛説平等若於中執異欲染癡覆故凡夫不能得解深密經心意識相品第三將釋此品略有二義一釋品名二正釋文言心意識相品者心意識名有通有別如成唯識第五卷云謂薄伽梵處處經中説心意識三種別義集起名心思量名意了別名識是三別義如是三義雖通八識而隨勝顯第八名心集諸法種起諸法故第七名意緣第八識恆審思量為我等故餘六名識於六別境粗動間斷了別轉故相謂體相或是相狀品義如前雖有二門此品宗明通名三義於中就勝故説第八或可此中別名三義雖有兩釋前説為勝是故題云心意識相品爾時廣慧菩薩摩訶薩白佛言世尊如世尊説於心意識祕密善巧菩薩釋曰就所觀境自有二種一者勝義二者世俗上來已釋勝義諦訖自下第二辨世俗諦於中有二初長行廣釋後以頌略説前中有二先問後答問中有二初舉所問教後依教發問此即初也言廣慧菩薩者從慧立名真諦記云廣慧對佛説法之人一切菩薩無不具此廣慧之德但此中從廣慧法門立名佛地論云深廣圓滿善通達故名為廣慧智度論云道俗種種經書論議無不悉知名為廣慧瑜伽論云謂即此慧無量無邊所行境故名為廣慧謂世尊説於心意識祕密義中如實了知名善巧菩薩於心意識祕密善巧菩薩者齊何名為於心意識祕密善巧菩薩如來齊何施設彼為於心意識祕密善巧菩薩説是語已釋曰此即第二依教發問文有二節初牒所問教後齊何下正設問辭問有二意初齊何名為於心意識祕密善巧菩薩者問菩薩位即是教所説義後如來齊何施設彼為於心意識祕密善巧菩薩者問如來依何菩薩施設彼教施設彼教施設即是宣説之義爾時世尊告廣慧菩薩摩訶薩曰善哉善哉釋曰此下第二依問正答於中有二初讚問許説後廣慧當知下對問正答前中有二初讚其所問後敕聽許説前中有二先總後別此即初也所問深義能益復廣是故重讚善哉善哉十地論第一云善哉者所説法中善具足故瑜伽八十三云善哉者是諸賢聖所稱讚故九十八亦同大智度論四十一云善哉善哉者讚德之美也又智度論六十六云言必可信能問於佛斷大衆疑能大利益故言善哉無上依經第一卷云若有煩惱不能染著是名善哉廣慧汝今乃能請問如來如是深義釋曰自下別讚於中有二初讚問勝義後讚問有益此即初也汝今為欲利益安樂無量衆生哀愍世間及諸天人阿素落等為令獲得義利安樂故發斯問釋曰自下第二讚問有益文有兩節初明總益後哀愍下明別利益言利益安樂者如佛地論第一卷云現益名樂當益名利世間名樂出世名利離惡名樂攝善名利福德名樂智慧名利無性攝論第七亦有七對大同佛地第一若依佛地第七有其五對故彼論云謂淨法界及妙智皆能安立一切衆生利益安樂令修善因名為利益令得樂果名為安樂又令離惡名為利益令其攝善名為安樂又拔其苦名為利益施與其樂名為安樂此世他世世出世等應知亦爾解云利益安樂與第一卷相違應知言哀愍等者明其利益自有二種言世間者五蘊世間成人之法人天等者蘊所成人謂五蘊假者依智度論有三世間一器世間二五蘊世間三衆生世間今於此中辨教所益是故但説五蘊衆生或可所益諸衆名為世間領解衆首名天人等問豈不頌言我於凡愚不開演如何此云哀愍世間及天人等答説教所為有其多義若為令離惡修善通為有性無性故説若為趣無上正等菩提但為菩薩種姓不定者説汝應諦聽吾當為汝説心意識祕密之義釋曰此即第二敕聽許説言諦聽者依功德施波若論云諦聽者心專一境瑜伽八十三云言諦聽者謂如是相法勸令審聽廣慧當知於六趣生死彼彼有情衆中或在卵生或在胎生或在濕生或在化生身分生起釋曰自下第二對問正答此心意識即是八識故今先辨八識差別後方正釋心意識義八識差別略辨六義一種數多少二釋名字三出體性四所依根五所緣境六心所相應言種數者諸聲聞藏但説六識而無七八具如諸教今依大乘自有兩釋一龍猛等但説六識是故清辨菩薩所造中觀心論入真甘露品云離六識外無別阿賴耶識眼等六識所不攝故猶如空華故知彼宗唯立六識二彌勒宗依金光明等具立八識然依此宗西方諸師有其三説一菩提留支唯識論云立二種心一法性心真如為體此即真如心之性故名之為心而非能緣二相應心與信貪等心所相應解云唯釋意之性故識之性故亦名意識於理無違二真諦三藏依決定藏論立九識義如九識品説言九識者眼等六識大同識論第七阿陀那此云執持執持第八為我我所唯煩惱障而無法執定不成佛第八阿梨耶識自有三種一解性梨耶有成佛義二果報梨耶緣十八界故中邊分別偈云根塵我及識本識生似彼依彼論等説第八識緣十八界三染汙阿梨耶緣真如境起四種謗即是法執而非人執依安慧宗作如是説第九阿摩羅識此云無垢識真如為體於一真如有其二義一所緣境名為真如及實際等二能緣義名無垢識亦名本覺具如九識章引決定藏論九識品中説三大唐三藏依楞伽等及護法宗唯立八識不説第九破清辨云所立量中便有自教相違之失楞伽等經皆説第八阿賴耶故問若爾如何大品經等唯説六識護法會釋如成唯識第五卷説然有經中説六識者應知彼是隨轉理門或隨所依六根説六而識類別實有八種問豈不龍猛唯立六耶解云據實龍猛等信有七八位在極喜大菩薩故而彼論中説六識者述大品經等意故不相違真諦師説九種識中後之三識皆有多失且如第七有二種失一阿陀那者第八異名而非第七故此經等説第八識名阿陀那二義相違所謂唯煩惱障便違此經八地已上有染末那或不成佛違莊嚴論等轉八識成四智義也第八賴耶能起法執或云緣十八界皆不應理心所法中無明無明數如何得與法執俱起又新翻辨中邊論云頌曰識生變似義有情我及了此境實非有境無故識無長行釋云論云變似義者謂似色等諸境性現變似有情者謂似自他身五根性現變似我者謂染末那與我癡等恆相應故變似了者謂餘六識了相粗故具説如彼故知第八不緣心等若廣分別如成唯識也又真諦云阿摩羅識反照自體無教可憑復違如來功德莊嚴經彼云如來無垢識是淨無漏界解脫一切障圓鏡智相應準經可知無垢識者即是淨分第八識也又決定藏論即是瑜伽彼論本無九識品也言釋名者先通後別言八識者是其通名八謂標數識即了別通性及相簡唯六識故言八識即六釋中帶數釋也言名別者眼等六識皆依主釋謂依眼之識名為眼識乃至依意之識名為意識第七末那此云意如成唯識恆審思勝餘識故若依此釋意即識故名為意識是持業釋八阿賴耶此云藏識具有能藏所藏執藏義故此即如次果於因中藏因於果中藏境於執中藏具如成唯識論及攝大乘此亦持業藏即識故言體性者且依三義一約三性二約三科三依法數若依三性分別八識一一此通三性攝妄皈真皆真如故託因緣起皆名依他隨執情有是所執性故唯識第九卷云謂唯識性略有二種一者虗妄謂遍計所執二者真實謂圓成實復有二性一者世俗謂依他起二者勝義謂圓成實三科出體五蘊門中八識皆用識蘊為體十二處中皆意處攝皆有無間滅依義故十八界中前五種識一一皆用自識界及意界一分為體第六七八三識一一皆用意識及意界少分以為自性辨所依者八識所依各有三種一因緣依謂能親生八識種子故成唯識第四卷云一因緣依謂自種子諸有為法皆託此依離自因緣必不生故二開導依謂前念滅自類八識各望後念為開導依故唯識云三等無間緣依謂前滅意諸心心所皆託此依離開導根必不轉故三俱有依然俱有依諸識不同眼等五識各有四依一同境根謂眼等五根各望自識二分別根謂五識俱同緣意識三染淨根謂第七末那四根本依謂第八識故唯識云由此五識俱有所依定有四種謂五色根六七八識隨闕一種必不轉故同境分別染淨根本所依別故第六意識俱有所依唯有二種故唯識云第六意識俱有所依唯有二種謂七八識隨闕一種必不轉故第七末那俱有所依唯有一種故唯識云第七意識俱有所依但有一種謂第八識藏識若無必不轉故第八賴耶俱有所依亦唯一種故唯識云阿賴耶識俱有所依亦但一種謂第七識彼識若無定不轉故論説藏識恆與末那俱時轉故解云八識所依有漏無漏無有差別顯所緣者有其四種一五識所緣二意識所緣三末那所緣四阿賴耶境一一門中先辨有漏後顯無漏有漏五識於五境中各唯緣一謂眼識緣色乃至身識緣觸唯是現量若無漏位依成唯識論第十卷有兩師義故彼云成所作智相應心品有義但緣五種現境莊嚴論説如來五根一一皆於五境故轉有義亦能通緣三世諸法佛地論説成所作智起三業諸變化事決擇有情心行差別領受去來現在等義亦唯現量不通真智有漏意識遍緣十八界諸論皆同通量非量或現或比若已轉依亦遍緣諸法故唯識云妙觀察智相應心品緣一切法自相共相皆無障礙唯是現量通真俗智有漏第七唯緣第八賴耶見分執為我法諸論悉同唯是非量無漏末那依唯識論三釋不同故彼云平等性智相應心品有義但緣第八淨識如染末那緣藏識故有義但緣真如為境緣一切法平等性故有義遍緣真俗為境佛地經説平等性智證得十種平等性故莊嚴論説緣諸有情自他平等隨他勝解示現無邊佛影像故唯是現量通真俗智有漏賴耶所緣境諸論不同若依瑜伽五十一唯説二種故彼云謂若略説阿賴耶識由於二種所緣境轉一由了別內執受故二由了別外無分別器相故若依成唯識第二卷前文緣三種境謂外器世間有漏種子及有根身若依唯識第二後文緣四種境前三之外更加法處實色故彼云略説此識所變境者謂有漏種十有色處及隨法處所現實色唯是現量問何故此識不緣心等解云如唯識第二卷云異熟識變必有實用若變心等便無實用相分心等不能緣故變無為等亦無實用故異熟識不緣心等無漏第八依唯識論第十有兩師義故彼云大圓鏡智相應心品有義但緣真如為境是無分別非後得智行相所緣不可知故有義此品緣一切法莊嚴論説大圓鏡智於一切境不愚迷故佛地經説如來智鏡諸處境識衆像現故又此決定緣無漏種及身土等諸影像故亦唯現量通真俗智八識緣假實實境有為無為三世等別廣如唯識論等説言心所相應者依唯識論護法正義於五十一心所法中有漏五識各與三十四心所相應謂遍行五別境五善有十一根本惑三謂貪瞋癡隨惑有十謂中二大八然善十一中有兩師義故唯識第六云有義五識唯有十種自性散亂無輕安故有義五識亦有輕安定所引善者亦有調暢故成所作智俱必有輕安故無餘心所如論廣説有漏意識與五十一心所相應諸論共同亦無異義有漏末那護法正義唯與十八心所相應故成唯識第四云然此意俱心所十八謂九法八隨煩惱并別境中慧解云前九法者謂遍行五及四煩惱四煩惱者謂我知我見我慢我愛無別心法義如論説有漏賴耶唯與五種遍行相應故論頌云觸作意受想思相應無餘心所具如論説無漏八識皆二十一心所相應謂遍行五別境五善有十一於中別者妙觀察智因位亦得尋伺相應於藥病等未自在故若至佛果尋伺即無無思成事故若廣分別具如諸論心意識義具如別章就釋文中文別有二初明心意識祕密之義後廣慧如是下辨祕密善巧答前兩問前中有二初明第八衆名差別後廣慧阿陀那識下明諸識俱轉差別前中有四一釋種子識二辨阿陀那三明阿賴耶四顯心名此即第一釋一切種子識一切種子即三習氣此中意説由第八識攝持三種習氣結生相續故成唯識第八卷云復次生死相續由諸習氣然諸習氣總有三種一名言習氣二我執習氣三有支習氣其種子識自有二種一識所持種名種子識二能持種識名為種識雖有二種今此正明能持種識身分生時執持所依及種子故彼所持種即三習氣故今略辨三種習氣然三習氣略以四門分別一釋名字二出體性三生果差別四四緣分別第一釋名有通有別三習氣者是其通名三是標數言習氣者説名言等名之為習第八中種習之氣分故名習氣即六釋中帶數釋也言別名者如成唯識然諸習氣總有三種一名言習氣謂有為法各別親種名言有二一表義名言即能詮義音聲差別二顯境名言即能了境心心所法如其次第舊云言説名思惟名也二我執習氣謂虗妄執我我所種我執有二一俱生我執即修所斷我我所執二分別我執即見所斷我我所執隨二我執所熏成種令有情等自他差別三有支習氣謂招三界異熟業種有支有二種一有漏善即是能招可愛果種二諸不善即是能招非愛果報解云三習氣相如論應知三種習氣皆依主釋謂名言習之氣種子故乃至有支習之氣種子故言出體者如前所説隨二名言所熏種子為名言習氣二種我見所熏成種為我見習氣乃至由善惡業所熏種子為有支習氣種現分別唯種非現三果出體名言習氣五蘊門中一分種子五蘊以為自性除無漏種種隨所生同蘊攝故處界門中一分十二處種十八界種以為自性除無漏種準蘊應知我見習氣五蘊門中行蘊一分所攝處界門中法處法界少分為體有支習氣五蘊門中色行二蘊以身語業是色蘊故意思業種行蘊攝故處界門中色處聲處法處色界聲界法界一分為體法數出體名言習氣百法門中通用百法種子為體影像百法皆熏種故我見習氣用別境中慧及十煩惱中薩迦耶見以為自性有支習氣十一色中色聲二法及心所中思為自性意思業故言出果者有其二義一依成唯識通約諸法以明生果二依攝論就十一識以辨生果言通約諸法以明生果者名言習氣通生百法而差別者九十四法本質及影皆名言生六種無為本影不同本質六種不從種生圓成無為無生義故影像六種從名言起依他無為據實有為託因生故故唯識論云名言習氣謂有為法各別親種問有為法中實法有體可言種生不相應等既無實體如何因起解云據實假法不從種生故成唯識論第二卷云假法如無非因緣故解云假法既非因緣義唯假法亦非所生然以假從實説為假種從因緣生故唯識論第二卷云名相分別三種習氣我見習氣能生自他身中百法差別有支習氣能生百法善惡趣別無為假法準前應思言就十一識辨生果者如攝大乘論第四卷云此中若身身者受者識彼所受識彼能受識世識數識處識言説識此由名言熏習種子若自他差別識此由我見熏習種子若善趣惡趣死生識此由有分熏習種子廣如彼釋言四緣分別者名言習氣是正因緣餘二習氣增上緣故成唯識第八卷云隨二名言所熏成種作有為法各別因緣又彼復云應知我執有支習氣於差別果是增上緣若廣分別成唯識論第八疏就種識中文別有二初約趣生略明身分生起後於中下依種子識廣辨受生差別此即初也言六趣者如下經説那落迦傍生餓鬼天阿素洛人然此六趣諸宗不同依薩婆多宗唯立五趣故大婆娑第一百七十二云如契經説五趣謂那落迦傍生餓鬼人天又云謂有餘部立阿素洛為第六趣彼不應作是説契經唯説有五趣故廣説如彼問若爾阿素洛何趣所攝答婆沙有二説一云天趣評家正義鬼趣所攝正理二十一俱舍第八大同婆沙依經部宗唯立五趣故成實論第十四云業有六種謂五趣業及不定業今依大乘有處唯五如佛地經及維摩等問若爾阿素洛何趣所攝答依佛地經第六卷云諸阿素落種類不定或天或鬼或復傍生故不別説有處説六如即此經及法華經等或有處説或五或六若依瑜伽立五為正故第四云又諸非天當知天趣所攝然由意思多懷詐約諂誑多故不如諸天為淨法器由此因緣有諸經中説為別趣實是天趣又第二云如是安立世界成已於中五趣可得謂那落伽傍生餓鬼人天依智度論立六為正故第三十云又摩訶衍中法華經説有六趣衆生觀諸義意應有六道復次分別善惡故有六道善有上中下故有三善道天人阿修羅惡有上中下故有地獄畜生餓鬼道廣説如彼又第十云佛不分明説有五道説五道者是一切有部僧所説婆嗟弗姡路部僧説有六道復次應有六道何以故三惡道一向是罪處若福多罪少是名阿修羅生處應別以是故應言六趣問琰摩王何趣所攝答依大婆沙鬼趣所攝故彼一百七十二云施設論説如今時鬼世界王名琰摩又云贍部洲下五百踰繕那有琰摩王界是一切鬼本所住處從彼流轉亦在餘處若依瑜伽地獄趣攝故第二云隨一有情由感雜染增上業生在那落迦中作靜息王言卵胎濕化生者即是四生瑜伽第二云云何卵生謂諸有情破㲉而出彼復云何如鵝鴈孔鸚鵡舍利鳥等云何胎生謂諸有情胎所纏裹部胎而出彼復云何如象馬牛驢等云何濕生謂諸有情隨因一種濕氣而生彼復云何如蟲蝎飛蛾等云何化生謂諸有情業增上故具足六處而生或復不具彼復云何如天那落迦全及人鬼傍生一分若廣分別如毗曇第八顯宗十二俱舍第八順正理二十二婆沙一百二十問前説六趣何故復説四種生耶答俱舍第八云施設足論作如是説四生攝五趣非五攝四生不攝者何所謂中有由是道理天等六趣攝生不盡故復重説卵等四生問若爾何故更説六趣答欲顯善惡受生差別故説六趣問若爾何故不説界耶答界通非情故此不説真諦三藏亦同此意六趣四生義如別章然釋此文有其兩解一云於六趣生死彼彼有情者明所捨身墮彼彼有情衆中者辨所受身所受身中自有二類一六趣身二四生身若依此釋身分生起通前二類一云所受身者皆是四生墮彼彼有情衆中是其總因或有卵生等者別顯四生故金剛仙論云卵生等者受生差別有色等者粗細差別若依此説身分生起依四生説於中最初一切種子心識成熟展轉和合增長廣大釋曰自下第二約種子識廣辨受生差別於中有二初明受生分位差別復明種依二執受此即初也文有三節初明種識成熟次展轉和合三增長廣大言於中最初一切種子心識成熟者此明種識成熟謂於此趣生受生位中最初結生一切種子心識成熟初結生時種識成熟成羯羅監名為結生故瑜伽論第一卷云爾時父母貪愛俱極最後決定各出一滴濃厚精血二滴和合住母胎中合為一段猶如熟乳凝結之時當於此處一切種子異熟所攝執受所依阿賴耶識和合依託謂此出濃厚精血成合一段與顛倒緣中有俱滅同時即由一切種子識功能力故有餘微細根及大種和合而生及餘有根同分精血和合轉生於此時中説識已住結生續即此名為羯羅藍位此羯羅藍中有諸根大種唯與身根及根所依處大種俱生即由此身根俱生諸根大種力故眼等諸根次第當生又由此身根俱生根所依處大種力故諸根依處次第當生由彼諸根及所依處具足生故名得圓滿依止成熟乃至彼云羯羅藍識最初託處即名肉心如是識此處最初託即從此處最後捨依俱舍論第九云有言精血即成根依謂前無根中有俱滅後有根者無間續生又云有餘師云別生大種如依葉糞別有蟲生瑜伽所説同初師釋若依順正理二十四取後説為正廣如彼説言展轉和合者此有兩釋一云初受生之時以識為緣根大種等展轉和合故瑜伽第一卷云即由一切種子識功能力故有餘微細根及大種和合而生等一云識與羯羅藍展轉和合故攝大乘論云於母胎中識羯羅藍更相和合無性釋論第三云異熟與其赤白同一安危世親釋論意同無性梁朝攝論第三云論云是識託柯羅邏於母胎中變合受生釋曰是識即是意識於一時中與柯羅邏相應故言託柯羅邏此果報識異前染汙識故言變由宿業功能起風和合赤白令與識同言合即名此為受生言增長廣大者亦有兩釋一云由前展轉和合力故羯羅藍等漸增長位根大種等增長廣大一云由和合故名色漸漸增長廣大故瑜伽第二云又羯羅藍漸增長時名之與色平等增長俱漸廣大如是增長乃至依止圓滿應知此中由地界故依止造色漸漸增廣由水界攝持故由火界成熟故令其堅梗由無閏故由風界故分別支節各安其所若分位者有二種位一者胎藏八位二者通相八位胎藏八位謂羯羅藍等故雜集第六云自此已後根漸生長如緣起説故列頌云最初羯羅藍次生遏部曇從此生閉尸閉尸生鍵南次鉢羅賖佉後髮毛爪等及色根形相漸漸而生長又瑜伽第二云復次此胎藏八位差別何等為八謂羯羅藍位遏部曇位閉尸位鍵南位鉢羅賖佉位髮毛爪位根位形位若已結凝箭內稀名羯羅藍若表裏如酪未至肉位名遏部曇若已成肉仍極柔暖名閉尸若已堅厚稍勘摩觸名為鍵南即此肉團增長支分相現名鉢羅賖佉從此以後髮毛爪現即名此位從此以後眼等生名為根位從此以後彼所依處分別顯現名為形位大唐三藏云羯羅藍此云和合頞部曇此云胞閏尸此云凝血鍵南此云堅厚鉢羅奢佉此云支分鉢羅此云分奢佉此云支真諦三藏云本識與父母遺體和合名為受生於胎藏中略有五位一者柯羅邏翻為凝滑識與父母精血和合如薄酪即執為根爾時名為初受生二者第二七日名頞呼陀翻為胎結始有一胎結在凝滑中如凝蘇在白酪乳中三者第三七日名閉尸翻為肉團男則上闊下狹女則下闊上狹肉猶少軟四者第四七日名伽訶那翻為堅實爾時肉團始堅強五者第五七日名彼羅捨佉翻為枝枝爾時始有頭足手腳等相貌方有業風吹破開九孔生大苦受次後以去則有斤肉骨髮爪等梁攝論疏第五卷説問羯羅藍等八位經幾許時方得圓滿答如瑜伽論第二卷説彼云又於胎中經三十八七日此之胎藏一切支分皆悉具足從此以後復經四日方乃出生如薄伽梵於入胎經廣説此説極滿足者或經九月或復過此若經八月此名圓滿非極圓滿若經七月六月不名圓滿或復缺減五王經云何謂生苦人死之時不知精神趣向何道未得生處普受中陰之形至其三七日中父母和合便來受胎一七日如薄酪二七日如稠酪三七日如凝蘇四七日如肉團五皰成熟巧風入腹吹其身體六情開張在胎中生藏之下熟藏之上母噉一杯熱食灌其身體如入鑊湯母飲一杯冷水亦如寒氷切身母飽之時迫迄身體痛不可言母飢之時腹中了𠄏亦如倒懸受苦無量至月滿欲生之時頭向産門劇如兩石挾山欲生之時母危父怖生墮草上身體細軟草觸其身如履刀劒忽然失聲大呼此是大苦又大集經二十五云云何名為觀於生苦從業因緣父母和合初受意識歌羅羅時其身猶如亭歷子許是時未有入出氣息乃至云歌羅羅時住六七日六七日轉名頞浮陀是時形色猶如小來住七七日轉名伽那是時形色如胡桃㲉住八七日轉名閉尸形色猶頻婆羅果是時身邊有五胞出謂頭手腳十三七日始有腹相二十七日男女根別二十一七日始生骨節乃至三十六七日其身具足血肉毛根三十八七日具足身枝四日夜住在胎中臰穢之處爾時還憶本生之事憶己愁苦作是念言若我出胎當修善法願後更莫生如是處修不放逸遠離受生始出母胎爾時舉身受迫迮苦外風觸手身亦復受苦身初至地以水摩洗復受大苦猶如地獄爾時還失憶宿命事生已復有老病死隨逐不捨具説如彼若廣分別如解脫道論第七卷及入胎經説通相八位者如瑜伽第二云云何八位謂處胎位出生位嬰孩位童子位少年位中年位老年位耄熟位處胎位者謂羯羅藍等出生位者謂從此後乃至耄熟嬰孩位者謂乃至未能遊行嬉戲童子位者謂能為彼事少年位者謂能受用欲塵乃至三十中年位者謂從此位乃至五十老年位者謂從此位乃至七十從此已上名耄熟位依二執受釋曰第二種識依二執受於中有三初標章舉數次依數列名後約界分別此即初也上來已辨根等依識生起增長此下明識依色根等一者有色諸根及所依執受二相名分別言説戲論習氣執受釋曰此即第二依數列名謂受生位有異熟識執受二種為所緣境一者執受五根及彼所依色香味觸為所依止二者執相名分別三法習氣為所緣境除無漏種非所緣故此所攝受皆是所緣是故瑜伽五十一云謂若略説阿賴耶識由於二種所緣境轉一由了別內執受故二由了外無分別器相故了別內執受者謂能了別遍計所執自性妄執習氣及諸色根根所依處此於有色界若在無色唯習氣執受了別了別外無分別器相者謂能了別依止緣內執受阿賴耶識故於一切時無有間斷器世間相譬如燈焰生時內執膏炷外發光明如是阿賴耶識緣內執受緣外器相生起道理應知亦爾又成唯識第二卷云賴耶所緣有其三種一器世間二有漏種三有根身阿賴耶識因緣力故自體生時內變為種及有根身外變為器即以所變為自所緣行相杖之而得起故廣説如彼此中所説執受義者是能執受執受五根及彼所依令不損壞為自所依攝受種子為自所有亦名所依然此執受諸教不同俱舍第二云十八界中九不受餘二彼約一義釋執受故彼云有執受此言何義心心所法共所執持攝為依處名為執受損益展轉更相隨故乃至廣説正理第四有三師釋一同俱舍正理釋云若爾色等即應一向名無執受心心所法不依彼故非根性故不爾色等若不離根雖非所依而是心等之所親附故無有失二毗婆沙師説若諸色法逼迫斷壞便能生苦與此相違即能生樂是己身攝名有執受三有餘師説若諸有情執為自體一切處時方便防護乃至廣説若爾應違契經所説故契經云若於此處識所執藏識所隨攝名有執受雖有是説而不相違有執受法略有二種一者有愛乃有身見執為己有名有執受若淨智生即便斷滅二者為因能生苦樂至般涅槃隨轉不捨是為經論各據一義解云經約有愛身見執為己有名有執受論有三釋初師意説執為依處次師意説能生苦樂後師意説執為自體並符本論己身所攝名有執受即當為因生苦樂義然第二師唯生苦樂初後兩師兼取餘義經論合説總有四釋具説如彼若依毗婆沙第一百四十八執受納息六教不同恐繁不述今依大乘三説不同或有唯約生苦樂故名為執受故集論云五色界全四界一分名有執受即既不説聲故知唯約生苦樂故名執受也或有唯約攝為自體名有執受如瑜伽五十一等云若無第八依止執受不可得故又五十六復云五執非執受所餘一向非執受準此等文唯約攝為自體明執受也或有通約二義以明執受如五十三云識執不執者若識依執名執受色此復云何謂識所託安危事同和合生長又此為依能生諸受與此相違非執受攝又瑜伽論第一百云執受法者謂色法為心心所執持由託彼故心心所轉安危事同同安危者由心心所住持力故其色不斷不壞不爛即由如是所執受色或棄損或時攝益其心心所亦隨損益與此相違名非執受今此經中説執受者且依二義一者賴耶執根依處為自所依二者執持種子為自所攝具如諸論有色界中具二執受無色界中不具二種釋曰此即第三約界分別即準此文依大乘宗無色界中無眼耳等十種色界非如摩訶僧祇部説具十色及五識身而本業經無色諸天來入會中法華經中間有頂香如此等文皆依法處所攝色説廣慧此識亦名阿陀那識何以故由此識於身隨逐執持故釋曰此即第二釋阿陀那識梵云阿陀那此翻名執持謂由此識隨逐於身執受色根令不失壞故説此識名為執持依攝大乘有其二義釋阿陀那一執受色根令不壞故二執受自體取彼生故如彼第一具廣分別依成唯識具有三義故第三云以能執持諸法種子及能執受色根依處亦能執取結生相續故説此識名阿陀那此當二論所説執受亦名阿賴耶識何以故由此識於身攝受藏隱同安危義故釋曰此即第三解阿賴耶梵云阿賴耶此翻名藏藏有三義一者能藏二者所藏三者執藏故成唯識第二卷云此識具有能藏所藏執藏義故為與雜染互為緣故有情執為自內我故攝論第一亦辨三義故彼論云復何緣故此識亦名阿賴耶一切有生雜染品法於此攝藏為果性故又即此識於彼攝藏為自性故或諸有情攝藏此識為自我故説名阿賴耶識解云藏義三種別者第一能藏此即果法於因中藏謂識中種生現七識染果不離能生因故第二所藏此即因種於果中藏謂所熏種藏在能熏七現識中成因性故第三我愛所執藏義此即境於能執中藏今依此經不同諸論謂由此識於有根身能攝受彼為所依止於彼藏隱與所依身同安危故此即現識藏所依中故名為藏於所藏中一分之義故深密云於彼身中住者故一體相應故住者即此攝受藏隱一體相應同安危義亦名為心何以故由此識色聲香味觸等積集滋長故釋曰此即第四釋其心義梵音質多此翻為心有其多義一名集起集諸法種起諸法故如成唯識第五卷説二名積集有其二義一諸法種子所積集故如攝論第一由種種法熏習種子所積集故二外六境界積集滋長故三名採集採集種種所緣境故如深密經及五蘊論今依此經依第二義故名為心此有二義一者積集二者滋長由色等境之所積集及滋長故若依成唯識論第三卷有七種名此經四名外更加三名三名者何如彼論云或名所知依能與染淨所知諸法為依止故釋如攝論十殊勝中第一殊勝名所知依世親釋云所應可知故名所知所謂雜染清淨諸法即三自性依是因義無性釋云所應可知故名所知依謂所依此所依聲簡取能依雜染清淨諸有為法不取無為由彼無所依義故所依即是阿賴耶識是彼因故能列彼故如其所應解云世親菩薩許第八識通與三性為所依止無性菩薩唯與依他起性為依不與遍計圓成為依是彼因故者與染分依他為依能列彼故者與淨分依他為依問如何兩論有此相違解云世親約通依故通三性無性唯約親依故依他各據一義亦不相違或名異熟識能引生死善不善業異熟果故解云異熟有三一轉變而熟故名異熟二異時而熟故名異熟三異類而熟因是善惡果唯無記故云異熟三中唯取第三異類以前二名通餘果故或名無垢識最極清淨諸無漏法所依止故解云梵音阿末羅識此云無垢識即妙覺位大圓鏡智相應心體名無垢識最極清淨諸智定等無漏道法為依止故故如來功德莊嚴經云如來無垢識是淨無漏界解脫一切鄣圓鏡智相應廣如唯識疏第三卷説廣慧阿陀那識為依止為建立故六識身轉謂眼識耳鼻舌身意識釋曰自下第二明諸識俱轉差別於中有三初法次喻後合前中有二初阿陀那與六識俱轉後廣慧若於下明意識對五俱轉多少初舉本末以辨俱轉後以意對五明其俱轉然瑜伽等且約初義以辨俱轉此中應説末那俱轉而不説者舉初舉後準可知故略而不説故瑜伽等通約末那以辨俱轉前中有二初總標俱轉後逐難重釋此即初也以阿陀那為依止故六識身轉謂眼識等此中有識眼及色為緣生眼識與眼識俱轉隨行同時同境有分別意識轉釋曰自下第二逐難重釋於中有二初明眼識必意識俱後明四識與意識俱此即初也言此中者依理門説有其二義一起論端義二簡持義上來總言諸識俱轉而未分別五必依意意不依五為欲發起如是義端故言此中又於俱轉含有多義不可頓説簡餘諸義持取此義故言此中言有識眼者謂眼二種一有識眼名同分眼二無識眼名彼同分簡彼同分名有識眼然此同分及彼同分諸教不同一薩婆多依十八界以釋同分彼同分義謂十八界有業用者名為同分若無業用名彼同分故俱舍論第二卷云十八界中幾是同分幾彼同分頌曰法同分餘二作不作自業論曰謂一法界唯是同分謂諸聖者二念已去無我觀智緣一切法無不同遍是故法界恆名同分雜心釋云一切法界意識境故大婆沙云以無有法非三世攝意識境故具説如彼問十七界意識所緣應皆同分無彼同分答十七界不依意識立為同分及彼同分但依各別根境相對色色對眼乃至身對觸觸對身問若爾意界及意識界唯應對法界立同分彼同分是則緣餘十七界者應非同分答理應如是然以意界及意識界能遍了一切法故依自作用立為同分如眼等根有見等用必不立為彼同分故有餘師説法界總攝一切法盡以十七界亦名法故彼不應作是説法名雖通而法界別故由此前説於理為善解云準此薩婆多宗通一切法非法界攝謂餘十七界皆有同分及彼同分何名同分彼同分耶謂依自業不作自業若作自業名為同分不作自業名彼同分此中眼界已正當見名同分眼如是廣説乃至意界皆各於自界應説自用迦濕彌羅國毗婆沙師説彼同分眼但有四種謂不見色已正當滅及不生法西方諸師説有五種謂不生法復開為二一有識屬二無識屬乃至身界應知亦然意彼同分唯不生法解云準此羅漢最後蘊同分意界約能緣義説為同分不爾如何説為同分色界為眼已正當見名同分色彼同分色亦有四種乃至觸界亦爾各對自根應説自用應知同分及彼同分眼若於一是同分於餘一切亦同分彼同分眼如是廣説乃至意界亦爾雜心亦爾若依婆沙有其三釋初師説同俱舍等有作是説諸見色眼於自有情名同分眼於餘有情名彼同分眼諸不見色眼於自有情名彼同分眼於餘有情亦名彼同分眼復有説者諸見色眼於自有情名同分眼於餘有情非同分亦非彼同分諸不見色眼於自有情名彼同分眼於餘有情非同分眼亦非彼同分彼不應作是説云何有眼而非同分亦非彼同分應作是説於三説中初説應理具説如彼又俱舍云眼不共故依一相續建立同分及彼同分色是共故依多相續建立同分及彼同分如説色界聲香味觸應知亦爾聲可如色香味觸三至根方取是不共故一取非餘理應如眼等不應如色説雖有是理而容有共所以者何香等三界於一及餘皆有可生鼻等識義眼等不爾故如色説若依雜心謂眼見色是有分不見色是餘有分謂色眼可見是有分所不見是餘有分差別者若眼是一有分餘一切亦有分若一餘有分餘一切亦餘有分色若見者是有分非餘耳鼻舌身聲香味觸亦如是第一義如眼説俗數如色説解云雜心意不分明毗婆沙云如色界聲香味觸界亦爾同分彼同分品類差別皆相似故然於此義或有欲令唯嗅嘗覺各自身中諸香味觸彼作是説香味觸界依世俗理如色界説謂諸世間作如是語汝所嗅香我等亦嗅汝所嘗味我等亦嘗汝所覺觸我等亦覺依勝義理香味觸界如眼界説謂一有情所嗅香界餘不能嗅若一有情所嘗味界餘不能嘗若一有情所覺觸界餘不能覺問若一觸界二有情身各在一邊共所逼觸豈非勝義如色界説答如是觸界有多極微和集一處二身逼觸各得一邊無共得者故勝義理如眼界説香味二界準此應知復有欲令亦嗅嘗覺他及非情諸香味觸若已受用及受用時依世俗理如色界説謂諸世間説共得故依勝義諦如眼界説一所受用餘不得故若未受用香味觸界依勝義理亦得如色界説謂在未來當至現在有多人等共得義故若依前義應作是説香味觸界依世俗理如色界説依勝義理如眼界説若依後義應作是説香味觸界若已受用及受用時依世俗理如色界説依勝義理如眼界説若未受用依勝義理亦可得言如色界説是故諸論皆作是説如色界聲香味觸界亦爾以香味觸可共得故眼等六識同分彼同分生不生法故如意界説次釋同分彼同分名依俱舍論有其三義故彼問言云何同分彼同分義根境識三更相交雜故名為分或復分者是已作用或復分者是所生觸同有此分故云同分與此相違名彼同分由非同分與彼同分與彼同分種類分同名彼同分正理同俱舍雜心論云有分餘有分有何義答有分時説名有分問眼界二種有業及無業分彼有業分為無業分可分亦説有分彼無業分亦為有業分可分亦説有分二分俱得有分相依經部宗未見正文準同大乘於理無違今依大乘諸論不同若依世親安慧五蘊論唯約五內處釋同分義故彼論皆云幾同分謂五內有色界與彼自識等境界故幾彼同分謂彼自識空時與自類等故解云同分等境義故名同分集論第三雜集第五意同五蘊故集論云云何同分彼同分幾同分彼同分為何義故觀同分彼同分耶謂不離識彼相似根於境相續生故離識自類相似相續生是同分彼同分初是同分諸根與識俱識相似於諸境相續生故由根與識相似轉義説名同分第二是彼同分諸根離識自類相似相續生故由根不與識合唯自體相似相續生根相似義説同分色蘊一分眼等五有色界處一分是同分彼同分又瑜伽五十六亦依五內處説彼云問十八界中幾是同分幾彼同分答有識眼界名為同分所餘眼界名彼同分如眼界乃至身界亦爾唯根所攝內諸界中思量同分及彼同分非於色等外諸界中當知法界諸有所緣如心界説無所緣如色等説若深密經闕無此文梁攝論所列解節經云依有識眼根緣外色塵眼識得生真諦解云若死人眼名無識眼故言有識以簡無識此釋不然若捨命後不成眼故也下有識耳等準此應知與眼識俱隨行等者此明眼識起時必有分別意識同時隨行同緣一境有識耳鼻舌身及聲香味觸為緣生耳鼻舌身識與耳鼻舌身識俱隨行同時同境有分別意識轉釋曰此即第二釋餘四識與意識俱準上應知廣慧若於爾時一眼識轉即於此時唯有一分別意識與眼識同行轉釋曰自下第二別釋俱轉多少於中有二初明意識與眼識俱轉後明意識與眼等二三四五識俱轉此即第一明意識與眼識俱轉一緣合故若於爾時二三四五諸識身轉即於此時唯有一分別意識與五色身同所行轉釋曰此即第二明隨所緣境等緣合多少是一意識與眼等五識俱轉多少其數不定深密經云無分別意識依解節經等皆云分別意識與此本同故知分別為正廣慧如大暴水流若有一浪生緣現前唯一浪轉釋曰此即第二舉喻重釋於中有二初水浪多少喻二鏡影多少喻前後二喻有差別者諸説不同一云二喻意趣各別如真諦記水生浪譬六識與本識同生滅義鏡生影譬諸識雖起非本識體轉作六識一云二喻意趣無異同顯諸識俱轉義故如瑜伽論第五十一顯揚十七今解二喻諸教不同有處欲顯所依能依二種差別故説二喻如瑜伽六十三云云何名為勝義道理建立差別謂略有二識一阿賴耶二者轉識阿賴耶識是所依轉識是能依此復七種所謂眼識乃至意識譬如水浪依止暴流或如影像依止明觀如是名依勝義道理建立所依能依差別有處為顯第八與七俱轉如瑜伽五十一顯揚十七有處為顯第八與七不異義故如成唯識第七云八識自性不可言定一行相所依緣相應異故又一滅時餘不滅故能熏等相各異故亦非定異經説八識如水波等無差別故定異應非因果性故如幻等無定性故如前所説識差別相依理世俗非真勝義真勝義中心言絶故如伽他説心意識八種俗故相有別真故相無別相所相無別故今此經意含有如上所説諸義或可此經二喻意異前喻俱起及因果相續不斷義如成唯識第三卷云恆言遮斷轉非常猶如暴流因果法爾具説如彼後喻俱起及八不轉成七及受用無盡義前中有三初一緣一浪喻次多緣多浪喻後然此下自類無斷喻此即第一一緣一浪喻若二若多浪生緣現前有多浪轉釋曰此即第二多緣多浪喻然此暴水自類恆流無斷無盡釋曰第三自類不斷喻入楞伽經亦同此意故彼頌云如海遇風緣起種種波浪現前作用轉無有間斷時藏識海亦然境等風所擊恆起諸識浪現前化用轉譬如善淨鏡面若有一影生緣現前唯一影起釋曰自下第二鏡影多少喻於中有三初一緣一影喻二多緣多影喻後非此下受用無盡喻此即第一一緣一影喻若二若多影生緣現前有多影起釋曰此即第二多緣多影喻非此鏡面轉變為影亦無受用滅盡可得釋曰此即第三受用無盡喻言非此鏡面轉變為影等者真諦記云鏡影生藉緣鏡不轉作影六識藉緣塵生者並用前六識種子生後六識非為本識體轉作六識今解轉變自有二義一者因變種子賴耶變成七識二者果變現行第八變自相分而不能變眼等七識今此經中約果變義故非此鏡面轉變為影又此鏡面現影無滅意顯第八生果無盡問如何合中唯舉水波解云義準可知略而不説若爾如何深密解節具合二喻解云梵本有此差別如是廣慧由似暴流阿陀那識為依止為建立故若於爾時有一眼識生緣現前即於此時一眼識轉釋曰自下第三舉法同喻於中有二初明一緣一識轉後明多緣多識轉此即第一明一緣一識若於爾時乃至有五識身生緣現前即於此時五識身轉釋曰此即第二明多緣多識轉準上應知廣慧如是菩薩雖由法住智為依止為建立故於心意識祕密善巧然諸如來不齊於此施設彼為於心意識一切祕密善巧菩薩釋曰此下第二辨祕密善巧答前兩問於中有二初依問正釋後廣慧齊此下結答前問前中有二初明地前非佛所説後明地上是佛所説此即初也法住智者依薩婆多宗知果法所住內故名法住智故大婆沙一百一十云問何故名法住智答法者是果住者是因知果法所住因故名法住智謂知三界下中上果所住之因名法住智廣説如彼依經部宗知法常住故名法住智故成實論二十六云知諸法生起名法住智如生緣老死乃至無明緣行以有佛無佛此性常住故曰法住智今依大乘依顯揚論第十五云法住智者謂依素怛等安立法門智依瑜伽論同顯揚論故第十云云何法住智謂如佛施設開示無倒而知又九十四云云何法住智謂如有一人間隨順緣生緣起無倒教已於緣生行因果分位住異生地便能如實以聞思修所成作意如理思惟能以妙慧悟入信解苦真是苦集真是集滅真是滅道真是道諸如是等如其因果安立法中所有妙智名法住智今此所説意同顯揚瑜伽第十此意説云地前菩薩雖由法住智力了知心意識中世俗差別而未證解於心意識祕密勝義是故世尊不齊於此施設彼為善巧菩薩廣慧若諸菩薩於內各別如實不見阿陀那不見阿陀那識不見阿賴耶不見阿賴耶識不見積集不見心釋曰自下第二正明地上是佛所記於中有二初總答兩問後是名下別答兩問謂前答中含有二義一者教所詮義以答初問二者依義設教即答後問於中有二初約第八三名辨如實知後約十八界明如實知此即初也然釋此文諸説不同真諦記云菩薩若如此前來見識色等此依俗解佛不記説此人解心意識祕密義由如實不見前來所明識義佛方記説此人解心意識祕密義此明識虗妄無所有即真由達本祕密於虗妄之末方始明了也又解云於內各別者內謂真如諸法自體故名為內各別者隨詮顯真名為各別此意説地上菩薩依勝義諦由根本智於內各別由證真如境上如實不見阿陀那用如實不見阿陀那體賴耶及心體用差別準此應知又解云於內各別者阿陀那等諸法體上皆有自共相道理於中自相現量境故名之為內諸法自相各附自體名為各別是故雜集第一云自內所受是知義此即現量知自相義又瑜伽第二復作此言依知言説者謂各別於內所受所證所觸所得由此因緣為他宣説若依此釋正體後得皆是現量如實了知陀那自相離諸分別故名不見非無分別乃名不見不見眼色及眼識不見耳聲及耳識不見鼻香及鼻識不見舌味及舌識不見身觸及身識不見意法及意識釋曰此釋不見十八界故名善巧菩薩是名勝義善巧菩薩如來施設彼為勝義善巧菩薩釋曰此即第二別答前兩問文有兩節初是名勝義善巧菩薩者牒上所證之義以答前問後如來施設彼為勝義善巧菩薩者牒上能詮之教以答後問或可是名兩字該通兩段廣慧齊此名為於心意識一切祕密善巧菩薩如來齊此施設彼為於心意識一切祕密善巧菩薩釋曰此即第二結答前問如文可知爾時世尊欲重宣此義而説頌曰釋曰自下第二舉頌略説於中有二初發起頌文後舉頌略説此即第一發起頌文阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我深密頌云諸種阿陀那解節經曰執持識深細能生於諸法我説水鏡喻不為愚人説諸種子恆流於凡我不説彼勿執為我釋曰此即第二舉頌説然釋此頌諸論不同依攝大乘無性釋曰言甚者世聰睿者所有覺慧難窮底故言甚細者諸聲聞等難了知故是故不為諸聲聞等開示此識以不求微細一切智智故一切種子如暴流者剎那展轉相續不斷如水暴流我於凡愚不開演者懷我見者不為開示恐彼分別計執為我何容彼類分別計我窮生死際行相一類無改易故世親釋云阿陀那識者所釋異名甚深細者難了知故一切種子如暴流者次第轉故一切種子剎那展轉如暴水流相續轉故恐彼分別執為我者一行相轉故分別執可得成唯識論護法釋云以能執持諸法種子及能執受色根依處亦能執取結生相續故説此識名阿陀那無性有情不能窮底故説甚深趣寂種性不能通達故名甚細是一切法真實種子緣擊便生轉識波浪恆無間斷猶如暴流凡即無性愚即趣寂恐彼於此起分別執墮諸惡趣障生聖道故我世尊不為開示
