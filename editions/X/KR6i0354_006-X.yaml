body:
  text: 西明寺沙門圓測撰分別瑜伽品第六將釋此品略有二種初釋品名後正文釋釋品名者梵音瑜伽此云相應然此瑜伽依瑜伽釋兩釋不同一云通說三乘境行果等等言等取能詮教法所有諸法皆名瑜伽一切並有方便善巧相應義故境瑜伽者謂一切境無顛倒性不相違性相隨順性趣究竟性解云如次如其自性不違道理隨順諸法由此能取菩提涅槃與正理教行果相應故云瑜伽此境瑜伽雖通一切然諸經論就相隨機種種異說或說觀待等四種道理如是乃至說蘊界處緣起諦等皆名瑜伽總具四性順四法故行瑜伽者謂一切行更相順故稱正理故順正教故趣正果故說名瑜伽此行瑜伽雖通諸行然諸經論就相隨機種種異說或說正修諸行說名瑜伽或說三十七菩提分法說名瑜伽或說奢摩他毗鉢舍那平等運道說名瑜伽如是乃至復說菩薩所有殊勝慧悲平等雙轉名為瑜伽具上所說四種義故果瑜伽者謂一切果更相順故合正理故順正教故稱正因故說名瑜伽此果瑜伽雖通諸果就諸經論就相隨機種種異說或有處說力無畏等不共佛法說名瑜伽如是乃至或說有為無為功德皆名瑜伽具上義故如是聖教亦名瑜伽稱正理故順正行故引正果故一云正取三乘觀行說名瑜伽數數進修合理順行得勝果故境果聖教瑜伽境故瑜伽果故詮瑜伽故亦名瑜伽非正瑜伽解云彼論雖有兩說此經瑜伽當第二說於諸行中止觀為體同六處經以奢摩他毗鉢舍那平等運道說名瑜伽於此品中廣明正觀瑜伽之義故名分別瑜伽爾時慈氏菩薩摩訶薩白佛言世尊菩薩何依何住於大乘中修奢摩他毗鉢舍那釋曰上來四品辨所觀次有二品釋能觀行於中有二初分別瑜伽明止觀行門後地波羅蜜明十地十度於二品中止觀是總所以先明十度是別故在後說或可止觀略故先明十度是廣所以後說就止觀中文別有二初正釋止觀後爾時慈氏下明依教奉持前中有二初長行廣釋後舉頌重說有義此品總分為三初長行廣釋次舉頌略說後依教奉持就長行中復分為二初廣辨止觀相後爾時世尊說是語已下結嘆勸學就廣辨中有十八門一分別止觀依住門二止觀所緣差別門三分別能求止觀門四隨順止觀作意門五止觀二道同異門六分別止觀唯識門或可分別心境一異門七修習止觀單覆門八止觀種數差別門九依不依法止觀門十有尋伺等差別門十一止舉捨相差別門十二知法知義差別門十三止觀能攝諸定門十四止觀因果作業門十五止觀治障差別門十六止觀能證菩提門十七引發廣大威德門十八於無餘依滅受門此即第一分別止觀依住門於中有二先問後答此即第一菩薩請問言慈氏者依正梵言應云梅怛履邪此云慈氏自有三義一者從姓立名母姓慈氏從母慈姓以立其名故名慈氏字阿氏多或作阿嗜多此云無勝謂無人能勝也舊云阿逸多者訛也二者自性慈悲名為慈氏故華嚴云初得慈心三昧故名慈也三者依願立名一切智光仙人經說彌勒昔作一切智光仙人值於慈佛說三昧經發願未來得成佛時亦名慈佛由斯三義故名慈氏深密經云彌勒僧伽吒經云彌諦疑魏云慈也問有二意一問以何為依而修止觀二問住於何法而修止觀梵音奢摩他此云止也毗鉢舍那此云觀也即是定慧故成實論第二十四止觀品云止名定觀名慧佛地論第一云止謂三摩地觀謂般若又大般若五百六十八云止謂一心不亂觀謂如實見法又無性攝論第七卷云奢摩他者謂能對治諸散動定毗鉢舍那者謂能對治諸顛倒慧戒實論二十四起信論雜集論第一第十顯揚第二優婆塞戒經第三菩薩藏經十九大集經二十四涅槃經三十一釋二別相恐繁不述也佛告慈氏菩薩曰善男子當知菩薩法假安立及不捨阿耨多羅三藐三菩提願為依為住於大乘中修奢摩他毗鉢舍那釋曰此即第二如來正答謂諸菩薩用十二部經假安立法以為所依而修止觀又住不捨菩提大願而修止觀法假安立者一切諸法皆離名言而假安立十二分教故此經第一云即於如是離言法性為欲令他現等覺故假安立名想又報恩經第一卷云法無言說如來以妙方便能以無名相法作名相說又如瑜伽三十六云何因緣故於一切法離言自性而起言說答若不起言即不能為他說一切法離言自性他亦不能聞如是義若無有聞即不能知此一切法離言自性為欲令他聞知諸法離言自性是故於此離言自性而起言說住菩提願如顯揚論第二卷說彼云發心者謂諸菩薩發菩提心若諸菩薩住菩薩法性為欲利益十方世界所有有情依彼行相強勝因緣於無上菩提發大誓願受發心法謂我必定當證無上菩提為度十方一切有情令離諸煩惱故及離諸苦難故此受發心復有二種一世俗發心謂如有一隨智者前恭敬而住起增上意發誓願言長老憶念或言聖者憶念或言鄔波拕耶此云親教我如是名從今日始教無上菩提心為欲饒益諸有情故從今已往凡我所修六度之行皆為證得無上菩提故我今與諸菩薩摩訶薩和合出家願尊證知我是菩薩第二第三亦復如是二證法性謂如已過第一劫阿僧企耶證得菩薩初極喜地乃至由如是故於大菩提願不退轉是名證法性發心或可住菩提願者即是般若經中四種心也故功德施波若論云云何住者於何相果心住願求此中顯示菩薩果四種利益相應之心何者為四一無邊心如經所有一切眾生之類如是等二最上心如經我皆令入無餘涅槃而滅度之三受攝心如經如是滅度無量眾生實無眾生得滅度者四正智心如經若有眾生想即不名菩薩者具說如彼世親波若論云一廣大心二第一心三常心四不顛倒心大乘中者修止觀門通於二藏簡聲聞藏故說大乘大乘所攝理教行果大人所乘有勝運用故名大乘然此大乘起信論大集經三義釋大乘無性攝論第一二義七義以釋大乘十二門論六義釋大乘善戒經第七地持第八顯揚第八雜集十一莊嚴十二瑜伽四十六以七義釋大乘稱贊大乘功德經三十七義釋大乘也修奢摩他毗鉢舍那者菩薩行中止觀為主故法華云佛自住大乘如其所得法定慧力莊嚴以此度眾生又智度論第十七云如車二輪一強二弱則不安隱智定不等亦復如是是故菩薩雙修止觀雜集第十有四句一有定無慧二有慧無定三定慧俱有四定慧俱無此中應說慈氏菩薩復白佛言如世尊說四種所緣境事釋曰自下第二止觀所緣差別門於中有二先問後答問中有三初標業舉數次依數列名後正發問辭此即初也言境事者境謂境界事謂體事四所緣境皆有體性故言境事一者有分別影像所緣境事二者無分別影像所緣境事三者事邊際所緣境事四者所作成辦所緣境事釋曰第二依數列名結所緣境總有四種一遍滿所緣二淨行所緣三善巧所緣四淨戒所緣如是四種諸經不同若依此經及深密經但列遍滿四緣而不解釋若依瑜伽十三及六十五具列遍滿淨行等四種所緣而不解釋集論第六雜集十二顯揚十六瑜伽二十六次第廣釋四種所緣故今對辨故集論云云何於法所緣若別略說有四謂遍滿所緣淨行所緣善巧所緣淨戒所緣遍滿所緣復有四種謂有分別影像所緣無分別影像所緣事邊際所緣所作成就所緣有分別所緣者謂由勝解作意所有奢摩他毗鉢舍那所緣境界雜集釋云勝解作意者一向世間作意無分別影像所緣者謂由真實作意所有奢摩他毗鉢舍那所緣境界雜集釋云真實作意者一向出世間及此後所得作意事邊際所緣者謂一切法盡所有性如所有性盡所有性者謂蘊界處雜集釋云為顯所知諸法體事唯有爾所分量邊際是故建立蘊界處三如所有性者謂四聖諦十六行相真如一切行無常一切行苦一切法無我涅槃寂靜空無願無相雜集釋云由如是等義差別門了所知境故名如所有性所作成就所緣者謂轉依雜集釋云已得轉依者無有顛倒所緣顯現故淨行所緣復有五種謂多貪行者緣不淨境多瞋行者緣修慈境多癡行者緣眾勝性諸緣起境憍慢行者緣界差別境尋思行者緣入出息念境雜心第八俱舍二十二順正理五十九婆沙論四十瑜伽二十六廣釋不淨觀雜心第七俱舍二十九順正理七十九婆沙八十二瑜伽二十七三十三涅槃經十五釋慈悲觀瑜伽二十七釋緣起觀雜心第五婆沙七十五瑜伽二十七釋界差別觀雜心第八俱舍二十二順正理六十婆沙二十六瑜伽二十七廣釋入出息觀善巧所緣亦有五種謂蘊善巧界善巧處善巧緣起善巧處非處善巧應云何觀應如緣起善巧觀處非處善巧緣起善巧有何差別若以諸法深閏諸法令離無因不平等因生故是緣起善巧因果相稱攝受生故是處非處善巧雜集釋云謂以無明等諸法深閏行等諸法非彼諸法無因而生亦非自在即等不平等因生如是觀智名緣起善巧謂雖唯有法為因然由攝受相稱因方能生起相稱果如善行感可愛異熟惡行感不可愛異熟如是比如是觀智名處非處善巧五種善巧廣如瑜伽第二十七說淨戒所緣者謂下地麤性上地靜性真如及四聖諦雜集釋云下地麤性上地靜性者依世間道說由此制伏諸纏故真如及四聖諦者依出世道說略故真如廣四聖諦由此永害諸隨眠故廣如瑜伽第二十七也若廣分別如雜集十一顯揚十六瑜伽二十六七然後三境諸論大同故不別釋遍滿四境諸教有異故今對辨今此經等就勝而說是故偏顯遍滿四種如是四境名有通別言通名者四種皆名遍滿所緣故瑜伽論二十六云如是四種所緣境事遍行一切隨入一切所緣境中去來今世正等覺者共所宣說是故說名遍滿所緣又此所緣遍毗鉢奢那品遍奢摩他品遍一切事遍真實事遍因果相屬事故名遍滿謂若說有分別影像即是此中毗鉢舍那品若說無分別影像即是此中奢摩他品若說事邊際性即是此中一切事真實事若說所作成辦即是此中因果相屬事乃至彼云當知如是遍滿所緣隨順淨教契合正理如是名為遍滿所緣言別名者諸教不同若依雜集由勝解作意所有止觀所緣境界名有分別影像一向世間作意所緣故由真實作意所有止觀所緣境界名無分別影像一向出世作意及後得所緣故諸法體事唯有爾所分量邊際如蘊界處名事邊際所緣已得轉依者所緣境故名所作成辦所緣具說如彼若依瑜伽有分別影像者謂於所知事同分影像由三摩呬多地毗鉢舍那行觀察簡擇極簡擇遍尋思遍伺察所知事者謂淨行所緣善巧所緣淨戒所緣彼所知事相似顯現由此道理名所知事同分影像修觀行者推求此故於彼本性所知事中觀察審定功德過失是名有分別影像無分別影像者謂修觀行者受如是影像相已不復觀察簡擇極簡擇遍尋思遍伺察然即於此所緣影像以奢摩他寂靜其心是名無分別影像事邊際性者謂若所緣盡所有性如所有性盡所有性者謂蘊界處四諦如所有性者謂若所緣是真實性是真如性四道理性所作成辦者謂修觀行者修習止觀為因緣故諸緣影像所有作意皆得圓滿此圓滿故便得轉依一切麤重悉皆息滅得轉依故超過影像即於所知事有無分別現量智見生入初靜慮者得靜慮時於初靜慮所行境界乃至入非想定者得彼定時即於彼定所行境界如是名為所住成辦具說如彼即此四種瑜伽十一四十住意中名四作意顯揚十六瑜伽六十七十六修中是三種修釋義大同故不別敘四作意者一有分別影像作意二無分別影像所緣作意三事邊際所緣作意四所作成辦所緣作意三種修者一影像修有分別影像無別影像合為一故二事邊際修三所作成辦修也若依顯揚有分別影像者謂所知事同分三摩地所行觀境無分別影像者謂所知事同分三摩地所行心境事邊際者謂盡所有性及如所有性所作成辦者謂轉依及依此無分別知三無性論所說多謬故不觀也此諸說中顯揚所說順於經文非集論等集論等說初二皆通止觀境故又彼瑜伽與經別者諸靜慮等通成辦故今釋經中所說四者意同顯揚故不別釋於此四中幾是奢摩他所緣境事幾是毗鉢舍那所緣境事幾是俱所緣境事釋曰第三正發問辭佛告慈氏菩薩曰善男子一是奢摩他所緣境事謂無分別影像一是毗鉢舍那所緣境事謂有分別影像二是俱所緣境事謂事邊際所作成辦釋曰第二如來正答四境別相如前已說四中第二是其止境以奢摩他無分別故四中第一是其觀境毗鉢舍那有分別故四中後二通止觀境止觀通緣二種境故然此四境地別者諸說不同一云初二是地前境依教修時即緣自變似諸法義影像相分觀能推求名有分別定心推求名無分別第三即是十地正觀所緣境界至於十地方可了知境邊際故第四所緣唯在佛地以得轉依所作成辦所緣境故問若爾如何雜集論說無分別影像所緣者謂無分別及後所得智境解云彼論生通理故所在義異瑜伽等一云初二通在地前及十地二位皆有影像境故解同前說一云前三皆通地前及十地位盡所有等通諸位故解如前說一云四種皆通諸位如瑜伽論六十七云云何所作成辦修謂已證入根本靜慮或諸等至或世間定或出世間定諸所有修名所作成辦修顯揚十六瑜伽十一二十六亦同一云諸說皆不違理准下經文地前唯初二十地有前三佛地具之四故下經云彼於先時已得二種所緣彼於今時得見道故更證得事邊際所緣乃至證得阿耨多羅三藐三菩提故又得所作成滿所緣具說如彼問無漏心品變影像不若不變者如前集論如何合釋若變影者三十唯識復云何通彼云若時於所緣智都無所得答釋此義如成唯識第九卷說彼云次通達位其相云何頌曰若時於所緣智都無所得爾時住唯識離二取相故論曰若時菩薩於所緣境智都無所得不取種種戲論相故乃至廣說有義此智二分俱無說無所取能取相故有義此智相見俱有帶彼相起名緣彼故若無彼相名緣彼者應色等智名聲等智若無見分應不能緣寧可說為緣真如智勿真如性亦名能緣故應許除此定有見分有義此智見有相無說無相取不取相故雖有見分而無分別說非能取非取全無雖無相分而可說此帶如相起不離如故如自證分緣見分時不變而緣此亦應爾變而緣者便非親證如後得智應有分別故應許此有見無相諸後得智有二分耶有義俱無離二取故有義此智見有相無說此智品有分別故聖智皆能觀能觀照境故有義此智二分俱有說此思推似真如相不見真實真如性故廣說如彼佛地第三意同唯識雖有諸說依護法宗無分別智見有相無諸後得智見相俱有問若爾雜集所說如何會釋彼論說云無分別影像所緣者謂由真實作意所有止觀所緣境界真實作意者一向出世間及此後所得作意解云無著但名真實作意不言出世間智故知出世間等言師子覺意非無著說故不相違慈氏菩薩復白佛言世尊云何菩薩依是四種奢摩他毗鉢舍那所緣境事能求奢摩他能善毗鉢舍那釋曰自下第三分別能求止觀門於中有二先問後答此即問也問有二意一問云何菩薩依此四種止觀所緣能求奢摩他二問能善毗鉢舍那言求善者釋有三義一云求之與善皆是修義為分止觀說求善言一云求善通止及觀故深密云修行止觀善知止觀一云求是修義進修止故唯止非觀善謂善知毗鉢舍那善知義故唯觀非止故此經云能求奢摩他能善毗鉢舍那佛告慈氏菩薩曰善男子如我為諸菩薩所說法假安立所謂契經應頌記別諷誦自說因緣譬喻本事本生方廣希法論議釋曰自下第二如來正答於中有二初明修所依教後顯依教正修此即初也佛告慈氏我為菩薩法假安立十二分教所謂契經乃至論議然此十二諸教甚多且述集論第六所說彼云契經者謂以長行綴略說所應說義應頌者即諸經中或中或後以頌重頌又不了義經應更頌釋故名應頌記別者謂於是處聖弟子等謝往過去記別德失生處差別又了義經說名記別記別開示深密意故諷誦者謂諸緣中以句宣說或以二句或三或四或五或六解云依顯揚瑜伽等說言自說者謂諸經中或時如來悅意自說緣起者謂因請而說又有因緣制立學處亦名緣起譬喻者謂諸經中有比說本事者謂宣說聖弟子等前世相應事本生者謂宣說菩薩本行相應事方廣者謂菩薩藏相應言說如名方廣亦名廣破亦名無比為何義故名為方廣一切有情利益安樂所依處故宣說廣大甚深法故為何義故名為廣彼以能廣破一切障故為何義故名為無比無有諸法能比類故希法者若於是處宣說聲聞諸大菩薩及如來等最極希有甚奇特法論議者若於是處無有顛倒解釋一切深隱諸相依深密經具列梵名而不翻出故彼經云彼所謂修多羅祇夜和伽羅那伽陀優陀那尼陀那阿婆陀那伊帝憂多伽闍多伽毗佛略阿浮陀檀摩憂優婆提舍也若廣分別具如別章菩薩於此善聽善受言善通利意善尋思見善通達釋曰自下第二依教正修於中有二初總明止觀方便後復即於此下別釋止觀二門前中有二初明聞慧後辨思慧此即初也然此聞慧有其五相一者善聽二者善受三言善通利四意善尋思五見善通達謂諸菩薩於此教法專心諦聽能善受持諷誦通利意善思推慧善通達若依瑜伽第二十五以四種相釋其聞慧除此經中初聽聞相若依瑜伽第三十卷有其六相加覺慧相後之五相名少異義當此經故彼論云云何聞所成地謂於五明處名句文身無量差別覺慧為先聽聞領受讀誦憶念無倒解了解云如次當此經五聽聞即當善聽領受即當善受讀誦精熟名言善通利憶念思量名意善尋思惟求解了名見善通達即於如是善思惟法獨處空閑作意思惟釋曰此即第二辨其思慧即於聞慧所思惟法獨處空閑作意思惟所聞法義二種影像故瑜伽論第十六云云何思所成地謂如有一獨處空閑審諦思惟如其所聞如所究達諸法道理又瑜伽論第十三云若爾空閑便能引發內心安住正奢摩他若心安住正奢摩他便能引發毗鉢舍那復即於此能思惟心內心相續作意思惟如是正引多安住故起身輕安及心輕安是名奢摩他釋曰自下第二別釋止觀於中有二先止後觀前中有二初正釋止門後結答前問就初門中自有兩說一云於此文中有其四節一所緣境二能緣心三顯其信四結其名言復即於此能思惟心者是所緣境然釋此文自有兩說一云於此法義境中能正思惟聞思二慧相應之心為所緣境一云於此二慧相應之心為所緣境此中意說奢摩他門心心令住一境是故緣心為境毗鉢舍那為欲簡擇所知義故聞思二慧所變相分為所緣境內心相續作意思惟者辨能緣止言內心者攝能緣心在於定內名為內心故瑜伽論六十三云繫心於內所緣境界於外所緣不流散故此釋正心相續作意思惟聞思相應之心如是正行多安住故起身輕安及心輕安者此顯其住謂奢摩他具內住等九正行故起身輕安及心輕安身輕安者四大所造輕安觸也心輕安者善十一中輕安數也無性論云輕而安隱有堪能性是輕安相如是身心輕安分位立奢摩他故瑜伽論第十三云若能於內九種住心如是名為內心安住正奢摩他九心住者如集論第五但列九名而不解釋雜集第十次第牒釋故彼論云奢摩他謂於內攝心令住等住安住近住調順寂靜最極寂靜專注一趣平等攝持如是九行令心安住是奢摩他住者攝外攀緣內離散亂最初繫心故等住者最初繫縛麤動心已即於所緣相續繫念微細漸略故安住者或時失念於外馳散尋復殿攝故近住者從初已來為令其心於外不散親近令住故調順者從先已來於散亂因色等法中起過患想增上力故調伏其心令不流散故寂靜者於擾動心散亂惡覺隨煩惱中深見過患攝伏其心令不流散故最極寂靜者或時失念散亂覺等卒爾現行即便制伏令不更起故專注一趣者精懃加行無間無缺相續安住勝三摩地故平等攝持者善修習故不由加行遠離功用定心相續離散亂轉故若廣分別如瑜伽論第三十卷莊嚴第七是名奢摩他者結其名也一云於此文中即分為二初復即於此等者釋止方便後如是等者正釋止也此明上品止慧復即緣此中下二品聞思兩慧內相續心為所緣境正釋止相義同前解如是菩薩能求奢摩他釋曰此即第二結答前問彼由獲得身心輕安為所依故即於如所善思惟法內三摩地所行影像觀察勝解捨離心相釋曰自下第二別釋觀門於中有二初正釋觀門後結答前問就前門中自有兩說一云總依定位以釋此文有其二解一唯約影像以釋此文於中有二初簡非所緣後依境發觀此即初也文有二節初彼由獲得等者辨觀所依謂由前止獲得輕安為所依故能發於觀後即於等者簡非所緣謂即如聞思所緣思惟法上起內三摩地觀同分影像於此影像發起勝解思惟觀察為欲生起毗鉢舍那捨奢摩他所緣心相言心相者即心是相故名心相即於如是三摩地影像所知義中能正思擇最極思擇周遍尋思周遍伺察若忍若樂若慧若見若觀是名毗鉢舍那釋曰此即第二依境發觀文有四節一即於等者辨所觀境即此前說內三摩地所行影像為所知義是所觀境二能正思擇等者釋觀行相即是此中四慧行相此四行相如雜集論第十卷說故彼論云簡擇諸法者盡所有故最極簡擇者如所有故普遍尋思者由有分別作意俱行慧建立諸法相故周審觀察者委具推求故瑜伽三十大同雜集彼云云何四種毗鉢舍那謂有苾蒭依止內心奢摩他故於諸法中能正思擇最極思擇周遍尋思周遍伺察是名四種毗鉢舍那云何名為能正尋思謂於淨行所緣境界或於善巧所緣境界或於淨戒所緣境界能正思擇盡所有性云何名為最極思擇謂即於彼所緣境界最極思擇如所有性云何名為周遍尋思謂即於彼所緣境界由慧俱行有分別作意取彼相狀周遍尋思云何名為周遍伺察謂即於彼所緣境界審諦推求周遍伺察顯揚第四如次名為四種觀也三若忍等下辨觀異名有其五種忍謂忍解樂謂受樂慧即分別見是推求觀謂觀察如是五種義一名異故瑜伽論八十二云慧智見明觀等名之差別簡擇法相心所有法為其自性顯揚十三亦同瑜伽四是名毗鉢舍那者結也二通約本影以釋此文言即於如所等者影本質法內三摩地等者依本起影託影觀察即於如是等者由觀影故了所知義本質之境故瑜伽論二十六云修觀行者推求影故於彼本性所知事中觀察審定功德過失釋餘文句義如前解一云通約定散以釋此文於中有二初辨觀方便後即於下正明根本毗鉢舍那前中有二初辨觀所依後即於下正明方便謂由獲得身心輕安為所依故依定散觀而所發必由聞思慧散心以為方便故此正明聞思方便所以者何止觀二門行相前故雖已得定更起散心聞思方便言內三摩地者攝心不散名之為內非正在定故說內言餘如前釋然此方便及根本位皆有兩釋一唯約影像二通依本影義同前釋如是菩薩能善毗鉢舍那釋曰此即第二結答前問慈氏菩薩復白佛言世尊若諸菩薩緣心為境內思惟心乃至未得身心輕安所有作意當名何等釋曰自下第四隨順止觀作意門於中有二初明順止作意後順觀作意前中有二先問後答此即問也謂如前說後即於此能思惟心內心相續作意思惟如是作意乃至未得輕安已前當名何等佛告慈氏菩薩曰善男子非奢摩他作意是隨順奢摩他勝解相應作意釋曰第二世尊正答是順止作意非正奢摩他無輕安故世尊若諸菩薩乃至未得身心輕安於如所思所有諸法內三摩地所緣影像作意思惟如是作意當名何等釋曰自下第二隨觀作意於中有二先問後答此即問也謂前所說即於如所善思惟法內三摩地所行影像觀察勝解捨離心相如是作意乃至未得輕安已前當名何等善男子非毗鉢舍那作意是隨順毗鉢舍那勝解相應作意釋曰第二如來正答是隨順觀作意而非正觀無輕安故即准此文證知止觀唯在定位又由此文應知前段所說內心相續作意等言是其方便以為正義慈氏菩薩復白佛言世尊奢摩他道與毗鉢舍那道當言有異當言無異釋曰自下第五止觀二道同異門於中有二先問後答此即問也止觀二種諸修行者所遊履處或能引生諸聖道法故名為道如是二道為同為異佛告慈氏菩薩曰善男子當言非有異非無異釋曰自下第二如來正答於中有二初依問總標後問答別釋此即初也何故非有異以毗鉢舍那所緣境心為所緣故何故非無異有分別影像非所緣故釋曰此即第二問答別釋然釋此文自有兩說一云非有異者約本質說且如止觀俱轉之時同緣聞思所緣相分境及能緣見分心為本質境以質同故名非有異非無異者約影像說以彼止觀同緣之時所變影像各各不同謂有分別影無分別影有差別故名非無異一云非有異者以奢摩他雖不能緣毗鉢舍那所緣聞思相分之境而能緣彼聞思二慧所緣境上見分之心故非有異非無異者義同前說於二說中後說為勝順前文故慈氏菩薩復白佛言世尊諸毗鉢舍那三摩地所行影像彼與此心當言有異當言無異釋曰自下第六分別止觀唯識門或可分別心境一異門於中有六一問二答三徵四釋五難六通此即第一慈氏請問然此問意自有三釋一云此中舉觀問定所緣如攝大乘但說諸三摩地所行影像而不說觀此經下云三摩地所行影像顯現一云此中舉定問觀所緣如諸處說十一切處觀等非是定故而攝論等言三摩地者依定起觀故說定言一云雙問定慧所緣影像此經中問毗鉢舍那三摩地所緣境故此問意云毗鉢舍那三摩地所行青等彼與此心為一為異依深密經亦同此經三摩地所行影像者無性釋云三摩地者是能令心住一境性心法為體此所緣境說名所行本境名質似彼現者說名影像然此影像准攝大乘是瘖瘀等影梁朝攝論十遍處中前八種色謂青黃赤白地水火風然此八色薩婆多宗八中四大觸處所攝青等四種色處所收彼宗法處所攝色中唯無表故依經部宗如成實論無表唯是非色非心諸定境色法處所攝大同大乘故俱舍論第十三云經部師說且諸經言有三色者瑜伽師說修靜慮時定力所生定境界色非眼根境故名無見不障處所故名無對若謂既爾如何名色釋如是名與無表同又經所說無漏色者瑜伽師說即由定力所生色中依無漏定者即說為無漏今依大乘十一切觀八解脫等所緣境色皆是法處須引文問如何此中唯說毗鉢舍那所緣境界答前段中說止唯緣心觀緣諸境乘前起問故不論止問此應言所緣境界與觀同異如何乃言與心一異答心相應故亦說名心如唯識言故不相違佛告慈氏菩薩曰善男子當言無異釋曰第二如來略答境不離心故言無異理實而言非一非異為破異執但言無異何以故釋曰第三菩薩重徵豈不所緣離能緣心由彼影像唯是識故釋曰第四如來正釋於中有二初標宗正說後遣外疑情此即初也由彼影像識所緣故善男子我說識所緣唯識所現故釋曰此即第二遣外疑情無性釋云我說在外識所緣境唯是內識之所顯現即是所緣境識為自性義此意說言識所緣境唯是識上所現影像無別有體世親釋云謂識所緣唯識所現無別境義復舉識者顯我所說定識所行唯識所現無別有體此中應引新攝論第四梁論第五成唯識第七佛地論第三雜集十一說唯識道理也世尊若彼所行影像即與此心無有異者云何此心還見此心釋曰第五菩薩設難難云心是能緣義境是所杖義如世尊說所行影像不異心者云何此心還見此心便違世間眼不自見指不自指刀不自割無性釋云云何此心還取此心者此顯作用於自相違梁攝論云若有別識為識境則唯識義不成若緣自體為境事亦不成以世間無此類故善男子此中無有少法能見少法然即此心如是生時即有如是影像顯現釋曰自下第六如來釋通於中有二初釋是境不離於心後問答分別散心所緣前中有三謂法喻合此即法說無性釋云無有少法能取少法者此釋前難無作用故謂一切法作用作者皆不成故解云無有少法者顯無作者能見少法者顯無作用魏世本云無有法而能取法梁朝本云無有法能取餘法大業論云無有一法能取餘法深密經云無有一法能觀一法如是等說文異義同又解無有少法能取少法者即於依他心上無實心體亦無實用離於彼心次有伏難既無實用如何得有能所取耶故作此言然依他起似心生時即有如是影像顯現故說此心能取於境無性論云然即此心如是生時者緣起諸法威力大故即一體上有二影生更互相望不即不離諸心心法由緣起力其性法爾如是而生如是諸心緣境道理如成唯識第七卷說彼云外色實無可非內識境他心實有寧非自所緣誰言他心非自識境但不說彼是親所緣謂識生時無實作用非如手等親執外物日等敘光親照外境但如鏡等似外境現名了他心非釋能了親所緣者謂自所變故契經言無有少法能取餘法但識生時似彼相現名取彼物如緣他心色等亦爾廣作問答具如彼論善男子如依善瑩清淨鏡面以質為緣還見本質而謂我今見於影像及謂離質別有所行影像顯現釋曰此即喻說然此鏡像其相難知故今先申諸宗所說後正釋經且依諸宗像與本質連隔彼實略有五釋一隔而是實如上坐部即依此喻不立中有如俱舍第八正理二十三又大婆沙六十九分別論者不立中者許鏡中像者間隟義今上坐部亦同彼說也二隔而非實然諸法因緣和合勢力令如是見以諸法性功能差別難可思議如世親菩薩而立中有如俱舍第八廣辨其義也三連而是實如眾賢論師立有中有廣破世親具如正理第二十三四連而非實於諸宗中應有此句未見誠文勘五非隔非連非實不實如大德邏摩此即經部第三大師於經部中有三大師一鳩摩邏多二室利邏多三大德邏摩謂緣眼根及質鏡等還見本面謂見別像正理二十三廣破彼計尋即可知今依大乘自有兩文一依此經心意識品鏡中有影故經說云又如善淨鏡面若有一影生緣現前唯一影起若二若多生緣現前有多影起又佛地經云如依圓鏡眾像影現乃至彼云又如圓鏡依緣本質種種影像相貌生起二依此文云如依善瑩清淨鏡面以質為緣還見本質而謂我今見於影像及謂離質別有所行影像顯現如此等經大乘諸師分成兩說一就猛宗即依前文及佛地經等立鏡中影別有體性彼經部宗反見自面故智度論三十六云問云影色像色不應別說何以故眼光明對清淨鏡反自照見影亦如是遮光故影現無更有法答曰是事不然如油中見像黑則非本色如五尺刀中橫觀則面像廣縱觀則面像長則非本面如大秦水精中玷玷皆有面像則非一面像以是因緣故非還見本像復次有鏡有人有持者有光明眾緣和合故有像生若眾緣不具即像不生具說如彼而此所說文見自面者依經部宗以影喻相非大乘義二彌勒宗自有兩說一云鏡中有別影像眼識起時緣影而生若唯本質無別影像應唯見分而無相分便有法喻無相似失又諸教中以鏡中像說依他起以空華喻喻所執性故定有影色處所收而此經中為彼定執質外別影是故說言以質為緣還見本質而謂我今見於影像及謂離質別有所行影像顯現以實而言影與本質非一非異由非一故質影不同由非異故名見本質一云離質無別影像大同經部反見自面由連亂故謂我今見於鏡中像及謂離質別有所行影像顯現據實都無故佛地論第四卷云若無實影圓鏡中生云何為喻有質有鏡和合為緣如是相現故得為喻謂諸有情顛倒執著影像熏習成熟力故鏡面為緣自識變異似面影現由是世間起增上慢謂我鏡中見其面影以無別影鏡中生故經但說言眾像影現不言生起問若爾如何佛地下文及心意識品說生起言解云依現假說生言又攝大乘無性釋論第五卷云又如影像於鏡等中還見本質而謂我今別見影像而此影像實無所有又世親釋第五卷云譬如影像實無有義即於本質起影像覺然影像義無別可得此亦如是雖有兩說後說為勝順諸教故就無影中復有兩說一云鏡中都無影像如前所引攝大乘等即於本質起影像覺一云鏡所照面自有四種一者賴耶所變本質二者眼識所變相分三者同時意識相分此之三種同本質處四者分別意識相分此之一種在於鏡面即雜集論五種法處所攝色中遍計所起色也言五種者極略極迥受所引自在所生及遍計所起色然鏡質像差別相者諸說不同一云鏡即喻定質喻心王影喻相分此中意說由心力故依止於定緣青等影然即彼影心所變故還不離心是故說言還見自心非謂見分還見見分故言自見若通定散說此喻者自有二說一云散位亦有定故義同定位一云散中鏡喻本質質喻見分影喻相分一云鏡喻見分影喻相分質喻自證分此意說云由自證分變見相故由見緣相而彼相見不離自證故說唯識如是此心生時相似有異三摩地所行影像顯現釋曰第三舉法同喻謂此定心如是生時以迷亂故相似心外有異所見影像顯現論其理也心所變相不離心故亦說名心非離心外別有所見故言還見自心世尊若諸有情自性而住緣色等心所行影像彼與此心亦無異耶釋曰自下第二問答分別散心所緣於中有二初請後說此即請問問意定境如世尊說若諸有情不由功用自性住心所緣色等諸影像境彼與此心亦無異耶善男子亦無有異而諸愚夫由顛倒覺於諸影像不能如實知唯是識作顛倒解釋曰第二如來正說散心所緣亦不離心而諸愚夫由心亂故於諸影像作心外解問佛說唯識有何意耶答如廣百論第十卷說諸契經言唯有識者為令觀識捨彼外塵既捨外塵妄心隨息妄心息故證會中道故契經言未達境唯心起二種分別達境唯心已分別亦不生知諸法唯心便捨外塵相由此息分別悟平等真空愚夫異生貪著境味受諸欲樂無捨離心生死輪迴投三有海受諸劇苦解脫無因如來慈悲方便為說諸法唯識令捨外塵捨外塵已妄識隨滅妄識滅故便證涅槃故契經言如世有良毉妙藥投眾病諸佛亦如是為物說唯心具說如彼廣釋唯識如成唯識第十卷等慈氏菩薩復白佛言世尊齊何當言菩薩一向修毗鉢舍那釋曰自下第七修習止觀單雙門故莊嚴論第十一云單修者謂止觀別修雙修者謂止觀合修於中有二初明通別修習後世尊云何心相下重釋三種所緣差別前中有三初明一向修觀次辨一向修止後顯止觀二種俱轉如是三段皆有問答此即觀中菩薩請問此問修觀行解分齊佛告慈氏菩薩曰善男子若相續作意唯思惟心相釋曰第二如來正說謂相續思惟聞思慧俱心之相分問前所說捨離心相與此何別答心相雖同此依主釋彼持業釋故有差別深密經云隨順觀彼心相不斷世尊齊何當言菩薩一向修奢摩他釋曰第二問唯修止善男子若相續作意唯思惟無間心釋曰如來正說無間心者即前無間相續緣法義境聞思二慧相應見分故瑜伽論第十云無間作意者謂一切時無間無斷相續而轉故知無間是相續也謂奢摩他令心不散故唯緣心有解無間心者即是次前無間隔心以為所緣雖有二說前說為正深密經云心相不斷世尊齊何當言菩薩奢摩他毗鉢舍那和合俱轉釋曰第三問俱轉相善男子若正思惟心一境性釋曰如來正說心一境性者謂止觀俱轉所緣境然此一句諸說不同一云心一境者世俗唯識境不離心名心一境或唯一心名心一境心一境性者勝義唯識謂一切法唯一真性名心一境性一云性言亦通世俗故成唯識第九卷云謂唯識性略有二種一者世俗謂依他起二者勝義謂圓成實深密經云觀心一心世尊云何心相釋曰自下第二重釋三種所緣差別釋三所緣即分為三此問第一善男子謂三摩地所行有分別影像毗鉢舍那所緣釋曰如來正釋謂即如前所說心相是三摩地所行影像亦即觀心所行境也世尊云何無間心釋曰問第二境善男子謂緣彼影像心奢摩他所緣釋曰如來正說緣彼影像聞思二慧相應相分之心是奢摩他所緣境界世尊云何心一境性釋曰此問第三善男子通達三摩地所行影像唯是其識或通達此已復思惟如性釋曰如來正說謂於此時通達諸法皆不離識如是觀已復思惟如謂前二種心境別觀止觀不俱此第三門心境合緣止觀俱轉廣釋止觀二道俱轉如瑜伽第三十一廣釋心一境性如瑜伽第三十也慈氏菩薩復白佛言世尊毗鉢舍那凡有幾種釋曰自下第八止觀種數差別門於中有二先觀後止觀中有二先問後答此即問也佛告慈氏菩薩曰善男子略有三種釋曰第二世尊正說於中有三標數列名別釋此即初也一者有相毗鉢舍那二者尋求毗鉢舍那三者伺察毗鉢舍那釋曰第二依數列名云何有相毗鉢舍那釋曰自下第三次第別釋釋三別相即分為三此初問也謂純思惟三摩地所行有分別影像毗鉢舍那釋曰此即正釋第一有相謂純思惟有分別影像似法似義從境立名名為有相云何尋求毗鉢舍那釋曰此問第二謂由慧故遍於彼彼未善解了一切法中為善了故作意思惟毗鉢舍那釋曰此即正說謂由慧故遍於影像有相境中未善解處為欲了故作意思惟云何伺察毗鉢舍那釋曰此問第三謂由慧故遍於彼彼已善解了一切法中為善證得極解脫故作意思惟毗鉢舍那釋曰此即正釋謂於彼境已善解了為欲證得極解脫故作意思惟依瑜伽論第三十卷大同此經故彼論云云何名為唯隨相行毗鉢舍那謂於所聞所受持法或於教授教誡諸法由等引地如理作意蹔爾思惟未思未量未推未察如是名為唯隨相行毗鉢舍那若復於彼思量推察爾時名為隨尋思行毗鉢舍那若復於彼既推察已如所安住復審觀察如是名為隨伺察行毗鉢舍那然此止觀差別如瑜伽論第十三云云何止謂九種住心云何觀謂或三事觀或四行觀或六事差別所緣觀三事觀者一者相觀二尋求觀三伺察觀四行觀者謂於諸法中簡擇行觀極簡擇行觀遍尋思行觀遍伺察行觀六事差別所緣觀者一義所緣觀二事所緣觀三相所緣觀四品所緣觀五時所緣觀六道理所緣觀顯揚第四亦同瑜伽解云九種住心二種事觀四種行觀已如前說六種事觀故今釋之故瑜伽論第三十云云何六事差別所緣毗鉢舍那謂尋思時尋思六事一尋思於義謂正尋思如是如是語有如是如是義二尋思於事謂正尋思內外二事三尋思於相謂正尋思諸法二相一者自相二者共相四尋思於品謂正尋思諸法二品一者黑品二者白品尋思黑品過失過患尋思白品功德勝利五尋思於時謂正尋思過去未來現在三時尋思如是事曾在過去世尋思如是事當在未來世尋思如是事今現在世六尋思於理謂正尋思四種道理一觀待道理二作用道理三證成道理四法爾道理問何因緣故建立如是六事差別毗鉢舍那答依三覺故如是建立何等三覺一悟義覺二事邊際覺三如實覺尋思義故起悟義覺尋思其事及自相故起事邊際覺尋思共相品時理故起如實覺修瑜伽師唯有爾所所知境界所謂語義及所知事盡所有性如所有性具說如彼四種道理如後當說慈氏菩薩復白佛言世尊是奢摩他凡有幾種釋曰自下第二辨奢摩他種數多少先問後答此即問也佛告慈氏菩薩曰善男子即由隨彼無間心故當知此中亦有三種釋曰自下正釋於中有三初明三種奢摩他次明八種奢摩他後明四種奢摩他此即第一有相等三言隨彼者前言心相即是所隨相分無間心者即是能隨見分心也此中意說緣彼心相毗鉢舍那有三種故緣無間心奢摩他心亦有三種復有八種謂初靜慮乃至非想非非想處各有一種奢摩他故釋曰第二明其八定即名八止然此八定分之為二初釋四靜慮後明四無色四種靜慮二門分別一釋名字二出體性言釋名者先通後別言通名者薩婆多宗如大婆沙百四十一自有一釋彼云問此四何緣說為靜慮答靜謂寂靜慮謂籌慮此四地中定慧平等故稱靜慮餘隨有𨷂不得此名若依正理第七十三自有兩釋彼云依何義故立靜慮名答由依此寂靜方能審慮故審慮即是實了知義俱舍第二十八亦同一云此定持勝遍緣如理思惟故名靜慮勝言簡欲界遍緣簡無色如理思惟簡妄顛倒能持此定是妙等持說名靜慮此言顯示止觀均行無倒等持方名靜慮依大婆沙第八十卷自有三釋一能斷結二是正觀三具二義故彼論云以何義故名為靜慮有作是說以能斷結故名靜慮問諸無色定亦能斷結應名靜慮答若定能斷不善無記二種結者名為靜慮諸無色定唯斷無記非不善故不名靜慮斷結中更有兩釋恐繁不述復有說者以能正觀故名靜慮問若爾欲界三摩地亦能正觀應名靜慮答若三摩地具有定名定用能正觀者名為靜慮欲界三摩地雖有定名而無定用如埿椽梁有名無用故非靜慮能正觀中更有三釋恐繁不述如是說者要具二義方名靜慮謂能斷結及能正觀欲界三摩地雖能正觀而不能斷結諸無色定雖能斷結而不能正觀故非靜慮復次諸無色定有靜無慮欲界三摩地有慮無靜色定俱有故名靜慮靜謂等引慮謂遍觀故名靜慮是二義中更有兩釋恐繁不述若依大乘意同正理初復次釋故瑜伽三十三云言靜慮者於一所緣繫念寂靜正審思慮故名靜慮言別名者初二三四名為別名故順正理七十七云諸定靜慮總相無別為顯地異就數標名故說為初乃至第四問若善性攝心一境性并伴立為四靜慮者依何相立初二三四答具伺喜樂建立為初漸離前支立二三四離伺有二第二靜慮離伺有喜樂二離二有樂第三靜慮離伺喜二但有其樂具離三種第四靜慮離伺喜樂三如是次第故一境性分為四種問豈諸靜慮無如慈等不共名相而今但就初等四數建立別名答此中非無不共名相然無唯遍攝一地名故但就數以為別名俱舍亦同又俱舍頌云初具伺喜樂後漸離前支問如何頌中不說具尋解云如俱舍論由此已明亦具尋義必俱行故如煙與火非伺有喜樂而不與尋俱若依婆沙百四十一云四靜慮者謂初靜慮乃至第四靜慮有說尋喜樂捨相應靜慮如次為四今依大乘就數列名同順正理故瑜伽云依順次數說名為初乃至第四言出體者薩婆多宗如大婆沙第八十卷四種靜慮各以自地善染無覆無記五蘊為性又婆沙論一百四十一云四靜慮體自有二種一修得二生得修得者即彼地攝心一境性若并助伴即五蘊性生得者隨地所繫餘五蘊為性俱舍二十八正理七十七意同婆沙今依大乘大同婆沙有生及定生即善染無記五蘊為性善用有漏無漏五蘊為性四無色定略以二門分別一釋名字二出體性言釋名者先通後別言通名者薩婆多宗如順正理第七十七有其三義一制約義二兼顯極義三兼顯有義故彼論云依何義故立無色名魯彼言顯可變示義依可變示說名為色阿言即顯能制約義為欲顯示生死海中亦有蹔時制約色處依制約義說名為無由彼界中制約變示依無色義名阿魯彼或此阿言兼顯極義雖於餘界亦有不可變示法而無色界是不可變示中極無在此在彼所依諸色故或此阿言兼顯有義為遮此界唯是色無故說阿言顯有無色謂世亦有唯是遮言亦見有能遮而兼表如何顯此非但是遮故說阿言具顯遮表顯宗亦同若依婆沙一百四十一云問何故此四說名無色答此四地中超過一切有色法故違害一切有色法故色法於此無容生故說名無色言別名者薩婆多宗初空處定如婆沙論第八十四四復次釋彼云但由加行名空無邊處定謂初業者先應思惟墻上樹上舍上等諸虗空相取此相已假想勝解觀察照了無邊空相以先思惟無邊空相而修加行展轉引起初無色定故說此名空無邊處復次法爾初遠離色地名空無邊處復次法爾初解脫色地名空無邊處復次依等流故說此定名空無邊處謂瑜伽師從此定出必起相似空想現前曾聞苾蒭出此定已便舉兩手捫摸虗空有見問言汝何所覓苾蒭答曰我覓自身彼言汝身即在林上如何餘處更覓自身故從此出起虗空想此想即是前定等流是故名為空無邊處具說如彼若依俱舍意同婆沙初復次釋若依正理及顯宗論意同婆沙初三復次言識無邊處者依婆沙論兩復次釋彼云但由加行名識無邊處定謂初業者先應思惟清淨眼等六種識相取此相已假想勝解觀察照了無邊識相以先思惟無邊識相而修加行展轉引起第二無色定故說此名識無邊處復次依等流故說此定名識無邊處謂瑜伽師從此定出必起相似識想現前謂於識相觀悅而住是故名為識無邊處具說如彼俱舍意同初復次釋正理顯宗並同婆沙無所有處者依婆沙論五復次釋彼云問此何故名無所有處答此中無我無我所故問一切地中無我我所何獨此名無所有處答無有餘地能令我執及我所執羸劣穿薄勢力減少如此地者故此獨名無所有處復次此地無有真實常恒不變易法損伏常見勝諸餘地故此獨名無所有處復次此地無有所趣所皈屋舍室宅能為救護摧伏憍慢懈怠放逸勝諸餘地故此獨名無所有處復次此地中無無邊行相初捨彼相故此獨名無所有處尊者世友作如是說於此定中無能所攝行相轉故如說非我有處有時有所屬物亦無處時物屬我者故此獨名無所有處具說如彼正理論云若由勝解捨一切所有加行所成名無所有處謂見無邊行相麤勤為欲厭捨起此加行是故此處名最勝捨以於此不復樂作無邊行相心於所緣捨諸所有寂然住故顯宗亦同言非想非非想者依婆沙論唯有一釋彼云問此何故名非想非非想處答此地中無明了想相亦無無想相故名非想非非想處無明了想相者非如七地有想定故亦無無想相者非如無想及滅定故由此地想闇鈍羸劣不明了不決定故名非想非非想處俱舍正理及顯宗論意同婆沙又正理云此四無色皆言處者以是諸有生長處故謂此四處為有無有生長種種業煩惱故為破妄計彼是涅槃故佛說為生長有處依大乘宗如瑜伽三十三說復次以於虗空起勝解故所有青黃亦白等相應顯色想由不顯現故及厭離欲故皆能超越除遣如是有色有諦種種想已起無邊相虗空勝解由已超過近分加行究竟作意入上根本加行究竟果作意定當知此中依於近分乃至未入上根本定唯緣虗空若已得入上根本定亦緣虗空亦緣自地所有諸蘊又近分中亦緣下地所有諸蘊復次若由此識於無邊空發起勝解當知此識無邊空相勝解若有欲入識無邊處先捨虗空無邊處想即於彼說次起無邊行相勝解爾時超過近分根本空無邊處由彼超過識無邊處所有近分乃至加行究竟作意入上根本加行究竟果作意定復次從識無邊處求上進時離其識外更求餘境都無所得謂諸所有或色非色相應境性彼求境界無所得時超過近分及以根本識無邊處發起都無餘境勝解是則名為於無所有假想勝解即於如是假想勝解多修習故便能超過無所有處一切近分乃至加行究竟作意入彼根本加行究竟果作意定復次從無所有處求上進時由於無所有想起虗想故便能棄捨無所有處想先入無所有處定時超過一切有所有想今復超過無所有想是故說言非有想謂或有所有想或無所有想非無想謂非如無想及滅盡定一切諸想皆悉滅盡唯有微細想緣無相境轉即於此處起勝解時超過一切近分根本無所有處及非想非非想處近分乃至加行究竟作意入彼根本加行究竟果作意定若廣分別如顯揚第二言出體者薩婆多宗如順正理第七十七四無色體總而言之亦善性攝心一境性以為自性然助伴中此除色蘊無色無有隨轉色故是故四蘊以為自性若依婆沙第八十四亦有二種謂定及生此中定者謂無色定生者即說無色界生若生彼處無覆無記受想行識此言說彼四蘊異熟以為自性若依婆沙一百四十一亦同彼云四無色體亦二種一修得二生得修得者即彼地攝心一境性若辨助伴即四蘊性生得者即彼地繫餘四蘊為性依大乘宗總相出體同薩婆多而差別者亦有色蘊定境界色通無色故勘無作色復有四種謂慈悲喜捨四無量中各有一種奢摩他故釋曰此即第三釋四種止謂四無量相應定故然四無量略以二門分別一釋名字二出體性釋名有二先通後別言無量者即是通名薩婆多宗如大婆沙第八十一四復次釋彼云問何故名無量無量是何義答普緣有情對治無量戲論煩惱故名無量戲論有二一見煩惱二愛煩惱故名戲論煩惱也復次普緣有情對治無量放逸煩惱故名無量欲界煩惱名為放逸煩惱復次如是四種是諸賢聖廣遊戲處故名無量復次如是四種能緣無量有情為境故生無量福故引無量果故故名無量若依婆沙第一百四十一俱舍二十九正理七十九同前婆沙第四復次依大乘宗如顯揚第四以其三義釋無量名一廣二大三者無量廣者於見所行作意故大者於聞所行作意故無量者於覺知所行作意故如是三義遍緣一方乃至十方無邊器世間及有情世間故名無量言別名者一慈二悲三喜四捨薩婆多宗如俱舍論第四卷云慈名與樂悲名拔苦喜名欣慰捨名平等大毗婆沙復作是說授與饒益是慈相除去衰損是悲相慶慰得捨是喜相忘壞平等是捨相依大乘宗如顯揚說慈無量者謂慈心俱慈心俱者於無苦無樂眾生欲施樂具阿世耶心相應故悲無量者謂悲俱心悲俱心者於有苦眾生欲拔苦具阿世耶心相應故喜無量者謂喜俱心喜俱心者謂於有樂眾生隨喜彼樂阿世耶心相應故捨無量者謂捨俱心捨俱心者欲令不染阿世耶心相應故言出體者薩婆多宗如大婆沙八十一說慈悲無量自有兩說有說慈悲俱以無瞋善根為性對治瞋故兼取相應隨轉性者欲界四蘊色界五蘊而差別者慈對治斷貪瞋悲對治捶打瞋有作是說慈以無瞋善根為性悲以不害善根為性對治害故喜無量性自有二說一云喜以喜根為性四蘊五蘊准上應知問若喜無量以喜根為性者品類之說當云何通如說云何喜無量謂喜及喜相應受想行識若彼所起身語二業若彼所起心不相應行皆名為喜豈有喜受與受相應答彼文應說謂苦及喜相應想行識不應言受而言受者是譯者謬復次彼論總說五蘊為喜無量自性雖喜受與受不相應而餘心心所法與受相應故作是說亦不違理有餘師說此喜無量欣為自性欣體非受別有心所與心相應有說喜根相應有說喜後生若作是說喜受相應亦不違理捨以無貪善根為性四蘊五蘊准上應知婆沙百四十一亦同俱舍二十九云四中初二體是無瞋理實應言悲是不害喜即是受捨即無貪眷屬五蘊正理七十九餘三無量同俱舍論喜同婆沙餘師所說欣為自性或以無貪以為自性問答分別如大婆沙依何義故契經中說修四無量慈極至遍淨悲極至空無邊處喜至識無邊處捨至無所有處云何色界法能招無色果又四靜慮無不有慈何緣修慈唯極遍淨有餘於此倦於思尋仰推慈尊當解此義傳聞具壽迦多衍尼子曾以此義問設摩達多彼尊尋思便入寂定至明清旦欲為解釋時衍尼子復入寂定時未會遇各般涅槃由此迄今無能釋者毗婆沙者作是釋言應知此經依相似說謂樂受法與慈相似慈作與樂行相轉樂至遍淨上地皆無故說修慈極於遍淨求離苦法與悲相似悲作拔苦行相轉故色身能作麤苦生因有身便有斷首等故空處近分厭離色身故說修悲極於空處輕安樂法與喜相似喜作安樂行相轉故識無邊處輕安樂增緣自無邊識為門故無邊識相極增安樂故說修喜極於識處能棄捨法與捨相似捨作棄捨行相轉故無所有處由近分中棄捨無邊行相成滿是故說修捨極無所有處乃至廣說三復次釋評取物釋依經部宗立四無量皆慧為性故成實論第二十云問曰此三皆是慈也答曰即是慈心差別三種欲令心等於親捨親於怨捨怨然後於一切眾生慈心平等悲喜亦爾故我先說慈生差別為悲喜等是四無量皆是慧性今依大乘諸教不同依雜集十三四種無量皆以定慧及彼相應諸心心法以為自性若依顯揚第四慈以無瞋善根為體悲以不害善根為體喜以不嫉善根為體捨以無貪無瞋善根為體皆是憐愍眾生法故於四中慈唯無瞋次二無量無瞋一分捨是無貪無瞋一分又復與彼相應等持諸心心法并彼眷屬皆是四無量體若廣分別具如別章問此品中先止後觀如何此上二門先觀後止解云次第有其二種一者觀行次第先止後觀二者言說次第其義不定是故此中依說次第又解觀行自有二義一依止發觀二由觀引止故瑜伽論三十一云由奢摩他為依止故令毗鉢舍那速得清淨由毗鉢舍那為依止故令奢摩他增長廣大由此義故互不相違慈氏菩薩復白佛言世尊如說依法奢摩他毗鉢舍那復說不依法奢摩他毗鉢舍那釋曰自下第九依不依法止觀門於中有三初明依法不依法次明緣法總別門後明緣總差別此即初也於中有二先問後答問中有二初舉所依教後依教發問此即初也云何名依法奢摩他毗鉢舍那云何復名不依法奢摩他毗鉢舍那釋曰第二依教發問問有二意如經可知佛告慈氏菩薩曰善男子若諸菩薩隨先所受所思法相而於其義得奢摩他毗鉢舍那名依法奢摩他毗鉢舍那釋曰自下第二如來正說於中有二初對問正說後由依止下約信法行釋依不依前中有二初釋依法後釋不依此釋依法謂諸菩薩隨先聞慧所受所思十二教法而於其義得止觀者即說名為依法止觀若諸菩薩不待所受所思法相但依於他教誡教授而於其義得奢摩他毗鉢舍那釋曰自下第二釋不依法於中有三初略釋次廣釋後總結此即略釋謂諸菩薩以性鈍故不待所受所思法義要由他教而於義中得止及觀觀青瘀及膿爛等或一切行皆是無常或諸行苦或一切法皆無有我或復涅槃畢竟寂靜釋曰第二廣釋由教誡力五淨境中觀不淨境謂觀青瘀及膿爛等等言等取慈悲觀境乃至別相四念處所行之境或一切行皆是無常乃至皆無有我者釋總相念處已上諸觀於四念處所緣境中總觀無常及無我等是總相念處如是乃至無漏觀中苦無常等或復觀察無學位中涅槃寂靜又解青瘀等者不淨觀中九相觀也大智度論第二十一廣釋九相觀也一切行無常等者印是四法印觀法相揩定不易之義名為法印故莊嚴論第十一云四法印者一者一切行無常印二者一切行苦印三者一切法無我印四者涅槃寂滅印名為四法優陀那菩薩藏經名四法鄔拕南鄔拕南者此云標相如說無常是有為法標相苦是有漏法標相無我是一切法標相涅槃寂靜是無為法標相舊云憂陀那者訛也嗢拕南者嗢此云集拕南此云施舊云檀那者訛也謂集諸句義施於學者故名集施或翻攝散攝廣散義集在頌中令眾易知故言攝散今云鄔拕南者故是標相成實論第二智度論三十二名三法印除前苦印也若廣分別四法鄔拕南義如菩薩藏經第二善戒經第七地持論第八瑜伽三十六如是等類奢摩他毗鉢舍那名不依法奢摩他毗鉢舍那釋曰第三總結可知由依止法得奢摩他毗鉢舍那故我施設隨法行菩薩是利根性釋曰自下第二約信法行釋依不依於中有二初釋依法後辨不依此即初也謂依止法得止觀者以利根故如來說為隨法行者由不依法得奢摩他毗鉢舍那故我施設隨信行菩薩是鈍根性釋曰此釋不依從他教誡得止觀者以鈍根故如來說為隨信行者然信法行諸說不同薩婆多宗如契經說有七種人信行法行信解見至身證慧解脫俱解說在見道位鈍根名隨信行利根名法行修道位中鈍根名信解利根名見至得滅定者名為身證無學位中未得滅定名慧解脫已得滅定名俱解脫具如諸論依經部宗信法二行在見道前至見道位名無相行故成實論第二卷云行須陀洹者有三種人一隨信行二隨法行三無相行隨信行者若人未得空無我智信佛語故名信行法行者此人得無我智在四善根隨順法行是名法行此二行人入見諦道見滅諦故名無相行解云准此信法二行在見道前今依大乘諸教不同依智度論第四十云見道十五心利根名法行鈍根名信行即此二人亦名無相行若依雜集第十三卷信法二行在資糧位見道十五心鈍根名信行利根名法行即此十六心後名信解見至故彼論云隨信行者謂資糧已具性是鈍根隨順他教修諦現觀隨法行者謂資糧已具性是利根自然隨順諦增上法修諦現觀信解者謂隨信行已至果位見至者謂隨法行已至果位解云已至果位名為信解見至故知在見道十五心位名信法行顯揚第三瑜伽第二十六亦同雜集而瑜伽五十八卷在見道前名信法行在見道位名無相行者亦不相違所以者何若說無相行人信法二人在見道前若不說者即信法行亦通見道若論菩薩無文正判准義釋者地前地上於理無違更不別立信解等故慈氏菩薩復白佛言世尊如說緣別法奢摩他毗鉢舍那復說緣總法奢摩他毗鉢舍那釋曰自下第二正明緣法總別門於中有二初問後答問中有二初舉所依教後依教發問此即初也云何名為緣別法奢摩他毗鉢舍那云何復名緣總法奢摩他毗鉢舍那釋曰第二依教發問問有二意如文可知佛告慈氏菩薩曰善男子若諸菩薩緣於各別契經等法於如所受所思惟法修奢摩他毗鉢舍那是名緣別法奢摩他鉢鉢舍那釋曰自下如來正答於中有二先答緣別後釋緣總此即初也文有二節先釋後結然釋此文自有兩說一云緣於各別者十二部教各別異故名為各別非一云部各有多種故言各別言契經等法者正出十二部各別境體若依此釋若別若總緣一一部名為緣別若依此釋後三總中第一小總於此中攝一云緣於各別者於一一部各有多種謂有十二各別義故故言各別非十二部別名為各別言契經等法者出十二種各別境也若依此釋要具二義方名緣別一者部別二者類別若依此釋此別緣中不攝小總此中意說緣於各別契經等法如前所說聞慧所受思慧所思文義法上修習止觀是名緣別若諸菩薩即緣一切契經等法集為一團一種一分一聚作意思惟釋曰自下第二釋緣總法於中有二先釋後結釋中有三初攝別為總作意思惟次釋思惟相後結修止觀此即初也釋此經文亦有兩說一云即緣一切契經等法為一團等者總攝十二部以為一團故言一切要具十二乃名一切一云一切含有三義一於一一部皆有多種故言一切二者攝十二部合為一團故言一切三者總攝無量十二部教故言一切故下經文於此總中開為三種謂小總等於二說中後說為正順後文故團積分聚義一名異此中意說謂緣一切契經等法集為一團作真如解而修止觀名緣總法止觀故無性攝論第六卷云論曰為何義故入唯識性由緣總法出世止觀智故無性釋云由緣總法者緣一切法總相所顯真如為境謂大乘教中所說一切法皆真如為性故緣真如時即是解了一切法性緣一切法時即是緣真如此一切法隨修真如趣向真如臨入真如釋曰自下第二釋思惟相於中有二初思惟教有三勝用後思惟教宣說善法前中有二初約真如理思惟三用後約菩提等思惟三用此即初也謂諸菩薩作意思惟十二分教有其三用一隨順真如二趣向真如三臨入真如謂此聖教順正理故入正理故又解由聖教故得三種慧聞慧隨順思慧趣向修慧臨入又解由聖教故得三方便隨順者真如中遠方便也趣向者近方便也臨入者最後方便後准此釋然此三句瑜伽三十二約念住門說此三句三十三約靜慮定說此三句大般若三百一十六等亦說三句隨順菩提隨順涅槃隨順轉依及趣向彼若臨入彼釋曰第二約菩提等顯其三相謂此三相於三處轉一者菩提二者涅槃三者轉依十二分教對此三法皆有隨順趣向臨入三種勝用准上應知問涅槃轉依有何差別解云涅槃即是依真如上離二障義轉依即通菩提涅槃故成唯識第九卷云捨二麤重故便證得轉依護法釋云便能證得菩提涅槃二種轉依又解菩提者有為果也涅槃者涅槃果也轉依者法身果也此一切法宣說無量無數善法釋曰此即第二思惟聖教宣說善法據實聖教具說三性為欲思惟修習止觀故偏說善如是思惟修奢摩他毗鉢舍那釋曰第三結修止觀是名緣總法奢摩他毗鉢舍那釋曰此即第二結總緣法如文可知慈氏菩薩復白佛言世尊如說緣小總法奢摩他毗鉢舍那復說緣大總法奢摩他毗鉢舍那又說緣無量總法奢摩他毗鉢舍那釋曰自下第三釋緣總法差別門於中有三初明緣小總等差別門次明得緣總相具緣門後辨得與通達位地門此即初也於中有二先問後答問中有二初舉所依教後依教發問此即初也云何名緣小總法奢摩他毗鉢舍那云何名緣大總法奢摩他毗鉢舍那云何復名緣無量總法奢摩他毗鉢鉢那釋曰第二依教發問有其三問如文可知佛告慈氏菩薩曰善男子若緣各別契經乃至各別論議為一團等作意思惟當知是名緣小總法奢摩他毗鉢舍那釋曰自下第二如來正說釋三總緣即分為三此即第一緣小總法謂十二中各各別緣謂眾多契經總攝為一乃至眾多論義總攝為一故名小總若緣乃至所受所思契經等法為一團等作意思惟非緣各別當知是名緣大總法奢摩他毗鉢舍那釋曰此即第二釋緣大總文有三節初釋次簡後結就正釋中言若緣者謂此具緣十二分教言乃至所受等者顯緣分齊此意說云是緣十二大總通緣論其分限乃至隨所領受所思惟處十二分教為一團等作意思惟名為大總非緣各別者簡異小總非如小總部部別緣若緣無量如來法教無量法句文字無量後後慧所照了為一團等作意思惟非緣乃至所受所思當知是名緣無量總法奢摩他毗鉢舍那釋曰第三緣無量總文有三節初釋次簡後結就釋中言緣無量如來法教等者此明緣三無量為一團等作意思惟名無量總言三無量者一緣無量如來法教此有多釋一云無量法教者以音聲說無量法故名無量法教言如來者辨能說者一云無量者顯能說者十方三世多如來故名為無量一云無量通於二種謂佛及教二無量名句字等者依聲所發名句字也三無量後後慧照了者舉能緣智辨所緣教顯智非一故言後後故深密云上上智也依成唯識第九卷云展轉訓釋故言後後如何說此三無量為一團等此明所緣法教有其三義一者舉能說人顯所說教二者說名句文正出教體三者約能緣智顯所緣教由此說三非三無量皆是教體然此三種有差別者諸說不同一真諦師金光明記言教法者辭無礙境無量句文字者法無礙境無量智者義辨二無礙體了知其義巧便說故若依成唯識論二十二愚中即當前三無礙一無量所說法義無量解無量名句字者法無礙解後後慧辨者辭無礙解即於言音展轉訓釋依深密云無量上上智慧樂說辨才解云若准彼經第三無量具有二辨言上上智者是辭無礙樂說辨才者是辨無礙今依此經意同護法總說意云四無礙解所緣聖教為一團等作意思惟問三總緣有何差別解云有其二說一云小總十二部中部部別緣眾多文句第二大總唯緣一類十二分教第三無量通緣一切十二分教一云小總同前所說第二大教唯說一佛十二分教第三無量通緣諸佛十二分教問此三所緣思惟何相解云有其三說一云此三總緣但思惟教如前所說緣契經等為一團等作意思惟有隨順等三種作用及能宣說一切善法一云此三總緣唯思惟如如後所說五種緣中依真如觀融銷一切麤重等故一云含有二義緣教緣如義不違故慈氏菩薩復白佛言世尊菩薩齊何名得緣總法奢摩他毗鉢舍那釋曰自下第二得緣總法具緣門或可得緣總法分齊門於中有二先請後說此即請問齊何緣具名得緣總法止觀佛告慈氏菩薩曰善男子由五緣故當知名得釋曰自下第二世尊正說於中有二初標數略答後一者下別釋五緣此即初也具五緣故名得總緣五緣即是攝大乘說五修所得五種果也彼對修故名之為果今望止觀亦名為緣然彼五修攝大乘論雜集十二列五修名而不解釋准無性釋論第七及梁論第十列名解釋故今且依無性釋等辨五修相後釋此經五果差別言五修者攝大乘說謂諸菩薩於地地中修奢摩他毗鉢舍那由五相修何等為五謂集總修無相修無功用修熾盛修無喜之修無性釋云奢摩他者謂能對治散動定毗鉢舍那者謂能對治諸顛倒慧於地地中修此二種皆由五相數數修習五相即是集總修等集總修者謂集一切總為一聚簡要修習集諸教義總為一聚簡取真如要觀修習餘骨璅等事境界觀亦集一切總為一聚要修習為簡彼故說無相修此釋第二修無相意已後四修於集總修義有差別也於離眾相真法界中遣事差別而修習故此釋無相所由定事差別觀無相理雖無相修或有功用為顯此修不藉功力任運而轉故況復說無功用修離作功用任運轉故此釋無功用修也雖無功用任運而修或勝或劣二種不定故復第四說熾盛修言熾盛者即是增勝釋熾盛修雖熾盛修或少所得便生喜之謂且修此餘何用為故最後說無喜之修非但無相及無功用熾盛而修何者為證最上佛果應懃修習此釋無喜足修也解云然此五修體性差別無文正判總相分別正用定慧及俱行法而為自性梁論第十如其次第慧悲正見懃信為性具說如彼大唐大乘二種釋論無此分別雜集十二列五修名而不解釋故彼論云如是五修能得五果何等為五謂息相修和合修無相修無功用修轉相修解云雜集息相修者即當攝論熾盛修也和合修者即總集修彼云無相無功用者即是無相無功用修轉相修者無喜足所以如是二論異者謂覺師子別生道理安置五修如是次第謂觀行者創初入觀息相熾盛是故熾盛迴在第一然此五果本出此經是故無著攝大乘謂具申經文而不別釋世親無性各造釋論釋經五義故依二論正釋經文一者於思惟時剎那剎那融銷一切麤重所依釋曰自下第二別釋五緣即分為五此即第一融麤重果深密經云念念滅一切煩惱身也依無著論即同此經世親釋云謂煩惱障及所知障無始時來熏習種子說名麤重此二障聚由緣總法止觀智力念念銷融此中意取障聚破壞故名銷融或令羸損名銷融無性釋云阿賴耶識名麤重依止損壞彼聚故名銷融今釋二論意趣別者世親說種名為麤重無重無堪任故亦名依止現所依故永斷種子名為破能伏現種名為嬴損無性論意現識為依種現合說名之為聚但損聚中唯種非現故說損壞或可無性意同世親於理無違大業攝論意同世親若依梁論惑障為麤智障為重本識中一切不淨品熏習種子為此二障依法初剎那為次第道第二剎那為解脫道初剎那壞現在惑令滅第二剎那遮未來惑令不生以此文證地地亦斷煩惱障也二者離種種想得樂法樂釋曰此即第二得樂法樂果深密經云離種種相得法樂樂無著論云離種種想得法菀樂世親釋中有兩復次云契經等法住種種性遠離如是種種性想即是證得法菀之樂於中可居故名為菀解云此約離教證真一味名為法樂言契經等法住種種性者十二分教名契經等十二不同名住種種或可契經等法是能詮教住種種性者所詮之義遠離法義種種性想得法菀樂後復次云復有餘義於隨所受尋伺法中不起麤顯領納觀察但由止觀憶念光明而起微細領納觀察解云此依微細觀察義名法菀樂此即復說有尋伺等三種定中第二定也謂離麤顯領納觀察而有微細彼光明念領納觀察名得法菀問如何不取第三無尋無伺名法菀樂解云此依教法領受觀察名法菀樂彼第三者於諸法相都無作意領納觀察是故不名得法菀樂無性釋云離我離法佛等相想菀謂於中可以遊玩法謂法界法即是菀故名法菀於此喜悅名法菀樂證此故名得法菀樂如王宮外上妙菀園遊戲其中受勝喜樂法界亦爾解云無分別智所遊戲處法界園中得無分別智相應喜樂大同世親初復次解而差別者世親唯離契經等想無性具離三寶相想言離我者謂離佛僧言離法者離法寶也依大業論亦同唐本若依梁論即無後釋餘同唐本三者解了十方無差別相無量法光釋曰此即第三解了法光果深密經云如實知十方無量無畔齊者知無量法光明無著論云能正了知周遍無量無分限相大法光明世親釋云謂正了達十方無邊無分限相如善習誦文字光明名法光明無性釋云謂正通達十方無邊無分量相顯照行故名法光明如善誦習文字光明解云二論所說法光明者自有二說一云能誦經者聞此法光於心中現一云能記名句文身能緣之心分明記故名法光明法說亦爾自有二說一云後得所知所現相分名法光明一云照相之見名為法光若准大業及梁朝論以能照智名法光明也四者所作成滿相應淨分無分別相恒現在前釋曰此即第四因智恒現果深密經云所作成就相應清淨分無分別相現前無著論云順清淨分無所分別無相現行世親釋云謂事成辦諸相應法名順清淨分無所分別無相現行此中意取所得佛果名事成辦解云世親取無著意但舉其因而不辨果故舉經中事成辦言加於論上以釋論本若依世親釋此經者所作成辦即是佛果相應已下皆是因名無性釋云當來佛果名清淨分此能引彼故名順為無所分別無相現行解云無性釋無著意清淨分者即是經中所作成辦順及無所分別等皆是因名若依無性釋此經者所作成滿即是果名相應淨分等者皆是因名說淨分者即事分辦經中別舉所作成辦故說相應淨分皆是因名也是故二論意趣不同今此經文依世親釋尋即可知五者為令法身得成滿故攝受後後轉勝妙因釋曰此即第五攝受後因果深密經云為得成就法身證最上勝上勝因也無著論云為令法身圓成滿辦能正攝受後後勝因世親釋云謂第十地法身說名圓滿第十一佛地法身說名成辦一切因中生佛地者最為殊勝是故說言能正攝受後後勝因無性釋云謂第十地說名圓滿若在佛地說名成辦感此之因最為殊勝說名勝因前前諸因所招集故說名後後有云十地名成佛地為滿者便違諸論也解云為令法身得成滿者大業梁朝論屬第四果便違此經餘同唐本釋經已訖而諸論中有同異者自有四種一云立名不配果謂別立果名不以五修別配五果如莊嚴論如後當說二配果不立名謂以五修別配五果不立果名如無性釋故彼云如是五修隨其數量得五種果三立名亦配果謂別立果名亦別配五果如梁攝論故彼云惑滅不生果是總修所得成就佛法果是無相修所得二智果是無功用修所得出離果是熾盛修所得圓滿果是不知足修所得四不立名亦不配果如世親釋大業論及無性第九等若依莊嚴論二種稱讚配攝五果故彼論云何等五功德偈曰念念融諸習身倚及心倚圓明與見相滿淨諸法身釋曰五功德者一者融習二者身倚三者心倚四者圓明五者見相融習者二剎那消融一切習氣聚故身倚者修習輕安遍滿身故心倚亦爾圓明者圓解一切種空離分數故見相者見無分別相為後清淨因故滿淨諸法身者為滿為淨一切種法身常作如是五因故問何時滿何時淨答十地時滿佛地時淨此中應知五種功德前三是奢摩他分後二是毗鉢舍那分問攝大乘等約十地位以釋五果如何莊嚴說在地前解云莊嚴據初學者說在地前攝大乘等依得無漏故說十地若依雜集三種稱讚配攝五果故彼論云復次方廣分中於法三摩地善巧菩薩相云何可知謂由五種因故一剎那剎那消除一切麤重所依二出離種種想得樂法樂三了知無量無分別相四順清淨分無分別相恒現在前五攝受轉上轉勝圓滿成就佛法身因若依雜集第十二卷與攝大乘意趣不同故彼引經即自釋云如是五種依諸菩薩三種稱讚功德說謂奢摩他稱讚功德毗鉢舍那稱讚功德此二俱分稱讚功德奢摩他稱讚功德復有二種一剎那剎那勝進輕安無有間缺遍所依故剎那剎那消除一切麤重所依二勝解諦觀一切教法無有差別同一味故遠離種種蘊界處等諸義相想得契經等喜樂法樂毗鉢舍那稱讚功德亦有二種一隨所釋法無有間缺不忘失故由憶念門於無量無分別相契經等法以慧照了二種依前所有色像無分別無加行相恒現在前第五一種是此二俱分稱讚功德法身謂所知障永斷轉依所攝此於第十地名圓滿於如來地名成就為令法身速得圓滿成就故引殖轉上轉勝等流習氣故名攝受彼因如是五種即顯五修能得五果何等為五謂息相修和合修無相修無功用修轉相修問莊嚴論二種稱讚如何雜集三種稱讚解云所引本經彌勒無著無此分別是故世親與覺師子各生別理釋經五果故不相違慈氏菩薩復白佛言世尊此緣總法奢摩他毗鉢舍那當知從何名為通達從何名得釋曰自下第三得與通達地位門於中有二先問後答此即先問如經可知佛告慈氏菩薩曰善男子從初極喜地名為通達從第三發光地乃名為得釋曰此下第二如來正說於中有二初正答前問後勸初學者此即正答謂初二地已得證如名為通達而未淳熟不名為得或可初地已上諸地皆名通達第三地中得定地故依定發觀亦得淳熟故上諸地皆名為得理實為論於諸地中皆具二義就相顯故作如是說依深密經初地名通達第三地名得善男子初業菩薩亦於是中隨學作意雖未可歎不應懈癈釋曰此即第二勸初學者地前菩薩未能通達亦未能得雖未可歎亦於是中隨學作意而應懃修勿生懈癈慈氏菩薩復白佛言世尊是奢摩他毗鉢舍那云何名有尋有伺三摩地云何名無尋唯伺三摩他云何名無尋無伺三摩地釋曰自下第十有尋伺等差別門於中有二先問後答此即問也此問意云如上所說止觀二種皆尋等三種別相云何名有尋有伺三摩地乃至云何名無尋無伺三摩地三種皆言三摩地者為簡散位故說此言舊諸經論名為覺觀大唐三藏翻為尋伺然此尋伺有差別者薩婆多宗各別有體容互相應依經部宗體類是同說不俱起故成實論覺觀品云有說覺觀在一心者是事不然唯此成實論意非一時起亦非離心有別自性今依大乘皆用思慧以為自性而非相應麤細異故如瑜伽釋第一卷云尋求伺謂伺察或思或慧於境惟求麤位名尋即此二種於境伺察細位名伺非一剎那二法相應一類麤細前後異故佛告慈氏菩薩曰善男子於如所取尋伺法相若有麤顯領受觀察諸奢摩他毗鉢舍那是名有尋有伺三摩地釋曰自下第二如來正說有二復次即分為二初唯就地前辨差別相後通約地上辨差別相前中三別即分為三此即初也謂佛告慈氏如所聞思二慧所取於中尋伺文義法相麤顯領受觀察止觀名有尋有伺三摩地若於彼相雖無麤顯領受觀察而有微細彼光明念領受觀察諸奢摩他毗鉢舍那是無名尋唯伺三摩地釋曰第二辨無尋唯伺相於彼如前總別法相雖無麤顯觀察而有微細憶念彼前總別教法光明之念領受觀察所有止觀名為無尋唯伺三摩地故世親釋第七卷云於隨所受尋伺法中不起麤顯領受觀察但由止觀憶念光明而起微細領受觀察彼光明念者有其多種有依聞慧以釋光明如瑜伽第二十云謂如所聞已得究竟不忘念法名法光明與彼俱行彼相應想名光明想或依三慧以釋光明故瑜伽第十一云法光明者謂如有一隨其所受所思所觸觀察諸法或復修習隨念佛等或說四種如瑜伽第二十八云當知此中有四光明一法光明二義光明三奢摩他光明四毗鉢舍那光明依此四種光明增上名光明想解云如是光明自有二釋一云彼光明者彼所取法同分影像當念顯現名彼光明念即能緣若依此說光明之念名光明念是依主釋一云彼能緣念能顯照了名彼光明若依此釋是持業釋念即光故若即於彼一切法相都無作意領受觀察諸奢摩他毗鉢舍那是名無尋無伺三摩地釋曰第三釋無尋伺相謂即於彼前止觀位所緣諸法任運淳熟都無作意領受觀察名無尋伺三摩地又解此云都無作意者謂於地前學真如觀息諸分別名無作意復次善男子若有尋求奢摩他毗鉢舍那是名有尋有伺三摩地釋曰自下第二通約地上辨差別相於中三段即分為三此即初也此約地前四尋思說謂加行位中煗頂善根尋求自義自性差別名為尋求故名有尋有伺三摩地若有伺察奢摩他毗鉢舍那是名無尋唯伺三摩地釋曰此釋第二無尋唯伺謂忍第一法二種善根如實了知名等四境名為伺察如是名為無尋唯伺三摩地如是尋思及如實智如成唯識及攝大乘及瑜伽論菩薩地中具廣分別若緣總法奢摩他毗鉢舍那是名無尋無伺三摩地釋曰第三釋無尋伺相謂在地上總緣諸法作真如觀離諸尋伺名無尋伺故攝大乘云為何義故入唯識性由緣總法出世止觀智故然此尋伺三地別相義如別事慈氏菩薩復白佛言世尊云何止相云何舉相云何捨相釋曰自下第十一止舉捨相差別門於中有二先問後答此即問也此問意云世尊處處說止舉捨三種別相梵音奢摩他此翻名止守心住境離於散動故名為止毗鉢舍那此翻名觀於法推求簡擇名觀或名為舉離沉沒故梵音優畢叉此翻名捨離沈掉故然今此中且不說觀如是三相其相云何佛告慈氏菩薩曰善男子若心掉舉或恐掉舉時諸可厭法作意及彼無間心作意是名止相釋曰自下第二如來正答答前三問即分為三此答止相謂若菩薩修觀行時若心已掉舉時或恐應掉舉時有二作意一緣可緣法二緣無間心即由如是二種作意令心寂靜名為止相無間心者即前所說是奢摩他所緣境界若心沉沒或恐沉沒時諸可欣法作意及彼心相作意是名舉相釋曰此辨舉相謂若菩薩修觀行時若心已沉沒時或恐應沒沉時有二作意一緣可欣法二緣彼心相即由如是二種作意令心策勵名為舉相言心相者即前所說毗鉢舍那所緣境界若於一向止道或於一向觀道或於双運轉送二隨煩惱所染汙時諸無功用作意及心任運轉中所有作意是名捨相釋曰第三釋其捨相謂一向止或一向觀或於雙運轉道惛沉掉舉二隨煩惱所染汙時諸無功用作意及以任運轉中所有作意是名為捨一向止觀各離沉舉順違二障故亦名捨問無功用及任運轉有何異耶答行相相似但初成就不作功用名無功用復淳熟時任運轉故故名任運如成唯識第六卷中行捨中說平等正直無功用住約初中後三時差別無別行相此亦如是問此三法其體如何解云以定為止以觀為舉所言捨者舊來相傳自有兩釋一云合說止觀以為自體離沉掉故一云十一善心法中捨為自性故成唯識第六卷云云何行捨於精進三根令心平等正直無功用住為體對治掉舉淨住為業准此得知行捨為體雖有兩釋後說為勝然此所說止觀及捨名作意者是隣近釋如四念處雖言是念論體是惡問以觀為舉如何瑜伽第三十一開為四種謂止觀舉捨解云若是舉者必是其觀自有觀門而非是舉謂不對治惛沉等時然此止等差別相者如瑜伽論第三十一止觀舉捨皆有三相謂止止相止時等慈氏菩薩復白佛言世尊修奢摩他毗鉢舍那諸菩薩眾知法知義云何知法云何知義釋曰自下第十二知法知義差別門於中有二初明知法知義後慈氏乃至云何除遣諸相下辨除遣諸相前中有二初約所知明知法知義後慈氏乃至若聞所成慧下明能知智故無性攝論第六卷云大乘法義為聞慧等三種所緣又解初正釋知法知義後慈氏菩薩乃至云何為見下釋知見差別雖有兩釋且依前說就知法知義文別有二先問後答此即問也文有兩節初問所依教後云何下正發問辭佛告慈氏菩薩曰善男子彼諸菩薩由五種相了知於法釋曰自下第二如來正答於中有二初明知法後釋知義就知法中文別有四初標業舉數二依數列名三次第別釋四釋已總結此即初也一者知名二者知句三者知文四者知別五者知總釋曰第二依數列名五中前三知教自性即准此文如來教法名句文身以為自性後二知教總別之義然此總別自有五釋一云知名故名知別若知於句名為知總一云名中有眾多名各各別知名為知別總合了知名為知總句身文身總別亦爾一云各各別知名句文身名為知別總合而知名句文身名為知總一云眾多契經各各別知名為知別總合了知名為知總如前廣說一云知總別者謂能了知緣總別心名知總別非知名等問既云知心何名知法解云如顯揚說能說之者及所為等皆名知文故緣知法心亦名知法云何為名釋曰自下第三次第別釋即分為五皆有問答此即問名謂於一切染淨法中所立自性想假施設釋曰第二正釋謂一切法不出染淨能詮染淨諸法自性想假施設目之為名此中意說一切諸法皆有二義一者自性如說人天及眼耳等目法自性故說為名名從想生故名為想據實諸法離諸名言而假說故名假安立云何為句釋曰自下釋句先問後答此初問也謂即於彼名聚集中能隨宣說諸染淨義依持建立釋曰第二正答謂即於彼名聚集中別有假法能詮染淨差別之義名之為句如說有對無對有見無見等差別之義謂此句法能與所詮為所依故名之為依攝持所詮令不失落故名為持或可依者謂句依義而能顯彼故名為依云何為文釋曰自下釋文先問後答此即問也謂即彼二所依止字釋曰第二正答謂彼文字雖不能詮而能與彼為所依止若離於字二不成故然此三種有差別者梵音南摩此翻為名是歸趣義皈趣所詮故然釋此名諸論不同依毗婆沙有其三義謂隨召合故彼論云何故名名答名者名為隨名為召名為合隨者如其所作即往相應召者為此義立如求便應合者隨造頌轉令與義會五蘊論云諸行自性增語為性集論亦爾雜集釋云自性增語者謂說人天眼耳等事顯揚第一及瑜伽論五十二大同集論又依瑜伽八十一云問名是何義答能令種種共所了知故名為名又能令意作種種相故名為名又由語言之所呼召故名為名顯揚十二亦同瑜伽梵音鉢陀此翻為跡如見鳥跡而表於鳥如是四句表有頌文隨義翻之亦名為句而釋此句諸論不同毗婆沙云顯義滿足名之為句五薀論云云何為句身謂諸法差別增語為性集論亦爾雜集釋云差別增語者謂說諸行無常一切有情當死等義顯揚瑜伽大同集論瑜伽八十一云攝受諸名究竟顯了不現見義故名為句顯揚十二亦同瑜伽梵音便繕那此翻為文此是典語梵音惡剎此翻為字即是俗語恐有不會文字是一故諸處云文即是字集論云文身者謂於彼二所依諸字假立文身雜集釋曰彼二所依諸字者謂自性差別增言所依諸字如𧙃壹鄔等文者能彰義能彰彼二故此又名顯能顯義故此復名字無異轉故所以者何如眼名眼離此名外更有照了導等異名改轉由彼同顯此想故非𧙃壹等字離𧙃壹等差別外更有差別能顯此字故無異轉說名為字無異轉者謂不流轉五蘊所說同集論說顯揚瑜伽亦同彼說瑜伽八十一云隨顯名句故名為文顯揚十二亦同瑜伽論其體者薩婆多宗離聲已外別有自性是不相行薀所攝若廣分別如順正理第十四說若依經部即依音聲假說名等有其三釋一云聲處所攝離聲無別名句等故一云法處所攝意識境故一云聲處法處前二說故今依大乘是不相應行薀所攝是假非實廣如瑜伽雜集等說若廣分別具如別章云何於彼各別了知釋曰自下別釋先問後答此即問也謂由各別所緣作意釋曰第二正說謂由了知名等別相詮用各別名了知別云何於彼總合了知釋曰自下釋總先問後答此即問也謂由總合所緣作意釋曰第二正答謂由了知名等三種總略為一顯所詮義故名知總別有五釋准上應知如是一切總略為一名為知法如是名為菩薩知法釋曰第四總結應知善男子彼諸菩薩由十種相了知於義釋曰自下第二釋所知義於中有二初明止觀知義後明三慧知義又解三慧不入知義中就知義中文別有四一約十義以明知義二約五義以釋知義三約四義以釋知義四約三義以釋知義就十義中文別有四一標章舉數二依數列名三次第別釋四總結十義此即第一標章舉數一者知盡所有性二者知如所有性三者知能取義四者知所取義五者知建立義六者知受用義七者知顛倒義八者知無倒義九者知雜染義十者知清淨義釋曰此即第二依數列名善男子盡所有性者謂諸雜染清淨法中所有一切品別邊際是名此中盡所有性釋曰自下第三次第別釋別釋十義即分為十就初義中文別有二初正釋後指事類釋此即初也文有三節初牒次釋後結謂所知法不出染淨染淨法中所有一切品類差別攝法周盡名盡所有性如五數蘊六數內處六數外處如是一切釋曰第二指事類釋如五蘊等言即是指事謂一切法自有二種一者一切有為以五數蘊攝有為盡故言盡所有性二者一切有為無為以六內處及外六處如是十二總攝一切有為無為故言盡所有性如是一切者即是類釋如蘊處如是十八數界等亦爾如所有性者謂即一切染淨法中所有真如是名此中如所有性釋曰自下第二如所有性於中有二初略後廣就前略中文有三節初牒次釋後結謂染淨法中一味真如平等法性名如所有性然此二性本出此經而諸論師以義取文種種異說若依顯揚第五及深密經與此經同若依集論第六雜集十一蘊界處三名盡所有性四諦十六行真如四法即三解脫名如所有性故集論云盡所有性者謂蘊界處如所有性者謂四聖諦十六行相真如一切行無常一切行苦一切法無我涅槃寂靜空無相雜集釋云唯有所爾分量邊際是故建立蘊界處三名盡所有性由如是等義差別門了所知境故名如所有性具說如彼解云准上二論釋經意者三科法門攝法周盡名盡所有性由如是等四聖諦理乃至空無願等了所知境名如所有性非真如如名如所有顯揚十六但列其名而不解釋若依瑜伽第二十六與前不同故彼論云云何名為盡所有性謂色蘊外更無餘色受想行識蘊外更無有餘受想行識一切有為事皆五法所攝一切諸法界處所攝一切所知事四聖諦攝如是名為盡所有性云何名為如所有性謂若所緣是真如實性是真如性由四道理具道理性謂觀待道理作用道理證成道理法爾道理解云言不同者集論雜集說四聖諦名如所有如上所說此瑜伽意說四聖諦名盡所有所以然者由四聖諦攝諸染淨依此義故名盡所有各據一義故不相違又集論等不說四種道理名如所有性此論不說四法印等名如所有性者影略互顯亦不相違問豈不真如界處所攝如何不說盡所有性解云據實二性體無寬狹界處能攝一切法故四種道理攝法盡故而就相顯蘊等三法名盡所有七真如等名如所有或可隨相分別有其四句自有盡而非如如薀處等如而非盡如七如等亦盡亦如如四聖諦非盡非如如空華等此復七種釋曰自下第二廣釋七如於中有三初標章舉數次次第別釋後約四平等屬當七如此即初也一者流轉真如謂一切行無先後性釋曰自下第二次第別釋然此七如本出此經而諸論師即依此經諸說不同一依佛地第七三無性論第一十八空論唯約真如分為七種若依此釋實相一如唯持業釋實相即如故清淨真如自有二義一假實別論唯依主釋滅諦是假如即是實滅之如故二攝假從實是持業釋滅即如故餘五唯依主釋謂流轉之真如乃至正行之真如故二依莊嚴十二中邊分別辨中邊第二唯隨相說即流轉等如其自體不失自性名為真如非一味如乃名如也實相一種正實真如清淨二義准前可知餘之五種非正真如若依此釋七種真如皆持業釋三依成唯識論自有二義一唯約真如同佛地等二隨相說同莊嚴等故第八云此七實性圓成實攝根本後得二智境故隨相攝者流轉苦集三前二性攝妄執雜染故餘四皆是圓成實攝若依顯揚第三七種真如皆實真如彼說七如名遍滿故或可隨相分別前三即真如後四即四諦依深密經第三大同此經故不別說若廣分別如三無性論十八空論等釋七真如即分為七此即第一釋流轉如謂一切行無前後性者此有三釋一云一切行中真如實性無前後際故名無前後性一云即說流轉說名真如謂一切行念念生滅未有而有名之為生故名無前已有還無名之為滅名為無後一云諸行流轉無始無終故云無前後依三無性論十八空論皆有三釋恐繁不述二者相真如謂一切法補特伽羅無我性及法無我性釋曰第二釋相真如相謂實相謂一切法上二無我性依成唯識謂二無我所顯實性如何經論有此異者據實無我即是無法所顯實性真如為體而此經中於所顯處說能顯名成唯識等就實而說故說所顯故瑜伽云有為無為名為有無我我所名為無三者了別真如謂一切行唯是識性釋曰第三釋唯識如然釋此如自有兩說若依佛地論等唯識之性名唯識性若依成唯識論有其二義一同佛地更有一釋於一切行唯識觀智故唯識云隨相說者圓成實攝既云隨相是圓成實知是無漏唯識觀智故莊嚴論云唯識如者謂無分別智深密經云唯識真如知有為行皆是心顯揚亦同四者安立真如謂我所說諸苦聖諦釋曰第四釋苦諦如此亦二義謂苦諦實性或即苦諦由集諦因之所成立故名安立或可四諦皆是安立苦諦在初得安立名顯揚第六瑜伽六十四以四義釋安立依深密經名為執著解云是我我所所執處故十八空論名為依止為眾生依處故五者耶行真如謂我所說諸集聖諦釋曰第五釋集諦如亦有二釋准苦應知六者清淨真如謂我所說諸滅聖諦釋曰第六釋滅諦如此亦二釋如上應知七者正行真如謂我所說諸道聖諦釋曰第七釋道諦如二釋可知當知此中由流轉真如安立真如邪行真如故一切有情平等平等釋曰自下第三約四平等屬當七如於中有四此即第一由三如故有情平等所以者何流轉即是十二緣生安立邪行即是苦集由此成立諸有情故由相真如了別真如故一切諸法平等平等釋曰第二由二如故諸法平等一切諸法皆用真如唯識道理為自性故由清淨真如故一切聲聞菩提獨覺菩提阿耨多羅三藐三菩提平等平等釋曰第三由一如故三乘菩提平等平等皆同證得斷煩惱障擇滅涅槃無差別故故諸經說三乘聖者同解脫床此意說云舉所證滅顯能證智有平等義由正行真如故聽聞正法緣總境界勝奢摩他毗鉢舍那所攝受慧平等平等釋曰第四由一如故止觀所證智慧平等此七真如若廣分別具如別章能取義者謂內五色處若心意識及諸心法釋曰第三釋能取義謂能取法即五色根取五境故心意識者即是八識有其二義一通二別俱如前說及彼相應諸心所法亦名能取同一境故廣如集論第二雜集第三所取義者謂外六處又能取義亦所取義釋曰第四釋所取義謂十二處中外六種處除諸心所皆是所取唯是所取非能取故又前能取亦是所取以心心所所取境故若廣分別如集論第二雜集第三建立義者謂器世界於中可得建立一切諸有情界釋曰第五知建立義於中有二先總後別此即是總謂器世界即是建立諸有情處攝持有情故名建立謂一村田若百村田若千村田若百千村田釋曰自下第二別釋建立於中三釋一云此中如其次第即為十段一村田量二大地量三瞻部洲量四四洲量五小千界量六中千界量七大千界量八抅胝界量九無數界量十微塵界量一云於中七段即前七段於大千界文別有四一百千量二抅胝量三無數量四微塵量一云於中有五一村田量二大地量三四洲量四三千大千世界量五十方世界量雖有三釋且依第三此即初也或一大地至海邊際此百此千若此百千釋曰第二辨大地量如文可知或一瞻部洲此百此千若此百千或一四大洲此百此千若此百千釋曰第三明四洲量言四洲者一南瞻部洲從樹立名北廣南狹其相如車南邊唯廣三踰繕那半三邊各有二千踰繕那二東毗提訶洲此名勝身東狹西廣形如半月三邊量等東三百五十三邊各二千三西瞿陀尼此云牛貨形如滿月徑二千五百周圍七千半四北俱盧洲此云勝處或名勝生形如方座四邊量等面各二千隨其洲相人面亦然若廣分別如俱舍第十一十二瑜伽第二等或一小千世界此百此千若此百千或一中千世界此百此千若此百千或一三千大千世界此百此千若此百千釋曰第四辨三千界量於中有三一百千量二抅胝三無數量就百千中文有三節初明小千次明中千後明大千此小中大千例有四節謂一界界千界百千界就此界量諸說不同若依真諦部執記云以一四天下為一數從一數至十十至百百至千為小千世界三倍小千為三千謂一倍至十小千二倍至百千三倍至千千此是三千世界也三千又作三倍增以為大千謂一倍至十三千二倍至百三千三倍至千三千以為大千世界也依真諦師般若記云三千者即舉中千大千即舉後大千以三倍小千故名三千若依長阿含經第十八云千日月千須彌山千四天下千六欲天千梵天是名小千世界千小千界名中千界千中千界名三千大千世界雜阿含十六亦同若依俱舍十一釋有二義初明處量後正明三千大千言處量者彼云夜摩等天宮依處量有幾有餘師說此上四天依處量同妙高山頂有餘師說上倍倍增有餘師言初靜慮地宮殿依處等一四洲第二靜慮等小千界第三靜慮等中千界第四靜慮等大千界有餘師言下三靜慮如次量等小中大千第四靜慮量無邊際言三千者彼云齊何量說小中大千頌曰四大洲日月蘇迷盧欲天梵世各一千名一小千界此小千千倍說名一中千此千倍大千皆同一成壞若依順正理第三十一大同俱舍而差別者彼云此中千小唯舉至梵世故少光等非小千界攝積小千等為中大千故中大千亦不攝彼又言小者是卑下義以除上故如截角牛積小成餘亦非攝彼解云依正理論三千大千唯至梵世聖教唯說至梵世故積小千界成中大故今依大乘諸教不同若依雜集第六佛地第六瑜伽第二智度論第七同前所引長阿含等更無異釋若依顯揚第一大同前說而差別者彼云問何因緣故小千世界名為卑小答由如特牛斷去兩角以缺減故名為卑小如是梵世已下其中所有千世界不如上地故名卑小如是三千世界三灾所壞謂火水風灾解云准此小千不至上地應知中大即通上地又云三千世界三灾所壞故知初禪小千二禪中千三禪大千又依顯揚十八與上少異彼云何因緣故此三千大千世界中有多世界乃至色究竟天而同說為一世界但至梵世謂亦由二因故一同成壞故二建立眾會故解云准此大千世界至第四禪而阿含等至梵世者由二因緣一同成壞謂具之三灾所成壞故二建立眾會謂初禪已下王眾差別攝眾會故問三千世界既通色究竟如何說言三灾所壞立三千界解云且約三灾屬當三千理實而言第四靜慮亦通大千故十地經云八地菩薩多作大梵天王主千世界九地菩薩多作大梵天王主二千世界十地菩薩多作摩醯首羅天王主三千世界依深密經與上小異彼云彼百千彼百千閻浮提彼百千彼百千萬名為一千世界彼一千世界百倍彼百倍千倍彼千倍百千倍名為二千中千世界彼二千中世界百倍千倍百千倍名為三千大千世界者譯異也若依金光明經三千世界通無色界彼云是諸仁王手擎香爐供養經時其香遍布於一念頃遍至三千大千世界百億日月乃至百億非想非非想天解云准此大乘三千大千亦通非想問若爾如何會釋瑜伽等論解云聖教自有二種一者共教如阿含等二者不共教如金光明等就共教中自有兩釋若依順正理等唯約初禪已下說三千界若依顯揚等據實乃至第四靜慮由二緣故故阿含經唯至初定如前已說問三千世界以誰為主答釋此義諸教不同依大品經等輪王為主彼云化作轉輪王領三千世界依大集經魔王為主彼云有魔王領三千世界依法華經初禪梵王為主彼云娑婆世界主梵天王又智度論云三千大千世界主梵天王名尸棄又阿含經等說三千界至初定故依十地經第十地菩薩為主彼云十地菩薩多作魔醯首羅天王主三千大千世界又顯揚論說三千界通色究竟故依仁王經世尊為主故彼上卷云圓智無相三界王金光明經說三千界通無色界故或此抅胝此千抅胝此百千抅胝釋曰第二明抅胝量言抅胝者此云億也故解深密經說名為億智度論亦名為億故第七云百億日月乃至百億大梵是名三千大千世界又瑜伽第二云百抅胝四大洲乃至百抅胝梵世間名三千大千世界故知抅胝即是億也依婆沙論一百七十七云積一至百千名洛叉百至百千名俱胝百千俱胝名那庾多依俱舍論第十二云十一為十十十為百十百為千十千為萬十萬為洛叉十洛叉為度洛叉十度洛叉為俱胝十俱胝為末陀十末陀為阿庾多依智度論第四卷云一一名二二二名四三三名九十十名百十百名千十千名萬千萬名億千萬億名那由他解云抅胝傳釋有三一者十萬二者百萬三者千萬謂此一抅胝三千大千世界或至百數或至千數或百千數或此無數此百無數此千無數此百千無數釋曰第三辨無數量梵音阿僧企耶此云無數依大婆沙及俱舍論六十數中第五十二名為無數依智度論云天人中能知笇數極數不復能知是名一阿僧祗具說如彼依華嚴經僧祗品說百二十轉中第一百三名阿僧祗謂此一無數三千大千世界或至百數或至千數或百千數或三千大千世界無數百千微塵量等於十方面無量無數諸器世界釋曰第五明十方界量一三千世界二無數百千三千世界三微塵量等十方無量三千世界故顯揚云三千世界無數百千世界極微塵等十方無量無數世界又解一方無數百千微塵量等三千世界十方無量無數三千世界皆說名為建立義也受用義者謂我所說諸有情類為受用故攝受資具釋曰第六知受用義謂諸有情為受用故具足攝受十身資具故瑜伽論第二卷云云何十種身資具一食二飲三乘四依五莊嚴具六歌咲儛樂七香鬘塗末八什物之具九照明十男女受行又解言攝受者七種攝受事言資具者十身資具七種攝受事者如瑜伽論第二卷說云何七種攝受事一自父母事二妻子事三奴婢僕使事四朋友官僚兄弟眷屬事五田宅𨞬肆事六福業事及方便作業事七庫藏事十身資具已如上說顛倒義者謂即於彼能取等義無常計常想倒心倒見倒苦計為樂不淨計淨無我計我想倒心倒見倒釋曰第七釋顛倒義謂即於彼如上所說能取等義七種顛倒名顛倒義此七顛倒如十七地第八卷說彼云顛倒攝者謂七顛倒一想倒二見倒三心倒四於無常常倒五於苦樂倒六於不淨淨倒想倒者謂於無常苦不淨無我中起常樂淨我妄想分別見倒者謂即於彼妄想所分別中忍可欲樂建立執著心倒者謂即於彼所執著中貪等煩惱當知煩惱略有三種或有煩惱是倒根本或有煩惱是顛倒體或有煩惱是倒等流倒根本者謂無明顛倒體者謂薩迦耶見邊執見一分見取戒禁取及貪倒等流者謂邪見邊執見一分瞋慢及癡此中薩迦耶見是無我我倒邊執見一分是無常常倒見取是不淨淨倒戒禁取是於苦樂倒貪通二種謂不淨淨想及於苦樂倒若廣分別如俱舍十九順正理四十七婆沙一百四及四倒章無倒義者與上相違能對治彼應知其相釋曰第八釋無倒義返上應知雜染義者謂三界中三種雜染一煩惱雜染二業雜染三生雜染釋曰第九明雜染義文有三節初牒章門次標其數後列其名若依無性攝大乘釋第二卷云言雜染者是渾是不淨義雜染有三一煩惱所作二業所作三生所作解云煩惱不靜亂心名渾業性造作令心不澄稱之為濁生死有漏是名不淨又顯揚論第一卷云煩惱雜染者謂一切煩惱及隨煩惱合名煩惱雜染業雜染者謂或因煩惱所生或因煩惱緣助善法所生如其所應三界所攝身語意業生雜染者謂因煩惱及業故生因生故苦具說如彼若廣分別如瑜伽論第八第九清淨義者謂即如是三種雜染所有離繫菩提分法釋曰第十釋清淨義所有離繫菩提分法自有二說一云所有離繫及菩提分法名清淨義是相違釋一云所有離繫之菩提分法舉果顯因是清淨義是依主釋雖有兩說後釋為勝故顯揚論第五卷云清淨義者謂為證三種雜離繫故所修一切菩提分法又攝論云清淨義者是鮮是潔是掃除義清淨有二一世間清淨以有漏道暫時損伏現煩惱故二出世清淨以無漏道畢竟斷滅彼隨眠故解云離惑稱鮮離業名潔離生死義是謂掃除善男子如是十種當知普攝一切諸義釋曰第四總結十義能攝諸義如是十義顯揚第五一同此經而差別者彼論七如但列其名而不解釋復次善男子彼諸菩薩由能了知五種義故名為知義釋曰自下第二約五種義以釋知義於中有四一標章舉數二問答列名三次第別釋四總結五義此即初也何等五義釋曰自下第二問答列名於中有二先問後答此即初也一者遍知事二者遍知義三者遍知因四者得遍知果五者於此覺了釋曰第二依數列名於此五中總分為三初二所知境第三能知智即是因行後二即是所證果此中遍知事者當知即是一切所知謂或諸蘊或諸內處或諸外處如是一切釋曰自下第三次第別釋即分為五此釋初義文有三節初牒次釋後類事謂體事謂一切法所知境或是五蘊或十二處十二處中內諸六處外諸六處如是一切者類釋界皆是所知故顯揚云遍知事者謂蘊界處如是等依瑜伽論八十二云遍知事者謂蘊界處緣起念住及正斷等顯揚十三亦同瑜伽遍知義者乃至所有品類差別應知境釋曰第二明遍知義於中有三初總標次別釋後類釋此即初也文有二節初牒後釋謂與前事有差別者前出境體未辨種種義門差別故今此門明義差別謂世俗故或勝義故釋曰自下別釋有十一門此即第一世俗勝義門如集論第一雜集第二云云何世俗幾是世俗為何義故現世俗耶謂雜染所緣是世俗有義一切皆是世俗有言一切者具五薀十二處十八界三十五法故言一切也為捨執著雜染相我故觀察世俗有云何勝義有幾是勝有為何義故觀勝義有耶謂清淨所緣是勝義有義一切皆是勝義有為捨執著清淨我相故觀察勝義有雜集釋云一切皆是勝義有者以一切法不離真如故若廣分別如二諦章或功德故或過失故釋曰第二功德過失門謂四無量等及百四十不共佛法名為功德五逆十惡四重煩惱等名為過失故下經云過失者諸雜染法功德者諸清淨法中邊論曰涅槃名功德生死名過失緣故世故釋曰第三四緣分別門第四三世分別門言四緣者如瑜伽論第三卷云又有四緣者一者因緣謂諸種子二等無間緣謂若此識無聞諸識決定生此是彼等無間緣三所緣緣謂諸心心法所緣境界四增上緣謂除種子餘所依如眼及助伴法望眼識所餘識亦爾又善不善性能取愛非愛果如是等類名增上緣廣如別章言三世者瑜伽論第三云云何建立三世謂諸種子不離法故如法建立又由與果未與果故若諸法果若以滅相是過去有因未生相是未來已生未滅相是現在又瑜伽五十二云若已與果種子相續名過去界若未與果當來種子相續名未來界若未與果現在種子相續名現在界當知此中如是密意又云過去諸行與果故有未來諸行攝因故有所以者何現在諸行三相所顯一是過去果性故二是未來因性故三自性相續不斷故具說如彼瑜伽五十六亦同辨中邊第二集論第二雜集第三顯揚第九大同瑜伽又成唯識第三卷云應信大乘緣起正理謂此正理深妙離言因果等言皆假施設觀現在法有引後用假立當果對說現因觀現在法有酬前相假立曾因對說現果假謂現識似彼相現如是因果理趣顯然遠離二邊契會中道若廣分別具如別章或生或住或壞相故釋曰第五生等三相門瑜伽三云由緣力故今最初生名生有為相即已生時唯生剎那隨轉故名住有為相生剎那後剎那不住故名無常有為相廣如別章或如病等故釋曰第六病等分別門故瑜伽論八十六云厭背想者復有四行謂於諸行思惟如病如癰如箭惱害如病者謂如有一因界錯亂所生病苦修厭背想如癰者謂如有一因於先業所生癰苦修厭背想如箭者謂如有一因他怨箭所中之苦習厭背想惱害者謂於親財等匱乏中因自耶計所生諸苦修厭背想如是名為修觀行者於諸行中修厭背想又智度論五十四云觀五眾能生諸惱故言如病有人聞五眾如病謂為輕微故言如癰疽有人以癰疽難愈猶或可差故言如箭鏑入體不可得出有人以箭鏑在體雖沉深難拔出良方妙術猶可令出故言常痛惱廣說如彼或苦集等故釋曰第七四諦分別門等言等取滅道二諦此四諦義如前章說或真如實際法界等故釋曰第八真如眾名門言真如者如成唯識第九卷說真謂真實顯非虗妄如謂如常表無變易謂此真如於一切位常如其性故曰真如即是湛然不虗妄義又成唯識第二卷云理非妄倒故曰真如親光釋云由離一切虗妄顛倒假名真如言實際者無性釋云真故名實究竟名際際聲即是邊際言故如事邊際親光釋云分折推求諸法虗假極至於此更不可度唯此是真假立實際言法界者無性釋云法界者謂是一切淨法因親光釋云能與一切善法所依假立法界等者等取空無我等然此眾名諸教不同辨中邊論略舉六名等無我等故彼頌云略說空異門謂真如實際無相勝義性法界等應知廣說如彼集論第一略舉七名謂真如無我性空性無相實際勝義法界廣如彼論及雜集釋攝論佛地亦說眾名而不具足依大般若有十一名謂法界法性不虗妄性不變異性平等性法定法住實際虗空界不思議界或廣略故釋曰第九廣略分別門顯揚第二十云略廣者謂先說一句法後後以無量句轉轉分別顯了究竟此經第五名為總別釋同顯揚如瑜伽論八十一云略義者謂宣說諸法同類相應廣義者謂宣說諸法異類相應復次有二種略義一者名略二者義略如略義如是廣義亦有二種一者名廣二者義廣如世尊言舍利子我所說法或略或廣當知此中顯示世尊於契經中文廣義略於伽他中義廣文略依智度論四十六云諸佛說法有二種或初略後廣為解義故或初廣後略為易持故十住婆沙第三卷云略說者以少言辭苞含多義利根之人聞即開悟廣說者於一事一義中種種因緣為諸鈍根樂分別者敷演解說略廣者亦以一言苞舉廣義又亦種種演敷一義或一向記故分別記故或返問記故或置記故釋曰第十四記差別門如佛地論第六卷說言四記者一一向記二分別記三返問記四嘿置記一向記者如有問言一切生者決定滅耶佛法僧寶良福田耶如是等問應一向記此義決定分別記者如有問言一切滅者定更生耶佛法僧寶唯有一耶如是等問應分別記此義不定反問記者如有問言菩薩十地為上為下佛法僧寶為勝為劣如是等問應反問記汝望何問嘿置記者如有問言實有性我為善為惡石女兒色為黑為白如是等問應嘿置記不應記故長戲論故若廣分別如毗曇第一俱舍論第十九順正理第四十九毗婆沙第十五卷智度論第二十二二十六三十五涅槃經三十五瑜伽論第八十一也或隱密故或顯了故釋曰第十一隱密顯了門如顯揚論第六卷云隱密教者謂多分聲聞藏教顯了教者謂多分大乘藏教瑜伽六十四亦同顯揚依智度論六十五云諸佛事有二種一密二現初轉法輪得聲聞果依顯了教若得菩薩無生忍等依隱密教廣如彼說或可說三性教名為顯了三無性教名為隱密如是等類當知一切名遍知義釋曰第三類釋如文可知言遍知者當知即是能取前二菩提分法所謂念住或正斷等釋曰此釋第三遍知謂即能取前二境界四念住等三十七種菩提分法得遍知果者釋曰第四釋遍知果先牒後釋此即牒也謂貪瞋癡永毗奈耶及貪瞋癡一切永斷諸沙門果自有本云永斷毗奈耶者謬也今勘草本經本瑜伽皆云永毗奈耶也釋曰第四正釋於中有二初釋無為果後釋有為果此即初也毗奈耶者此云滅也即是伏滅此貪瞋癡若永斷者即是正滅用此正滅為沙門果故顯揚云謂永滅貪瞋癡及無遺餘貪瞋癡斷四沙門果及我所說聲聞如來若共不共世出世間所有功德於彼作證釋曰第二釋有為果所謂聲聞及諸如來八解脫等諸共功德力無畏等一百四十不共功德於彼作證問如何不說獨覺功德解云據實亦有獨覺功德故顯揚論通說三乘所有功德而今此經准可知故略不說之或可攝在聲聞藏中於此覺了者謂即於此作證法中諸解脫智廣為他說宣揚開示釋曰第五辨覺了義謂後得智於所證得有為無為所有功德能知能證諸解脫智能廣為他宣說顯示故深密云能知解脫能受解脫為他廣說或可諸解脫智者智體離障名解脫智若依顯揚名受用遍智果釋義同經善男子如是五義當知普攝一切諸義釋曰第四總結如文可知顯揚五義並同此經更無異釋依雜集論第十五卷自有兩文若依前文開為六義釋文少異故彼論云所遍知事謂蘊等所遍知義謂無常等遍知因緣謂淨尸羅守根門等遍知自性謂菩提分法遍知果謂解脫彼證受謂解脫智見集論第七但列六名同雜集論而不解釋若依雜集後文引愛味經釋此五義名同此經釋義有異彼云所遍知事者謂色等遍知義者謂有味等由此差別義遍知色等事故遍知者謂於五取蘊由如是三轉如實遍知言三轉者即於如前所遍知事所遍知義及此遍知名為三轉以於五蘊三度觀度故又解於五蘊中三度觀察故名三轉一者愛味即觀集諦二者過患即觀苦諦三者出離觀滅道或可示轉勸轉證轉名為三轉遍知果者謂從此諸天世間乃至并天人皆得解脫乃至極解脫彼證受者謂自證知我已證覺無上正等菩提善男子彼諸菩薩由能了知四種義名為知義釋曰自下第三約四種義以明知義於中有三先總次別後結此即初也何等四義釋曰自下別釋先問後答此即問也一者心執受義二者領納義三者了別義四雜染清淨義釋曰第二正釋然釋四義自有二說一云心執受義者謂知自心於境執受領納義者如彼三受納之義了別義者謂知諸識了別境義雜染清淨義者知一切法雜染清淨一云此四如其次第知四念處所緣四境謂身受心法而言心執受者舉能執受顯所執身善男子如是四義當知普攝一切諸義釋曰第三總結應知復次善男子彼諸菩薩由能了知三種義故名為知義釋曰自下第四約三種義以釋知義於中有三初總標次列名後別釋此即初也何等三義釋曰自下問答列名此即問也一者文義二者義義三者界義釋曰此即第二依數列名善男子言文義者謂名身等釋曰自下第三別釋三義即分為三此即初義言文義者所謂名身句身文身此名等三有積集義皆名為身或可身者體義謂名等三皆有體故名之為身即此三種能彰顯義皆名為文即是所詮之義故名文義義義當知復有十種釋曰自下第二釋其義義於中有二初標章舉數後依數列名此即初也是前文義所詮義故名為義義一者真實相釋曰自下第二依數列名此即初相謂一切法實相真如故下經云諦實者謂諸法真如解云諦實即是真實相也二者遍知相三者永斷相四者作證相五者修習相釋曰此四種相如其次第苦集滅道四諦相也六者即彼真實相等品類差別相釋曰此第六相即前五相一一皆有眾多義門品類差別七者所依能依相屬相釋曰釋第七相顯揚第五云所依能依相屬相者謂大種是所依造色是能依或可眼等是所依識等是能依或可能詮是所依所詮是能依如是能所互相繫屬名相屬相八者即遍知等障礙法相釋曰辨第八相即是四諦所斷煩惱名障礙法相若依下文謂即於修菩提分法能隨障礙諸染汙相是名彼障礙法相九者即彼隨順法相釋曰辨第九相即是四諦能斷惑智名隨順法相若依下文謂即於彼多所作名彼隨順法相十者不遍知等及遍知等過患功德相釋曰明第十相謂不遍知等煩惱過失及遍知等智慧功德差別之相故下經云彼過患相者當知即彼諸障礙法所有過失彼勝利相者當知即彼諸隨順法所有功德又解總說四諦名真實相故瑜伽論六十四云一諦相教餘之九相名同此經苦諦名遍知相集諦名永斷相滅諦名作證相道諦名修習相十六行差別名即彼真實相等品類差別相說集因苦果道因滅果相稱義名所依能依相屬相因名所依果為能依也說四諦所斷法名為即遍知諦果法相決擇分等名為即彼隨順法相煩惱過失遍知功德名不遍等及遍知等過患功德相若依雜集第十五卷引愛味經具釋十相故彼論云真實相者謂取蘊所攝苦諦相遍知相者謂即於此有味等如實智永斷相作證相者謂從一切世間得解脫由永斷諸障證得轉依故修習相者謂離顛倒心多修習住品類差別相者解云此差別相如其次第釋上五相有差別義也真實相有五種差別謂色乃至識遍知相有三種差別謂味由味故乃至出離由出離故如實知解云三差別者謂味出離如實知若依此釋愛味即是集諦言乃至者即攝過患苦諦出離是滅諦如實知是道諦或可三者一愛味二過患三出離於此三種如實了知名如實知也永斷相作證相各有二種差別謂煩惱解脫苦解脫從此諸天世間乃至并天人皆得解脫者顯煩惱解脫為顯此差別義故次說出離言何以故由餘經言出離云何謂若於是處貪欲永滅貪欲永斷超過貪欲故如是由能生未來苦煩惱得離繫故苦亦解脫為顯此差別義故次說離繫縛極解脫修習相者有二種差別謂見道修道離顛倒心者顯示見道多修習住者顯示修道能依所依相屬相者謂顯示真實相等為後後所依性遍知等障礙法相者謂如是三轉不如實知遍知等隨順法相者謂觀察如所安立色等法中味等相於不遍知等過失相者謂不解脫乃至不證覺無上正等菩提與此相違名於遍知等功德相言界義者謂五種界釋曰第三釋界義於中有三初標章數次依數列名後總結五義此即初也一者世界二者有情界三者法界四者所調伏界五者調伏方便界釋曰第二依數列名莊嚴十二名五無量故彼論云五事無量者一應化事無量由攝一切眾生界故二應淨事無量由攝一切器世界故三應得事無量由攝一切法界故四應成事無量由攝一切可化眾生故五應說事無量由攝十二部經是化主方便故顯揚第三亦名五無量故彼論云一有情無量菩薩思惟無量世界一切有情差別之相或一足二足四足多足有色無色五趣四生等二世界無量菩薩思惟十方無量器世界相染此世界淨或成壞種種形界差別建立等三法界無量菩薩思惟十方無量世界一切諸法自相共相是色非色有見無見等四所調伏無量菩薩思惟十方無量世界有情種種行種種姓或聲聞種性或獨覺種性或如來種性耎中上根勝劣差別等五調伏方便無量菩薩思惟十方無量世界所化有情調伏方便此因說秘密之法方能調伏此因說顯了之法方能調伏此因攝受方便此因折伏方便等方令調伏具說如彼廣如第十經記中說善男子如是五義當知普攝一切諸義釋曰第三總結五義然此結文依經草本瑜伽草本及深密經皆云如是五義若依顯揚第五卷云如是三義普攝諸義如上十義五義四義皆有經數准上知此中三義為勝此經瑜伽兩處草本及深密經皆云五義不放輙迴
