body:
  text: 西明寺沙門圓測撰分別瑜伽品第六之餘慈氏菩薩復白佛言世尊若聞所成慧了知其義若思所成慧了知其義若奢摩他毗鉢舍那脩所成慧了知其義此何差別釋曰自下第二明三慧知義又解就知義中文別有二初約所知明知法知義後明能知上來已釋所知法義自下第二辨能知智於中有二初明三慧知義差別後顯智見二種差別前中有二先問後答此即問也文有二節初發問所依後正發問辭如文可知佛告慈氏菩薩曰善男子聞所成慧依止於文但如其說未善意趣未現在前隨順解脫未能領受成解脫義釋曰自下第二如來正答於中有二先釋後結釋中三慧即分為三此釋聞慧總約六義以辨三慧差別之相此釋聞慧六義差別一依止於文謂此聞慧要由於文而得起故二但如其說謂但如文而取於義非如二慧以義取文三未善意趣謂未善通達聖教意趣四未現在前謂緣境時未得同分影像現前未得定故五隨順解脫謂遠能隨順涅槃解脫或可通攝有為無為二種解脫六未能領受成解脫義謂未證滅以散心位不斷結故思所成慧亦依於文不唯如說能善意趣未現在前轉順解脫未能領受成解脫義釋曰第二思慧六義一亦唯依文義同聞慧二不唯如說了與不了二教別故三能善意趣謂善通達聖教意故四未現在前亦同聞慧五轉順解脫轉謂轉勝勝聞慧故六未能領受成解脫義亦同聞慧謂此思慧對前聞慧三種義同謂第一第四第六三義不同謂第二第三第五若諸菩薩修所成慧亦依於文亦不依文亦如其說亦不如說能善意趣所知事同分三摩地所行影像現前極順解脫已能領受成解脫義釋曰第三辨修慧六義一亦依於文亦不依文謂此修慧緣總別法而取義故亦依於文或時離教而取義故亦不依文二亦如其說亦不如說義同思慧三能善意趣亦同思慧即四秘密四意趣等四所知事同分三摩地所行影像現前由得定故五極順解脫最極順於解脫果也六已能領受成解脫義謂此修慧唯依定發通無漏故斷惑證滅具足六義謂此修慧對前聞慧六皆不同對前思慧二種義同謂第二第三第四義不同謂第一第四第五第六今此經文以六種義顯三慧同異若依瑜伽第八十二以五種因顯其同異故彼論云復有五因謂我當聞所未聞我當聞已研究我當除斷疑網我當棄背諸見我當以慧通達一切甚深句義諸佛世尊說此五種顯聞思修三所成慧清淨方便謂初二種顯聞所成慧次二種顯思所成慧後一種顯修所成慧顯揚十三亦同瑜伽然此三慧諸教不同薩婆多宗聞慧緣名思慧緣名及義修慧緣義故俱舍第二十二云頌曰聞思修所成謂名俱義境長行釋云此三慧相差別云何毗婆沙師謂三慧相緣名俱義如次有別聞所成慧唯緣名境未能捨文而觀義故思所成慧緣名義境有時由文引義有時由義引文未令捨文而觀義故修所成慧唯緣義境以能捨文唯觀義故譬若有人浮深駛水曾未學者未捨所依曾學未成或捨或執曾善學者不待所依自力浮渡三慧亦爾此下述薩婆多義有言若爾思不成謂此既通緣名緣義如次應是聞修所成世親菩薩述餘師意破薩婆多今詳三相無過別者謂修行者依聞至教所生勝慧名聞所成依思正理所生勝慧名思成依修等持所生勝慧名修所成說所成言顯三勝慧是聞思等三因所成由如世間於如命牛等如次說是食草所成世親菩薩述經部義如言食所成命草所成牛若廣分別如雜心第五順正理五十九婆沙三十二及一百八十恐繁不述也依經部宗如成實論二十三云通達語言是聞慧通達義趣是思慧從此二慧能生心喜乃至攝心生如實智是名修慧又二十五三慧品云從十二部經中生名為聞慧若能思量諸經中義是名思慧思惟義已當隨說行若能現前智見是修慧如說行者於定心中見五陰生滅廣說如彼今依大乘大同世親故優婆塞戒經第六卷云慧有三種一從聞生二從思生三從修生從字得義名從聞生思惟得義名從思生從修得義名從修生又瑜伽釋論第一卷云聞所成慧者聞謂聞聞即是耳根發生耳識聞言教故從聞所生解文義慧及慧相應心心所等以為自性思謂思慮即是思數如發生智慧思擇法故從思所生解法相慧及慧相應心心所等以為自性修謂修習即是勝定發生智慧修對治故從修所生解理事慧及慧相應心心所等以為自性問依瑜伽釋聞慧解文及義思慧解其法相修慧解理及事瑜伽十一云聞慧緣法思修二慧緣義又依瑜伽第九十五云由三行相住持聖諦何等為三一由聞慧任持其文二由思慧任持其義三由修慧任持其證具說如彼如此不同如何會釋解云依大乘宗據實而言聞等三慧通解義文如瑜伽釋瑜伽論說聞慧緣思法慧持義等者就相顯說界地事者薩婆多宗欲界唯有聞思二慧色界唯有聞修二慧無色界中唯有修慧如婆沙等依經部宗欲色具三無色唯修故成實論三慧品云問曰是三慧幾欲界幾色無色界答欲色界一切無色界中唯有修慧廣說如彼今依大乘大同薩婆多大品欲界有定有云大乘三慧皆通三界須勘若廣分別具如別章善男子是名三種知義差別釋曰第二總結應知慈氏菩薩復白佛言世尊修奢摩他毗鉢舍那諸菩薩眾知法知義云何為智云何為見釋曰自下第二明智見差別於中有二先問後答此即問也佛告慈氏菩薩曰善男子我無量門宣說智見二種差別今當為汝略說其相釋曰自下第二如來正說於中有二先許後說此即初也若緣總法修奢摩他毗鉢舍那所有妙慧是名為知釋曰第二如來正說於中有二先智後見此即釋智若緣別法修奢摩他毗鉢舍那所有妙慧是名為見釋曰第二別釋見也解云據實二種皆通見智皆有推求決斷義故而於此中為顯二種勝劣差別是故約別名見緣總名智依深密經與此相翻者譯家別故然此智見諸教不同若依俱舍第二十六云八忍非智性自所斷疑未已斷故可見性攝推度性故盡與無生二智非見性已息求心不推度故所餘皆通智見二性已斷自疑推度性故諸有漏慧皆智性攝於中唯六亦是見性謂五染汙見世俗正見為六如是所說聖有漏慧皆擇法故並慧性攝依大婆沙九十五云云何為見答眼根五見世俗正見學無學見云何為智答五識相應慧除無漏忍餘意識相應慧廣說如彼又彼復云諸見是智耶答應作四句一有見非智謂眼根及無漏忍見二有智非見謂五識身相應慧盡無生智除五見及世俗正見餘意識相應有漏慧三有見亦智謂五見世俗正見除無漏忍及盡無生智餘無漏慧即學八智及無學正見此無漏慧及前五見世俗正見皆具見智二種相故第三句攝四有非見非智謂除前相相謂所名若法是前三句所表皆名為相除此餘法為第四句是第四句所表之法此復是何謂色蘊中除眼餘色於行蘊中除慧餘行及三蘊令并無為法為第四句廣說如彼若依經部智見無別故成實論智見品云問曰見智有何差別答曰即是一體無有差別乃至云見智得解了達證皆是一義問曰經曰經中說知者見者則得漏盡有何差別答曰若智初破假名名為智入法位已則名為見始觀名智達了名見有如是深淺差別廣說如彼今依大乘諸教不同若依世親般若論智見合說自有二意一簡比智簡天二眼故彼云悉知便足何故復說如來悉見若不說悉見或謂如來以比智知若爾但言悉見便足何故復說如來悉知若不說悉知或謂如來以肉眼等見功德施論大意亦同依智度論二十六云如從人讀誦分別籌量是名知自身得證是名見譬如耳聞其事猶尚有疑是名知親自目覩了了無疑是名見又智度論八十六云初知名知後深入名見知名未了見名已了知見有四句一有知非見謂盡知無生智除世間正見及五見餘慧皆名知二是見非知謂五見世間正見及八忍餘無漏慧亦名知亦名見離是見知餘法非見非知若依第十十二云云何修定為得智見此中天眼於諸色境能照能觀說名為見能知諸天如是名字如是種類是名為智又瑜伽八十六云問曰智見有何差別答若照過去及以未來非現見境此慧名智照現在境此慧名見又所取為緣此慧名智能取為緣此慧名見又聞思所成名智修所成者此慧名見又能斷煩惱此慧名見煩惱斷已能證解脫此慧名智又緣自相境此慧名智緣共相境此慧名見又由假施設遍於彼彼內外行中或立為我或立有情天龍藥叉健達縛阿素洛揭路荼緊捺洛摩呼洛伽等或立軍林及舍山等以如是等世俗理行緣所知境此慧名智若能取於自相共相此慧名見又尋求諸法此慧名智既尋求已伺察諸法此慧名見又緣無分別影像為境此慧名智緣有分別影像為境此慧名見又有色爾焰影像為緣此慧名見無色爾焰影像為緣此慧名智慈氏菩薩復白佛言世尊修奢摩他毗鉢舍那諸菩薩眾由何作意何等云何除遣諸相釋曰自下第二除遣諸相門於中三初問答分別除遣諸相次世尊如世尊下問答分別堪任觀察後世尊下問答分別難除諸相就除遣相文別有四一問二答三徵四釋此即問也問有三意一由何作意者問能除作意諸作意中由何作意二何等者問所除相三云何除遣諸相者問除相方法作何觀行或可觀行作何識滅深密經云以何等心觀何法相者譯家略也佛告慈氏菩薩曰善男子由真如作意釋曰自下第二如來正答然此答文自有兩釋一云此文地前觀門以答前問答上三問即分為三此答初問謂諸菩薩諸作意中由真如作意深密經云真如觀心解云諸作意者即是瑜伽第十一四十作意中真如作意者即四十作意中真實作意除遣法相及與義相釋曰答第二問謂所除相不過二種即前所說能詮名等及十義等所詮諸法義影像之相或可所執法義之相入真如觀不見彼故若於其名及名自性無所得時亦不觀彼所依之相如是除遣釋曰自下第三辨觀儀試於中有二初約名辨觀後類釋句者此即初也謂諸菩薩觀名之時觀彼諸名及名自性皆自心變假施設有所執實名皆不可得如是觀時非但觀名是無所得亦不觀彼名等所依所執性識又解觀所執名無所得時亦不觀彼遍計所執名等所依依他名等此意說云入真如觀遣所執時依依名等不得顯現故名除遣非謂推求空無自性說名除遣故無性攝論第八卷云無分別智現起智行時一切境義皆不顯現又依顯揚第二十真如觀中遣所執時依他不現名無所得故彼論云第三不顯現無所得者推求諸法不見自性非一切種都無所得然於遍計所執自性無所得時亦不觀彼依他自相由不觀故依他不現如於其名於句於文於一切義當知亦爾釋曰第二類釋句等於中有二初類釋句文及十種義後得乃至下類釋五義四義三義或可前文至於四義乃至已下類釋三義此即第一類釋句文及十種義謂如其名及名自性無所得時亦不觀彼所依之相如是句文乃至十義一一自性皆無所得及不觀彼所依之相如前應知乃至界及界自住無所得時亦不觀彼所依之相如是除遣勘草本經及草本瑜伽皆云及知於界及界自性自餘經論皆云乃至於界以義取文乃至為勝釋曰第二類釋五義等謂從乃彼五義四義及三義中文義義至於五界或可乃彼文義義義至於界義皆有二義一觀自性無所得二亦不觀彼所依之相准上應知如是觀門如成唯識第九卷說故今略述唯識論意彼論且依四種尋思四如實智觀彼名義謂煗頂位依四尋思觀所取名義自性差別皆不可得四如實智觀彼能取名義之識亦不可得故彼頌曰現前立少物謂是唯識性以有所得故非實住唯識長行釋云為入見道住唯識性復修加行伏除二取謂煗頂忍世第一法此四善根依四尋思四如實智初後位立四尋思者尋思名義自性差別假有依他實無所執性也如實遍知此四離識及識非有名如實智依明得定發下尋思觀無所取立為煗位謂此位中創觀所取名等四法皆自心變假施設有實不可得依明增定發上尋思觀無所取立為頂位謂此位中重觀所取名等四法皆自心變假施設有實不可得依印脩定發下如實智於無所取決定印持無能取中亦順樂忍既無實境離能取識寧有實識離取境所取能取相待立故依無間定發上如實智印二取空立世第一法謂前上忍唯印能取空今世一法二空雙印如是煗頂依能取識觀所取空下忍起時印境空相中忍轉位於能取識如境是空順樂忍可上忍起位印能取空世第一法雙印空相皆帶相故未能證實故說菩薩此四位中猶於現前安立少物謂是唯識真勝義性以彼空有二相未除帶相觀心有所得故非實安住真唯識理彼相滅已方實安住依如是義故有頌言菩薩於定位觀影唯是心義想既滅除審觀唯自想如是住內心知所取非有次能取亦無後觸無所得釋此二頌如攝大乘釋論第六雜集十一解云經云無名等者煗頂二位觀所取空亦不觀彼所依相者忍及第一觀能取空一云此文地上觀門以答前問謂地上菩薩入真觀時名等自性及所依相都無所得謂證一味境智平等遠離能取所取相故世尊諸所了知真如義相此真如相亦可遣不釋曰此即第三徵詰謂前所說真如作意所緣真如亦可遣不善男子於所了知真如義中都無有相亦無所得當何所遣釋曰第四如來釋通於中有二初正釋後重釋此即初也然釋此文亦有兩說一云此文約地前觀釋通外難謂觀如時都無諸相以無相故亦無所得何所除遣一云此文約地上觀釋通外難謂入真觀時都無所得能所取相故成唯識云次通達位其相云何頌曰若時於所緣智都無所得爾時住唯識離二取相故長行釋云若時菩薩於所緣境無分別智都無所得不取種種戲論相故廣說如彼善男子我說了知真如義時能伏一切法義之相非此了達餘所能伏釋曰第二重釋真如之相非餘所遣此中意說餘一切相以有相故以真如遣證真如時所證真如都無有相不可餘法遣此真如此當無量義經所說實相無相不相無相解云無相不相者無相不遣不相無相者不遣無相世尊如世尊說濁水器喻不淨鏡喻撓泉池喻不任觀察自面影相若堪任者與上相違釋曰自下第二問答分別堪任觀察於中有二先問後答問中有二初問所依教後依教發問前中有二先喻後答此即喻說文有二節初不任觀察喻後堪任觀察喻謂世尊說濁水器喻不淨鏡喻撓泉池喻如是三種不任觀察自面影相故深密經云器不清淨鏡不清淨諸水等濁不見面相清水器喻淨鏡面喻澄泉池喻如是三種如其次第即喻三慧淨水之器照象雖得猶不及鏡故喻聞慧淨鏡雖明無澄靜性故喻思慧水性調柔有澄靜性故喻修慧或可一一通喻三慧如是若有不修心則不堪任如實觀察所有真如若善修心堪任觀察釋曰此第二合如其次第未得三慧之時不善修心則不堪任如實觀察真如之相如濁水等不見自面若善脩心堪任觀察如清水等能見自面此說何等能觀察心依何真如而作是說釋曰第二依教發問問有二意初問能觀察心依何觀心作如是說後問所觀境依何真如作如是說善男子此說三種能觀察心謂聞所成能觀察心若思所成能觀察心若脩所成能觀察心依了別真如作如是說釋曰第二如來正答文有二節初答能觀即三慧心故深密云三種心觀後答所觀即七真如中了別真如然此真如自有二種一者謂一切行唯是識性故名真如此即世俗唯識觀二者唯識之性名唯識性此即勝義唯識觀若在地前觀唯識相初地已上觀唯識性此中通說兩種觀也世尊如是了知法義菩薩為遣諸相勤修加行有幾種相難可除遣誰能除遣釋曰自下第三問答分別難除諸相於中有三初問答分別難除相等次世尊除遣如是十相下問答分別除相解脫後爾時慈氏下問答分別總相空性就難除中先問後答此即正問難除相數及能除空善男子有十種相空能除遣釋曰自下第二如來正說於中有三初標數略答次菩薩徵問後如來廣釋此即初也十種相者此答初問謂難除相略有十種謂此十相觀空除遣非如事別中不淨觀等雖非空觀而除淨等為簡故彼說難言問准下經文有十六相如何但說十種相耶答據實別相有其十六即所了義有十種故攝為十相空能遣者答第二問有十七空是能除遣依深密經有十八空第八相中有五空故何等為十釋曰此即第二菩薩徵問一者了知法義故有種種文字相釋曰自下第三如來廣釋釋十種相以空除遣除遣十相即分為十此即初也於相中有二初標所除相後明能除空此即初也言法義者法謂教法義是境義法即義故是持業釋文字相者謂名句文身通名文字故瑜伽論八十一云謂契經體略有二種一文二義文是所依義是能依云何為文謂名身句身字身故知文者即名句文也此中意說謂諸菩薩初觀行時為欲了知十二部經為境義故即有種種文字相現此由一切法空能正除遣釋曰此即第二辨除空然此諸空諸說不同一依大般若初分第五十一說二十空及四空義故彼經云復次善現菩薩摩訶薩大乘相者謂內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空無性自性空是名菩薩摩訶薩大乘相善現白佛言世尊云何內空佛言善現內謂內法即六內處此中眼由眼空何以故非常非境本性爾故耳等亦爾外謂法外即六外處准上應知內外謂內外法即十二處此中內六處由外六處空何以故非常非境本性爾故外六處由內六處空云何空空佛言空謂一切法空此空由空空何以非常非境本性爾故佛言大空謂十方空佛言勝義謂涅槃此勝義由勝義空佛言善現有為謂三界此中欲界由欲界空色無色亦爾佛言無為謂無生無住無異無滅此無為由無為空畢竟謂諸法究竟不可得佛言無際謂無初中後可得及無往來際可得佛言散謂有放有棄有捨可得佛言無變異謂無放無棄無捨可得佛言本性謂一切法本性若有為法性若無為法性皆非三乘所作亦非餘所作佛言自相謂一切法自相如變礙是色自相領納是受自相取像是想自性造作是行自相了知是識自相如是等若有為法自相若無為法自相佛言共相謂一切共相如苦是有漏法共相無常是有為法共相無我是一切法共相如是等無量共相佛言一切法謂五蘊十二處十八界若有色無色有見無見有對無對有漏無漏有為無為佛言不可得此中一切法不可得謂三世不可得若過去無二世可得若未來無二世可得若現在無二世可得佛言無性空謂此中無少性可得佛言自性謂諸法能和合自性不可得佛言無性不可得佛言無性自性謂諸法無能和合性有所和合自性解云無性者無諸法體性自性者離法體外無能和合性無性自性者合說二種又有四空謂有性無性自性他性有性謂有為無性謂無為自性謂一切法自性空此空非智所作亦非餘所作他性謂若佛出世若不出世一切法法住乃至實際皆由他性故空若依第二分四百一十三釋十八空與前二十空開合有異義無寬狹合二十中散無變異為散無散空合自相空共相空名自共相空若依第三分四百七十九列十九空而不解釋於中前十六空同後十六後之三空即有差別謂所緣空增上空互無空等若依第三分四百八十說十六空於二十空中合自共相名為相空闕散空不可得空自性空名同異者改無變異名無散釋相同二十空若依第二分第四百三卷說有七空一五蘊二十二處三十八界四四諦五十二緣起六有為無為等一切法七本性引名不釋大品第七釋十八空及以四空依智度論第四十六釋十八空及四云問曰十八空內空等後皆云非常非滅故此義云何答曰若人不習此空必墮二邊若常若滅所以者何若諸法實有則無滅義墮常中如人出一舍入一舍眼雖不見不名為無諸法亦爾從未來世入現在世入過去世如是則不滅行者以有為患用空破有心復貴空著於空者則墮斷滅以是故行是空以破有亦不著空離是二邊以中道行是十八空以大悲心為度眾生是故十八空後皆言非常非滅是名摩訶衍若異此者則是戲論狂人於佛法中都無所得如人於珍寶聚中取水精珠眼見雖好價無所直問云第十八空已攝諸空何以故說四空答云十八空中現空盡攝諸佛有二種說法或初略後廣或初廣後略初略後廣為解義故初廣後略為易持故或為後會眾生略說其要或以偈頌今佛前廣說十八空後略說四空廣說如彼若依涅槃第十六釋十一空依大集經第四十八大品第七釋十八空及以四空依顯揚十五及中邊論有十六空楞伽第一智度論三十六有七空依瑜伽十二有四空十八空論說十八空十七空十六空十四空二空具如別章上來已敘諸教今正釋文然依此經有十七空於二十空中闕散自性二空合二十中自相共相為一相空故有十七十八空中闕自性空此即第一一切法空依大般若一切法空者謂五蘊十二處十八界若有色無色有見無見有對無對有漏無漏有為無為此一切法由一切法空依智度論第三十一云一切法空者一切法名五眾十二入十八界等具說如彼依十八空論及中邊論一切法者如十力無畏等令此一切法空為清淨一切佛法今依此經欲攝一切能詮之教故依文字顯一切法空問如何此經但說十相及十七空答准如智度論略即不周廣即事繁故唯十八此亦同彼二者了知安立真如義故有生滅住異性相續隨轉相釋曰辨第二相先相後空此即初也此中所說安立真如者即四聖諦中是苦聖諦即七如中如前所說安立真如業煩惱等所安立故或可安立四諦最初得安立名守性不改故名真如由斯苦諦有生等相相續隨轉亦名真如或可此中有其二相一生等四相二三世相續隨轉相由斯二空各除一相此由相空及無先後空能正除遣釋曰此辨第二能對治空此有二種一相空二無先後空依大般若說此相空開為二空一自相空二共相空故彼經云自相空者謂一切法自相如變礙是色自相領納是受自相等言共相者謂一切法共相如苦是有漏法共相等說此無先後空名無際空故彼經云無際空者無三際可得等依大智度論釋其相空名同此經義同般若廣說如彼無先後空彼云無始空故彼論云無始空者世間若眾生若法皆無有始故名無始空廣如彼說今依此經不同彼說遣四相故名為相故名為相空遣流轉故名無先後空辨中邊第一云生死長遠無初後際十八空論云無前後空亦名無始空廣說如彼三者了知能取義故有顧戀身相及我慢相釋曰此明第三相先相後空此即初也此有二種謂顧戀身相及我慢相由此了知如上所說能取五根及心心所起二種相一顧戀身相謂我根等能取諸法二我慢相由我心等勝於他故此由內空及無所得空能正除遣釋曰此辨能除空此有二種內空無所得空依大般若言內空者內六處空無所得空彼云不可得空不得三世故名不可得大智度論云內空者謂內六入無我無我所無眼等法不可得空者一切法及因緣畢竟不可得名不可得空今依此經由能了知六根能取即有顧戀執著內身而觀內空能正除遣由執我有故起我慢觀無所得空能正除遣無我可得云何起慢又解由二種空通除二相四者了知所取義故有顧戀財相釋曰辨第四相先相後空此辨相也此由如上所說外六處等所取義中有顧戀財相此由外空能正除遣釋云辨能遣空依大般若外空者謂外六處智度論曰外空者所謂外六入無我我所及無六法此經同彼由外六除五者了知受用義男女承事資具相應故有內安樂相外淨妙相釋曰辨第五相先相後空此即釋相謂由了知受用義中受用男女及資具故於男女處是有情故起內安樂想於諸資具非有情故起外淨妙想或可內謂內六處外即外六處於內六處起安樂想於外六處起淨妙相由此內外空及本性空能正除遣釋曰辨能治謂空有其二種內外空及本性空依大般若謂內外六處名內外空謂一切法本性若有為性無為性皆非三乘及餘所作名本性空依智度論內外空者謂內外六入無我無我所無內外法本性空者謂法性常空假來相續故似若不空譬如水性自冷澂皆以火故熱止火停久水即還冷諸法性亦如是未生時空無所有如水性常冷諸法眾緣和合故有如水得火成熟眾緣若非若無即無有法如火滅湯冷問云與畢竟空有何差別論自釋云性空者破諸法性如彼水中無其熱性不無水相畢竟空者破無法相及乃至因緣法相亦無今釋此經諸說不同一云內空除內安樂相外空除淨妙相本性空通除二相一云內外空除內安樂相於中外空一分除淨妙相本性空通除二相一云內外空除內安樂相有情數故云內自身外故云外也本性空除淨妙相一云內外空除內安樂相謂男女等具十二處故內外空除本性空除淨妙相問外淨妙相如何不說由外空除解云據實亦用外空前已說故故不說之六者了知建立義故有無量相釋曰辨第六相先相後空此辨其相謂由前說器世間相建立義故有三千等無量相也此由大空能正除遣釋曰辨能治空涅槃經云般若波羅蜜名為大空依大般若言大空者謂十方空智度論說同大般若而差別者具以六義釋大空名故彼論云問曰十方空何以名大空答云東方無邊故一切處有故遍一切色故常有故益世間故令眾生不迷悶故故名為大如是大方能破名大空具說如彼今依此經大同般若七者了知無色故有內寂靜解脫相釋曰辨第七相先相後空此釋其相謂前第六辨欲色界器世間相今辨無色內寂靜相謂修定者得無色定以為寂靜解脫涅槃是故名為解脫相也此由有為空能正除遣釋曰辨能治空依大般若有為空者謂三界空智度論說有為空者謂因緣和合生陰界等有二義故名之有為空一者無我我所等不可得故空二有為法相空不生不滅無所有故空廣說如彼今依此經亦同般若八者了知相真如義故有補特伽羅無我相法無我相若唯識相及勝義相釋曰辨第八相先相後空此釋相也謂由前說相真如故便有四相謂人無我相法無我相唯識真如及勝義相此由畢竟空無性空無性自性空及勝義空能正除遣釋曰辨能治空依大般若言畢竟空謂諸法畢竟不可得無性空者謂無少性可得無性自性空謂諸法無能和合性有所和合自性勝義空者謂涅槃智度論說畢竟空者以有為空無為空破諸法無有遺餘是名畢竟空無法空者無法名法已滅無故名無法空無法有法空者取無法有法相不可得是名無法有法空復次有人言過未法空名無法空現在及無為法空是二俱空故名無法有法空復次有人言無為法無生住滅是名無法有為法有生住滅是名有法此二空故名無法有法空解云無法空無法有法空者如次名為無性空無性自性空第一義空者第一義名諸法實相不破不壞故是諸法實相亦空何以故無受者故廣說如彼今依此經空遺相者自有三說一云畢竟空破前二相由無性空無性自性空破唯識相由勝義空破勝義空破勝義相一云畢竟空破前二相若執唯識相無性空除若執依他為勝義相由無性自性空除執圓成實勝義空除一云如其次第除前四相所以然者所執我相諸宗共計畢竟空除所執法相無性空除理實法空用諸空除然上所說諸空皆除法空是故此中且舉無性以遺法空為顯諸法不離識故以有性無性遣唯識相由勝義空遣勝義相名義相當意顯可知若依深密解脫說有四相用五空除謂本空無物空自體空無體自體空第一義空解云若准彼經具十八空加無物空或可加本空故故深密云彌勒有十種難修行相依十八空觀彼難修行相九者由了知清淨真如義故有無為相無變異相釋曰辨第九相先相後空此辨相也謂由了前清淨真如是滅諦故了知彼時便有二相一無為相二無變異此由無為空無變異空能正除遣釋曰第二辨能治空依大般若言無為者謂無生無住無異無滅是為無為空無變異者謂無放無辨無捨可得是為無變異依智度論言無為者名無因緣常不生不滅如虗空無變異空彼論不釋今依此經大同般若謂證空時無二相故以二空治十者即於彼相對治空性作意思惟故有空性相釋曰辨第十相先相後空此辨相也然釋此文自有兩說一云即於彼相者謂即次前無變異相及無為相對治空性者謂即次前無變異空及無異空如深密說此意說云菩薩思惟對治二相二空性相現一云即於彼相者謂前九相對治空性者前十六空思惟如上十六空故即有十六空性相現此由空空能正除遣釋曰第二辨能除空依大般若言空空者謂一切法空由空空是名空空依智度論意同般若故彼論云言空空者以空破前內空外空內外空三種空故名曰空空廣說如彼若依中邊第一空智亦空空名云空故彼云謂智能見內處等空空智空故說名空空十八空論意同中邊破前內空外空內外空大空若依涅槃經有無雙遣故無空空故彼云是有是無故名空空是是非是是故名空空遠法師解云因緣之法有無同體以同體故無法為有有法為無有有法為無無為有故有即非有有為無故無即非有非無故曰空空今此經意與前不同自有兩說一云以空遣第九相中無為空無變異空二空性相故曰空空故深密云對治無為空無變異空相故云空空具說如彼一云以空除前十六空相故云空空而深密經但遣二相空者譯家異也世尊除遣如是十種相時除遣何等從何等相而得解脫釋曰自下第二問答分別除相解脫於中有二初問答分別除相解脫後善男子當知就勝下釋外疑難前中有二先問後答此即請問問有二意一問所除相二問從何相而得解脫然初問意三說不同一云如上除遣所執相時更除何相一云如上所說除十相者定散相中依何相說一云如上所執之相是何等相准此三問答亦有三至文當說善男子除遣三摩地所行影像相從雜染縛相而得解脫彼亦除遣釋曰第二如來正答二問今此答文唯前三問亦有三說一云觀空除遣遍計所執十種相時空觀心中仍有依他似空影像隨空心現從此空觀入於證智更除似空影像相分相分既除即從一切雜染相縛種子解脫執解脫心亦皆遠離故言彼亦除遣一云如上所說除十相時唯能除遣三摩地所行依他影像相分由能除遣定影像故即解脫有漏相縛由彼解脫相縛力故能緣見分亦能除遣或可現行相縛解脫力故彼相縛種亦得解脫一云如上所說除遣十相即是依定所現影像所起徧計所執相也謂由三摩地有影像現後散心中依彼影像即隨妄情有所執相故觀空時能除如是所執之相除執相故從雜染相而得解脫由解脫故彼能執心亦名除遣或可護法所說除遣三摩地所行影像者如前所說不現前故名為除遣非無自體故名除遣故瑜伽論七十四云問若觀行者如實悟入遍計所執自性時當言隨入何等自性答圓成實自性問若觀行者隨入圓成實自性時當言除遣何等自性答依他起自性又瑜伽七十三云問修觀行者云何除遣所緣境相答由正定心於諸所知境界影像先審觀察後由勝義作意力故轉捨有相轉得無相又三十六云能斷能捨故名除遣又顯揚十六云除遣修謂如有一思惟三摩地所行影像相故除遣諸法根本性相令不復現依以榍出榍道理猶如有人以其細榍除遣麤榍或以身安遺身麤重瑜伽六十七亦同顯揚善男子當知就勝說如是空治如是相非不一一治一切相釋曰自下第二釋外疑難於中有三謂法喻合此即法說謂外疑難豈不一一能除十相如何別說名除一相故作此答據實一一除一切相就勝說故名除一相譬如無明非不能生乃至老死諸雜染法就勝但說能生於行由是諸行親近緣故釋曰第二喻說如經可知此中道理當知亦爾釋曰第三舉法同喻爾時慈氏菩薩復白佛言世尊此中何等空是總空性相若諸菩薩了知是已無有失壞於空性相離增上慢釋曰自下第三問答分別總相空性於中有二先問後答此即問也言此中何等空性是總空性者正問總空此中問意於三性中何等法空為總性言若諸菩薩等者發問之意謂若了知總性空已便無損減惡取空失由此亦離未證謂證增上慢過爾時世尊歎慈氏菩薩曰善哉善哉善男子汝今乃能請問如來如是深義令諸菩薩於空性相無有失壞釋曰自下第二如來正說於中有二初讚問許說後依問正答前中有三初讚問有益次何以故下顯不問失後是故下勅聽許說此即第一讚問有益何以故善男子若諸菩薩於空性相有失壞者便為失壞一切大乘釋曰第二辨不問失文文有兩節意初何以故者徵詰於空性相無失所由後善男子等者舉失壞相反顯不失若諸菩薩於總空性有失壞者便為失壞一切大乘言一切大乘者如前所引大般若經說十八空等名為大乘然此所說言失壞者如瑜伽論七十三說彼云云何菩薩失壞大乘謂有菩薩聞皆一切法甚深無性即執一切煩惱燒然自性本無謂已無有生死重病譬如有人於己身中所生熱病謂為無病於此熱病不能解脫名為失壞由此譬喻失壞菩薩當知亦爾若依瑜伽第三十六增益損減惡取空者名為失壞彼云有二種人於佛法中俱為失壞一者於色等法於色等事謂有假說自性自相於實無事起增益執二者於假說相處於假說相依於離言自性勝義法性謂一切種皆無所有於實有事起損減執乃至云惡取空者名為失壞廣說如彼是故汝應諦聽諦聽當為汝說總空性相釋曰第三勅聽許說善男子若於依他起相及圓成實相中一切品類雜染清淨遍計所執相畢竟遠雜性及於此中都無所得如是名為於大乘中總空性相釋曰第二依問正答文有兩節初依問正答後如是下結答外問就正答中西方諸師自有兩釋一清辨等云此經三性皆空如經若於依他圓成二種性中一切品類雜染清淨遍計所執畢竟遠離性者顯所執性空及於此中都無所得者顯依他起及圓成實二性空義如是三性都無所得名為總空性相問如何得知亦遣依他彼引經云無有少法生亦無少法滅淨見觀諸法非有亦非無又引兩經一經說云諸法說緣生緣法兩皆無能如是正知名通達緣起若法從緣生此法都無性若法都無性此法非緣生又諸波若皆作此說一切諸法皆不可得乃至法界實際故知圓成亦無所有問若爾契經如何會釋契經頌云遍計所執無依他起性有妄分別失壞墮增減二邊解云名是遍計所執義是依他起性名於其義非有故無義隨世間非無故有不可引此證有依他如是等文不可具述二護法等云於三性中但遣所執非餘二性故此中云於依他起及圓成中一切品類染淨所執畢竟遠離性此明於二性中遠離所執故知但遣所執以顯空性言及於此中都無所得者止濫謂此總空性一切十相皆無所得非如前十六空各遣一相又解遍計所執於二性中畢竟遠離及都無所得又餘經說遍計所執無依他起性有妄分別失壞墮增減二邊又此經中無自性相品云然諸有情於依他起自性及圓成實自性上增益遍計所執自性故我立三種無自性性又大般若經云諸遍計所執性決定非有諸依他起性唯有名相施說言說諸圓成實空無我性是真實有無性攝論第一引此經文又廣百論引經云遍計所執所集所增所取常恒無變易法如是一切皆名為無因緣所生皆說為有如來處處說三自性皆言遍計所執性空依他圓成二性是有故知空教別有意趣不可如言撥無諸法如言取義名謗大乘便惡取空成大邪見如是等經不可具述問若爾如何會釋前所引經遣依他起護法釋云前何經說云無有少法生亦無少法滅者此頌意明遍計所執自性差別能詮所詮其體皆空無生無滅淨見觀諸法非有亦非無者離執淨見觀諸世間因緣所生非無非有會後二經云如是二經說緣生法雖無自性而不相違以從緣生法有二種一者遍計所執二者依他起性此中意明遍計所執自性非有不說依他上來護法等會釋經文清辨引經復作此難若有依他何緣經說一切法性無不皆空又契經云佛告善現色等諸法自性皆無復有經言佛告大慧一切法性皆無有性先有先無不可生故護法通云此有密意密意如何謂此諸經唯破遍計所執自性非一切無若一切無便成邪見云何知有此密意耶結餘契經中顯可說故謂薄伽梵說如是言我唯依於相應自性說一切法自性皆無若有如言而生執著謂染淨法自性皆無彼惡取空名為邪見具說如彼由斯義故世親菩薩二十唯識云非知諸法一切種無乃得名為入法無我然達愚夫遍計所執自性差別諸法我無如是乃名入法無我非諸佛境離言法性亦都無故名法無我又無性攝論第一卷云於無無因強立為有故名增益於有無因強撥為無故名損減乃至彼云於遍計所執唯有增益而無損減都無有故以要於有方起損減於依他起無有增益以有體故要於非有方有增益亦無損減唯妄有故於圓成實無有增益是實有故唯有損減廣說如彼又依瑜伽第三十六及七十五損減依他圓成是無皆說名為惡取空者如前分別又大智度論第三十七云愛多者著有見見多者著無見如是等眾生著有見無見是二種見虗妄非實破中道譬如人行陜道一邊深水一邊大火二邊俱死著有著無二事俱失乃至廣說問此總空性與十七空有何差別解有兩釋一云體無差別總別有異一云此總空性遣所執性前十七空除遣影像故有差別慈氏菩薩復白佛言世尊此奢摩他毗鉢舍那能攝幾種勝三摩地釋曰第十三止觀能攝諸定地門於中有二先問後答此即請問佛告慈氏菩薩曰善男子如我所說無量聲聞菩薩如來有無量種勝三摩地當知一切皆此所攝釋曰此即第二如來正說一切三乘無量諸定當知攝在此止觀中更無別定非此所攝世尊此奢摩他毗鉢舍那以何為因釋曰自下第十四止觀因果作業門於中有三初因次果後業此即因也先問後答此即問也善男子清淨尸羅清淨聞思所成正見以為其因釋曰此第二答謂此止觀得定位故別解脫戒及散位中聞思二慧以為其因世尊此奢摩他毗鉢舍那以何為果釋曰自下第二辨止觀果先問後答此即問也善男子善清淨心善清淨以慧以為其果釋曰自下正答有二復次此即初也清淨心者心言顯定是奢摩他果善清淨慧是毗鉢舍那果此約等流果說若依增上果皆得兩果又云善清淨心善清淨慧者說無漏故名之為善有別本云善清淨戒善清淨心善清淨慧以為其果者謬也而勘草本經論及深密經皆不說戒復次善男子一切聲聞及如來等所有世間及出世間一切善法當知皆是此奢摩他毗鉢舍那所得之果釋曰第二復次重釋其果然釋此文諸說不同一云此文但說聲聞菩薩如來若依此說等言等取諸菩薩也故深密云一切聲聞菩薩諸佛諸獨覺眾非正教授及所化故略而不說一云此中說聲聞言亦攝獨覺餘如前說一云等言通等獨覺及諸菩薩餘如前說總說意云三乘所得世出世間所有諸法皆是止觀所得果也問佛所得果皆是無漏如何說彼名為世間解云世間有二種一體有漏故名世間二者體雖無漏緣世間故名為世間謂後得智相應心等是故世尊有世間法世尊此奢摩他毗鉢舍那能作何業釋云自下第三明止觀作業先問後答此即問也善男子此能解脫二縛為業所謂相縛及麤重縛釋曰如來正說解脫二縛以為其業所謂相縛及麤重縛言相縛者一云相分由有漏相令彼見分不得自在名為相縛此即相是縛名為相縛一云第七末那為相縛體由第七識餘眼等識於所緣相不得自在若依此說相之縛故名為相縛言麤重縛亦有二種一有漏法上無堪任性名麤重縛與有漏法非一非異無別體故名為非異斷不斷異故名非一二者二障種子通名麤重雖有二種意取種子名為麤重若廣分別如勝義諦品已說世尊如佛所說五種繫中幾是奢摩他障幾是毗鉢舍那障幾是俱障釋曰自下第十五止觀諸障差別門於中有四一五繫能障止觀門二五蓋能障止觀門三分別五種散動門四止觀治十一障此即初也於中有二先問後答此即問也於五繫中幾是止障幾是觀障幾是俱障言五繫者依成實論名五心縛煩惱惡法纏心不捨故名心縛一貪己身二貪外五欲三樂與在家出家眾合四於聖語心不喜樂五於善法得少為足若依集論第四釋三拘礙彼云拘礙有三謂貪瞋癡由依三故顧戀身財無所覺了樂處憒丙得少善法便生厭足由此不能修諸善法故名拘礙解云集論如經次第無所覺了即當經說於諸聖教不得隨欲雜集第七先申集論後依五種拘礙釋拘礙義故彼論云又此顧戀身等即依五種心拘礙說何等為五謂顧戀身顧戀諸欲相雜住闕於隨順教誡教授於諸善品得少為足拘礙心故名心拘礙解云雜集與集論異即彼第三以為第四瑜伽第八引其五名而不解釋故今依五以發問辭善男子顧戀身體是奢摩他障於諸聖教不得隨欲是毗鉢舍那障釋曰自下如來正說謂顧戀身及顧戀財如是二種能障於止於諸聖教不得隨欲由斯不能分別教意是故一向障於觀也樂相雜住於少喜足當知俱障由第一故不能造脩由第二故所脩加行不到究竟釋曰此明俱障謂俱障中有其二種一者樂相雜住由斯不能脩止及觀二於少喜足由彼力故所脩止觀不到究竟世尊於五蓋中幾是奢摩他障幾是毗鉢舍那障幾是俱障釋曰自下第二五蓋能障止觀門於中有二初正明五蓋能障止觀後世尊下明止觀二道圓傳門前中有二先問後答此即問也善男子掉舉惡作是奢摩他障惛沉睡眠疑是毗鉢舍那障貪欲瞋恚當知俱障釋曰第二如來正答謂五蓋中掉舉惡作是奢摩他障以散動故惛沉睡眠及與疑蓋是其觀障以不明了不決定故貪瞋俱障根本煩惱障用勝故然此五蓋出體辨相釋名如大婆沙四十八說彼云有五蓋謂貪欲蓋瞋恚蓋惛沉睡眠蓋掉舉惡作蓋疑蓋問此五蓋以何為自性答以欲界三十事為自性謂貪欲瞋恚各欲界五部為十事惛沉掉舉各三界五部通不善無記唯不善者立蓋為十事睡眠唯欲界五部通善不善無記唯不善者立蓋為五事惡作唯欲界脩所斷通善不善唯不善者立蓋為一事疑通三界四部通不善無記唯不善者立蓋為四事由此五蓋以欲界三十事為自性問蓋有何相尊者世友作如是說自性即相相即自性以一切法自性與相不相離故復次躭求諸欲是貪欲相增恚有情是瞋恚相身心沉沒是惛沉相身心躁動是掉舉相令心昧略是睡眠相令心變悔是惡作相令心行相猶豫不決是疑相已說蓋自性及相所以今當說問何故名蓋蓋是何義答障義是蓋義謂障聖道加行善根故名為蓋廣說如彼若依雜集第七卷云能令善品不得顯了是蓋義已上論本覆蔽其心障諸善品令不轉故若依瑜伽說諸煩惱通名為蓋故第八云覆真實義故名為蓋又八十四云於所知事能障智故說名為蓋又依瑜伽第八十九釋立蓋意彼云違背五處當知建立五蓋差別一為在家諸欲境界所標論故違背聖教立貪欲蓋二不堪忍諸同法者呵諫驅擯教誡等故違背所有可愛樂法立瞋恚蓋三由違背奢摩他故立惛沉睡眠蓋四由違背毗鉢舍那故立掉舉惡作蓋五由違背於法論義無倒決釋審察諸法大師聖教涅槃勝解故建立疑蓋廣釋五蓋如大婆沙第三十八四十八成實論第十七雜集第七瑜伽十一及如別章世尊齊何名得奢摩他道圓滿清淨釋曰自下第二明止觀二道圓滿門於中有二先止後觀皆有問答此問止也善男子乃至所有惛沉睡眠正善除遣齊是名得奢摩他道圓滿清淨釋曰第二如來正答謂善男子非如初得但除掉舉及與惡作令圓滿時乃至復除惛沉睡眠乃得圓滿世尊齊何名得毗鉢舍那道圓滿清淨釋曰第二問觀圓滿善男子乃至所有掉舉惡作正善除遣齊是名得毗鉢舍那道圓滿清淨釋曰第二如來正答謂善男子非如初得但除惛沉睡眠乃至亦能除遣掉舉惡作乃得圓滿問如何五蓋障止觀中掉舉惡作障止非觀惛沉睡眠障觀非止令圓滿處與上相違解云止觀各有二障一性相相順障惛沉止掉舉觀是故瑜伽五十八十九等皆云惛沉障止掉舉障觀惛昧輕利性隨順故二性相相飜障惛沉障觀掉舉障止如集論雜集顯揚第一成唯識論第六卷等惛沉與觀掉舉與止性相飜故是故蓋中說相翻障今圓滿中各各雙除順翻二障得圓滿故世尊若諸菩薩於奢摩他毗鉢舍那現在前時應知幾種心散動法釋曰自下第三分別五種散動門於中有二先問後答此即總問止觀起時應有幾種心散動法善男子應知五種釋曰自下正答於中有三初標數略答次依數列名後次第別釋此即初也應知散動總有五種然此散動諸教不同此經說五如經可知依深密經亦明五種名雖有異其義即同故深密經云一正念散亂二煩惱散亂餘三散亂與此經同梁朝攝論亦說五種與此經異故第九云論云能滅除散亂故名持訶此明定度釋曰散亂有五一自性散亂謂五識二外散亂謂意識馳動於外塵三內散亂謂心高下及散味等四麤重散亂謂計我我所等五思惟散亂謂下劣心謂捨大乘思惟小乘也解云五中除相散動加於自性唐世親本無性釋論皆不分別集論雜集第一皆說六種散亂同辨中邊第三中邊第二故辨中邊云散亂有六一自性散亂二內散亂三外散亂四相散亂三麤重散亂六作意散亂具說如彼顯揚十八亦說六種同辨中邊而差別者作意為初第六自性問經說五如何諸論更加自性合說為六解云諸論皆依此經應說五種而別說者除佛果位餘位五識唯散非定是故別說自性散動而經不說自性散動者障定遠故非極故障略而不說梁攝大乘五種散亂有兩種失一者違經二依唐本無性世親皆無此說故不可依以外諸義至文對釋故不重述一者作意散動二者外心散動三者內心散動四者相散動五者麤重散動釋曰第二依數列名善男子若諸菩薩捨於大乘相應作意墮在聲聞獨覺相應諸作意中當知是名作意散動釋曰自下第三次第別釋然此散動略以二門分別後方釋文一釋名字二出體性第一釋名先通後別通名五散動依深密經名五散亂五是標數散動散亂其義是一於作意等令聞心流蕩故名散動即六釋中帶數釋也言別名者有其五種一者作意二者外心三者內心四者相五者麤重言作意者如經捨於大乘相應作意墮在聲聞獨覺相應諸作意中是名作意散動解云經意自有兩說一云即說作意為散動體若依此釋即六釋中持業釋也以彼作意即散亂故一云此經舉二作意能引散動故名作意散動據實即用散亂為體若依此釋即依主釋此有二義依深密經菩薩作意之散動故深密云正念散動一云聲聞作意之散動故辨中邊云下劣心作意雖有二說後說為正故集論云此散亂法有其六種言外心散亂者如經若於其外五種妙欲諸雜亂相乃至於外所緣境中所有尋思隨煩惱中縱心流散解云經意有其三外一外妙五境二諸雜亂相即憒丙相故顯揚云於妙五欲及憒丙相三除前二所餘外境於三境於上散動為體若依此說即依主釋言內心散動者如經若由惛沉及以睡眠或由沉沒或由愛味三摩鉢底或由隨一三摩鉢底諸隨煩惱之所染汙當知是名內心散動解云內心者等持相應內定之心此意說云能障內定有其四種一惛沉二睡眠三者沉沒即說惛沉等業用四愛味三摩鉢底者愛上靜慮及由隨一三摩鉢底所起煩惱能障定內之心故名內三摩鉢底此有兩釋一云即說惛沉等四為散亂體一云由惛等力所引染心所引散動以為自性釋名兩釋准上應知相散動者如經若依外相於內等持所行諸相作意思惟名相散動解云依定外相作意思惟定內離言諸相由此因緣障於止觀名相散動兩種出體唯上應知深密經云依外相內身三昧境界相思惟名相散亂又顯揚云依止外相作意思惟內境相貌如是經論意同此經餘教同異至文當釋言麤重者如經若內作意為緣生起所有諸受由麤重身計我起慢是名麤重解云由計定中喜樂以為我所計麤重身為我起慢又解若內作意為緣生起喜樂受等為所緣境由麤重身種子因緣所生我見我慢於前諸受起我見或起我慢即說見慢相應散亂名為麤重解云二義若依前說依麤重身上起我見等由此因緣所生散亂亦名麤重若依後釋即我見等行相麤故名為麤重此有兩釋一云我見及我慢等名為麤重散動一云所生散亂為散動體第二出體諸說不同若依真諦梁朝攝論記第一卷出五散體不異論文若廣分別如部執記第四卷中邊論記恐繁不述今解作意散動自有兩說一云五遍行中作意為體如是作意與三慧俱或可具通善等三性而雜集論說散亂者舉散亂緣顯其作意一云隨煩惱中散亂為體舉作意緣顯其散亂故雜集云依隨煩惱性散亂說外心散動五欲憒丙及所餘境三種境中縱心流散即隨惑中散亂為體內心散動自有兩釋一云依中邊雜集梁論以三法為體謂沉掉愛味依顯揚論及以此經或以四法為體謂惛沉睡眠下劣愛味諸煩惱或下劣即是沉沒惛睡之用或可五法言下劣者即是懈怠一云由惛掉等力之所染故即起散亂舉惛等緣顯其散亂相散動者定前加行所得諸相以為定內所行之相作意思惟或可依外本質相思惟定內影像相或可相者即矯現相即用作意以為體性一云此中舉作意緣顯其散亂准前可知麤重散動見慢種子名為麤重由此為緣於已生起樂等受中計我我所及以我慢即用現行我見我慢以為體性或可由我見慢便起散亂即用散亂以為體性問上來兩釋若依釋集論雜集如何會釋謂集論說謂散亂體此復六種雜集又云依隨煩惱性散亂說解云彼依性散亂顯散亂體故不相違問若依後說辨中邊等如何會釋謂彼論說自性散亂即是五識解云散亂有其二種一者隨惑散亂唯是染性二者除佛所餘五識非等引故過名散亂即通三性故成唯識第十卷云又說五識性散動者說餘所成者非佛所成故由斯五識亦名散亂故不相違釋義已訖今當釋文就別釋中釋五散動即分為五此即初也大乘作意者依瑜伽論六十七云云何大乘相應作意謂有菩薩住菩薩法性或未證入正性離生或已證入正性離生觀自觀他諸利益事具說如彼聲聞作意者謂有聲聞住法性或未證入正性離生或已證入正性離生不觀他利益事唯觀自利益事廣說如彼顯揚十六亦同瑜伽此中意說未入正性離生菩薩捨大乘相應作意墮在二乘相應作意然此作意諸教不同深密經云捨正念大乘相應相念二乘若依梁論思惟散亂謂下劣心菩薩捨大乘思惟小乘集論說云謂於餘乘餘定若依若入所有流散雜集釋云謂於乘或入餘定捨先所習發起散亂謂依隨煩惱性散亂辨中邊論及顯揚論名為作意依舊中邊名為思惟解云思惟念想皆是作為異名譯家別故立名不同若於其外五種妙欲諸雜亂相所有尋思隨煩惱中及於其外所緣境中縱心流散當知是名外心散動釋曰第二外心散亂文有二節先釋後結然此散亂諸教不同集論說云謂正修善時於五妙欲其心馳散雜集釋云謂方便修聞等善法捨彼所緣心外馳散處妙欲中舊中邊論說於六塵境辨中邊論成唯識等但說於諸所緣令心流蕩依顯揚論緣二種境謂妙五欲及憒閙相依深密經具三種境謂五妙欲及憒閙三處著諸相今依此經約三種境釋外散動言縱心流散者正出三種散亂體謂一五妙欲中縱心流散二諸雜亂相中縱心流散三前二境外所緣境中縱心流散言若於其外五種中縱心流散妙欲者舉第一境順情五塵名妙五欲言諸雜亂相者即憒丙相舉第二境故顯揚云於妙五欲及憒丙相言所有尋思隨煩惱中者顯前二境所有諸隨煩惱通名尋思皆有緣慮尋思用故言及於其外所緣境中者舉第三境前二境外諸根等類名於其外此中應說所有尋思隨煩惱中准可知故略而不說故深密經說三境後有隨煩惱所言中者如理門論是簡持義總說意云於三境上所有尋思諸隨煩惱中簡除忿等餘隨煩惱持取縱心流散一隨煩惱唯外散亂故說中言若由惛沉及以睡眠或由沉沒或由愛味三摩鉢底諸隨煩惱之所染汙當知是名內心散動釋曰第三辨內散動文有兩節先釋後結釋此散動諸教不同故申諸教次釋經文集論說云謂修善時沉掉味著雜集釋云發起沉掉及味著故退失靜定辨中邊云味沉掉者味著等持惛沉掉舉即內散亂梁攝論云三內心散亂謂心高下及噉味等顯揚論云謂或由惛沉睡眠下劣或由味著諸定或由種種定中隨煩惱故惱亂其心深密經云若菩薩為睡不利心著三昧及餘三昧三摩婆提染於所染是名內心散亂於諸教中顯揚同此故依顯揚釋此經文謂散動自有五種一由惛沉二以睡眠三由沉沒顯揚論云下劣心解云心自怯劣無求定心故已下劣心懈怠為體四愛味三摩鉢底梵音三摩鉢底此云等至此明欲界貪異異著上定故名愛味三摩鉢底不同薩婆多唯用上界貪異為愛味定以貪異煩惱不上緣故故顯揚等云慢上靜慮愛上靜慮見上靜慮五者或由隨一三摩鉢底諸隨煩惱者隨八勝處十遍處四無色等能障諸隨煩惱如放逸懈怠等如是五類諸隨煩惱之諸染汙言染汙者令退定故名為染汙故雜集云由沉掉退失靜慮又中邊云自性外緣未得令不得內相二種已得令退麤惑散動令不得解脫第六思惟令不得無上菩提故知沉等已得令退或可中邊一相分別據沈等未得退失皆得成障若依外相於由等持所行諸相作意思惟名相散動釋曰第四辨相散動釋此散動諸說不同集論云謂為他歸信矯示脩善雜集釋云謂欲令他信已有德故現此因緣所脩善法漸更退失辨中邊云矯現相已修定加行故中邊論云下地意未決未息是名相散動解云已得定者雖已得定而下地意未能決絕亦未能息由矯示相退失定為利養故矯示其相顯揚論云相心散亂謂依止外相作意思惟內境相貌深密經云若菩薩依外相內身三昧境界相思惟是名相散亂解云顯揚深密意同此經今此經云於內等持所行諸相者謂正在定內現量所得種種離言境相此意說云依未得定知定外境而謂已得定內境相此即將內同外境相又解未得實定內相而有少相現前執為已得實定內相是名散動若內作意為緣生起所有諸受由麤重身計我起慢當知是名麤重散動釋曰第五釋麤重散動由計定中喜樂以為我所計麤重身為我起慢名麤重散動又解若內作意為緣生起喜樂等受為所緣境由麤重種子為因緣所生我見我慢於前諸受起我見或起我慢即說見慢相應散亂名為麤重故雜集云麤重散亂者依我我所執及我慢品麤重力故修善法時於已生起所有諸受起我我所及與我慢執受間雜取相謂由我執等麤重力故於相已生起樂等受中或執為我或執我所或起我慢由此所修善品永不清淨世尊此奢摩他毗鉢舍那從初菩薩地至如來地能對治何障釋曰自下第四止觀所治十一障門於中有二先問後答此即初也善男子此奢摩他毗鉢舍那於初地中對治惡趣煩惱業生雜染障釋曰自下第二如來正說治十一障分為十一此即第一釋初障十地論第一名凡夫我相障世親攝論第七名異生性障深密第三及此經文但列其名而不解釋梁攝論第十名凡夫性無明略辨體相成唯識第九名異生性障廣釋其相故今且依成唯識論以辨障體且初障體自有二義一隨名出體即用分別二障為體故唯識云異生性障謂二障中分別起者依彼種立異生性故又云執著我法愚即是此中異生性障二就實出體即用二十二愚中初二種愚及彼麤重以為自性故唯識云雖見道生亦斷惡趣諸業果等而今且說能起煩惱是根本故由斯初地說斷二愚及彼麤重一執著我法愚即是此中異生性障二惡趣雜染愚即是惡趣諸業果等等言等取北拘盧洲無想天第八有及惡趣中等流增上果等應知愚品總說為愚或彼唯說利鈍觀障品俱起二愚彼麤重言顯彼二種或二所起無堪任性具說如彼又此經云對治惡趣煩惱業生離染障故知就實初地所治二障等為體會諸教者十地論云凡夫我相障世親論云異生性障梁攝論云凡夫性無明者即當第一執著我法愚而差別者梁論名狹說無明故餘論名寬說障言故深密經云惡道業生煩惱染及此經文即當第二惡趣雜染愚二經三論各舉一愚成唯識論通二愚等故知就實二種愚等以為自性或可二經同唯識論說煩惱言攝所知障以同體故說煩惱名言釋名者異生性障是依主釋依二障種立異生性故惡趣煩惱業生雜障染障是持業釋三種雜染即是障故第二地中對治微細悞犯現行障釋曰此明第二地障所知障中俱生一分及彼所發悞犯三業以為自性現種分別通現及種并取習氣習氣即是無堪任性故唯識云二耶行障謂所知障中俱生一分及彼所發悞犯三業即經所說微細悞犯愚種種業趣愚具說如彼而十地論耶行於眾生身等障世親論云於諸有情身耶行深密經云微細過失及此經云微細悞犯現行者有其三義依持業釋三業為體若依主釋無明為體盡理而說通用三業無明為體若依梁攝論依身業於諸眾生起耶行無明者有其二義若隨名說無明為體據盡理論通用無明及業為體言釋名者若依梁論起邪行無明者是持業釋而此經等名微細悞犯現行等者如前分別亦是依主亦是持業悞犯現行之障或悞犯現行即是障故第三地中對治欲貪障釋曰此明第三地障依唯識論謂所知障中俱生一分謂能障三地勝定修慧貪煩惱及障總持聞思修慧忘念不正知以為自性故唯識云三闇鈍障謂所知障中俱生一分今所聞思修法忘失彼障三地勝定總持及彼所發殊勝三慧亦攝二十二愚中欲貪愚及圓滿陀羅尼愚而十地云闇相於聞思修等諸法忘失世親論云遲鈍性於聞思修而有忘失梁朝攝論心遲苦無明聞思修忘失無明意同唯識通攝二愚而深密云欲得善法過及此經云欲貪愚者但攝初愚據實通攝二愚自體如成唯識言釋名者餘處所說闇鈍障者謂貪即是闇性障故名闇鈍障即持業釋或可闍鈍是煩惱名今說所知障名闇鈍者以同體故若依是釋是依主釋闍鈍之障故今言欲貪障者是依主釋或可法愛名貪等故亦持業釋第四地中對治定愛及法愛障釋曰此辨第四地障依成唯識第六識俱俱生我見定愛法愛以為體性故唯識云四微細煩惱現行障謂所知障中俱生一分第六識俱身見等攝彼障四地菩提分法入四地中便能永斷具說如彼又彼云身見等言亦攝無始所知障攝定愛法愛彼定法愛三地尚增入四地時方能永斷菩提分法特違彼故又下經中亦說二愚一等至愛愚二法愛愚及彼麤重梁朝論云四微細煩惱現行共生身見等無明又世親論云四微細煩惱現行俱生身見等攝此上二論意同唯識有等言故問若爾何故十地論云解法慢障解云於第三地解法教時起解法慢亦起法愛故十地等各據一義亦不相違深密經云愛三摩拔提心愚者唯當定愛愚譯家別故今此經云定法愛障者通攝二愚而不說身見者非正二愚故言釋名者成唯識云微細煩惱現行障者謂俱生我見彼云微細有其三義一最下品故二不作意緣故三遠隨現行故言煩惱者彼而煩惱同體起故說煩惱名此即微細煩惱現行之障故依主釋今此經云定愛及法愛障者亦依主釋或可持業謂所知障亦得愛名故法愛等名法愛障亦持業釋又解愛名唯煩惱名亦成持業先以愛名顯所知障體後言障故餘論釋名不可具述第五地中對治生死涅槃一向背趣障釋曰此辨第五地障依成唯識即用所知障中俱生一分二十二愚中純作意背生死純作意趣涅槃愚以為自性故成唯識云五於下乘般涅槃障謂所知障中俱生一分令厭生死樂趣涅槃同下二乘厭苦所滅彼障五地無差別道釋二種愚如下經說純作意背生死純作意趣涅槃而十地論身淨我慢障梁論於下乘涅槃無明世親論云於下乘涅槃障者皆攝一愚意通二愚深密經意同此經今此經云生死涅槃一向背趣者正攝二愚如名可知釋名字者成唯識云於下乘般涅槃障者是依主釋下乘般涅槃障故今此經文是持業釋厭背即是所知障故第六地中對治相多現行障釋曰此辨第六地障依成唯識所知障中俱生一分此即第五地中作四諦觀執彼四諦染淨之相謂苦集流轉是染分相滅道還滅是淨分相故成唯識云六麤相現行障謂所知障中俱生一分執有染分麤相現行彼障六地無染淨道入六地時便能永斷由斯六地說斷二愚及彼麤重一現行觀察流轉愚即是此中執有染者諸行流轉染分攝故二相多現行愚即是此中執有淨者取淨相多現行未能多時住無相觀而十地云微細習障梁論微細相行無明世親唯識麤相現行皆是相形立名論體性者通攝二愚於理無失深密經云諸相行過及此經云相多現行意同諸論義不違故釋名字者並依主釋相多現行之障故尋而可知第七地中對治細相現行障釋曰此明第七地障謂所知障中俱生一分前第六地作十二緣生觀執有微細流轉相及細還滅相執此二相故能障第七地妙無相道故成唯識云七細相現行障謂所知障中俱生一分執有生滅細相現行彼障七地妙無相道入七地時便能永斷由此七地說斷二愚及彼麤重一細相現行愚即是此中執有生者猶取流轉細生相故二純作意求無相愚即是此中執有滅者尚取還滅相故純於無相作意勸求未能空中起有勝行而十地論細相習障梁論復云微細相行無明世親云細相現行成唯識云細相現行障深密經云微細相行過及此經云細相現行障皆是相形得名皆攝二愚理亦不違准上應知言釋名者並依主釋准上應知第八地中對治於無相作功用及於有相不得自在障釋曰辨第八地障謂所知障中俱生一分令無相觀不任運起亦攝二愚一於無相作功用愚二於相自在愚令於相中不自在故故唯識云八於無相中作加行障謂所知障中俱生一分令無相觀不任運起前之五地有觀多無相觀少於第六地有相觀少無相觀多第七地中純中純無相觀雖恒現行而有加行由無相中有加行故未能任運現相及土乃至廣說十地論云於無相有行障梁論云於無相作功用無明世親論云無相作行成唯識云無相中作加行障皆攝一愚謂於無相作功用愚准唯識雖舉一名通攝二愚謂於無相作功用愚於相自在愚深密經云對治無相行自然行過者自有兩釋一云於八地中無相智行能無功用自然現行此能障彼故言無相行自然行過即當二中於無相作功用愚一云彼經同解深密雙舉二愚一無相行者即當於無相作功用愚二自然行愚者即當於有相不得自在愚今此一部具攝二愚如經應知言釋名者十地梁論世親唯識皆云於無相中加行障者皆依主釋謂由無相起加行智非加行智體即是障此即加行智之障故是依主釋今依此經於無相作功用及於有相不得自在障者並依主釋第九地中對治於一切種善巧言詞不得自在障釋曰辦第九地障謂所知障中俱生一分能障四無礙法以為體性故唯識云九於利他中不欲行障謂所知障中俱生一分令於利樂有情事中不欲勤行樂修己利彼障九地四無礙解入九地時便能永斷由斯九地說斷二愚及彼麤重一於無量所說法名句字後後慧辨陀羅尼自在愚於無量所說法陀羅尼自在者謂義無礙解即於所詮總持自在於一義中現一切義故於無量名句字陀羅尼自在者謂法無礙解即於能詮總持自在於一名句字中現一切名句字故於後後慧辨陀羅尼自在者謂詞無礙解即於言音展展訓釋總持自在於一音聲中現一切音聲故二辨才自在愚辨才自在者謂辨無礙解善達機宜巧為說故愚能障此四種自在皆是此中第九障攝十地論云不能善利益眾生障梁朝論云於眾生利益事不由功用無明世親論云於饒益有情事不作者慈攝二愚於理無違無簡別故深密經說一切種法不得自在過又此經云於一切種善巧言詞不得自在障者自有兩釋一云即當第二辨才自在愚一云通攝二愚於一切種善巧言詞者通四無礙名一切種善巧言詞言釋名者此上四論二經並依主釋尋即可知第十地中對治不得圓滿法身證得障釋曰此明第十地障此亦所知障中俱生一分依成唯識及下經文亦攝二愚故唯識云十於諸法中未得自在障謂所知障中俱生一分令於諸法不得自在彼障十地大法智雲及所含藏所起事業入十地時便能永斷由斯十地說斷二愚及彼麤重一大神通愚即是此中障所起事業者二悟入微細秘密愚即是此中障大法智雲及所含藏者十地梁論世親唯識皆云於諸法中未得自在障者當二愚中悟入微細秘密愚或可通攝二愚深密經云第十地中對治未得滿足法身愚此經復云第十地中對治不得圓滿法身證得障者亦攝二愚義亦無失不別配故今此經云不得圓滿法身者約真如法身說故雜集論第十二云言法身者謂所知障永斷轉依所攝此於第十地名圓滿於如來地名成就言釋名者四論二種釋名雖異得名皆同是依主釋善男子此奢摩他毗鉢舍那於如來地對治極微細最極微細煩惱障及所知障釋曰此明第十一障於中有二初明所斷障後明斷障勝利此即初也謂二障中俱生一分言極微細者是煩惱障最極微細者是所知障又解極細最細皆通二障極位所斷故名極細勝位所斷故名最細又解無細可過名為極細無細可勝故名最細所以佛地說二障者見所斷障初地已斷中其所知障同諸經論煩惱障中若俱生者前十地中故留不斷至於佛地乃能斷之故唯識云此地於法雖得自在而有餘障未名最極謂有俱生微所知障及有任運煩惱障種金剛喻定現在前時彼皆頓斷入如來地由斯佛地說斷二愚及彼麤重一於一切所知境極微細著愚即是此中微所知障二極微細礙愚即是此中一切任運煩惱障種故集論說得菩提時頓斷煩惱及所知障成阿羅漢及成如來證大涅槃大菩提故此經即當二種愚也而深密云第十一地中對治細極細微細智障者偏說智障譯家脫也此佛地障餘論皆無故不配屬言釋名者六釋之中持業釋也由能永害如是障故究竟證得無著無礙一切智見依於所作成滿所緣建立最極清淨法身釋曰此明第二斷障勝利文有兩節一明斷障證得智見謂能永斷二種障故如其次第究竟證得法空無著一切智見人空無障一切智見故成唯識第九卷云著是所知障礙是煩惱障以此證知法空觀智名為無著人空觀智名為無礙二於所緣建立法身謂依第四所作成滿所緣境故斷除二障建立清淨真如法身或可建立二種法身慈氏菩薩復白佛言世尊云何菩薩依奢摩他毗鉢舍那勤修行故證得阿耨多羅三藐三菩提釋曰自下第十六止觀能證菩提門先問後答此即問也云何菩薩已得止觀由依止觀勤修行故證得無上正等菩提佛告慈氏菩薩曰善男子若諸菩薩已得奢摩他毗鉢舍那依七真如於如所聞所思法中由勝定心於善審定於善思量於善安立真如性中內正思惟釋曰自下第二如來正說於中有二初釋後善男子如是下結前中有二初明因位勤修諸行後乃至下明其果位證得菩提前中有三初法次喻後合就法說中自有兩說一云約四種道即分為四一明資糧位二彼於下明加行位三僧是下明見道位四復於下明修道位此即第一明資糧位文有兩節初明能觀人在資糧位已得止觀後依七真如下依境發觀文有三節初依七真如者舉所觀境謂資糧位位依此心觀觀七真如次於如所聞等者辨三慧所依於如所聞者聞慧所依聞謂聽聞即是耳根發生耳識聞言教故所思法中者思慧所依思謂思慮即是思數發生智慧思擇法故由勝定心者修慧所依修謂修習即是勝定發生智慧修對治故後於善審定等者辨所生慧此用聞慧依七真如能善審定於善思量者思所成慧於善安住等者修所成慧依七如中內思惟故一云即分為三初明加行位次明見位後顯修位就加行似中復分為二初明尋思如實觀後彼於下除遣諸相此即初也文有二節初明依七真如作尋思觀後於善審定下明如實觀謂諸菩薩依七真如如所聞思由勝定力於𤏙頂位作四尋思觀能善審定能善思量存識遣相於忍第一作四如實觀於善安立真如性中內正思惟遣能取識廣釋其相如前已說雖有兩釋且依後說彼於真如正思惟故心於一切細相現行尚能棄捨何況麤相釋曰第二除遣諸相於中有二初明除遣後彼既多住下明善修治心前中有三初標除遣次善男子下顯所除相後於彼現行下正明除遣此即初也諸彼加行位菩薩依七真如正思惟故彼能觀心於彼一切所執受等細相現行尚能棄捨何況麤相言麤相者一切散位所現諸相或可一切染汙所現諸相或可欲界下地諸相故瑜伽論第十一云云何麤相謂所觀下地一切麤相善男子言細相者謂心不執受相或領納相或了別相或雜染清淨相釋曰自下第二顯所除相然諸所除有二十一種攝十一段此即第一明所執受等四種相也如其次第身受心法四念處境此中意說託所執受等變作影像名為細相下皆准此或內相或外相或內外相釋曰第二內等三相然此內外略有三釋一云自身名內他身名外合名內外一云六根名內六境名外合名內外一云有情名內非情名外合名內外故婆沙論一百三十八云然內外法差別有三一相續內外謂在自名身為內在他身及非情名為外二處內外謂心心所所依名內所緣名外三情非情內外謂有情數法名內非情外數法名外大般若等同第二釋彼云內空謂內六處外空謂外六處內外空謂內外六處或謂我當修行一切利有情相釋曰第三顯利他相利他即是顯揚論中利有情行謂以四攝利益一切諸有情故又解自利利他行中是利他行廣如瑜伽三十五說或正智相或如如相釋曰第四正智如如相或可此中分別五相五相即是名相分別正智如如就勝說故且說二相若廣分別名等五相如瑜伽論七十二等或苦集滅道相釋曰第五辨四諦相婆沙論七十七云問苦集滅道各有何相脇尊者曰逼迫是苦相生長是集相寂滅是滅相出離是道相廣如彼論四復次釋或有為相或無為相釋曰第六辨有為相若與生等四相相應名有為相與此相相違名無為相廣如雜集論第三婆沙一百二十八等或有常相或無常相釋曰第七常無常相與前有為無為體無差別義別故說或苦有變異性相或苦無變異性相釋曰第八苦變異等相謂苦樂二受名有變異性相捨受名為苦無變異性相又解所執性苦及依他性苦名苦有變異性相圓成實性苦無變異性相如辨中邊成唯識廣辨四諦皆通三性深密經云苦集不異自性業者譯家別也或有為異相相或有為同相相釋曰第九有為同異相大般若第五十一云自相謂一切法自相如變礙是色自相領納是受自相取像是想自相造作是行自相了別是識自相如是等有無量自相共謂一切法共相如苦是有漏法共相無常是有為法共相空無我是一切法共相如是等有無量共相或知一切是一切已有一切相釋曰第十知一切相謂知一切是一切已者上來別顯諸相此即總顯諸相舉能知智顯所知相此即顯其諸法自相有一切相者顯差別相一一皆有可見不可見等一切相也或可前是盡所有相後一切者如所有性或補特伽羅無我相或法無我相釋曰第十一辨二無我相補特伽羅此云數取趣謂數數往來取諸趣也舊云人者謬也末奴沙此云人也若依舊譯有其兩失一不攝諸趣失二梵音相違失以此故知今翻正也此二無我相如瑜伽論九十三說彼云補特伽羅無我者謂離一切緣生行外別有實我不可得故法無我者謂即一切緣生諸行性非實我是無常故彼於現行心能棄捨釋曰第三正明除遣謂即於彼如上所說現行諸相真如觀心能正除遣問此諸相是依他起如何說彼名為除遣解云如前所說不現前故名為除遣非遣依他因緣道理說名除遣又解染汙依他斷故名遣故瑜伽論三十六云能斷能捨故名除遣彼既多住如是行故於時時間從其一切繫蓋散動善修治心釋曰第二善修治心謂能觀察真如相故如上所說五繫五蓋及五散動便能修習能對治心從是已後於七真如有七各別自內所證通達智生名為見道釋曰自下第二明見道位於中有二初正明見道後由得此故下明見道勝利此即第一正明見道初見理故名為見道故無性攝論第六卷云見先未見勝法界故名為見道又成唯識第九卷云加行無間此智生時體會真如名通達位初照理故亦名見道然此見道自有二種一真見道謂世第一無間而生雙證生法二空真如頓斷一切見所斷惑名真見道而今此說各別內證七真如者從詮而說若證流轉諸法實性義邊名各內證流轉之真如如是乃至若證四諦實性義邊名為別證四諦真如非此無相真見道位前後七時各別內證二相見道或有三心謂有情假緣智法假緣智遍遺有情法假緣智或十六心謂苦法忍等此二見道如成唯識第九瑜伽五十八等廣如別章由得此故名入菩薩正性離生生如來家證得初地又能受用此地勝德釋曰自下第二釋其勝利於中有二初明四種勝利後彼於下明事邊際所緣勝利此即初也然此勝利依成唯識第九卷中見道勝利有其八種故彼論云菩薩得此二見道時生如來家住極喜地善達法界得諸平等常生諸佛大集會中於多百門已得自在自知不久證大菩提能盡未來利樂一切依攝大乘有六勝利故攝論云入極喜地善達法界生如來家得一切有情平等心性得一切菩薩平等心性得一切佛平等心性六種勝利若廣分別如無性世親釋論第六八種勝利如梁論第八十種勝利如梁論第十今依此經有四勝利一入菩薩正性離生二生如來家三證得初地四又能受用此地勝德言正性離生者正性即是無漏聖道言離生者見道所斷分別煩惱能生六道四生等類猶如生食能生諸病從喻立號名之為生見道生時離彼如生分別煩惱故名離生若依俱舍第二十三苦法智忍見有其二名故彼論云即此名正性離生亦復名正性決定由此是初入正性離生亦是初入正性決定故經說正性所謂涅槃或正性言目諸聖道生謂煩惱或根未熟聖道能越故名離生能決取涅槃或決了諦相故諸聖道得決定名至此位中說名為入解云俱舍正性二種涅槃聖道生有二義一煩惱生猶如生食二聖道未熟名之為生順正理六十三顯宗第七大同俱舍依毗婆沙亦有二義一者見所斷惑猶如生食故大婆沙第三卷云復次見所斷惑令諸有情墮諸惡趣受諸劇苦譬如生食久在身中能作種種極苦惱事是故此惑說名為生見道能滅故名離生復次有身見等剛強難伏如狩籠戾故說名生見道能滅故名離生或復善根未熟名生故婆沙云復次一切煩惱或諸貪愛能令善根不得成就及令諸有潤令起過皆名為生見道起已摧彼勢力令不復為增上生過由此見道獨名離生廣說如彼大乘說處如第八卷疏記中釋言生如來家者無性釋云謂佛法界名如來家於此證會故名為生世親釋云生如來家者由此能令諸佛種性不斷絕故依十住婆沙第一卷云是諸佛家名如來家今是菩薩行如來道相續不斷故如來家廣如彼論多復次說證得初地者如下當釋又能受用此地勝德者此攝唯識餘六勝利彼於先時由得奢摩他毗鉢舍那故已得二種所緣謂有分別影像所緣及無分別影像所緣彼於今時得見道故更證得事邊際所緣釋曰自下第二明所緣勝利謂先地前已得二種所緣境故今此見道更得第三邊際所緣三種所緣差別之相如前已說復於後後一切地中進修修道即於如是三種所緣作意思惟釋曰自下第三釋修道位文有二節初明進修修是增明義謂見道後後九地中觀智漸增又解後後者具說十地在見道後十地非一重言後後後即於如是等者辨具三緣謂無分別智內正思惟諸事邊際真如實境而不變影以後得智作意思惟有分別影無分別影二種境界即以此文證十地中皆具三境譬如有人以其細楔出於麤楔釋曰第二喻說如諸世間欲破木時先用麤楔後用細楔以其細楔出於麤楔如是菩薩依此以楔出楔方便遣內相故一切隨順雜染分相皆悉除遣相除遣故麤重亦遣釋曰第三舉法同喻亦名為合於中有二初明初地出二種縛後顯餘地陶練其心此即初也謂初地菩薩依此以楔出楔聖道遣定內相由遣相故一切相縛悉皆除遣相縛遣故麤重縛亦遣故瑜伽論六十四云若有行於非安立諦不行於相不行相故於諸相縛便得解脫於諸相縛得解脫故於麤重縛亦得解脫二縛別相如前已釋問如何得知初地已上能斷二縛答如成唯識第九卷云此加行位未遣相縛於麤重縛亦未能斷又梁攝論第四卷云若得無分別智即解相結相結不起麤重結即隨滅故知地前不斷二縛然此所說以楔出楔諸教不同若依瑜伽影像喻細楔本質喻麤楔身輕安為細楔身麤重為麤楔即以細楔遣於麤楔故六十七云除遣修者謂如有一由三摩地所行影像諸相作意故如以楔出楔方便除遣棄於自性諸相又如有一用彼細楔遣於麤楔如是行者以身輕安遣身麤重名除遣修又顯揚論第十六云除遣修者謂如有一思惟三摩地所行影像相故除遣諸法根本性相令不復現餘同瑜伽若依梁論以麤榍遣細榍喻十地中以勝智遣劣智故十一云如世間欲破木先用細榍後用麤榍觀行人破煩惱亦爾先用劣道次用中道後用勝道若依攝論聖道喻細楔雜染種子喻麤楔故世親論第八卷云論曰對治差別者謂一切總相緣智以楔出楔道理遣阿賴耶識中一切障麤重故釋云緣總法智對治一切障破而住如以細楔除去麤楔住本識中諸雜染法熏習種子說名為麤諸對治道能除彼故是微細義又無性論第八卷云聖道微妙故如細楔所治種子其性麤重故如麤楔餘同世親依此等教釋此經文諸說不同一云此經意同梁論以勝智楔出劣智楔一云經意同世親等以聖智楔出於惑楔一云此經就相顯說同世親等就通相說皆不相違謂諸菩薩在地前位得根本定以身輕安遣身麤重次以定內細影遣外麤相或以影像細相遣本麤相地上菩薩及用真觀遣影像相乃至以智遣惑尋即可知或可法喻合依修道位說永害一切相麤重故漸次於彼後後地中如練金法陶練其心釋曰第二陶練其心謂於初地永害二縛力故於後諸地如練生金陶練其心此練金法如瑜伽論第十三說彼云當如陶練生金之法陶練其心謂練生金略有三種一除垢陶練謂從金性中漸漸除去麤中細垢二攝受陶練謂即於彼鄭重銷煑三調柔陶練謂銷煑已更細練治瑕璅等穢又三十一云譬如黠慧鍛金銀師或彼弟子於時時間燒練金銀令其棄捨一切垢穢調柔隨順隨其所樂種子轉變如是勤修瑜伽行者為令其心棄背貪等一切垢穢隨於彼彼欲自安立或奢摩他品或毗鉢舍那品即於彼彼能善和合無轉無動隨其所樂種種義中如所信解皆能成辦乃至證得阿耨多羅三藐三菩提又得所作成滿所緣釋曰第二明其果位證得菩提於五位中即是第五究竟位也謂非但地地陶練其心乃至證得究竟位中無上菩提又依此位於其四種所緣境中更得第四所作成滿所緣境也佛果位中四境具足又解地前得二種境十地位中改名邊證佛果位中改名成滿雖有兩釋前解為勝善男子如是菩薩於內止觀正修行故證得阿耨多羅三藐三菩提釋曰此即第二結文謂地前地上菩薩修止觀二道勤修行故證得無上正等菩提慈氏菩薩復白佛言世尊云何修行引發菩薩廣大威德釋曰自下第十七引發廣大威德門於中有二先問後答此即問也善男子若諸菩薩善知六處便能引發菩薩所有廣大威德釋曰自下第二如來正答於中有二初依問正釋後善男子下結前中有三一標數略答二依數列名後次第別釋此即第一標數略答謂諸菩薩善知六處引大威德一者善知心生二者善知住三者善知心出四者善知心增五者善知心減六者善知方便釋曰第二依數列名云何善知心生釋曰自下第三次第別釋別釋六處即分為六此即第一釋善知心生於中有二先問後答此即問也善知者能知智心生者所知心下皆准此謂如實知十六行心生起差別是名善知心生釋曰自下第二正答於中有二初總答後別釋此即總答十六行心生起差別者釋曰第二別釋十六行心於中有二先牒後釋此即總牒一者不可覺知堅住器識生謂阿陀那識釋曰自下第二次第別釋十六種心即為十六此釋初心文有兩節初標心名後出體性然釋此文自有兩釋一云不可覺知者謂第八識能緣行相不可覺知恒相續結故名為堅住執持器世間故名為器識阿陀那識者此出體性梵音阿陀那此云執持有其三義一執持根根所依二執持種子三者執持結生相續結一云不可覺知者謂共相果外器世間不可覺知自變他變差別之相二者種種行相所緣識生釋曰此明第二心生先標其名後出體性此即標名能緣行相隨境非一故言種種行相所緣識生者從境立名所緣境境識故名所緣識生謂頓取一切色等境界分別意識及頓取內外境界覺受釋曰第二出體於中有二初明有漏意識後明無漏意識此即初也謂於一時頓取一切色等六境分別意識此即五識同時分別意識或五識後分別意識或於一時頓取內外十二處境覺悟領受分別意識或頓於一念瞬息須臾現入多定見多佛土見多如來分別意識釋曰第二無漏意識梵音剎那此云極少時即是一念故雜心論云如壯士夫一彈指頃逕六十剎那一剎那為一念梵音臘縛此云瞬息梵音牟呼栗多此云須臾依俱舍論第十二云剎那百二十為一怛剎那六十怛剎那為臘縛三十臘縛為牟呼栗多此意說云後得無漏自在力故或於一時於一念頃現入多定見多佛土或見多佛分別意識然此後得對有漏心名無分別對正體智亦名分別問於一念見多如來其義可爾如何一念能入多定答諸佛菩薩神力難思能於念念入種種定故雜集論第十四云唯佛世尊及已得大神通菩薩由隨所欲剎那剎那能入無量三摩地差別故又解隨應可得入諸定等非實一念入一切定若不爾者如何一念入多佛土無一有情有多身故示現化身入多佛土三者小相所緣識生謂欲界繫識釋曰顯第三心此下五相並約第八賴耶識說故瑜伽論五十一云阿賴耶識於欲界中緣狹小執受境了別狹小所緣故雜論云小者謂欲界下劣故四者大相緣識生謂色界繫識釋曰辨第四識瑜伽論云阿賴耶識於色界中緣廣大執受境了別廣大執受所緣故雜集論云大者謂色界增上故五者無量相所緣識生謂空識無邊處繫識釋曰辨第五識瑜伽論云阿賴耶識於無色界空無邊處識無邊處緣無量執受境了別無量執受所緣故雜集論云無量者謂空無邊處識無邊處無邊際故六者微細相所處識生謂無所有處繫識釋曰釋第六相瑜伽論云阿賴耶識於無所有處緣微細執受境了別微細執受所緣故七者邊際相所緣識生謂非想非非想處繫識釋曰明第七心於三界中最是後邊故名邊際瑜伽論云阿賴耶識於非想非非想處緣極微細執受境了別極微執受所緣故顯揚十七釋上五相亦同瑜伽或可五相隨其所應通於六識八者無相識生謂出世識及緣滅識釋曰明第八心出世識者無漏道諦相應識遠離有漏諸戲論相故名無相此通無漏八種淨識及緣滅識者緣滅諦識此通無漏八識及有漏意識九者苦俱行識生謂地獄識釋曰明第九心謂那落迦全及於一分鬼傍生中純受苦處深密經云苦相應識者如惡道識十者雜受俱行識生謂欲行識釋曰明第十心謂於人中若欲界天及於一分鬼傍生中轉識相應苦受樂受不樂受相雜俱轉深密經云雜受相應識如欲界識十一喜俱行識生謂初二靜慮識釋曰明第十一心謂初二定喜受相應大小共許然大乘宗同體義分亦有樂受此經為分五受別故且說喜受深密經云喜相應識如初二禪識十二樂俱行識生謂第三靜慮識釋曰第十二心瑜伽論云下三靜慮一向樂受俱轉深密經云樂相應識如第三禪識十三不苦不樂俱行識生謂第四靜慮乃至非想非非想處識釋曰明第十三心謂第四靜慮已上諸地一向唯與捨受相應此通有漏無漏第六意識及第七八識深密經云捨受相應識如第四禪乃至非非想識十四染汙俱行識生謂諸煩惱及隨煩惱相應識釋曰明第十四心隨其所應謂與根本六種煩惱及與二十諸隨煩惱相應有漏七識十五善俱行識生謂信等相應識釋曰明第十五心謂與信等十一善法相應有漏六識及無漏八識十六無記俱行識生謂彼俱不相應識釋曰明第十六心謂不與彼善染相應有漏六識及第八識云何善知心住釋曰第二善知心住先問後答此即問也善知者能知智心住者所知心下准此釋謂如實知了別真如釋曰釋二答也謂如實知無分別智相應之心了別真如依如而住或可了別真如者七真如中唯識真如即能觀智名為了別真如非實性如故莊嚴論云唯識真如者謂無分別智此意說云謂如實知唯識觀知相應之心依境而住名善知心住云何善知心出釋曰第三善知心出先問後答此即問也謂如實知出二種縛所謂相縛及麤重縛此能善知應令其心從如是出釋曰第二答也謂如實知無分別智相應之心出二種縛此能知心既善知已應令無分別智相應之心從二縛出云何善知心增釋曰第四善知心增先問後答此即問也謂如實知能治相縛麤重縛心彼增長時彼積集時亦得增長亦得積集名善知增釋曰第二答也謂如實知治二縛心彼增長時彼積集時能治縛心相應慧等亦得增長亦得積集名善知增增長積集有差別者現行轉增名為增長熏成種子名為積集或可初增長時名為增長數數重起名為積集云何善知心減釋曰第五善知心減先問後答此即問也謂如實知彼所對治相及麤重所雜染心彼衰退時彼損減時此亦衰退此亦損減名善知減釋曰第二答也謂如實知所治二縛所雜染心衰退損減之時彼雜染心相應見等亦復衰損名善知減衰退減有差別者反上增長積集應知云何善知方便釋曰第六善知方便先問後答此即問也謂如實知解脫勝處及與遍處或修或遣釋曰第二答也謂如實知八解脫八勝處十遍處修習如如此三科功德或能除遣彼三科障由此方便發起神通及無諍等種種功德故名方便然此方便引諸功德諸教不同若依顯揚第四卷說八解脫中第五解脫引諸功德故彼論云為欲引起諸聖神通無諍願智無礙辨等諸功德故復作無邊識處解脫方便若依瑜伽第十二卷三文不同一處但說八解脫中第一解脫引勝處遍處諸聖神通無諍願智無礙解等又復彼云十遍處中由八色遍處引聖神通由識遍處能引無諍願智無礙解等由空遍處隨其所欲皆轉成空又復彼云解脫勝處及遍處等名能引道瑜伽七十二亦同三科能引解云初觀行者必用解脫為初是故瑜伽且約解脫後漸修習遍處能引據實為論三科能引諸功德是故瑜伽一處及此經文三皆能引神通等德然此三科有差別者如大婆沙八十五云問解脫勝處遍處有何差別答名即差別謂此名解脫此名勝處此名遍處復次下品善根名解脫中品善根名勝處上品善根名遍處復次小善根名解脫大善根名遍處復次唯因名解脫唯果名遍處通因果名勝處復次能有棄背名解脫能勝伏境名勝處能廣所緣名遍處復次唯作勝解名解脫能伏煩惱名勝處於所緣境無二無量名遍處復次若得解脫未必已得勝處遍處若得勝處必已得解脫未必已得遍處若得遍處必已得解脫及勝處所以者何從解脫入勝處從勝處入遍處故是謂解脫勝處遍處差別若廣分別具如別章善男子於諸菩薩廣大威德或已引發或當引發或現引發釋曰第二總結謂如是善知六處菩薩知六處故於六通等廣大威德於過去世已能引發於未來世當能引發於現在世能現引發慈氏菩薩復白佛言世尊如世尊說於無餘依涅槃界中一切諸受無餘永滅何等諸受於此永滅釋曰自下第十八於無餘依滅受門於中有二先問後答此即詰問文有三節初舉所問教後正發問辭如經應知善男子以要言之有二種受無餘永滅釋曰自下第二如來正說於中有二初依問正說後是故下結釋中有二初標數略答後問答廣釋此即略答何等為二釋曰自下第二問答廣釋先問後答此即問也一者所依麤重受二者彼果境界受釋曰自下廣釋於中有二初正釋諸受後於有餘下釋其永滅前中有二初略答二受後次第別釋此即初也二受別相諸說不同一云所依麤重受者謂有漏受依六根生從根得名稱為所依由二障種麤重所隨故言所依麤重受彼果境界受者謂外六境由內六根勢引生故說六境界名為彼果此境界受緣彼而生故名彼果境界受據實二受體無差別但隨根境義說二受一云所依麤重受者謂種子受彼果境界受者謂現行受謂有漏種能與現果為所依止或二障種麤重所隨故言所依麤受也若現行受以種子受之所生故言彼果境界受一云所依麤重受者依內六根緣內身中六根及境諸有漏受從所依根及能隨法以立其名以依六根或二障種麤重所隨故彼果境界受者謂外六境能與六根為增上果故集論云眼等六根受用力故有六境生此第二受依內六根緣外六境從境得名故言彼果境界受即十二緣中說自體受及境界受也雖有三說且依第三所依麤重受當知有四種釋曰自下第二次第別釋於中有二初釋所依麤重受後釋彼果境界受前中有三初標章舉數次依數列名後逐難重釋此即初也一者有色所依受二者無色所依受三者果已成滿麤重受四者果未成滿麤重受釋曰第二依數列名然此四受諸說不同亦有三說而初師說大同第三師說故不別敘前第二師云有色所依受謂欲色界受種子無色所依受者謂無色界受種子果已成滿麤重受者謂現與果種子果未成滿麤重受者謂未與果受種子一云有色所依受謂五識身相應受無色所依受者謂意識相應受也此即身心二受也果已成滿受者謂過去無明行等所生現在果受果未成滿受者謂業煩惱相應能感未來因受雖有諸說第三為正順文義故果已成滿受者謂現在受果未成滿受者謂未來因受釋曰第三逐難重釋謂初是宿業所得現在果受後是能感未來異熟業煩惱相應受未來果之因故言未來因受彼果境界受略有四種釋曰自下第二釋彼果境界受於中有二初標章舉數後依數列名此即初也一者依持受二者資具受三者受用受四者顧戀受釋曰第二依數列名如是四受諸說不同一云此之四受皆是現行其差別者有其四種一依持受謂緣器世界受二資具受謂緣資生具受三受用受謂親受用衣食等受此三緣現境受四顧戀受謂緣過去前三境所生受也一云依持受者緣器世間受二資具受謂緣衣藥等受三受用受者即是合說依持資具二種受也四顧戀受者顧財物受也一云如其次第初緣器世間次緣衣藥等次緣現在後緣過去也於有餘依涅槃界中果未成滿受一切已滅領彼對治明觸生受領受共有或復彼果已成滿受又二種受一切已滅唯現領受明觸生受釋曰自下第二釋其永滅於中有二初釋有餘永滅後釋無餘永滅此即初也有二復次而釋此文諸說不同一云果未成滿受一切已滅者金剛心時已斷滅未來果業煩惱及相應受領彼對治明觸生受者領彼業煩惱對治盡無生智相應無漏受也領受共有者領受共有器世界受即經所說依持受也略而不言資具受受用受二種受也唯除顧戀受與貪相應故或復彼果已成滿受者由已成滿受中通有麤重無麤重無學身中但有無麤重受故言或也略不言領有色所依受無色所依受無學猶起故又二種受一切已滅者謂所依麤重受彼果境界受皆已除斷唯現領受明觸生受此據漏盡所有諸受皆名明觸所生之受一云果未成滿受一切已滅者謂得有餘依時能滅未來受種子一切已斷言領彼對治明觸生受者能治道無漏受言領受共有者謂彼果境界受言或復彼果已成滿受者謂現行正現與果受此上據去入無餘猶遠者有餘依中具此三受言又二種受一切已滅唯現領受明觸生受者此據將欲入無餘依時唯用無漏心緣無餘故後滅領受共有受及彼果已成滿受但有無漏受在故言又二種受一切已滅唯有明觸生受此約明觸唯無漏者作如是釋又解此文是二師別解前家言有餘依中唯滅未來因受有餘三受在者此約唯立無漏受為明觸所生受故云有三受第二家解意無學人身中所有受通漏無漏總名明觸所生受由約此義故言有餘依中又二種受一切已滅謂前所依麤重受及彼果境界受此二受一切已滅唯有無學人明觸所生受在一云有二復次初復次意於八受中於有餘依涅槃時唯滅果未成滿受或業俱故領彼對治明觸生受更得無漏受故領受共有者謂八受中除未成滿及彼果已成滿餘六受凡聖共有故言共有問如何無學有顧戀受解云顧戀有其二種一貪應羅漢已除二無染汙者欲數相應羅漢亦有故言共有或可言共有者唯有五受除其顧戀貪相應故易可知故略而不說或復彼果已成滿受者此明羅漢身中有見現果受故問如何此受不名共有解云據實亦是共有為欲對前未成滿受有無不同所以別說又二種受一切已滅唯現領受明觸生受者釋論兩釋一云羅漢身中所有諸受離隨眠故名為無漏前說八受一向有漏故云一切皆無言二種者前說根本二受以攝八受一云入無心定時滅除八受而言有無漏受者入無心定退方便故假說不滅據實亦滅也於無餘依涅槃界中般涅槃時此亦永滅釋曰第二明無餘永滅謂無餘依中此明觸生受亦滅或可如上所說共有受等亦滅是故說言於無餘依涅槃界中一切諸受無餘永滅釋曰第二總結應知爾時世尊說是語已復告慈氏菩薩曰善哉善哉善男子汝今善能依止圓滿最極清淨妙瑜伽道請問如來汝於瑜伽已得決定最極善巧釋曰就長行廣說中大分為二初廣辨止觀相後結歎勸學上來已釋止觀相訖自下第二結歎勸學於中有三初歎問有益次吾已為汝下顯佛同說後諸善男子下勸物修學此即前二如經可知吾已為汝宣說圓滿最極清淨妙瑜伽道所有一切過去未來正等覺者已說當說皆亦如是釋曰顯佛同說謂我所說止觀妙道非唯我說三世諸佛同說此義諸善男子若善女人皆應依此勇猛精進當正修學釋曰第四勸物修學如經可知爾時世尊欲重宣此義而說頌曰釋曰就此品中大分為二初釋止觀後依教奉持就正釋中大分為二初長行後重頌或可一品總分為三初長行廣說次以頌重說後依教奉持此即第二以頌重說於中有二初發起頌文後以頌重說此即初也於法假立瑜伽中若行放逸失大義依止此法及瑜伽若正修行得大覺釋曰自下舉頌正釋有五行頌即分為五初有一頌顯法瑜伽違順得失次有一行頌顯有所得失次有一行頌顯化生離染德次有一行頌為欲說法失次有一行頌捨著利生得此即第一顯依法瑜伽明違順得失謂於十二部教假安立法所說瑜伽止觀道中若行放逸失大義利大涅槃果若依此教及依止觀若正修行得大菩提見有所得求免難若謂此見為得法慈氏彼去瑜伽遠譬如大地與虗空釋曰第二有顯所得失謂依止觀推尋見有所得若執此見為所得法免生死難去瑜伽遠譬如大地之與虗空故思益經曰若以心分別諸法皆邪不以心分別諸法皆正若依婆沙第二十五有一頌云虗空大地相遠去海彼此岸亦復遠日出沒處斯亦遠正法邪法遠中遠今此經中但舉初喻利生堅固而不作悟已勤修利有情智者作此窮劫量便得最上離染喜釋曰第三化生離染德謂諸菩薩利益眾生大悲堅固而不作是念我能利益彼是所利無有能所悟如是理便能勤修利有情事乃至窮劫便得最上離染喜樂是故地持論云菩薩觀行隨事取隨如取不作是念此如如是等類不可具說若人為欲而說法彼名捨欲還取欲愚癡得法無價寶返更遊行而乞匃釋曰第四為說欲法失若人為求名聞利養為人說法名為捨欲還取欲言中說法名為捨欲心貪名利名還取欲如百論中訶彼不淨持戒頌云如羖羊相觸將前而更却汝為欲持戒其事亦如是身雖能持戒心為欲所牽斯業是不淨何用是戒為如是愚人獲得如是法無價寶不求無上正等菩提而反求彼世間名利如世愚人得無價寶反行乞匃又解若人為欲取空而說法者彼名捨有還復著空是愚癡人獲得如是法無價寶不解教意反生空執於諍諠雜戲論著應捨發起上精進為度諸天及世間於此瑜伽汝當學釋曰第五捨著利生德應捨諍論諠雜戲論發起增上勇猛精進為度世間勤修止觀爾時慈氏菩薩復白佛言世尊於此解深密法門中當何名此教我當云何奉持釋曰自下第三依教奉持分於中二先問後答此即慈氏請問如來問有二意一問教名二問奉持佛告慈氏菩薩曰善男子此名瑜伽了義之教於此瑜伽了義之教汝當奉持釋曰自下第二對問正答於中有二初正答二問後說此瑜伽下歎教勝利此即初也說此瑜伽了義教時於大會中有六百千眾生發阿耨多羅三藐三菩提心三百千聲聞遠塵離垢於諸法中得法眼淨一百五十千聲聞諸漏永盡心得解脫七十五千菩薩獲得廣大瑜伽作意釋曰此即第二歎教勝利有其四種一發菩提心二遠塵離垢得法眼淨三諸漏永盡心得解脫此之三利如前已釋四獲得廣大瑜伽作意人法二空名為廣大如攝論說止觀二道名為瑜伽如六處經說謂此菩薩獲得緣二空性止觀作意故名廣大瑜伽作意若依瑜伽第四十六諸佛菩薩為眾說法當知有五大果勝利一者一類有情遠塵離垢得法眼淨二者一類有情得盡諸漏三者一類有情於無上覺發正願心四者一類有情證得菩薩最勝法忍五者一類有情受持讀修習正行展轉方便令正法眼久住不滅若依莊嚴第十二云菩薩說法能得八果一諸聽法者或發菩提心二或得無生忍三或於諸法遠塵離垢得法眼淨此謂下乘所攝四或得諸漏盡五令正法久住由此正說得展轉受持故六未學義者令得學義七未斷疑者令得斷疑八已斷疑者令得受用正法無障大善味今此經中有四勝利瑜伽作意義當菩薩無生法忍
