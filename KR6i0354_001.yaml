body:
  text: 西明寺沙門圓測撰解深密經序品第一將欲釋經四門分別一教興題目二辨經宗體三顯所依為四依文正釋第一教興及題目者竊以真性甚深超眾象而為象圓音秘密布群言而不言斯乃即言而言亡非象而象著理雖寂而可談即言而言亡言雖弘而無說故嘿不二於丈室可談故辨三性於淨宮是故慈氏菩薩說真俗而並存龍猛大士談空有而雙遣然則存不違遣唯識之義彌彰遣不違存無相之旨恒立亦空亦有順成二諦之宗非有非空契會中道之理故知迷謬者說空而執有悟解者辨有而達空佛法甚源豈不斯矣但以接引多方入理非一是故法王說三法輪初為發起聲聞乘者波羅柰國施鹿林中創開生死涅槃因果此即第一四諦法輪次為發趣菩薩乘者鷲峯山等十六會中說諸般若此即第二無相法輪後為發趣一切乘者蓮華藏等淨穢土中說深密等此即第三了義大乘是即如來教興之意也題云解深密經者一部總名序品第一者品內別目解謂解釋深即甚深密者秘密此經宗明境行及果三種無等解釋如是甚深之義名解深密經者梵音名素怛纜此云經也若依俗典經者常也經古歷今教義恒定目之為常或翻為綖四分律云綖貫華定不失落大唐三藏翻為契經謂契合契當道理合有情機經亦二義一者貫穿二者攝持貫穿所應說義攝持所化有情具斯二義故名契經辨得名者解經兩字是能詮教深密之言顯所詮理從能所詮以立經目此即深密之解經也故六釋中是依主釋序品第一者序謂由序起正說之由致品謂品類或品別義顯已聞等義類相從攝義各別目之為品於一部內有其八品此品最初故名第一故言解深密經序品第一言宗體者體即總明能詮教體宗言別顯諸教所詮然諸聖教大唐三藏五門出體一攝妄歸真門謂諸聖教名句文身及以音聲用如為體故維摩等云一切眾生皆如也一切諸法亦如也二攝相歸識門略有二義一三分明義自體名識見相二分通名為相故成唯識第一卷云變謂識體轉似二分見相俱依自體起故又第二云識所變相雖無量種而能變識類別唯三若依此釋相謂相狀見相皆是自體分識之相狀故二二分明義見分名識相分為相故成唯識云或復內識轉似外境若依此釋相分名相相不離見說名唯識總說意云名句文身及以音聲識之相故名為識也三以假從實門如瑜伽等名等是假聲即是實故離聲外無別名等又解此上三門各開二門初二門者一攝妄歸真門唯真非妄二真妄差別門是妄非真名等四法非真如故次二門者一攝相歸識門唯識非相二識相差別門且依此土名等四法唯相非識名等皆是相分攝故後二門者一以假從實門唯實非假二假實差別門通假及實名等是假聲即實故第四三法定體門三法即是蘊處及界三科法門故雜集論名三法品薩婆多宗評家正義用聲為體故三科中色蘊聲處聲界所攝依經部宗假實二聲以為教體五蘊門中色蘊所攝處界門中聲處法處聲界法界法數門中當廣分別今依大乘聲及名等四法為性於五蘊中色行二蘊處界門中聲處法處聲界法界名等三法意識境故第五法數出體四門分別一法數出體二本影有無三聚集顯現歷心差別四辨音一異言法數出體者且辨邪教數論外道聲諦為體依勝論宗聲德為性順世外道四大為體一切皆用大為性故聲論諸師用聲為體明論聲常能為定量詮諸法故今依內宗諸說不同薩婆多宗總有七十五法義如常釋然彼教體雜心俱舍及毗婆沙皆有二說一云如來法蘊色蘊為性以是聲故一云行蘊名句字故由斯義故此地諸師解不同有其三說一云音教以為正義以聲是善名句文身是無記故故雜心云經律阿毗曇是名俗正法三十七道品是說第一義長行釋云俗正法者言說正法一云名等以為正義以能詮表所說義故故發智論云十二部經以何為性答名身句身文身次第住乃至廣說一云通用音聲名等為體由前所說二種義故今依新翻俱舍第一具申兩釋謂說音聲或說名等而無別判正理第三敘兩師說亦同俱舍兼有問答故彼論云語教異名教容是語名教別體教何是名彼作是釋要由有名乃說為教是故似教體即是名所以者何詮義如實故名佛教名能詮義故教是名由是佛教定名為體舉名為首以攝句文顯宗第三同順正理三藏解云西方諸師傳作此釋俱舍正理皆有兩說各有所歸所以者何令物歡喜音聲為勝若約詮法名等即勝故知所對不同各有准據由斯兩說皆是正義今詳諸論隨文相判正理論意名等為正故彼結云是故佛教定名為體准此俱舍亦同正理以彼不破義不違故或可後師自結所立非正理師刊定勝劣若依婆沙評家正義音聲為正故大婆沙第一百二十六云問如是佛教以何為體為是語業為是名等答應作是說語業為體問若爾次後所說當云何通如說佛教名何法答謂名身句身文身次第行列次第安布次第連合答後文為顯佛教作用不欲開示佛教自體謂次第行列安布連合名句文身是佛教用有說佛教名等為體問若爾此文所說當云何通如說佛教云何答謂佛語言唱詞評論語音語路語業語表是謂佛教答依展轉因故作是說如世子孫展轉生法謂語起名名能顯義如是說者語業為體佛意所說他所聞故具說如彼問豈不正理依婆沙等如何不依評家正義答曰眾賢理長為勝故別生理名等為正解云彼宗聲為體者法數門中唯用音聲一法為體名等為體者即用名等三法為體若合說者合用四法為體謂聲名等評家正義用聲一法為體依經部宗以聲為體故順正理第十四卷破經部云汝不應說名句文身即聲為體無性攝論第一亦爾彼云諸契經句語為自性且不應理然依彼宗有三師說一云十二處中聲處為性離聲無別名句字故一云法處相續假聲以為自性唯是意識所緣性故一云通用假實二聲為體前二義故如何經部宗有此三說三藏解云以經為量釋諸義者皆名經部故經部宗有此三說彼宗法數諸說不同一云離心無別心法若依彼說有十九法謂色中有十四謂五根五境及四大種心唯是一無心法故不相應法唯有一數謂諸無作無為有三謂虗空擇滅非擇滅如是有十九種法於中但用聲處為體相續假聲無別體故自餘諸說一切法義中當具分別今依大乘兩說不同一龍猛宗無文正判法數多少准智度論明諸法相大分同於薩婆多宗總有七百六十一法何以得知者薩婆多宗明七十五法十住毗婆沙立有七百不相應法故知除十四不相應加七百不相應法故有七百六十一法更勘餘論由斯即用十一色中音聲為體故智度論三十三云六通阿羅漢佛說法時雖不在座以天眼見佛天耳聞法若神通力所不及處不得見聞准此佛教用名為體二彌勒宗總有百法如百法論然出教體諸教不同有處唯聲如維摩經等佛以一音演說法眾生隨類各得解又無量義經云能以一音普應眾聲又大界經云如來一語說法中演說無量契經海又此經第五云如來言音略有三種一者契經二者調伏三者本母相續深密二經皆云佛語有三一脩多羅語二毗尼語三摩德勒伽語顯揚等論即說聖教名為聲量有處但用名等為體如仁王經云此經名句百千佛說又此經第四云一者於無量說法無量法句文字後後慧辨陀羅尼自在愚癡二者辨才自在愚癡解云無量說法者義無礙境無量法句文字者法無礙境後後慧辨者辭無礙境辨才自在者辨說無礙境故知聖教名等為體故成唯識第二卷云若名句文不異聲者法辭無礙境應無別准知名等以為自性有處合說聲及名等如仁王經云十二部經如名句文聲又維摩經第三卷云有以音聲語言文字而作佛事如是乃至諸佛威儀進止諸所施為無非佛事無垢稱經亦同維摩又十地論第一卷云說者以此二事說聞者以此二事聞具如彼說解云言二事者謂聲及名等有處文義合說為體如瑜伽論八十一云論契經體略有二種一文二義文是所依義是能依如是二種總名一切所知境界所以如是諸教異者三藏解云據實皆用名等為體而諸聖教各據一義故不相違所以者何以假從實用聲為體離聲無別名句等故以體從用名等為體能詮諸法自性差別二所依故假實相藉合說為體隨闕一種說不成故生解究竟必由文義是故諸說互不相違第二本影有無有其二義一本影有無二說法差別本影有無者如來聖教四法為體所謂音聲名句文身如是四法如來自說名為本質聞者識變名之為影如是本影有無差別總約諸宗有其四句一有本無影諸說不同且依諸部有其三說一薩婆多宗一切佛聲唯是有漏亦說名等定唯無記若廣分別如婆沙等二大眾部一說部說出世部雞胤部等皆作是說諸佛世尊皆是出世無有漏法諸如來語皆轉法輪佛以一音說一切法三多聞部說佛五種音是出世間所謂苦空無常無我涅槃寂靜引聖道故所餘諸聲皆是世間如是等部皆作是說唯本非影彼宗不明唯識義故二有影無本者諸那伽犀那此云龍軍即是舊翻三身論主彼說佛果唯有真如及真如智無色聲等麤相功德堅慧論師及金剛軍皆同此釋堅慧論師即是舊翻寶性論主五印度北也三本影俱有者月藏菩薩亦名護月及親光等皆作是說一切如來具有三身色聲等德金光明云如來能轉三種法輪謂轉照持如是等教誠證非一或能聞者識變似彼故知俱有本質影像四本影俱無者清辨菩薩依勝義諦立一切法其性皆空或可護法就勝義諦作如是說如來聖教本影俱無勝義諦中無言等故雖有如是四句差別大唐三藏及護法宗有其二義一就實正教唯本非影本即如來正所說故二兼正俱說通於本影皆由如來說力起故問若正教佛自說者楞伽等說如何會釋四卷楞伽第三卷云我從某夜得最正覺乃至某夜入般涅槃於其中間不說一字亦不已說當說不說是佛說又大般若第五百六十七云眾生各各謂佛獨為說法而佛本來無說無示又五百七十一云諸佛菩薩從始至終不說一字解云不說有其三義一依真如離言說等種種相故故言不說是故四卷楞伽第三卷云何因說言不說是佛說佛告大慧我因二法故作如是說云何二法謂緣自得法及本住法又十卷楞伽第五卷云一者依自身內證法二者依本住法廣說如彼解云經意於一真如有其二義一內自所證二有佛無佛性相常住如是真如離言說故名為不說故彼四卷頌云爾時世尊欲重宣此義而說偈言我某夜成道至某夜涅槃於此二中間我都無所說緣自得法住故我作是說彼佛及與我悉無有差別十卷第五大同前頌第五句云內身證法性又仁王經云無聽無說如虗空法同法性聽同說同一切法皆如也又天親菩薩波若論云若人言如來說法則為謗佛不能解我所說法故此義云何偈曰如佛法亦然所說二差別不離於法界說法無自相論自釋云二差別者所說法及義解云論意化身如來離真如外無別自相如佛離真如外無別自相所說教法及所說義亦復如是二約諸佛所說無異故言不說故波若論云如經言須菩提如來無所說法故此義云何無有一法唯獨如來說餘佛不說故三約墮文字法故言不說是故四卷楞伽第四云如來不說墮文字法文字有無不可得故除不墮文字若有人言如來說墮文字法者此則妄說法離文字故是故諸佛及諸菩薩不說一字不答一字乃至廣說又彼復云大慧若不說一切法者教法則壞教法壞者則無諸佛菩薩緣覺聲聞若無者誰說為誰十卷第六大同此說故不繁述准上經文雖不能說墮文字法而能宣說不墮文字三藏聖教故維摩云夫說法者無說無示其聽法者無聞無得譬如幻士為幻人說法當建是意而為說法又問兼正俱說通本影者如何會釋無性菩薩攝大乘論彼文但用聞者識上聚集顯現以為自性解云護法不依彼論以為定量故不成難又解護法同無性說彼無性意許有三身色聲等德亦能說法故彼論云受用變化即是後得智之差別問若爾如何聞者識上聚集顯現以為教體而不說言見者識上所現色身以為化身解云影略互顯據實身教皆有本影故不相違問等是影略如何不說見者識相以為二身解云不必須通不離難故又解教為生解聞者識相親能生解身出佛體由斯且說佛色心等問聞者識上所變教體為是有漏為無漏耶大唐三藏釋云西方兩釋一云無漏心變定唯無漏有漏心變自有二義橫尅而言名為有漏以有漏心所變境故若從法界所流義邊名為無漏無性論宗多依此釋一云有漏心所變者定是有漏若無漏心所變相者定唯無漏雖有兩說大唐三藏護法菩薩意存後說故成唯識論第十卷云見相二分有漏無漏定是同性善等三性不必同性三性因緣雜引生故問有漏變正教正教成有漏無漏變邪教邪教應無漏解云許亦無失無漏變故問教有邪正殊皆通漏無漏或可人有凡聖異皆通聖非聖解云許亦無失以能變心通二種故言說法差別者自有二種一約三身者二依諸知約三身問依何身而能說法答薩婆多宗佛有二種一者生身佛謂父母所生有漏身二法身佛謂五分法身生身說法而非法身入觀位中不說法故依經部宗亦有二身皆能說法彼宗無漏能發音聲說聖教也今依大乘具有三身說與不說有其四句一一說二不說謂受用身為受法樂能自說故非法身者無言說故亦非化身非真說故或可化身非餘二身無言說故無所為故雖他受用對機說法而實是化二二說一不說謂佛法身及受用身內證聖行境界故受用法樂故或可受用變化皆能說法而非法身無言說故三三皆說法如十卷楞伽第二卷說法身說法者內證聖行境界故報佛說法者說一切法自相同相故化佛說法者說六度等乃至廣說四卷楞伽第一卷說大同前說四三皆不說所以者何真如法身無言說故自受用身無所為故變化身等非真說故然佛地論且依說義略敘三說故佛地論第一卷云受用變化二佛土中今此淨土何土所攝說此經佛為是何身有義化土化身說法有說受用土受用身說法廣說如彼如實義者釋迦牟尼說此經時地前大眾見變化身居此穢土為其說法地上大眾見受用身居佛淨土為其說法所聞雖同所見各別具說如彼准如實義於三身中二身說法而非法身依土差別者依楞伽經有十種說法一語言說法乃至第十動身說法故十卷經第四卷云大慧復言世尊有語言說應有諸法若無諸法應無言說佛告大慧亦有無法而有言說如兔角等大慧兔角非有非無而有言說故汝所難此義已破大慧非一切佛土言語說法何以故有佛國土直親不瞬口無言說名為說法四卷楞伽云瞻視顯法有佛國土直示相名為說法四卷楞伽或有作相有佛國土但動眉相名為說法四卷楞伽或有揚眉有佛國土唯動眼相名為說四卷楞伽或有動精有佛土嘆名為說法四卷亦同有佛國土欠名為說法四卷亦同有佛國土咬名為說法四卷云或磬咳有佛國土念名為說法四卷經云或念剎土有佛國土動身名為說法四卷云或動搖又維摩經第三卷云有以光明而作佛事或以菩薩或佛化人或菩提樹或以衣服臥具或以飯食或以園林臺觀或以三十二相八十隨好或以佛身或以虗空或夢喻等或以音聲語言文字而作佛事或有佛土寂漠無言無說無示無識無作無為而作佛事如是阿難諸佛威儀進止諸所施為無非佛事若廣分別如無垢稱第五卷說所以如是諸教異者依大乘宗汎論說法略有四義一語言說如佛地論二身說法而非法身二生解說法亦通法身如楞伽經三依土差別十種說法如楞伽經四諸佛進止諸所施為乃成無量如維摩等各有所據故不相違或可佛事顯利益事非唯說法問上諸說皆有名等為不定耶解云不定法身說法及虗空等能生解故名為說法而無名等諸無為法無分位故若其無說無示等者寂嘿心上假立名等於理無失有為心等有分位故三聚集顯現歷心差別者如攝大乘無性釋云貫穿縫綴故名為經此中即是隨墮八時聞者識上直非直說聚集顯現以為體性解云八時有其二釋一云八時即八轉聲謂於七轉加呼召聲如言係補盧沙此八轉聲後當分別謂佛說法於八轉中隨用一聲故云隨墮八時一云依聲明論晝夜各有四時合有八時如來說法於八時中隨墮一時故云隨墮八時直非直說有其三釋一云詮自性故名為直說詮差別故名非直說一云長行名為直說偈頌為非直說一云十二部中契經為直說餘十一部為非直說此中意說隨墮八時聞者識上十二部經名字句等聚集顯現以為教體問何等名為聞者識心如何說為聚集顯現解云依瑜伽論且約六識分別五心故彼第一卷云復次由眼識生三心可得如其次第謂卒爾尋求決定心初是眼識二在意識決定心後方有染淨此後乃至等流眼識善不善轉而彼不自由分別力乃至此意不趣餘境經爾所時眼意二識或善或染相續而轉如眼識生乃至身識亦爾解云五中初後通六次三唯意又前三是無記後二通善惡又卒爾五識後必有尋求心尋求心後或散不散散即復起卒爾五識不散即起第三決定乃至等流又意識卒爾自有二種一五識同時卒爾意識二獨頭意識卒爾墮心故瑜伽論第三卷云又意識任運散亂緣不串習境時無欲等生爾時意識名卒爾墮心唯緣過去境五識無間所生意識或尋求或決定唯應說緣現在境若此即緣彼境生釋家四說一云意識任運不依前三心次第故名散亂汎爾漫緣不串習境時有五遍行無別境五爾時意識名卒爾墮心唯能緣過去曾所緣境若說五識無間所生意識或尋求心或決定心唯應說緣前五識種類現在境若此尋求決定二心即緣彼五識種類境生餘三師說如五心章此中且依前五種心以明聚集言聚集者如契經說諸行無常有起盡法生必滅故彼寂為樂解云此即契經比量破執常者諸行無常宗有起盡法者是同法喻舉燈光等生必滅故者是因由是道理彼寂涅槃以為勝樂且約初句以辨聚集於中具有四聲四字四名一句及所詮義於此義中西方諸師且作三釋有云說諸字時卒爾耳識同時意識及尋求心唯有聲相所以者何五俱意識是現量故不緣名等若尋求心尋五識等所緣境故不緣名等雖此三識所變聲上皆有名等如生等相而不緣故不說聚集決定心後有三種相謂聲名字至說行時卒爾耳識同時意識及尋求心唯得行聲准前可知決定心等亦得九種准前可知說常字時卒爾心等得常聲決定心後得十四種謂四聲四字四名一句及所詮義由此極少經十六心乃得具足謂從四字皆有四心謂卒爾耳識同時意識尋求決定若不散者起染淨心如理應思有義卒爾耳識同時意識不緣名等義如前說是現量故尋求已去即非現量由斯亦得聲名字等四尋求心如其次第得三六九及以十四准前應知若依此釋經十二心方得具足決定心等所得多少如理應知有義耳識同時意識亦緣名等若不爾者尋求意識尋何等名由斯道理說諸字時卒爾耳識唯得諸聲同時意識得聲名等於此義中分成兩釋一云四卒爾心各唯得三所以者何說常聲時不緣諸等聲及名字五識同時卒爾墮心皆現量故若許緣者應有散心現量緣過去故其尋求心方得圓滿尋求等心所得多少如第二說一云五識同時意識容非現量故得緣過去名等若依此釋即以心中具足聚集問若如前說五俱意識定是現量如何亦說緣名等耶解云現量亦然名等自相而因明理門說不緣名義相繫故或有但由等流耳識所列發故而顯現者未必要待卒爾耳識之所列生方能聚集上來且說未轉依位卒爾心等聚集顯現若轉位於一念中具足顯現如理應思廣釋五心具如前章四辨音一異門問如來說法為一音不答諸說不同若依異部宗輪論有二十部分成兩釋一大眾部一說部說出世部雞胤部皆作此說諸如來語皆轉法輪佛以一音說一切法真諦記云如來言音自有二種一從口出皆是法輪二威德所顯不從口出不關法輪如問阿難從何處來等如佛說法時前後悉見佛面對其說法此亦佛威德所顯云云二一切有部及經部等皆作此說非如來語皆轉法輪非佛一音能說一切法乃至廣說大毗婆沙第七十九亦有兩說同部執論彼云問佛以聖語說四聖諦能令所化皆得解不設爾何失二俱有過所以者何若言能者毗奈耶說如何會釋世尊有時為四天王先以聖語說四聖諦四天王中二能領解二不領解世尊憐愍饒益彼故以南印度邊國俗語說四聖諦二天王中一能領解一不領解世尊憐愍饒益彼故復以一種篾戾羊語說四聖諦時四天王皆得領解若不能者伽他所說當云何通如有頌言佛以一音演說法眾生隨類各得解皆謂世尊同其語獨為我說種種義一音者謂梵音乃至廣說答有二說一有作是說佛以聖語說四聖諦皆能領解而四天王意樂有異為滿彼意故佛異說乃至廣說復次世尊欲顯於諸言音皆能善解故作是說謂有生疑佛唯能作聖語說法一切言音未必自在為決彼疑佛以種種言音說法復次有所化者依佛不變形言或依變形言乃至廣說是故世尊說三種語二云佛以一音說四聖諦不令一切皆能領解世尊雖有自在神力而於境界不能改越如不能令耳見諸色眼聞聲等問若爾前頌當云何通答不必須通非三藏故諸讚佛頌言多過實如分別論者讚說世尊心常在定乃至廣說復次如來言音遍諸聲境隨所欲言皆能作之謂佛若作支那國語勝在支那中華生者具說如彼復次佛語輕利速疾迴轉雖種種語而謂一時謂佛若作支那語已無間復作礫迦國語乃至復作博羅語以速轉故皆謂一時如旋火輪非輪輪相前頌依此故亦無違復次如來言音雖有多種而同有益故說一音解云婆沙自有二說一云一音能令得解此當部執大眾部等言一音者謂梵音也而三遍說有三種意一滿彼意故二斷彼疑故三隨所化者依不變形言反變形言一云不得一音皆令得解此當部執說一切有部等計而伽陀說能令解者不必須通非三藏故言過實故如分別論者云世尊心常在定等復以三義會一音義一隨處第一故名為一二速疾似一故名為一三利益同故名為一今依大乘一音能說故無量義經云能以一音普應眾聲又大不思議經云如來說法一語中演說無邊契經海無垢稱云佛以一音演說法有情隨類各得解又佛地論第六卷云成所作智隨諸眾生意樂差別現化語業說種種義斷諸疑惑謂發一音表一切義定諸有情隨類獲益如契經言佛一音演說諸法眾生隨類各得開解或有怖畏或有歡喜或生厭離或復斷疑此是如來本願所列不思議力所發化語一音能斷一切眾疑如是等說不可具述然一音者是一梵音故無量義經云稽首歸依梵音聲又智度論八十六云欲為眾生法說解一切眾生語言音聲以梵音聲而為說法問此如來一音所說為是本質為影像耶若本質者無性攝論如何會釋若影像者隨能聞者即成多種如何言一解云護法等宗就實正教唯本非影兼正俱說通本及影而言一者同一梵音難約聲辨順違同一聲或可約色辨青黃青黃應成一解云許亦無失如雜集說迦末羅病損壞眼根見青為黃此亦如是由佛神力於一色等各各異見故佛地論第六卷云成所作智若作化身亦令眾生一質異見利樂事成問神力得自在同質得異見或可神力得自在異質得同見解云大乘四句皆成一同質異見如一化身眾生各各所見不同二異質同見如一化身諸佛共變據實眾多而見為一故成唯識論第十卷云他受用身及變化身隨諸如來所化有情有共不共所化共者同處同時諸佛各變為身為土形狀相似不相障礙展轉相雜為增上緣定所化生自識變現謂於一土有一佛身為現神通說法饒益於不共者唯一佛變諸有情類無始時來種姓法爾更相繫屬或多屬一或一屬多故所化生有共不共不爾多佛久住世間各事劬勞實得無益一佛能益一切生故三同質同見四異質異見諸宗共許義顯可知問約色辨青黃青黃得成可約心辨八識應成一解云色聲是麤法同質得異見心法細難知不應說為一又一音等即是如來三密之中身語密也言身密者如智度論第一卷云佛初轉法輪時應持菩薩從他方來欲量佛身上過虗空無量佛土至華上世界見佛身如故說偈讚歎又密迹經云佛有三密身密語密意密一切諸天人皆不解不知有一會眾生或見佛身黃金色白銀色諸雜寶色或見佛身一丈六尺或見一里十里百千萬億乃至無邊無量遍虗空中如是等名為身密言語密者有人聞佛聲一里有聞十里百千萬億無數無量遍虗空中有一會人或聞說布施或聞說持戒忍辱精進禪定智慧如是乃至十二部八萬法聚各各隨心所聞是名語密是時目連心念欲知佛聲近遠即以神足力往至西方光明幢世界去此九十六恒河沙世界自聞佛聲如近無異其佛身長四十里菩薩身長二十里所食鉢器其高一里其佛與大眾方食大目犍連行鉢際上彼土大眾恠問世尊此人頭虫從何處來被沙門服行鉢際上乃至彼佛告目連曰汝過恒河沙劫尋佛音聲終不可得目連還來佛前悔過言意密者如來成道至滅度日於其中間如來無疑亦不迴轉心無思行等廣說如彼及智度論第九如上所說皆是如來不思議若思議者心則狂亂如大般若五百六十七顯揚十七說所詮宗者略有四種一存妄隱真宗如薩婆多等雖說四諦不立真如二遣妄存真宗如經部師遣諸妄法存法性空三真妄俱遣宗如清辨等雙遣一切有為無為四真妄俱存宗如護法等存立二諦三性等義如是等義至文當說或可諸宗略有三種一約時辨宗二部別顯宗三隨病別宗約時辨宗有其三種一四諦法輪如四阿笈摩雖有諸部四諦為宗梵音阿笈摩此翻云傳故瑜伽論八十五云佛及南印度立五阿笈摩弟子展轉傳來于今故名笈摩謂四阿笈摩外別立百部阿笈摩經四阿笈摩者一雜二中三長四增壹廣如瑜伽八十五釋二無相大乘如諸般若遣所執性無相為宗三了義大乘如此經等用三性等為所詮宗三種法輪至第二卷當廣分別問諸般若宗明無相此經了義淺深何異清辨解云深密等經辨有所得淺而非深諸部般若顯無所得為最甚深護法等說二時所說無相之理理無淺深而說深密為了義者約三性義決判諸經有道理顯了說故名為了義非無相中有淺深故說了義也問如何得知諸部般若為第二時解云此義如第二卷經記中說二部別顯宗者約時雖三而一一時皆有多部隨一一部所詮各別如法華等一乘為宗無垢稱等不可思議解脫為宗涅槃經等佛性為宗華嚴經等四十二賢聖觀行為宗此經一部三種無等為所詮宗一境無等即是二諦及三性等二諦即是三乘通境三性等理唯菩薩境二行無等所謂止觀及十度等止觀即是三乘通行行十度唯是菩薩行門三果無等即是智斷及三身果智斷即是菩提涅槃此通三乘三身唯是菩薩所得如是等部所詮各別不可具述三隨病別宗者雖隨部別各詮一義而諸有情迷蘊處等八萬四千法門故諸部中隨其所說蘊界處等為所詮宗今此一部四種宗中真妄俱存宗約時辨宗了義為宗隨部別宗三種無等為所詮宗隨病別宗即用二諦及三性等為所詮宗第三顯所依為自有二種一顯教所依二顯教所為言所依者聖教雖多總相不出二藏三藏十二部經十二部經至第三卷當廣分別二藏三藏至第五卷自當解釋具如別章故不繁述然此一代如來聖教此國諸師意趣不同有說一教所謂一音義如上說或說二教所謂漸頓頓即華嚴餘皆是漸漸中涅槃以為了義餘皆不了誕法師等作如是說或說三教所謂通教別教圓教光統法師等作如是說慧光法師是國統故名光統也或說四教一三藏教小乘三藏二者通教謂波若等三者別教謂涅槃等四者圓教謂華嚴等或說五時教及七階教武都山隱士劉虬云華嚴等教以為頓教漸中五時或開七階言五時者一佛初成道為提謂波利說五戒十善即是人天教門佛成道已十二年中說三乘差別教如次應知四諦緣起及六度行未說空理三佛成道已三十年中說空宗般若維摩思益未說一乘破三皈一四成道已三十年後於八年中說法華經辨一乘義破三皈一未說佛性未明佛常是不了教五佛將滅度一日一夜說涅槃經悉有佛性法身常住是了義教言七階者第二時中開三乘教遠法師破云所說年月皆無正文也今述西方諸師所立有說一教所謂一音如羅什等或說二教所謂半滿如曇無懺或說三教如大唐三藏依深密等所說四諦無相了義如上已說而說一音及半滿等各據一義互不相違所說華嚴及楞伽等皆第三了義所攝而言三時所說教者約義淺深廣略義說非約年歲日月前後說三時也或說四教所謂四諦無相或說法相如楞伽等或說觀行如華嚴等真諦三藏作如是說或說五教一者四諦二者無相三者觀行四者安樂如涅槃經以說常樂涅槃果故五者守護如金光明等說諸神王護國事故婆頗三藏作如是說今此一部二藏之中菩薩藏攝三藏教內達摩藏收十二部中論議經攝三時教中了義教收四教之內法相觀行五教門中觀行門也言所為者自有二種一者總明諸教所為二者別明此教所被諸教所為具有五性所謂三乘不定無性故善戒經第二卷云眾生調伏有其四種一者有聲聞性得聲聞道二者有緣覺性得緣覺道三者有佛性得佛道四者有人天性得人天樂地持第二亦同善戒經彼云人成就者略說四種有聲聞性以聲聞乘而成就之有緣覺性以緣覺乘而成就之有佛種性以無上乘而成就之無種性者則以善趣而成熟之如是四人諸佛菩薩以此四事而成熟之瑜伽三十七亦同地持解云不定不離三乘乘乘之內菩薩性攝故不別說又准此文三法輪外理應別有人天教門就勝說故且說三時法輪或可攝在苦集教中別明此教所被機者於五種性但為菩薩及不定性說此契經故下經云阿陀邪識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我又解此經通為四性唯除無性故下經云為欲發趣一切乘者故說第三了義大乘所以者何諸部波若但為菩薩說諸空義此經宗明一切諸法有無道理故三乘者皆得勝利或可此經通為五性通說人天一切乘故五性義中當更分別第四依文正釋自有二種一廣略同異二判文解釋廣略同異者此經一部自有二種一者廣本有十萬頌二者略本千五百頌然此略經梵本唯一隨譯者異乃成四部一者宋時元嘉年中中印度僧舊云天竺求那䟦陀羅宋云功德賢在於潤州江寧縣東安寺翻出一本名相續解脫唯有一卷或兩卷成總十七紙於一卷內有二題目初十紙半名相續解脫地波羅蜜了義經一卷後有六紙半名相續解脫如來所作隨順處了義經雖無品目如其次第當解深密最後二品二者後魏延昌二年北印度僧菩提留支魏云道希在於洛陽嵩高山少林寺翻出一本名深密解脫經有其五卷品有十一六十七紙一序品二聖者善問菩薩問品三聖者曇無竭菩薩問品四聖者善清淨慧菩薩問品五慧命須菩提問品六聖者廣慧菩薩問品七聖者功德林菩薩問品八聖者成就第一義菩薩問品九聖者彌勒菩薩問品十聖者觀世自在菩薩問品十一聖者文殊師利法王子菩薩問品也三者陳朝保定年中西印度內優禪那國三藏法師拘那羅陀陳云親依或名真諦此三藏入漢國歷三朝謂周梁陳於西京故城內四天王寺更翻一本名解節經唯有一卷有其四品紙九張半當解深密初之二品無序品名開勝義諦以為四品一不可言無二品二過覺觀境品三過一異品四一味品也若依真諦翻譯目錄云陳時天嘉二年於建造寺譯解節經一卷義疏四卷四者大唐貞觀二十一年三藏法師玄奘在於西京弘福寺更翻一本名解深密總有五卷開品為八六十八紙一序品二勝義諦相品三心意識相品四一切法相品五無自性相品六分別瑜伽品七地波羅蜜多品八如來成所作事品然此四本有同異者略有二義一題名有異二文義圓足言名異者四本不同一相續解脫二深密解脫三者解節四解深密解深密者若依梵音涅謨折那地言涅謨折那此翻名解地翻為深密釋其名義如前已前言解節者如真諦記解即解釋節謂堅結堅是堅固結縛楯如木節及人骨節並有堅固拘結纏縛此經所明甚深密義難可通達難可解釋故非凡夫新行菩薩所能解了故說此義名為堅結此經能解故名解節解節之義凡有五種一深密義如法身等難可通達名為義節此經能釋故名解節二者無明習氣心惑凡夫二乘所不能破故說此惑名為堅結由緣真實能滅此惑故說真實名為解節三者智慧緣此真實亦說此智名為解節從境得名也四者此經文句名為解節從所顯得名五者一切三乘教中所有微細難可了義聚在此經分明解釋故說此經名為解節若具分別如真諦記所言相續解脫深密解脫未見說處准義釋者涅謨折含有二義一者解釋義如上已說二者解脫義故二本經皆云解脫言地者含有三義一者深密義二者堅結義如上已釋三者相續義是故二經一名相續解脫二名深密解脫此上二釋准真諦而可了知言相續者謂所知障堅結相續難可解脫今一部釋甚深義便能解脫煩惱相續故名相續解脫經即當真諦記中第二煩惱解節義言深密解脫者由智慧力緣深密理解脫煩惱故言深密解脫即當第三智慧解節也雖有此釋據實即是譯家謬也言文義圓足者如解深密具有八品而差別者解節唯有最初二品闕無後六相續解脫當後二品闕無前六深密解脫有十一品於勝義諦開為四品由斯與此文義圓足然解深密諸所說處文義明淨至文對釋故今釋此大唐一本如是我聞釋曰自下判文解釋然判此經有其三釋一云此經唯有二分一教起因緣即初序品二聖教正說謂後七品雖後經末依教奉行品中奉行非一部也一云一部總有三分初一品名教起因緣分次有七品名聖教正說分後第五卷末爾時曼殊室利下依教奉行分然此奉行散在諸品於理無違一云此經有其五分一教起因緣即是序分二無等境界分謂次四品三無等行分謂次二品四無等果分謂後一品五依教奉行分謂即經末歡喜奉行雖有三釋且依初說無有一部通奉行故又解三中第二為正具足三分義不違故此當舊說序正流通序謂由序起正說之由致正即正宗所詮之宗義通謂流通通後世之勝利今言教起因緣等者以薄伽梵說經本主名之為因顯已聞等非正說故名之為緣故說序分名因緣分正顯所詮法門品類故說七品名聖教所說分時眾聞教歡喜信受名奉行分就因緣分有其二義一證信分二發起然此二分有差別者略有三義一者名別所謂證信及發起序亦名通序及名別序說我聞等令物生信名為證信諸經皆同名為通序以放光等發起正宗名為發起隨部各別名為別序二者時別如來發起名經前序阿難所請名經後序說彼二序時分別故三者人別一如來序於諸經中如來發起二阿難序由阿難請說此序故今此經文及佛地等唯有證信而無發起於證信中義說發起理亦無違就證信中有其三義一辨事多少二說序之意三隨事別釋辨事多少者自有三說一者真諦般若記中開為七事一如是者標所聞法一部文理決定可信二言我者出能聞人即是阿難三言聞者親承音旨四一時者顯所聞法善合時機五佛世尊出能說師六住處者顯說有處七大比丘顯非獨聞然此七事總唯四意初如是者明所聞法次我聞者辨能聞人次二證所聞法後二證能聞人廣如真諦七事記釋二依龍猛大智度論於序分中開為六義一信二聞三時四主五處六眾世親菩薩燈論中說亦有六義故彼偈云前三明弟子後二證師說一切修多羅其事皆如是三依親光佛地論中攝多五種一總顯已聞二說經時三者說主四顯說處五顯聽眾說序意者問何因緣一切經首皆說如是我聞等事真諦三藏七事記云斷三疑故彼云又微細律明其阿難當登高座出法藏時身即如佛具諸相好若下高座還復本形眾見此瑞有三種疑一疑大師釋迦以慈悲故從涅槃起更宣深法二疑諸餘世尊從他方來三疑阿難比丘既是佛弟堪代其兄轉身成佛今欲遣三疑故云如是我聞等七事明乃是我親從佛聞非關慈悲從涅槃起亦非餘佛他方來又非我已轉身成佛自說經也智度論云說時方人欲令眾生心生信故又智度第二卷云佛涅槃時於俱夷那竭國薩羅樹間北首而臥將入涅槃爾時阿難親愛未除未離欲故沒憂悔不能自出爾時長老阿㝹樓豆語阿難言汝是守護佛法藏者不應如凡人自沒憂悔諸有為法皆是無常汝何愁憂又佛世尊手付汝法汝今愁悶失所受事汝當問佛佛涅槃後云何修行誰當作師惡口車匿云何共住長阿含經第四卷云闡弩比丘云何共住佛諸經首作何等語阿難即以此語問佛佛告阿難行四念處戒經為師車匿比丘如梵法治長阿含經第四增一阿含第三十六皆云梵法治者即是不共語也廣說如彼諸佛經者首皆稱如是我聞等語依集法經及涅槃後分大同智論恐繁不述大悲經說憂波離教阿難請問所以經論說不同者二人共教各據一義互不相違復依經文隨事別釋言如是我聞者即七事中所聞能聞親承音旨三種事也於六義中信聞二事五中第一總顯已聞雖有三說且依佛地如是我聞釋有三義一總釋如是我聞二別釋如是我聞三者申其合說之意言總釋者謂傳佛教曼殊室利及阿難等皆作此言如是所說甚深等我昔曾聞金剛仙論云三種阿難中大乘阿難傳大教也言別釋者先辨如是後釋我聞言如是者諸說不同此地諸師略有八釋義如常說言八釋者一約信順釋言如是者信順之辭也夫信則所言之理順順則師資之道成經無豐約非信不傳故建言如是注維摩中肇法師釋也二約文義釋以文為如以理為是文巧詮為如理以為非為是智者禪師維摩記中有此釋也三約真俗釋真不違俗名之為如俗順於真稱之為是相傳釋也四約弟子釋阿難所說如於佛語故名為如為欲簡去相似之如故稱是五唯約佛釋阿難道佛所說之法如過去佛所說不異故名為如如諸佛說是正非邪故復言是此上二釋遠法師說六約佛及弟子釋言如是者感應之瑞也如以順機受名是以無非立稱眾生以無非為感如來以順機為應傳經者以名教出於感應故言如是注法華經有此釋也七光宅師云言如是者將傳所聞前題舉一部也如是一部經我親從佛聞即為我聞八梁武帝云言如是者如斯之言是佛所說故言如是等說不可具述也西方諸師三說不同一菩提留支金剛仙論云若依世辨乃有多途略而言之凡有四種一者發心如是二者教他三者譬喻四者決定發心如是者自念我當如是發菩提心修善行教他如是者教前人言汝當如是發菩提心修善行等也譬喻如是者是人威德熾盛如日光明智慧深廣猶如大海面貌端正猶如滿月乃至廣說決定如是者我如是見聞等是名決定如是今言如是者但取第四決定如是明須菩提我從佛聞所說理教我之所說不多不少不錯不謬決定如是無所傳之失故曰如是解云意趣大同親光長耳三藏釋有三義一者就佛三世諸佛所說無異故名為如以同說故稱之為是二者約法諸法實相故名為如如如而說故稱為是三者約僧阿難所傳不異佛說故名為如永離過非稱之曰是三真諦三藏釋如是者決定義有其二種一文二理文是能詮理即所詮廣說如彼總釋意云阿難所傳文理決定如佛所說故曰如是諸論所說亦有三種一依智度論第一卷云如是義者即是信也佛法大海中信為能入智為能度其信順者是事如是其不信者此事不如是廣說如彼二依功德施波若論云如是我聞者顯示此是世尊現覺而演非自所作三依佛地論有其四義故第一云如是總言依四義轉一依譬喻謂當所說如是文句如我昔聞此即以昔喻今二依教誨謂告時眾如是當聽我昔所聞三依問答謂有問言汝當所說昔定聞耶故此答言如是我聞四依許可謂結集時諸菩薩眾咸共請言如汝所聞當如是說傳法菩薩許彼言如是當說如我所聞於此四義有三師釋一云四中唯依第四一云此中唯依後二一云四中總依四義而說具說如彼別釋我聞者傳法菩薩及阿難等五蘊身上假立為我耳根發識聽聞所說故言我聞故佛地論云我謂諸蘊世俗假者聞謂耳根發識聽受廢別就總故說我聞問佛法中無人無我如何諸經皆說我聞解云此義諸說不同依龍猛宗約四悉檀以釋我聞梵音悉檀諸說不同一云不翻含多義故或說翻之或翻宗成或翻為墨或翻為印或翻為定或翻或就究竟如是異翻難可定准南岳禪師云如大涅槃胡漢並稱也悉是隋音檀是胡語悉之言遍檀翻名施佛以四法遍施眾生故名悉檀也智者師維摩記中作如是說若依四卷楞伽經有其四種故第二卷注經釋云悉檀者謂或言宗或言成或言理也四悉檀義如智度論第一卷說一世界悉檀如蘊成人如是我聞世界故有第一義故無二各各為人悉檀觀人心行而為說法於一事中或聽不聽為斷見故說有續生為常見故說無有人三對治悉檀如不淨觀於貪對治於瞋則無四第一義悉檀謂諸法實相言語道斷心行處滅即說偈言一切實一切非實及一切實亦非實一切非實非非實是名諸法之實相廣釋此偈如中論第三又彼論云復次世界語言有三一邪二慢三者名字依第三故名之為我即當瑜伽假說我也問豈不中論實相問中非我非無我如何智度論中說為無我答不相違世界悉檀即說為我第一義中說為無我各各為人或我無我雙遣二執亦得說言非我非非無我故中論云諸佛或說我或說於無我諸法實相中非我非無我若偏對我即說無我以為實相若雙遣執非我非無我以為實相各據一義故不相違若依涅槃即說真我以為實相如理應知依彌勒宗四義故於諸蘊中假說為我故瑜伽論第六卷云薄伽梵說苾蒭當知由四因故假說有情一為世間言說易故二欲隨順諸世間故三為斷除決定無我諸怖畏故四為宣說自他得失令其決定信解心故顯揚第九對法十三同瑜伽說言聞者諸說不同薩婆多宗耳聞非識法救論師識聞非耳如大毗婆沙第十三等依經部宗識聞非耳如成實第六譬喻論師和合能聞如婆沙十三今依大乘龍樹菩薩自有兩釋一者天眼見色准知耳聞二者和合能聞知智度論第一卷等雖有兩說和合為正正釋聞中說和合故依彌勒宗自有三說一云耳聞非識如集論雜集第一卷云耳界何相謂能聞聲又瑜伽論第三卷云數數於此聲至能聞故名為耳一云識聞非耳如瑜伽釋論第一卷云聞謂聽聞即是耳根發生耳識聞言教故又佛地論第一卷云聞謂耳根發識聽受或可二論耳聞非識一云和合能聞如雜集論第二卷云問為眼見色為識等耶答非眼見色示非識等以一切法無作用故由有和合假立為見耳等亦爾廣說如彼所以如是諸論異者為顯聞聲最勝所依故瑜伽等說耳為聞就分別義故佛地等說識為聞為顯諸法無實作用故智度論及雜集論和合為聞各據一義互不相違問無實作用不許耳聞無實作用智不應緣此中應作問答唯識道理以辨聞者如佛地論第一卷說有二師義故彼論云有義如來慈悲本願增上緣力聞者識上文義相生此文義相雖親依自善根力起而就強緣名為佛說由耳根力自心變現故名我聞有義聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根所起名為佛說聞者識心雖不取得然似彼分明顯現故名我聞解云佛地二師所說初即那伽犀那不許佛果有色聲等第二師義許佛果中具色聲等大唐三藏法護菩薩皆用後說如前本影有無中說問曰阿難如來成道日生經二十年方為侍者前所說經皆非親聞如何諸經皆說我聞菩提留支金剛仙論云昔如來滅後凡有三時結集法藏初在王舍城因陀羅窟中五百比丘結集法藏舍利弗等諸阿羅漢比丘各自稱言某甲經如是我聞佛在某處說後時為惡國王壞滅佛法自此以後復有七百比丘重結集法藏皆云某甲經我從某甲比丘邊聞不云我從佛聞此之再集並是小乘之人結集法藏又復如來在鐵圍山外不至餘世界二界中間無量諸佛共集於彼說佛話經訖欲結集大乘法藏復召集徒眾羅漢有八十億那由他菩薩眾有無量無邊恒河沙不可思議皆集於彼當於爾時菩薩聲聞皆云如是我聞如來在某處說某甲經真諦三藏七事記云親聞曰如是我聞傳聞曰我聞如是又部執記云親聞曰我聞傳曰所聞解云如是等說違報恩經說也若依報恩經釋有三義一者傳聞二者知佛世俗心三者佛重為說故第六云佛二十年中說法阿難不聞何得言我聞答諸天語阿難又云從諸比丘邊聞又云佛入世俗心令阿難知又云阿難從佛請願佛二十年中說法盡為我說佛善巧於一法一句中演無量法能以無量法為一句義佛粗示其端阿難盡已得知速利強持力故又解金剛華經說阿難比丘得法性覺自在王三昧以三昧力故前所說經皆能憶持與親聞無異如宿命通見過去事無不明了亦如迦旃延得願智力故佛所說經皆能憶持阿難亦爾問阿難既是聲聞如何能持大乘經典答如大乘集法經中說有三種阿難一者阿難陀持聲聞法二者阿難賢持緣覺法三者阿難海持摩訶衍法金剛仙論亦同集法真諦三藏金剛波若疏引闍王懺悔經說三種阿難三種之中第三阿難持此經也故不相違第三申其合說意者如佛地論云應知說此如是我聞意避增減異分過失謂如是法我從佛聞非他展轉顯示聞者有所堪能諸有所聞皆離增減異分過失具說如彼一時釋曰五中第二教起時分然此一時此地諸師有說四種一者如來一代說法有五十年時二者說一部時三者眾機熟時四者說聽共相會遇時吉藏法師法華疏說西方諸師三說不同一菩提留支言一時者有其多種謂一念時有日時有百年時有一切時有春秋冬夏時今言一時者非此等時正是如來說此經時雖言一時不云某年月日故不知何時如大華嚴淨眼品等如來成道日說其十地品第二七日說如十萬偈般若如來成道五年經有成文餘七部般若但云一時皆不知何年說乃至彼云相傳說云如來一代成道乃至涅槃恒說般若華嚴大集未曾斷絕解云准此西方三藏亦不能定說諸經時也二長耳三藏云時有兩種一半音時對緣不遍二圓音時對緣即普從初得道終訖雙林二音並行半滿俱說見小分者為半音時見滿分者為圓音時又解時復有三一分段流轉時二不思議變易時三假名施設時前二即是二種生死時假名時者梵音劫波自有三意一迦羅時二三摩耶時三世流布時迦羅時者此翻別相時如來戒律大戒時聞小戒時不聞出家時聞在家不聞國王得聞餘人不聞三摩耶時此翻破耶見時謂五部阿含九分達磨不簡黑白一切得聞言九分者如真諦師部執論記第一卷云如來正教即是經律阿毗曇經即五阿含謂長增一中雜百部也律不過三部一二二五十戒律二雜誦律三比丘尼律阿毗曇有九分一分別說戒二分別說世間三分別說因緣四分別說界五分別說同隨得六分別說名味句七分別集定八分別說集業九分別說諸陰一分有六千偈六九五十四合五萬四千偈也上二種時大同智度論說世流布者如說一時佛在恒河岸一時在申怒林今言一時且依後二三真諦三藏七事記云一時有十義一佛出世時二說正法時三聽正法時四持正法時五思正法時六修正法時七下善種時謂菩提心八成就善根時謂生中國修四念處九解脫善根時謂聽法說法持法靜心修習以此五緣得入解脫故名解脫善根時十平等捨心時若心多退名為下心聽法不入若心動踊名為高心聽法不入若作棄捨正法心此是無明不平等心聽亦不入若能沉抑浮調停得中念知捨平等得入正法故云平等捨心時具此十義故云一時也廣說如彼今依諸論有其三說一功德施波若論云一時者說此經時餘時復說無量經故二依龍猛宗時有二種一名迦羅時通假及實內外通用二三摩耶時唯假非實內宗一時依此而說故智度論第一卷云問天竺說時有其二種一名迦羅二三摩耶佛何不言迦羅時分而但說三摩耶時此即外人問龍樹宗答言迦羅俱亦有疑龍樹略答設言迦羅還有此難故不應答問曰此中應說迦羅以彼二字轉易說故而不應說三摩耶時以彼三字重語難故此外人難龍樹何不就輕而就重耶答曰今此除邪見故說三摩耶不言迦羅具說如彼龍樹廣釋若說迦羅執時外道便作此言時能生諸法世尊許時是實有故三依親光時有四種一說聽究竟總名一時故佛地論云言一時者謂說聽時此就剎那相續無斷聽說究竟總名一時此即總說一會說法說聽究竟總名一時若不爾者字名句等聽說時異云何言一此即反解若不就其說聽究竟名一時者如初說字次名後句乃至偈章品部等說聽時皆異云何言一二者一剎那頃能持能說能領能受故言一時故彼論云或能說者得陀羅尼於一字中一剎那頃能持能說一切法門解云地上菩薩得陀羅尼故一剎那頃能持說一切法門也或能聽者得淨耳根一剎那頃聞一字時於餘一切皆無障礙悉能領受故名一時解云地上菩薩得陀羅尼一時能領名一時也三者共相會遇名為一時故彼論云或相會遇時分無別故名一時即是說聽共相會遇同一時義解云感聖赴機更相會遇名一時也或可為四開聽說時為二時故問一及時其體是何答一是數時即時分諸說不同薩婆多宗及經部師即用有為五蘊為性處界門中亦用有為為性難薩婆多宗約色辨同異色外有同異或可約色辨數量亦應有別體今依大乘自有兩釋一龍猛宗數及時等皆無有體非蘊處界三科所攝故智度論第一卷云數時等法實無陰入持所不攝故彼論復云謂有時方離合一異長短名字凡人心著謂是實有廣說如彼依彌勒宗數時即是有為法上分位假立即二十四不相應中數及時也五蘊門中蘊所攝處界門中法界法處意識境故依佛地論或是心上分位影像是不相應此約唯識道理說問何故二宗有無不同答龍猛宗為破外道實數時等故無體性依彌勒宗為顯大乘法相道理故別立之故不相違或可五百不相應攝於理無違十住毗婆沙立七百不相應雖有此理未見成文問不別顯日初出時乃至中夜說此契經如下處等別指勝處而此經中但言一時答如佛地論晝夜時分諸方不定不可別說解云如南贍部洲日午時西方日出北方夜半東方日沒薄伽梵釋曰五中第三別顯教主依智度論說佛法人有其五種故第二卷云說法有五一佛自說二弟子說三仙人說四諸天說五化人說今簡餘四標薄伽梵問此經初解甚深義密意菩薩說一切法無二之義如何但言薄伽梵說答有三義一以少從多二就勝說故三佛加被故如華嚴經等然諸經首標名不同乃有四種自有經初唯置佛名如涅槃等自有經初唯婆伽婆如大品等自有經初雙標兩號如無上依佛婆伽婆般若經或有經文二種俱無如相續解脫及多心經等所以如是諸本異者相續解脫即一部中最後二品故不標名多心般若即大般若應是結集菩薩別錄流行故亦不標名餘之三句西方諸師自有三說一真諦三藏七事記中有其二意一依真實論佛具十義故諸經初十種號中單置佛號故七事記云大師十號經中何故不別餘九而獨稱佛解有十義一覺勝天鼓二不由他悟三離二無知解脫障無知一切智障無知四已過睡眠五譬如蓮華六自性無染七具足三義三義者一假名佛即六神通二寂滅佛惑不生故三真實佛即是真如八具於三德法身般若解脫三德九具三寶性十自知令知他總有四紙恐多不述真諦自云此十種義出真實論也二者真諦自申道理四句分別一切經首雙標兩號故七事中云佛婆伽婆有其四句一是佛非婆伽婆即聲聞二乘觀四諦證無餘涅槃在其自位中得名為佛不修功德行非婆伽婆二是婆伽婆非佛即是菩薩功德行滿名婆伽婆既在因位智慧未滿不得名佛三非佛非婆伽婆是凡夫其不修智慧不名為佛不修功德非婆伽婆四亦佛亦婆伽婆即是佛世尊智慧圓滿故名為佛功德具足婆伽婆廣釋婆伽婆有三四帋恐繁不述乃至彼云若但言佛恐濫二乘若單婆伽婆濫於大菩薩及轉輪王故知合說即是如來是故無上依經及金剛波若皆作此言佛婆伽婆也部執論記亦同七事也二菩提留支金剛仙論依西方正本一切經首皆云婆伽婆此方諸經或佛或婆伽婆或復雙舉佛薄伽梵者隨譯者意三親光菩薩佛地論意同金剛仙故佛地云佛具十種功德名號何故如來教傳法者一切經首皆置如是薄伽梵名謂此一名世咸尊重故諸外道皆稱本師名薄伽梵又此一名總攝諸德餘名不爾是故經首皆置此名大智度論意同佛地故第二云問曰婆伽婆正有此名更有餘名答佛功德無量名號亦無量此名耳其大者以人多識故又婆伽婆依涅槃經釋有二意一者破惡二具六德合有七義故第十八云婆伽婆者婆伽名破婆名煩惱能破煩惱名婆伽婆此即破惡四魔之中唯破煩惱魔也又能成就諸善法故又能善解諸法義故有大功德無能勝故有大名聞遍十方故又能種種大惠施故又於無量阿僧祇劫吐女根故此即六德依智度論有其四義故第二云頗加名德婆名為有此名有德又頗伽名分別婆名巧用總相別相巧分別法故又頗伽名聲婆名為有是有名聲又頗伽名破婆名能也能破三毒名頗伽婆二乘雖斷而有習氣是故不名頗伽婆也又瑜伽論三十八云能破諸魔大力軍眾具多功德名薄伽梵又八十云云怛然安坐妙菩提座任運摧滅一切魔軍大勢力故薄伽梵依佛地論薄伽梵名含有二義一具六德二能破四魔具六德者薄伽梵聲依六義轉一自在義永不繫為諸煩惱故二熾盛義炎熱智火所燒練故三端嚴義妙三十二大士相等所莊餝故四名稱義一切殊勝功德圓滿無不知故五吉祥義一切世間親近供養咸稱讚故六尊貴義具一切德常起利益安樂一切有情無懈癈故如有頌言自在熾盛與端嚴名稱吉祥及尊貴如是六種義差別應知總名為薄伽破四魔者一煩惱魔百二十八根本煩惱及隨煩惱名頌惱魔有漏五蘊名為蘊魔有漏五蘊諸無常相名為死魔第六他化自在天子名為天魔如是四種能損諸善故名為魔離四魔故名薄伽梵破四魔義後當分別今詳西方諸三藏意曇無讖等依真實論但置佛名真諦三藏依真實論及四句義雙標兩號大唐三藏及菩提流支各依一論置薄伽梵雖有諸說且依薄伽梵有論說故地婆訶羅三藏說云西方諸本皆云薄伽梵而不相違大唐三藏諸本中有婆伽婆等者具七轉聲故有種種依第八轉此亦未可即是地婆訶羅三藏神都翻者皆安薄伽梵西京所翻皆云佛也住最勝光曜七寶莊嚴釋曰五中第四說經處所於中有二初明如來住處莊嚴後釋世尊總別功德就住處中有其二義初明住處同異後正釋經住處差別言同異者依解節經化身如來在穢土說故彼經云如是我聞一時佛婆伽婆住王舍城耆闍崛山中若依深密經即受用身在淨土說同解深密解云真諦翻解節經意欲礭明勝義諦相故十八品內但翻中間四品略而不翻餘十四品為成此經具足三分故不二品內安通序文一味品末安後流通故真諦記第一卷云經初不說通序文者譯家略故解云不安品目故說為略非無序文名之為略然真諦記與經相違經王舍城耆闍崛真諦記第一云毗舍離國鬼王法堂為真尚菩薩說解節經等又智度論第三卷云王舍城在摩揭陀國不云山在毗耶離國故如違經也依佛地論釋佛地經自有三說故第一云佛住如是大宮殿中說此契經受用變化二佛土中今此淨土何土所攝說此經佛為是何身有義此土變化土攝說此經佛是變化身聲聞等眾住此土中現對如來聞說此經歡喜信受而奉行故佛心所現故出三界淨識為相為說勝法化此地前諸有情類令其欣樂修行彼因故暫化作清淨佛土殊勝化身神力加眾令暫得見若爾者聲聞等眾應俱不見有義此土受用土攝說此經佛是受用身此淨土量無邊際故路乘門等是實德故受用如是清淨佛土一向淨妙一向安樂一向無罪一向自在餘處說故解深密說三地已上乃得生故解云此經無此文也應是廣本或可譯家錯也此文即是瑜伽第七十九說此經佛具後所說二十一種實功德故說餘經時不列如是佛功德故若暫化作如是淨土如是妙身加眾令見應如餘經分明顯說然不說故是受用土及受用身聲聞等眾是佛化作或諸菩薩現作此身莊嚴佛土說法會故若爾此是地上菩薩所應見聞何故於此化佛土中結集流布傳法菩薩為欲示現一切智者及所居處超過一切世間法故如是示現欲令所化生欣樂故為令發願當生如是清淨佛土見如是佛聞如是法修彼因故為生廣大勝解有有情及諸菩薩歡喜故欲令增上意樂勝解界堅牢故結集流布又是法勝於此宜聞然處非勝化身相麤不可宣說故受用身居受用土為初地上諸菩薩說令傳法者結集流通若爾何故不但說彼所說法耶若不說處及能說者不知此法何處誰說一切生疑故須具說如實義者釋迦牟尼說此經時地前大眾見變化身居此穢土為其說法地上大眾見受用身居佛淨土為其說法所聞雖同所見各別雖俱歡喜信受奉行解有淺深所行各異而傳法者為令眾生聞勝悕願勤修彼因當生淨土證佛功德故就勝者所見結集言薄伽梵住最勝等乃至廣說如來功德今釋此經同如實義義亦無失諸本同異已如上釋今正釋住處之義依智度論第三三義釋住一住威儀二住聖住三住佛住故名為住故彼論云問曰何不直說般若波羅蜜而說住處耶答曰說時方人令人生信故時謂說經時方謂說法處人謂聽眾聲聞菩薩等云何住四種身儀坐臥行住故名為住復有三住一者天住謂六欲天住法二者梵住謂色無色天住法三者聖住謂佛獨覺及阿羅漢住法於三住中佛住聖住復次施戒善心三事名為天住四無量心名為梵住空無相無作三三昧名為聖住於三住中佛住聖住復有四住一天二梵三聖四佛三住如前佛住首楞嚴等諸佛無量三昧十力四無畏十八不共法一切智等種種諸慧及八萬四千法藏度人法門如是等種種諸佛功德是佛所住處佛於中住故名佛住法華論云顯法勝故佛住勝處勝思惟論同法華論寶積論云問曰何故初明住處答佛住此處者欲令敬重彼處故重福眾生敬此處故增長善根是故先明住處功德施菩薩波若論中同寶積論真諦三藏八義釋住一境界住謂一切十六大國四事供養之處是佛所遊履故云境界住二依止住是一切僧伽藍耆闍崛山迦蘭陀竹林等是所依止三威儀住謂行住坐臥四威儀四未捨壽命住謂現在未般涅槃住戒定等五分法身中也五者梵住謂四無量心佛在大悲心中故名梵住也六者天住謂四禪即初禪二禪三禪四禪第四禪最勝佛住此中七者聖住謂是解脫解脫有四一入無心定暫滅苦二入空定滅諸見三入無願定滅貪愛四入無相定滅四謗佛住無相定中心惑都盡也八佛住佛住無生無滅無處所法中而具足在此八處故名佛住三身而辨前三住即是化身住次三是應身後二是法身前二身是能住後法身是所住也經中多舉八住前兩境界化白衣依止化出家人即舉總別二處就釋此經住處之中有十九句顯彼淨土十八圓滿十八圓滿即十八段言十八者如佛地論第一卷云論曰此顯如來住處圓滿謂佛淨土如是淨土復由十八圓滿事故說名圓滿謂顯色圓滿形色圓滿分量圓滿方所圓滿因圓滿果圓滿主圓滿輔翼圓滿眷屬圓滿住持圓滿事業圓滿攝益圓滿無畏圓滿住處圓滿路圓滿乘圓滿門圓滿依持圓滿由十九句如其次第顯示如是十八圓滿即此圓滿所嚴宮殿名佛淨土佛住如是大宮殿中說此契經然諸論中世親無性攝大乘釋第十梁朝攝論第十五佛地論等等耶大業論等皆釋經中十八圓滿至文對釋初圓滿中有二句經初明顯色七寶莊嚴後辨放光照無邊界此中句者顯義滿足之為句非要數字方名句也餘十八句准此應知然初經句親光兩釋故佛地論云謂大宮殿用最勝光曜七寶莊嚴此釋光曜屬於七寶也或大宮殿七寶莊嚴故最勝光曜此釋光曜屬於宮殿無性釋論亦同佛地世親不釋易可知故言七寶者如稱讚淨土經云一金二銀三吠瑠璃四頗胝迦五赤真珠六阿濕摩揭拉婆七牟婆洛揭拉婆依智度論亦同彼經故第十云金銀毗瑠璃頗梨車渠馬瑙赤真珠解云金銀二寶此土有故翻為此名真諦釋云弗師羅伽此云黃色寶即是金也旃陀羅乾多此云白色寶即是銀也吠瑠璃者是正梵音毗瑠璃者梵音訛也或云瑠璃者略吠音也或可此土無真瑠璃有似瑠璃故亦翻也真諦梁論記云瑠璃是青色寶燒不可壞唯有鬼神有神力者能破為器或可是其金翅鳥卵頗胝迦者此云黃綠色寶佛地論云羯鷄怛諾迦寶智度論云過千歲冰化為頗梨珠赤真珠者佛地論云赤虫所出名赤真珠或珠體赤名赤真珠真諦釋云即無價寶珠也阿濕摩揭拉婆者舊云馬瑙真諦釋云是赤色寶無性攝論云是帝青大青等寶解云帝青是帝釋青色寶大青是帝釋勝青色寶牟婆洛揭拉婆者舊云車𤦲真諦釋云是紺色寶又智度論云寶有三種謂人寶天寶菩薩寶人寶力少唯有清淨光色除毒除鬼除闇亦除飢渴寒熱等苦天寶亦大亦勝常隨逐天身可使令共語輕而不重菩薩寶勝於天寶能兼有人天寶事又能令眾生知死此生彼因緣本末又復能出種種法音乃至廣說又彼復云問曰是諸珍寶從何處出答曰金出山石沙赤銅中真珠出魚腹中竹中蛇腦中龍珠出龍腦中珊瑚出海中石樹生貝生虫甲銀生燒石餘瑠璃頗梨等皆出山窟中如意珠出自佛舍利若法沒盡時諸舍利皆變為如意珠譬如過千歲冰化為頗梨珠如是等諸寶是人中常寶所莊嚴一切國土是最殊勝諸天所不能得何以故從大功德所生故大業論云七寶皆是石所攝也放大光明普照一切無邊世界釋曰明第二句放光普照親光釋云他受用土體雖不遍以光普照自受用土以體遍故光亦普照世親釋云謂前七寶於光普照無性釋論具上二釋無量方所妙餝間列釋曰此顯第二形色圓滿言方所者如綺井等言妙餝者如華文等親光釋云謂大宮殿妙餝間列無量方所此釋無量屬於方所或大宮殿無量妙餝方所問列此釋無量屬於妙餝言無量者或數無量或處無量解云此中數無量者重釋前云無量妙餝處無量者重釋前云無量方所世親無性亦同親光上來已釋顯形二色然此二色有差別者依俱舍等二門分別一約二十色分別顯形二顯形相對四句分別二十色辨顯形者如俱舍論初卷頌云色二或二十長行釋云言色二者一顯二形顯色有四青黃赤白餘顯是此四色差別解云餘者光影明闇烟雲塵霧皆是青等之差別也日光名光餘光名明有云光者黃色所攝有云赤色有云黃赤今解不爾光明二種皆通四色影闇是青烟雲塵霧皆通四色或可霧是青白所攝形色有八謂長短方圓高下正不正復說二十者謂青赤白光影明闇雲烟塵霧長短方圓高下正不正有餘師說空一顯色第二十一釋諸色相具說如彼言四句者如彼論說或有色處有顯無形謂青黃赤白光影明闇或有色處有形無顯謂長等一分身表業性或有色處有顯有形謂所餘色然此四句諸說不同一真諦三藏云一顯而非形如須彌山四方空中青等顯色二形而非顯謂身表色三亦顯亦形如譬等中青黃等色四非顯非形如無表色二形而非顯謂身表色二大唐三藏約生智義以辨四句如一込白染青色時而形不改唯生顯智形智不生如是名為顯而非形若其截割而不染者但有形智顯智不生如是名為形而非顯若其染截形顯智生如正理說遙見黑幡作如是言是烏非幡幡非烏等如是名為亦顯亦形非顯非形者如空界色等然第四句諸說不同依毗婆沙自有兩說一云空界色為第四句一云非顯非形者無也若依正理聲香味觸及無表色為第四句識身足論五根四塵及無表色為第四句又俱舍云有餘師說唯光明色有顯無形現見世間青等色處有長等故此是薩婆多第二師說問薩婆多顯形別體如何說云亦顯亦形解云俱舍有此問答故彼論云如何一事具有顯形經部師等問薩婆多宗由於此中俱可知故此中有者是有智藏非有境義薩婆多師答於一處所約新生智故名為形顯非於一體有二境義大唐三藏依此而說今依大乘種數多少諸論不同若依瑜伽二十四色故第一云略說有三謂顯色形色表色顯色者謂青黃赤白光影明闇雲烟塵霧及空一顯色形色者謂長短方圓麤細正不正高下表色者謂取捨屈申行住坐臥如是等色解云雖二十四色四句分別唯有三句一顯而非形有十三二形而非顯有十種三非顯非形謂表色依顯揚論亦二十四故初卷云若顯色若形色若表色云何青黃赤白如是等顯長短方圓麤細高下正及不正烟雲塵霧光影明闇若空一顯色若影像之色解云顯揚言雖有異意同瑜伽故彼所說如是等言等取後說雲烟等句影像之色即是表色依雜集論二十五色更加逈色餘同瑜伽而不分別四句差別同瑜伽論於理無違周圓無際其量難測釋曰此顯第三分量圓滿親光菩薩先以三義釋其難測後約二土分別難測言三義者一云其量周圓無際難測一云其量無際周圓難測第三一義約十方等以釋難測故佛地云謂大宮殿其量周圓無際難測或大宮殿其量無際周圓離測又東方等分齊無故長短等相難可測故後約二土釋難測者有三師釋故佛地云有義如來受用身土隨所化生所宜而現或大或小其量無定顯現廣大亦有邊際然就地前菩薩智等說言無際其量難測有義如來受用身土三無數劫所修無邊善根所感周遍法界地上菩薩及諸如來亦不能測其量邊際以無邊故如無始時如實義者受用身土略有二種一自受用謂諸如來三無數劫所修無邊善根所感周遍法界為自受用大法樂故從初得佛盡未來際相續無變如諸功德諸大菩薩亦不能見但可得聞如是淨土以無量故諸佛雖見亦不能測其量邊際二他受用謂諸如來為令地上諸菩薩眾受大法樂進修勝行隨宜而現或勝或劣或大或小改轉不定如變化土如是淨土以有邊故地上菩薩及諸如來皆測其量但就地前言不能測由是二種差別故言周圓無際其量難測無性即同佛地三中初二復次世親不釋義可知故超過三界所行之處釋曰此明第四方所圓滿親光釋云謂大宮殿處所方域超過三界所行之處非如三界自地諸愛執為己有所緣相應二縛隨增是彼異熟及增上果如是淨土非三界受所執愛故離二縛故非彼異熟增上果故如涅槃等超過三界異熟果地約十八界問答分別具不具等廣如佛地及淨土章勘淨土章及三身章約十八界問答分別有不勝出世間善根所起釋云此明第五因圓滿也親光釋云謂大宮殿用出世間無分別智後所得智善根為因而得生起非是無因非大自在天等為因云何淨土超過三界而用出世無分別智後所得世間淨法為異熟因不說與彼為異熟因然為餘因彼得生起如苦法智忍品世第一法為因此用本來無分別智後得無漏善根種子三無數劫修令增廣為此淨土變現生因無分別智名出世間後得過前說名為勝用勝出世無漏善根為此生因或諸聲聞獨覺聖道名出世間如來善根過彼名勝此佛淨土如來識中無漏善根為因而生有義但是增上緣生以外法故有義亦是因緣而生親能生故若不爾者應無因緣外法相望非因緣故一切外法皆用內法熏習為因若爾外法既是共有云何有情各別種子共為因緣合生一果勿以小心測測量大法外物豈是極微合成實有體性多因共感但是有情異識各變同處相似不相障礙如眾燈明如多所夢因類是同果相相似處所無別假名為共實各有異諸佛淨土亦復如是各別識變皆遍法界同處相似說名為共最極自在淨識為相釋曰此顯第六果圓滿也親光釋云謂大宮殿最極自在佛無漏心以為體相唯有識故非離識外別有寶等即佛淨心如是變現似眾寶等此即如來大圓鏡智相應淨識由昔所修自利無漏淨土種子因緣力故於一切時遍一切處不待作意任運變現眾寶莊嚴受用佛土與自受用身作所作依止處利他無漏淨土種子因緣力故為地上菩薩隨宜變現淨土或小或大或劣或勝為他受用身作所作止處謂隨初地菩薩所宜現小現劣如是展轉乃至十地最大最勝於地地中初中後等亦復如是世親無性更無別釋如來所都釋曰此明第七主圓滿也親光釋云謂大宮殿諸佛世尊為主非餘以殊勝故唯屬世尊或唯世尊住持攝受非餘不能自受用土雖遍法界一一自變各自為主不相障礙他受用土雖諸佛變然一合相亦一相身攝受用為主不相障礙世親無性無別異釋諸大菩薩眾所雲集釋曰此辨第八輔翼圓滿親光釋云謂大宮殿常有無量大菩薩僧共所雲集諸來朝者名為輔翼既有無數大菩薩僧常來輔翼故無怨敵能為違害諸聲聞等無如是事謂初地上諸菩薩眾雖不能集諸佛自利受用淨土而能集會諸佛利他受用淨土諸佛慈悲於自識上隨菩薩宜現麤妙土菩薩隨自善根願力於自識上似佛所生淨土相現雖是自心各別變現而同一處現相相似謂為一土共集其中如是地上菩薩淨土為是有漏為是無漏如是等義具如章說世親無性更無異釋無量天龍藥叉健達縛阿素洛揭路荼緊捺洛摩呼洛伽人非人等常所翼從釋曰此即第九眷屬圓滿依智度論第五卷說天有三種一假號天謂輪王等等即等取諸小王也二者生天謂從四天王天乃至有頂天三者淨天謂佛法身菩薩辟支佛阿羅漢智度論第七大同此說又第二十二天有四種一者名天如今國王名為天子二者生天從四天王乃至非非想天三者淨天謂人中生諸聖人是四者生淨天三界天中生諸聖人是解云三種四種天中名生二天名為天也故法華云我此土安隱天人常充滿本業經云無色諸天來入會故亦名天眾依舍利弗問經護天諸神名為天也龍有四種一者天龍持天宮殿令不墮落二者人龍興雲致雨三者地龍持地及海四者王龍守王寶藏言藥叉者舊云夜叉真諦翻為輕捷鬼也大唐三藏翻為暴惡亦名勇健亦名可畏其類有三一者在地二者在空三者在天為天給使健達縛者舊云乾闥婆此翻名尋香行西方人呼發樂戲兒名健達縛不事生業尋食香氣作樂乞求名尋香行今此神鬼常能作樂食諸香氣名健達縛智度論第十云是天妓神常隨諸天其心柔輭福少諸天居十寶山間阿素洛者舊云阿脩羅此云非天行多諂詐無天實行名曰非天如人惡行名曰非人故瑜伽論第四卷云又諸非天當知天趣所攝然由意志多懷詐幻諂誑多故不如諸天為淨法器由此因緣有時經中說為別趣實是天類由不受行諸天法故說為非天或云疑神故智度論第三十云阿脩羅神是天受樂小減諸天威德變化隨意所作是故人疑言是脩羅非脩羅或云身大智度論云修羅秦言大也大海中立不沒於𣍿向下觀忉利天又云不端正唯女舍脂端正父兄眷屬皆醜又云男醜女端正故云不端正又云無酒採四天下華於海釀酒不成故言無酒依瑜伽智度修羅天攝毗曇論說修羅鬼攝依正法念經有鬼有畜依伽他經有天鬼畜三種所攝然阿修羅有五地別如地經說一在地上眾相山中勢力最下二在須彌山北大海之下二萬一千由旬有修羅王名曰羅睺三羅睺下過二萬一千由旬有修羅王名曰勇健於勇健下復過二萬一千由旬有修羅王名曰華鬘於華鬘下復過二萬一千由旬有修羅王名毗摩質多毗摩之母本從天生故名天劫初成時有諸天女來海中洗浴水觸其身遂失精氣流在水中成一肉卵逕八千歲乃生一女有九百九十九頭頭有千眼有九百九十九口口有四牙牙上出火猶如礔礰二十四手九百九十九脚此女後時在海浮戲水精入身生一肉卵逕八千歲生毗摩質多有九頭頭有千眼口中出火有九百九十手脚唯有八其形四倍大於須彌純食淤泥及與禍根多與天諍如正法念經說揭路荼者舊云迦樓羅名為金翅鳥今云妙翅鳥鳥翅種種寶色莊嚴不唯金故華嚴經云法身金翅鳥四如意為足慈悲明淨眼住一切智樹菩薩金翅鳥生死大海中持撮天龍安置涅槃岸此是不退三昧金翅之法門准此應知淨土八部皆是化也海龍王經翻為大身鳳凰勘又經云兩翅相去三百三十六萬里閻浮提止容一足頸下有如意珠故名如意又云是其鳥神於中有其金翅之鳥純食諸龍有四生別其化生者食四生龍其胎生者食三生龍除其化生其卵生者食二生龍除化除胎其濕生者唯食其濕此四天下有一化生迦樓羅王名曰正音壽八千歲日別新食一大龍王五百小龍遶四天下周而復始次第食之命欲終時諸龍吐毒不復能食飢火所燒聳翅直下至風輪際為風所吹而復上來往返七迴無處停足遂至金剛輪山頂上命終以食諸龍身肉毒氣遂發猛火其難陀龍王及䟦難陀恐燒寶山遂降大雨渧如車輪以滅其火身肉消散唯有心在大如人䏶純清瑠璃輪王得之用為珠寶帝釋得之為髻中珠緊捺洛者此云歌神能唱歌詠乾闥婆同事諸天天須之時更互來去又云疑神體是畜生形狀似人面貌端正頂有一角人見生疑不知為人為鬼畜耶故名疑神此是天之樂神莫呼洛伽者莫呼此云大洛名為腹伽名為行此是蟒神亦云地龍無足腹行神即世間厝神受人酒害悉入蟒腹又龍蛇難辨以濫於龍故偏指也世親攝論云前已舉龍今復舉莫呼洛伽為攝大蠎人非人等者有八部鬼神悉非人作人形來聽法故曰人非人故舍利弗問經云非八部鬼神皆曰人非人也又云人者總攝一切人非人者總攝一切人非人又云人非人者疑云為是人為非人也依舍利弗問經說八部因彼云舍利弗白佛言世尊八部鬼神以何因緣生於惡道常聞正法佛言以二種業一以惡業生於惡道二以善業多受快樂此八部皆曰人非人者先身以車轝等供養三寶父母賢勝之人猶懷慳儉誑嫉故受此身如普光淨勝天神等龍者先世修建德本廣行布施不依正念急性好瞋故受此身如摩尼光龍王等夜叉神者先世好大布施或先損害然後饒益隨功勝負故受此身乾闥婆者先生亦少有瞋恚常好布施以青蓮華自嚴作眾妓樂今為此神常為諸天奏諸妓樂因名樂神阿脩羅者志強不隨善友所作淨福好逐幻偽之人作諸邪福依傍邪師甚好布施又樂觀他鬪訟故受此身迦樓羅神者先世修大捨施常有高心以陵於物故受此身緊那羅者昔好勸人發菩提心未正其志逐諸邪師故受此身摩睺羅神者亦布施護法性好瞋恚故受此身又佛地論云云何淨土超過三界所行之處而有天等以為眷屬天等皆是三界攝故淨識如是攝受變現為嚴淨土故不相違或為成熟所化有情示現如是變化種類如為調伏劫比拏王現化無量轉輪王眾眷屬圍繞或諸菩薩化作無量天龍等身住淨土中以供養佛或自化身為天龍等翼從如來故無有過梁攝論云第十五於淨土中實無如此天龍等眾欲令不空故佛化作如此雜類廣大法味喜樂所持釋曰此明第十住持圓滿親光釋云謂於此中大乘法味喜樂所持食能令住是任持義此上親光釋義已說淨土超過三界所行之處云何有食有無漏法不應名食食能長養三有眾生此斷有故應不名食此外人問有其三意一問超過三界云何有食二無漏法不應名食三斷三有故應不名食是任持因故亦名食論主略答雖是無漏而任持故亦名為食如汝宗中生色界等入無漏定亦應名食此反經部汝宗生色界等入無漏定雖是無漏亦應名食非過去食應名為食過去無故此破薩婆多用過去食為食此抑破小乘合許無漏食此亦應爾是任持因故說為食此即論主立自宗義如有漏法雖鄣無漏然持有漏得名為食無漏亦爾雖斷有漏然持無漏云何非食論主成立食義此淨土中諸佛菩薩後得無漏能說能受大乘法味生大歡樂又正體智真如味生大喜樂能任持身令不斷壞長養善法故名為食此中大乘正義世親無性更無別釋又法華云其國眾生常以二食一者法喜食二者禪悅食即彼偈云法喜禪悅食更無餘食想現作眾生一切義利釋曰此第十一事業圓滿親光釋云謂於此中自能現作一切有情一切義利或令一切有情自作一切義利現益名義當益名利世間名義出世名利離惡名義攝善名利福德名義智慧名利如是等別雖在寂定由先所修加行願行任運能作一切有情一切義利世親無性更無異釋蠲除一切煩惱纏垢釋曰此第十二攝益圓滿依佛地論煩惱纏垢二種差別三復次釋故彼論云即諸煩惱名為纏垢解云煩惱纏垢差別異名如瑜伽第八卷云煩惱差別者謂纏垢等數起現行故名為纏自性染汙故名為垢又煩惱者一百二十八根本煩惱欲界四諦各有十色無色界四諦除瞋各九合有一百一十二欲界修道有六使謂貪瞋慢無明身見邊見色無色界修道各五除瞋合有一百二十八如顯揚第一說纏者即是無慚愧等等者於八纏中等取惛沉掉舉惡作嫉妬慳恡如瑜伽第八雜集第七垢者即是諂誑憍等等者於六垢中等取害恨惱三又所知障或諸隨眠名為煩惱即彼現起說名纏垢本惑名纏隨惑名垢如是遠離煩惱纏垢名為攝益然此經文三本不同攝大乘論所列經文雖有灾橫而無纏垢故彼論云蠲除一切煩惱灾橫今依此經雖有纏垢而無灾橫佛地經文具說煩惱灾橫纏垢故彼經云滅諸煩惱灾橫纏垢釋灾橫義如佛地論及攝大乘遠離眾魔釋曰顯第十三無畏圓滿言眾魔者如前所說煩惱蘊死及與天魔如親光說如是四種皆能損害諸善法故說名為魔然離四魔有差別者依薩婆多及大乘化相菩提樹下成佛道時無間解脫破煩惱魔入無餘依涅槃界時能破蘊魔留三月命能破死魔入慈定時能破天魔若依大乘理實說者如佛地論初地以上離麤四魔於佛果中究竟永離隨義分別十信已上於諸地中漸次遠離如理應思過諸莊嚴如來莊嚴之所依處釋曰辨第十四住處圓滿親光釋云謂於此中佛所住處勝過一切菩薩及餘莊嚴住處唯是如來妙飾莊嚴為所住處由勝一切莊嚴住處是故說名住處圓滿世親無性更無異釋大念慧行以為遊路釋曰顯第十五路圓滿也親光釋云謂於此中大念大慧及以大行為所行路所遊履故名為遊路是道異名聞所成慧名為大念聞已記恃無倒義故思所成慧名為大慧依理審思得決定故修所成慧名為大行由修習力趣真理故大者念等緣大乘法而生起故是彼果故彼所攝故履三妙慧淨土往還故名遊路此說菩薩因三妙慧得入淨土故名遊路八地已上常入定位即用何慧名為聞慧准此大乘設入定位義說聞慧於理無失若諸如來大念即是無分別智由念安住真如理故大慧即是後所得智分別諸法真俗相故此二皆有造作淨土增上業用故俱名行由此二智通生淨土故名遊路或大念行是自利行內攝記故大慧行者是利他行外分別故如其次第通生如來二種淨土故名遊路具如佛地論說無性世親更無異釋大止妙觀以為所乘釋曰是第十六乘圓滿也親光釋云止謂三摩地觀謂般羅若大義如前此二等運故名所乘乘此止觀隨其所應行前道是應住住中止觀別名所乘總別不顯思世親釋云乘止及觀而遊趣故無性釋云以乘止觀遊三慧路往所趣國勝諸聲聞獨覺菩薩所乘止觀故名為大大空無相無願解脫為所入門釋曰是第十七門圓滿也親光釋云謂大宮殿三解脫門為所入處解脫即是出離涅槃即大空等名解脫門依從是門而入淨土遍計所執生法無我說名為空緣此三摩地名空解脫門相謂十相一色二聲三香四味五觸六男七女八生九老十死即此涅槃無此等相故名無相緣此三摩地名無相解脫門願謂願求觀三界苦無所願求故名無願緣此三摩地名無願解脫門由此空等三解脫門得入淨土故名為門大如前說此淨土中亦應有事路乘門等為令有情欣樂實德故就行說如論說須釋此中應辨三解脫門章無量功德眾所莊嚴大寶華王眾所建立大宮殿中釋曰明第十八依持圓滿佛地論云謂如地等依風輪等或如世間宮殿依地如是淨土無量功德眾所莊嚴大寶紅蓮華王眾所建立下以三義釋大及王一者謂紅蓮華大寶所成如是大寶無量功德眾善所起於眾寶中勝故名大釋大此寶紅蓮於諸華中最為殊勝故名華王釋王二者或此寶華望諸菩薩善根所起紅蓮華眾勝故名大釋大佛是法王是佛最勝善根所起故名華王釋王三者又此寶華極難得故名為大寶釋大華中最勝故名華王釋王此華非一或華葉多故名為眾世親釋云次有一句顯依持圓滿如大地等依風輪住此佛淨土何所依持無量功德眾所莊嚴大紅蓮華之所建立無性釋云此紅蓮華於諸華中最為殊勝是故說名大寶華王或即如來說名大王故此紅蓮華是佛依處從王為名所建立者謂佛淨土依此華王長時相續無有間絕此句顯示依持圓滿是薄伽梵最清淨覺釋曰上來已釋住處莊嚴自下第二釋總別德如何此中先處後德親光釋云為顯世尊依淨佛土具如是德說此經故就釋德中復分為二初釋總德二釋別德說此二德有何義耶依佛地論有其二義一顯諸佛異餘大師故說世尊功德殊勝二為其餘生淨信故顯示如來功德圓滿無性論云顯薄伽梵異諸聲聞獨覺菩薩覺最勝故薄伽梵者顯有德人最清淨覺者正明勝德依佛地論釋有三義一於一切有為無為所應覺境正開覺故二於一切所應覺境淨妙圓滿正開覺故三於一切如所有性盡所有性正開覺解云三釋有差別者一約法數以釋淨覺有為無為攝法盡故二約二慧以釋淨覺淨妙圓滿攝慧盡故淨妙者緣俗智圓滿者緣真智三就真俗以釋淨覺以依二諦攝境盡故下經云盡諸有性如五數蘊等如所有性七真如等此盡所有性如所有性如第三卷經記中說不二現行釋曰自下第二釋諸別德然釋此德有其二義一明種數多少新舊同異二依諸論正釋經文文同異者真諦三藏梁攝大乘論本唯有二十句闕經一句窮未來際無著但二十德名釋論初云由二十道理成就如來智慧最清淨故乃至後云第一句為本餘二十一句為能成就解云舊本有二種失一脫經一句窮未來際二或釋云釋云二十道理便違後說二十一句由斯諸師謬釋非一真諦記云別德唯有二十句通取結句合成二十一句別德常二師亦同真諦嵩法師云論中有二十句而言一者乘此一字或可脫失一種功德道默法師總別合說成二十一如是等謬不可具述今依唐本攝大乘等具釋經中二十一德故今唐本經論為正二依諸論正釋經者釋此別德諸論不同一攝大乘論先舉經中二十一德後依道理立功德名而不解釋故本論云謂於所知一向無障轉功德於有無無二相真如最勝清淨能入功德無功用佛事不休息住功德於法身中所依意樂作業無差別功德修一切障對治降伏一切外道功德生在世間不為世法所礙功德安立正法功德授記功德於一切世界現示受用變化身功德斷疑功德令人種種行功德當來法生妙智功德如其勝解示現功德無量所依調伏有情加行功德平等法身波羅蜜多成滿功德隨其勝解示現差別佛土功德三種佛身方處無分限功德窮生死際常現利益安樂一切有情功德無盡功德等二者世親略釋經論二十一德帳一紙半三者無性廣釋經論二十一德三紙半後明功德生起次第一紙半四者親光佛地論中有二復次初自立名釋經諸句兩紙半後依無著所立德名以釋經句有其四紙今依諸論正釋經文就釋文中自有兩說一世親等一一別釋為二十一二者親光合釋後二分為二十雖有兩說且依前說此釋第一不二現行依無性論總分為二初有四種明自利德後十七種顯利他德自利德中復分為四一明智德二顯斷德三辨恩德四釋化用平等配文可知世親釋云即是於所知一向無障轉功德非如聲聞獨覺智亦有障亦無障故解云且如天眼三千界內無障外即有障餘皆准此依無性論有二復次初同世親後復次云或二處現行此中無有二處自有兩說一云前約得通者說今二處約未得通於內外處皆有障行佛無此故不二現行或可二處如佛地論生死涅槃以為二處也親光釋云顯示世尊一向無障殊勝功德謂諸異生住著生死二乘聖者住著涅槃如是二障世尊無故佛地後釋文同世親如是諸釋總有三說一有障無障為二現行二內外二處無智為二現行三樂著生死涅槃為二現行趣無相法釋曰顯第二德世親釋云謂清淨真如名無相法趣謂趣入即是於有無無二相真如最勝清淨能入功德謂此真如非是有相諸法無性以為相故亦非無相自相有故於此無相真如最勝清淨能入故解云真如有其二義一者最勝二者清淨證智能入最勝清淨二種境義亦令他入是故說最勝能入清淨能入無性兩釋初同世親後復次云無住涅槃名為無相不住生死涅槃相故親光釋云顯示世尊調化方便殊勝功德謂無相法即是涅槃佛善知了三乘有情隨彼堪能調化方便如實為說令彼趣證無相法故親光後釋亦同世親如是諸論總有三釋一者真如名為無相遠離有無二種相故二無住涅槃名為無相不住生死涅槃相故三者三乘涅槃名為無相以無色等十種相故住於佛住釋曰顯第三德世親釋云謂住佛所住無所住處即是無功用佛事不休息住功德謂此住中常作佛事無有休息解云無所住處者謂無住涅槃無功用者謂不由功用作利有情事故攝大乘第十卷云佛無住為住者生死涅槃無住為住此即安住無住涅槃諸事無功用者不由功用作一切事猶如世間末尼天樂無性釋云隨所應恒正安住聖天梵住故名佛住非如聲聞要作功用非如外道有住非勝天住即是四種靜慮梵住即是悲等無量聖住即是空無相等又無性云於空大悲善安住故名為佛住親光釋云顯示世尊觀所調化殊勝功德謂住大悲晝夜六時觀世間故親光後釋同無性前釋如是諸論總有四釋一住無住涅槃二住聖天梵住三住空大悲四住大悲逮得一切佛平等性釋曰明第四德世親釋云即是於法身中所依意樂作業無差別功德更無別釋梁攝論云所依即法身意樂即應身作業即化身如是三身一切十方三世如來平等無異皆已至得無性釋云所依無差別者一切皆依清淨智故意樂無差別者一切皆有利益安樂一切有情勝意樂故作業無差別者一切皆作受用變化利他事故非如聲聞等唯有所依故親光釋云顯示世尊得一切佛相似事業殊功德謂證諸佛相似事業平等性故解云諸佛能現受用變化利有情事平等相似親光後釋亦同無性如是諸論總有三釋一者諸佛三身無別二者諸佛淨智大悲受用變化二身無別三者諸佛示現受用變化相似事業無別到無障處釋曰顯第五德世親釋云即是修一切障對治功德謂一切時常脩覺慧對治一切障故無性釋云謂己串習一切煩惱及所知障對治聖道一切種智定自在性此釋功德已到永離一切習氣所依趣處此釋到無障處所依趣處即是涅槃親光釋云顯示世尊永斷所治殊勝功德謂已證得解脫一切煩惱所知二障故及以永斷一切障親光後釋同無性論總釋意云如上諸論脩二障智斷一切障能到涅槃無障之處不可轉法釋曰辨第六德世親論云即是降伏外道功德更無別釋非諸外道所能退轉無性釋云謂教證二法皆不為他所能動轉無有餘法勝過此故教證二法非外道轉又無性云謂諸魔等不能退轉親光釋云顯示世尊降伏外道殊勝功德謂佛正法一切外道不能退轉降伏彼已顯正道故親光後釋同無性前解如是諸論總有二釋一者外道不能退轉二者魔等不能退轉所行無礙釋曰顯第七德世親釋云即是生在世間不為世法所礙功德謂雖在世間行於世間所行之處不為利等世間八法所染汙故言八法者謂利衰毀譽稱譏苦樂廣如無性前釋亦同世親又無性云於諸所化有情利益安樂事中無有高下能為拘礙名所行無礙親光釋云顯示世尊降伏魔怨殊勝功德謂所行者即色等境此所行境擾亂心故障礙善故說名魔怨諸佛世尊心善安定極悅意境亦不能亂所有功德極善成滿一切惡境不能為礙以能摧伏一切境界一切所行不能拘礙是故說名所行無礙親光後釋同世親說如上諸論總有三釋一者八風二者高下三者魔境皆不能礙其所安立不可思議釋曰明第八德世親釋云即是安立正法功德由契經等正法無量不可思議非凡夫所能知如來安立不可思議非諸愚夫所能解故解云教法對佛名所安立愚所解非名不可思議梁攝論云十二部教此法竟乃至嬰兒等亦能通達無性釋云謂契經等十二分教名所安立安立彼彼自相共相故如是安立非諸愚夫覺所行故出世間故不可思議解云十二分教對佛名所安立即此教法安立自相共相故名為安立親光兩釋初同世親第二復次大同無性遊於三世平等法性釋曰辨第九德世親論云即是授記功德無性釋云謂於三世平等法性能遍遊涉以於三世平等性中能隨解了過去未來曾當轉事皆如現在而授記故解云無性自有兩釋此則初釋謂能了知三世諸法平等真如故證知過未猶如現在或即三世名為法性證無差別故名平等無性後釋三世諸佛利有情事皆相似故親光釋云顯示世尊記別三世殊勝功德謂記三世皆無礙故後復次云謂於三世流轉句義皆如現在分別無倒故名平等如是諸論總有二釋一云三世即所記境二云三世謂三世佛其身流布一切世界釋曰明第十德世親釋云即是於一切世界示現受用變化身功德無性意同親光釋云顯示世尊現從覩史天宮來下殊勝功德謂現化身普於一切世界洲渚同時流下入母胎故親光後釋意同世親如是諸論總有兩釋一約二身二謂化相於一切法智無疑滯釋曰顯第十一德世親釋云即是斷疑功德無性釋云於一切境善決定故非於諸法自不決他疑非離決定能斷疑故親光釋云顯示世尊斷一切疑殊勝功德謂於諸法以得能除一切疑惑決定智故佛地後釋亦同無性如是諸釋皆同斷疑於一切行成就大覺釋曰第十二德世親釋云即是令入種種行功德無性亦同親光釋云顯示世尊於一切乘所化有情能隨所應示現自身殊勝功德謂遍了知一切有情性行差別如其所應現自身故親光後釋意同世親如上諸釋皆同入行於諸法智無有疑惑釋曰第十三德世親釋云即是當來法生妙智功德謂知當來如是法生如來妙智無性釋云謂聖聲聞言此全無少分善根而棄捨者佛薄伽梵如彼後時善法當生現證知彼餘生微少善根種子所隨逐故解云如經中說勘是何經佛於一時在祇洹林有一乞人至此丘所請求入道諸聲聞等以宿住智觀八萬劫來未有一念趣向善根故皆不度佛後責問不度所由諸比丘等具報所為於後世尊為說法要得證初果諸比丘等請問所由佛為說云此人先世定光佛時作取柴人至城門首見諸人等掃餝治道以待世尊此取柴人問諸人云治道何為諸人答言定光如來今日入城故修道路此取柴人聞佛名已身毛皆豎悲泣雨淚不能自勝欲待世尊衣食所累遂往入山路逢一虎摟而食之未入口時忘本佛名但云城門首人遂為虎食此人唯有此一念念佛善根從定光佛是第二僧祇時起此念佛後經第三僧祇及九十餘劫此一念善根方熟故佛依此善種為其說法得證初果如此細種二乘不知佛能達也親光釋云顯示世尊妙善了達一切法智能隨所應怛正教誨殊勝功德謂於諸法懷疑惑者無有堪能隨應教誨唯佛世尊證見諸法智善決定能隨所應無倒教誨無休廢故親光後釋意同無性如上諸論總有兩釋一於當來二通諸法凡所現身不可分別釋曰第十四德世親論云即是如其勝解示現功德無性釋云謂隨有情種種勝解現金色等雖現此身而無分別如末尼珠及簫笛等雖無分別而能現身名不可分別或可所現之身由無分別起故餘人不可分別無性復云即於所化有情邪正及俱行中所應現相不可分別於有情中現邪正等行不可分別是邪正等行名不可分別也親光釋云顯示世尊能正攝受無染自身殊勝功德謂諸佛身非是虗妄分別所起無煩惱業生雜染故如來身非是雜染分別起故不可分別凡所現身不由虗妄分別起故名不可分別或可所現身非虗分別起故餘人不可分別也親光後釋大同無性故彼論云謂佛世尊雖無分別如末尼珠由諸如來增上力故亦由自身勝解力故見如來身如金色然諸如來無有分別無異分別具說如彼無有分別者無自性分別無者無自性異分別者無差別分別又親光云或同彼類不可分別解云此同無性現邪等行不可知故不可分別或可現六道身不可分別與其六道有差別相名不可分別依梁論云示現化身數量相貌時節處所並不可分別如上諸說總有四釋一云凡所現身不由分別任運起故名不可分別一云於有情中現邪等行不可知故名不可分別一切菩薩正所求智釋曰第十五德世親云即是無量所依調伏有情加行功德謂無量菩薩所依能作調伏諸有情事此非諸佛已得自他平等更求此智唯有諸佛已作如是勝調伏事總釋意云佛調伏智即是無量菩薩所依由菩薩加行漸次證得非佛所求以佛已證最勝調伏故餘釋差別如後所引無性釋云謂由無量菩薩所依為欲調伏諸有情故發起加行佛增上力聞法為先獲得妙智異類菩薩攝受付屬展轉相續無間而轉由此證得一切菩薩等所求智此於釋中先釋功德後釋經句無量菩薩所依者釋上無量所依無量所依即佛智也有說即是菩薩無分別智為欲調伏諸有情執取心故發起加行智求佛智也或可求菩薩智雖有二釋求佛智為勝下釋經句佛增上力有菩薩聞法為先獲得初地無分別妙智或可獲得佛一切妙智譬如一燈傳燃千燈地前異類菩薩及不定性聲聞獨覺佛自攝受佛涅槃時付屬餘佛及大菩薩一切善人展轉令聞思修智由此證得一切菩薩等皆所求佛果智也世親波若論善護念者依根熟菩薩說善付屬者依根未熟菩薩說無性復云列攝任持不定種性聲聞菩薩故讚大乘為顯此事故次說言一切菩薩等所求智解云為列不定聲聞等令進趣故任持不定菩薩令不退故說大乘智故法華云十方佛土中唯有一乘法無二亦無三除佛方便說親光釋云顯示世尊成就佛種不斷方便殊勝功德謂諸菩薩為令佛種無斷絕故勤修加行非聲聞等是故佛智唯諸菩薩正所應求准此佛智以為所求非菩薩智為所求也親光後釋亦同無性如上諸說總有兩釋一者利他德二者佛種不斷即自利德得佛無二住勝彼岸釋曰第十六德世親釋云即是平等法身波羅蜜多成滿功德謂無二法身名平等法身即於如是無二法身得善清淨波羅蜜多解云准梁論用圓滿法身及四德波羅蜜為功德體故梁論云如來法身名住四德究竟名波羅蜜具說如彼無性釋云謂無二故名為平等依平等法身波羅蜜多果位成滿故解云諸佛法身無二故名平等無性復云果位六度無增減故名為平等具說如彼親光釋云顯示世尊自性身分殊勝功德謂佛法身無差別相名二佛無二住即是法身真如為體無差別相於一切二相分別皆不現行緣勝定常住其中故名為住即無二住名勝彼岸佛已窮到說名為得解云判此親光三說不同一云舉能住定顯所住境平等法身一云雖舉所住意取住定一云通取所住能住以立德名又親光云謂於佛地無二法身一切施等波羅蜜多平等圓滿解云法身一故名為無二六度皆滿故名平等如上諸論總有兩釋一云法身一故名為無二一云於法身中無種種二故名為無二不相間雜如來解脫妙智究竟第十七德世親釋云謂於無雜如來智中勝解究竟此中勝解名為解脫即是隨其勝解示現差別佛土功德解云世親論意依無性釋而可了知言不相間雜者如來勝解所現佛土不相間雜言如來解脫者即是如來現土勝解於所現中無不了知故名妙智究竟無性釋云謂觀眾生勝解差別現金銀等種種佛土不相間雜世尊勝解現在前時隨眾所樂悉皆顯現無不了知無性復云聞一切佛得平等言即謂一切應同一性為遮此疑故次說言如來解脫妙智究竟親光釋云顯示世尊受用身分殊勝功德立功德名謂受用身不相間雜一切如來受用身體各各別故釋自受用身不相間雜如來妙智能令一切眾生解脫故名如來解脫妙智佛於此智已得究竟如是即說如來妙智不相間雜此釋妙智不相間雜於淨佛土現受用身亦不相雜此釋他受用身不相間雜大集會中現種種身與諸菩薩受用法樂亦不相雜釋受用法樂不相間雜如來於此智所現身亦到究竟重釋究竟親光後解同無性初釋上來五釋文顯可知證無中邊佛地平等釋曰第十八德世親釋云即是三種佛身方處無分限功德謂佛法身不可分限爾所方處受用變化亦不可說爾所世界文顯可知梁論釋云如來三種身中法身約處所不可度量應化兩身互爾不可言但此世界有彼世界無無有一法出法身外無有眾生界出應化兩身外無性兩釋初次中復有四種意同世親故彼論云如世界無中無邊佛地亦爾功德方處無有分限或復世界方處無邊諸佛三身即於其中稱世界量平等遍滿以法身等即住如是諸世界中非餘處故或法身等於佛地中平等遍滿無中無邊無有分限此法身等遍一切處為諸眾生現化饒益然非自性無中無邊解云無中無邊有其四種一約喻法釋無中邊二或復世界下約所依能依釋無中邊三或法身等下唯約佛地釋無中邊無有分限四此法身等下明為眾生故現身無分限然非自性無中邊身也無性復云非一非異其相云何為答此問故次說言證無中邊佛地平等不相間雜故云非一乘前得佛無二故云非異如是非一異相云何應解云於此德中先問後答乘前知為答此問故次說言證無中邊佛地平等雖復非一各各遍周若是無二亦是遍滿故無中邊親光云顯示世尊證真如相殊勝功德謂真如相無有中邊遠離一切有為無為中邊相故遠離方處中邊相故如是真如即是佛地平等法性證此佛地平等性故遍知一切有為無為等於中不染解云遠離一切有為無為中邊相故者如於有為執為定有是常邊執為定無是斷邊非有非無是中道中道之義待邊故立邊性自離中何所中故佛證平等中邊俱離有為既爾無為亦然若隨俗說方土處所有中有邊如中國為中餘國名邊佛證平等無方土故遠離方土中邊相也或可有為無為為二邊非有為非無為為中邊既非有中何所中方所中邊准此應釋親光後釋同世親說極於法界釋曰第十九德世親釋云謂極清淨法界是名極於法界即是窮生死際常現利益安樂一切有情功德准無性釋可知無性釋云謂此法界最清淨故能起等流契經等法極此法界於當來世一切有情如其所應常能現作利益安樂解云最清淨法界流出正智由正智故流出後智由後智故流出大悲由大悲故流出契經等十二部由此法界常住故常於當來世能現利益親光釋云顯示世尊證得果相殊勝功德謂得窮極清淨法界如是法界脩道果親光後釋同於無性盡虗空性釋曰第二十德世親釋云即是無盡功德謂佛智無盡如虗空故無性釋云如彼虗空無邊無際無盡無減無生無滅無有變易於一切時現前容受一切質礙法界亦爾常現前作一切有情利樂為相盡一切界遍作眾生諸饒益事無有休息廣說如彼窮未來際釋曰第二十一德世親釋云即是究竟功德等言等此佛智究竟窮未來際無有間斷是故名為最清淨覺無性釋云等者等取究竟功德謂此功德窮未來際常無間斷窮於未來無際之際顯佛功德永無窮盡所化有情永無盡故若依親光後二合釋故佛地云次後二種殊勝功德顯示世尊功德無盡盡虗空性窮未來際者顯示世尊自利利他二德無盡謂如虗空經成壞劫性常無盡如來一切真實功德亦復如是常無斷盡如未來際無有盡期利他功德亦復如是窮未來際常作一切有情利益安樂事故親光後釋云顯示世尊無盡究竟殊勝功德謂如虗空常無窮盡諸佛法界所起功德亦復如是無窮盡故如未來際無有盡期利樂一切有情加行無休息故解云親光兩釋有差別者前釋立功德名皆是無盡後復次釋同世親等兼有問答具說如彼上來所釋如來功德具申諸論諸講說者隨情廣略若用一者取世親釋或親光初說若用二者合取兩家與無量大聲聞眾俱釋曰自下第五教機六中第六眾成就於中有二初明聲聞後明菩薩謂即聲聞菩薩二眾然此二眾四門分別後方釋文言四門者一辨有無二釋前後三明權實四顯餘眾有無辨有無者有其四句自有經文唯小非大如金剛波若及阿含等二唯大非小如華嚴經及理趣等三大小俱列如法華維摩等四大小俱無如金光明及勝鬘等問若有四句如何會釋大智度論彼云聲聞藏中唯列聲聞菩薩藏中具列聲聞及菩薩眾此有二說一云據實如智度論而四句結集經者意樂異故一云據實具有四句而智度論為顯二藏勝劣異故具說二句舊來相傳實有無故或廣略故真諦三藏金光明記云此經三義不立同聞一耆闍之眾唯聞正說後分不聞正說前分所明因果王舍之眾聞前分因果不聞後分緣用等事時眾有聞不聞所以不立同聞二義者說四德之果是四佛明三身之因是釋迦非止聽時眾不同亦是法主有異故不安同聞三義者聞懺悔是信相獨自夢感不得與多同聞為此三義不安同聞辨前後者此即不定自有經文先大後小如五濁經自有經文先小後大即此經等問若爾如何佛地及智度論皆說聲聞為先解云如智度論第四卷說佛法二種一者秘密二者顯示顯示門中先聞聲聞以其煩惱滅無餘故秘密門中先說菩薩得無生忍斷煩惱故解云是故兩經各據一義互不相違然說聲聞以為先者依佛地論有其八故第二云一為於大乘生疑惑者除彼疑故疑大乘教非是佛說親對佛聞信是佛說二為列不定種性令生定信故不定性者欲取小果故遣近佛令取大果三為已清淨諸大聲聞捨於自身尊貴慢故乃至廣說謂近世尊親授化故自捨高慢究竟門也四又諸聲聞常隨佛故菩薩化物不常隨佛聲聞常隨故先列之五形同佛故剃髮染衣形同佛故菩薩不定是故後說六內眷屬故出家近佛名內眷屬也七又令菩薩生恭敬故乃至廣說親侍佛故菩薩恭敬如侍王者餘人敬也八者由是讚嘆聲聞功德亦令其餘於聲聞眾生淨信故轉釋菩薩敬聲聞意菩薩尚敬況復餘眾依智度論有二復次彼云問曰若從上數應先菩薩若從下數先優婆夷何以先說聲聞四眾後說菩薩答曰菩薩智慧雖多應次佛說以惑未盡所以後說諸阿羅漢智慧雖少而惑已盡是故先說復次菩薩以方便力現入五道受其五欲引導眾生若在阿羅漢上諸天世人當生疑恠是故後說廣說如彼言權實者此經一部如前所說如實義者二處所說一者淨土二者穢土今釋此經若淨土中菩薩為實二乘是權故瑜伽論七十九云問何等有情不生淨土答異生二乘地前菩薩故知二乘是化非實若穢土中二乘為實菩薩是權受變易不可見故七地以來容受分段故有實身義亦無失故智度論云七地已來未捨虫身肉身言餘眾有無者若依穢土有實龍等故佛地論第二卷云於此會中亦有餘眾結集法者略說二眾以其勝故如經後言世間天人阿素洛等一切大眾聞佛所說皆大歡喜信受奉行若在淨土有化龍等故佛地論云化亦無過為欲莊嚴說法會故或佛化作或菩薩化作世親無性大乘論亦同此釋就釋文中文別有二初明聲聞後顯菩薩就聲聞眾文別有三初標數辨類次一切下廣釋諸德後已善下顯已奉行此即第一標數辨類謂二眾中簡異菩薩故言聲聞文有五節一辨與俱二解無量三釋其大四明聲聞五顯眾也言與俱者約佛對眾以身兼彼目之為與又與是共故大品云共摩訶僧智度論云一處一時一心一戒一見一道一解脫是名為共此經與者即彼共也言無量者親光釋云其數甚多難可算計故名無量所言大者依智度論釋有三義一大二多三勝眾中上故諸障斷故王等敬故名為大也數甚多故名之為多勝九十六外道論故名為勝也依佛地論釋有四義一者利根波羅蜜多種性聲聞二者無學果故三如實義不定種性迴心向大故名為大四者眾多故名為大如今大眾真諦釋云大有三義一者數大如言大軍以數多故名為大也二者量大如言大山不以數多名之為大但以形量高廣故名大也三者勝大如言大王非關數多及以形量高廣但由德勝故名為大聲聞亦爾數非一故即是數大迴求佛果修菩提高極無上即是勝大廣大無底不可測量即是量大言聲聞者成實論云聞法得悟故曰聲聞親光釋云聞佛言音而入聖道故曰聲聞又瑜伽論八十二云從他聽聞正法言音又能令他聞正法聲故曰聲聞十地經云從他聞聲而通達故聞聲意解成聲聞乘釋彼經意如十地論第四廣釋聲聞如大集經十七大般若第五百一十十住婆沙第一第十一成實第五瑜伽釋論所言眾者梵音僧伽此云和合眾謂理事二和故名眾也廣如智度論第三卷說一切調順釋曰自下第二廣釋諸德有十三德此即第一心善調順德依佛地論有其三釋故第二云一切調順者有義有學離見所斷一百一十二種分別麤重煩惱不𢤱悷故猶如良馬名為調順有義無學離見修斷一百二十八種煩惱不剛強故猶如真金名為調順如實義者皆是迴向菩提種性一切堪能發趣大果隨佛意轉如聰慧眾故名調順依智度論第三卷中有三復次釋心調順一約三種順違以釋調順一恭敬罵詈心等無異二珍寶瓦石視之無異三持刀斫身栴檀塗身亦等無異二約利鈍根本煩惱已斷以釋調順三約應貪不貪應瞋不瞋應癡不癡守護六情以釋調順皆是佛子釋曰第二紹隆佛種德然此佛子自有三義一唯約聲聞以釋佛子如即此經佛地經等親光釋云由佛教力彼聖道生故名佛子如說皆從世尊口生正法生故有義皆是趣大聲聞能紹佛種令不斷絕故名佛子二唯約菩薩以釋佛子如梁攝論第八卷云佛子有五義一願樂無上乘為種子二以般若為母三以定為胎四以大悲為乳母五以諸佛為父真諦釋云成眾生身必具五事一父二種子三母四胎處五乳母父是出子之根本故先明父父之遺體以為身種子故第二明種子雖有種子若無母懷伍不得成身故第三明母母雖懷之若無胎裏亦不成身胎是安身之處故第四明胎處出生以後若無乳母飲養即不成身故第五明乳母佛子亦爾有五緣勝一者父勝諸佛世尊為其父故二種子勝以菩提心為種子故三生母勝以其波若為生母故四胎藏勝以福智住持為胎藏故五乳母勝以大悲長養為乳母故三通約菩薩聲聞以釋佛子如智度論七十二云佛子有五皆從口生法生謂須陀洹乃至阿羅漢及入正位菩薩辟支佛雖佛法中種因緣無佛時自能得道不得言從佛口生因緣遠故瑜伽第八十四佛性論第二莊嚴論第一攝論第六十住婆沙第十三智度論第四十一皆釋佛子恐繁不述心善解脫慧善解脫釋曰第三心慧解脫德如契經說已離貪得故心解脫離無明故慧得解脫是故諸師釋經不同分別論者作如是說心性本淨客塵煩惱所染汙故說不清淨據實本性心得解脫慧善解脫若依薩婆多宗心善解脫者心離貪時與心相應勝解解脫貪故即說勝解名心善解脫慧善解脫者慧離無明時與慧相應勝解解脫無明故即說勝解名為慧善解脫非謂無為涅槃解脫若廣分別如大毗婆沙第二十七二十八及七十二說今依大乘如佛地論離三界貪心得解脫如契經說已離貪故心得解脫如契經說離於無明惠得解脫解云佛地論意由心惠故證得離貪無明所得無為為解脫體於理無違論不簡故若依智度論第三卷云復次諸結使屬愛屬見屬愛煩惱覆心屬見煩惱覆慧如是愛離故屬愛結使亦離得心解脫無明離故屬見結使亦離得慧解脫又涅槃經二十五云貪瞋癡心永斷滅故心善解脫於一切法知無障礙慧善解脫若依智論第三改善名好然好解脫自有三義一簡異外道離欲人一處一道心得解脫非於一切故不名好二簡內道中學人雖得解脫有殘結使故非好解脫三簡無學中退法阿羅漢得時解脫非好解脫是故唯約利根阿羅漢說好解脫戒善清淨釋曰第四戒善清淨德親光菩薩釋有三義一約六支釋戒善淨二約無漏釋戒善淨三約大乘釋戒善淨故佛地論云如契經說具足六支名戒善淨一住淨尸羅所受學處三業無犯二善自防守別解律儀謂能守護七最律儀三軌則具足謂於威儀行住坐臥或於所作謂著衣服便利等或於善品加行誦經坐禪等成就軌則隨順世間不越世間隨順毗奈耶不越毗奈耶也四者所行皆悉具足謂五處非非比丘所行所謂唱家淫女家酟酒王旃陀羅如是五家及諸如來所制之處除此所餘依時行者如是名為所行具足五於微細罪見大怖畏隨小學處乃至若有命難因緣終不故犯乃至廣說故維摩云乃至小罪猶懷大懼六受學學處唯自誓受我當盡學一切學處乃至廣說若廣分別如瑜伽論第二十二顯揚第七也二約無漏釋戒善者或復皆得無漏戒故名善清淨三如實義住無學位迴向大乘自分戒淨修菩薩戒故名善淨趣求法樂釋曰第五求法樂德親光三釋一求正法時求大菩提樂不求餘樂二或求法時為令他樂無求過意離惡威儀三如實義此大聲聞專求法樂不求名聞利養恭敬多聞聞持其聞積集釋曰第六聞持積集德如是三慧唯約聞慧初中後位勝差別說三種如親光說無量經典初中後分皆能聽受故名聞隨所聞義皆能憶持令不忘失故名聞持數習文義令其堅住是故說名其聞積集善思所思善說所說善作所作釋曰第七三業隨智德親光釋云世間愚夫惡思所思惡說所說惡作所作出世聖者超過彼法與彼相違是故說名善思所思善說所說善作所作三業清淨隨智慧行又瑜伽論第七十云惡思所思惡說所說惡作所作凡所現行身語意業皆不清淨又瑜伽論二十五云云何成就聰慧者相謂由作業相表知愚夫由作業相表知聰慧其事云何謂諸愚夫惡思所思惡說所說惡作所作諸聰慧者善思所思善說所說善作所作是名成就聰慧者相捷慧速慧利慧出慧勝決擇慧大慧廣慧及無等慧慧寶成就釋曰第八諸慧差別德釋此諸慧諸說不同一云此經總明八慧名字如經後云慧寶成就者攝上八慧以為慧寶非別立慧故瑜伽論但言慧寶不言寶慧一云九慧故大品經及智度論皆名寶慧故知別慧一云此經據寶十慧謂加甚深妙慧故佛地云有本復說甚深妙慧謂他不能究其底故今且依九以辨諸慧故親光云於佛所說法毗奈耶速入其義故名捷慧即於此中多入其義故名速慧能多行者說名速慧故入微細義故名利慧得能出離生死妙慧故名出慧此慧能為涅槃了因是故說名勝決擇慧勝決擇故名勝決擇即是涅槃此慧能為彼了因故依彼立名已上釋出慧問答決擇無窮盡故名為大慧深廣圓滿善通達故名為廣慧於耎根等諸聲聞眾此慧勝故名無等慧此慧能招最上義故名為慧寶是諸聲聞具此慧寶是故說名慧寶成就解云最上義即是涅槃若依瑜伽與彼少異八十三云速疾了知故名捷慧無滯礙故名為速慧能善了知盡其所有如所有故名為利慧於出離法世間離欲善了知故名為出慧世間諸離欲法能了知故名勝決擇慧謂即此慧長時串習故名大慧謂即此慧無量無邊所行境故名為廣慧其餘諸慧無與等故名無等慧於諸根中慧最勝故如末尼珠顯發輪王毗瑠璃寶令光淨故與彼相應故慧寶皆得成就依大品經及大般若有十一慧如智度論第八十三次第廣釋恐繁不述具足三明釋曰第九具足三明德如契經說有三種明一宿住隨念智證通明二者死生智證通明三者漏盡智證通明然此三明薩婆多宗俱舍論意四門分別第一出體用慧為性如其次第六通之中第五宿住第二天眼第六漏盡三通為性第二立三之意如次對治前後中際三種愚故第三真假分別漏盡智明通假及真通無漏故餘二假說唯有漏故有漏無漏智皆名漏盡俱在漏盡身中生故真名無漏假名有漏勝劣相形故說真假第四學無學分別唯在無學學有闇故又大婆沙一百二卷云問六通中何故但說三種為明答神境智證通如工巧處轉天耳智證通唯能取聲他心智證通唯取自相無勝用故不立為明後之三通皆有勝用故立為明勝用者謂皆能隨順厭捨生死皆能引發殊勝功德皆能趣向殊勝涅槃問云何後三皆有勝用答第四宿住隨念智證通見前際事深生厭離第五生死智證通見後際事深生厭離第六漏盡智證通既厭離已欣樂涅槃廣說如彼今依大乘親光釋云無學利根所得三通除染不染三際愚故說有三明有義明者以慧為性慧能除闇故說為明有說無癡善根為性翻無明故云大乘皆通無漏於理無違許後得智是無漏故又瑜伽論六十九云六通中前三通是通非明後三通亦通亦明以能對治三世愚故依智度論第二卷云宿命天眼漏盡名為三明問曰神通與明有何等異答曰直知過去宿命事是名通知過去因緣行業是名明直知死此生彼是名天眼通知行因緣際會不失是名明直知盡結使不知更生不生是漏盡通若知漏盡更不復生是名明是三明大阿羅漢大辟支佛所得廣釋三明如法集經第三雜阿含四十三中阿含五十一毗曇第六俱舍二十七順正理七十六婆沙八十一及一百二逮得一切現法樂住釋曰第十現法樂住德然此樂住依薩婆多宗大婆沙論八十一云問世尊何故說四靜慮是樂住耶答唯靜慮中具二種樂故名樂住一樂受樂二輕安樂前三靜慮皆具二樂第四靜慮無受樂而輕安樂勢用廣大勝前二樂近分無色雖有輕安而不廣大故不名樂復次根本靜慮現在前時長養大種遍身中生令充悅故名樂住近分定等現在前時長養大種唯心邊生非極充悅故非樂住廣如彼論有九復次及順正理七十九俱舍二十八毗曇第八成實二十顯揚十九親光釋云證得不退勝靜慮故又瑜伽論第十一云復次是諸靜慮名差別者或名增上心謂由心清淨增上力正審慮故或名樂住謂於此中受極樂故所以者何諸靜慮領受喜樂安樂捨樂身心樂故又得定者於諸靜慮數數入出領受現法安樂住故由此定中現前領受現法樂住從是起已作如是言我已領受如是樂住於無色定無如是受是故不說彼為樂住廣說如彼大淨福田釋曰第十一勝淨福田德成實論第二卷福田品云問曰以何等故此諸賢聖名為福田答曰斷貪慧等諸煩惱盡故名福田如說稊稗不去害善糓苗是故施無欲人獲報利大故名福田廣說如彼親光釋云永離煩惱如世良田速能生長廣大果故威儀寂靜無不圓滿釋曰第十二威儀寂靜德親光釋云正知住故瑜伽七十一云威儀寂靜者謂諸根寂靜無有躁擾亦不高舉支節不動而有所說是名威儀寂靜威儀無缺故名圓滿大忍柔和成就無減釋曰第十三忍辱柔和德親光釋云於苦堪耐易共住故瑜伽九十二云言忍辱者謂於他怨終無返報言柔和者謂心無憤不惱他故廣如瑜伽二十五釋已善奉行如來聖教釋曰第十三顯已奉行親光釋云諸有所作已圓滿故是諸聲聞位登無學皆出生死故善奉行如來聖教復有無量菩薩摩訶薩眾從種種佛土而來集會釋曰自下第二釋菩薩眾於中有三初標數辨類次皆住大乘下讚諸功德後其名下就勝列名此即第一標數辨類謂二眾中已釋聲聞故今別釋菩薩眾類又有三節一釋無量二菩薩等三辨來處言無量者顯數無量無分限故所言菩薩摩訶薩者若具梵音應作是言菩提薩埵摩訶薩埵為存略故但言菩薩菩提名覺薩埵此土翻為有情或精進義由斯親光佛地論中釋有三義故第二云所言菩薩摩訶薩者謂諸菩薩求菩提故此通三乘為簡取大故須復說摩訶薩言又緣菩提薩埵為境故名菩薩具足自利利他大願求大菩提利有情故又薩埵者是勇猛義精進勇猛求大菩提故名菩薩此通諸位今取地上諸大菩薩是故復說摩訶薩言無性菩薩依後二義故攝大乘論第一卷云言菩薩者菩提薩埵為所緣境故名菩薩從境得名如不淨觀等或即彼心為求菩提有志有能故名菩薩又親光云此中菩薩有三大事名摩訶薩一者數大謂無量等二者德大住大乘第三者業大息災橫等依十地論亦有三義故第一云有三大故名摩訶薩一者願大二者行大三者利益眾生大若廣分別菩薩摩訶薩義如大般若第三十七第七十一第四百一十一第四百八十六七及第五百三十八五百五十六大品經第六智度論第四五第三十四五也從種種佛土而來集會者此即第三顯其來處為聽法故從十方來問豈不慈氏住在此方如何但言從他方來答如佛地論為欲對治懈怠憍慢不來集會求聞法故且說他方具說如彼若廣分別菩薩他方來意如解節經疏第一寶積論第一智度論第十也皆住大乘釋曰自下第二讚諸功德然判此經親光菩薩四復次釋一約十大釋十句經二依十地釋十句經三約十度釋十句經四約十願釋十句經此即初也十句經文即為十段此即第一釋精進大親光釋云由精進力安住大乘拔濟有有令離生死及自發趣無上菩提解云大乘者即用化生及求菩提為大乘也有云法性真如以為大乘今解金剛般若中廣大心等以為住大乘遊大乘法釋曰第二讚其因大親光釋云即十地中以聞思修等漸次而遊解云十地等者等取等取妙覺此即大乘亦是所遊之處聞思修等者世間三慧等言等取無漏修慧此明三慧於十地境次第而起能生佛地故名因大又解大乘皆法性真如十地菩薩以三慧及相應法漸次了知真如之境能生佛果故名因大也於諸眾生其心平等釋曰第三釋所緣大親光釋云即於一切有情得自他平等以大慈等平等方便故解云此德慈等為體一切有情為所緣境名所緣大前德以智體故真如為境此以慈等無體性故有情為境此即波若論中同體大悲故名平等方便也離諸分別及不分別種種分別釋曰第四明時大也親光釋云即於一切時猶如一念平等而轉劫名分別以於一切劫與非劫分別斷故以不分別劫與非劫故能長時修行無厭釋云梵音名劫臈波此翻為分別有為之法時劫所攝分分差別無為之法非時劫攝無有時劫分分差別名不分別此二是所緣境種種分別者是能分別心緣前分別不分別境故云種種分別此中意說若有分別此是時劫此非時劫見時劫長修行有厭諸菩薩等以於一切劫與非劫分別何故以不分別劫與非劫故能長時修行無厭乃至三無數劫一切長時猶如一念平等而轉如人不睡分別日夜即謂夜長若睡眠時不分別夜故雖經長夜不覺夜長經無數劫亦復如是是故無性攝大乘釋第六卷云經無量劫乃成佛果時既長久云何言疾此義不然時劫長遠唯分別故如有頌言處夢謂經年覺乃須臾頃故雖時無量攝在一剎那又佛精進極熾然故雖經多時而謂少時如有頌言愚修雖少時怠心疑已久佛於無量劫勇猛謂須臾此亦如是故作此言於一切時猶如一念摧伏一切眾魔怨歒釋曰第五顯無染大親光釋云謂諸摧魔怨以捨一切所攝受故能魔怨解云以捨攝受五妙欲境故能摧伏煩惱魔怨或可由斯為本具離四魔又親光云如說菩薩若於一切所攝受事如不堅實心不貪求即能摧伏一切魔怨解云親光引經證成如般舟經云諸法不堅固常立在於念以解見空者一切無於念摧魔之義理極於此依涅槃經立八種魔謂有為四倒上更加無為四倒通名為魔小乘宗中不成過失或大乘中煩惱魔攝故諸教中略而不說廣釋四魔如前十八圓滿中說遠離一切聲聞獨覺所有作意釋曰第六辨作意大親光釋云遠離二乘分別作意世親無性攝論第六亦同親光梁攝論第七卷云捨離聲聞獨覺思惟故二乘思惟謂數觀苦無常等生死過去及數觀涅槃寂靜功德此觀但愛自身捨利益眾生事廣大法味喜樂所持釋曰第七住持大親光釋云即用大乘法味喜樂為食梁攝論云大乘十二部經名為大法真如解脫等為味經此法味生諸喜樂長養菩薩五分法身此句正明住持圓淨又法華云法喜禪悅食更無餘食想超五怖畏釋曰第八清淨大親光釋云謂超五怖畏即三業清淨出諸怖畏無犯戒等諸惡趣等怖畏因故五怖畏者一不活畏二惡誦畏三死畏四惡趣畏五怯眾畏如是五畏證得清淨意樂地時皆已遠離廣釋五怖畏如佛地論第二善戒經第八十住婆沙第二佛性論第三十地論第婆沙七十五順正理四十九等也一向趣入不退轉地釋曰第九證得大親光釋云一向趣入不退轉地即得一切智記別時一向不退前七地中猶有加行功用運轉未得不退無功用道其餘諸地行無加行功用運轉一向趣入不退轉地今護法宗三智門中加行智一向有漏八地已上一切不行又八地已上一切煩惱皆不現行名不退地後當分別又莊嚴論第十卷云不退菩薩品類有三一未成不退謂信行地二已成不退謂初地至七地三極成不退謂八地已上般舟三昧經菩提資粮論佛地第六皆說八地已上名不退地恐繁不述息一切眾生一切災橫地而現在前釋曰此即第十釋其業大親光釋云謂諸菩薩能息一切有情內外苦惱逼迫地位現前此地中有大悲大慈由此二種能息一切內病等苦外貪等惱之所逼迫此二多作有情利樂故得此者名為業大佛地論云災橫即道惑所發業及所得果梁朝論云三界苦諦名一切災橫上來以約九德及業釋經十句訖第二復次約十地行故配經十句故親光云復次皆住大乘者謂住初地證得遍滿真法界時初得真實大乘法故名住大乘遊大乘法者謂第二地修行菩薩三聚戒故大乘行法即三聚戒於諸眾生其心平等者謂第三地得諸勝定發四無量平等利樂諸有情故離諸分別等者謂第四地得三十七菩提分法離諸分別及不分別種種分別諸分別者即見所斷分別我見初地已離不分別者即修所斷俱生我見此地中離即此二種相應諸法名種種分別行解異故雖前後離盡處總說如第四定說離苦根如第三果離下分結有義此地第七識中俱生煩惱一切遠離有義此地第六識中俱生我見一切遠離非第七識以七地來猶有微細煩惱現行若無第七應無染依應不似五第七細惑若已遠離五六七地六識麤惑應不現行即違瑜伽解深密說又如二乘金剛喻定第七識或俱六識中最細煩惱一時俱斷云何此中先離第七微細煩惱後離六識麤煩惱耶是故四地得無我智滅意識中俱生我見未離第七微細煩惱及六識中餘修斷惑此說伏難非是永滅其第十地金剛心時方頓滅修斷種故摧伏一切眾魔怨歒者謂第五地觀四聖諦皆平等性摧伏執取生死涅槃差別魔怨遠離一切聲聞獨覺所有作意者謂第六地觀十二支染淨緣起皆平等性遠離二乘厭患雜染欣樂清淨繫念分別廣大法味喜樂所持者謂第七地證無相理於空智有勝行受大法樂超五怖畏因名超五怖五怖畏果初地已離一向趣入不退轉位者謂第九地決定趣入第十菩薩眾行圓滿不退轉位息諸眾生等者謂第十地得大法身起大悲雲雨大法雨息除一切眾生苦惱所逼迫事第三十度第四十願配經十句如應配釋十度十願如第四卷經記中釋其名曰解甚深義密意菩薩摩訶薩如理請問菩薩摩訶薩法誦菩薩摩訶薩善清淨慧菩薩摩訶薩廣慧菩薩摩訶薩德本菩薩摩訶薩勝義王菩薩摩訶薩觀自在菩薩摩訶薩慈氏菩薩摩訶薩曼殊室利菩薩摩訶薩等而為上首釋曰第三就勝列名略辨三義一釋名字二說十所由三問答分別一生補處言釋名者自有二義一通二別言通名者如瑜伽論四十六云一切菩薩隨德假名有十六種所謂名為菩提薩埵摩訶薩埵乃至十六名為法師顯揚第八亦同瑜伽莊嚴十二卷名雖少異意況大同又莊嚴云此十六名皆依義立一切菩薩總有此名若人聞有此名應知即是菩薩解云今言菩薩摩訶薩者即通名中初二號也釋義如前十六名者一名菩提薩埵二名摩訶薩埵三名成就覺慧四名最上照明五名最勝真子亦名最勝之子六名最勝住持亦名最勝所依七名普能降伏亦名最勝所使八名最勝萌芽九名勇健亦名猛健十名最勝聖亦名上軌範師十一名商主十二名具大名稱十三名憐愍亦名成就慈悲十四名大福十五名自在亦名富自在十六名法師言別名者如後廣釋等者等取其餘無量諸菩薩也而為上首者謂十菩薩於此眾中最第一故名為上首故佛地云妙生菩薩於此眾中最第一故名為上首說十意者有其三義第一菩薩初解釋甚深義故次三菩薩各問勝義一種相故後六菩薩各問一品差別義故故唯列十又解為存略故但說十也如佛地論第二卷云此經略故唯列一名所餘眾會但舉其數結集法者意在略故又智度論第七卷云問曰菩薩甚多何以獨說二十二種菩薩名字答曰菩薩無量說不可盡若都說者文字難載復次菩薩不過二種所謂在家出家此方他方在家謂陀羅等出家謂妙德等此方謂慈氏等他方謂觀音等若說此二當知一切都已攝盡問解節經云彌勒觀音文殊師利皆是一生補處菩薩一生補處與最後身有何差別答薩婆多宗如彌勒等覩史多天身名為一生生人中成佛身者名最後身故俱舍論第十一云覩史多天一生所繫菩薩及最後身必無中夭順正理論第三十一亦同俱舍問理應覩史經無量生如何但說名一生耶若言菩薩得自在故唯一生者如何會釋大婆沙等此義難更須思今依大乘諸教不同自有聖教唯說天身名為一生如大般若第七卷云一生所繫覩史天菩薩自有聖教唯說天身名最後如佛地論第五卷云覩史多天後身菩薩於中教化自有聖教唯說天身名為一生及最後生如菩提資粮論第一卷云一生所繫菩薩入兜率陀最後生菩薩住兜率陀自有聖教唯說人身名為一生如解節經等觀音文殊名一生補處自有聖教唯說人身名最後生如瑜伽四十八云最後生者諸菩薩於此生中能現等覺阿耨多羅三藐三菩提具說如彼自有聖教唯說人身名為一生及最後生如智度論第四十云一生補處者或以相知如阿私陀仙人觀其身相知今世成佛見食乳糜知今日成佛末後身菩薩以方便力受惡業報現有魔惱等自有聖教說天名一生說人名後有如瑜伽論第四十云顯揚第八彼云一生所繫者此生無間當證無上正等菩提最後有者謂即住此生能證無上正等菩提大同薩婆多然說天等名一生者古來相傳自有三釋一云即說天身名為一生人生即是後身攝故一云說人身名為一生更受人生方成佛故一云人天合說名為一生如說七生預流果等合說二生為一生故問若說天身名一生者智度論說如何會釋故智度論三十八云三生菩薩唯生兜率解云據實三生謂人生天生最後生而說天身名三生者三中一數故說三生人身已受故後身成佛故是故不說人生後生名三生也問慈氏菩薩可言補處如何餘者稱補處耶答如智度論第七釋云除彌勒外餘菩薩眾雖非此方贊補佛處於十方國皆補佛處故稱補處問慈氏菩薩理應多生如何說言天一生耶答據實多生同是天故名為一生問若爾便違智度論說故第四云下天壽短佛未出時命已終故上天壽長佛滅度後命始終故兜率天不長不短佛出世時正相會故補處菩薩常生其中大婆沙論百七八亦同智論思問一生者依何身說為約實行為化相耶答三身中法身無有補處之義無初後故若受用身自有二種一自受用雖無入般涅槃處之義而有贊補初成佛義故瑜伽論四十六云究竟菩薩自有二種一者一生所繫二者住最後身准此實行於理無違所以者何據實為論頓悟菩薩第十地中變易生死雖無分別前後異熟別盡別生由二障種而有變易前後異熟別盡別生由斯亦有已入等覺未入等覺差別義故分為二種此中意說變易生死由二障種子力故數數生滅故成唯識云前異熟既盡復生餘異熟不同二乘無煩惱障故不許前異熟盡復異熟生但言延命令受變易具說如彼二他受用身及變化身皆有一生補處之義如彌陀佛說有父母入涅槃義由斯觀音贊補佛處名為一生補處菩薩然彼彌陀自有二種一為地上菩薩所現是他受用二為地前異生二乘變化身攝問若爾漸悟應唯一生無別盡別生故解云如觀世音菩薩說為一生於理無違即最後身為一生故
