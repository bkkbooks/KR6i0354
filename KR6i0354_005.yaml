body:
  text: 西明寺沙門圓測撰無自性相品第五之餘復次勝義生如是於我善説善制法毗奈耶最極清淨意樂所説善教法中諸有情類意解種種差別可得釋曰自下第五釋密意教意解差別於中有三初略標依教意解差別次善男子下廣辨依教意解不同後善男子如是已下總結依教意解差別此即初也釋此經文自有釋一云善説即三藏中素怛纜藏善制法者是達摩藏毗奈耶者即毗奈耶一云善説即是三中素怛纜藏阿毗達摩善制法毗奈耶者即毗奈耶一云善説善制法者通舉三藏如來善説善制法故毗奈耶者此云調伏三藏皆有調惡之用名毗奈耶又亦名滅三藏皆有滅惡之義故無性攝論云或一切善能滅衆惡名毗奈耶言善説善制多瑜伽八十三云道理所攝故任持勝德故文義巧妙故謂文句善圓滿故故名善説制立一切所應學處故名善制法毗奈耶者瑜伽九十八云八聖道支會正理故説名為法能滅一切諸煩惱故名毗奈耶最極清淨意樂所説者辨能説者説法意樂然説法意樂諸説不同若依龍猛説法有二一生死之説法必依尋伺二法身菩薩説法不依尋伺故智度論第十七云復次爾時菩薩常入禪定攝心不動不生覺觀亦能為十方一切衆生以無量音聲説法而度脫之是名禪波羅蜜問如經中説先有覺觀思惟然後能説法入禪定中無語覺觀不應得説法汝今云何言禪定中不生覺觀而為衆生説法答曰生死人入禪定先以語覺觀然後説法法身菩薩離生死身知一切諸法常住如禪定相不見有亂法身菩薩變化無量身為衆生説法而菩薩心無所分別如阿羅漢琴常自出聲隨意而作無人彈者此亦無散心亦無攝心是福德報生故隨人意出聲法身菩薩如是無所分別亦無散心亦無説法相是無量福德禪定智慧因緣故是法身菩薩種種法音隨應而出廣説如彼無有尋伺説法衆中如來最勝故言最極清淨意樂所説若依親光八地已上皆無尋伺而能説法彼説尋伺唯有漏故無有尋伺説法衆中如來最勝故言最極清淨意樂所説依護法宗金剛已還諸菩薩衆為他説法必假尋伺於藥病等未遍知故由此道理八地已上無漏尋伺亦能説法於佛果位已究竟故無功用説不假尋伺而能説法故成唯識第七卷云未究竟位於藥病等未遍知故後得智中為他説法必假尋伺非如佛地無功用説是故説言最極清淨意樂所説問十地菩薩依尋伺説智度所説如何會釋答論者意異不可會釋如智度説尋伺俱起彌勒等宗必不俱起如是等異其例非一故不須會問依護法宗十地已還皆依尋伺金剛喻定是第四定既無尋伺應不説法答雖無第四靜慮尋伺而由元起下地尋伺於等覺位亦得説法不起滅定現諸威儀亦唯此釋言善教法中者是所説教瑜伽九十四云由四種相應知世尊所説聖教名善説法一能趣寂靜能定證得有餘依涅槃界故二能般涅槃能令證得無餘依涅槃界故三能趣菩提能令證得聲聞獨覺無上正等三菩提故四善遊分別最極究竟現量所顯無上大師所開示故具上諸義故言善教法中言諸有情類意解種種差別可得者此即正明意解不同有其四種一信解教義二唯信教義三信教不信義四教義俱不信故言種種如後當釋善男子如來但依如是三種無自性性釋曰自下第二廣釋依教意解不同於中有二初舉所依後教於是經下正釋有情意解不同前中有二初明教所依理後由深密意下明依理説教此即初也謂依所説三無自性於不了義隱密相教為所依止由深密意於所宣説不了義經以隱密相説諸法要謂一切法皆無自性無生無滅本來寂靜自性涅槃釋曰此即第二依理説教文有三節初説教之意次辨教隱密後正示密教言由深密意者説教之意謂能證知三種無性甚深密意言於所宣説不了義經以隱密相説諸法要者辨教隱密諸謂聖教隱顯不同今於此中隱有説無故言隱密言法要者要謂要略此中意者由深密意於不了經依三性以隱密相説一切法無自性等諸法要言言謂一切法皆無自性等者此即第三正示密教如前廣説於是經中若諸有情已種上品善根已清淨諸鄣已成熟相續已多修勝解已能積集上品福德智慧資糧釋曰自下第二正明有情意解不同於中有四一五事具足信解人二五事不具能信人三生信隨言執著人四五事全無不信人然此四人種善根等五事多少分成六人一五事具足二有四闕一三有三闕二四有二闕三五有一闕四六五事全無此即初也於中有二初明成就五事後彼若下聞教解悟此即初也彼若聽聞如是法已於我甚深密意言説如實解了釋曰自下第二聞教解了於中有二初明聞教解了後於如是下解了勝利此即初也謂聞法已於佛所説密意言説所顯法義如實解了於如是法深生信解於如是義以無倒慧如實通達依此通達善修習故速疾能證最極究竟釋曰自下第二解了勝利於中有二初明解了法義勝利後亦於下信佛勝利此即初也文有兩節初於法信解後於義信解就信義中文復三節初於見道如實通達次修習位依此通達能善修習後於究竟速疾能證菩提涅槃亦於我所深生淨信知是如來應正等覺於一切法現正等覺釋曰自下第二信佛勝利若諸有情已種上品善根已清淨諸鄣已成熟相續已多修習勝解未能積集上品福德智慧資糧釋曰自下第二五事不具能信人於中有二初明不具五事後能生信心此即初也此明行人雖不具五由成四事而能生信四事差別如前已説其性質直是質直類雖無力能思擇廢立而不安住自見取中釋曰自下第二明能生信心於中有三初明不住自見能生信心次於此經下由生信心故自輕而住後於此經下由自輕故能修福智前中有三初明不住自見次辨聞教生信後顯其信相此即初也性質直者謂即是信故維摩云直心是道場言直心者即是信心智度論云佛法海中信能入故故知質直即是信心此意説云性質直故雖無慧力簡擇聖教是非道理而不安住自見所中更復進求了義經故如是於餘不了義經不如真文而生執著彼若聽聞如是法已於我甚深祕密言説雖無力能如實解了然於此法能生勝解發清淨信釋曰自下第二明聞教生信由彼不住自見取故彼聞法已雖無力能解了言説然於此教而發信心信此經典是如來説是其甚深顯現甚深空性相應難見難悟不可尋思非諸尋思所行境界微細詳審聰明智者之所解了釋曰自下第三顯其信相謂信此經具六義故是其甚深一信此經典等者謂信此經典等者謂信此經是佛説故是其甚深二顯現甚深者謂此經典分明顯現甚深義故名顯現甚深三空性相應者謂此聖教詮空性故與空相稱故名空性相應四難見難悟者謂此經典凡夫不能見二乘不能悟又解凡夫二乘皆不見悟故名難見難悟五不可尋思等者謂此聖教超尋思境故不可尋思也尋思即是三界有漏心心所法或可尋思即不定中尋伺二法六微細等者謂此聖教他上菩薩微細詳審聰明智者所解了也於此經典所説義中自輕而住作如是言諸佛菩提為最甚深諸法法性亦最甚深唯佛如來能善了達非是我等所能解了釋曰自下第二由生信故自輕而住於中有二初於所説義自輕而住後於能説教自輕而住此即初也於此經所説義中自輕己智不能解了便作是言諸佛所有能證菩提真俗二智為最甚深所證諸法真俗二性亦最甚深遠離所取能取性故唯佛如來而能了達非我少智之所能知如婆沙説諸法性相甚深微妙唯一切智乃可窮盡又勝鬘云若善男子於諸深法不自了知仰推世尊非我境界唯佛所知有如是等諸教非一諸佛如來為彼種種勝解有情轉正法教諸佛如來無邊智見我等智見猶如牛迹釋曰此即第二約能説教自輕而住然諸如來隨所攝受有情意樂轉法教而能説智無量無邊我等智見比佛智見猶如牛迹等于大海深密經云以諸如來無邊智慧所知如海而我知見如牛迹水如此經典雖能恭敬為他宣説書寫護持披閲流布殷重供養受誦溫習然由未能以其修相發起加行釋曰此即第三由自輕故能生福智於中有二初由自輕故未能通達後未通達故更修福智前中有二先釋後結此即初也謂彼菩薩以自輕故於此經典起恭敬等十種法行然由未能以其修相發起福智二種加行十法行者諸教不同依大般若五百七十三但列其名而不解釋故彼經云佛告阿難受持此經有十法行一者書寫二者供養三者施他四者諦聽五者披讀六者受持七者廣説八者諷誦九者思惟十者修習大般若第四百及四百二十七莊嚴論第十三勝天王第七無上依經第二亦但列名瑜伽七十四辨中邊論第三顯揚第二如是等教廣釋雖有前後次第不同而義無異故顯揚云一於菩薩藏法若多若少尊重恭敬書持法行二若劣若勝諸供養具供養法行三若自書己由矜愍心施他法行四若他發意恭敬尊重以微妙聲宣揚闡讚由宗仰故諦聽法行五發淨信解恭敬重心披讚法行六為欲修習法隨法行從師受已諷誦法行七現諷誦已為堅持故以廣妙音溫習法行八悲愍他故傳授與彼隨其廣略開演法行九獨處間靜極善研尋稱理觀察思惟法行十如所思惟修行奢摩他毗鉢舍那為欲起入乃至為令諸所求義成就法行莊嚴十三與此稍異故彼論云一書寫二供養三流傳四聽受五轉讀六教他七習誦八解説九思擇十修習解云彼論與顯揚義不同者於顯揚等第六諷誦第七溫習合為習誦以為第七更加教他即為第六於餘教中皆無此義然彼論意為他略説名為教他名他廣説名為解説餘教意者若略若廣皆為他説即合為一故不相違今依此經亦同般若俱十法行然此文中有其七種一為他宣説即是廣説二書寫護持即是書寫或可護持即是一行三者披聞即是披讀四者流布即是施他五殷重供養此即供養六者受誦即是諷誦或是受持七者溫習是即受持或是諷誦而無聽聞思惟修習此品下文具有其八種一聞已信解二書寫護持三供養四流布五受誦六溫習七如理思惟八以其修相發起加行而無廣説披讀二種如下第七地波羅蜜多品中但云十種法行而不引名智度論五十六雖不具足略釋其相依瑜伽論此十法行能生三道故七十四云問如是十種法行幾是能生廣大福德道答一切問幾是加行道答一謂第九問幾是淨障道答一謂第十若廣分別如梁攝論第十舊中邊第二新中邊第三瑜伽七十四是故於我甚深密意所説言辭不能通達釋曰此第二結由彼未能起加行故於我甚深所説言辭不能通達由此因緣彼諸有情亦能增長福德智慧二種資糧於後相續未成熟者亦能成熟釋曰此即第二未通達故更修福智謂此菩薩未能修習二加行故不能通達密意言辭由此十行因緣力故便能修習福德智慧二種資糧於後身中所未成熟皆能成熟今言成熟於一一位所修具足名為成熟非五事相續成熟或可利他令他成熟又云由此因緣等者熟生信中文別有二初廣釋生信後總結信用上來廣釋生信此即第二總結可知若諸有情廣説乃至未能積集上品福德智慧資糧性非質直非質直類雖有力能思擇廢立而復安住自見取中釋曰自下第三生信隨言執著人於中有二初明師計後辨弟子前中有二初對前辨異後明如言起執此即初也文有四即一五事有無二質非質直三有力無力四安立不安立自見取中言廣説等者然釋此文自有四説一云此中唯取總闕五事故深密云不種善根乃至不能成就福智然與第四有差別云此中信法不信義第四法義俱不信也一云此中總有三人一有初一闕四二有初二闕三三有初三闕二一云此中總有四人於前三中更加有初四闕一而與第二異者彼第二人其性質直此第三人性非質直一云此中總有五人於前四中更加五事俱闕而與第二第四人異準前應釋雖有四釋第四為正順文相故言而復安住自見取中者更不進求了義大乘恆執如言不了教故故雜集論第十二云復次何緣一分衆生於方廣分廣大甚深雖生信解而不得出離耶答由深安住自見取故常堅執著如言義故由深安住自見取者更不進求了義經故常堅執著如言義者恆堅封執不了義經故如聞一切法畢竟無自性言故便撥一切諸法性相皆無所有如是於餘不了義經堅執如言義亦爾是故雖信大乘而不得出離以大乘經由種種意説故彼若聽聞如是法已於我甚深密意言説不能如實解了釋曰自下第二如言起執於中有二初明如言執後由此已下顯執過失前中有二初聞而不了後信而執著此即初也謂彼菩薩聞此教已性非質直住自見故於我甚深密意教中不能如實解了密言於如是法雖生信解然於其義隨言執著釋曰第二信而執著於中有二初正明執著後顯執著相此即初也於密意教雖生信解由不了故如言執著謂一切法決定皆無自性決定不生不滅決定本來寂靜決定自性涅槃釋曰此即第二顯執著相據實道理於此經中有其四句一一諸法皆無自性準上經文通約三種無自性説即用三性以為自性二無生無滅三本來寂靜四自性涅槃此之三句準上經文唯約二種無自性性謂相自性性勝義無自性性依廣百論等四句總依初無性説集論雜集四句皆通三無性説如前分別然佛密意不了教中但言諸法皆無自性乃至復云自性涅槃然彼安住自見取人不解如來密意趣故雖生信解如言起執謂一切法決定無性乃至決定自性涅槃然彼執人諸教不同依智度論第十八卷有三邪見一破果不破因二因果俱破不破一切法三破一切法皆無所有即依第三是惡取人廣如彼説依勝鬘經即説名為習諸外道若依集論第六雜集十二皆言若諸菩薩隨言取義不如正理思擇法故廣如彼釋今依此經但言有情亦不説名菩薩外道準義即同集論等説雖闕第五福智資糧而具前四善根等故由此因緣於一切法獲得無見及無相見釋曰自下第二顯執過失於中有二初正顯執失後雖於下釋通伏難前中有五一略標二失二由得下辨二失相三外人徵詰四依徵廣釋五釋已總結此即初也由此執著為因緣故於一切法獲得二見一者無見二無相見然此二見自有兩釋一云無見者撥無依他及圓成實無相見者撥無所執如名言相一云無見者即大法鏡經二十八不不正見中第一相見無相見者即次三見謂損減施設見損減分別見損減真實見故雜集論第十二卷釋彼經云言相見者謂聞大乘經中所説一切諸法皆無自性無生無滅本來寂靜自性涅槃等言不善密意但隨此言義便生勝解謂佛所説一切諸法定無自性定無生等執著如是無性等相是名相見執著如是無性相時便謗三性於此三性起誹謗行即次三見謂損減施設見損減分別見損減真實見廣如彼釋彼與此經名差別者彼據執著無性等相名為相見此就行解執有為無名為無見彼據損減三性理故名損減見此據撥無三性相故名無相見由得無見無相見故撥一切相皆是無相誹撥諸法遍計所執相依他起相圓成實相釋曰此即第二釋二失相然釋此文亦有兩解一云由得無見無相見故者雙牒二見撥一切相皆是無相者總顯二見所成過失謂撥一切三種性相皆是無相誹撥諸法者別顯撥三相失一云由得無見無相見故者雙牒二見撥一切相皆是無相者別顯無見誹撥諸法等者別釋無相見何以故釋曰此第三徵徵有二意一云何以先無依他圓成後無所執一云前二性有可説撥無後所執無撥無何失由有依他起相及圓成實相故遍計所執相方可施設釋曰自下第四依徵廣釋於中有二初先信三性施設次第後依次第以答外徵此即初也如上所説由諸有情於二性上增益所執故立三種無自性此亦同彼所説次第若於依他起相圓成實相見為無相彼亦誹撥遍計所執相釋曰此即第二依前次第以答外徵若依後徵文有二節初明依二性故雖無實性而隨執情假施設有後明隨情施設有故執彼為無亦成誹撥由斯理故瑜伽七十四云問若無遍計所執自性當有何過答於依他起自性中應無名言無名言執此若無者應不可知雜染清淨依佛性論三自性中皆有損減增益二謗是故説彼誹撥三相釋曰第五總結可知此經所説誹撥三相即諸經等惡取空也説惡取聖教非一寶積經云如是迦葉寧山了起我見積若須彌非以空見起增上慢所以者何一切諸見以空得解脫若起空見則不可除譬如迦葉醫師授藥令病擾動是藥在內而不出者於意云何如是病人寧復差不不也世尊是藥不出其病轉增如是迦葉一切諸見唯空能滅若起空見則不可除無上依經第一卷云復有增上慢人在正法中觀空生於有無二見是真空者直向無上菩提一道淨解脫門如來顯了開示正説於中生空見我説不可治阿難若有人執我見如須彌山大我不驚怪亦不毀呰增上慢人執著空見如一髦髮作十六分我不許可依此等經曰有兩説若清辨等依龍猛宗説空有者依世俗諦有空不空依勝義無法不空若執著空名惡取空故般若燈論第八卷云論者言若第一義中有陰等者除此有物立於空法而第一義中實無一法是不空者如偈曰若一法不空觀此故有空無一法不空何處空可得釋曰空不空者於世諦中依止法體如是分別此義云何如有舍宅有人住故名舍不空人不住故則名舍空今第一義中無一法不空何處得有空法可得已説善取空當説惡取空又如偈曰如來説空法為出離諸見諸有見空者説彼不可治釋曰云何名見空者謂執著於空言有此空此執著空有何過失如來説彼空見衆生不可療治此義云何如服下藥動作諸病而復不泄反成重病如是説空法為捨諸惡見若還執空者説彼不可治以此義故捨空無過解云所取空者如瑜伽師所立空理以為真理名惡取空故般若燈云復次十七地論者言如所分別體無故分別體空此諸法空真實是有云何真實不觀作者論者意汝此見者名著空見外人言何故名我以為著空論者言由一切法無體故空空非實法不應執著廣説如彼若護法等依彌勒宗説空有者善取空者謂於依他所執性無即於此無我性有如是有無總説為空惡取空者於依他上所執性無及於依他圓成性有俱不信受而作此執一切諸法都無所有是惡取空故善戒經第二卷云有二種人遠離佛法非佛弟子永失佛法一者説色乃至涅槃有真實性所執性也二者不信世流布性依他性也如是二人不任受持菩薩禁戒如其受者不得戒師則有罪也何故不得誹謗實法著非法故菩薩戒者非口所得心口和合然後乃獲復言若有説言大乘經中一切法空亦得大罪不能善解大乘經義生憍慢心言我善解隨其自心妄想思惟為人廣説亦得大罪若言一切諸法性無云何得有流布於世亦得大罪何以故謗一切法者即是外道富蘭那等真弟子也富蘭那謂諸法性無而佛法中亦有亦無若有人説一切法空當知是人不中共住共語論議布薩説戒若與共住乃至説戒則得大罪何以故不解空義故乃至彼云云何正解如色説色乃至涅槃分別無有種種相性是名色空以色真實流布於世是名不空以是義故説色一法亦有亦無解此二故亦法亦空終不於中妄生計著是名真解空義具説如彼又瑜伽三十六云云何復名善取空者謂由於此彼無所有即由彼故正觀為空復由於此餘實是有即由餘故如實知有如是名為悟入空性如實無倒地持第二亦同此説雜集第六云空相者謂若於是處此非有由此理正觀為空若於是處餘是有由此理如實知有是善入空性如實者不顛倒義顯揚十五云空自相者非定有無非定有者謂於諸行中衆生自性及法自性畢竟無所有故非定無者謂於此中衆生無我及法無我有實性故佛性論第一云二諦不可説有不可説無非有非無故真諦不可説有不可説無者無人法故不可説有顯二空故不可説無俗諦亦爾分別性故不可説有依他性故不可説無復次真諦不定有無人法無不無二空有不有俗諦亦爾分別性故非決定無依他性故非決定有已説善取空當説惡取空瑜伽三十六云云何名為惡取空者謂有沙門惑婆羅門由彼故空亦不信受於此而空亦不信受如是名為惡取空者何以故由彼故空彼實是無於此而空此實是有由此道理可説為空若説一切都無所有何處者何何故名空亦不應言由此於此即説為空是故名為惡取空者又瑜伽七十五云復次於大乘中或有一類惡取空故作如是言由世俗故一切皆有由勝義故一切皆無應告彼言長老何者世俗何者勝義如是問已彼若答言若一切法皆無自性是名勝義若於諸法無自性中自性可得是名世俗何以故無所有中建立世俗假設名言而起説故應告彼曰汝何所欲名言世俗為從因有自性可得為唯名言世俗説有若名言世俗從因有者名言世俗從因而生而非是有不應道理若唯名言世俗説有名言世俗無事而有不應道理又應言彼言長老何緣諸可得者此無自性如是問已彼若答言顛倒事故復應告言汝何所欲此顛倒事為有為無若言有者説一切法由勝義故皆無自性不應道理若言無者顛倒事故諸可得者此無自性不應道理佛性第一亦同瑜伽又彼論第二云復次增上慢人取空為見是真空解脫門約此空解脫門起於空執謂一切有無並皆是空此空執者即無所有無所有故因果二諦道理並失執此空過故即墮耶無是等執者由空而起故成邪執一切邪執莫不由空故能滅除此執既依空起故不可治由此人故佛語迦葉若人起我見執如須須山大我亦許之何以故以可滅故若此增上慢人所起空執猶如髮端四分之一我急呵責決定不許又廣百第六卷云復次諸法真理何者是耶謂一切法空無我理若爾此理亦有過失所以者何如有一類聞空無我謂法皆無誹撥一切因果正理乃至斷滅一切善根此自見有過非空無我咎由惡取空妄起邪見行諸惡行空無我理心言不倒非彼所證愚夫聞説諸法皆空不知聖意便撥世俗因果亦無滅諸善法此豈是空無我過失聖説空教有何意耶為遣一切虗妄有執若爾亦應説諸法有為遣妄執諸法空故實爾若有執諸法空如來亦説諸法是有既為遣執説有説空諸法真理為空為有諸法真理非有非空分別戲論皆不能及何緣聖説非虗妄耶為除邪執故非虗妄空有二教俱能除執何故如來多説空教以諸有情多分執有空説空生死多分從有生執是故如來為除有執滅生死苦多説空教若空若有皆是教門何故前説空為真理方便假説亦不相違又此空言是遮非表非唯空有亦復空空遮遣執心令契諸法非有非空究竟真理諸法真理實非空性空為門故假説為空真理非空空為門者真理非有應有為門隨機説門有亦無過然其門義順在於空有有有等皆順執心空空空等皆違妄執故有智者開説空言應離一切有無等執悟法真理非有非無勿起有無分別戲論辨惡趣過失相者如瑜伽論三十六説故彼論云如有一類聞説難解大乘相應未極顯了密意趣義甚深經典不能如實解所説義起不如理虗妄分別由不巧便所引尋伺起如是見立如是論一切唯假是為真實若作是觀名為正觀彼於虗假所依處所實有唯事撥為非有是則一切虗假皆無何當得有一切唯假是為真實由此道理彼真實及以虗假二種俱謗都無所有由謗真實及虗假故當知是名最極無者如是無者一切有智同梵行者不應共語不應共語不應共住如是無者能自敗壞亦壞世間隨彼見者世尊依彼密意説言寧如一類起我見者不如一類惡取空者何以故起我見者唯於所知境界迷惑不謗一切所知境界不由此因墮諸惡趣於他求法求苦解脫不為虗誑不作稽留於法於諦亦能建立於諸學處不生慢緩惡取空者亦於所知境界迷惑亦謗一切所知境界由此因故墮諸惡趣於他求法苦解脫能為虗誑亦作稽留於法於諦不能建立於諸學處極生慢緩如是損減實有事者於佛所説法毗奈耶甚為失壞廣百論第六卷亦同瑜伽故論云復次劣慧者前不應輒説空無我理增其惡見所以者何故次頌曰寧彼起我執非空無我見後兼向惡趣初唯背涅槃論曰彼謂世間諸劣慧者我執即是薩迦耶見其我所見亦帶我執故我執言亦攝彼見我執雖復不稱正理而寧起彼過失輕故實無我見雖稱正理然彼不能如實了達因斯誹撥諸法皆無過失重故寧彼不起云何此二過失輕重謂一切我執唯背涅槃後惡取空兼向惡趣彼劣慧者惡取空時尚厭善根況諸含識彼由厭背善及世間斷滅善根損害含識非唯棄背清涼涅槃亦持自身之地獄火起我見者無如是事所以者何彼貪我樂欲我離苦不造衆罪廣修諸福脫諸惡趣不失人天但怖涅槃不證解脫故契經説寧起我見如妙高山非惡取空增上慢者若爾諸法空無我理鄰近險趣聖不應説劣慧者前實不應説而勝慧者隨此修行獲大義利故須為説雖於我法起於法想而非義中起於義想釋曰自下第二釋通伏難通二伏難即分為二初通信法不應成過難後通信法應具福智難前中有二初正通伏難後釋所由此即初也謂彼菩薩雖依我教起於教想非正義中起正義想雖能信教而成過失由於我法起法想故及非義中起義想故於是法中持為是法於非義中持為是義釋曰此即第二釋其所由由於我法起法想故於是法中信為正法而於非義起義想故非正義中執為正義彼雖於法起信解故福德增長然於非義起執著故退失智慧智慧退故退失廣大無量善法釋曰此第二通信法應具福智難謂外難云此位菩薩四事具足聞教能信如何不具福智資烺故作此通彼雖於法起淨信故福德增長於非義中起執著故退失智慧由退智故失無量善問種姓菩薩有退以不設爾何失若言退者樂廣莊嚴經如何會釋經云性地菩薩若一時煞閻浮提衆生雖有此罪不墮地獄若煞四天下乃至三千大千衆生亦不墮地獄何以故此人曠劫修行多供養諸佛功德智慧善根純熟雖造重罪以福德大故罪即消滅不墮地獄又無性攝大乘釋第七卷初無數劫云堅固心勝進雖遇惡友方便破壞終不棄捨大菩提心現世當來所修善法運運增長終不退減世親第七亦同無性若不退者地持經説性地菩薩墮地獄等如何會釋解云於此義中自有兩説一龍樹宗種姓不退是故寶鬘論中有人問龍樹云地持經説種姓菩薩墮阿毗地獄此義云何龍樹答云雖有此言我不敢作如是説何以故不增不減經中明性地菩薩畢竟不墮地獄同樂莊嚴經而地持等説言入者催恐地前菩薩令其生怖速證初地非謂實入阿毗地獄此段引經如金剛仙説馬鳴菩薩起信論亦同上釋故彼論云如修多羅中或説有退墮惡趣者非其實退但為初學菩薩未入正信而懈怠者恐怖勇猛故二彌勒宗自有兩説一云同龍樹宗一云依本業經十住已上名種姓位於十住中前六名退第七不退故知種姓亦有退義又瑜伽論四十七云又諸菩薩勝解行位於菩薩修所作狹小所作有缺所作不定所得有退又云解行菩薩或於一時於大菩提雖以發心而復退捨善戒經第八地持第九亦同此説又瑜伽三十七云若諸菩薩住勝解行地乃至猶往惡起此盡第一無數劫邊際善戒經第三地持第二亦同此説然樂廣莊嚴經及攝大乘論言不退者從多分説而非盡理復有有情從他聽聞謂法為法非義為義若隨其見彼即於法起於法想於非義中起於義想執法為法非義為義釋曰自下第二明弟子計於中有二初別釋二計後由是緣下總結二計前中二計即分為二初依聞隨言執著人後不隨其見不信人前中有二初明如言起執後顯執過失此即初也謂此有情從第三師聽聞所説隨其師見於法為法非義為義彼與本師無別異見而差別者其第三師聽聞佛教此第四人從他傳聞與師同計若準對法如前分別説第三師以為菩薩依深密經説第三師名邪見人故深密云復有衆生於彼耶見人邊聞法也由此因緣當知同彼退失善法釋曰此即第二顯執過失同前第三失無量善若有有情不隨其見從彼欻聞一切諸法皆無自性無生無滅本來寂靜自性涅槃便生恐怖釋曰自下第二不隨其見不信人於中有二初明聞教不信後由此下顯不信失前中有三初聞教生怖次生耶解後因解起謗此即初也謂此有情從第三師聞彼所説而不隨其前師所見言一切法決定皆無自性等見從彼欻聞一切諸法無性等言心生怖畏如何諸法無自性等因此於教亦生恐怖有三種人於教生怖如雜集論第十二云復次何緣一分衆生於方廣分廣大甚深不生勝解反生怖畏耶由遠離法性故未種善根故惡友所攝故法性者謂菩薩種性是彼自體故由一分衆生無菩薩種姓故心性下劣於廣大甚深教不能勝解是故怖畏又一分衆生雖有菩薩種性而於大菩提未種正願等諸善根故於此不能勝解是故怖畏又一分衆生雖已種善根而為誹謗大乘衆生惡友所攝故於此不能勝解是故怖畏恐怖已作如是言此非佛語是魔所説釋曰此即第二因生耶解謂生怖已因其怖畏便生耶解言是佛教定非佛説即作是言此非佛語是魔所説作此解已於是經典誹謗毀罵釋曰此即第三因解起謗然慢法緣有其二種或有四種故大般若五百五十九云具壽善現復白佛言彼愚癡人幾因緣故毀謗深法佛言善現由二因緣一為耶魔之所扇惑二於深法不能信解復次善現由四因緣毀謗深法一為惡友之所誘誑二為不能勸修善法三為懷惡喜求他過四為嫉妬自讚毀他由具如是法因緣故彼愚癡人毀謗深法發起無邊極重惡業又大般若三百七十四百三十五大品經十八智度論六十三諦法四緣大同前説由此因緣獲大衰損觸大業障釋曰此即第二顯不信失謂由前説謗法因緣獲大衰損證大業障由是緣故我説若有於一切相起無相見於非義中宣説為義釋曰自下第二總結二計於中有二初結前計後結後計此即初也由是從他聞法起執以為緣故世尊自説於三性相起無相見非義之中宣説為義便成耶見是起廣大業障方便由彼陷墜無量衆生令其獲得大業障故釋曰此即第二結後計也如文可知或如言起執文別有二初廣釋如言起執後由是緣故下總結雖有兩釋後解為勝善男子若諸有情未種善根未清淨障未熟相續無多勝解未集福德智慧資糧性非質直非質直有力能思擇廢立而常安住自見取中釋曰自下第安住自見不信人於中有二初明不具五事後顯其不信此即初也文有二節初明五事不具後辨三類差別準前可知彼若聽聞如是法已不能如實解我甚深密意言説亦於此法不生信解釋曰自下第二顯其不信於中有五一聞經不信二起二種想三生二種執四因生耶解五正明起謗此即初也謂由安住自見取故聞此密教不生信解於是法中起非法想於是義中起非義想釋曰此第二釋起二種想由前聞教不信解故於法義中起二耶想於是法中執為非法於是義中執為非義釋曰此第三釋生二種執由前二想起二執故也唱如是言此非佛語是魔所説釋曰此第四釋因生耶解由於法義起二執故以因此緣起斯耶解作此解已於是經典誹謗毀罵撥為虗偽以無量門毀滅摧伏如是經典釋曰此第五釋正明起謗於中有三初正明謗經次憎信經者後辨謗法緣此即初也於諸信解此經典者起怨家想釋曰此第二釋憎信經人也彼先為諸業障所障釋曰此即第三辨謗法緣謂三障中為業障故所以謗法由此因緣復為如是業障所障如是業障初易施設乃至齊於百千俱胝那庾多劫無有出期釋曰此即第二顯謗過失謂由先世業障所障復為現在謗法業障之所覆障如是業障初造時雖易施設當受苦果徑於百千俱胝那庾多劫無有出期言俱胝那庾多者如俱舍論第十二卷引經説云有一無餘數始為一十一為十十十為百十百為千十千為萬十萬為洛叉十洛叉為度洛叉十度洛叉為俱胝十俱胝為末陀十末陀為阿庾多十阿庾多為大阿庾多十大阿庾多為那庾多如是展轉滿六十數具如彼説或可初易施設者過去業障初所造故易可施設輕重之相今謗法業受苦無窮難可分別其謗法失具如大般若一百八十一法華第二等然上諸説有差別者初之二人教義俱信第三人中及二弟子合有三人初之二人信教失義後之一人修義失教第四一人教義俱失又四人中前之二人並是菩薩而差別者初具五事後具四事第三一人依深密經五義俱無名為耶見若依此經具有四事但言有情依對法論及大品名為菩薩所以如是諸教不同善男子如是於我善説善制法毗奈耶最極清淨意樂所説善教法中有如是等諸有情類意解種種差別可得釋曰就意解不同文別有三初總標次別釋後總結上來已釋二段文訖此即第三總結應知爾時世尊欲重宣此義而説頌曰釋曰此下第二以頌重説於中有二初總標頌意後舉頌正釋此即初也一切諸法皆無性無生無滅本來寂諸法自性恆涅槃誰有智言無密意釋曰此下第二舉頌正釋於中有二初之兩頌頌上一切諸法皆無性等反頌後説依密意教迷悟不同後依諸淨道下有其三頌頌依密教説一乘義或可分為二初有二頌頌上一切諸無性等意後有三頌頌上一乘已下二復次文前中有二初有一頌釋經四句密意趣後有一頌約三無性正顯密意謂經所説無性等言非決定無自性等故名為無性但依三種無自性義説名無性若具分別如上廣説故言誰有智言無密意也相生勝義無自性如是我皆已顯示若不知佛此密意失壞正道不能往釋曰此即第二約三無性正顯密意謂前所説無性等言不了言辭我以相生勝義無性顯示所説無性等意若不了知此密意者失正道故不能趣往無上菩提如是失壞如無性攝論第一卷云於無無因強立為有故名增益於有無因強撥為無故名損減如是增益及與損減俱説為邊是墜墮義此二轉時失壞中道依諸淨道清淨者唯依此一無第二故於其中立一乘非有情性無差別釋曰自下第二有三行頌約無性觀釋一乘義於中有四初之一頌約三乘人密説一乘二有半頌頌定姓人唯度自身三有半頌頌不定姓證大涅槃四有一頌釋涅槃相此即第一約三乘人密説一乘謂三乘人皆依無性無漏聖道各證涅槃無第二道故説一乘非彼三乘無有差別衆生界中無量生唯度一身趣寂滅釋曰此即第二頌定性人唯度自身謂依身中定無如來慈悲種故畢竟不成無上菩提廣説如前大悲勇猛證涅槃不捨衆生甚難得釋曰此即第三頌不定性證大涅槃彼不定人身中具有佛種姓故勇猛精進證佛涅槃不捨衆生利益之事具四種智便能證得究竟涅槃比定性人甚難得也微妙難思無漏界於中解脫等無差一切義成離惑苦二種異説謂常樂釋曰此即第四釋涅槃相微妙難思無漏界者謂涅槃體界者體也謂涅槃體離諸相故微妙難思於中解脫等無差者顯涅槃果等無差別於一真如有二身義一解脫身謂依真如斷煩惱障證得解脫名解脫身二者法身謂佛法身力無畏等功德所依故名法身於中法身唯如來有解脫身者三乘無別故言解脫等無差故下第五卷中説云善男子由解脫身故説一切聲聞獨覺與諸如來平等平等由法身故説有差別如來法身有差別故無量功德最勝差別若依瑜伽三乘無餘涅槃無有上中下品差別故瑜伽論第八十云非此無餘涅槃界中可得安立上中下品高下勝劣此是如來是聲聞等廣説如彼一切義成等者義謂義利謂於無餘涅槃真如體上一切無為功德義成遠離煩惱所依苦身不同有餘唯離煩惱依此涅槃二種異説所謂常樂以離惑故説之為常離苦故説之為樂若依瑜伽有三義故説之為常有二義故名之為樂故八十云問何因緣故當言是常答清淨真如之所顯故非緣生故無生滅故問當言是樂當言非樂答由勝義樂當言是樂非由受樂説名為樂何以故一切煩惱及所生苦皆超越故準此瑜伽依三常義二種樂義由此常樂二種義別故作此言二種異説爾時勝義生菩薩復白佛言世尊諸佛如來密意語言甚奇希有乃至微妙最微妙甚深最甚深難通達最難通達釋曰自下第三菩薩領解受持分於中有二初菩薩領解後爾時世尊下如來勸持前中有三初讚教甚深次如是下申自領解後世尊譬如下舉喻重顯此即第一讚教甚深文有二節初總讚歎功能希有後乃至下別讚歎也言微妙甚深難通達者如其次第超過凡夫二乘菩薩三位別故或可超過聲聞緣覺菩薩位故或可超過三僧祗位菩薩境故説此三名如是我今領解世尊所説義者釋曰自下第二自領解於中有二初領蘊等五門説三無性後領諦等二門説三無性前中有二初約色蘊説三無性後類餘蘊等就色蘊中復分為二初領前二性後領第三性前中有二初總標領解後別釋領解此即初也若於分別所行遍計所執相所依行相中假名安立以為色蘊或自性相或差別相假名安立為色蘊生為色蘊滅及為色蘊永斷遍知或自性或差別相是名遍計所執相釋曰自下第二別釋領解於中有二初明所執相後明依他性就所就中文別有二初依依他立所執性後世尊依此下依所執性説相無性此即初也文有三節一明分別所行所依行相二明色蘊自性差別三辨色蘊生滅永斷遍知分別所行者分別即是能遍計度心及心所所行言顯彼所執性實色蘊等是彼分別所行境故名為所行又解所行是依他假色蘊等即彼分別所緣緣故名為所行言遍計所執相所依行相中者所説行相自有兩説一云行謂見分能緣行解相即相分是所緣相一云行相即是有為行相總説依他以為行相兩説之中後説為勝若依前説不攝依他見等分故安立色蘊自性差別者總相出體名為自性即自性上有漏無漏可見不可見等名為差別安立色蘊生滅等者未有而有名之為生已有還無稱之為滅總辨生滅名為自性剎那生滅及一期等名為差別染汙色蘊名為永斷不染色蘊名曰遍知或集義邊名為永斷苦諦義邊名曰遍知如是永斷遍知若總辨永斷名永斷自性若見修等斷名永斷差別總者色蘊自性名遍知自性別知色蘊差別名遍知差別如是安立名為遍計所執相問勝義諦品總有六相謂得蘊故得蘊相故得蘊起故得蘊盡故得蘊滅故得蘊滅作證故依此品初但説五相此領解中説有六句如何前後有此差別解曰前後通論總有十相勝義諦品説有六相無性品初更加二相謂永斷遍知此領解中復加二相謂自性差別此十相中自性差別及以相故其數不定廢別論總唯有一相廢總論別唯有二相總別通論即有三相所以前後增減不同今領解中領品初故説此六句或可品初亦有六相曾説諸蘊即勝義諦品由得蘊故也此領解中即有七相以為色蘊即初相故問何故第二品於蘊等法説滅滅作證無永遍知此品即説永斷遍知而不説滅及滅作證解云永斷是集遍知即苦滅是滅諦作證是道據實蘊等通有四諦各舉一邊影略互顯世尊依此施設諸法相無自性性釋曰此即第三依所執性説相無性如文可知若即分別所行遍計所執相所依行相是名依他起相釋曰自下第二別顯依他於中有二初明所執所依是依他起後依依他起辨二無性此即初也世尊依此施設諸法生無自性性及一分勝義無自性性釋曰此即第二依依他起辨無性如是我今領解世尊所説義者釋曰自下第二領第三性於中有二初總標領解後別釋領解此即初也若即於此分別所行遍計所執相依行相中由遍計所執相不成實故即此自性無自性性法無我真如清淨所緣是名圓成實相釋曰自下第二別釋領解於中有二初依依他辨圓成實後依圓成説一分勝義無性此即初也謂所執相所依依他起性上遣所執故無性所顯法無我性名圓成實世尊依此施設一分勝義無自性性釋曰此即第二依圓成實説一分勝義無性如於色蘊如是於餘蘊皆應廣説釋曰自下第二類餘蘊等於中有五一類餘蘊二類十二處三類十二緣四類四食五類六界十八界此即初也如於諸蘊如是於十二處一一處中皆應廣説釋曰此即第二類十二處領解無性準上應知於十二支一一支中皆應廣説釋曰此即第三類十二支領解無性準上應知於四種食一一食中皆應廣説釋曰此即第四類四種食領解無性準上應知於六界十八界一一界中皆應廣説釋曰此即第五類六界及十八界領解無性六界即是地水火風及以空識準此領解品初所説種種界等通説六界我今領解世尊所説義者釋曰自下二領諦等二門説三無性於中有二初約苦諦領解無性後類餘諦等領解無性前中有二初依二性領二無性後依圓成實領勝義無性前中有二初總標領解後別釋領解此即初也若於分別所行遍計所執相所依行相中假名安立以為苦諦苦諦遍知或自性相或差別相是名遍計所執相釋曰自下第二別釋領解於中有二初約所執性領相無自性性後依依他起領生無自性性及一分勝義無自性性前中有二初依依他起安立所執後依所執施設無性此即初也謂於所執所依行相依他起上假名安立以為苦諦或立苦諦遍知是名遍計所執相如是二種皆有自性或差別相謂逼迫名苦名苦諦自性三八苦等名苦差別知苦諦自相名遍知自性知苦差別遍知差別世尊依此施設諸法相無自性性釋曰此即第二依所執性施設無性謂所執相故立相無性準上應知若即分別所行遍計所執相所依行相是名依他起相釋曰自下第二依依他起領生無性及一分勝義無性於中有二初辨依他起後依依他説無性此即初也世尊依此施設諸法生無自性性及一分勝義無自性性釋曰此即第二依依他起説二無性如是我今領解世尊所説義者釋曰自下第二依圓成實施説一分勝義無性於中有二初總標領解後別釋領解此即初也若即於此分別所行遍計所執相所行中相由遍計所執相不實故即此自性無自性性法無我真如清淨所緣是名圓成實相釋曰自下第二正明領解於中有二初辨圓成實相後施設一分勝義無性此即初也準上應知世尊依此施設一分勝義無自性性釋曰此即第二施設無性如文可知如於苦諦如是於餘諦皆應廣説釋曰此即第二類釋餘諦等於中有二初類餘諦後類道品此即初也謂如苦諦具有三性依彼三性立三無性類此三諦皆具三性依彼三性立三無性是故總言如於苦諦於一一諦皆具三性廣如中邊及成唯識第八説然於此經有差別者依於苦諦説名遍知依於集諦名為永斷依於滅諦説名作證依於道諦名為修習如前卷説如於聖諦如是於諸念住正斷神足根力覺支中一一皆應廣説釋曰自下第二依諸道品領解無性於中有二初約七門總明領解後如是我今下別約八道支明其領解此即第一總約七門道品類四聖諦約三性義辨三無性準上應知如是我今領解世尊所説義者釋曰自下第二別約道支中第八正定明其領解於中有二初依二性領二無性後依圓成領勝義無性前中有二初總標領解後別釋領解此即初也若於分別所行遍計所執相所依行相中假名安立以為正定及為正定能治所治若正修未生令生生已堅住不忘倍修增長廣大或自性相或差別相是名遍計所執相釋曰自下第二別釋領解於中有二初約所執領相無性後依依他領生無性及一分勝義無性前中有二初立所執相後施設無性此即初也八道支中第八正定分別正定餘準可知故今分別第八正定文有二節若於分別等者辨所執性所依依他後假名安立等者依依他起安立所執就所執中安立五事一安立正定自性差別謂總出定體名定自性未至中間及四靜慮名定差別二安立正定能治所治自性差別謂八道支中第八正定名為能治八耶之中第八耶定名為所治自性差別準上應思三安立正修未生令生四生已堅住五不忘位修增長廣大此上三門皆有自性差別尋即可知如是五相安立正定名所執相世尊依此施設諸法相無自性性釋曰此即第二辨相無性準上應知若即分別所行遍計所執相所依行相是名依他起相釋曰自下第二依依他起領解無性於中有二初辨依他起後依依他辨二無性此即初也世尊依此施設諸法生無自性性及一分勝義無自性性釋曰此即第二依依他起辨二無性準上可知如是我今領解世尊所説義者釋曰自下第二依圓成實領解無性於中有二初總標領解後別釋領解此即初也若即於此分別所行遍計所執相所依行相中由遍計所執相不成實故即此自性法無我真如清淨所緣是名圓成實相釋曰自下第二別釋領解於中有二初辨圓成實後辨無性此即初也準上應知世尊依此施設諸法一分勝義無自性性釋曰此即第二施設無性準上應知世尊譬如毗濕縛藥一切散藥仙藥方中皆應安處釋曰自下第三舉喻重顯於中四喻即為四段此即第一毗濕縛藥喻於中有二先喻後合此即舉喻毗濕縛藥者但知此藥有多功能此方無名故不翻之若以此藥置諸藥中合諸藥草皆有神驗深密經云毗舒婆藥草者譯家別也如是世尊依此諸法皆無自性無生無滅本來寂靜自性涅槃無自性性了義言教遍於一切不了義經皆應安置釋曰第二舉法同喻謂無性等言安置一切不了義中應皆了知彼經密意世尊如彩畫地遍於一切彩畫事業皆同一味或青或黃或赤或白復能顯發彩畫事業釋曰自下第二如彩畫地喻於中有二先喻後法此即初也謂如彩畫青黃等地遍於一切衆像事業能令事業皆同青等一味地故復能顯發一切彩畫像事業如是世尊依此諸法皆無自性廣説乃至自性涅槃無自性性了義言教遍於一切不了義經皆同一味復能顯發彼諸經中所不了義釋曰第二舉法同喻如文可知世尊譬如一切成熟珍羞諸餅果內投之熟蘇更生勝味釋曰自下第三熟蘇勝味喻於中有二先喻後法此即喻也如是世尊依此諸法皆無自性廣説乃至自性涅槃無自性性了義言教置於一切不了義經生勝歡喜釋曰此即舉法同喻尋文可知世尊譬如虗空遍一切處皆同一味不障一切所作事業釋曰自下第四虗空一味喻於中有二先喻後法此即喻也如是世尊依此諸法皆無自性廣説乃至自性涅槃無自性性了義言教遍於一切不了義經皆同一味不障一切聲聞獨覺及諸大乘所修事業説是語已釋曰此即舉法同喻謂無性性了義言教遍於一切不了義經皆悉同此一無性味不障一切三乘事業爾時世尊歎勝義生菩薩曰善哉善哉釋曰自下第二如來勸持於中有四一總讚善哉二讚領深義三讚能作喻四歎勝勸學此即第一總讚善哉善男子汝今乃能善解如來所説甚深密意言義釋曰此即第二讚領深義復於此義善作譬喻所謂世間毗濕縛藥雜彩畫池熟蘇虗空釋曰此即第三讚能作喻勝義生如是如是更無有異如是如是汝應受持釋曰此即第四印可勸持爾時勝義生菩薩復白佛言世尊初於一時在婆羅痆斯仙人墮處施鹿林中唯為發趣聲聞乘者以四諦相轉正法輪釋曰自下第四校量嘆勝分於中有二初菩薩請問後爾時下世尊正説前中有二初明三轉勝劣不同後世尊若善男子下正發問辭辨福勝劣前中三輪即分為三此即第一四諦法輪於中有二初正明法輪後雖是下顯教是劣此即初也文有五節一辨問答者二明説時三顯説處四解所為五釋法輪言爾時等者辨問答人也言初於一時者説經時也謂三法輪中説初輪時言在婆羅痆斯等者説經處也深密經云於婆羅奈城仙人集處諸禽獸遊處若依真諦解節記云第一時於婆羅㮈鹿園仙人集處此處有三德故三種人恆集此處言三德者一謂林德樹枝蔭覆春則遮雨夏能遮熱冬復遮風二謂水德恆具有五輕冷軟美香三謂他德林外曠野一切鳥獸皆來集聚飲食無畏又此地下有大寶藏廣四十里深四十里有時出現但人不得取若輪王出世得用此寶而鹿園自有二義一謂昔時此地有無量鹿國王欲取鹿鹿王白日日煞一可得無量時羮後日煞次一懷胎鹿鹿王愍念自代就死國王見之因相𮨇訪鹿王仍為説菩薩道國王聞之即得解悟遂放諸鹿廣説鹿王代鹿母死如智度論第十六説也二謂轉法輪時有三鹿恆來佛所聽法三種人者佛未出世世間仙人皆集此地修學仙道二佛未出世一切緣覺皆集此地修緣覺道三佛既出世與諸聲聞共集此處依大嚴經名仙人墮處及施鹿林彼第一云一生補處菩薩將欲下生有天子下閻浮提告辟支佛言仁者應捨此土何以故十二年後當有菩薩降神入胎是時波羅奈國五百辟支佛聞天語已從座而起踊在虗空高七多羅樹作入燒身入於涅槃唯有舍利從空而下是故此地名仙人墮處復有過去有仁慈王施於群鹿無畏之處是故彼地亦名仙人鹿苑具説如彼依大婆沙百八十三云佛於波羅痆斯仙人論處施鹿林中為憍陳那等轉正法輪問何故名波羅痆斯答此即是河名去其不遠造立王城是故此城亦名波羅痆斯問何故名仙人論處答若作是説諸佛定於此處轉法輪者彼説佛是最勝仙人皆於此處初轉法輪故名仙人論處若作是説諸佛非定於此轉法輪者彼説應言仙人住處謂佛出世時有佛大仙及聖弟子仙衆所住佛不世時有獨覺仙人所住若無獨覺時有世俗五通仙住以此處恆有諸仙已住今住當住故名仙人住處有説應言仙人墮處昔有五百仙人飛行空行至此遇退因緣一時墮落問何故名施鹿林答恆有諸鹿遊止此林故名鹿林昔有國王名梵達多以此林施與群鹿故名施鹿林如羯蘭鐸迦長者於王舍城竹園中穿一池以施羯蘭鐸迦鳥令其遊戲因名施羯蘭鐸迦池此亦如是故名施鹿林若依世親菩薩轉法輪論有其四緣故依彼林而轉法輪故彼云以何義故捨於勝處多衆集處於波羅奈小人衆處在波吒離樹影蔭下鹿苑之中而轉法輪彼義今釋世尊往昔六十千億那由他會廣行施故以曾供養六十千億那由他佛又於彼處已有九十一億千佛轉於法輪又彼處常饒寂靜仙人有如是等諸功德故廣説如彼言唯為發趣聲聞乘者解所為人三乘之中唯為聲聞人也依大婆沙俱舍正理轉法輪論為五比丘五比丘者依四分律一憍陳如二阿濕卑三摩訶男四婆提五婆敷五分律云憍陳如跋提婆頗頞鞞摩訶納依瑜伽論第九十五為憍陳那今依此經通為一切聲聞乘者轉四諦法言以四諦相轉正法輪者正釋法輪謂三周正轉十二行相法輪如轉法輪經然此法轉略以四門分別一釋名字二出體性三問答解釋四釋十二行言釋名者如契經説世尊轉法輪毗婆沙一百八十二云問何故名法輪答此輪是法所成法為自性故名法轉如世間輪金等所成金等為性名金等輪此亦如是有説此輪能淨聖慧法眼故名法輪有説此輪能治非法輪故名法輪非法輪者謂布剌袽等六師所轉八耶支輪問何故名輪輪是何義答動轉不住是轉義捨此趣彼是輪義能伏怨敵義是輪義如是等義故名為輪言動轉不住者見道是速疾道不越期心道於動轉不住最為隨順故言捨此趣彼者見道中捨苦現觀趣集現觀乃至捨滅現觀趣道現觀故言能伏怨敵義者如轉輪王所有輪寶降伏四洲所有怨敵如是行者以見道輪降伏四諦所有煩惱故名法輪所言輪者依轉動義令他身中聖道起故名之為轉故婆沙問若彼身中聖道生時即彼名為轉法輪者何故説佛轉法輪耶答依能轉因故作是説謂彼身中所有聖道世尊若不以言説手為其轉者即彼聖道無因得生彼聖道生皆由佛力是故説佛初轉法輪薩婆多宗義如上釋若依經部有其二義一者聖教二者聖道由此聖教往他相續故名為轉故俱舍二十四云所有法門名法輪應可正理云何名轉由此法門往他相續令解義故或諸聖道皆是法輪於所化生身中轉故於他相續見道生時已至轉初故名已轉大乘亦爾具有二義如瑜伽説後當分別言出體者諸説不同一薩婆多宗依俱舍等唯八聖道以為自性故俱舍二十四云頌曰所説沙門性亦名婆羅門亦名為梵輪於中唯見道説名為法輪由速等似輪或具輪等故解云於中唯見道説名為法輪準此故知唯在見道八支為體雜心第十亦同俱舍故彼頌曰牟尼説見道疾故名法輪或説覺八枝轉至於他身解云上半薩婆多義下半頌顯尊者瞿沙所立宗義通於修位大唐三藏翻為妙音廣説如彼又大婆沙一百八十二云云何法輪答八聖道支若兼相應隨轉即五蘊性乃至彼云唯説見道名為法轉具説如彼然毗婆沙師三轉十二行如次顯示見等三道非唯見道是故世親約三轉十二行破薩婆多唯説見道名為法輪故俱舍論第二十四復作是言由此三轉如次顯示見道修道無學道三毗婆沙師所説如是此敘薩婆多義若爾三轉十二行相非唯見道如何可説唯於見道立法輪名此是經部薩婆多或可世親自破也是故唯應即此三轉十二行相所有法門名為法輪可應正理具説如彼解云經部申自宗或可世親申自宗義也依順正理第六十七救薩婆多云毗婆沙師本意總説一切聖道皆名法輪以説三道攝故於他相續見道生時已至轉初故名已轉然唯見道是法輪初故説法輪唯是見道諸天神類即就最初言轉法輪不依二道依摩訶僧祇部説法輪體語為自性故婆沙一百八十二云彼作是説一切佛語皆是法輪依經部宗如俱舍第二十四體有二種一教為體二用一切聖道為體所引聖教如名中説若依異部宗輪論大衆部一説部説出世部雞胤部四部同説諸如來語皆轉法輪依多聞部謂佛五音是出世教一無常二苦三空四無我五涅槃寂靜此五能引出離道故如來餘音是世間教如是等説皆用聖教以為法輪今依大乘通用聖道及彼聖教為法輪體故此經云初二法輪是不了義第三法輪是了義經依深密經第二不了義修多羅第三了義修多羅而不説第一不了義者譯家略故準此經等皆説聖教名為法輪若依瑜伽通説教行故瑜伽九十五云正見等法所成性故説名法輪如來應供是梵增語彼所轉故亦名梵輪然彼瑜伽以五種相辨轉法輪故今敘之彼云復次由五種相轉法輪者當知名為善轉法輪一者世尊為菩薩時為所得緣境界二者為得所得方便三者證得自所應得四者得已樹他相續令於自證深生信解五者令他於他所證深生信解當知此中所緣境者謂四聖諦得方便者謂即依此四聖諦中三周正轉十二相智最初轉者謂昔菩薩入現觀時如實了知是苦聖諦廣説乃至是道聖諦於中所有現量聖智能斷見道所斷煩惱爾時説名生聖慧眼即此由依去來今世有差別故如其次第眼智明覺第二轉者謂是有學以其妙慧如實通達我當於後猶有所作應當遍知未知苦諦應當永斷未斷集諦應當作證未證滅諦應當修習未修道諦如是亦有四種行相如前應知第三轉者謂是無學已得盡智無生智故言所應作我皆已作如是亦有四種行相如前應知此差別者謂前二轉四種行相是其有學真聖慧眼最後一轉是其無學真聖慧眼此釋菩薩見等三道三周正轉十二相智謂為無上菩提之方便準此瑜伽以眼智明覺為十二行相得所得者謂得無上正等菩提此釋第三無學位中自有二義一三道差別以為方便二菩提義邊即無學為證自所得也樹他相續令於自證生信解者謂如長老阿若憍陳從世尊所聞正法已最初悟解四聖諦法又答問言我已解法從此已後如前所説究竟行相五皆證得阿羅漢果生解脫處此釋如來施鹿林中轉法輪時五人得道最後令他於他所證生信解者謂如長老阿若憍陳起世間心我已解法如來知已起世間心斷阿若憍陳已解我法地神知已舉聲轉告徑於剎那瞬息便實其聲展轉乃至梵世此釋陳如得道後地神轉告至於梵世也當知世尊轉所轉法置於阿若憍陳身中次復隨轉置餘身中彼復隨轉置餘身中以是展轉隨轉義故説名為轉正見等法所成性故説名法輪如來應供是梵增語彼所轉故亦名梵輪準此瑜伽五相之義釋經宗意應可了知也第三問答解釋問依薩婆多何故唯説見道名法輪耶答見道是速疾道不越期心道於動轉不住最為隨順故獨名法輪解云十六剎那各唯一念故名速疾無餘心間故言不越期心雜心俱舍及順正理大同此釋或有説者見道猶如輻穀輞法故説為輪猶如車輪穀最居中輪依穀住輞攝於輪如是見道苦集忍智如輻滅忍滅智如穀道忍道智如輞遍緣道故或有説者正見正思惟正勤如輻正語業命如穀正念正定如輞應如婆沙六復次釋問若唯見道名法輪者如何三周十二行智皆名法輪答依俱舍等不釋此難正理論師釋通此難如體中説問若謂聖道是法輪者即菩提樹下已轉法輪何故至波羅痆斯方名轉法輪答轉法輪有二種一自相續中轉二令他相續中轉菩提樹下是自轉法輪波羅痆斯是令他轉法輪佛以饒益他為正事故依令他轉説初轉法輪廣説如彼薩婆多師問摩訶僧祇部若是佛語名法輪者則應菩提樹邊為商人説法已名轉法輪何故後至波羅痆斯國乃名轉法輪耶答依毗婆沙不釋此難若準異部宗輪論彼説一切佛語皆轉法輪故知為賈客説亦是法輪而今所説鹿野苑中方轉法輪者約三轉十二行相故作此説問經部大乘一切聖道三轉十二行皆名法輪者如何不説菩提樹下名轉法輪而言鹿苑名轉法輪若一切教皆名法輪者如何波羅奈國見道生時名已轉耶釋此難意如俱舍論十二行相所有法門名為法輪由此法門往他相續令解義故或諸聖道皆是法輪於所化生身中轉故於他相續見道生時已至轉初故名已轉解云經部諸教諸道皆名法輪而約轉初故言已轉非謂餘道餘教非法輪故而説已言依大乘宗應準此釋於理無違第四釋十二行者三轉十二行相諸宗不同薩婆多宗如毗婆沙第七十九有三師説故彼論云如契經説佛告苾芻此苦聖諦我曾未聞於此法中如理作意由此便生眼智明覺此苦聖諦慧應遍知我昔未聞乃至廣説此苦聖諦慧已遍知我昔未聞乃至廣説集滅道諦廣説亦爾此苦聖諦我昔未聞等顯未知當知根此苦聖諦慧應遍知等顯已知根此苦聖諦慧已遍知等顯具知根集滅道諦各顯三根應知亦爾大德法救作如是説我思此經舉身毛竪以佛所説必不違義定有次第今此契經越次第説具知根後復説未知當知根故非佛獨覺及諸聲聞得有如是觀行次第具知根後如何復起初無漏根若捨此經必不應理佛初説故以五苾芻而為上首八萬諸天聞此所説皆證法故若欲不捨復違次第故思此經舉身毛竪然彼大德雖作是言而不捨經但回文句彼作是説此經應言此苦聖諦我昔未聞乃至廣説舉滅道諦廣説亦爾此苦聖諦慧應遍知此集聖諦慧應永斷此滅聖諦慧應作證此道聖諦慧應修習昔未聞等廣説如前此苦聖諦慧已遍知此集聖諦慧已永斷此滅聖諦慧已作證此道聖諦慧已修習昔未聞等廣説如前若作是説不失次第隨順現觀非如經説阿毗達摩諸論師言不應輒回此經文句過去無量諸大論師利根多聞過於大德當不敢回此經文句況今大德而可輒回但應尋求此經意趣謂説法者依二次第一依隨順説法次第如此經説二依隨順現觀次第如大德説脅尊者言此經不説三無漏根但説菩薩菩提樹下欲界聞思所成慧力修行四諦問世尊既説我由此觀證得無上正等菩提豈有聞思證菩提義答菩薩由此聞思慧力伏除一切四聖諦愚由此定當證無上覺故説由此證得菩提如人先時濕皮覆面後得除去以穀覆之其障輕微可言無障故此非説三無漏根如契經説佛告苾芻我於四聖諦三轉十二行相生眼智明覺問此應有十二轉四十八行相何故但説三轉十二行相耶答雖觀一一諦皆有三轉十二行相而不過三轉十二行相故作是説如預流者極七反有及七處善并二法等此中眼者謂法智忍智者謂諸法智明者謂類智忍覺者謂諸類智復次眼是觀見義智是決斷義明是照了義覺是警察義十二轉者四諦中各有三轉故成十二轉四十八行相者如苦諦中有三轉一一轉各生眼智明覺故成十二餘三諦亦爾合成四十八行相七處善及二法者如婆娑一百八云云何七處善謂如實知色知色集知色滅趣知色滅行知色味知色愚知色出如實知受想行識七亦爾廣説如彼又彼云問若爾應説三十五處善或無量善何故説七答觀一一蘊各各有七不過七數故説有七如餘經説諸預流者極七反有彼有別説二趣二有應二十八謂人趣有七天趣有七人中有有七天中有有七然不過七故説七名又如餘經説有二法謂眼色乃至意法又如餘經説三轉法輪有十二行相彼不過三及十二故説三十二此亦如是廣説如彼兩復次解眼智明覺初復次唯依見道後復次依後二道或可初依見道後通三道也今依經部破薩婆多唯依見道名轉法輪通約聖教及諸聖道俱作三轉及十二行故俱舍云若爾三轉十二行相非唯見道如何可説唯於見道立法輪名是故唯應即此三轉十二行相所有法門名為法輪可應正理如何三轉三周轉故如何具足十二行相三周楯歷四聖諦故謂此名苦此是集此是滅此是道此應遍知此應永滅此應作證此應修習此已遍知此已永斷此已作證此已修習乃至廣説解云經部約位辨三依諦辨四行十二行相同大乘釋問若爾如何會釋前所引經解云彼經依説次第眼智明覺同瑜伽釋亦不違理今依大乘同經部説故轉法輪論云又復世尊轉幾幾行轉法輪者彼義今説法輪三轉有十二行此苦聖諦此集聖諦此滅聖諦此苦滅道聖諦此第一轉此苦聖諦應知此苦集應斷此苦滅應證此苦滅道應修此第二轉此苦聖諦已知此苦集已斷此苦滅已證此苦滅道已修此第三轉此説三轉如是苦智集智滅智道智如是苦諦有三轉智如是集諦如是滅諦如是道諦有三轉智彼如是説有十二行瑜伽九十五大同轉法輪論而差別者轉法輪論總不分別眼智明覺依瑜伽論眼智明覺約三世境總別有異如體中説四分律由三轉故憍陳如等得法眼淨而不説言得羅漢果應更尋求已外諸門具如婆沙一百八十二三雜心第十俱舍二十四順正理第六十七等廣説雖是甚奇甚為希有一切世間諸天人等先無有能如法轉者而於彼時所轉法輪有上有客是未了義是諸諍論安足處所釋曰此即第二顯不了義謂此法輪隱空説有是不了義具顯生死涅槃因果及説人空而未能顯法空道理是故此教有上勝教有容勝教有容他破是二十部諍論依處真諦記云初説小乘見四諦非無相故不了更有大乘故有上為大乘破故有難既與世間義異故與彼鬪諍世尊在昔第二時中唯為發趣修大乘者依一切法皆無自性無生無滅本來寂靜自性涅槃以隱密相轉正法輪釋曰自下第二無相法輪於中有二初正明法輪後顯不了此即初也文有三節初明説時次辨所為後顯法輪言世尊在昔第二時中者明説時也謂三輪中第二時也唯為等者説教所為謂求三乘中唯為發趣大乘者説依深密經亦同此釋故彼經云為住大乘衆生説於諸法無自性等是故金剛般若經云此經為發大乘者説為發最上乘者説依一切法皆無自性等者正顯第二無相法輪諸部波若宗明無相説一切法皆無自性乃至自性涅槃然初法輪隱空説有今此第二隱有説空故作此言以隱密相轉正法輪亦名祕密故大般若五百七十二云無生無滅等即是諸佛祕密之教然此第二無相大乘即大般若此即舊説八部般若菩提留支金剛仙論第一云應世間故説八部般若第一部十萬偈第二部二萬五千偈第三部一萬八千偈此大品是第四部八千偈此小品是第五部四千偈第六部五百偈第七部六百偈此文殊般若是第八部三百偈此金剛般若是前七部遣相未盡故但稱般若此第八部遣相最盡故別立金剛之名也真諦三藏大同留支又云第一第二此之二部猶在西國此方所無第五第六此之二部由在胡本未曾翻譯今大唐三藏所譯梵本二十萬頌四處十八會説初之六會及第十五會在王舍城鷲峯山説第七八九十一十二十三十四此之七會在室羅筏誓多林給孤獨園説第十會在他化自在天王宮説第十六會在王舍城竹林園白鷺池説雖更甚深甚為希有而於彼時所轉法輪亦是有上有所容受猶未了義是諸諍論安足處所釋曰第二顯未了義謂諸般若説無相等而不分別三無自性及三自性有無之義故深密經及此經文皆説無為為不了義又無量義經云我先道場菩提樹下端坐六年得阿耨多羅三藐三菩提以佛眼觀一切諸法不可宣説所以者何知諸衆生性欲不同種種説法以方便力四十餘年未顯真實是故衆生得道差別不得疾成無上菩提準此等文故知般若是不了義由斯義故對四諦輪雖是甚深亦是希有而比第三有上有容是未了義由未了故猶有諍論真諦記云次説大乘異於小乘故不了猶有一乘故有上與小乘異故與小乘一乘鬪諍為一乘所破故有難第三時中普為發趣一切乘者依一切法皆無自性無生無滅本來寂靜自性涅槃無自性性以顯了相轉正法輪釋曰自下第三了義大乘於中有二初正明了義後顯了義相此即初也文有三節初明説時次辨所為後顯法輪言世尊於今第三時者説教時也於三法輪中説第三時普為發趣一切乘者説教所今此法輪是了義教如是分別二空三性等義是故三乘各證自果故顯揚論第六卷云方便者謂了知知是三種自性能作一切聲聞獨覺無上正等菩提方便依一切法皆無自性等者後顯法輪也謂一切法無自性等者如前所説以隱密相轉正法輪而今第三於上諸句一一皆説無自性性無自性性即是三種無自性性如前已説如是三種無自性性即是三性由斯道理無自性性具足顯示有性無性故作此言以顯了相轉正法輪第一甚奇最為希有于今世尊所轉法輪無上無容是真了義非諸諍論安足處所釋曰此第二釋顯了之相所轉法輪最上希有更無過勝故名無上無容後勝無容後破故名無容具顯有無故是了義非諸諍論所依之處真諦記云次須説一乘與小乘大乘同因緣因果故云顯説無分別第一了義是法輪最希有無更過此理者故名無上又小同歸故無有諍無諍故不可破不可破無難然上所説三種法輪略以三門分別一明時處諸説同異二辨攝教分齊顯了不了三辨所詮宗淺深差別第一時處諸説同異者依真諦三藏解節經疏云復次如來三轉法輪為三種人一者初度聲聞於波羅㮈鹿園仙人集處初轉法輪即第一時轉四諦法輪是法輪希有不可思議是法輪不了義有上有難有諍次如來得道已第七年在舍衛國給孤獨園即是第二時為度大乘行人顯一切法無自性無生無滅本來寂靜自性涅槃顯説相皂名轉法輪轉法輪者波羅蜜十地等是法輪希有不可思議一切人天所不能轉是法輪不了義亦有上有難有諍去孤獨園五里有江人飲浴去悉得智慧時人號云施智慧所故佛於此地説大乘般若江名沙羅底此翻為智慧如河此是女天所住處也次佛未涅槃七年成道後三十八年在毗舍離國鬼王法堂為真當菩薩説解節經等維摩法華等此第三時世尊為度三乘行人為顯一切法無自性無生無滅本來寂靜自性涅槃顯無分別相輪是法輪最清淨希有不可思議是法輪了義無上無難無諍為衆生根鈍如來次第説法輪問如來説法何故有此三種答為二種諦故一者安立諦二者不安立諦若鹿園説法即是安立四諦若祇園説法即是安立二諦若於毗舍離説法名不安立諦不定真俗謂之不安立諦相傳説云真諦師説第一法輪二月八日成道四月八日於波羅㮈初轉法輪又第二法輪為諸菩薩兼為二乘説般若經解云相傳第一法輪如其日月第二法輪兼為二乘餘義皆同解節經疏又解節疏云第三教在毗舍離便違經説在王舍城耆闍崛山今依大唐三藏三種法輪但説處所不説時節日月年歲初法輪處同真諦説如前分別第二法輪依四處十六會説如大般若如前所説而真諦云在舍衛國給孤獨者於四處中但説一處第三法輪在兩處説一者淨土二者穢土如何第一記中已説真諦記云毗舍離者便顯穢土與經不同如前分別通説法華及華嚴等為第三者即鷲峰山及七處八會如經應知問深密解脫經云第一為聲聞行人第二為住大乘人第三為住一切大乘今依此經第一唯為發趣聲聞乘者第二唯為發趣修大乘者第三普為發趣一切乘者如是二經以何為正答今本為正如前所説理不違故又真諦記亦同此説故解節記云第一為聲聞人第二為大乘人第三為三乘人第二攝教分齊顯了不了者先辨攝教分齊後明了不了義言攝教分齊者諸説不同若依真諦部執論記第二卷説小乘三藏名初法輪唯小非大涅槃經名第二法輪通為大小華嚴般若名第三法輪唯大非小故彼記云佛教自有三種法輪一小乘法輪即是三藏教二大乘法輪説大乘與小乘異如涅槃經合明大小乘義三一乘法輪明大小無異如華嚴等經諸般若經明三乘人同觀二空理同修真實智故知大小無異也若依解節疏如前説第一説四諦法輪第二説大乘般若第三説謂解節經維摩法華等解云真諦二記所自説成相違雖有兩説且依後釋順經文故謂四諦為初教諸部般若為第二教解深密經維摩法華及華嚴等為第三教且依真諦判教如上今解諸説四諦者為第一教説無相者為第二教若約三性三無性等具顯有無盡理説者為第三教不約年月時節前後辨三時教問準何得知諸部般若為第三教解云如般若二百九十六云爾時無量百千天子空中散華同聲唱言我等今者於贍部洲見佛第二轉妙法輪四百三十七五百七五百四十五大品十九智度論六十五皆同後明了不了者且依此經於三輪中初二不了第三為了所以者何如上所説第一法輪隱空説有第二法輪隱有説空第三法輪具足顯示空有道理故名了義非謂所詮有淺深故名了不了所以者何第二第三所辨無相理無淺深而具分別顯故名了不具足説隱故不了由斯道理了與不了諸説不同若依小乘二十部中自有二説一大衆部一説説出世雞胤説假制多山小西山住北山住法密飲光十部同説如來所説皆是了義二薩婆多等餘十部説如來所説有了不了非皆了義依真諦師部執論記第一卷云若是未熟衆生多宜為説不了義經若已成熟衆生多宜為説了義經然了不了凡有四句一語了義不了如小乘經二義了語不了如煞王子偈如雜集論第十六云逆害於父母王及二多聞誅國及隨行是人説清淨廣釋如彼三語義俱不了如外道經四語義俱了如大乘經了了易解為淺不了難解為深又第六云一切經不盡是了義者若稱理而説即是了義不了義自有兩種一語不了而義了如煞於父母王及諸王子偈語雖不了義實了也二語了而義不了如釋迦言我精進故法久住世餘佛懈怠故法不久住世迦葉佛滅後住止七日柯羅拘孫陀訶佛滅後法住世十二年柯那牟尼佛滅後法世六年我滅後住世二千年此語甚了而義不了不了者佛意明餘佛不重説法故名懈怠一法止作一過説釋迦於一切法門作無過重説之故名精進也廣説如彼若依顯揚第六云不了義教者謂契經應頌記別等中薄伽梵略標其義未廣分別應更開示教了義教者謂翻前應知隱密教者謂多分聲聞藏教顯了教者謂多分大乘藏教瑜伽六十四亦同顯揚大智度論第九云了義經者有一切智人佛第一一切諸經書中佛法第一一切衆生中比丘僧第一施得大富持戒得生天如是等是了義經如説法師説法有五種利一者大富二人所愛三者端正四者名聲五者後得涅槃是為未了義云何未了施得大富是了了可解説法無財施而言得富得富者説法人種種讚施破人慳心亦自除慳以是因緣得富是故言未了顯揚了難了相對此與菩薩藏第七淺深相返也大菩薩藏經第十八卷中以九對辨了不了義一所有廣文名不了義經所有廣義名了義經初廣文少義後少文廣義二宣説於道名不了義宣説於果名為了義因果相對三乘行因名道彼所得果名果三説世俗諦名不了義説勝義諦名為了義二諦相對四説業惑染名不了義説惑業盡名為了義染盡相對五説可染法名不了義説清淨法名為了義止惡修善相對六説厭背生死欣樂涅槃名不了義説生死涅槃二無差別名為了義生死涅槃有別無別相對門也七説種種文句差別名不了義説甚深難見難覺是名了義文句淺深相對門八説文句廣博令心踊躍名不了義説文句及心皆同灰燼是名了義廣略相對九説有我有情等又説立有種種受蘊無有主宰名不了義説空無相等無有我等及三解脫門是名了義我法二空相對門也若依大集五十四唯有七對而無第一第三二對餘門大同而差別者大集經云不了義經者分別隨道了義經者不分別果此即菩薩藏經因果相對然云不分別者譯家謬也又大集云不了義經者多為衆生説罪福相令聞法者心生欣戚了義經者凡所演説必令聽者心為調伏此即菩薩藏中第八廣略相對文雖有異其意亦同菩薩藏云皆同灰燼即調伏義依涅槃經第六卷中聲聞乘無上大乘等七對釋了不了廣如彼説此經所説了不了者隱密顯了釋了不了如前分別如是諸教了不了義種種不同故不可以了不了言判教淺深後當分別第三顯理淺深者西方諸師自有兩説一清辨等言於三輪中四諦為初解深密等以為第二説法相故諸部般若以為第三無所得故所申理教如前善取空中已説此地諸師自有兩釋一云三論但遣所執一云具遣三性如掌珍等二護法等宗但遣所執不遣二性然彼宗中自有兩釋一真諦三藏云具遣三性立三無性如次應知安非安立二大唐三藏云於三性中但遣所執而非二性如前善取空中已説然彼所詮有深淺者第一四諦法輪自有二義一者有作二者無作即是分段變易二種四諦初轉法輪意在第一第二法輪唯遣所執第三法輪具顯三種無自性性於中第二第三法輪所説無相理無淺深若依此理皆是了義而今第三為了義者具顯三種自性等故據實般若亦説三性應是了義從多分説故言不了故無性攝論第一卷云又如大般若波羅蜜多經中説慈氏於汝意云何諸遍計所執中非實有性為色非色不也世尊依他起中唯有名想施設言説性為色非色不也世尊諸圓成實中彼空無我性為色非色不也世尊慈氏由此門故應如是知諸遍計所執性決定非有諸依他起性唯有名想施設言説諸圓成實空無我性是真實有我依此故密意説言彼無二數謂是色等又第四卷引大般若於五蘊中乃至佛法具有三性廣如彼説又解般若自有二種一深二淺深即了義淺即不了故智度論第一百云問曰更有何法甚深勝般若者而以般若囑纍阿難而餘經囑纍菩薩答曰般若非祕密法而法華等諸經説阿羅漢受決作佛大菩薩能受又如佛説不可思議解脫經五百阿羅漢雖在佛邊而不聞或時得聞而不能用復次般若有二種一者共聲聞説二者但為十方住第十地大菩薩説非九地所聞何況新發意者復有九地乃至初地所聞各各不同般若總相是一而深淺有異具説如彼準知波若有了不了又智度論第三十四四十一七十二皆説共不共二種般若恐繁不述世尊若善男子或善女人於此如來依一切法皆無自性無生無滅本來寂靜自性涅槃所説甚深了義言教釋曰自下第二正發問辭福勝劣於中有二初菩薩請問後如來正答前中有二初約人舉所問教後聞已信下正問依教起十法行生福多少此即初也為顯如上無自性性顯了言辭故作是言所説甚深了義言教聞已信解書寫護持供養流布受誦溫習如理思惟以其修相發起加行生幾所福説是語已釋曰此即第二正問依教起十法行生福多少此十法行如前已釋爾時世尊告勝義生菩薩曰勝生是善男子或善女人其所生福無量無數難聞喻知吾今為汝略説少分釋曰自下第二如來正説於中有二初歎勝許説後依問正説此即初也如文可知如爪上土比大地土百分不分一千分不及一百千分不及一數算計喻塢波尼煞曇分亦不及一釋曰自下第二如來正説於中有二初舉二喻辨其勝劣後如是下舉法同喻辨福勝劣就二喻中即分為二初爪上少土後牛迹少水喻此即初也然依此經以其八分校量勝劣一百分二千分三百千分四數分五算分六計分七喻分八塢波尼煞曇分若最無比經及希有經皆説八分即同此經若依菩薩藏經第十二卷數雖同八然後五分皆安梵語故彼經云僧佉分迦羅分伽拏那分烏波摩分塢波尼煞曇分於中前四若準諸教如次即配數算計喻然準直本金剛般若如次配為數計算喻若依能斷般若經及直本經十輪經第五同説十分謂百千後更加俱胝那庾多分若依大般若經第一百四卷説十三分謂百千後更加五分謂俱胝分百俱胝分千俱胝分百千俱胝分百千俱胝那庾多分然釋諸分差別相者若依真諦金剛般若經云百分不及一千萬億分不及一窮於算數不及其一乃至威力品類相應譬喻所不能及真諦解云凡舉五義顯此勝彼劣一約數量故勝二約威力故勝三約品類故勝四約相應故勝五約譬喻故勝數量者窮於數量不能及一如經言百分不及一窮於算數不及其一也二威力者謂隨所欲得三乘勝果自然成辦勝如意寶假設世間如意寶如須彌山王滿大千界無此威力不能得三乘果故三品類勝者品類有五種即五藏義一如來二正法三法身四出世法五自性清淨此五藏義即是品類義於一真如有五藏義初顯體性次顯因三顯果四顯功德五顯不共但是無分別智可得故如此五種是品類義彼財施福無此五義品故不及也四相應者明因果相應謂信樂大乘能感真如布施福德不能應真無此相應故不及也五譬喻者即此真如是第一法更無別法與此法等故無可為喻具説如彼若依菩提留支金剛般若經云百分不及一千分不及一百千分不及一歌羅分不及一數分不及一優波尼沙陀分不及一乃至算數譬喻所不能及依天親波若論約四種勝校量勝劣故彼偈言數力無似勝無似因亦然一切世間法不可得為喻此説何義示前福德此福為勝云何為勝一者數勝二者力勝三者不相似勝四者因勝是故偈言一切世間法不可得為喻數勝者如經百分不及一乃至算數譬喻所不能及故以數無限齊故攝得餘數應知力勝者如經不及一歌羅分故無似勝者此福德中數不相似此福德不可數故如經不能及故因勝者因果不相似此因果勝彼因果故如經乃至優波尼沙陀分不及一故有此法最勝無有世間法可喻此法故偈言一切世間法不可得為喻故如是此福德中彼福微少是故無法可喻金剛仙論云百分不及一等者論云算數勝此明有漏福德是有盡法故亦有限明無漏善法是無盡之法故亦無限所以勝也歌羅分不及一者論云力勝歌羅者西國正音如折一毛以為百分一分名歌羅分此義翻為力勝以無漏善法功德勢力勝於有漏善法故名力勝也數分不及一者論云不相似勝由是其數數中轉微轉細及至少許由不及一故名不相似勝也明此無漏善法若有形色者虗空法界所不容受以有盡法形無為無盡法故假令乃至少許不相似如分芥子以為萬分擬須彌山唐失其身終不相類也優波尼沙陀分不及一者論中義翻云因勝明因果不相似珍寶有漏善法但得三界報因果俱是不如無漏善法乃遠得佛果因果俱勝故名因果不相似也今於此經前之三分如名可知言數分者梵者僧佉此云數也依十地論第七卷云數者一一為二二二為四如是等依功德施般若論云數者謂六十位過斯已往數不能及解云依俱舍論其數漸增有六十轉依華嚴經一百二十轉且依俱舍故言六十依金剛仙論前之五分皆名數分故彼云百分不及一等者論云算數勝言算分者梵音伽拏那此云算也十地論云算者一縱十橫如是等若依毗婆沙第一百二十六云數名何法答如理轉變意業及此所依諸巧便智此中數者非謂所數稻麻等物百千等數但是所有能數之法此能數法故説為數乃至彼云如是四蘊為數自性算名何法答如理轉變語業及此所依諸巧便智此中算者非謂所算一十百千萬億等法但是所有能算之法此能算法故説為算乃至彼云如是五蘊為算自性解云若準此文能數能算巧便智等以為算數雖有此義且依前説言計分者梵音迦羅此云計也功德施云歌羅不及校計不及者此依歌羅微細義説謂受持福最微細功德已多非前所及窮於校計終無與等微細尚爾況一切耶歌羅與計梵音有異不合分為二種分若依雜集算計二分亦名為數故十一云數有二種一計算數二決定數計算數者謂六波羅蜜多決定數者謂波羅蜜多數唯有六不增減言喻分者梵音烏波摩此云喻也功德施云譬喻不及者如有童女稱為月面女面豈能合類於月以有光潔少分相同彼前福喻聚即不如是無少相似可為譬喻言塢波尼煞曇分者此云極也即是數算計喻是四中云最後極故於數等後説塢波尼煞曇分也又解塢波尼煞曇分者但是數極此是西方最極大數之末數名似此方載名非即是載以此方數法少但有十五西方乃有六十數名世親論云因勝功德施云優波尼沙者因也其義云何此少分福於最勝果即成因性總前福聚亦不成因不能得真實果故或如牛迹中水比四大海水百分不及一廣説乃至塢波尼煞曇分亦不及一釋曰此即第二牛迹少水喻準前可知如是於諸不了義經聞已信解廣説乃至以其修相發起加行所獲功德比此所説了義經教聞已信解所集功德廣説乃至以其修相發起加行所集功德百分不及一廣説乃至塢波尼煞曇分亦不及一説是語已釋曰此即第二舉法同喻校量勝劣謂聞二經所獲功德依前二喻校量勝劣分數差別如經可知爾時勝義生菩薩復白佛言世尊於是解深法門中當何名此教我當云何奉持釋曰自下第五依教奉持分於中有二初菩薩請問後如來正答此即初也請問二事一問教名二問奉持佛告勝義生菩薩曰善男子此名勝義了義之教於此勝義了義之教汝當奉持釋曰自下第二如來正答於中有二初依問正答後説教勝利此即初也謂説此教名為勝義了義之教依如是名汝當奉持説此勝義了義教時於大會中有六百千衆生發阿耨多羅三藐三菩提心釋曰自下第二説教勝利有四勝益即分為四此即初益依瑜伽論第四十六有五勝利彼云諸佛菩薩為諸有情宣説正法當知有五大果勝利一者一類有情聞正法時遠塵離垢於諸法中法眼生起二者一類有情聞正法時得盡諸漏三者一類有情聞正法時便於無上正等菩提發正願心四者一類有情聞正法時證得菩薩最勝法忍五者一類有情聞正法已受持讀誦修習正行展轉方便令正法眼久往不滅如是五種當知名為諸佛菩薩所説正法大果勝利今此經中有四勝利闕後一種易可知故諸經多不説也四種勝利即分為四此即第一發心勝利依智度論第五十三無生品云云何五種菩提答曰一者柔順忍二者無生忍及三種菩提解云地前地上及三乘無學菩提以為五種也復有五種菩提一發心菩提於無量生死中發心為阿耨多羅三藐三菩提故名為菩提此即因中説果二伏心菩提折諸煩惱降伏其心行諸波羅蜜三明菩提觀三世諸法本末總相別相分別籌量諸法畢竟清淨所謂般若波羅蜜相四出到菩提於般若波羅蜜中得方便力故亦不著般若波羅蜜滅一切煩惱見一切十方諸佛得無生法忍出三界到薩婆若五者無上菩提坐道場斷煩惱習得阿耨菩提長耳三藏釋云習種已前名發心位次三十心名為伏心位始從初地至於七地名為明位八九十地名出到位妙覺名無上位今依此五釋經意者此云阿耨菩提者所求菩提言發心者發能求之心故言發菩提心此即五中初二菩提也一云第三明菩提也所以者何金剛仙云初地菩提發心故或可所求其五種能求之心唯在因位勘顯揚三百千聲聞遠塵離垢於諸法中得法眼淨釋曰此即第二離塵垢等益謂聞此教得二種益一遠塵離垢益二得法眼淨益然此二益諸教不同若依大毗婆沙百八十二云如契經説佛説此法門時具壽憍陳那及八萬諸天遠塵離垢於諸法中生淨法眼此中遠塵者謂遠隨眼離垢者謂離纏垢於諸法中者謂於四聖諦中生淨法眼者謂見四聖諦淨法眼生依雜集論第九卷云如契經言遠塵離垢於諸法中正法眼生者此依見道説諸法忍能遠塵諸法智能離垢由彼最初於諸諦中妙聖慧眼為自性故法忍能遠離塵者由諸法忍永斷一切煩惱塵故法智能離垢者由諸法智已斷障垢依得生故又於此忍智兩位如其次第遍知故永斷故道得清淨故依此而説遠塵離垢集論第五同雜集説解云遍知故永斷故道得清淨者通釋法眼淨也若依瑜伽八十三云復次遠塵離垢者塵謂已生未究竟智能障現觀有間無間我慢現轉垢謂彼品及見斷品所有粗重令永無故名遠塵離垢又復塵者所謂我慢及見所斷一切煩惱垢謂二品所有粗重於諸法中者謂於自相共相所住法中言法眼者謂如實現證唯有法慧言見法者謂於苦等如實見故言得法者謂隨證得沙門果故廣説如彼又瑜伽論八十六云復次由二種相當知聖者慧眼清淨謂由遠塵及離垢故由是所斷諸煩惱纏得離繫故名為遠塵由彼隨眠得離繫故説名離垢又現觀有粗我慢隨入作意間無間轉若遍了知所取能取所緣平等彼即斷滅彼即滅故説名遠塵一切見道所斷煩惱隨眠斷故説名離垢見法得法等十種勝利具説如彼一百五十千聲聞永盡諸漏心得解脫釋曰此即第三得解脫益一永盡諸漏得慧解脫永離定障得心解脫或可離三漏故名永盡諸漏永離貪故心得解脫依大婆沙九十四云漏盡者謂諸漏永盡問順諸漏法亦得永盡何故但説彼漏盡耶答彼以盡而為上首應知亦説順諸法盡復次諸漏難斷難破難趣非順漏法故偏説之復次諸漏過失多勝堅牢非順漏法故偏説之廣説如彼大智度論第三卷云三界中三種漏已盡無餘故言諸漏盡也解云心得解脫如前廣説問如何此甚深大乘而能證得二乘利益解云如智度論如來説教有其二種一者顯了二者祕密若依顯了唯證大果而有祕密故通大小二種勝利故經説云佛以一音演説法衆生隨類各得解又無量義云如來一音説三法輪又大界經云如來一音中演説無量契經海又此經説普為發趣一切乘者説此了義故知聞此得三乘果於理無違七十五千菩薩得無生法忍釋曰此即第四得無生忍益然此無生自有二種一者初地菩薩名得無生忍故智度論云有二種忍一者柔順忍二者無生忍解云柔順忍在十回向無生忍即初地已上二者八地已上得諸法無生忍故仁王經有五種忍謂一伏忍二信忍三順忍四無生忍五寂靜如其次第地前三十心是伏忍位初二三地是信忍位四五六地是順忍位七八九地是無生忍十地及佛地是寂靜忍廣説如彼菩提資糧論第三云得無生法忍位菩薩不動地菩薩藏經第二十云舍利子當授記時我便證得無生法忍舍利子證何等無生法忍所謂證得一切色法無所得忍證得受想行識無所得忍證得蘊界處法無所得忍舍利子言得忍者是即名為忍受諸法都無所得何以故非於證得如是忍時世間之法而復現行非異生法非諸學法非無學法非獨覺法非菩薩法諸非佛法而復現行所以者何由一切法不現行故説名得忍由一切法畢竟無得亦無所得故名得忍又是忍者於一剎那盡一切相及諸所緣故名得忍又是忍者不忍於眼不壞於眼及諸所緣故名得忍不忍於耳鼻舌身意不壞於意如是忍者無盡境界如是忍者非趣境界故名得忍瑜伽七十四云問如經中説無生法忍云何建立答由三自性而得建立謂由遍計所執自性故立本性無生忍由依他起自性故立自然無生忍由圓成實自性故立煩惱苦垢無生忍當知此忍無有退轉顯揚第六亦同瑜伽又顯揚云此三種忍在不退轉地大集十一功德施金剛論意同顯揚佛地論第六釋云八地已上名不退地又佛地論有兩復次一云初地已上得無生忍一云八地已上得無生忍廣如彼説今此所説無生忍者若依智度初地已上無生法忍若準仁王七八九地得無生忍若廣分別如十地論第十卷説
